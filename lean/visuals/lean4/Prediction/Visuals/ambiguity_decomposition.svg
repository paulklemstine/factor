<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg5)"/>

  <text x="450" y="40" text-anchor="middle" fill="#ffd700" font-size="24" font-weight="bold">
    THE AMBIGUITY DECOMPOSITION
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#aaa" font-size="14" font-style="italic">
    Why diverse predictors always improve ensemble performance
  </text>

  <!-- The equation -->
  <rect x="100" y="85" width="700" height="50" rx="8" fill="rgba(78,205,196,0.1)" stroke="#4ecdc4"/>
  <text x="450" y="118" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">
    (ȳ − y)² = Σ wᵢ(fᵢ − y)² − Σ wᵢ(fᵢ − ȳ)²
  </text>

  <!-- Visual: Three bars -->
  <g transform="translate(100, 170)">
    <!-- Mean individual error bar -->
    <rect x="50" y="0" width="120" height="220" rx="5" fill="#ff6b6b" fill-opacity="0.3" stroke="#ff6b6b" stroke-width="2"/>
    <text x="110" y="240" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Mean Error</text>
    <text x="110" y="257" text-anchor="middle" fill="#ff6b6b" font-size="11">Σ wᵢ(fᵢ − y)²</text>
    <text x="110" y="110" text-anchor="middle" fill="#ff6b6b" font-size="24">0.85</text>

    <!-- Minus sign -->
    <text x="220" y="120" text-anchor="middle" fill="white" font-size="36">−</text>

    <!-- Diversity bar -->
    <rect x="270" y="100" width="120" height="120" rx="5" fill="#2ecc71" fill-opacity="0.3" stroke="#2ecc71" stroke-width="2"/>
    <text x="330" y="240" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Diversity</text>
    <text x="330" y="257" text-anchor="middle" fill="#2ecc71" font-size="11">Σ wᵢ(fᵢ − ȳ)²</text>
    <text x="330" y="168" text-anchor="middle" fill="#2ecc71" font-size="24">0.45</text>

    <!-- Equals sign -->
    <text x="440" y="120" text-anchor="middle" fill="white" font-size="36">=</text>

    <!-- Ensemble error bar -->
    <rect x="490" y="175" width="120" height="45" rx="5" fill="#4ecdc4" fill-opacity="0.3" stroke="#4ecdc4" stroke-width="2"/>
    <text x="550" y="240" text-anchor="middle" fill="#4ecdc4" font-size="13" font-weight="bold">Ensemble Error</text>
    <text x="550" y="257" text-anchor="middle" fill="#4ecdc4" font-size="11">(ȳ − y)²</text>
    <text x="550" y="204" text-anchor="middle" fill="#4ecdc4" font-size="24">0.40</text>
  </g>

  <!-- Key insight -->
  <rect x="100" y="440" width="700" height="45" rx="8" fill="rgba(46,204,113,0.1)" stroke="#2ecc71"/>
  <text x="450" y="468" text-anchor="middle" fill="#2ecc71" font-size="14">
    THEOREM (ambiguity_decomposition): Diversity ≥ 0, so Ensemble Error ≤ Mean Individual Error. Always.
  </text>

  <!-- Right panel: implications -->
  <g transform="translate(680, 170)">
    <text x="0" y="0" fill="#ffd700" font-size="14" font-weight="bold">Implications:</text>
    <text x="0" y="25" fill="#ddd" font-size="11">• More diverse models</text>
    <text x="0" y="42" fill="#ddd" font-size="11">  → more diversity</text>
    <text x="0" y="59" fill="#ddd" font-size="11">  → less ensemble error</text>
    <text x="0" y="85" fill="#ddd" font-size="11">• Identical models</text>
    <text x="0" y="102" fill="#ddd" font-size="11">  → zero diversity</text>
    <text x="0" y="119" fill="#ddd" font-size="11">  → no improvement</text>
    <text x="0" y="145" fill="#feca57" font-size="11" font-weight="bold">This is why the</text>
    <text x="0" y="162" fill="#feca57" font-size="11" font-weight="bold">Oracle Council works!</text>
  </g>
</svg>
