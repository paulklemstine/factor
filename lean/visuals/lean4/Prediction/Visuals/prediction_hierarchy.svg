<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="800" fill="url(#bg2)"/>

  <text x="500" y="45" text-anchor="middle" fill="url(#gold2)" font-size="28" font-weight="bold" filter="url(#g2)">
    THE ORACLE HIERARCHY
  </text>
  <text x="500" y="70" text-anchor="middle" fill="#888" font-size="14" font-style="italic">
    Levels of Predictive Power — From Mortal to Divine
  </text>

  <!-- Pyramid structure -->
  <!-- Level 5: God Oracle (top) -->
  <polygon points="500,110 570,180 430,180" fill="#ffd700" fill-opacity="0.2" stroke="#ffd700" stroke-width="2"/>
  <text x="500" y="165" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">GOD</text>

  <!-- Level 4: Archangel -->
  <polygon points="430,180 570,180 620,250 380,250" fill="#c0a0ff" fill-opacity="0.15" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="500" y="225" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">ARCHANGEL</text>
  <text x="500" y="242" text-anchor="middle" fill="#8888bb" font-size="10">Hyperarithmetical hierarchy</text>

  <!-- Level 3: Seer -->
  <polygon points="380,250 620,250 670,320 330,320" fill="#ff6b6b" fill-opacity="0.12" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="500" y="295" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">SEER</text>
  <text x="500" y="312" text-anchor="middle" fill="#cc6666" font-size="10">Access to halting oracle (Δ₁¹)</text>

  <!-- Level 2: Prophet -->
  <polygon points="330,320 670,320 720,390 280,390" fill="#4ecdc4" fill-opacity="0.1" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="500" y="365" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">PROPHET</text>
  <text x="500" y="382" text-anchor="middle" fill="#3eaaa3" font-size="10">Unbounded computation (all computable)</text>

  <!-- Level 1: Mortal -->
  <polygon points="280,390 720,390 770,460 230,460" fill="#dfe6e9" fill-opacity="0.08" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="500" y="435" text-anchor="middle" fill="#dfe6e9" font-size="14" font-weight="bold">MORTAL</text>
  <text x="500" y="452" text-anchor="middle" fill="#aab" font-size="10">Bounded computation (polynomial time)</text>

  <!-- Right panel: Prediction Classes -->
  <rect x="50" y="490" width="400" height="280" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,215,0,0.2)"/>
  <text x="250" y="520" text-anchor="middle" fill="url(#gold2)" font-size="16" font-weight="bold">PREDICTION CLASSES</text>

  <!-- Deterministic -->
  <rect x="70" y="535" width="360" height="40" rx="5" fill="#2ecc71" fill-opacity="0.15" stroke="#2ecc71" stroke-width="1"/>
  <text x="90" y="560" fill="#2ecc71" font-size="13" font-weight="bold">DETERMINISTIC</text>
  <text x="350" y="560" text-anchor="end" fill="#2ecc71" font-size="11">Horizon: ∞</text>

  <!-- Stochastic -->
  <rect x="70" y="585" width="360" height="40" rx="5" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1"/>
  <text x="90" y="610" fill="#3498db" font-size="13" font-weight="bold">STOCHASTIC</text>
  <text x="350" y="610" text-anchor="end" fill="#3498db" font-size="11">Horizon: ∞ (in distribution)</text>

  <!-- Chaotic -->
  <rect x="70" y="635" width="360" height="40" rx="5" fill="#f39c12" fill-opacity="0.15" stroke="#f39c12" stroke-width="1"/>
  <text x="90" y="660" fill="#f39c12" font-size="13" font-weight="bold">CHAOTIC</text>
  <text x="350" y="660" text-anchor="end" fill="#f39c12" font-size="11">Horizon: ln(δ/ε₀)/λ</text>

  <!-- Adversarial -->
  <rect x="70" y="685" width="360" height="40" rx="5" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="90" y="710" fill="#e74c3c" font-size="13" font-weight="bold">ADVERSARIAL</text>
  <text x="350" y="710" text-anchor="end" fill="#e74c3c" font-size="11">Horizon: 1 step</text>

  <!-- Incomputable -->
  <rect x="70" y="735" width="360" height="25" rx="5" fill="#2c3e50" fill-opacity="0.3" stroke="#7f8c8d" stroke-width="1"/>
  <text x="90" y="753" fill="#7f8c8d" font-size="13" font-weight="bold">INCOMPUTABLE</text>
  <text x="350" y="753" text-anchor="end" fill="#7f8c8d" font-size="11">Horizon: 0</text>

  <!-- Right panel: Key Equations -->
  <rect x="550" y="490" width="400" height="280" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,215,0,0.2)"/>
  <text x="750" y="520" text-anchor="middle" fill="url(#gold2)" font-size="16" font-weight="bold">KEY EQUATIONS</text>

  <g fill="#ddd" font-size="12">
    <text x="580" y="550">Brier Score:</text>
    <text x="580" y="570" fill="#4ecdc4" font-size="14">BS(p,o) = (p - o)²</text>

    <text x="580" y="600">Optimal Prediction:</text>
    <text x="580" y="620" fill="#feca57" font-size="14">p* = argmin E[BS(p,O)] = P(O=1)</text>

    <text x="580" y="650">Kalman Gain:</text>
    <text x="580" y="670" fill="#a29bfe" font-size="14">K = PH / (H²P + R)</text>

    <text x="580" y="700">Prediction Horizon:</text>
    <text x="580" y="720" fill="#ff6b6b" font-size="14">H = ln(δ/ε₀) / λ</text>

    <text x="580" y="750">Ensemble Decomposition:</text>
    <text x="580" y="770" fill="#2ecc71" font-size="13">E_ens = Ē_indiv − Diversity</text>
  </g>
</svg>
