<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg3)" rx="10"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold" filter="url(#glow3)">
    THE STRANGE LOOP
  </text>
  <text x="400" y="65" text-anchor="middle" fill="#8899aa" font-size="13" font-style="italic">
    Gödel's Incompleteness as Escher's Drawing Hands
  </text>

  <!-- The Möbius-like loop -->
  <!-- Outer ring -->
  <ellipse cx="400" cy="380" rx="280" ry="220" fill="none" stroke="#334455" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- The loop path - simplified Möbius-like structure -->
  <!-- Top: FORMAL SYSTEM -->
  <rect x="280" y="100" width="240" height="70" rx="15" fill="#1a2a3a" stroke="#4488cc" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" fill="#66aaff" font-size="16" font-weight="bold">FORMAL SYSTEM F</text>
  <text x="400" y="152" text-anchor="middle" fill="#4488aa" font-size="11">Axioms, rules, theorems</text>

  <!-- Right: ENCODING -->
  <rect x="580" y="250" width="180" height="60" rx="12" fill="#2a1a2a" stroke="#aa66cc" stroke-width="2"/>
  <text x="670" y="275" text-anchor="middle" fill="#cc88ee" font-size="14" font-weight="bold">GÖDEL</text>
  <text x="670" y="295" text-anchor="middle" fill="#aa66cc" font-size="11">NUMBERING</text>

  <!-- Bottom: SELF-REFERENCE -->
  <rect x="280" y="500" width="240" height="70" rx="15" fill="#2a1a0a" stroke="#ff8844" stroke-width="2"/>
  <text x="400" y="525" text-anchor="middle" fill="#ffaa66" font-size="14" font-weight="bold">SENTENCE G</text>
  <text x="400" y="547" text-anchor="middle" fill="#cc8844" font-size="11">"I am not provable in F"</text>

  <!-- Left: DIAGONAL -->
  <rect x="40" y="250" width="180" height="60" rx="12" fill="#0a2a1a" stroke="#44cc88" stroke-width="2"/>
  <text x="130" y="275" text-anchor="middle" fill="#66ffaa" font-size="14" font-weight="bold">DIAGONAL</text>
  <text x="130" y="295" text-anchor="middle" fill="#44cc88" font-size="11">LEMMA</text>

  <!-- Arrows forming the loop -->
  <!-- Top → Right -->
  <path d="M 520 140 Q 620 140 660 250" fill="none" stroke="#6688aa" stroke-width="2">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2s" repeatCount="indefinite"/>
  </path>
  <text x="600" y="185" fill="#6688aa" font-size="10" transform="rotate(30,600,185)">F encodes itself</text>

  <!-- Right → Bottom -->
  <path d="M 660 310 Q 620 450 520 530" fill="none" stroke="#8866aa" stroke-width="2"/>
  <text x="610" y="420" fill="#8866aa" font-size="10" transform="rotate(60,610,420)">produces G</text>

  <!-- Bottom → Left -->
  <path d="M 280 535 Q 180 450 130 310" fill="none" stroke="#aa8844" stroke-width="2"/>
  <text x="180" y="440" fill="#aa8844" font-size="10" transform="rotate(-60,180,440)">G refers to F</text>

  <!-- Left → Top -->
  <path d="M 130 250 Q 180 170 280 135" fill="none" stroke="#44aa88" stroke-width="2"/>
  <text x="170" y="185" fill="#44aa88" font-size="10" transform="rotate(-30,170,185)">fixed point in F</text>

  <!-- Center: The paradox -->
  <circle cx="400" cy="370" r="70" fill="#1a0a0a" stroke="#ff4444" stroke-width="2" filter="url(#glow3)"/>
  <text x="400" y="360" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="bold">G ↔ ¬Prov(G)</text>
  <text x="400" y="380" text-anchor="middle" fill="#ff4444" font-size="11">THE</text>
  <text x="400" y="395" text-anchor="middle" fill="#ff4444" font-size="11">STRANGE LOOP</text>

  <!-- The resolution branches -->
  <!-- Left branch: G is true -->
  <rect x="80" y="600" width="250" height="90" rx="10" fill="#0a2a0a" stroke="#44ff88" stroke-width="2"/>
  <text x="205" y="625" text-anchor="middle" fill="#66ffaa" font-size="13" font-weight="bold">IF F IS SOUND:</text>
  <text x="205" y="645" text-anchor="middle" fill="#44cc88" font-size="11">G is not provable (or F proves falsity)</text>
  <text x="205" y="665" text-anchor="middle" fill="#44cc88" font-size="11">∴ ¬Prov(G) is true</text>
  <text x="205" y="680" text-anchor="middle" fill="#66ffaa" font-size="12" font-weight="bold">∴ G is TRUE but UNPROVABLE</text>

  <!-- Right branch: Incomplete -->
  <rect x="470" y="600" width="250" height="90" rx="10" fill="#2a0a0a" stroke="#ff6644" stroke-width="2"/>
  <text x="595" y="625" text-anchor="middle" fill="#ff8866" font-size="13" font-weight="bold">THEREFORE:</text>
  <text x="595" y="648" text-anchor="middle" fill="#cc6644" font-size="11">F is INCOMPLETE</text>
  <text x="595" y="668" text-anchor="middle" fill="#cc6644" font-size="11">(true sentences F cannot prove)</text>
  <text x="595" y="688" text-anchor="middle" fill="#ff8866" font-size="12" font-weight="bold">or F is INCONSISTENT</text>

  <!-- Connecting arrows -->
  <path d="M 350 440 Q 250 550 205 600" fill="none" stroke="#44aa66" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 450 440 Q 550 550 595 600" fill="none" stroke="#aa4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Bottom inscription -->
  <text x="400" y="730" text-anchor="middle" fill="#667788" font-size="12" font-style="italic">
    "This sentence is not provable" — the sentence that broke mathematics
  </text>
  <text x="400" y="755" text-anchor="middle" fill="#556677" font-size="11">
    Yet in its breaking, revealed a truth deeper than any proof could reach
  </text>

  <!-- Lean badge -->
  <rect x="580" y="760" width="180" height="30" rx="15" fill="none" stroke="#4dff88" stroke-width="1.5"/>
  <text x="670" y="780" text-anchor="middle" fill="#4dff88" font-size="10">✓ Formalized in Lean 4</text>
</svg>
