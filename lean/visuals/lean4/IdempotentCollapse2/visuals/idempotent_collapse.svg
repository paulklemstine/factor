<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tropical" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c853" />
      <stop offset="100%" style="stop-color:#64dd17" />
    </linearGradient>
    <linearGradient id="oracle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2979ff" />
      <stop offset="100%" style="stop-color:#00b0ff" />
    </linearGradient>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#aa00ff" />
      <stop offset="100%" style="stop-color:#e040fb" />
    </linearGradient>
    <linearGradient id="cayley" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6d00" />
      <stop offset="100%" style="stop-color:#ffab00" />
    </linearGradient>
    <linearGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold" filter="url(#glow)">
    FORCED IDEMPOTENT COLLAPSE
  </text>
  <text x="600" y="80" text-anchor="middle" fill="#aaaaff" font-size="16" font-style="italic">
    f ∘ f = f  —  The Universal Pattern of Simplification
  </text>

  <!-- Central equation -->
  <circle cx="600" cy="450" r="120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="450" r="80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <text x="600" y="440" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" filter="url(#glow)">
    f ∘ f = f
  </text>
  <text x="600" y="470" text-anchor="middle" fill="#aaaaff" font-size="14">
    Image(f) = Fix(f)
  </text>

  <!-- ═══ PILLAR 1: Tropical (Top-Left) ═══ -->
  <g transform="translate(150, 200)">
    <rect x="-120" y="-70" width="240" height="140" rx="15" fill="#0a2a0a" stroke="url(#tropical)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-40" text-anchor="middle" fill="url(#tropical)" font-size="18" font-weight="bold">🌴 TROPICAL</text>
    <text x="0" y="-15" text-anchor="middle" fill="#88ff88" font-size="12">Valuation Map</text>

    <!-- Piecewise linear sketch -->
    <polyline points="-80,40 -30,10 0,20 30,10 80,40" fill="none" stroke="#00c853" stroke-width="2.5"/>
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#333" stroke-width="1"/>

    <text x="0" y="60" text-anchor="middle" fill="#66bb6a" font-size="11">
      v(polynomial) → PL shadow
    </text>
  </g>

  <!-- Arrow: Tropical → Center -->
  <line x1="270" y1="250" x2="490" y2="400" stroke="#00c853" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- ═══ PILLAR 2: Oracle (Top-Right) ═══ -->
  <g transform="translate(1050, 200)">
    <rect x="-120" y="-70" width="240" height="140" rx="15" fill="#0a0a2a" stroke="url(#oracle)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-40" text-anchor="middle" fill="url(#oracle)" font-size="18" font-weight="bold">🔮 ORACLE</text>
    <text x="0" y="-15" text-anchor="middle" fill="#88aaff" font-size="12">Truth Function</text>

    <!-- Oracle diagram: multiple arrows converging -->
    <circle cx="0" cy="30" r="8" fill="#2979ff" opacity="0.8"/>
    <circle cx="-50" cy="10" r="5" fill="#888" opacity="0.5"/>
    <circle cx="50" cy="10" r="5" fill="#888" opacity="0.5"/>
    <circle cx="-30" cy="50" r="5" fill="#888" opacity="0.5"/>
    <circle cx="30" cy="50" r="5" fill="#888" opacity="0.5"/>
    <line x1="-45" y1="13" x2="-8" y2="27" stroke="#2979ff" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="13" x2="8" y2="27" stroke="#2979ff" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="47" x2="-5" y2="35" stroke="#2979ff" stroke-width="1" opacity="0.5"/>
    <line x1="25" y1="47" x2="5" y2="35" stroke="#2979ff" stroke-width="1" opacity="0.5"/>

    <text x="0" y="60" text-anchor="middle" fill="#64b5f6" font-size="11">
      O(O(x)) = O(x) in one step
    </text>
  </g>

  <!-- Arrow: Oracle → Center -->
  <line x1="930" y1="250" x2="710" y2="400" stroke="#2979ff" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- ═══ PILLAR 3: Holographic (Bottom-Left) ═══ -->
  <g transform="translate(150, 700)">
    <rect x="-120" y="-70" width="240" height="140" rx="15" fill="#1a0a2a" stroke="url(#holo)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-40" text-anchor="middle" fill="url(#holo)" font-size="18" font-weight="bold">🌀 HOLOGRAPHIC</text>
    <text x="0" y="-15" text-anchor="middle" fill="#dd88ff" font-size="12">RG Flow</text>

    <!-- Spiral converging -->
    <path d="M-60,20 C-40,-10 -10,-20 0,10 C10,30 30,20 40,0 C45,-10 30,-15 20,-5 C10,5 5,10 0,10"
          fill="none" stroke="#aa00ff" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="10" r="4" fill="#e040fb"/>

    <text x="0" y="60" text-anchor="middle" fill="#ce93d8" font-size="11">
      RG^∞ → conformal fixed point
    </text>
  </g>

  <!-- Arrow: Holographic → Center -->
  <line x1="270" y1="650" x2="490" y2="500" stroke="#aa00ff" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- ═══ PILLAR 4: Cayley-Dickson (Bottom-Right) ═══ -->
  <g transform="translate(1050, 700)">
    <rect x="-120" y="-70" width="240" height="140" rx="15" fill="#2a1a0a" stroke="url(#cayley)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-40" text-anchor="middle" fill="url(#cayley)" font-size="18" font-weight="bold">🔷 CAYLEY-DICKSON</text>
    <text x="0" y="-15" text-anchor="middle" fill="#ffcc88" font-size="12">Algebra Doubling</text>

    <!-- Tower: ℝ → ℂ → ℍ → 𝕆 -->
    <text x="-60" y="20" text-anchor="middle" fill="#ff6d00" font-size="14">ℝ</text>
    <text x="-20" y="20" text-anchor="middle" fill="#ff6d00" font-size="14">→</text>
    <text x="0" y="20" text-anchor="middle" fill="#ff8f00" font-size="14">ℂ</text>
    <text x="20" y="20" text-anchor="middle" fill="#ff8f00" font-size="14">→</text>
    <text x="40" y="20" text-anchor="middle" fill="#ffa000" font-size="14">ℍ</text>
    <text x="60" y="20" text-anchor="middle" fill="#ffa000" font-size="14">→</text>
    <text x="80" y="20" text-anchor="middle" fill="#ffab00" font-size="14" font-weight="bold">𝕆</text>

    <!-- Norm arrow back to ℝ -->
    <path d="M80,30 C80,55 -60,55 -60,30" fill="none" stroke="#ffab00" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="10" y="52" text-anchor="middle" fill="#ffcc80" font-size="10">‖·‖ → ℝ</text>

    <text x="0" y="60" text-anchor="middle" fill="#ffb74d" font-size="11">
      Norm collapses back to ℝ
    </text>
  </g>

  <!-- Arrow: Cayley-Dickson → Center -->
  <line x1="930" y1="650" x2="710" y2="500" stroke="#ff6d00" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- ═══ THE UNIVERSAL THEOREM BOX ═══ -->
  <g transform="translate(600, 800)">
    <rect x="-350" y="-30" width="700" height="70" rx="10" fill="#1a1a3a" stroke="#ffffff" stroke-width="2" opacity="0.9" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">
      THE UNIVERSAL COLLAPSE THEOREM
    </text>
    <text x="0" y="20" text-anchor="middle" fill="#aaaaff" font-size="13">
      ∀ S ⊆ α, S ≠ ∅  ⟹  ∃ f : α → α,  f ∘ f = f  ∧  range(f) = S  ∧  ∀ n ≥ 1, f^n = f
    </text>
  </g>

  <!-- Subtitle: Can we collapse everything? -->
  <text x="600" y="105" text-anchor="middle" fill="#ffcc00" font-size="20" font-weight="bold">
    Can we collapse everything?  YES.
  </text>

  <!-- Legend box -->
  <g transform="translate(600, 540)">
    <rect x="-180" y="-25" width="360" height="60" rx="8" fill="#0a0a2e" stroke="#444" stroke-width="1" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">
      The Collapse Spectrum
    </text>
    <text x="-160" y="20" fill="#ff4444" font-size="11">Constant (total)</text>
    <text x="-30" y="20" fill="#ffffff" font-size="11">← → →</text>
    <text x="100" y="20" fill="#44ff44" font-size="11">Identity (none)</text>
  </g>
</svg>
