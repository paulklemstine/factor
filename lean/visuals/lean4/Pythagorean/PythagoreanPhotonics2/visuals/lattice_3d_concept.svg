<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <rect width="800" height="700" fill="#0a0a2e"/>

  <text x="400" y="30" text-anchor="middle" fill="#00ccff" font-size="18" font-family="monospace" font-weight="bold">
    Photon on the Integer Lattice: The 3-4-5 Path
  </text>

  <!-- Isometric grid -->
  <!-- We'll draw a 2D lattice with a photon path following (3,4,5) -->

  <!-- Grid dots -->
  <g opacity="0.3">
    <!-- Row by row lattice dots -->
    <g fill="#334466">
      <!-- Generate a grid of dots -->
      <circle cx="100" cy="500" r="2"/><circle cx="150" cy="500" r="2"/><circle cx="200" cy="500" r="2"/>
      <circle cx="250" cy="500" r="2"/><circle cx="300" cy="500" r="2"/><circle cx="350" cy="500" r="2"/>
      <circle cx="400" cy="500" r="2"/><circle cx="450" cy="500" r="2"/><circle cx="500" cy="500" r="2"/>
      <circle cx="550" cy="500" r="2"/><circle cx="600" cy="500" r="2"/><circle cx="650" cy="500" r="2"/>
      <circle cx="700" cy="500" r="2"/>

      <circle cx="100" cy="450" r="2"/><circle cx="150" cy="450" r="2"/><circle cx="200" cy="450" r="2"/>
      <circle cx="250" cy="450" r="2"/><circle cx="300" cy="450" r="2"/><circle cx="350" cy="450" r="2"/>
      <circle cx="400" cy="450" r="2"/><circle cx="450" cy="450" r="2"/><circle cx="500" cy="450" r="2"/>
      <circle cx="550" cy="450" r="2"/><circle cx="600" cy="450" r="2"/><circle cx="650" cy="450" r="2"/>
      <circle cx="700" cy="450" r="2"/>

      <circle cx="100" cy="400" r="2"/><circle cx="150" cy="400" r="2"/><circle cx="200" cy="400" r="2"/>
      <circle cx="250" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="350" cy="400" r="2"/>
      <circle cx="400" cy="400" r="2"/><circle cx="450" cy="400" r="2"/><circle cx="500" cy="400" r="2"/>
      <circle cx="550" cy="400" r="2"/><circle cx="600" cy="400" r="2"/><circle cx="650" cy="400" r="2"/>
      <circle cx="700" cy="400" r="2"/>

      <circle cx="100" cy="350" r="2"/><circle cx="150" cy="350" r="2"/><circle cx="200" cy="350" r="2"/>
      <circle cx="250" cy="350" r="2"/><circle cx="300" cy="350" r="2"/><circle cx="350" cy="350" r="2"/>
      <circle cx="400" cy="350" r="2"/><circle cx="450" cy="350" r="2"/><circle cx="500" cy="350" r="2"/>
      <circle cx="550" cy="350" r="2"/><circle cx="600" cy="350" r="2"/><circle cx="650" cy="350" r="2"/>
      <circle cx="700" cy="350" r="2"/>

      <circle cx="100" cy="300" r="2"/><circle cx="150" cy="300" r="2"/><circle cx="200" cy="300" r="2"/>
      <circle cx="250" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="350" cy="300" r="2"/>
      <circle cx="400" cy="300" r="2"/><circle cx="450" cy="300" r="2"/><circle cx="500" cy="300" r="2"/>
      <circle cx="550" cy="300" r="2"/><circle cx="600" cy="300" r="2"/><circle cx="650" cy="300" r="2"/>
      <circle cx="700" cy="300" r="2"/>

      <circle cx="100" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="200" cy="250" r="2"/>
      <circle cx="250" cy="250" r="2"/><circle cx="300" cy="250" r="2"/><circle cx="350" cy="250" r="2"/>
      <circle cx="400" cy="250" r="2"/><circle cx="450" cy="250" r="2"/><circle cx="500" cy="250" r="2"/>
      <circle cx="550" cy="250" r="2"/><circle cx="600" cy="250" r="2"/><circle cx="650" cy="250" r="2"/>
      <circle cx="700" cy="250" r="2"/>

      <circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/>
      <circle cx="250" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="350" cy="200" r="2"/>
      <circle cx="400" cy="200" r="2"/><circle cx="450" cy="200" r="2"/><circle cx="500" cy="200" r="2"/>
      <circle cx="550" cy="200" r="2"/><circle cx="600" cy="200" r="2"/><circle cx="650" cy="200" r="2"/>
      <circle cx="700" cy="200" r="2"/>

      <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/>
      <circle cx="250" cy="150" r="2"/><circle cx="300" cy="150" r="2"/><circle cx="350" cy="150" r="2"/>
      <circle cx="400" cy="150" r="2"/><circle cx="450" cy="150" r="2"/><circle cx="500" cy="150" r="2"/>
      <circle cx="550" cy="150" r="2"/><circle cx="600" cy="150" r="2"/><circle cx="650" cy="150" r="2"/>
      <circle cx="700" cy="150" r="2"/>

      <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
      <circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="350" cy="100" r="2"/>
      <circle cx="400" cy="100" r="2"/><circle cx="450" cy="100" r="2"/><circle cx="500" cy="100" r="2"/>
      <circle cx="550" cy="100" r="2"/><circle cx="600" cy="100" r="2"/><circle cx="650" cy="100" r="2"/>
      <circle cx="700" cy="100" r="2"/>
    </g>
  </g>

  <!-- The 3-4-5 right triangle, shown on lattice -->
  <!-- Origin at (200, 500), scale = 50 per unit -->
  <!-- Path: (0,0) → (3,0) → (3,4) showing a=3, b=4, c=5 -->

  <!-- Horizontal leg (a=3) -->
  <line x1="200" y1="500" x2="350" y2="500" stroke="#ff4444" stroke-width="3"/>
  <text x="275" y="520" text-anchor="middle" fill="#ff4444" font-size="16" font-family="monospace" font-weight="bold">a = 3</text>

  <!-- Vertical leg (b=4) -->
  <line x1="350" y1="500" x2="350" y2="300" stroke="#44ff44" stroke-width="3"/>
  <text x="370" y="400" fill="#44ff44" font-size="16" font-family="monospace" font-weight="bold">b = 4</text>

  <!-- Hypotenuse (c=5) = PHOTON PATH -->
  <line x1="200" y1="500" x2="350" y2="300" stroke="#ffcc00" stroke-width="4"/>
  <text x="250" y="380" fill="#ffcc00" font-size="18" font-family="monospace" font-weight="bold">c = 5</text>
  <text x="250" y="400" fill="#ffcc00" font-size="12" font-family="monospace">PHOTON</text>

  <!-- Right angle marker -->
  <rect x="335" y="485" width="15" height="15" fill="none" stroke="white" stroke-width="1"/>

  <!-- Highlight lattice points on the path -->
  <circle cx="200" cy="500" r="6" fill="#00ccff"/>
  <text x="190" y="530" text-anchor="middle" fill="#00ccff" font-size="11" font-family="monospace">(0,0)</text>
  <circle cx="350" cy="300" r="6" fill="#00ccff"/>
  <text x="380" y="290" fill="#00ccff" font-size="11" font-family="monospace">(3,4)</text>
  <circle cx="350" cy="500" r="5" fill="#888"/>
  <text x="360" y="530" fill="#888" font-size="11" font-family="monospace">(3,0)</text>

  <!-- Second photon hop: (3,4) → (3+4, 4+3) = (7,7) via 5-12-13 child -->
  <!-- Actually let's show the Berggren branching -->
  <!-- From (3,4,5): Child A gives (5,12,13) -->
  <!-- Show this as a second leg from (3,4) with displacement (5,12) scaled down -->

  <!-- Berggren branching from the endpoint -->
  <!-- Branch A: direction towards (5,12) → angle ≈ 67° -->
  <line x1="350" y1="300" x2="475" y2="120" stroke="#ff8844" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="430" y="190" fill="#ff8844" font-size="10" font-family="monospace">Child A</text>
  <text x="430" y="205" fill="#ff8844" font-size="10" font-family="monospace">(5,12,13)</text>
  <circle cx="475" cy="120" r="4" fill="#ff8844"/>

  <!-- Branch B: direction towards (21,20) → angle ≈ 43.6° -->
  <line x1="350" y1="300" x2="560" y2="160" stroke="#44ff88" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="500" y="210" fill="#44ff88" font-size="10" font-family="monospace">Child B</text>
  <text x="500" y="225" fill="#44ff88" font-size="10" font-family="monospace">(21,20,29)</text>
  <circle cx="560" cy="160" r="4" fill="#44ff88"/>

  <!-- Branch C: direction towards (15,8) → angle ≈ 28° -->
  <line x1="350" y1="300" x2="570" y2="240" stroke="#8844ff" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="520" y="280" fill="#8844ff" font-size="10" font-family="monospace">Child C</text>
  <text x="520" y="295" fill="#8844ff" font-size="10" font-family="monospace">(15,8,17)</text>
  <circle cx="570" cy="240" r="4" fill="#8844ff"/>

  <!-- Key equation -->
  <rect x="450" y="420" width="300" height="100" rx="8" fill="#1a1a3e" stroke="#555" stroke-width="1"/>
  <text x="600" y="445" text-anchor="middle" fill="#00ccff" font-size="14" font-family="monospace" font-weight="bold">Pythagorean Constraint</text>
  <text x="600" y="470" text-anchor="middle" fill="white" font-size="16" font-family="monospace">a² + b² = c²</text>
  <text x="600" y="495" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">3² + 4² = 9 + 16 = 25 = 5²</text>
  <text x="600" y="510" text-anchor="middle" fill="#666" font-size="10" font-family="monospace">Distance is always an integer ✓</text>

  <!-- Info box -->
  <rect x="50" y="570" width="700" height="100" rx="8" fill="#0a1a0a" stroke="#00ff4488" stroke-width="1"/>
  <text x="400" y="595" text-anchor="middle" fill="#00ff88" font-size="13" font-family="monospace" font-weight="bold">
    KEY INSIGHT: Light on the lattice
  </text>
  <text x="400" y="618" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">
    • Photons travel along hypotenuses of right triangles with integer sides
  </text>
  <text x="400" y="638" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">
    • Each photon mode branches into exactly 3 children (Berggren tree)
  </text>
  <text x="400" y="658" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">
    • Speed of light = c/c = 1 in every direction (Pythagorean guarantee)
  </text>
</svg>
