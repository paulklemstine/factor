<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFD700"/>
    </marker>
  </defs>
  
  <rect width="1000" height="600" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#FFD700" font-size="24" font-family="Georgia" filter="url(#glow)">
    Pythagorean Photonics — Logical Chain
  </text>
  
  <!-- PREMISE BOX -->
  <rect x="350" y="70" width="300" height="60" rx="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <text x="500" y="95" text-anchor="middle" fill="#4ECDC4" font-size="14" font-family="monospace" font-weight="bold">PREMISE (P1)</text>
  <text x="500" y="115" text-anchor="middle" fill="#AAA" font-size="11" font-family="monospace">Light paths = Pythagorean tuples</text>
  
  <!-- Arrow P1 → D1 -->
  <line x1="500" y1="130" x2="500" y2="165" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- DEDUCTION 1 -->
  <rect x="300" y="170" width="400" height="60" rx="10" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="500" y="195" text-anchor="middle" fill="#FF6B6B" font-size="14" font-family="monospace" font-weight="bold">DEDUCTION 1 (D1)</text>
  <text x="500" y="215" text-anchor="middle" fill="#AAA" font-size="11" font-family="monospace">Distances are integer multiples of unit a</text>
  
  <!-- Arrow D1 → D2 -->
  <line x1="500" y1="230" x2="500" y2="265" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- DEDUCTION 2 -->
  <rect x="300" y="270" width="400" height="60" rx="10" fill="none" stroke="#E74C3C" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" fill="#E74C3C" font-size="14" font-family="monospace" font-weight="bold">DEDUCTION 2 (D2): QUANTIZATION</text>
  <text x="500" y="315" text-anchor="middle" fill="#AAA" font-size="11" font-family="monospace">Space is a lattice ℤ³ with spacing a</text>
  
  <!-- Arrow D2 → D3 -->
  <line x1="500" y1="330" x2="500" y2="365" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- DEDUCTION 3 -->
  <rect x="300" y="370" width="400" height="60" rx="10" fill="none" stroke="#9B59B6" stroke-width="2"/>
  <text x="500" y="395" text-anchor="middle" fill="#9B59B6" font-size="14" font-family="monospace" font-weight="bold">DEDUCTION 3 (D3): ABSOLUTE FRAME</text>
  <text x="500" y="415" text-anchor="middle" fill="#AAA" font-size="11" font-family="monospace">Lattice rest frame = preferred frame</text>
  
  <!-- CONSEQUENCE BOXES -->
  <!-- Left: Dispersion -->
  <rect x="30" y="280" width="220" height="80" rx="8" fill="rgba(78,205,196,0.1)" stroke="#4ECDC4" stroke-width="1"/>
  <text x="140" y="305" text-anchor="middle" fill="#4ECDC4" font-size="12" font-family="monospace" font-weight="bold">Modified Dispersion</text>
  <text x="140" y="325" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">E = (2ħc/a) sin(pa/2ħ)</text>
  <text x="140" y="345" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">Natural UV cutoff at E_P</text>
  <line x1="250" y1="310" x2="300" y2="300" stroke="#4ECDC4" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Right: Angular Coverage -->
  <rect x="750" y="280" width="220" height="80" rx="8" fill="rgba(255,107,107,0.1)" stroke="#FF6B6B" stroke-width="1"/>
  <text x="860" y="305" text-anchor="middle" fill="#FF6B6B" font-size="12" font-family="monospace" font-weight="bold">Angular Coverage</text>
  <text x="860" y="325" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">&gt;70% at d≤30</text>
  <text x="860" y="345" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">~100% at Planck scale</text>
  <line x1="750" y1="310" x2="700" y2="300" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Left: Lorentz Violation -->
  <rect x="30" y="390" width="220" height="80" rx="8" fill="rgba(155,89,182,0.1)" stroke="#9B59B6" stroke-width="1"/>
  <text x="140" y="415" text-anchor="middle" fill="#9B59B6" font-size="12" font-family="monospace" font-weight="bold">Lorentz Violation</text>
  <text x="140" y="435" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">Δc/c ~ (a/λ)²</text>
  <text x="140" y="455" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">~10⁻⁵⁷ for optical light</text>
  <line x1="250" y1="410" x2="300" y2="400" stroke="#9B59B6" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Right: Experimental Tests -->
  <rect x="750" y="390" width="220" height="80" rx="8" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="1"/>
  <text x="860" y="415" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="monospace" font-weight="bold">Experimental Status</text>
  <text x="860" y="435" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">Michelson-Morley: ✅</text>
  <text x="860" y="455" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">Fermi-LAT: ⚠️ marginal</text>
  <line x1="750" y1="410" x2="700" y2="400" stroke="#2ecc71" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Bottom: Connections to QG -->
  <rect x="250" y="470" width="500" height="70" rx="10" fill="rgba(255,215,0,0.05)" stroke="#FFD700" stroke-width="1"/>
  <text x="500" y="495" text-anchor="middle" fill="#FFD700" font-size="13" font-family="monospace" font-weight="bold">Connections to Quantum Gravity Programs</text>
  <text x="500" y="515" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">Causal Sets • Loop QG • Lattice Field Theory • Digital Physics</text>
  <text x="500" y="530" text-anchor="middle" fill="#666" font-size="10" font-family="monospace">All share the tension: discreteness vs Lorentz invariance</text>
  
  <!-- Formally Verified badge -->
  <rect x="350" y="555" width="300" height="30" rx="5" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1"/>
  <text x="500" y="575" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="monospace">🔒 Core theorems formally verified in Lean 4</text>
</svg>
