<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <linearGradient id="upArrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#86efac;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="downArrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fca5a5;stop-opacity:1"/>
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#00000055"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#fafaf9"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#1c1917" font-family="Georgia, serif" font-size="28" font-weight="bold">
    Tangled Hierarchy: Level Crossing
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#78716c" font-family="Georgia, serif" font-size="14" font-style="italic">
    Normal Hierarchy vs. Strange Loop
  </text>
  
  <!-- === LEFT SIDE: Normal Hierarchy === -->
  <text x="225" y="110" text-anchor="middle" fill="#44403c" font-family="Georgia, serif" font-size="18" font-weight="bold">
    Normal Hierarchy
  </text>
  
  <!-- Level boxes - normal -->
  <g filter="url(#boxShadow)">
    <rect x="100" y="140" width="250" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="225" y="165" text-anchor="middle" fill="#1e40af" font-family="monospace" font-size="13" font-weight="bold">Level 2: LAWS OF PHYSICS</text>
    <text x="225" y="183" text-anchor="middle" fill="#3b82f688" font-family="monospace" font-size="10">Rules that govern matter</text>
  </g>
  
  <g filter="url(#boxShadow)">
    <rect x="100" y="240" width="250" height="60" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="225" y="265" text-anchor="middle" fill="#4338ca" font-family="monospace" font-size="13" font-weight="bold">Level 1: CHEMISTRY</text>
    <text x="225" y="283" text-anchor="middle" fill="#6366f188" font-family="monospace" font-size="10">Emergent from physics</text>
  </g>
  
  <g filter="url(#boxShadow)">
    <rect x="100" y="340" width="250" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="225" y="365" text-anchor="middle" fill="#6d28d9" font-family="monospace" font-size="13" font-weight="bold">Level 0: PARTICLES</text>
    <text x="225" y="383" text-anchor="middle" fill="#8b5cf688" font-family="monospace" font-size="10">Fundamental matter</text>
  </g>
  
  <!-- Arrows (one-way, top-down) -->
  <line x1="225" y1="200" x2="225" y2="236" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <line x1="225" y1="300" x2="225" y2="336" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  
  <!-- "Governs" labels -->
  <text x="250" y="222" fill="#ef4444" font-family="monospace" font-size="10">governs ↓</text>
  <text x="250" y="322" fill="#ef4444" font-family="monospace" font-size="10">governs ↓</text>
  
  <!-- Check mark: clean separation -->
  <text x="225" y="440" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14">✓ Clean separation</text>
  <text x="225" y="460" text-anchor="middle" fill="#78716c" font-family="monospace" font-size="11">Levels don't mix</text>
  <text x="225" y="478" text-anchor="middle" fill="#78716c" font-family="monospace" font-size="11">Causation flows one way</text>
  
  <!-- === DIVIDER === -->
  <line x1="450" y1="100" x2="450" y2="500" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="8 4"/>
  <text x="450" y="520" text-anchor="middle" fill="#a8a29e" font-family="Georgia, serif" font-size="12">vs.</text>
  
  <!-- === RIGHT SIDE: Strange Loop (Tangled Hierarchy) === -->
  <text x="675" y="110" text-anchor="middle" fill="#44403c" font-family="Georgia, serif" font-size="18" font-weight="bold">
    Strange Loop
  </text>
  
  <!-- Level boxes - tangled -->
  <g filter="url(#boxShadow)">
    <rect x="550" y="140" width="250" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="675" y="165" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="13" font-weight="bold">Level 2: SELF-MODEL</text>
    <text x="675" y="183" text-anchor="middle" fill="#f59e0b88" font-family="monospace" font-size="10">"I" — the observer</text>
  </g>
  
  <g filter="url(#boxShadow)">
    <rect x="550" y="240" width="250" height="60" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
    <text x="675" y="265" text-anchor="middle" fill="#9a3412" font-family="monospace" font-size="13" font-weight="bold">Level 1: COGNITION</text>
    <text x="675" y="283" text-anchor="middle" fill="#f9731688" font-family="monospace" font-size="10">Processes, rules, beliefs</text>
  </g>
  
  <g filter="url(#boxShadow)">
    <rect x="550" y="340" width="250" height="60" rx="10" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="675" y="365" text-anchor="middle" fill="#991b1b" font-family="monospace" font-size="13" font-weight="bold">Level 0: NEURONS</text>
    <text x="675" y="383" text-anchor="middle" fill="#ef444488" font-family="monospace" font-size="10">Physical substrate</text>
  </g>
  
  <!-- Arrows (bidirectional - tangled!) -->
  <!-- Down arrows -->
  <line x1="660" y1="200" x2="660" y2="236" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="660" y1="300" x2="660" y2="336" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- Up arrows -->
  <line x1="690" y1="336" x2="690" y2="304" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowUp)"/>
  <line x1="690" y1="236" x2="690" y2="204" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowUp)"/>
  
  <!-- THE STRANGE CROSSING: Level 2 → Level 0 (the big loop back) -->
  <path d="M 805 170 C 840 170, 850 270, 850 370 C 850 400, 820 400, 804 370"
        fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowGold)" stroke-dasharray="6 3"/>
  <text x="862" y="280" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold" transform="rotate(90, 862, 280)">LEVEL CROSSING!</text>
  
  <!-- Level 0 → Level 2 (the upward crossing) -->
  <path d="M 545 370 C 510 370, 500 270, 500 170 C 500 150, 530 140, 546 160"
        fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowGold)" stroke-dasharray="6 3"/>
  <text x="488" y="280" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold" transform="rotate(-90, 488, 280)">LEVEL CROSSING!</text>
  
  <!-- Warning: tangled! -->
  <text x="675" y="440" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="14">⚠ Tangled hierarchy!</text>
  <text x="675" y="460" text-anchor="middle" fill="#78716c" font-family="monospace" font-size="11">Levels mix and cross</text>
  <text x="675" y="478" text-anchor="middle" fill="#78716c" font-family="monospace" font-size="11">Causation flows in loops</text>
  
  <!-- Bottom explanation -->
  <rect x="50" y="550" width="800" height="110" rx="12" fill="#fefce8" stroke="#facc15" stroke-width="1.5"/>
  <text x="450" y="580" text-anchor="middle" fill="#854d0e" font-family="Georgia, serif" font-size="15" font-weight="bold">
    The Strange Loop Insight
  </text>
  <text x="450" y="605" text-anchor="middle" fill="#713f12" font-family="Georgia, serif" font-size="13">
    In a normal hierarchy, "higher" levels emerge from "lower" levels, and causation flows downward.
  </text>
  <text x="450" y="625" text-anchor="middle" fill="#713f12" font-family="Georgia, serif" font-size="13">
    In a strange loop, the highest level (self-model) reaches back down and influences the lowest level (neurons),
  </text>
  <text x="450" y="645" text-anchor="middle" fill="#713f12" font-family="Georgia, serif" font-size="13">
    which in turn gives rise to the highest level. The hierarchy becomes a loop. THIS is consciousness.
  </text>
  
  <!-- Signature -->
  <text x="450" y="690" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="10">
    Strange Loop Research Project · 2025
  </text>
</svg>
