<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, sans-serif">
  <defs>
    <radialGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFD700" font-size="32" font-weight="bold">
    THE NINE DIRECTIONS OF IDEMPOTENT COLLAPSE
  </text>
  <text x="600" y="80" text-anchor="middle" fill="#aaa" font-size="16">
    f ∘ f = f — The Universal Pattern of Mathematical Simplification
  </text>

  <!-- Central hub -->
  <circle cx="600" cy="450" r="80" fill="url(#center_glow)" stroke="#FFD700" stroke-width="3"/>
  <text x="600" y="440" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">f ∘ f = f</text>
  <text x="600" y="465" text-anchor="middle" fill="#1a1a2e" font-size="14">Idempotent</text>
  <text x="600" y="485" text-anchor="middle" fill="#1a1a2e" font-size="14">Collapse</text>

  <!-- Direction 1: Quantum (top) -->
  <line x1="600" y1="370" x2="600" y2="180" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="160" r="55" fill="#2c1a1a" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="148" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">1. QUANTUM</text>
  <text x="600" y="165" text-anchor="middle" fill="#fff" font-size="10">P² = P</text>
  <text x="600" y="180" text-anchor="middle" fill="#aaa" font-size="9">Born Rule</text>

  <!-- Direction 2: Optimal Transport (top-right) -->
  <line x1="660" y1="395" x2="870" y2="210" stroke="#3498db" stroke-width="2" opacity="0.6"/>
  <circle cx="890" cy="195" r="55" fill="#1a1a2c" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="890" y="183" text-anchor="middle" fill="#3498db" font-size="12" font-weight="bold">2. OPTIMAL</text>
  <text x="890" y="200" text-anchor="middle" fill="#fff" font-size="10">Wasserstein</text>
  <text x="890" y="215" text-anchor="middle" fill="#aaa" font-size="9">min Σd(x,Px)</text>

  <!-- Direction 3: Computational (right) -->
  <line x1="680" y1="450" x2="920" y2="450" stroke="#2ecc71" stroke-width="2" opacity="0.6"/>
  <circle cx="940" cy="450" r="55" fill="#1a2c1a" stroke="#2ecc71" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="438" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">3. COMPUTE</text>
  <text x="940" y="455" text-anchor="middle" fill="#fff" font-size="10">sort²=sort</text>
  <text x="940" y="470" text-anchor="middle" fill="#aaa" font-size="9">Memoization</text>

  <!-- Direction 4: Topological (bottom-right) -->
  <line x1="660" y1="505" x2="870" y2="690" stroke="#9b59b6" stroke-width="2" opacity="0.6"/>
  <circle cx="890" cy="705" r="55" fill="#2c1a2c" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
  <text x="890" y="693" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">4. TOPOLOGY</text>
  <text x="890" y="710" text-anchor="middle" fill="#fff" font-size="10">Retraction</text>
  <text x="890" y="725" text-anchor="middle" fill="#aaa" font-size="9">r∘ι = id</text>

  <!-- Direction 5: Closure (bottom) -->
  <line x1="600" y1="530" x2="600" y2="720" stroke="#e67e22" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="740" r="55" fill="#2c2c1a" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="728" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">5. CLOSURE</text>
  <text x="600" y="745" text-anchor="middle" fill="#fff" font-size="10">cl(cl(S))=cl(S)</text>
  <text x="600" y="760" text-anchor="middle" fill="#aaa" font-size="9">Convex Hull</text>

  <!-- Direction 6: Fixed Point (bottom-left) -->
  <line x1="540" y1="505" x2="330" y2="690" stroke="#1abc9c" stroke-width="2" opacity="0.6"/>
  <circle cx="310" cy="705" r="55" fill="#1a2c2c" stroke="#1abc9c" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="693" text-anchor="middle" fill="#1abc9c" font-size="12" font-weight="bold">6. FIXED PT</text>
  <text x="310" y="710" text-anchor="middle" fill="#fff" font-size="10">f^∞∘f^∞=f^∞</text>
  <text x="310" y="725" text-anchor="middle" fill="#aaa" font-size="9">Banach, Kleene</text>

  <!-- Direction 7: Information (left) -->
  <line x1="520" y1="450" x2="280" y2="450" stroke="#f39c12" stroke-width="2" opacity="0.6"/>
  <circle cx="260" cy="450" r="55" fill="#2c2c1a" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="438" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">7. INFO</text>
  <text x="260" y="455" text-anchor="middle" fill="#fff" font-size="10">⌊⌊x⌋⌋ = ⌊x⌋</text>
  <text x="260" y="470" text-anchor="middle" fill="#aaa" font-size="9">Compression</text>

  <!-- Direction 8: Category (top-left) -->
  <line x1="540" y1="395" x2="330" y2="210" stroke="#e91e63" stroke-width="2" opacity="0.6"/>
  <circle cx="310" cy="195" r="55" fill="#2c1a1a" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="183" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold">8. CATEGORY</text>
  <text x="310" y="200" text-anchor="middle" fill="#fff" font-size="10">Karoubi</text>
  <text x="310" y="215" text-anchor="middle" fill="#aaa" font-size="9">e = ι∘r</text>

  <!-- Direction 9: Neural (between top and top-right) -->
  <line x1="640" y1="380" x2="760" y2="160" stroke="#00bcd4" stroke-width="2" opacity="0.6"/>
  <circle cx="770" cy="140" r="55" fill="#1a2c2c" stroke="#00bcd4" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="128" text-anchor="middle" fill="#00bcd4" font-size="12" font-weight="bold">9. NEURAL</text>
  <text x="770" y="145" text-anchor="middle" fill="#fff" font-size="10">NC₁-NC₄</text>
  <text x="770" y="160" text-anchor="middle" fill="#aaa" font-size="9">Feature → μₖ</text>

  <!-- Footer -->
  <text x="600" y="850" text-anchor="middle" fill="#666" font-size="12">
    ∀ nonempty S, ∃ idempotent f with range(f) = S — The Universal Collapse Theorem
  </text>
  <text x="600" y="875" text-anchor="middle" fill="#555" font-size="11">
    Formally verified in Lean 4 with Mathlib • All 9 directions proven sorry-free
  </text>
</svg>
