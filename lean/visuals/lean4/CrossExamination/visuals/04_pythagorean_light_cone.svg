<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="coneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fed330" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fed330" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="550" fill="url(#bg4)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">Pythagorean Triples on the Light Cone</text>
  <text x="400" y="55" text-anchor="middle" fill="#fed330" font-size="13">a² + b² − c² = 0  ⟺  Null vector in Minkowski space</text>

  <!-- Light cone (2D cross-section) -->
  <g transform="translate(250, 100)">
    <!-- Cone glow -->
    <circle cx="150" cy="200" r="180" fill="url(#coneGlow)"/>
    
    <!-- Light cone lines -->
    <line x1="150" y1="200" x2="0" y2="0" stroke="#fed330" stroke-width="2" opacity="0.6"/>
    <line x1="150" y1="200" x2="300" y2="0" stroke="#fed330" stroke-width="2" opacity="0.6"/>
    <line x1="150" y1="200" x2="0" y2="400" stroke="#fed330" stroke-width="1" opacity="0.3"/>
    <line x1="150" y1="200" x2="300" y2="400" stroke="#fed330" stroke-width="1" opacity="0.3"/>
    
    <!-- Axes -->
    <line x1="0" y1="200" x2="300" y2="200" stroke="#445566" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#445566" stroke-width="1"/>
    
    <text x="305" y="204" fill="#667788" font-size="10">spatial (a,b)</text>
    <text x="155" y="15" fill="#667788" font-size="10">time (c)</text>
    
    <!-- Interior labels -->
    <text x="150" y="100" text-anchor="middle" fill="#ff6b6b" font-size="10" opacity="0.7">TIMELIKE</text>
    <text x="150" y="115" text-anchor="middle" fill="#ff6b6b" font-size="9" opacity="0.5">a²+b² &lt; c²</text>
    
    <text x="60" y="140" text-anchor="middle" fill="#4b7bec" font-size="10" opacity="0.7">SPACELIKE</text>
    <text x="60" y="155" text-anchor="middle" fill="#4b7bec" font-size="9" opacity="0.5">a²+b² &gt; c²</text>
    
    <text x="80" y="55" text-anchor="middle" fill="#fed330" font-size="10">NULL (light)</text>
    <text x="80" y="70" text-anchor="middle" fill="#fed330" font-size="9">a²+b² = c²</text>
    
    <!-- Pythagorean triple points on the cone -->
    <!-- (3,4,5): normalize to cone display: spatial=5·sin(atan(4/3)), time=5 -->
    <!-- Scale: 1 unit = 8 pixels from origin -->
    
    <!-- (3,4,5) → spatial dist = 5, time = 5 → on cone at 45° -->
    <circle cx="190" cy="160" r="5" fill="#ff6b6b"/>
    <text x="200" y="155" fill="#ff6b6b" font-size="9">(3,4,5)</text>
    
    <!-- (5,12,13) → spatial = 13, time = 13 -->
    <circle cx="240" cy="96" r="5" fill="#26de81"/>
    <text x="250" y="92" fill="#26de81" font-size="9">(5,12,13)</text>
    
    <!-- (8,15,17) → spatial = 17, time = 17 -->
    <circle cx="260" cy="64" r="5" fill="#4b7bec"/>
    <text x="270" y="60" fill="#4b7bec" font-size="9">(8,15,17)</text>
    
    <!-- (7,24,25) → spatial = 25, time = 25 (off chart, show smaller) -->
    <circle cx="215" cy="120" r="5" fill="#a55eea"/>
    <text x="225" y="116" fill="#a55eea" font-size="9">(7,24,25)</text>
    
    <!-- Origin -->
    <circle cx="150" cy="200" r="3" fill="#fff"/>
    <text x="160" y="215" fill="#aabbcc" font-size="9">Origin</text>
  </g>

  <!-- Berggren Tree (right side) -->
  <g transform="translate(570, 100)">
    <text x="100" y="0" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Berggren Tree</text>
    <text x="100" y="18" text-anchor="middle" fill="#8899aa" font-size="9">Generating all primitive triples</text>
    
    <!-- Root -->
    <rect x="60" y="30" width="80" height="25" rx="5" fill="#ff6b6b" opacity="0.8"/>
    <text x="100" y="48" text-anchor="middle" fill="#fff" font-size="10">(3,4,5)</text>
    
    <!-- Level 1 -->
    <line x1="80" y1="55" x2="30" y2="80" stroke="#666" stroke-width="1"/>
    <line x1="100" y1="55" x2="100" y2="80" stroke="#666" stroke-width="1"/>
    <line x1="120" y1="55" x2="170" y2="80" stroke="#666" stroke-width="1"/>
    
    <rect x="-5" y="80" width="70" height="22" rx="4" fill="#26de81" opacity="0.7"/>
    <text x="30" y="95" text-anchor="middle" fill="#fff" font-size="8">(5,12,13)</text>
    
    <rect x="65" y="80" width="70" height="22" rx="4" fill="#4b7bec" opacity="0.7"/>
    <text x="100" y="95" text-anchor="middle" fill="#fff" font-size="8">(21,20,29)</text>
    
    <rect x="135" y="80" width="70" height="22" rx="4" fill="#a55eea" opacity="0.7"/>
    <text x="170" y="95" text-anchor="middle" fill="#fff" font-size="8">(15,8,17)</text>
    
    <!-- Level 2 (partial) -->
    <line x1="10" y1="102" x2="-10" y2="125" stroke="#444" stroke-width="1"/>
    <line x1="30" y1="102" x2="30" y2="125" stroke="#444" stroke-width="1"/>
    <line x1="50" y1="102" x2="70" y2="125" stroke="#444" stroke-width="1"/>
    
    <rect x="-35" y="125" width="55" height="20" rx="3" fill="#334455"/>
    <text x="-8" y="139" text-anchor="middle" fill="#aaa" font-size="7">(7,24,25)</text>
    
    <rect x="5" y="125" width="55" height="20" rx="3" fill="#334455"/>
    <text x="32" y="139" text-anchor="middle" fill="#aaa" font-size="7">(55,48,73)</text>
    
    <rect x="45" y="125" width="55" height="20" rx="3" fill="#334455"/>
    <text x="72" y="139" text-anchor="middle" fill="#aaa" font-size="7">(45,28,53)</text>
    
    <!-- More dots -->
    <text x="100" y="170" text-anchor="middle" fill="#667788" font-size="10">⋮ ⋮ ⋮</text>
    <text x="100" y="190" text-anchor="middle" fill="#667788" font-size="9">∞ triples</text>
    
    <!-- Matrix labels -->
    <text x="30" y="75" text-anchor="middle" fill="#26de81" font-size="8">B₁</text>
    <text x="100" y="75" text-anchor="middle" fill="#4b7bec" font-size="8">B₂</text>
    <text x="170" y="75" text-anchor="middle" fill="#a55eea" font-size="8">B₃</text>
  </g>

  <!-- Connection explanation -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="700" height="75" rx="8" fill="#111133" opacity="0.8"/>
    
    <text x="350" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">The Discovery: Same Quadratic Form</text>
    
    <text x="30" y="48" fill="#ff6b6b" font-size="11">Number Theory:</text>
    <text x="150" y="48" fill="#cccccc" font-size="11">Pythagorean triples satisfy a² + b² − c² = 0</text>
    
    <text x="30" y="66" fill="#fed330" font-size="11">Relativity:</text>
    <text x="150" y="66" fill="#cccccc" font-size="11">Light rays satisfy Q(x,y,t) = x² + y² − t² = 0</text>
    
    <text x="500" y="57" fill="#26de81" font-size="12" font-weight="bold">SAME EQUATION!</text>
  </g>
</svg>
