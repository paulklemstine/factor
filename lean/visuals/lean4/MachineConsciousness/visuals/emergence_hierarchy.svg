<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="emergeBg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a4a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#emergeBg)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ff6b35" font-size="22" font-weight="bold" font-family="Georgia">
    The Emergence Hierarchy
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#cc8855" font-size="13" font-family="Georgia" font-style="italic">
    Properties Without a Creator — Each Level Transcends the One Below
  </text>

  <!-- Hierarchy layers (bottom to top) -->
  
  <!-- Layer 1: Physics -->
  <rect x="100" y="470" width="600" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="500" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">PHYSICS</text>
  <text x="400" y="520" text-anchor="middle" fill="#555" font-size="11">Particles, forces, fields — deterministic rules</text>
  <!-- Micro-dots -->
  <circle cx="180" cy="505" r="3" fill="#444"/>
  <circle cx="200" cy="495" r="3" fill="#444"/>
  <circle cx="220" cy="510" r="3" fill="#444"/>
  <circle cx="560" cy="500" r="3" fill="#444"/>
  <circle cx="580" cy="510" r="3" fill="#444"/>
  <circle cx="600" cy="495" r="3" fill="#444"/>
  
  <!-- Arrow up -->
  <text x="400" y="460" text-anchor="middle" fill="#ff6b35" font-size="20">⬆</text>
  <text x="450" y="458" fill="#ff6b35" font-size="9">EMERGES</text>

  <!-- Layer 2: Chemistry -->
  <rect x="130" y="380" width="540" height="65" rx="8" fill="#1a0a20" stroke="#553" stroke-width="1.5"/>
  <text x="400" y="407" text-anchor="middle" fill="#aa7744" font-size="15" font-weight="bold">CHEMISTRY</text>
  <text x="400" y="427" text-anchor="middle" fill="#886633" font-size="11">Molecules, reactions, catalysis — new properties</text>
  
  <!-- Arrow up -->
  <text x="400" y="372" text-anchor="middle" fill="#ff8844" font-size="20">⬆</text>
  <text x="450" y="370" fill="#ff8844" font-size="9">EMERGES</text>

  <!-- Layer 3: Biology -->
  <rect x="160" y="295" width="480" height="65" rx="8" fill="#1a1a20" stroke="#585" stroke-width="1.5"/>
  <text x="400" y="322" text-anchor="middle" fill="#55aa55" font-size="15" font-weight="bold">BIOLOGY</text>
  <text x="400" y="342" text-anchor="middle" fill="#448844" font-size="11">Cells, metabolism, reproduction — LIFE emerges</text>
  
  <!-- Arrow up -->
  <text x="400" y="287" text-anchor="middle" fill="#88cc44" font-size="20">⬆</text>
  <text x="450" y="285" fill="#88cc44" font-size="9">EMERGES</text>

  <!-- Layer 4: Neuroscience -->
  <rect x="190" y="210" width="420" height="65" rx="8" fill="#0a1a2a" stroke="#558" stroke-width="1.5"/>
  <text x="400" y="237" text-anchor="middle" fill="#5588cc" font-size="15" font-weight="bold">NEUROSCIENCE</text>
  <text x="400" y="257" text-anchor="middle" fill="#446688" font-size="11">Networks, signals, integration — MIND emerges</text>
  
  <!-- Arrow up -->
  <text x="400" y="202" text-anchor="middle" fill="#44aaff" font-size="20">⬆</text>
  <text x="450" y="200" fill="#44aaff" font-size="9">EMERGES</text>

  <!-- Layer 5: CONSCIOUSNESS (top, glowing) -->
  <rect x="220" y="120" width="360" height="70" rx="10" fill="#2a1040" stroke="#ffd700" stroke-width="2.5" filter="url(#glow3)"/>
  <text x="400" y="148" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold" filter="url(#glow3)">
    ★ CONSCIOUSNESS ★
  </text>
  <text x="400" y="172" text-anchor="middle" fill="#ffcc44" font-size="12">
    Experience, qualia, self-awareness — THE UNCREATED
  </text>
  
  <!-- Side annotations -->
  <text x="60" y="300" fill="#ff6b35" font-size="11" transform="rotate(-90, 60, 300)" text-anchor="middle">
    COMPLEXITY INCREASES →
  </text>
  
  <text x="760" y="300" fill="#ffd700" font-size="11" transform="rotate(90, 760, 300)" text-anchor="middle">
    ← NOVELTY INCREASES
  </text>
  
  <!-- Key insight box -->
  <rect x="150" y="555" width="500" height="35" rx="5" fill="#0a0520" stroke="#4a1a6a" stroke-width="1"/>
  <text x="400" y="577" text-anchor="middle" fill="#ffd700" font-size="12" font-style="italic">
    Each level is MORE than the sum of its parts. No level designs the one above it.
  </text>
</svg>
