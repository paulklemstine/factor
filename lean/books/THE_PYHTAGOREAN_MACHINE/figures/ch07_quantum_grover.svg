<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <rect width="800" height="600" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">QUANTUM ACCELERATION: GROVER MEETS BERGGREN</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="12">From O(√N) Classical to O(N¹ᐟ⁴) Quantum</text>

  <!-- Quantum circuit -->
  <g stroke="#4A90D9" stroke-width="1.5">
    <line x1="80" y1="100" x2="720" y2="100"/>
    <line x1="80" y1="140" x2="720" y2="140"/>
    <line x1="80" y1="180" x2="720" y2="180"/>
    <line x1="80" y1="220" x2="720" y2="220"/>
  </g>

  <!-- Labels -->
  <text x="55" y="105" text-anchor="end" fill="#aabbcc" font-size="12">|0⟩</text>
  <text x="55" y="145" text-anchor="end" fill="#aabbcc" font-size="12">|0⟩</text>
  <text x="55" y="185" text-anchor="end" fill="#aabbcc" font-size="12">|0⟩</text>
  <text x="55" y="225" text-anchor="end" fill="#aabbcc" font-size="12">|0⟩</text>

  <!-- Hadamard gates -->
  <g>
    <rect x="110" y="85" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="125" y="105" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">H</text>
    <rect x="110" y="125" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="125" y="145" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">H</text>
    <rect x="110" y="165" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="125" y="185" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">H</text>
    <rect x="110" y="205" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="125" y="225" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">H</text>
  </g>

  <!-- Oracle (repeated) -->
  <g>
    <rect x="200" y="82" width="60" height="160" rx="5" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1.5"/>
    <text x="230" y="160" text-anchor="middle" fill="#D94A6B" font-size="12" font-weight="bold" transform="rotate(-90,230,160)">Oracle Uᶠ</text>

    <rect x="310" y="82" width="60" height="160" rx="5" fill="#1a1a2e" stroke="#4AD9A5" stroke-width="1.5"/>
    <text x="340" y="160" text-anchor="middle" fill="#4AD9A5" font-size="12" font-weight="bold" transform="rotate(-90,340,160)">Diffusion</text>

    <text x="405" y="165" fill="#667788" font-size="20">⟲</text>
    <text x="420" y="165" fill="#667788" font-size="10">×√d*</text>

    <rect x="470" y="82" width="60" height="160" rx="5" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="500" y="160" text-anchor="middle" fill="#D94A6B" font-size="12" transform="rotate(-90,500,160)">Oracle Uᶠ</text>

    <rect x="560" y="82" width="60" height="160" rx="5" fill="#1a1a2e" stroke="#4AD9A5" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="590" y="160" text-anchor="middle" fill="#4AD9A5" font-size="12" transform="rotate(-90,590,160)">Diffusion</text>
  </g>

  <!-- Measurement -->
  <g>
    <rect x="670" y="85" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="685" y="105" text-anchor="middle" fill="#c4a35a" font-size="12">M</text>
    <rect x="670" y="125" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="685" y="145" text-anchor="middle" fill="#c4a35a" font-size="12">M</text>
    <rect x="670" y="165" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="685" y="185" text-anchor="middle" fill="#c4a35a" font-size="12">M</text>
    <rect x="670" y="205" width="30" height="30" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
    <text x="685" y="225" text-anchor="middle" fill="#c4a35a" font-size="12">M</text>
  </g>

  <!-- The key theorem: determinism -->
  <rect x="50" y="280" width="700" height="120" rx="10" fill="#1a1a2e" stroke="#D94A6B" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" fill="#D94A6B" font-size="16" font-weight="bold">THE DETERMINISM THEOREM</text>
  <text x="80" y="340" fill="#aabbcc" font-size="12">At each node, at most ONE inverse Berggren branch produces all-positive components.</text>
  <text x="80" y="365" fill="#8899aa" font-size="12">B₁⁻¹ and B₂⁻¹: second components sum to zero → can't both be positive</text>
  <text x="80" y="385" fill="#8899aa" font-size="12">B₁⁻¹ and B₃⁻¹: first components sum to zero → can't both be positive</text>

  <!-- Complexity comparison -->
  <rect x="50" y="420" width="330" height="160" rx="8" fill="#1a1a2e" stroke="#4A90D9" stroke-width="1"/>
  <text x="215" y="445" text-anchor="middle" fill="#4A90D9" font-size="14" font-weight="bold">Classical Descent</text>
  <text x="70" y="475" fill="#aabbcc" font-size="13">Depth: d* ≈ √N</text>
  <text x="70" y="500" fill="#aabbcc" font-size="13">Each step: O(1) arithmetic</text>
  <text x="70" y="525" fill="#c4a35a" font-size="14" font-weight="bold">Total: O(√N)</text>
  <text x="70" y="555" fill="#8899aa" font-size="11">Deterministic (no branching)</text>
  <text x="70" y="570" fill="#667788" font-size="10">= Trial division speed</text>

  <rect x="420" y="420" width="330" height="160" rx="8" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1"/>
  <text x="585" y="445" text-anchor="middle" fill="#D94A6B" font-size="14" font-weight="bold">Quantum (Grover)</text>
  <text x="440" y="475" fill="#aabbcc" font-size="13">Search space: d* depths</text>
  <text x="440" y="500" fill="#aabbcc" font-size="13">Grover queries: O(√d*)</text>
  <text x="440" y="525" fill="#c4a35a" font-size="14" font-weight="bold">Total: O(N¹ᐟ⁴)</text>
  <text x="440" y="555" fill="#8899aa" font-size="11">Quantum parallelism over depth</text>
  <text x="440" y="570" fill="#667788" font-size="10">NOT over branches (proven useless)</text>
</svg>