<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <rect width="800" height="600" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">THE CONGRUENCE OF SQUARES</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="12">The Engine Inside Every Modern Factoring Algorithm</text>

  <!-- Central equation -->
  <rect x="150" y="80" width="500" height="80" rx="10" fill="#1a1a2e" stroke="#c4a35a" stroke-width="2.5"/>
  <text x="400" y="115" text-anchor="middle" fill="#c4a35a" font-size="22" font-weight="bold">x² ≡ y² (mod N)</text>
  <text x="400" y="145" text-anchor="middle" fill="#aabbcc" font-size="13">with x ≢ ±y (mod N)</text>

  <!-- Arrow down -->
  <path d="M 400 160 L 400 200" stroke="#c4a35a" stroke-width="2"/>
  <polygon points="395,195 405,195 400,205" fill="#c4a35a"/>

  <!-- Factorization -->
  <rect x="200" y="210" width="400" height="60" rx="8" fill="#1a1a2e" stroke="#D94A6B" stroke-width="2"/>
  <text x="400" y="235" text-anchor="middle" fill="#D94A6B" font-size="16" font-weight="bold">N | (x−y)(x+y)  but  N ∤ (x−y)</text>
  <text x="400" y="258" text-anchor="middle" fill="#aabbcc" font-size="12">⟹ 1 &lt; gcd(x−y, N) &lt; N</text>

  <!-- Methods -->
  <text x="400" y="310" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">ALGORITHMS THAT FIND x² ≡ y²:</text>

  <!-- Dixon -->
  <rect x="50" y="330" width="160" height="100" rx="5" fill="#1a1a2e" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="130" y="355" text-anchor="middle" fill="#4A90D9" font-size="13" font-weight="bold">Dixon's Method</text>
  <text x="130" y="375" text-anchor="middle" fill="#aabbcc" font-size="10">Random squares</text>
  <text x="130" y="395" text-anchor="middle" fill="#aabbcc" font-size="10">mod N</text>
  <text x="130" y="415" text-anchor="middle" fill="#667788" font-size="9">L_N[1/2, √2]</text>

  <!-- QS -->
  <rect x="230" y="330" width="160" height="100" rx="5" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1.5"/>
  <text x="310" y="355" text-anchor="middle" fill="#D94A6B" font-size="13" font-weight="bold">Quadratic Sieve</text>
  <text x="310" y="375" text-anchor="middle" fill="#aabbcc" font-size="10">Polynomial</text>
  <text x="310" y="395" text-anchor="middle" fill="#aabbcc" font-size="10">sieving</text>
  <text x="310" y="415" text-anchor="middle" fill="#667788" font-size="9">L_N[1/2, 1]</text>

  <!-- NFS -->
  <rect x="410" y="330" width="160" height="100" rx="5" fill="#1a1a2e" stroke="#4AD9A5" stroke-width="1.5"/>
  <text x="490" y="355" text-anchor="middle" fill="#4AD9A5" font-size="13" font-weight="bold">Number Field Sieve</text>
  <text x="490" y="375" text-anchor="middle" fill="#aabbcc" font-size="10">Algebraic number</text>
  <text x="490" y="395" text-anchor="middle" fill="#aabbcc" font-size="10">field sieving</text>
  <text x="490" y="415" text-anchor="middle" fill="#667788" font-size="9">L_N[1/3, (64/9)^{1/3}]</text>

  <!-- Tree Sieve -->
  <rect x="590" y="330" width="160" height="100" rx="5" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
  <text x="670" y="355" text-anchor="middle" fill="#c4a35a" font-size="13" font-weight="bold">Tree Sieve</text>
  <text x="670" y="375" text-anchor="middle" fill="#aabbcc" font-size="10">Berggren tree</text>
  <text x="670" y="395" text-anchor="middle" fill="#aabbcc" font-size="10">smooth relations</text>
  <text x="670" y="415" text-anchor="middle" fill="#667788" font-size="9">Θ(√N) for balanced</text>

  <!-- Birthday bound -->
  <rect x="100" y="460" width="600" height="120" rx="8" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
  <text x="400" y="488" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">THE BIRTHDAY BOUND (Verified in Lean)</text>
  <text x="130" y="515" fill="#aabbcc" font-size="12">With k primes in the factor base, we need k+1 smooth relations.</text>
  <text x="130" y="540" fill="#8899aa" font-size="11">The exponent vectors (mod 2) live in F₂ᵏ → k+1 vectors must be dependent.</text>
  <text x="130" y="565" fill="#4AD9A5" font-size="11">✓ relations_exceed_base_gives_dependency: proved via linear algebra over GF(2)</text>
</svg>