<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <rect width="800" height="600" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">THE COMPLEXITY LANDSCAPE</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="12">Where Does Pythagorean Tree Factoring Sit?</text>

  <!-- Axes -->
  <line x1="100" y1="500" x2="700" y2="500" stroke="#4A90D9" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="100" stroke="#4A90D9" stroke-width="2"/>
  <text x="400" y="540" text-anchor="middle" fill="#4A90D9" font-size="13">log₂(N) →</text>
  <text x="60" y="300" text-anchor="middle" fill="#4A90D9" font-size="13" transform="rotate(-90,60,300)">Operations →</text>

  <!-- Grid -->
  <g stroke="#1a2a3a" stroke-width="0.5">
    <line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="250" y1="100" x2="250" y2="500"/>
    <line x1="400" y1="100" x2="400" y2="500"/>
    <line x1="550" y1="100" x2="550" y2="500"/>
  </g>

  <!-- Trial division O(√N) = O(2^{n/2}) -->
  <path d="M 100 480 L 200 440 L 300 380 L 400 310 L 500 230 L 600 150 L 700 110" stroke="#D94A6B" stroke-width="2.5" fill="none"/>
  <text x="710" y="108" fill="#D94A6B" font-size="11" font-weight="bold">O(√N)</text>
  <text x="710" y="123" fill="#D94A6B" font-size="9">Trial division</text>

  <!-- Pythagorean Tree O(√N) (same!) -->
  <path d="M 100 478 L 200 438 L 300 378 L 400 308 L 500 228 L 600 148 L 700 108" stroke="#c4a35a" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>
  <text x="630" y="175" fill="#c4a35a" font-size="11" font-weight="bold">Θ(√N)</text>
  <text x="630" y="190" fill="#c4a35a" font-size="9">Berggren tree</text>

  <!-- Quantum O(N^{1/4}) -->
  <path d="M 100 490 L 200 470 L 300 440 L 400 400 L 500 350 L 600 290 L 700 230" stroke="#4AD9A5" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <text x="710" y="228" fill="#4AD9A5" font-size="11" font-weight="bold">O(N¹ᐟ⁴)</text>
  <text x="710" y="243" fill="#4AD9A5" font-size="9">Quantum Grover</text>

  <!-- QS/NFS sub-exponential -->
  <path d="M 100 495 L 200 490 L 300 480 L 400 465 L 500 440 L 600 400 L 700 350" stroke="#4A90D9" stroke-width="2" fill="none"/>
  <text x="710" y="348" fill="#4A90D9" font-size="11" font-weight="bold">L_N[1/3]</text>
  <text x="710" y="363" fill="#4A90D9" font-size="9">NFS (sub-exp)</text>

  <!-- Pollard rho O(N^{1/4}) -->
  <circle cx="500" cy="350" r="5" fill="#D94A6B" opacity="0.6"/>
  <text x="430" y="345" fill="#D94A6B" font-size="9" opacity="0.7">Pollard ρ ≈ N¹ᐟ⁴</text>

  <!-- Legend -->
  <rect x="130" y="120" width="250" height="160" rx="8" fill="#0d1117" stroke="#334455" stroke-width="1" opacity="0.95"/>
  <text x="255" y="145" text-anchor="middle" fill="#c4a35a" font-size="13" font-weight="bold">Balanced Semiprimes N=p·q</text>
  <text x="150" y="170" fill="#8899aa" font-size="11">p ≈ q ≈ √N</text>
  <text x="150" y="195" fill="#8899aa" font-size="11">Tree depth ≈ p ≈ √N</text>
  <text x="150" y="220" fill="#c4a35a" font-size="11">p·p ≤ N (verified ✓)</text>
  <text x="150" y="245" fill="#8899aa" font-size="11">CF length ≤ O(log N)</text>
  <text x="150" y="270" fill="#667788" font-size="10">GCD cost: O(log N) per node</text>
</svg>