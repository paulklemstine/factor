<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <text x="400" y="35" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">THE LATTICE-TREE CORRESPONDENCE</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="12">Berggren Descent ≡ Gauss's 2D Lattice Reduction</text>

  <!-- Lattice grid -->
  <g stroke="#334455" stroke-width="0.5" opacity="0.4">
    <line x1="50" y1="80" x2="50" y2="380"/><line x1="100" y1="80" x2="100" y2="380"/>
    <line x1="150" y1="80" x2="150" y2="380"/><line x1="200" y1="80" x2="200" y2="380"/>
    <line x1="250" y1="80" x2="250" y2="380"/><line x1="300" y1="80" x2="300" y2="380"/>
    <line x1="350" y1="80" x2="350" y2="380"/>
    <line x1="50" y1="80" x2="350" y2="80"/><line x1="50" y1="130" x2="350" y2="130"/>
    <line x1="50" y1="180" x2="350" y2="180"/><line x1="50" y1="230" x2="350" y2="230"/>
    <line x1="50" y1="280" x2="350" y2="280"/><line x1="50" y1="330" x2="350" y2="330"/>
    <line x1="50" y1="380" x2="350" y2="380"/>
  </g>

  <!-- Lattice points -->
  <g fill="#4A90D9" opacity="0.5">
    <circle cx="50" cy="80" r="3"/><circle cx="100" cy="80" r="3"/><circle cx="150" cy="80" r="3"/>
    <circle cx="200" cy="80" r="3"/><circle cx="250" cy="80" r="3"/><circle cx="300" cy="80" r="3"/>
    <circle cx="350" cy="80" r="3"/>
    <circle cx="50" cy="130" r="3"/><circle cx="100" cy="130" r="3"/><circle cx="150" cy="130" r="3"/>
    <circle cx="200" cy="130" r="3"/><circle cx="250" cy="130" r="3"/><circle cx="300" cy="130" r="3"/>
    <circle cx="350" cy="130" r="3"/>
    <circle cx="50" cy="180" r="3"/><circle cx="100" cy="180" r="3"/><circle cx="150" cy="180" r="3"/>
    <circle cx="200" cy="180" r="3"/><circle cx="250" cy="180" r="3"/><circle cx="300" cy="180" r="3"/>
    <circle cx="350" cy="180" r="3"/>
    <circle cx="50" cy="230" r="3"/><circle cx="100" cy="230" r="3"/><circle cx="150" cy="230" r="3"/>
    <circle cx="200" cy="230" r="3"/><circle cx="250" cy="230" r="3"/><circle cx="300" cy="230" r="3"/>
    <circle cx="350" cy="230" r="3"/>
    <circle cx="50" cy="280" r="3"/><circle cx="100" cy="280" r="3"/><circle cx="150" cy="280" r="3"/>
    <circle cx="200" cy="280" r="3"/><circle cx="250" cy="280" r="3"/><circle cx="300" cy="280" r="3"/>
    <circle cx="350" cy="280" r="3"/>
  </g>

  <!-- Reduction path -->
  <g stroke="#c4a35a" stroke-width="2.5" fill="none" marker-end="url(#arrowGold)">
    <path d="M 300 130 L 250 180 L 200 180 L 150 230 L 100 230" stroke-dasharray="8,4"/>
  </g>
  <circle cx="300" cy="130" r="6" fill="#c4a35a"/>
  <circle cx="100" cy="230" r="8" fill="#c4a35a" stroke="#fff" stroke-width="1"/>
  <text x="310" y="120" fill="#c4a35a" font-size="11">start: (m, n)</text>
  <text x="55" y="220" fill="#c4a35a" font-size="11">shortest vector</text>

  <!-- Right panel: Euclidean algorithm -->
  <rect x="420" y="80" width="350" height="300" rx="10" fill="#0d1117" stroke="#4A90D9" stroke-width="1"/>
  <text x="595" y="110" text-anchor="middle" fill="#4A90D9" font-size="16" font-weight="bold">The Euclidean Algorithm</text>
  <text x="595" y="130" text-anchor="middle" fill="#667788" font-size="11">as Matrix Factorization</text>

  <text x="440" y="160" fill="#aabbcc" font-size="13" font-family="monospace">m = q₁·n + r₁</text>
  <text x="440" y="185" fill="#aabbcc" font-size="13" font-family="monospace">n = q₂·r₁ + r₂</text>
  <text x="440" y="210" fill="#aabbcc" font-size="13" font-family="monospace">r₁ = q₃·r₂ + r₃</text>
  <text x="440" y="235" fill="#667788" font-size="13" font-family="monospace">  ⋮</text>
  <text x="440" y="260" fill="#aabbcc" font-size="13" font-family="monospace">rₖ = gcd(m, n)</text>

  <line x1="440" y1="275" x2="750" y2="275" stroke="#334455"/>
  <text x="440" y="300" fill="#c4a35a" font-size="12">M₃⁻¹: (m, n) ↦ (m − 2n, n)</text>
  <text x="440" y="320" fill="#c4a35a" font-size="12">M₁⁻¹: (m, n) ↦ (n, 2n − m)</text>
  <text x="440" y="345" fill="#8899aa" font-size="11" font-style="italic">≡ continued fraction steps</text>
  <text x="440" y="365" fill="#8899aa" font-size="11" font-style="italic">with quotient q = 2</text>

  <!-- Bottom: The theorem -->
  <rect x="50" y="420" width="700" height="150" rx="10" fill="#0d1117" stroke="#c4a35a" stroke-width="1.5"/>
  <text x="400" y="450" text-anchor="middle" fill="#c4a35a" font-size="16" font-weight="bold">LATTICE-TREE CORRESPONDENCE THEOREM</text>
  <text x="80" y="480" fill="#aabbcc" font-size="13">Inverse Berggren tree traversal computes exactly the same sequence of</text>
  <text x="80" y="500" fill="#aabbcc" font-size="13">quotients as the Euclidean algorithm on the Euclid parameters (m, n).</text>
  <text x="80" y="530" fill="#D94A6B" font-size="14" font-weight="bold">CONSEQUENCE:</text>
  <text x="250" y="530" fill="#aabbcc" font-size="13">Pythagorean tree factoring is Θ(√N) for balanced semiprimes.</text>
  <text x="80" y="555" fill="#4AD9A5" font-size="14" font-weight="bold">ESCAPE ROUTE:</text>
  <text x="265" y="555" fill="#aabbcc" font-size="13">Higher-dimensional lattices (d ≥ 3) via LLL algorithm.</text>
</svg>