<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <rect width="800" height="600" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">THE SHARED FACTOR BRIDGE</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="12">Pythagorean Quadruples: a² + b² + c² = d²</text>

  <!-- 3D coordinate axes -->
  <line x1="200" y1="400" x2="80" y2="480" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="200" y1="400" x2="370" y2="400" stroke="#D94A6B" stroke-width="1.5"/>
  <line x1="200" y1="400" x2="200" y2="200" stroke="#4AD9A5" stroke-width="1.5"/>
  <text x="70" y="495" fill="#4A90D9" font-size="12">a</text>
  <text x="380" y="400" fill="#D94A6B" font-size="12">b</text>
  <text x="195" y="190" fill="#4AD9A5" font-size="12">c</text>

  <!-- Sphere (null cone cross-section) -->
  <ellipse cx="240" cy="340" rx="100" ry="80" fill="none" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <text x="350" y="310" fill="#c4a35a" font-size="10">a²+b²+c²=d²</text>
  <text x="350" y="325" fill="#667788" font-size="9">(sphere of radius d)</text>

  <!-- Integer points on sphere -->
  <circle cx="230" cy="280" r="4" fill="#c4a35a"/>
  <text x="240" y="275" fill="#c4a35a" font-size="9">(1,2,2,3)</text>
  <circle cx="280" cy="310" r="4" fill="#4A90D9"/>
  <text x="290" y="305" fill="#4A90D9" font-size="9">(2,3,6,7)</text>
  <circle cx="190" cy="330" r="4" fill="#D94A6B"/>
  <text x="120" y="325" fill="#D94A6B" font-size="9">(1,4,8,9)</text>
  <circle cx="260" cy="370" r="4" fill="#4AD9A5"/>
  <text x="270" y="385" fill="#4AD9A5" font-size="9">(4,4,7,9)</text>

  <!-- Right panel: The Bridge -->
  <rect x="430" y="80" width="340" height="200" rx="8" fill="#1a1a2e" stroke="#c4a35a" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" fill="#c4a35a" font-size="15" font-weight="bold">Difference-of-Squares Bridge</text>

  <text x="450" y="140" fill="#aabbcc" font-size="13">(d − c)(d + c) = a² + b²</text>
  <text x="450" y="170" fill="#8899aa" font-size="11">Example: (2,3,6,7)</text>
  <text x="470" y="190" fill="#c4a35a" font-size="11">(7−6)(7+6) = 1·13 = 4+9 ✓</text>
  <text x="450" y="220" fill="#8899aa" font-size="11">Parametrization: d = (m²+n²)+(p²+q²)</text>
  <text x="450" y="245" fill="#8899aa" font-size="11">Reveals multiplicative structure</text>
  <text x="450" y="270" fill="#4AD9A5" font-size="10">✓ param_produces_quadruple verified</text>

  <!-- Collision theorem -->
  <rect x="430" y="300" width="340" height="140" rx="8" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1.5"/>
  <text x="600" y="325" text-anchor="middle" fill="#D94A6B" font-size="14" font-weight="bold">Sum-of-Squares Collision</text>
  <text x="450" y="355" fill="#aabbcc" font-size="11">Two quadruples with same d:</text>
  <text x="450" y="380" fill="#8899aa" font-size="11">(a₁,b₁,c₁,d) and (a₂,b₂,c₂,d)</text>
  <text x="450" y="405" fill="#c4a35a" font-size="11">c₁²−c₂² = (a₂²−a₁²)+(b₂²−b₁²)</text>
  <text x="450" y="430" fill="#4AD9A5" font-size="10">✓ collision_factor_extraction verified</text>

  <!-- GCD / Divisibility -->
  <rect x="430" y="460" width="340" height="120" rx="8" fill="#1a1a2e" stroke="#4AD9A5" stroke-width="1.5"/>
  <text x="600" y="485" text-anchor="middle" fill="#4AD9A5" font-size="14" font-weight="bold">Prime Divisor Dichotomy</text>
  <text x="450" y="515" fill="#aabbcc" font-size="11">If prime p | a²+b² = (d−c)(d+c)</text>
  <text x="450" y="535" fill="#c4a35a" font-size="11">then p | (d−c) or p | (d+c)</text>
  <text x="450" y="555" fill="#8899aa" font-size="10">Euclid's lemma applied to the</text>
  <text x="450" y="570" fill="#8899aa" font-size="10">factoring identity from quadruples</text>
</svg>