<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <defs>
    <radialGradient id="hyp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="#0d1117"/>
  <text x="400" y="30" text-anchor="middle" fill="#c4a35a" font-size="18" font-weight="bold">TILING THE HYPERBOLIC PLANE</text>
  <text x="400" y="50" text-anchor="middle" fill="#8899aa" font-size="12">The Berggren Tree as Integer Lorentz Group Orbits</text>

  <!-- Hyperbolic disk -->
  <circle cx="300" cy="320" r="230" fill="url(#hyp)" stroke="#c4a35a" stroke-width="2"/>

  <!-- Tiles (hyperbolic triangles) approximated -->
  <g stroke="#4A90D9" stroke-width="0.8" fill="none" opacity="0.3">
    <path d="M 300 100 L 200 200 L 400 200 Z"/>
    <path d="M 200 200 L 120 300 L 300 300 Z"/>
    <path d="M 400 200 L 300 300 L 480 300 Z"/>
    <path d="M 300 300 L 200 400 L 400 400 Z"/>
    <path d="M 120 300 L 80 400 L 200 400 Z"/>
    <path d="M 480 300 L 400 400 L 520 400 Z"/>
    <path d="M 200 400 L 160 470 L 300 470 Z"/>
    <path d="M 400 400 L 300 470 L 440 470 Z"/>
  </g>
  <g stroke="#D94A6B" stroke-width="0.5" fill="none" opacity="0.2">
    <path d="M 80 400 L 70 450 L 160 470 Z"/>
    <path d="M 520 400 L 440 470 L 520 470 Z"/>
    <path d="M 160 470 L 140 510 L 220 510 Z"/>
    <path d="M 300 470 L 220 510 L 340 510 Z"/>
    <path d="M 440 470 L 340 510 L 460 510 Z"/>
  </g>

  <!-- Central point (root) -->
  <circle cx="300" cy="280" r="6" fill="#c4a35a"/>
  <text x="310" y="275" fill="#c4a35a" font-size="11" font-weight="bold">(3,4,5)</text>

  <!-- Right panel -->
  <rect x="560" y="70" width="220" height="250" rx="8" fill="#1a1a2e" stroke="#c4a35a" stroke-width="1.5"/>
  <text x="670" y="95" text-anchor="middle" fill="#c4a35a" font-size="14" font-weight="bold">Lorentz Preservation</text>

  <text x="580" y="125" fill="#aabbcc" font-size="11">Q(a,b,c) = a²+b²−c²</text>
  <text x="580" y="150" fill="#aabbcc" font-size="11">Null cone: Q = 0</text>

  <text x="580" y="180" fill="#4A90D9" font-size="11">B_A preserves Q ✓</text>
  <text x="580" y="200" fill="#D94A6B" font-size="11">B_B preserves Q ✓</text>
  <text x="580" y="220" fill="#4AD9A5" font-size="11">B_C preserves Q ✓</text>

  <text x="580" y="250" fill="#c4a35a" font-size="11">All three simultaneously:</text>
  <text x="580" y="270" fill="#8899aa" font-size="10">berggren_all_preserve_lorentz</text>
  <text x="580" y="290" fill="#4AD9A5" font-size="10">✓ Machine-verified</text>

  <!-- Depth-factor -->
  <rect x="560" y="340" width="220" height="130" rx="8" fill="#1a1a2e" stroke="#D94A6B" stroke-width="1.5"/>
  <text x="670" y="365" text-anchor="middle" fill="#D94A6B" font-size="13" font-weight="bold">Depth-Factor Theorem</text>
  <text x="580" y="395" fill="#aabbcc" font-size="11">For prime p ≥ 5:</text>
  <text x="580" y="415" fill="#c4a35a" font-size="12">depth = (p−3)/2</text>
  <text x="580" y="440" fill="#8899aa" font-size="10">Pure A-branch descent</text>
  <text x="580" y="460" fill="#4AD9A5" font-size="10">✓ Verified via omega</text>

  <!-- Semiprime counting -->
  <rect x="560" y="490" width="220" height="90" rx="8" fill="#1a1a2e" stroke="#4AD9A5" stroke-width="1.5"/>
  <text x="670" y="515" text-anchor="middle" fill="#4AD9A5" font-size="13" font-weight="bold">Semiprime Triples</text>
  <text x="580" y="540" fill="#aabbcc" font-size="11">N = p·q (distinct odd primes)</text>
  <text x="580" y="560" fill="#c4a35a" font-size="12">Exactly 4 triples</text>
  <text x="580" y="575" fill="#667788" font-size="9">(9−1)/2 = 4 from σ₀(N²)</text>
</svg>