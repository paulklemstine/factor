<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    The Search-Evasion Game
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#88aacc" font-size="12">
    Pigeonhole Bound: Evader survives n−1 steps in a space of size n
  </text>

  <!-- Grid of locations (5x2 grid for n=10) -->
  <g transform="translate(100, 90)">
    <!-- Grid cells -->
    <g>
      <!-- Row 1 -->
      <rect x="0" y="0" width="55" height="55" rx="8" fill="#1e3a5f" stroke="#3a6a9f" stroke-width="1.5"/>
      <text x="27" y="35" text-anchor="middle" fill="#6699cc" font-size="14">0</text>

      <rect x="65" y="0" width="55" height="55" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
      <text x="92" y="35" text-anchor="middle" fill="#ff6666" font-size="14">1</text>
      <text x="92" y="15" text-anchor="middle" fill="#ff4444" font-size="10">🔍 t=0</text>

      <rect x="130" y="0" width="55" height="55" rx="8" fill="#1e3a5f" stroke="#3a6a9f" stroke-width="1.5"/>
      <text x="157" y="35" text-anchor="middle" fill="#6699cc" font-size="14">2</text>

      <rect x="195" y="0" width="55" height="55" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
      <text x="222" y="35" text-anchor="middle" fill="#ff6666" font-size="14">3</text>
      <text x="222" y="15" text-anchor="middle" fill="#ff4444" font-size="10">🔍 t=2</text>

      <rect x="260" y="0" width="55" height="55" rx="8" fill="#1e3a5f" stroke="#3a6a9f" stroke-width="1.5"/>
      <text x="287" y="35" text-anchor="middle" fill="#6699cc" font-size="14">4</text>

      <!-- Row 2 -->
      <rect x="0" y="65" width="55" height="55" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
      <text x="27" y="100" text-anchor="middle" fill="#ff6666" font-size="14">5</text>
      <text x="27" y="80" text-anchor="middle" fill="#ff4444" font-size="10">🔍 t=4</text>

      <rect x="65" y="65" width="55" height="55" rx="8" fill="#1e3a5f" stroke="#3a6a9f" stroke-width="1.5"/>
      <text x="92" y="100" text-anchor="middle" fill="#6699cc" font-size="14">6</text>

      <rect x="130" y="65" width="55" height="55" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
      <text x="157" y="100" text-anchor="middle" fill="#ff6666" font-size="14">7</text>
      <text x="157" y="80" text-anchor="middle" fill="#ff4444" font-size="10">🔍 t=6</text>

      <rect x="195" y="65" width="55" height="55" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
      <text x="222" y="100" text-anchor="middle" fill="#ff6666" font-size="14">8</text>
      <text x="222" y="80" text-anchor="middle" fill="#ff4444" font-size="10">🔍 t=7</text>

      <!-- THE SAFE SPOT -->
      <rect x="260" y="65" width="55" height="55" rx="8" fill="#1a3a1a" stroke="#44cc44" stroke-width="3" filter="url(#glow)"/>
      <text x="287" y="95" text-anchor="middle" fill="#44ff44" font-size="14" font-weight="bold">9</text>
      <text x="287" y="82" text-anchor="middle" fill="#44ff44" font-size="10">🎯 SAFE</text>
    </g>

    <!-- Legend -->
    <g transform="translate(350, 0)">
      <rect x="0" y="0" width="220" height="120" rx="10" fill="#0d1f35" stroke="#3a6a9f" stroke-width="1"/>
      <text x="110" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">n = 10 locations</text>

      <rect x="15" y="30" width="15" height="15" rx="3" fill="#2a1a1a" stroke="#cc4444"/>
      <text x="40" y="42" fill="#ff8888" font-size="11">Searched (8 of 10)</text>

      <rect x="15" y="52" width="15" height="15" rx="3" fill="#1a3a1a" stroke="#44cc44"/>
      <text x="40" y="64" fill="#88ff88" font-size="11">Unsearched (evader hides)</text>

      <rect x="15" y="74" width="15" height="15" rx="3" fill="#1e3a5f" stroke="#3a6a9f"/>
      <text x="40" y="86" fill="#88aacc" font-size="11">Not yet searched</text>

      <text x="15" y="108" fill="#cccccc" font-size="10">After 8 steps: 2 safe spots remain</text>
    </g>
  </g>

  <!-- Information Conservation -->
  <g transform="translate(50, 260)">
    <text x="350" y="0" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">
      Search-Information Conservation Law
    </text>

    <!-- Bar chart showing conservation -->
    <g transform="translate(50, 20)">
      <!-- Total bar -->
      <rect x="0" y="0" width="600" height="30" rx="5" fill="#1e3a5f" stroke="#3a6a9f"/>
      <text x="300" y="20" text-anchor="middle" fill="#ffffff" font-size="12">
        Total Information = log(n) = log(10) ≈ 2.303
      </text>

      <!-- After k=3 observations -->
      <rect x="0" y="45" width="198" height="30" rx="5" fill="#cc4444" opacity="0.8"/>
      <text x="99" y="65" text-anchor="middle" fill="#ffffff" font-size="11">I_search = 0.357</text>
      <rect x="198" y="45" width="402" height="30" rx="5" fill="#44cc44" opacity="0.8"/>
      <text x="399" y="65" text-anchor="middle" fill="#ffffff" font-size="11">I_evasion = 1.946</text>
      <text x="650" y="65" fill="#aaaaaa" font-size="11">k=3</text>

      <!-- After k=7 observations -->
      <rect x="0" y="85" width="454" height="30" rx="5" fill="#cc4444" opacity="0.8"/>
      <text x="227" y="105" text-anchor="middle" fill="#ffffff" font-size="11">I_search = 1.204</text>
      <rect x="454" y="85" width="146" height="30" rx="5" fill="#44cc44" opacity="0.8"/>
      <text x="527" y="105" text-anchor="middle" fill="#ffffff" font-size="11">I_ev = 1.099</text>
      <text x="650" y="105" fill="#aaaaaa" font-size="11">k=7</text>

      <!-- After k=9 observations -->
      <rect x="0" y="125" width="570" height="30" rx="5" fill="#cc4444" opacity="0.8"/>
      <text x="285" y="145" text-anchor="middle" fill="#ffffff" font-size="11">I_search = 2.303</text>
      <rect x="570" y="125" width="30" height="30" rx="5" fill="#44cc44" opacity="0.8"/>
      <text x="650" y="145" fill="#aaaaaa" font-size="11">k=9</text>
    </g>
  </g>

  <!-- Formula -->
  <text x="400" y="470" text-anchor="middle" fill="#ffcc44" font-size="14" font-weight="bold">
    I_search(n,k) + I_evasion(n,k) = log(n)     ∀ n, k
  </text>
  <text x="400" y="490" text-anchor="middle" fill="#888888" font-size="11">
    Machine-verified in Lean 4 (Theorem search_info_conservation)
  </text>
</svg>
