<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a40;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="repulsorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="attractorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4444ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4444ff;stop-opacity:0" />
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff8866"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6688ff"/>
    </marker>
  </defs>

  <rect width="800" height="550" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    Attractor–Repulsor Duality
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#88aacc" font-size="12">
    Time reversal transforms repulsors ↔ attractors
  </text>

  <!-- LEFT: Repulsor -->
  <g transform="translate(200, 280)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="80" fill="url(#repulsorGlow)"/>

    <!-- Repulsor point -->
    <circle cx="0" cy="0" r="8" fill="#ff4444" stroke="#ff8888" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" fill="#ff6666" font-size="12" font-weight="bold">REPULSOR</text>
    <text x="0" y="30" text-anchor="middle" fill="#ff8888" font-size="10">f(x) = 2x</text>

    <!-- Outward arrows -->
    <line x1="15" y1="0" x2="90" y2="0" stroke="#ff8866" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="-15" y1="0" x2="-90" y2="0" stroke="#ff8866" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="10" y1="-10" x2="63" y2="-63" stroke="#ff8866" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="-10" y1="-10" x2="-63" y2="-63" stroke="#ff8866" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="10" y1="10" x2="63" y2="63" stroke="#ff8866" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="-10" y1="10" x2="-63" y2="63" stroke="#ff8866" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="0" y1="15" x2="0" y2="90" stroke="#ff8866" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="-15" x2="0" y2="-90" stroke="#ff8866" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Orbits escaping -->
    <circle cx="30" cy="0" r="3" fill="#ffaa66"/>
    <circle cx="60" cy="0" r="3" fill="#ffaa66" opacity="0.7"/>
    <circle cx="-25" cy="25" r="3" fill="#ffaa66"/>
    <circle cx="-50" cy="50" r="3" fill="#ffaa66" opacity="0.7"/>

    <text x="0" y="115" text-anchor="middle" fill="#ff8888" font-size="11">
      Orbits ESCAPE from R
    </text>
    <text x="0" y="130" text-anchor="middle" fill="#cc6666" font-size="10">
      ∀ x ∈ U\R, ∃ n: f^n(x) ∉ U
    </text>
  </g>

  <!-- CENTER: Duality arrow -->
  <g transform="translate(400, 250)">
    <line x1="-30" y1="-15" x2="30" y2="-15" stroke="#ffcc44" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="30" y1="15" x2="-30" y2="15" stroke="#ffcc44" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="-25" text-anchor="middle" fill="#ffcc44" font-size="11">time</text>
    <text x="0" y="35" text-anchor="middle" fill="#ffcc44" font-size="11">reversal</text>
    <polygon points="35,-15 45,-15 40,-10" fill="#ffcc44"/>
    <polygon points="-35,15 -45,15 -40,20" fill="#ffcc44"/>
  </g>

  <!-- RIGHT: Attractor -->
  <g transform="translate(600, 280)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="80" fill="url(#attractorGlow)"/>

    <!-- Attractor point -->
    <circle cx="0" cy="0" r="8" fill="#4444ff" stroke="#8888ff" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" fill="#6688ff" font-size="12" font-weight="bold">ATTRACTOR</text>
    <text x="0" y="30" text-anchor="middle" fill="#8888ff" font-size="10">f⁻¹(x) = x/2</text>

    <!-- Inward arrows -->
    <line x1="90" y1="0" x2="15" y2="0" stroke="#6688ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="-90" y1="0" x2="-15" y2="0" stroke="#6688ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="63" y1="-63" x2="10" y2="-10" stroke="#6688ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="-63" y1="-63" x2="-10" y2="-10" stroke="#6688ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="63" y1="63" x2="10" y2="10" stroke="#6688ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="-63" y1="63" x2="-10" y2="10" stroke="#6688ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="0" y1="90" x2="0" y2="15" stroke="#6688ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="0" y1="-90" x2="0" y2="-15" stroke="#6688ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- Orbits converging -->
    <circle cx="60" cy="0" r="3" fill="#88aaff" opacity="0.5"/>
    <circle cx="30" cy="0" r="3" fill="#88aaff" opacity="0.7"/>
    <circle cx="-50" cy="50" r="3" fill="#88aaff" opacity="0.5"/>
    <circle cx="-25" cy="25" r="3" fill="#88aaff" opacity="0.7"/>

    <text x="0" y="115" text-anchor="middle" fill="#8888ff" font-size="11">
      Orbits CONVERGE to A
    </text>
    <text x="0" y="130" text-anchor="middle" fill="#6666cc" font-size="10">
      ∀ x ∈ U, inf_dist(f^n(x), A) → 0
    </text>
  </g>

  <!-- Bottom theorem box -->
  <rect x="100" y="440" width="600" height="80" rx="10" fill="#0d1f35" stroke="#ffcc44" stroke-width="1.5"/>
  <text x="400" y="465" text-anchor="middle" fill="#ffcc44" font-size="14" font-weight="bold">
    Theorem (Attractor-Repulsor Duality)
  </text>
  <text x="400" y="485" text-anchor="middle" fill="#ffffff" font-size="12">
    R is a repulsor of f  ⟺  R is an attractor of f⁻¹
  </text>
  <text x="400" y="505" text-anchor="middle" fill="#888888" font-size="10">
    Machine-verified in Lean 4 (repulsor_reverse_attractor)
  </text>
</svg>
