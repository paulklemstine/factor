<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgCL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bgCL)"/>

  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="#2d3436" text-anchor="middle">Crystallization Energy Landscape</text>
  <text x="400" y="55" font-family="Arial, sans-serif" font-size="12" fill="#636e72"
        text-anchor="middle">sin²(πw) penalty drives weights to integer values</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#2d3436" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="80" stroke="#2d3436" stroke-width="2"/>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2d3436"
        text-anchor="middle">Weight value w</text>
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="14" fill="#2d3436"
        text-anchor="middle" transform="rotate(-90, 40, 200)">sin²(πw)</text>

  <!-- sin²(πw) curve -->
  <path d="M 80,320 C 100,320 120,100 160,100 C 200,100 220,320 240,320 C 260,320 280,100 320,100 C 360,100 380,320 400,320 C 420,320 440,100 480,100 C 520,100 540,320 560,320 C 580,320 600,100 640,100 C 680,100 700,320 720,320"
        fill="none" stroke="#e17055" stroke-width="3"/>

  <!-- Integer markers (minima) -->
  <circle cx="80" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="80" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">-3</text>

  <circle cx="160" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="160" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">-2</text>

  <circle cx="240" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="240" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">-1</text>

  <circle cx="320" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="320" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">0</text>

  <circle cx="400" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="400" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">1</text>

  <circle cx="480" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="480" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">2</text>

  <circle cx="560" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="560" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">3</text>

  <circle cx="640" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="640" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">4</text>

  <circle cx="720" cy="320" r="8" fill="#00b894" stroke="#2d3436" stroke-width="2"/>
  <text x="720" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle">5</text>

  <!-- Half-integer markers (maxima) -->
  <circle cx="120" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="200" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="280" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="360" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="440" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="520" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="600" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>
  <circle cx="680" cy="100" r="5" fill="#e17055" stroke="#2d3436" stroke-width="1"/>

  <!-- Annotations -->
  <rect x="520" y="70" width="250" height="80" rx="6" fill="rgba(255,255,255,0.85)"
        stroke="#636e72" stroke-width="1"/>
  <text x="645" y="92" font-family="Arial, sans-serif" font-size="12" fill="#2d3436"
        text-anchor="middle" font-weight="bold">Verified Properties</text>
  <text x="645" y="112" font-family="monospace" font-size="10" fill="#00b894"
        text-anchor="middle">sin²(πn) = 0 at integers ✓</text>
  <text x="645" y="128" font-family="monospace" font-size="10" fill="#e17055"
        text-anchor="middle">sin²(πw) ≤ 1 always ✓</text>
  <text x="645" y="144" font-family="monospace" font-size="10" fill="#0984e3"
        text-anchor="middle">gradient = 0 at integers ✓</text>

  <!-- Error bound annotation -->
  <line x1="400" y1="320" x2="440" y2="270" stroke="#0984e3" stroke-width="1.5"
        stroke-dasharray="3,3"/>
  <rect x="430" y="250" width="120" height="30" rx="4" fill="rgba(255,255,255,0.9)"/>
  <text x="490" y="270" font-family="monospace" font-size="10" fill="#0984e3"
        text-anchor="middle">|w-round(w)| ≤ ½</text>

  <text x="400" y="390" font-family="Arial, sans-serif" font-size="11" fill="#636e72"
        text-anchor="middle">Green circles = stable equilibria (integers) · Red circles = unstable (half-integers)</text>
</svg>
