<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgH)"/>

  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
        fill="#2d3436" text-anchor="middle">Quantum Compilation Hierarchy</text>
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="13" fill="#636e72"
        text-anchor="middle">ℤ ⊂ ℤ[i] ⊂ Hurwitz ⊂ SU(2)</text>

  <!-- Level 0: ℤ -->
  <rect x="50" y="90" width="700" height="80" rx="10" fill="#dfe6e9" stroke="#b2bec3" stroke-width="2"/>
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="18" fill="#2d3436" font-weight="bold">ℤ</text>
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="12" fill="#636e72">Classical integer weights</text>
  <text x="400" y="118" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">
    w ∈ {..., -2, -1, 0, 1, 2, ...}
  </text>
  <text x="400" y="138" font-family="Arial, sans-serif" font-size="11" fill="#636e72" text-anchor="middle">
    Closed under +, × (int_weight_add, int_weight_mul)
  </text>
  <text x="400" y="158" font-family="Arial, sans-serif" font-size="11" fill="#636e72" text-anchor="middle">
    Error ≤ 1/2 per weight (crystal_error_bound)
  </text>

  <!-- Level 1: ℤ[i] -->
  <rect x="50" y="185" width="700" height="80" rx="10" fill="#b2bec3" stroke="#636e72" stroke-width="2"/>
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="18" fill="#2d3436" font-weight="bold">ℤ[i]</text>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">Gaussian integers</text>
  <text x="400" y="213" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">
    z = a + bi, a,b ∈ ℤ
  </text>
  <text x="400" y="233" font-family="Arial, sans-serif" font-size="11" fill="#2d3436" text-anchor="middle">
    N(z₁z₂) = N(z₁)N(z₂) (gaussNormC_mul / Brahmagupta-Fibonacci)
  </text>
  <text x="400" y="253" font-family="Arial, sans-serif" font-size="11" fill="#2d3436" text-anchor="middle">
    Clifford gates: X, Y, Z, S ∈ M₂(ℤ[i])
  </text>

  <!-- Level 2: Hurwitz -->
  <rect x="50" y="280" width="700" height="80" rx="10" fill="#636e72" stroke="#2d3436" stroke-width="2"/>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">Hurwitz</text>
  <text x="100" y="330" font-family="Arial, sans-serif" font-size="12" fill="#dfe6e9">Integer quaternions</text>
  <text x="400" y="308" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">
    q = a + bi + cj + dk, a,b,c,d ∈ ℤ
  </text>
  <text x="400" y="328" font-family="Arial, sans-serif" font-size="11" fill="#dfe6e9" text-anchor="middle">
    Euler four-square: N(q₁q₂) = N(q₁)N(q₂) (euler_four_square)
  </text>
  <text x="400" y="348" font-family="Arial, sans-serif" font-size="11" fill="#dfe6e9" text-anchor="middle">
    Unit quats closed under × (unit_quat_closed)
  </text>

  <!-- Level 3: SU(2) -->
  <rect x="50" y="375" width="700" height="80" rx="10" fill="#2d3436" stroke="#000" stroke-width="2"/>
  <text x="100" y="405" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">SU(2)</text>
  <text x="100" y="425" font-family="Arial, sans-serif" font-size="12" fill="#b2bec3">Continuous quantum gates</text>
  <text x="400" y="403" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">
    U†U = I, det(U) = 1
  </text>
  <text x="400" y="423" font-family="Arial, sans-serif" font-size="11" fill="#b2bec3" text-anchor="middle">
    Solovay-Kitaev: O(log^c(1/ε)) gates for ε-approximation
  </text>
  <text x="400" y="443" font-family="Arial, sans-serif" font-size="11" fill="#b2bec3" text-anchor="middle">
    T-gate precision: O(log(1/ε)) gates (t_gate_denom_growth)
  </text>

  <!-- Arrows -->
  <text x="30" y="180" font-family="Arial, sans-serif" font-size="20" fill="#636e72">↓</text>
  <text x="30" y="275" font-family="Arial, sans-serif" font-size="20" fill="#636e72">↓</text>
  <text x="30" y="370" font-family="Arial, sans-serif" font-size="20" fill="#636e72">↓</text>

  <!-- Labels -->
  <text x="770" y="140" font-family="Arial, sans-serif" font-size="11" fill="#b2bec3"
        text-anchor="end" transform="rotate(-90, 770, 140)">More expressive →</text>

  <text x="400" y="485" font-family="Arial, sans-serif" font-size="11" fill="#636e72"
        text-anchor="middle">Each level adds expressiveness; crystallization projects back to discrete sublattice</text>
</svg>
