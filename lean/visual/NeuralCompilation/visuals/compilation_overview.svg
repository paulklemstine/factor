<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ee5a24;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48dbfb;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0abde3;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#feca57;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff9f43;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Neural Network Compilation Framework</text>
  <text x="450" y="75" font-family="Arial, sans-serif" font-size="14" fill="#88aacc"
        text-anchor="middle">Formally Verified Mathematical Foundations</text>

  <!-- Central hub -->
  <circle cx="450" cy="310" r="60" fill="#1e3a5f" stroke="#48dbfb" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="305" font-family="Arial, sans-serif" font-size="13" fill="#ffffff"
        text-anchor="middle" font-weight="bold">Neural</text>
  <text x="450" y="323" font-family="Arial, sans-serif" font-size="13" fill="#ffffff"
        text-anchor="middle" font-weight="bold">Compilation</text>

  <!-- Box 1: Tensor Rank -->
  <rect x="50" y="110" width="200" height="130" rx="12" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="15" fill="#fff"
        text-anchor="middle" font-weight="bold">Tensor Rank Bounds</text>
  <text x="150" y="165" font-family="monospace" font-size="11" fill="#ffe0e0"
        text-anchor="middle">rank ≤ H·min(d,dₖ)</text>
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">Composed: r^L per layer</text>
  <text x="150" y="205" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">GPT-2: 1536/layer</text>
  <text x="150" y="225" font-family="Arial, sans-serif" font-size="9" fill="#ffaaaa"
        text-anchor="middle">✓ 15 theorems verified</text>

  <!-- Box 2: Koopman -->
  <rect x="650" y="110" width="200" height="130" rx="12" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="750" y="140" font-family="Arial, sans-serif" font-size="15" fill="#fff"
        text-anchor="middle" font-weight="bold">Koopman Lifting</text>
  <text x="750" y="165" font-family="monospace" font-size="11" fill="#e0f0ff"
        text-anchor="middle">dim = C(n+d, d)</text>
  <text x="750" y="185" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">Equivariant: ÷ |G|</text>
  <text x="750" y="205" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">Layerwise: 66 vs 43758</text>
  <text x="750" y="225" font-family="Arial, sans-serif" font-size="9" fill="#aae0ff"
        text-anchor="middle">✓ 18 theorems verified</text>

  <!-- Box 3: Crystallization -->
  <rect x="50" y="400" width="200" height="130" rx="12" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="150" y="430" font-family="Arial, sans-serif" font-size="15" fill="#333"
        text-anchor="middle" font-weight="bold">Crystallization</text>
  <text x="150" y="455" font-family="monospace" font-size="11" fill="#554400"
        text-anchor="middle">error ≤ n/2</text>
  <text x="150" y="475" font-family="Arial, sans-serif" font-size="10" fill="#333"
        text-anchor="middle">sin²(πw) → integers</text>
  <text x="150" y="495" font-family="Arial, sans-serif" font-size="10" fill="#333"
        text-anchor="middle">ℤ ring closure</text>
  <text x="150" y="515" font-family="Arial, sans-serif" font-size="9" fill="#665500"
        text-anchor="middle">✓ 22 theorems verified</text>

  <!-- Box 4: Quantum -->
  <rect x="650" y="400" width="200" height="130" rx="12" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="750" y="430" font-family="Arial, sans-serif" font-size="15" fill="#fff"
        text-anchor="middle" font-weight="bold">Quantum Gates</text>
  <text x="750" y="455" font-family="monospace" font-size="11" fill="#e0d0ff"
        text-anchor="middle">ℤ ⊂ ℤ[i] ⊂ Hurwitz</text>
  <text x="750" y="475" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">Euler 4-square identity</text>
  <text x="750" y="495" font-family="Arial, sans-serif" font-size="10" fill="#fff"
        text-anchor="middle">Unit quat closure</text>
  <text x="750" y="515" font-family="Arial, sans-serif" font-size="9" fill="#c0b0ff"
        text-anchor="middle">✓ 18 theorems verified</text>

  <!-- Connecting lines -->
  <line x1="250" y1="175" x2="390" y2="290" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="650" y1="175" x2="510" y2="290" stroke="#48dbfb" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="250" y1="465" x2="390" y2="330" stroke="#feca57" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="650" y1="465" x2="510" y2="330" stroke="#a29bfe" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Footer -->
  <text x="450" y="575" font-family="Arial, sans-serif" font-size="12" fill="#88aacc"
        text-anchor="middle">73 Machine-Verified Theorems · Zero sorry · Lean 4 + Mathlib</text>
</svg>
