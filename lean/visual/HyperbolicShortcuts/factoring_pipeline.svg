<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="step5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
    <filter id="shadow3">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1100" height="550" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#e0e0ff">
    Factoring Pipeline: Pythagorean Triples → Difference of Squares → GCD
  </text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#8888cc">
    Hyperbolic shortcuts navigate the Berggren tree to find factoring triples in O(log k) steps
  </text>

  <!-- Step 1: Input -->
  <g filter="url(#shadow3)">
    <rect x="30" y="90" width="180" height="100" rx="15" fill="url(#step1)"/>
    <text x="120" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Step 1: Input</text>
    <text x="120" y="145" text-anchor="middle" font-size="12" fill="#c0d8ff">Composite N</text>
    <text x="120" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="white">N = 21</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="215" y1="140" x2="255" y2="140" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Trivial Triple -->
  <g filter="url(#shadow3)">
    <rect x="270" y="90" width="190" height="100" rx="15" fill="url(#step2)"/>
    <text x="365" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Step 2: Trivial Triple</text>
    <text x="365" y="138" text-anchor="middle" font-size="11" fill="#ffc0c0">N² + b² = c² where</text>
    <text x="365" y="155" text-anchor="middle" font-size="11" fill="#ffc0c0">b = (N²−1)/2, c = (N²+1)/2</text>
    <text x="365" y="175" text-anchor="middle" font-size="12" fill="white">(21, 220, 221)</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="465" y1="140" x2="505" y2="140" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Hyperbolic Shortcut -->
  <g filter="url(#shadow3)">
    <rect x="520" y="80" width="200" height="120" rx="15" fill="url(#step3)"/>
    <text x="620" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Step 3: Navigate Tree</text>
    <text x="620" y="130" text-anchor="middle" font-size="11" fill="#c0ffd8">Apply Berggren matrices</text>
    <text x="620" y="148" text-anchor="middle" font-size="11" fill="#c0ffd8">or hyperbolic shortcuts</text>
    <text x="620" y="168" text-anchor="middle" font-size="11" fill="#c0ffd8">B₂·(3,4,5) → (21,20,29)</text>
    <text x="620" y="186" text-anchor="middle" font-size="10" fill="white">O(log k) via repeated squaring</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="725" y1="140" x2="765" y2="140" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Difference of Squares -->
  <g filter="url(#shadow3)">
    <rect x="780" y="90" width="280" height="100" rx="15" fill="url(#step4)"/>
    <text x="920" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Step 4: Factor via DoS</text>
    <text x="920" y="140" text-anchor="middle" font-size="12" fill="#fff0c0">(c−b)(c+b) = a²</text>
    <text x="920" y="160" text-anchor="middle" font-size="12" fill="#fff0c0">(29−20)(29+20) = 9 × 49 = 21²</text>
    <text x="920" y="178" text-anchor="middle" font-size="11" fill="white">gcd(9, 21)=3, gcd(49, 21)=7</text>
  </g>

  <!-- Result box -->
  <g filter="url(#shadow3)">
    <rect x="830" y="220" width="180" height="60" rx="15" fill="url(#step5)"/>
    <text x="920" y="248" text-anchor="middle" font-size="16" font-weight="bold" fill="white">21 = 3 × 7 ✓</text>
    <text x="920" y="268" text-anchor="middle" font-size="11" fill="#d8c0ff">Factors found!</text>
  </g>
  <line x1="920" y1="192" x2="920" y2="218" stroke="#9b59b6" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- Lower section: The pipeline for 119 -->
  <rect x="30" y="310" width="1040" height="220" rx="12" fill="#111133" stroke="#333366" stroke-width="1.5" opacity="0.9"/>

  <text x="550" y="340" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0ff">
    Middle Branch Factoring Chain
  </text>

  <!-- Chain visualization -->
  <g transform="translate(60, 360)">
    <!-- (3,4,5) -->
    <rect x="0" y="0" width="100" height="50" rx="8" fill="#2c3e50" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="50" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(3, 4, 5)</text>
    <text x="50" y="38" text-anchor="middle" font-size="9" fill="#8888cc">root, prime</text>

    <text x="120" y="25" font-size="16" fill="#e74c3c">→</text>
    <text x="118" y="45" font-size="8" fill="#e74c3c">B₂</text>

    <!-- (21,20,29) -->
    <rect x="140" y="0" width="110" height="50" rx="8" fill="#2c3e50" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="195" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(21, 20, 29)</text>
    <text x="195" y="38" text-anchor="middle" font-size="9" fill="#2ecc71">21 = 3×7</text>

    <text x="270" y="25" font-size="16" fill="#e74c3c">→</text>
    <text x="268" y="45" font-size="8" fill="#e74c3c">B₂</text>

    <!-- (119,120,169) -->
    <rect x="290" y="0" width="120" height="50" rx="8" fill="#2c3e50" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="350" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(119, 120, 169)</text>
    <text x="350" y="38" text-anchor="middle" font-size="9" fill="#2ecc71">119 = 7×17</text>

    <text x="430" y="25" font-size="16" fill="#e74c3c">→</text>
    <text x="428" y="45" font-size="8" fill="#e74c3c">B₂</text>

    <!-- (697,696,985) -->
    <rect x="450" y="0" width="120" height="50" rx="8" fill="#2c3e50" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="510" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(697, 696, 985)</text>
    <text x="510" y="38" text-anchor="middle" font-size="9" fill="#2ecc71">697 = 17×41</text>

    <text x="590" y="25" font-size="16" fill="#e74c3c">→</text>
    <text x="588" y="45" font-size="8" fill="#e74c3c">B₂</text>

    <!-- (4059,4060,5741) -->
    <rect x="610" y="0" width="130" height="50" rx="8" fill="#2c3e50" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="675" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(4059, 4060, 5741)</text>
    <text x="675" y="38" text-anchor="middle" font-size="9" fill="#2ecc71">4059 = 3×1353</text>

    <text x="760" y="25" font-size="16" fill="#8888cc">→ ⋯</text>

    <!-- Pattern box -->
    <rect x="800" y="0" width="170" height="50" rx="8" fill="#1a1a4e" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="885" y="20" text-anchor="middle" font-size="10" fill="#d8c0ff">Factors cascade:</text>
    <text x="885" y="38" text-anchor="middle" font-size="9" fill="#ccc">3→7→17→41→99→239→⋯</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(60, 440)">
    <text x="0" y="0" font-size="12" fill="#f39c12" font-weight="bold">Key Insight:</text>
    <text x="0" y="18" font-size="11" fill="#ccc">Each step's factor c−b becomes the previous step's factor c+b.</text>
    <text x="0" y="36" font-size="11" fill="#ccc">The factors form a sequence related to Pell numbers: 1, 3, 7, 17, 41, 99, 239, 577, ...</text>
    <text x="0" y="54" font-size="11" fill="#ccc">Recurrence: f_{n+1} = 2f_n + f_{n-1}. Each consecutive pair (f_n, f_{n+1}) approximates √2.</text>
    <text x="0" y="72" font-size="11" fill="#8888cc">This links factoring via Pythagorean triples to continued fraction expansions and lattice reduction.</text>
  </g>
</svg>
