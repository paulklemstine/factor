<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#357abd"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#e0e0ff" filter="url(#glow)">
    The Berggren Tree of Primitive Pythagorean Triples
  </text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#8888cc">
    Every primitive Pythagorean triple appears exactly once · Lorentz isometries O(2,1;ℤ)
  </text>

  <!-- Edges (drawn first, behind nodes) -->
  <!-- Root to Level 1 -->
  <line x1="600" y1="130" x2="200" y2="230" stroke="#2ecc71" stroke-width="2.5" opacity="0.7"/>
  <line x1="600" y1="130" x2="600" y2="230" stroke="#e74c3c" stroke-width="3" opacity="0.8"/>
  <line x1="600" y1="130" x2="1000" y2="230" stroke="#f39c12" stroke-width="2.5" opacity="0.7"/>

  <!-- Level 1 to Level 2 -->
  <!-- Left children -->
  <line x1="200" y1="270" x2="80" y2="380" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="270" x2="200" y2="380" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="270" x2="320" y2="380" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>
  <!-- Middle children -->
  <line x1="600" y1="270" x2="480" y2="380" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="270" x2="600" y2="380" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="270" x2="720" y2="380" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>
  <!-- Right children -->
  <line x1="1000" y1="270" x2="880" y2="380" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <line x1="1000" y1="270" x2="1000" y2="380" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
  <line x1="1000" y1="270" x2="1120" y2="380" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>

  <!-- Root node: (3, 4, 5) -->
  <g filter="url(#shadow)">
    <rect x="530" y="90" width="140" height="50" rx="12" fill="url(#nodeGrad)" stroke="#6ab0ff" stroke-width="2"/>
    <text x="600" y="115" text-anchor="middle" font-size="18" font-weight="bold" fill="white">(3, 4, 5)</text>
    <text x="600" y="133" text-anchor="middle" font-size="10" fill="#c0d8ff">9 + 16 = 25</text>
  </g>

  <!-- Level 1 nodes -->
  <!-- Left: (5, 12, 13) -->
  <g filter="url(#shadow)">
    <rect x="125" y="230" width="150" height="50" rx="12" fill="url(#leftGrad)" stroke="#5ddb8d" stroke-width="2"/>
    <text x="200" y="255" text-anchor="middle" font-size="16" font-weight="bold" fill="white">(5, 12, 13)</text>
    <text x="200" y="273" text-anchor="middle" font-size="10" fill="#c0ffd8">B₁ · Left</text>
  </g>

  <!-- Middle: (21, 20, 29) -->
  <g filter="url(#shadow)">
    <rect x="520" y="230" width="160" height="50" rx="12" fill="url(#midGrad)" stroke="#ff6b6b" stroke-width="2"/>
    <text x="600" y="255" text-anchor="middle" font-size="16" font-weight="bold" fill="white">(21, 20, 29)</text>
    <text x="600" y="273" text-anchor="middle" font-size="10" fill="#ffc0c0">B₂ · Middle · 21=3×7</text>
  </g>

  <!-- Right: (15, 8, 17) -->
  <g filter="url(#shadow)">
    <rect x="920" y="230" width="160" height="50" rx="12" fill="url(#rightGrad)" stroke="#ffbb55" stroke-width="2"/>
    <text x="1000" y="255" text-anchor="middle" font-size="16" font-weight="bold" fill="white">(15, 8, 17)</text>
    <text x="1000" y="273" text-anchor="middle" font-size="10" fill="#fff0c0">B₃ · Right</text>
  </g>

  <!-- Level 2 nodes (smaller) -->
  <!-- Left-Left: (7, 24, 25) -->
  <rect x="30" y="385" width="100" height="35" rx="8" fill="#1a6b3a" stroke="#2ecc71" stroke-width="1"/>
  <text x="80" y="407" text-anchor="middle" font-size="11" fill="white">(7, 24, 25)</text>

  <!-- Left-Middle: (55, 48, 73) -->
  <rect x="150" y="385" width="100" height="35" rx="8" fill="#8b1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="200" y="407" text-anchor="middle" font-size="11" fill="white">(55, 48, 73)</text>

  <!-- Left-Right: (45, 28, 53) -->
  <rect x="270" y="385" width="100" height="35" rx="8" fill="#8b6914" stroke="#f39c12" stroke-width="1"/>
  <text x="320" y="407" text-anchor="middle" font-size="11" fill="white">(45, 28, 53)</text>

  <!-- Mid-Left: (39, 80, 89) -->
  <rect x="430" y="385" width="100" height="35" rx="8" fill="#1a6b3a" stroke="#2ecc71" stroke-width="1"/>
  <text x="480" y="407" text-anchor="middle" font-size="11" fill="white">(39, 80, 89)</text>

  <!-- Mid-Middle: (119, 120, 169) -->
  <rect x="545" y="385" width="110" height="35" rx="8" fill="#8b1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="600" y="407" text-anchor="middle" font-size="11" fill="white">(119, 120, 169)</text>

  <!-- Mid-Right: (77, 36, 85) -->
  <rect x="670" y="385" width="100" height="35" rx="8" fill="#8b6914" stroke="#f39c12" stroke-width="1"/>
  <text x="720" y="407" text-anchor="middle" font-size="11" fill="white">(77, 36, 85)</text>

  <!-- Right-Left: (33, 56, 65) -->
  <rect x="830" y="385" width="100" height="35" rx="8" fill="#1a6b3a" stroke="#2ecc71" stroke-width="1"/>
  <text x="880" y="407" text-anchor="middle" font-size="11" fill="white">(33, 56, 65)</text>

  <!-- Right-Middle: (65, 72, 97) -->
  <rect x="950" y="385" width="100" height="35" rx="8" fill="#8b1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="1000" y="407" text-anchor="middle" font-size="11" fill="white">(65, 72, 97)</text>

  <!-- Right-Right: (35, 12, 37) -->
  <rect x="1070" y="385" width="100" height="35" rx="8" fill="#8b6914" stroke="#f39c12" stroke-width="1"/>
  <text x="1120" y="407" text-anchor="middle" font-size="11" fill="white">(35, 12, 37)</text>

  <!-- Legend -->
  <rect x="30" y="470" width="360" height="210" rx="10" fill="#111133" stroke="#333366" stroke-width="1.5" opacity="0.9"/>
  <text x="210" y="498" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0ff">Berggren Matrices</text>

  <rect x="50" y="510" width="16" height="16" rx="3" fill="#2ecc71"/>
  <text x="75" y="523" font-size="12" fill="#ccc">B₁ (Left): preserves Q, det = +1</text>

  <rect x="50" y="535" width="16" height="16" rx="3" fill="#e74c3c"/>
  <text x="75" y="548" font-size="12" fill="#ccc">B₂ (Middle): preserves Q, det = −1</text>

  <rect x="50" y="560" width="16" height="16" rx="3" fill="#f39c12"/>
  <text x="75" y="573" font-size="12" fill="#ccc">B₃ (Right): preserves Q, det = +1</text>

  <text x="50" y="600" font-size="11" fill="#8888cc">Q(a,b,c) = a² + b² − c² = 0 (null cone)</text>
  <text x="50" y="618" font-size="11" fill="#8888cc">BᵢᵀQBᵢ = Q (Lorentz preservation)</text>
  <text x="50" y="636" font-size="11" fill="#8888cc">(c−b)(c+b) = a² (difference of squares)</text>
  <text x="50" y="654" font-size="11" fill="#8888cc">gcd(c−b, a) → nontrivial factor</text>

  <!-- Factoring example box -->
  <rect x="420" y="470" width="360" height="210" rx="10" fill="#111133" stroke="#333366" stroke-width="1.5" opacity="0.9"/>
  <text x="600" y="498" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0ff">Factoring Example: 21 = 3 × 7</text>

  <text x="440" y="525" font-size="13" fill="#ccc">Triple: (21, 20, 29) via B₂</text>
  <text x="440" y="548" font-size="13" fill="#ccc">(29−20)(29+20) = 9 × 49 = 441 = 21²</text>
  <text x="440" y="571" font-size="13" fill="#2ecc71">gcd(9, 21) = 3 ✓ → factor found!</text>
  <text x="440" y="594" font-size="13" fill="#2ecc71">gcd(49, 21) = 7 ✓ → factor found!</text>
  <text x="440" y="625" font-size="11" fill="#8888cc">Middle branch: 3 → 21 → 119 → 697 → ...</text>
  <text x="440" y="645" font-size="11" fill="#8888cc">Chebyshev: c_{n+1} = 6c_n − c_{n-1}</text>
  <text x="440" y="665" font-size="11" fill="#8888cc">Ratio → 3 + 2√2 ≈ 5.828...</text>

  <!-- Hyperbolic shortcut box -->
  <rect x="810" y="470" width="360" height="210" rx="10" fill="#111133" stroke="#333366" stroke-width="1.5" opacity="0.9"/>
  <text x="990" y="498" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0ff">Hyperbolic Shortcuts</text>

  <text x="830" y="525" font-size="12" fill="#ccc">Shortcut = composite matrix B_{i₁}·B_{i₂}·⋯·B_{iₖ}</text>
  <text x="830" y="548" font-size="12" fill="#ccc">Jumps k levels in one matrix multiply</text>
  <text x="830" y="571" font-size="12" fill="#ccc">Computed in O(log k) via repeated squaring</text>

  <text x="830" y="600" font-size="11" fill="#f39c12">B₂² = [[9,8,12],[8,9,12],[12,12,17]]</text>
  <text x="830" y="620" font-size="11" fill="#f39c12">B₂³ = [[49,50,70],[50,49,70],[70,70,99]]</text>

  <text x="830" y="648" font-size="11" fill="#8888cc">Inverse: B⁻¹ = Q·Bᵀ·Q (Lorentz adjoint)</text>
  <text x="830" y="668" font-size="11" fill="#8888cc">Tree ascent in O(log n) steps</text>
</svg>
