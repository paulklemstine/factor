<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0a0a20"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg2)"/>

  <text x="450" y="35" text-anchor="middle" fill="#ffcc00" font-size="22" font-weight="bold">
    The Chebyshev Recurrence: c_{n+2} = 6c_{n+1} − c_n
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#8888aa" font-size="13">
    Machine-verified for ALL n ∈ ℕ — not just finite verification
  </text>

  <!-- Sequence display -->
  <rect x="40" y="75" width="820" height="100" rx="10" fill="#111133" stroke="#334488"/>
  <text x="450" y="100" text-anchor="middle" fill="#aabbdd" font-size="14" font-weight="bold">Middle Branch Hypotenuses</text>

  <!-- Values with arrows -->
  <g transform="translate(80, 140)">
    <text x="0" y="0" fill="#ffcc00" font-size="18" font-weight="bold">5</text>
    <text x="0" y="18" fill="#666688" font-size="10">n=0</text>
    <text x="50" y="0" fill="#cccccc" font-size="16">→</text>

    <text x="90" y="0" fill="#ffcc00" font-size="18" font-weight="bold">29</text>
    <text x="90" y="18" fill="#666688" font-size="10">n=1</text>
    <text x="140" y="0" fill="#cccccc" font-size="16">→</text>

    <text x="180" y="0" fill="#88ff88" font-size="18" font-weight="bold">169</text>
    <text x="180" y="18" fill="#448844" font-size="10">6·29−5</text>
    <text x="250" y="0" fill="#cccccc" font-size="16">→</text>

    <text x="290" y="0" fill="#88ff88" font-size="18" font-weight="bold">985</text>
    <text x="290" y="18" fill="#448844" font-size="10">6·169−29</text>
    <text x="360" y="0" fill="#cccccc" font-size="16">→</text>

    <text x="400" y="0" fill="#88ff88" font-size="18" font-weight="bold">5741</text>
    <text x="400" y="18" fill="#448844" font-size="10">6·985−169</text>
    <text x="480" y="0" fill="#cccccc" font-size="16">→</text>

    <text x="520" y="0" fill="#88ff88" font-size="18" font-weight="bold">33461</text>
    <text x="520" y="18" fill="#448844" font-size="10">6·5741−985</text>
    <text x="615" y="0" fill="#cccccc" font-size="16">→ ···</text>
  </g>

  <!-- Proof structure -->
  <rect x="40" y="195" width="400" height="280" rx="10" fill="#0d0d25" stroke="#446644"/>
  <text x="240" y="220" text-anchor="middle" fill="#88ff88" font-size="15" font-weight="bold">Proof Structure</text>

  <text x="60" y="250" fill="#aaddaa" font-size="12" font-weight="bold">Step 1: Component Recurrences</text>
  <text x="60" y="270" fill="#88cc88" font-size="11" font-family="monospace">a_{n+1} = a_n + 2b_n + 2c_n</text>
  <text x="60" y="288" fill="#88cc88" font-size="11" font-family="monospace">b_{n+1} = 2a_n + b_n + 2c_n</text>
  <text x="60" y="306" fill="#88cc88" font-size="11" font-family="monospace">c_{n+1} = 2a_n + 2b_n + 3c_n</text>

  <text x="60" y="336" fill="#aaddaa" font-size="12" font-weight="bold">Step 2: Auxiliary Sum</text>
  <text x="60" y="356" fill="#88cc88" font-size="11" font-family="monospace">s_n := a_n + b_n</text>
  <text x="60" y="374" fill="#88cc88" font-size="11" font-family="monospace">s_{n+1} = 3s_n + 4c_n</text>
  <text x="60" y="392" fill="#88cc88" font-size="11" font-family="monospace">c_{n+1} = 2s_n + 3c_n</text>

  <text x="60" y="422" fill="#aaddaa" font-size="12" font-weight="bold">Step 3: Elimination</text>
  <text x="60" y="442" fill="#ffcc00" font-size="11" font-family="monospace">c_{n+2} = 2s_{n+1} + 3c_{n+1}</text>
  <text x="60" y="458" fill="#ffcc00" font-size="11" font-family="monospace">     = 2(3s_n+4c_n) + 3(2s_n+3c_n)</text>
  <text x="60" y="474" fill="#ffaa00" font-size="11" font-family="monospace">     = 6c_{n+1} − c_n  ∎</text>

  <!-- Eigenvalue analysis -->
  <rect x="460" y="195" width="400" height="280" rx="10" fill="#0d0d25" stroke="#884488"/>
  <text x="660" y="220" text-anchor="middle" fill="#cc88ff" font-size="15" font-weight="bold">Eigenvalue Analysis</text>

  <text x="480" y="250" fill="#bbaadd" font-size="12">Characteristic equation: λ² − 6λ + 1 = 0</text>
  <text x="480" y="275" fill="#cc88ff" font-size="13" font-family="monospace">λ₊ = 3 + 2√2 ≈ 5.8284</text>
  <text x="480" y="298" fill="#cc88ff" font-size="13" font-family="monospace">λ₋ = 3 − 2√2 ≈ 0.1716</text>

  <text x="480" y="330" fill="#bbaadd" font-size="12">Closed form:</text>
  <text x="480" y="353" fill="#aa88cc" font-size="12" font-family="monospace">c_n = A·λ₊ⁿ + B·λ₋ⁿ</text>
  <text x="480" y="373" fill="#8866aa" font-size="11">where A,B determined by c₀=5, c₁=29</text>

  <!-- Growth chart -->
  <text x="480" y="405" fill="#bbaadd" font-size="12" font-weight="bold">Growth Ratios c_{n+1}/c_n:</text>
  <g transform="translate(480, 415)">
    <!-- Bars -->
    <rect x="0" y="0" width="50" height="12" fill="#8844aa" opacity="0.7"/>
    <text x="55" y="10" fill="#aa88cc" font-size="10">5.80 (n=1)</text>

    <rect x="0" y="16" width="49" height="12" fill="#8844aa" opacity="0.7"/>
    <text x="55" y="26" fill="#aa88cc" font-size="10">5.83 (n=2)</text>

    <rect x="0" y="32" width="49" height="12" fill="#8844aa" opacity="0.7"/>
    <text x="55" y="42" fill="#aa88cc" font-size="10">5.828 (n=3)</text>

    <rect x="0" y="48" width="49" height="12" fill="#ffcc00" opacity="0.5"/>
    <text x="55" y="58" fill="#ffcc00" font-size="10">→ 3+2√2 (limit)</text>
  </g>
</svg>
