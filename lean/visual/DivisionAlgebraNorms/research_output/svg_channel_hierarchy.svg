<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">
    Factoring Channel Hierarchy
  </text>
  <text x="400" y="70" text-anchor="middle" fill="#aaaacc" font-size="14">
    Across the Four Normed Division Algebras
  </text>

  <!-- Chart area -->
  <g transform="translate(120, 90)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="330" stroke="#555577" stroke-width="1"/>
    <!-- Y labels -->
    <text x="-10" y="330" text-anchor="end" fill="#aaaacc" font-size="12">0</text>
    <text x="-10" y="238" text-anchor="end" fill="#aaaacc" font-size="12">10</text>
    <text x="-10" y="147" text-anchor="end" fill="#aaaacc" font-size="12">20</text>
    <text x="-10" y="55" text-anchor="end" fill="#aaaacc" font-size="12">30</text>
    <!-- Grid lines -->
    <line x1="0" y1="238" x2="560" y2="238" stroke="#333355" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="147" x2="560" y2="147" stroke="#333355" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="55" x2="560" y2="55" stroke="#333355" stroke-width="0.5" stroke-dasharray="4,4"/>
    <!-- X axis -->
    <line x1="0" y1="330" x2="560" y2="330" stroke="#555577" stroke-width="1"/>

    <!-- Dim 1: ℝ (total=1, peel=1, cross=0) -->
    <g transform="translate(40, 0)">
      <!-- Peel bar (height = 1/36 * 330 ≈ 9.2) -->
      <rect x="0" y="321" width="80" height="9" fill="url(#bar1)" rx="3" filter="url(#glow)"/>
      <text x="40" y="316" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">1</text>
      <text x="40" y="355" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">ℝ</text>
      <text x="40" y="372" text-anchor="middle" fill="#888899" font-size="11">dim 1</text>
    </g>

    <!-- Dim 2: ℂ (total=3, peel=2, cross=1) -->
    <g transform="translate(170, 0)">
      <!-- Cross bar (1 channel → 9.2px) -->
      <rect x="0" y="303" width="80" height="9" fill="url(#bar3)" rx="3" opacity="0.8"/>
      <!-- Peel bar (2 channels → 18.3px) -->
      <rect x="0" y="312" width="80" height="18" fill="url(#bar1)" rx="3" filter="url(#glow)"/>
      <text x="40" y="298" text-anchor="middle" fill="#ffb74d" font-size="13" font-weight="bold">3</text>
      <text x="40" y="355" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">ℂ</text>
      <text x="40" y="372" text-anchor="middle" fill="#888899" font-size="11">dim 2</text>
    </g>

    <!-- Dim 4: ℍ (total=10, peel=4, cross=6) -->
    <g transform="translate(300, 0)">
      <!-- Cross bar (6 channels → 55px) -->
      <rect x="0" y="283" width="80" height="55" fill="url(#bar3)" rx="3" opacity="0.8"/>
      <!-- Peel bar (4 channels → 37px) on top conceptually but below in y -->
      <rect x="0" y="238" width="80" height="37" fill="url(#bar2)" rx="3" filter="url(#glow)"/>
      <!-- Note: stacked bar, peel on bottom, cross on top -->
      <!-- Correcting: total height = 10/36*330 = 91.7. From y=330-91.7=238.3 -->
      <rect x="0" y="238" width="80" height="37" fill="url(#bar1)" rx="3" filter="url(#glow)"/>
      <rect x="0" y="275" width="80" height="55" fill="url(#bar3)" rx="3" opacity="0.8"/>
      <text x="40" y="233" text-anchor="middle" fill="#ffb74d" font-size="13" font-weight="bold">10</text>
      <text x="40" y="355" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">ℍ</text>
      <text x="40" y="372" text-anchor="middle" fill="#888899" font-size="11">dim 4</text>
    </g>

    <!-- Dim 8: 𝕆 (total=36, peel=8, cross=28) -->
    <g transform="translate(430, 0)">
      <!-- Total height = 36/36*330 = 330. From y=0 to y=330 -->
      <!-- Peel: 8/36*330 = 73.3 -->
      <rect x="0" y="0" width="80" height="73" fill="url(#bar1)" rx="3" filter="url(#glow)"/>
      <!-- Cross: 28/36*330 = 256.7 -->
      <rect x="0" y="73" width="80" height="257" fill="url(#bar4)" rx="3" opacity="0.9"/>
      <text x="40" y="-8" text-anchor="middle" fill="#ef5350" font-size="15" font-weight="bold">36</text>
      <text x="40" y="355" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">𝕆</text>
      <text x="40" y="372" text-anchor="middle" fill="#888899" font-size="11">dim 8</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(580, 420)">
    <rect x="0" y="0" width="14" height="14" fill="url(#bar1)" rx="2"/>
    <text x="20" y="12" fill="#aaaacc" font-size="12">Peel channels (k)</text>
    <rect x="0" y="22" width="14" height="14" fill="url(#bar4)" rx="2"/>
    <text x="20" y="34" fill="#aaaacc" font-size="12">Cross-collisions C(k,2)</text>
  </g>

  <!-- Annotation -->
  <text x="400" y="488" text-anchor="middle" fill="#666688" font-size="11">
    Formally verified in Lean 4: C(2,2)=1, C(4,2)=6, C(8,2)=28 — by decide
  </text>
</svg>
