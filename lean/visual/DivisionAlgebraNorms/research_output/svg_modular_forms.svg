<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="550" fill="url(#bg5)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    Modular Form Representation Counts
  </text>
  <text x="400" y="58" text-anchor="middle" fill="#aaaacc" font-size="13">
    Jacobi's formulas predict the number of sum-of-squares representations
  </text>

  <!-- Table of formulas -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="700" height="110" fill="#111133" stroke="#334466" rx="8"/>

    <!-- Header -->
    <text x="60" y="28" text-anchor="middle" fill="#888899" font-size="12" font-weight="bold">Dimension</text>
    <text x="200" y="28" text-anchor="middle" fill="#888899" font-size="12" font-weight="bold">Algebra</text>
    <text x="400" y="28" text-anchor="middle" fill="#888899" font-size="12" font-weight="bold">Formula (odd N)</text>
    <text x="600" y="28" text-anchor="middle" fill="#888899" font-size="12" font-weight="bold">Modular Weight</text>
    <line x1="10" y1="36" x2="690" y2="36" stroke="#334466"/>

    <!-- Row 1 -->
    <text x="60" y="58" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">k = 2</text>
    <text x="200" y="58" text-anchor="middle" fill="#ddddee" font-size="13">ℂ (Gaussian)</text>
    <text x="400" y="58" text-anchor="middle" fill="#ffcc00" font-size="13">r₂(N) = 4(d₁ − d₃)</text>
    <text x="600" y="58" text-anchor="middle" fill="#ddddee" font-size="13">1</text>

    <!-- Row 2 -->
    <text x="60" y="80" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">k = 4</text>
    <text x="200" y="80" text-anchor="middle" fill="#ddddee" font-size="13">ℍ (Quaternion)</text>
    <text x="400" y="80" text-anchor="middle" fill="#ffcc00" font-size="13">r₄(N) = 8 · σ₁(N)</text>
    <text x="600" y="80" text-anchor="middle" fill="#ddddee" font-size="13">2</text>

    <!-- Row 3 -->
    <text x="60" y="102" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">k = 8</text>
    <text x="200" y="102" text-anchor="middle" fill="#ddddee" font-size="13">𝕆 (Octonion)</text>
    <text x="400" y="102" text-anchor="middle" fill="#ffcc00" font-size="13">r₈(N) = 16 · σ₃(N)</text>
    <text x="600" y="102" text-anchor="middle" fill="#ddddee" font-size="13">4</text>
  </g>

  <!-- Bar chart: representation counts for N=65 -->
  <g transform="translate(50, 215)">
    <text x="350" y="15" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">
      Representation Counts for N = 65 = 5 × 13
    </text>

    <!-- Chart area -->
    <g transform="translate(80, 30)">
      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="200" stroke="#555577"/>
      <!-- X axis -->
      <line x1="0" y1="200" x2="520" y2="200" stroke="#555577"/>

      <!-- Scale: max value is 16·σ₃(65) = 16·286650 = 4586400, too large -->
      <!-- Use log scale or show relative -->
      <!-- Actually let's show specific values -->

      <!-- r₂(65) = 16 (all divisors ≡ 1 mod 4) -->
      <!-- 8·σ₁(65) = 8·84 = 672 -->
      <!-- 16·σ₃(65) = 16·(1+125+2197+274625) = 16·276948 = 4431168 -->
      <!-- Use log scale: log₁₀ values: 1.2, 2.8, 6.6 -->
      <!-- Map [0, 7] to [200, 0] → each log unit = 28.6px -->

      <!-- Grid -->
      <g stroke="#333355" stroke-width="0.5" stroke-dasharray="4,4">
        <line x1="0" y1="171" x2="520" y2="171"/> <!-- 10¹ -->
        <line x1="0" y1="143" x2="520" y2="143"/> <!-- 10² -->
        <line x1="0" y1="114" x2="520" y2="114"/> <!-- 10³ -->
        <line x1="0" y1="86" x2="520" y2="86"/>   <!-- 10⁴ -->
        <line x1="0" y1="57" x2="520" y2="57"/>   <!-- 10⁵ -->
        <line x1="0" y1="29" x2="520" y2="29"/>   <!-- 10⁶ -->
      </g>

      <!-- Y labels -->
      <text x="-5" y="204" text-anchor="end" fill="#888899" font-size="10">1</text>
      <text x="-5" y="175" text-anchor="end" fill="#888899" font-size="10">10</text>
      <text x="-5" y="146" text-anchor="end" fill="#888899" font-size="10">10²</text>
      <text x="-5" y="118" text-anchor="end" fill="#888899" font-size="10">10³</text>
      <text x="-5" y="89" text-anchor="end" fill="#888899" font-size="10">10⁴</text>
      <text x="-5" y="61" text-anchor="end" fill="#888899" font-size="10">10⁵</text>
      <text x="-5" y="32" text-anchor="end" fill="#888899" font-size="10">10⁶</text>

      <!-- Bar for r₂ = 16: log₁₀(16) ≈ 1.2 → height = 1.2*28.6 = 34.3 -->
      <rect x="40" y="166" width="100" height="34" fill="#4ecdc4" rx="4" filter="url(#glow5)"/>
      <text x="90" y="160" text-anchor="middle" fill="#4ecdc4" font-size="13" font-weight="bold">16</text>
      <text x="90" y="220" text-anchor="middle" fill="#ddddee" font-size="12">r₂(65)</text>
      <text x="90" y="235" text-anchor="middle" fill="#888899" font-size="10">dim 2</text>

      <!-- Bar for r₄ = 672: log₁₀(672) ≈ 2.83 → height = 2.83*28.6 = 80.9 -->
      <rect x="200" y="119" width="100" height="81" fill="#a29bfe" rx="4" filter="url(#glow5)"/>
      <text x="250" y="113" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">672</text>
      <text x="250" y="220" text-anchor="middle" fill="#ddddee" font-size="12">r₄(65)</text>
      <text x="250" y="235" text-anchor="middle" fill="#888899" font-size="10">dim 4</text>

      <!-- Bar for r₈ = 4,431,168: log₁₀ ≈ 6.65 → height = 6.65*28.6 = 190 -->
      <rect x="360" y="10" width="100" height="190" fill="#ff6b6b" rx="4" filter="url(#glow5)"/>
      <text x="410" y="5" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">4,431,168</text>
      <text x="410" y="220" text-anchor="middle" fill="#ddddee" font-size="12">r₈(65)</text>
      <text x="410" y="235" text-anchor="middle" fill="#888899" font-size="10">dim 8</text>
    </g>
  </g>

  <!-- Key insight box -->
  <g transform="translate(50, 500)">
    <rect x="0" y="0" width="700" height="38" fill="#111133" stroke="#334466" rx="6"/>
    <text x="350" y="15" text-anchor="middle" fill="#ffcc00" font-size="12" font-weight="bold">
      Key Insight: Higher dimensions have exponentially more representations,
    </text>
    <text x="350" y="30" text-anchor="middle" fill="#aabbdd" font-size="11">
      providing vastly more collision opportunities — but the sphere surface also grows, balancing the advantage.
    </text>
  </g>
</svg>
