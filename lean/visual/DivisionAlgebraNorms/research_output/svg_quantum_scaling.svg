<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    Quantum vs Classical Collision Search Scaling
  </text>
  <text x="400" y="62" text-anchor="middle" fill="#aaaacc" font-size="13">
    Search space S = number of representations on the factoring sphere
  </text>

  <!-- Chart -->
  <g transform="translate(100, 90)">
    <!-- Axes -->
    <line x1="0" y1="330" x2="580" y2="330" stroke="#555577" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="330" stroke="#555577" stroke-width="1"/>

    <!-- Y axis label -->
    <text x="-55" y="165" fill="#aaaacc" font-size="12" text-anchor="middle" transform="rotate(-90, -55, 165)">
      Queries needed (log scale)
    </text>

    <!-- X axis label -->
    <text x="290" y="365" fill="#aaaacc" font-size="12" text-anchor="middle">
      Search space S (log scale)
    </text>

    <!-- Grid and labels -->
    <!-- X: S from 10³ to 10¹⁸, mapped to 0-560 -->
    <!-- Y: queries from 10⁰ to 10⁹, mapped to 330-0 -->

    <!-- X tick labels -->
    <text x="0" y="350" fill="#888899" font-size="10" text-anchor="middle">10³</text>
    <text x="112" y="350" fill="#888899" font-size="10" text-anchor="middle">10⁶</text>
    <text x="224" y="350" fill="#888899" font-size="10" text-anchor="middle">10⁹</text>
    <text x="336" y="350" fill="#888899" font-size="10" text-anchor="middle">10¹²</text>
    <text x="448" y="350" fill="#888899" font-size="10" text-anchor="middle">10¹⁵</text>
    <text x="560" y="350" fill="#888899" font-size="10" text-anchor="middle">10¹⁸</text>

    <!-- Y tick labels -->
    <text x="-8" y="330" fill="#888899" font-size="10" text-anchor="end">10⁰</text>
    <text x="-8" y="293" fill="#888899" font-size="10" text-anchor="end">10¹</text>
    <text x="-8" y="257" fill="#888899" font-size="10" text-anchor="end">10²</text>
    <text x="-8" y="220" fill="#888899" font-size="10" text-anchor="end">10³</text>
    <text x="-8" y="183" fill="#888899" font-size="10" text-anchor="end">10⁴</text>
    <text x="-8" y="147" fill="#888899" font-size="10" text-anchor="end">10⁵</text>
    <text x="-8" y="110" fill="#888899" font-size="10" text-anchor="end">10⁶</text>
    <text x="-8" y="73" fill="#888899" font-size="10" text-anchor="end">10⁷</text>
    <text x="-8" y="37" fill="#888899" font-size="10" text-anchor="end">10⁸</text>
    <text x="-8" y="0" fill="#888899" font-size="10" text-anchor="end">10⁹</text>

    <!-- Grid lines -->
    <g opacity="0.15" stroke="#aaaacc" stroke-width="0.5">
      <line x1="0" y1="293" x2="560" y2="293"/>
      <line x1="0" y1="257" x2="560" y2="257"/>
      <line x1="0" y1="220" x2="560" y2="220"/>
      <line x1="0" y1="183" x2="560" y2="183"/>
      <line x1="0" y1="147" x2="560" y2="147"/>
      <line x1="0" y1="110" x2="560" y2="110"/>
      <line x1="0" y1="73" x2="560" y2="73"/>
      <line x1="0" y1="37" x2="560" y2="37"/>
      <line x1="112" y1="0" x2="112" y2="330"/>
      <line x1="224" y1="0" x2="224" y2="330"/>
      <line x1="336" y1="0" x2="336" y2="330"/>
      <line x1="448" y1="0" x2="448" y2="330"/>
    </g>

    <!-- Classical: S^(1/2) — slope 1/2 on log-log -->
    <!-- At S=10³: Q=10^1.5 → y=330-1.5*36.7=275 -->
    <!-- At S=10¹⁸: Q=10⁹ → y=0 -->
    <polyline points="0,275 112,220 224,165 336,110 448,55 560,0"
              fill="none" stroke="#ff6b6b" stroke-width="3" filter="url(#glow3)"/>

    <!-- BHT: S^(1/3) — slope 1/3 -->
    <!-- At S=10³: Q=10¹ → y=293 -->
    <!-- At S=10¹⁸: Q=10⁶ → y=110 -->
    <polyline points="0,293 112,257 224,220 336,183 448,147 560,110"
              fill="none" stroke="#4ecdc4" stroke-width="3" filter="url(#glow3)"/>

    <!-- Grover: S^(1/4) — slope 1/4 -->
    <!-- At S=10³: Q=10^0.75 → y=302 -->
    <!-- At S=10¹⁸: Q=10^4.5 → y=165 -->
    <polyline points="0,302 112,275 224,247 336,220 448,192 560,165"
              fill="none" stroke="#a29bfe" stroke-width="3" filter="url(#glow3)"/>

    <!-- Shor reference (polynomial in log N, not in S) -->
    <line x1="0" y1="293" x2="560" y2="257" stroke="#ffe66d" stroke-width="2" stroke-dasharray="8,4" filter="url(#glow3)"/>
  </g>

  <!-- Legend -->
  <g transform="translate(520, 130)">
    <rect x="0" y="0" width="180" height="120" fill="#0a0a2e" fill-opacity="0.9" stroke="#334466" rx="6"/>
    <line x1="10" y1="22" x2="40" y2="22" stroke="#ff6b6b" stroke-width="3"/>
    <text x="48" y="26" fill="#ff6b6b" font-size="12">Classical S^(1/2)</text>
    <line x1="10" y1="47" x2="40" y2="47" stroke="#4ecdc4" stroke-width="3"/>
    <text x="48" y="51" fill="#4ecdc4" font-size="12">BHT Quantum S^(1/3)</text>
    <line x1="10" y1="72" x2="40" y2="72" stroke="#a29bfe" stroke-width="3"/>
    <text x="48" y="76" fill="#a29bfe" font-size="12">Grover S^(1/4)</text>
    <line x1="10" y1="97" x2="40" y2="97" stroke="#ffe66d" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="48" y="101" fill="#ffe66d" font-size="12">Shor (poly log N)</text>
  </g>

  <!-- Annotation -->
  <text x="400" y="488" text-anchor="middle" fill="#666688" font-size="11">
    Quantum speedup is polynomial, not exponential — Shor remains the only polynomial-time quantum factoring algorithm
  </text>
</svg>
