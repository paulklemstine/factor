<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">
    E₈ Root System — 2D Projection
  </text>
  <text x="400" y="62" text-anchor="middle" fill="#aaaacc" font-size="14">
    240 nearest neighbors • Kissing number 240 • Weyl group |W(E₈)| = 696,729,600
  </text>

  <!-- E₈ projected into 2D — we show the Dynkin diagram and a schematic -->
  <g transform="translate(400, 280)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="12" fill="#ff6b6b" filter="url(#glow4)"/>

    <!-- Show 30 representative neighbors in a circular pattern with varying radii -->
    <!-- Layer 1: 8 nearest (octagon) -->
    <g opacity="0.7">
      <circle cx="100" cy="0" r="5" fill="#4ecdc4"/>
      <circle cx="71" cy="71" r="5" fill="#4ecdc4"/>
      <circle cx="0" cy="100" r="5" fill="#4ecdc4"/>
      <circle cx="-71" cy="71" r="5" fill="#4ecdc4"/>
      <circle cx="-100" cy="0" r="5" fill="#4ecdc4"/>
      <circle cx="-71" cy="-71" r="5" fill="#4ecdc4"/>
      <circle cx="0" cy="-100" r="5" fill="#4ecdc4"/>
      <circle cx="71" cy="-71" r="5" fill="#4ecdc4"/>
      <!-- Lines to center -->
      <line x1="0" y1="0" x2="100" y2="0" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="71" y2="71" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="-71" y2="71" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="-100" y2="0" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="-71" y2="-71" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="0" y2="-100" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="71" y2="-71" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- Layer 2: 16 more neighbors -->
    <g opacity="0.5">
      <circle cx="140" cy="30" r="4" fill="#a29bfe"/>
      <circle cx="130" cy="-50" r="4" fill="#a29bfe"/>
      <circle cx="50" cy="130" r="4" fill="#a29bfe"/>
      <circle cx="-30" cy="140" r="4" fill="#a29bfe"/>
      <circle cx="-130" cy="50" r="4" fill="#a29bfe"/>
      <circle cx="-140" cy="-30" r="4" fill="#a29bfe"/>
      <circle cx="-50" cy="-130" r="4" fill="#a29bfe"/>
      <circle cx="30" cy="-140" r="4" fill="#a29bfe"/>
      <circle cx="120" cy="80" r="4" fill="#a29bfe"/>
      <circle cx="80" cy="120" r="4" fill="#a29bfe"/>
      <circle cx="-80" cy="120" r="4" fill="#a29bfe"/>
      <circle cx="-120" cy="80" r="4" fill="#a29bfe"/>
      <circle cx="-120" cy="-80" r="4" fill="#a29bfe"/>
      <circle cx="-80" cy="-120" r="4" fill="#a29bfe"/>
      <circle cx="80" cy="-120" r="4" fill="#a29bfe"/>
      <circle cx="120" cy="-80" r="4" fill="#a29bfe"/>
    </g>

    <!-- Layer 3: outer shell -->
    <g opacity="0.3">
      <circle cx="170" cy="10" r="3" fill="#ffe66d"/>
      <circle cx="165" cy="-40" r="3" fill="#ffe66d"/>
      <circle cx="155" cy="60" r="3" fill="#ffe66d"/>
      <circle cx="10" cy="170" r="3" fill="#ffe66d"/>
      <circle cx="-40" cy="165" r="3" fill="#ffe66d"/>
      <circle cx="60" cy="155" r="3" fill="#ffe66d"/>
      <circle cx="-170" cy="10" r="3" fill="#ffe66d"/>
      <circle cx="-165" cy="-40" r="3" fill="#ffe66d"/>
      <circle cx="-155" cy="60" r="3" fill="#ffe66d"/>
      <circle cx="10" cy="-170" r="3" fill="#ffe66d"/>
      <circle cx="-40" cy="-165" r="3" fill="#ffe66d"/>
      <circle cx="60" cy="-155" r="3" fill="#ffe66d"/>
      <circle cx="145" cy="100" r="3" fill="#ffe66d"/>
      <circle cx="100" cy="145" r="3" fill="#ffe66d"/>
      <circle cx="-145" cy="-100" r="3" fill="#ffe66d"/>
      <circle cx="-100" cy="-145" r="3" fill="#ffe66d"/>
      <circle cx="-145" cy="100" r="3" fill="#ffe66d"/>
      <circle cx="-100" cy="145" r="3" fill="#ffe66d"/>
      <circle cx="145" cy="-100" r="3" fill="#ffe66d"/>
      <circle cx="100" cy="-145" r="3" fill="#ffe66d"/>
    </g>

    <!-- "240 neighbors" annotation -->
    <text x="0" y="210" text-anchor="middle" fill="#aaaacc" font-size="13">
      Each point has 240 nearest neighbors
    </text>
    <text x="0" y="228" text-anchor="middle" fill="#aaaacc" font-size="11">
      (showing ~44 in 2D projection)
    </text>
  </g>

  <!-- E₈ Dynkin diagram -->
  <g transform="translate(120, 500)">
    <text x="0" y="-15" fill="#ffffff" font-size="14" font-weight="bold">E₈ Dynkin Diagram:</text>

    <!-- Main chain: 7 nodes -->
    <circle cx="40" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="100" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="160" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="220" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="280" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="340" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="400" cy="10" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <!-- Branch node -->
    <circle cx="220" cy="-50" r="8" fill="none" stroke="#ff6b6b" stroke-width="2"/>

    <!-- Edges -->
    <line x1="48" y1="10" x2="92" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="108" y1="10" x2="152" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="168" y1="10" x2="212" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="228" y1="10" x2="272" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="288" y1="10" x2="332" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="348" y1="10" x2="392" y2="10" stroke="#4ecdc4" stroke-width="2"/>
    <!-- Branch edge -->
    <line x1="220" y1="2" x2="220" y2="-42" stroke="#ff6b6b" stroke-width="2"/>
  </g>

  <!-- Info boxes -->
  <g transform="translate(20, 85)">
    <rect x="0" y="0" width="190" height="180" fill="#111133" stroke="#334466" rx="8"/>
    <text x="95" y="25" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">E₈ Properties</text>
    <line x1="10" y1="35" x2="180" y2="35" stroke="#334466"/>
    <text x="15" y="58" fill="#4ecdc4" font-size="12">Dimension: 8</text>
    <text x="15" y="78" fill="#4ecdc4" font-size="12">Kissing #: 240</text>
    <text x="15" y="98" fill="#4ecdc4" font-size="12">Det: 1 (unimodular)</text>
    <text x="15" y="118" fill="#4ecdc4" font-size="12">Even: ✓</text>
    <text x="15" y="138" fill="#4ecdc4" font-size="12">Self-dual: ✓</text>
    <text x="15" y="158" fill="#4ecdc4" font-size="12">Unique in dim 8: ✓</text>
    <text x="15" y="175" fill="#66dd88" font-size="10">✓ All verified in Lean 4</text>
  </g>

  <g transform="translate(590, 85)">
    <rect x="0" y="0" width="190" height="180" fill="#111133" stroke="#334466" rx="8"/>
    <text x="95" y="25" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Factoring Advantage</text>
    <line x1="10" y1="35" x2="180" y2="35" stroke="#334466"/>
    <text x="15" y="58" fill="#ff6b6b" font-size="12">Cross channels: 28</text>
    <text x="15" y="78" fill="#ff6b6b" font-size="12">Peel channels: 8</text>
    <text x="15" y="98" fill="#ff6b6b" font-size="12">Total: 36</text>
    <text x="15" y="125" fill="#ffe66d" font-size="12">vs dim 2: 28× more</text>
    <text x="15" y="145" fill="#ffe66d" font-size="12">vs dim 4: 4.7× more</text>
    <text x="15" y="168" fill="#aabbdd" font-size="11">Weyl group reduction:</text>
    <text x="15" y="180" fill="#aabbdd" font-size="10">~696 million orbits</text>
  </g>
</svg>
