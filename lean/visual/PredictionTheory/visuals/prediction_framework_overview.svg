<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="100%" style="stop-color:#1B2838"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#E0E0E0" font-size="24" font-weight="bold">
    Prediction Theory: A Formally Verified Framework
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#78909C" font-size="13">
    80+ theorems • 9 modules • Zero sorries • Verified by Lean 4
  </text>

  <!-- Central node -->
  <circle cx="450" cy="330" r="55" fill="#1565C0" stroke="#42A5F5" stroke-width="2" filter="shadow"/>
  <text x="450" y="325" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Prediction</text>
  <text x="450" y="343" text-anchor="middle" fill="#BBDEFB" font-size="11">Theory</text>

  <!-- Module nodes -->
  <!-- Foundations -->
  <rect x="55" y="100" width="155" height="65" rx="10" fill="#1B5E20" stroke="#4CAF50" stroke-width="1.5" filter="shadow"/>
  <text x="133" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Foundations</text>
  <text x="133" y="143" text-anchor="middle" fill="#A5D6A7" font-size="10">Bayes • Diversity</text>
  <text x="133" y="157" text-anchor="middle" fill="#A5D6A7" font-size="10">Projection • NFL</text>

  <!-- Diminishing Returns -->
  <rect x="250" y="100" width="155" height="65" rx="10" fill="#E65100" stroke="#FF9800" stroke-width="1.5" filter="shadow"/>
  <text x="328" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Diminishing Returns</text>
  <text x="328" y="143" text-anchor="middle" fill="#FFE0B2" font-size="10">Optimal Ensemble</text>
  <text x="328" y="157" text-anchor="middle" fill="#FFE0B2" font-size="10">AM-GM Bound</text>

  <!-- Meta-Prediction -->
  <rect x="495" y="100" width="155" height="65" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="1.5" filter="shadow"/>
  <text x="573" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Meta-Prediction</text>
  <text x="573" y="143" text-anchor="middle" fill="#E1BEE7" font-size="10">Incompleteness</text>
  <text x="573" y="157" text-anchor="middle" fill="#E1BEE7" font-size="10">Calibration Fixed Pt</text>

  <!-- Adversarial -->
  <rect x="690" y="100" width="155" height="65" rx="10" fill="#B71C1C" stroke="#EF5350" stroke-width="1.5" filter="shadow"/>
  <text x="768" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Adversarial</text>
  <text x="768" y="143" text-anchor="middle" fill="#FFCDD2" font-size="10">Minimax Duality</text>
  <text x="768" y="157" text-anchor="middle" fill="#FFCDD2" font-size="10">Robustness</text>

  <!-- Online Learning -->
  <rect x="55" y="460" width="155" height="65" rx="10" fill="#006064" stroke="#4DD0E1" stroke-width="1.5" filter="shadow"/>
  <text x="133" y="485" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Online Learning</text>
  <text x="133" y="503" text-anchor="middle" fill="#B2EBF2" font-size="10">Mult. Weights</text>
  <text x="133" y="517" text-anchor="middle" fill="#B2EBF2" font-size="10">Regret Bounds</text>

  <!-- Uncertainty Principle -->
  <rect x="250" y="460" width="155" height="65" rx="10" fill="#311B92" stroke="#B39DDB" stroke-width="1.5" filter="shadow"/>
  <text x="328" y="485" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Uncertainty</text>
  <text x="328" y="503" text-anchor="middle" fill="#D1C4E9" font-size="10">Cramér-Rao</text>
  <text x="328" y="517" text-anchor="middle" fill="#D1C4E9" font-size="10">Entropy Power</text>

  <!-- Category Theory -->
  <rect x="495" y="460" width="155" height="65" rx="10" fill="#1A237E" stroke="#7986CB" stroke-width="1.5" filter="shadow"/>
  <text x="573" y="485" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Category Theory</text>
  <text x="573" y="503" text-anchor="middle" fill="#C5CAE9" font-size="10">Prediction Functor</text>
  <text x="573" y="517" text-anchor="middle" fill="#C5CAE9" font-size="10">Bayesian Monad</text>

  <!-- Causal + Continuous -->
  <rect x="690" y="460" width="155" height="65" rx="10" fill="#33691E" stroke="#AED581" stroke-width="1.5" filter="shadow"/>
  <text x="768" y="485" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Causal + Cont.</text>
  <text x="768" y="503" text-anchor="middle" fill="#DCEDC8" font-size="10">do-calculus</text>
  <text x="768" y="517" text-anchor="middle" fill="#DCEDC8" font-size="10">Riccati • Kalman</text>

  <!-- Connections to center -->
  <line x1="210" y1="145" x2="400" y2="310" stroke="#4CAF50" stroke-width="1" opacity="0.5"/>
  <line x1="405" y1="145" x2="440" y2="280" stroke="#FF9800" stroke-width="1" opacity="0.5"/>
  <line x1="573" y1="165" x2="490" y2="290" stroke="#CE93D8" stroke-width="1" opacity="0.5"/>
  <line x1="690" y1="145" x2="500" y2="310" stroke="#EF5350" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="480" x2="400" y2="350" stroke="#4DD0E1" stroke-width="1" opacity="0.5"/>
  <line x1="405" y1="480" x2="440" y2="380" stroke="#B39DDB" stroke-width="1" opacity="0.5"/>
  <line x1="573" y1="460" x2="490" y2="370" stroke="#7986CB" stroke-width="1" opacity="0.5"/>
  <line x1="690" y1="480" x2="500" y2="350" stroke="#AED581" stroke-width="1" opacity="0.5"/>

  <!-- Key theorems callout -->
  <rect x="100" y="250" width="200" height="35" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.7"/>
  <text x="200" y="272" text-anchor="middle" fill="#90CAF9" font-size="11">Error × Info ≥ 1</text>

  <rect x="600" y="250" width="200" height="35" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.7"/>
  <text x="700" y="272" text-anchor="middle" fill="#90CAF9" font-size="11">q(f∘g) ≤ min(q(f), q(g))</text>

  <rect x="100" y="365" width="200" height="35" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.7"/>
  <text x="200" y="387" text-anchor="middle" fill="#90CAF9" font-size="11">TotalCost ≥ 2√(σ²c)</text>

  <rect x="600" y="365" width="200" height="35" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.7"/>
  <text x="700" y="387" text-anchor="middle" fill="#90CAF9" font-size="11">Regret = O(√(T log n))</text>

  <!-- Footer -->
  <text x="450" y="590" text-anchor="middle" fill="#546E7A" font-size="11">
    Lean 4.28.0 • Mathlib v4.28.0 • All proofs kernel-verified
  </text>
  <text x="450" y="610" text-anchor="middle" fill="#37474F" font-size="10">
    propext • Classical.choice • Quot.sound — No additional axioms
  </text>
</svg>
