<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Stereographic Compactification of Parameter Space</text>

  <!-- Unit Circle -->
  <circle cx="250" cy="250" r="150" fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <circle cx="250" cy="250" r="3" fill="#333"/>

  <!-- North pole (infinity) -->
  <circle cx="250" cy="100" r="6" fill="#F44336"/>
  <text x="270" y="95" font-size="12" fill="#F44336" font-weight="bold">∞ (north pole)</text>

  <!-- Points on circle from stereographic projection -->
  <!-- t=0 maps to (0, -1) -->
  <circle cx="250" cy="400" r="5" fill="#4CAF50"/>
  <text x="265" y="415" font-size="11" fill="#4CAF50">t=0</text>

  <!-- t=1 maps to (1, 0) -->
  <circle cx="400" cy="250" r="5" fill="#FF9800"/>
  <text x="410" y="245" font-size="11" fill="#FF9800">t=1</text>

  <!-- t=-1 maps to (-1, 0) -->
  <circle cx="100" cy="250" r="5" fill="#9C27B0"/>
  <text x="55" y="245" font-size="11" fill="#9C27B0">t=-1</text>

  <!-- t=2 -->
  <circle cx="370" cy="160" r="5" fill="#00BCD4"/>
  <text x="380" y="155" font-size="11" fill="#00BCD4">t=2</text>

  <!-- Projection lines from north pole -->
  <line x1="250" y1="100" x2="250" y2="400" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="250" y1="100" x2="400" y2="250" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="250" y1="100" x2="100" y2="250" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Real line at bottom -->
  <line x1="50" y1="400" x2="450" y2="400" stroke="#333" stroke-width="2"/>
  <text x="250" y="435" text-anchor="middle" font-size="12" fill="#555">ℝ (parameter line)</text>

  <!-- Ticks on real line -->
  <line x1="100" y1="395" x2="100" y2="405" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="420" text-anchor="middle" font-size="10" fill="#888">-1</text>
  <line x1="250" y1="395" x2="250" y2="405" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="420" text-anchor="middle" font-size="10" fill="#888">0</text>
  <line x1="400" y1="395" x2="400" y2="405" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="420" text-anchor="middle" font-size="10" fill="#888">1</text>

  <!-- Right side: Properties -->
  <rect x="480" y="70" width="300" height="350" rx="10" fill="white" stroke="#ddd" stroke-width="1"/>

  <text x="630" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Key Properties</text>

  <text x="500" y="135" font-size="13" font-weight="bold" fill="#2196F3">Circle Membership (Proved):</text>
  <text x="500" y="155" font-size="12" fill="#555">x² + y² = 1 for all images</text>

  <text x="500" y="190" font-size="13" font-weight="bold" fill="#4CAF50">Bounded Metric (Proved):</text>
  <text x="500" y="210" font-size="12" fill="#555">d(k₁,k₂) = |arctan(k₁)-arctan(k₂)|</text>
  <text x="500" y="230" font-size="12" fill="#555">d(k₁,k₂) ≤ π for all k₁, k₂</text>

  <text x="500" y="265" font-size="13" font-weight="bold" fill="#FF9800">Triangle Inequality (Proved):</text>
  <text x="500" y="285" font-size="12" fill="#555">d(a,c) ≤ d(a,b) + d(b,c)</text>

  <text x="500" y="320" font-size="13" font-weight="bold" fill="#9C27B0">FPT Preservation (Proved):</text>
  <text x="500" y="340" font-size="12" fill="#555">FPT + bounded param</text>
  <text x="500" y="360" font-size="12" fill="#555">→ uniform polynomial time</text>

  <text x="500" y="395" font-size="13" font-weight="bold" fill="#F44336">Compactification:</text>
  <text x="500" y="415" font-size="12" fill="#555">ℝ ∪ {∞} ≅ S¹ (compact)</text>

  <!-- Label -->
  <text x="250" y="80" text-anchor="middle" font-size="13" fill="#2196F3">S¹ (unit circle)</text>
</svg>
