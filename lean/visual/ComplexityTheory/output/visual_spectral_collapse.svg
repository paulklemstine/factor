<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="satGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F44336;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">Spectral Collapse at the SAT Phase Transition</text>

  <!-- Axes for phase transition plot -->
  <line x1="80" y1="380" x2="750" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="380" x2="80" y2="70" stroke="#333" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="225" text-anchor="middle" font-size="14" fill="#555" transform="rotate(-90 30 225)">P(satisfiable)</text>

  <!-- X-axis label -->
  <text x="415" y="415" text-anchor="middle" font-size="14" fill="#555">Clause density α = m/n</text>

  <!-- Y-axis ticks -->
  <text x="70" y="385" text-anchor="end" font-size="11" fill="#888">0</text>
  <text x="70" y="230" text-anchor="end" font-size="11" fill="#888">0.5</text>
  <text x="70" y="80" text-anchor="end" font-size="11" fill="#888">1.0</text>
  <line x1="75" y1="225" x2="85" y2="225" stroke="#888" stroke-width="1"/>

  <!-- X-axis ticks -->
  <text x="130" y="398" text-anchor="middle" font-size="11" fill="#888">1</text>
  <text x="240" y="398" text-anchor="middle" font-size="11" fill="#888">2</text>
  <text x="350" y="398" text-anchor="middle" font-size="11" fill="#888">3</text>
  <text x="460" y="398" text-anchor="middle" font-size="11" fill="#888">4</text>
  <text x="570" y="398" text-anchor="middle" font-size="11" fill="#888">5</text>
  <text x="680" y="398" text-anchor="middle" font-size="11" fill="#888">6</text>

  <!-- Phase transition curve (sigmoid) -->
  <path d="M 80 85 Q 200 85 350 90 Q 420 100 450 200 Q 470 300 480 360 Q 500 375 750 378"
        fill="none" stroke="#2196F3" stroke-width="3"/>

  <!-- SAT region -->
  <rect x="81" y="70" width="370" height="310" fill="#4CAF50" opacity="0.08"/>
  <text x="250" y="180" text-anchor="middle" font-size="16" fill="#4CAF50" opacity="0.7">SAT</text>
  <text x="250" y="200" text-anchor="middle" font-size="12" fill="#4CAF50" opacity="0.5">(almost surely satisfiable)</text>

  <!-- UNSAT region -->
  <rect x="500" y="70" width="250" height="310" fill="#F44336" opacity="0.08"/>
  <text x="620" y="180" text-anchor="middle" font-size="16" fill="#F44336" opacity="0.7">UNSAT</text>
  <text x="620" y="200" text-anchor="middle" font-size="12" fill="#F44336" opacity="0.5">(almost surely unsatisfiable)</text>

  <!-- Threshold line -->
  <line x1="460" y1="70" x2="460" y2="380" stroke="#FF9800" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="460" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF9800">α_k ≈ 4.267</text>
  <text x="460" y="435" text-anchor="middle" font-size="11" fill="#FF9800">(3-SAT threshold)</text>

  <!-- Spectral gap annotation -->
  <rect x="500" y="440" width="280" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <text x="640" y="460" text-anchor="middle" font-size="11" fill="#1565C0">Spectral gap λ₁ - λ₂ collapses</text>
  <text x="640" y="478" text-anchor="middle" font-size="11" fill="#1565C0">from Θ(1) → 0 at threshold</text>

  <!-- Parseval box -->
  <rect x="80" y="440" width="280" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="220" y="460" text-anchor="middle" font-size="11" fill="#2E7D32">Parseval: Σ E_k = E_total</text>
  <text x="220" y="478" text-anchor="middle" font-size="11" fill="#2E7D32">Spectral energy is conserved</text>
</svg>
