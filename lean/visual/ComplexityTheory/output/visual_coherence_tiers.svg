<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="tier0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tier1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tier2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tier3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E57373;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">Coherence-Stratified Complexity Hierarchy</text>

  <!-- Tier 0 -->
  <rect x="50" y="60" width="700" height="90" rx="10" fill="url(#tier0)" opacity="0.9"/>
  <text x="80" y="90" font-size="18" font-weight="bold" fill="white">Tier 0: Locally Decidable</text>
  <text x="80" y="112" font-size="13" fill="white">Communication: O(1) · Circuit Depth: O(1)</text>
  <text x="80" y="132" font-size="12" fill="white" opacity="0.9">Examples: Local pixel check, constant functions, parity of single bit</text>
  <text x="680" y="100" font-size="28" font-weight="bold" fill="white" opacity="0.4">⊕</text>

  <!-- Arrow -->
  <path d="M400 150 L400 165" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="162" font-size="11" fill="#666">⊂</text>

  <!-- Tier 1 -->
  <rect x="50" y="170" width="700" height="90" rx="10" fill="url(#tier1)" opacity="0.9"/>
  <text x="80" y="200" font-size="18" font-weight="bold" fill="white">Tier 1: Bounded Coordination</text>
  <text x="80" y="222" font-size="13" fill="white">Communication: O(log n) · Circuit Depth: O(log n)</text>
  <text x="80" y="242" font-size="12" fill="white" opacity="0.9">Examples: Binary search, NC¹ problems, merge step, tree queries</text>
  <text x="680" y="210" font-size="28" font-weight="bold" fill="white" opacity="0.4">🔍</text>

  <!-- Arrow -->
  <text x="420" y="272" font-size="11" fill="#666">⊂</text>

  <!-- Tier 2 -->
  <rect x="50" y="280" width="700" height="90" rx="10" fill="url(#tier2)" opacity="0.9"/>
  <text x="80" y="310" font-size="18" font-weight="bold" fill="white">Tier 2: Polynomial Coordination</text>
  <text x="80" y="332" font-size="13" fill="white">Communication: O(n^c) · Circuit Depth: O(n^c)</text>
  <text x="80" y="352" font-size="12" fill="white" opacity="0.9">Examples: Sorting, matrix multiplication, shortest paths, P problems</text>
  <text x="680" y="320" font-size="28" font-weight="bold" fill="white" opacity="0.4">⚙</text>

  <!-- Arrow -->
  <text x="420" y="382" font-size="11" fill="#666">⊂</text>

  <!-- Tier 3 -->
  <rect x="50" y="390" width="700" height="90" rx="10" fill="url(#tier3)" opacity="0.9"/>
  <text x="80" y="420" font-size="18" font-weight="bold" fill="white">Tier 3: Global Coordination</text>
  <text x="80" y="442" font-size="13" fill="white">Communication: O(2^n) · Circuit Depth: exponential</text>
  <text x="80" y="462" font-size="12" fill="white" opacity="0.9">Examples: SAT, Traveling Salesman, graph coloring, NP-hard problems</text>
  <text x="680" y="430" font-size="28" font-weight="bold" fill="white" opacity="0.4">🔥</text>

  <!-- Side annotation -->
  <text x="780" y="250" text-anchor="middle" font-size="12" fill="#888" transform="rotate(90 780 250)">Increasing coordination complexity →</text>
</svg>
