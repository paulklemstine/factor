<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="850" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">
    Classical ⟷ Tropical Langlands Dictionary
  </text>
  <line x1="100" y1="55" x2="800" y2="55" stroke="#f9ca24" stroke-width="2"/>
  
  <!-- Column Headers -->
  <rect x="50" y="70" width="350" height="40" rx="8" fill="#c44569" opacity="0.8"/>
  <text x="225" y="96" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">CLASSICAL</text>
  
  <rect x="500" y="70" width="350" height="40" rx="8" fill="#2c7873" opacity="0.8"/>
  <text x="675" y="96" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">TROPICAL</text>
  
  <!-- Arrow column -->
  <text x="450" y="96" text-anchor="middle" fill="#f9ca24" font-size="20">⟷</text>
  
  <!-- Row function -->
  <!-- Row 1: Base field -->
  <rect x="50" y="120" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="140" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Base Field</text>
  <text x="225" y="157" text-anchor="middle" fill="#dfe6e9" font-size="12">ℂ (complex numbers)</text>
  
  <text x="450" y="147" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="120" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="140" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Tropical Semiring</text>
  <text x="675" y="157" text-anchor="middle" fill="#dfe6e9" font-size="12">𝕋 = (ℝ ∪ {∞}, min, +)</text>
  
  <!-- Row 2: Addition -->
  <rect x="50" y="175" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="195" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Addition</text>
  <text x="225" y="212" text-anchor="middle" fill="#dfe6e9" font-size="12">a + b</text>
  
  <text x="450" y="202" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="175" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="195" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Tropical Addition</text>
  <text x="675" y="212" text-anchor="middle" fill="#dfe6e9" font-size="12">min(a, b)</text>
  
  <!-- Row 3: Multiplication -->
  <rect x="50" y="230" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="250" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Multiplication</text>
  <text x="225" y="267" text-anchor="middle" fill="#dfe6e9" font-size="12">a × b</text>
  
  <text x="450" y="257" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="230" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="250" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Tropical Multiplication</text>
  <text x="675" y="267" text-anchor="middle" fill="#dfe6e9" font-size="12">a + b</text>
  
  <!-- Row 4: Matrix product -->
  <rect x="50" y="285" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="305" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Matrix Multiplication</text>
  <text x="225" y="322" text-anchor="middle" fill="#dfe6e9" font-size="12">C_ik = Σⱼ A_ij · B_jk</text>
  
  <text x="450" y="312" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="285" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="305" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Shortest-Path Product</text>
  <text x="675" y="322" text-anchor="middle" fill="#dfe6e9" font-size="12">C_ik = min_j (A_ij + B_jk)</text>
  
  <!-- Row 5: Determinant -->
  <rect x="50" y="340" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="360" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Determinant</text>
  <text x="225" y="377" text-anchor="middle" fill="#dfe6e9" font-size="12">Σ_σ sgn(σ) Π_i A_i,σ(i)</text>
  
  <text x="450" y="367" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="340" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="360" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Optimal Assignment</text>
  <text x="675" y="377" text-anchor="middle" fill="#dfe6e9" font-size="12">min_σ Σ_i A_i,σ(i)</text>
  
  <!-- Row 6: L-function -->
  <rect x="50" y="395" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="415" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">L-function</text>
  <text x="225" y="432" text-anchor="middle" fill="#dfe6e9" font-size="12">L(s) = Π_p L_p(s) (Euler product)</text>
  
  <text x="450" y="422" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="395" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="415" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Tropical L-function</text>
  <text x="675" y="432" text-anchor="middle" fill="#dfe6e9" font-size="12">L(s) = Σ_p L_p(s) (convex PL)</text>
  
  <!-- Row 7: Fourier -->
  <rect x="50" y="450" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="470" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Fourier Transform</text>
  <text x="225" y="487" text-anchor="middle" fill="#dfe6e9" font-size="12">f̂(ξ) = ∫ f(x)e^{-2πixξ} dx</text>
  
  <text x="450" y="477" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="450" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="470" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Legendre-Fenchel</text>
  <text x="675" y="487" text-anchor="middle" fill="#dfe6e9" font-size="12">f*(p) = sup_x(px - f(x))</text>
  
  <!-- Row 8: Convolution -->
  <rect x="50" y="505" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="525" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Convolution</text>
  <text x="225" y="542" text-anchor="middle" fill="#dfe6e9" font-size="12">(f*g)(n) = Σ_k f(k)g(n-k)</text>
  
  <text x="450" y="532" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="505" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="525" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Inf-Convolution</text>
  <text x="675" y="542" text-anchor="middle" fill="#dfe6e9" font-size="12">(f⋆g)(n) = inf_k (f(k) + g(n-k))</text>
  
  <!-- Row 9: Curves -->
  <rect x="50" y="560" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="580" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Algebraic Curves</text>
  <text x="225" y="597" text-anchor="middle" fill="#dfe6e9" font-size="12">Riemann surfaces</text>
  
  <text x="450" y="587" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="560" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="580" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Metric Graphs</text>
  <text x="675" y="597" text-anchor="middle" fill="#dfe6e9" font-size="12">Graphs with edge lengths</text>
  
  <!-- Row 10: Reciprocity -->
  <rect x="50" y="615" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="635" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Langlands Reciprocity</text>
  <text x="225" y="652" text-anchor="middle" fill="#dfe6e9" font-size="12">Automorphic ↔ Galois reps</text>
  
  <text x="450" y="642" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="615" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="635" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Slope Matching</text>
  <text x="675" y="652" text-anchor="middle" fill="#dfe6e9" font-size="12">Sorted slopes = sorted breaks</text>
  
  <!-- Row 11: Duality -->
  <rect x="50" y="670" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="225" y="690" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Langlands Duality</text>
  <text x="225" y="707" text-anchor="middle" fill="#dfe6e9" font-size="12">G ↔ Ĝ (dual group)</text>
  
  <text x="450" y="697" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="670" width="350" height="45" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="675" y="690" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Kantorovich Duality</text>
  <text x="675" y="707" text-anchor="middle" fill="#dfe6e9" font-size="12">Optimal transport primal ↔ dual</text>
  
  <!-- Row 12: Trace Formula -->
  <rect x="50" y="725" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="225" y="745" text-anchor="middle" fill="#ff7979" font-size="13" font-weight="bold">Arthur-Selberg Trace Formula</text>
  <text x="225" y="762" text-anchor="middle" fill="#dfe6e9" font-size="12">Σ spectral = Σ geometric</text>
  
  <text x="450" y="752" text-anchor="middle" fill="#f9ca24" font-size="16">→</text>
  
  <rect x="500" y="725" width="350" height="45" rx="5" fill="#2d3436" opacity="0.5"/>
  <text x="675" y="745" text-anchor="middle" fill="#7bed9f" font-size="13" font-weight="bold">Tropical Trace Formula</text>
  <text x="675" y="762" text-anchor="middle" fill="#dfe6e9" font-size="12">inf spectral = inf geometric</text>
  
  <!-- Footer -->
  <text x="450" y="810" text-anchor="middle" fill="#b2bec3" font-size="12">
    Key insight: Tropicalization = taking valuations, and the Langlands program is built on valuations
  </text>
  <text x="450" y="835" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">
    All correspondences formalized and machine-verified in Lean 4
  </text>
</svg>
