<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1a3e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <text x="400" y="35" text-anchor="middle" fill="#ffd93d" font-size="20" font-weight="bold">
    Ihara Zeta Function &amp; Ramanujan Graphs
  </text>

  <!-- Petersen Graph Drawing -->
  <g transform="translate(200, 200)" filter="url(#glow2)">
    <text x="0" y="-120" text-anchor="middle" fill="#aaa" font-size="14" font-weight="bold">Petersen Graph</text>

    <!-- Outer pentagon -->
    <polygon points="0,-95 90,-29 56,77 -56,77 -90,-29" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <!-- Inner pentagram -->
    <polygon points="0,-50 47,-15 29,40 -29,40 -47,-15" fill="none" stroke="#6bcf7f" stroke-width="2"/>
    <!-- Spokes -->
    <line x1="0" y1="-95" x2="0" y2="-50" stroke="#ffd93d" stroke-width="1.5"/>
    <line x1="90" y1="-29" x2="47" y2="-15" stroke="#ffd93d" stroke-width="1.5"/>
    <line x1="56" y1="77" x2="29" y2="40" stroke="#ffd93d" stroke-width="1.5"/>
    <line x1="-56" y1="77" x2="-29" y2="40" stroke="#ffd93d" stroke-width="1.5"/>
    <line x1="-90" y1="-29" x2="-47" y2="-15" stroke="#ffd93d" stroke-width="1.5"/>

    <!-- Vertices -->
    <circle cx="0" cy="-95" r="5" fill="#ff6b6b"/>
    <circle cx="90" cy="-29" r="5" fill="#ff6b6b"/>
    <circle cx="56" cy="77" r="5" fill="#ff6b6b"/>
    <circle cx="-56" cy="77" r="5" fill="#ff6b6b"/>
    <circle cx="-90" cy="-29" r="5" fill="#ff6b6b"/>
    <circle cx="0" cy="-50" r="5" fill="#6bcf7f"/>
    <circle cx="47" cy="-15" r="5" fill="#6bcf7f"/>
    <circle cx="29" cy="40" r="5" fill="#6bcf7f"/>
    <circle cx="-29" cy="40" r="5" fill="#6bcf7f"/>
    <circle cx="-47" cy="-15" r="5" fill="#6bcf7f"/>
  </g>

  <!-- Eigenvalue spectrum -->
  <g transform="translate(500, 100)">
    <text x="120" y="0" text-anchor="middle" fill="#aaa" font-size="14" font-weight="bold">Eigenvalue Spectrum</text>

    <!-- Axis -->
    <line x1="0" y1="30" x2="240" y2="30" stroke="#555" stroke-width="1"/>
    <text x="0" y="50" fill="#777" font-size="10">-3</text>
    <text x="60" y="50" fill="#777" font-size="10">-2</text>
    <text x="120" y="50" fill="#777" font-size="10">0</text>
    <text x="180" y="50" fill="#777" font-size="10">2</text>
    <text x="240" y="50" fill="#777" font-size="10">3</text>

    <!-- Ramanujan bound -->
    <rect x="47" y="15" width="146" height="30" fill="#6bcf7f" opacity="0.15" rx="3"/>
    <line x1="47" y1="15" x2="47" y2="45" stroke="#6bcf7f" stroke-width="2" stroke-dasharray="4"/>
    <line x1="193" y1="15" x2="193" y2="45" stroke="#6bcf7f" stroke-width="2" stroke-dasharray="4"/>
    <text x="120" y="70" text-anchor="middle" fill="#6bcf7f" font-size="10">2√q = 2√2 ≈ 2.83</text>

    <!-- Eigenvalues -->
    <circle cx="60" cy="30" r="6" fill="#ff6b6b" opacity="0.9"/>
    <text x="60" y="25" text-anchor="middle" fill="#ff6b6b" font-size="9">×4</text>
    <text x="60" y="85" text-anchor="middle" fill="#aaa" font-size="9">λ = -2</text>

    <circle cx="160" cy="30" r="6" fill="#ffd93d" opacity="0.9"/>
    <text x="160" y="25" text-anchor="middle" fill="#ffd93d" font-size="9">×5</text>
    <text x="160" y="85" text-anchor="middle" fill="#aaa" font-size="9">λ = 1</text>

    <circle cx="240" cy="30" r="6" fill="#60a5fa" opacity="0.9"/>
    <text x="240" y="25" text-anchor="middle" fill="#60a5fa" font-size="9">×1</text>
    <text x="240" y="85" text-anchor="middle" fill="#aaa" font-size="9">λ = 3</text>

    <text x="120" y="110" text-anchor="middle" fill="#6bcf7f" font-size="12" font-weight="bold">
      ✓ RAMANUJAN
    </text>
    <text x="120" y="130" text-anchor="middle" fill="#aaa" font-size="10">
      All non-trivial |λ| ≤ 2√2
    </text>
  </g>

  <!-- Formulas -->
  <g transform="translate(400, 280)">
    <rect x="-200" y="0" width="400" height="180" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">Key Formulas (Formally Verified)</text>

    <text x="0" y="55" text-anchor="middle" fill="#ddd" font-size="13">
      Ihara matrix: I(G,u) = I - uA + u²(D - I)
    </text>
    <text x="0" y="80" text-anchor="middle" fill="#ddd" font-size="13">
      Regular: I(G,u) = (1 + qu²)I - uA
    </text>
    <text x="0" y="105" text-anchor="middle" fill="#ddd" font-size="13">
      ζ_G(u)⁻¹ = (1 - u²)^{r-1} · det(I(G,u))
    </text>
    <text x="0" y="130" text-anchor="middle" fill="#ddd" font-size="13">
      Ramanujan: |λ| ≤ 2√q  (graph RH)
    </text>
    <text x="0" y="155" text-anchor="middle" fill="#ddd" font-size="13">
      |E| = n(q+1)/2   Laplacian·1 = 0
    </text>
    <text x="0" y="175" text-anchor="middle" fill="#888" font-size="10">
      Proved in Lean 4 / Mathlib
    </text>
  </g>
</svg>
