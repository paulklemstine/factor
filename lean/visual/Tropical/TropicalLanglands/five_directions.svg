<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#58a6ff" font-size="24" font-weight="bold">
    Tropical Langlands Program: Five New Directions
  </text>
  <text x="500" y="70" text-anchor="middle" fill="#8b949e" font-size="13">
    All theorems formally verified in Lean 4 with Mathlib — zero sorry statements
  </text>

  <!-- Center hub -->
  <circle cx="500" cy="370" r="60" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#glow2)"/>
  <text x="500" y="360" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Tropical</text>
  <text x="500" y="380" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Langlands</text>

  <!-- Direction 1: Exceptional Groups (top) -->
  <line x1="500" y1="310" x2="500" y2="160" stroke="#f97583" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="350" y="100" width="300" height="70" rx="12" fill="#21262d" stroke="#f97583" stroke-width="2"/>
  <text x="500" y="125" text-anchor="middle" fill="#f97583" font-size="15" font-weight="bold">1. Exceptional Groups</text>
  <text x="500" y="145" text-anchor="middle" fill="#c9d1d9" font-size="11">E₆ (72 roots) · E₇ (126) · E₈ (240)</text>
  <text x="500" y="160" text-anchor="middle" fill="#8b949e" font-size="10">15 theorems ✅</text>

  <!-- Direction 2: Theta Correspondence (top-right) -->
  <line x1="548" y1="325" x2="730" y2="200" stroke="#d2a8ff" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="680" y="140" width="280" height="70" rx="12" fill="#21262d" stroke="#d2a8ff" stroke-width="2"/>
  <text x="820" y="165" text-anchor="middle" fill="#d2a8ff" font-size="15" font-weight="bold">2. Theta Correspondence</text>
  <text x="820" y="185" text-anchor="middle" fill="#c9d1d9" font-size="11">Howe duality · Weil representation</text>
  <text x="820" y="200" text-anchor="middle" fill="#8b949e" font-size="10">12 theorems ✅</text>

  <!-- Direction 3: Periods & Motives (bottom-right) -->
  <line x1="548" y1="410" x2="730" y2="500" stroke="#7ee787" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="680" y="470" width="280" height="70" rx="12" fill="#21262d" stroke="#7ee787" stroke-width="2"/>
  <text x="820" y="495" text-anchor="middle" fill="#7ee787" font-size="15" font-weight="bold">3. Periods &amp; Motives</text>
  <text x="820" y="515" text-anchor="middle" fill="#c9d1d9" font-size="11">Galois invariance · Hodge symmetry</text>
  <text x="820" y="530" text-anchor="middle" fill="#8b949e" font-size="10">14 theorems ✅</text>

  <!-- Direction 4: Quantum Crystals (bottom-left) -->
  <line x1="452" y1="410" x2="270" y2="500" stroke="#ffa657" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="40" y="470" width="280" height="70" rx="12" fill="#21262d" stroke="#ffa657" stroke-width="2"/>
  <text x="180" y="495" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="bold">4. Quantum Crystals</text>
  <text x="180" y="515" text-anchor="middle" fill="#c9d1d9" font-size="11">R-matrix · Yang-Baxter · Kashiwara</text>
  <text x="180" y="530" text-anchor="middle" fill="#8b949e" font-size="10">12 theorems ✅</text>

  <!-- Direction 5: Algorithms (top-left) -->
  <line x1="452" y1="325" x2="270" y2="200" stroke="#79c0ff" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="40" y="140" width="280" height="70" rx="12" fill="#21262d" stroke="#79c0ff" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="bold">5. Algorithms</text>
  <text x="180" y="185" text-anchor="middle" fill="#c9d1d9" font-size="11">Assignment · Bellman-Ford · Sorting</text>
  <text x="180" y="200" text-anchor="middle" fill="#8b949e" font-size="10">12 theorems ✅</text>

  <!-- Cross-connections -->
  <g stroke="#8b949e" stroke-width="1" opacity="0.3" stroke-dasharray="3,6">
    <line x1="320" y1="175" x2="680" y2="175"/><!-- Algo ↔ Theta -->
    <line x1="320" y1="505" x2="680" y2="505"/><!-- Quantum ↔ Motives -->
    <line x1="180" y1="210" x2="180" y2="470"/><!-- Algo ↔ Quantum -->
    <line x1="820" y1="210" x2="820" y2="470"/><!-- Theta ↔ Motives -->
  </g>

  <!-- Bottom summary -->
  <rect x="100" y="600" width="800" height="80" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="625" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">
    Total: 65+ machine-verified theorems across 10 Lean 4 files
  </text>
  <text x="500" y="648" text-anchor="middle" fill="#8b949e" font-size="12">
    Standard axioms only: propext · Classical.choice · Quot.sound
  </text>
  <text x="500" y="668" text-anchor="middle" fill="#8b949e" font-size="11">
    Tropical semiring 𝕋 = (ℝ ∪ {∞}, min, +) — where algebra becomes geometry becomes algorithms
  </text>
</svg>
