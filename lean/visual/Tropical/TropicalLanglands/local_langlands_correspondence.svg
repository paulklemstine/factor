<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb" />
    </marker>
  </defs>

  <rect width="800" height="450" fill="url(#bg3)" rx="10"/>

  <text x="400" y="40" text-anchor="middle" fill="#53d8fb" font-size="22" font-weight="bold" font-family="Georgia">
    Tropical Local Langlands Correspondence
  </text>

  <!-- Galois Side -->
  <rect x="40" y="80" width="300" height="200" rx="12" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="190" y="110" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold" font-family="Georgia">Galois Side</text>
  <text x="190" y="140" text-anchor="middle" fill="#a8a8b8" font-size="13" font-family="monospace">Weil-Deligne Rep ρ</text>
  <text x="190" y="165" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Frobenius eigenvalues:</text>
  <text x="190" y="185" text-anchor="middle" fill="#53d8fb" font-size="16" font-weight="bold" font-family="monospace">(λ₁ ≤ λ₂ ≤ ... ≤ λₙ)</text>
  <text x="190" y="210" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Monodromy rank: N ≤ n</text>
  <text x="190" y="235" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Newton polygon: convex ✅</text>
  <text x="190" y="260" text-anchor="middle" fill="#53d8fb" font-size="13" font-family="monospace">L(s,ρ) = (Σλᵢ)·s</text>

  <!-- Arrow -->
  <line x1="350" y1="180" x2="450" y2="180" stroke="#53d8fb" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="400" y="170" text-anchor="middle" fill="#53d8fb" font-size="14" font-weight="bold" font-family="Georgia">LLC</text>
  <text x="400" y="200" text-anchor="middle" fill="#a8a8b8" font-size="11" font-family="monospace">(= identity)</text>

  <!-- Automorphic Side -->
  <rect x="460" y="80" width="300" height="200" rx="12" fill="none" stroke="#0f3460" stroke-width="2"/>
  <text x="610" y="110" text-anchor="middle" fill="#53d8fb" font-size="18" font-weight="bold" font-family="Georgia">Automorphic Side</text>
  <text x="610" y="140" text-anchor="middle" fill="#a8a8b8" font-size="13" font-family="monospace">Smooth Rep π</text>
  <text x="610" y="165" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Satake parameters:</text>
  <text x="610" y="185" text-anchor="middle" fill="#53d8fb" font-size="16" font-weight="bold" font-family="monospace">(μ₁ ≤ μ₂ ≤ ... ≤ μₙ)</text>
  <text x="610" y="210" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Conductor = N</text>
  <text x="610" y="235" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Sorted: ✅</text>
  <text x="610" y="260" text-anchor="middle" fill="#53d8fb" font-size="13" font-family="monospace">L(s,π) = (Σμᵢ)·s</text>

  <!-- Properties -->
  <rect x="40" y="310" width="720" height="120" rx="10" fill="none" stroke="#0f3460" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" fill="#53d8fb" font-size="16" font-weight="bold" font-family="Georgia">
    Machine-Verified Properties
  </text>

  <text x="200" y="370" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">L(0) = 0 ✅</text>
  <text x="400" y="370" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">L(s+t) = L(s)+L(t) ✅</text>
  <text x="600" y="370" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">LLC preserves L ✅</text>

  <text x="200" y="395" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">L(s)+L(1-s) = Σλᵢ ✅</text>
  <text x="400" y="395" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">Unramified ⟹ cond=0 ✅</text>
  <text x="600" y="395" text-anchor="middle" fill="#a8a8b8" font-size="12" font-family="monospace">L(ρ₁⊕ρ₂) additive ✅</text>

  <text x="400" y="420" text-anchor="middle" fill="#e94560" font-size="12" font-family="monospace">
    Local-global compatibility: global restriction preserves L-factors ✅
  </text>
</svg>
