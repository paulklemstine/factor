<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="url(#bg4)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">
    Legendre-Fenchel Duality: The Tropical Fourier Transform
  </text>
  
  <!-- LEFT PLOT: f(x) = x²/2 -->
  <g transform="translate(50, 50)">
    <!-- Plot area -->
    <rect x="0" y="0" width="350" height="300" fill="#111" rx="10" stroke="#333"/>
    <text x="175" y="25" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">
      f(x) = x²/2
    </text>
    <text x="175" y="45" text-anchor="middle" fill="#ff9999" font-size="12">
      "Automorphic Side"
    </text>
    
    <!-- Axes -->
    <line x1="30" y1="250" x2="320" y2="250" stroke="#555" stroke-width="1.5"/>
    <line x1="175" y1="50" x2="175" y2="270" stroke="#555" stroke-width="1.5"/>
    <text x="320" y="265" fill="#888" font-size="11">x</text>
    <text x="185" y="60" fill="#888" font-size="11">f(x)</text>
    
    <!-- Parabola f(x) = x²/2 -->
    <!-- Scale: x in [-3,3] → px in [30, 320], so px = 175 + x*48 -->
    <!-- y: f in [0, 4.5] → py = 250 - f*40 -->
    <path d="M 31,68 Q 55,125 79,170 Q 103,205 127,230 Q 151,245 175,250 Q 199,245 223,230 Q 247,205 271,170 Q 295,125 319,68"
          stroke="#ff6b6b" stroke-width="2.5" fill="none" filter="url(#glow4)"/>
    
    <!-- Supporting line at x=1: tangent y = x - 0.5 -->
    <line x1="80" y1="290" x2="320" y2="98" stroke="#f9ca24" stroke-width="1" stroke-dasharray="5,5" opacity="0.6"/>
    <circle cx="223" cy="230" r="4" fill="#f9ca24"/>
    <text x="230" y="225" fill="#f9ca24" font-size="10">slope p</text>
    
    <!-- Labels -->
    <text x="175" y="290" text-anchor="middle" fill="#888" font-size="10">0</text>
  </g>
  
  <!-- CENTER: Transform Arrow -->
  <g transform="translate(420, 140)">
    <rect x="-30" y="-20" width="60" height="100" rx="10" fill="#6c5ce7" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">f*</text>
    <text x="0" y="25" text-anchor="middle" fill="#a29bfe" font-size="10">Legendre</text>
    <text x="0" y="38" text-anchor="middle" fill="#a29bfe" font-size="10">Fenchel</text>
    
    <!-- Bidirectional arrow -->
    <polygon points="-15,-30 0,-45 15,-30" fill="#a29bfe" opacity="0.5"/>
    <polygon points="-15,70 0,85 15,70" fill="#a29bfe" opacity="0.5"/>
    <text x="0" y="55" text-anchor="middle" fill="#a29bfe" font-size="9">f** = f</text>
  </g>
  
  <!-- RIGHT PLOT: f*(p) = p²/2 -->
  <g transform="translate(500, 50)">
    <!-- Plot area -->
    <rect x="0" y="0" width="350" height="300" fill="#111" rx="10" stroke="#333"/>
    <text x="175" y="25" text-anchor="middle" fill="#4ecdc4" font-size="16" font-weight="bold">
      f*(p) = p²/2
    </text>
    <text x="175" y="45" text-anchor="middle" fill="#7bed9f" font-size="12">
      "Galois Side"
    </text>
    
    <!-- Axes -->
    <line x1="30" y1="250" x2="320" y2="250" stroke="#555" stroke-width="1.5"/>
    <line x1="175" y1="50" x2="175" y2="270" stroke="#555" stroke-width="1.5"/>
    <text x="320" y="265" fill="#888" font-size="11">p</text>
    <text x="185" y="60" fill="#888" font-size="11">f*(p)</text>
    
    <!-- Parabola f*(p) = p²/2 (same shape!) -->
    <path d="M 31,68 Q 55,125 79,170 Q 103,205 127,230 Q 151,245 175,250 Q 199,245 223,230 Q 247,205 271,170 Q 295,125 319,68"
          stroke="#4ecdc4" stroke-width="2.5" fill="none" filter="url(#glow4)"/>
    
    <!-- Gap annotation -->
    <line x1="223" y1="230" x2="223" y2="250" stroke="#f9ca24" stroke-width="1.5"/>
    <text x="240" y="242" fill="#f9ca24" font-size="10">f*(p)</text>
    
    <!-- Labels -->
    <text x="175" y="290" text-anchor="middle" fill="#888" font-size="10">0</text>
  </g>
  
  <!-- Bottom explanation -->
  <rect x="100" y="370" width="700" height="65" rx="10" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1"/>
  <text x="450" y="393" text-anchor="middle" fill="#fff" font-size="13">
    f*(p) = sup_x(px - f(x))  — Supremum of affine functions → always convex
  </text>
  <text x="450" y="413" text-anchor="middle" fill="#a29bfe" font-size="12">
    Fenchel-Moreau: f** = f for convex lsc functions — the tropical "Fourier inversion"
  </text>
  <text x="450" y="428" text-anchor="middle" fill="#f9ca24" font-size="11">
    Both convexity and biconjugation formally proved in Lean 4 ✓
  </text>
</svg>
