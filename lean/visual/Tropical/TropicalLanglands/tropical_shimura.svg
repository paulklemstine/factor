<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg5)" rx="10"/>

  <text x="400" y="35" text-anchor="middle" fill="#f778ba" font-size="20" font-weight="bold" font-family="Georgia">
    Tropical Shimura Varieties
  </text>

  <!-- Tropical Elliptic Curve (circle) -->
  <rect x="30" y="60" width="220" height="170" rx="8" fill="#1c2128" stroke="#f778ba" stroke-width="1.5"/>
  <text x="140" y="85" text-anchor="middle" fill="#f778ba" font-size="14" font-weight="bold" font-family="Georgia">Tropical Elliptic Curve</text>
  <circle cx="140" cy="150" r="40" fill="none" stroke="#53d8fb" stroke-width="3"/>
  <text x="140" y="155" text-anchor="middle" fill="#53d8fb" font-size="14" font-family="monospace">ℓ</text>
  <text x="140" y="210" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">j = ℓ > 0 ✅</text>
  <text x="140" y="225" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">genus = 1</text>

  <!-- Tropical Abelian Variety (torus) -->
  <rect x="280" y="60" width="220" height="170" rx="8" fill="#1c2128" stroke="#f778ba" stroke-width="1.5"/>
  <text x="390" y="85" text-anchor="middle" fill="#f778ba" font-size="14" font-weight="bold" font-family="Georgia">Tropical Abelian Variety</text>
  <!-- Draw a torus-like shape -->
  <ellipse cx="390" cy="140" rx="60" ry="25" fill="none" stroke="#53d8fb" stroke-width="2"/>
  <ellipse cx="390" cy="140" rx="20" ry="25" fill="none" stroke="#53d8fb" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="390" y="185" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">Ω = period matrix</text>
  <text x="390" y="200" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">symmetric, diag > 0</text>
  <text x="390" y="215" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">tr(Ω) > 0 ✅</text>

  <!-- Siegel Space (convex cone) -->
  <rect x="530" y="60" width="240" height="170" rx="8" fill="#1c2128" stroke="#f778ba" stroke-width="1.5"/>
  <text x="650" y="85" text-anchor="middle" fill="#f778ba" font-size="14" font-weight="bold" font-family="Georgia">Tropical Siegel Space</text>
  <!-- Convex cone -->
  <polygon points="650,200 580,200 615,110 685,110 720,200" fill="none" stroke="#53d8fb" stroke-width="2"/>
  <text x="650" y="160" text-anchor="middle" fill="#53d8fb" font-size="12" font-family="monospace">Hg</text>
  <text x="650" y="218" text-anchor="middle" fill="#7ee787" font-size="11" font-family="monospace">Convex ✅ Nonempty ✅</text>

  <!-- Modular Forms -->
  <rect x="30" y="260" width="230" height="170" rx="8" fill="#1c2128" stroke="#a371f7" stroke-width="1.5"/>
  <text x="145" y="285" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold" font-family="Georgia">Tropical Modular Forms</text>
  <text x="145" y="310" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">Eₖ(z) = k·z</text>
  <!-- Draw piecewise linear function -->
  <line x1="60" y1="380" x2="230" y2="380" stroke="#484f58" stroke-width="1"/>
  <line x1="60" y1="380" x2="60" y2="320" stroke="#484f58" stroke-width="1"/>
  <line x1="60" y1="370" x2="145" y2="340" stroke="#53d8fb" stroke-width="2"/>
  <line x1="145" y1="340" x2="230" y2="310" stroke="#53d8fb" stroke-width="2"/>
  <text x="145" y="400" text-anchor="middle" fill="#7ee787" font-size="11" font-family="monospace">Eₖ(0)=0 ✅ Linear ✅</text>
  <text x="145" y="420" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">weight k modular form</text>

  <!-- Hecke Operators -->
  <rect x="290" y="260" width="220" height="170" rx="8" fill="#1c2128" stroke="#a371f7" stroke-width="1.5"/>
  <text x="400" y="285" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold" font-family="Georgia">Tropical Hecke T_p</text>
  <text x="400" y="315" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">T_p f(z) =</text>
  <text x="400" y="340" text-anchor="middle" fill="#53d8fb" font-size="14" font-family="monospace">min(f(pz), f(z)+p)</text>
  <text x="400" y="380" text-anchor="middle" fill="#7ee787" font-size="11" font-family="monospace">Monotone ✅</text>
  <text x="400" y="400" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">f ≤ g ⟹ T_p f ≤ T_p g</text>
  <text x="400" y="420" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">13 theorems verified</text>

  <!-- CM Points -->
  <rect x="540" y="260" width="230" height="170" rx="8" fill="#1c2128" stroke="#a371f7" stroke-width="1.5"/>
  <text x="655" y="285" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold" font-family="Georgia">CM Points & Levels</text>
  <text x="655" y="315" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">CM field degree = 2g</text>
  <text x="655" y="340" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">g=1: degree = 2 ✅</text>
  <text x="655" y="370" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">Level N structure:</text>
  <text x="655" y="390" text-anchor="middle" fill="#53d8fb" font-size="12" font-family="monospace">dim = g(g+1)/2 + ...</text>
  <text x="655" y="415" text-anchor="middle" fill="#7ee787" font-size="11" font-family="monospace">Level 1: g(g+1)/2 ✅</text>
  <text x="655" y="435" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">Tate module symmetric ✅</text>
</svg>
