<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg4)"/>

  <text x="400" y="35" text-anchor="middle" fill="#d2a8ff" font-size="20" font-weight="bold">
    Tropical Theta Correspondence
  </text>

  <!-- Orthogonal side -->
  <rect x="50" y="80" width="280" height="180" rx="15" fill="#21262d" stroke="#f97583" stroke-width="2"/>
  <text x="190" y="110" text-anchor="middle" fill="#f97583" font-size="16" font-weight="bold">
    Tropical Orthogonal
  </text>
  <text x="190" y="135" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Q(x) = Σ xᵢ² ≥ 0 ✅
  </text>
  <text x="190" y="160" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Q(x) = 0 ⟺ x = 0 ✅
  </text>
  <text x="190" y="185" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Weil: Q(-x) = Q(x) ✅
  </text>
  <text x="190" y="210" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Parameters: α ∈ ℝᵐ
  </text>
  <text x="190" y="240" text-anchor="middle" fill="#8b949e" font-size="11">
    m = orthogonal rank
  </text>

  <!-- Symplectic side -->
  <rect x="470" y="80" width="280" height="180" rx="15" fill="#21262d" stroke="#79c0ff" stroke-width="2"/>
  <text x="610" y="110" text-anchor="middle" fill="#79c0ff" font-size="16" font-weight="bold">
    Tropical Symplectic
  </text>
  <text x="610" y="135" text-anchor="middle" fill="#c9d1d9" font-size="12">
    ω(x,y) = -ω(y,x) ✅
  </text>
  <text x="610" y="160" text-anchor="middle" fill="#c9d1d9" font-size="12">
    ω(x,x) = 0 ✅
  </text>
  <text x="610" y="185" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Weil: involution ✅
  </text>
  <text x="610" y="210" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Parameters: β ∈ ℝⁿ
  </text>
  <text x="610" y="240" text-anchor="middle" fill="#8b949e" font-size="11">
    n = symplectic rank
  </text>

  <!-- Theta kernel arrow -->
  <g>
    <line x1="330" y1="140" x2="470" y2="140" stroke="#ffa657" stroke-width="3"/>
    <line x1="470" y1="200" x2="330" y2="200" stroke="#ffa657" stroke-width="3"/>
    <polygon points="470,135 480,140 470,145" fill="#ffa657"/>
    <polygon points="330,195 320,200 330,205" fill="#ffa657"/>
  </g>

  <!-- Theta kernel label -->
  <rect x="348" y="148" width="104" height="42" rx="8" fill="#21262d" stroke="#ffa657" stroke-width="1.5"/>
  <text x="400" y="168" text-anchor="middle" fill="#ffa657" font-size="13" font-weight="bold">Θ(α,β)</text>
  <text x="400" y="183" text-anchor="middle" fill="#ffa657" font-size="10">= (Σαᵢ)(Σβⱼ)</text>

  <!-- Bottom properties -->
  <rect x="100" y="290" width="600" height="90" rx="10" fill="#0d1f0d" stroke="#7ee787" stroke-width="1"/>
  <text x="400" y="315" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="bold">
    Tropical Howe Duality
  </text>
  <text x="400" y="340" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Swap involution: (m,n).swap.swap = (m,n) ✅  |  Size preserved: m·n = n·m ✅
  </text>
  <text x="400" y="365" text-anchor="middle" fill="#c9d1d9" font-size="12">
    Kernel bilinear ✅  |  Kernel commutative ✅  |  Kernel factors ✅
  </text>
</svg>
