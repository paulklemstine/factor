<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="700" height="500" fill="url(#bg4)" rx="10"/>

  <text x="350" y="35" text-anchor="middle" fill="#79c0ff" font-size="20" font-weight="bold" font-family="Georgia">
    Tropical Bruhat-Tits Building for GL₂
  </text>

  <!-- Tree structure (simplified Bruhat-Tits tree) -->
  <!-- Level 0: root -->
  <circle cx="350" cy="100" r="12" fill="#f0883e" stroke="#f0883e" stroke-width="2"/>
  <text x="350" y="85" text-anchor="middle" fill="#f0883e" font-size="11" font-family="monospace">(0,0)</text>

  <!-- Level 1 -->
  <line x1="350" y1="112" x2="200" y2="180" stroke="#484f58" stroke-width="1.5"/>
  <line x1="350" y1="112" x2="350" y2="180" stroke="#484f58" stroke-width="1.5"/>
  <line x1="350" y1="112" x2="500" y2="180" stroke="#484f58" stroke-width="1.5"/>

  <circle cx="200" cy="190" r="10" fill="#79c0ff"/>
  <text x="200" y="175" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">(0,1)</text>
  <circle cx="350" cy="190" r="10" fill="#79c0ff"/>
  <text x="350" y="175" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">(1,1)</text>
  <circle cx="500" cy="190" r="10" fill="#79c0ff"/>
  <text x="500" y="175" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">(0,2)</text>

  <!-- Level 2 branches -->
  <line x1="200" y1="200" x2="120" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="200" y1="200" x2="200" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="200" y1="200" x2="280" y2="260" stroke="#484f58" stroke-width="1"/>

  <circle cx="120" cy="270" r="8" fill="#7ee787"/>
  <circle cx="200" cy="270" r="8" fill="#7ee787"/>
  <circle cx="280" cy="270" r="8" fill="#7ee787"/>

  <line x1="350" y1="200" x2="310" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="350" y1="200" x2="350" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="350" y1="200" x2="390" y2="260" stroke="#484f58" stroke-width="1"/>

  <circle cx="310" cy="270" r="8" fill="#7ee787"/>
  <circle cx="350" cy="270" r="8" fill="#7ee787"/>
  <circle cx="390" cy="270" r="8" fill="#7ee787"/>

  <line x1="500" y1="200" x2="460" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="500" y1="200" x2="500" y2="260" stroke="#484f58" stroke-width="1"/>
  <line x1="500" y1="200" x2="540" y2="260" stroke="#484f58" stroke-width="1"/>

  <circle cx="460" cy="270" r="8" fill="#7ee787"/>
  <circle cx="500" cy="270" r="8" fill="#7ee787"/>
  <circle cx="540" cy="270" r="8" fill="#7ee787"/>

  <!-- Legend -->
  <text x="630" y="100" text-anchor="end" fill="#f0883e" font-size="12" font-family="monospace">● origin</text>
  <text x="630" y="120" text-anchor="end" fill="#79c0ff" font-size="12" font-family="monospace">● depth 1</text>
  <text x="630" y="140" text-anchor="end" fill="#7ee787" font-size="12" font-family="monospace">● depth 2</text>

  <!-- Properties box -->
  <rect x="40" y="310" width="620" height="170" rx="10" fill="#1c2128" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="350" y="340" text-anchor="middle" fill="#79c0ff" font-size="16" font-weight="bold" font-family="Georgia">
    Verified Building Properties
  </text>

  <text x="70" y="370" fill="#8b949e" font-size="13" font-family="monospace">Distance axioms:</text>
  <text x="280" y="370" fill="#7ee787" font-size="13" font-family="monospace">d(v,w) ≥ 0  ✅    d(v,w) = d(w,v)  ✅    d(v,v) = 0  ✅</text>

  <text x="70" y="395" fill="#8b949e" font-size="13" font-family="monospace">Harmonic functions:</text>
  <text x="280" y="395" fill="#7ee787" font-size="13" font-family="monospace">Constant functions are harmonic  ✅</text>

  <text x="70" y="420" fill="#8b949e" font-size="13" font-family="monospace">Spherical:</text>
  <text x="280" y="420" fill="#7ee787" font-size="13" font-family="monospace">φ₀ = 0  ✅    Linear in s  ✅    φₛ(origin) = 0  ✅</text>

  <text x="70" y="445" fill="#8b949e" font-size="13" font-family="monospace">Depth:</text>
  <text x="280" y="445" fill="#7ee787" font-size="13" font-family="monospace">depth(v) ≥ 0  ✅    Origin, int vertices special  ✅</text>

  <text x="70" y="470" fill="#8b949e" font-size="13" font-family="monospace">Iwahori-Hecke:</text>
  <text x="280" y="470" fill="#7ee787" font-size="13" font-family="monospace">min(x, x+q) = x for q &gt; 0  ✅</text>
</svg>
