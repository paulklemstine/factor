<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Tropical L-Functions: Convex Piecewise-Linear
  </text>
  
  <!-- Axes -->
  <line x1="80" y1="400" x2="720" y2="400" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="400" x2="80" y2="60" stroke="#555" stroke-width="2"/>
  <text x="400" y="440" text-anchor="middle" fill="#aaa" font-size="14">s (parameter)</text>
  <text x="40" y="230" text-anchor="middle" fill="#aaa" font-size="14" transform="rotate(-90,40,230)">L(s)</text>
  
  <!-- Grid -->
  <g stroke="#333" stroke-width="0.5">
    <line x1="80" y1="100" x2="720" y2="100"/>
    <line x1="80" y1="200" x2="720" y2="200"/>
    <line x1="80" y1="300" x2="720" y2="300"/>
    <line x1="200" y1="60" x2="200" y2="400"/>
    <line x1="320" y1="60" x2="320" y2="400"/>
    <line x1="440" y1="60" x2="440" y2="400"/>
    <line x1="560" y1="60" x2="560" y2="400"/>
  </g>
  
  <!-- Axis labels -->
  <text x="200" y="420" text-anchor="middle" fill="#888" font-size="11">α₁=1</text>
  <text x="320" y="420" text-anchor="middle" fill="#888" font-size="11">α₂=2</text>
  <text x="440" y="420" text-anchor="middle" fill="#888" font-size="11">α₃=3</text>
  <text x="560" y="420" text-anchor="middle" fill="#888" font-size="11">α₄=5</text>
  
  <!-- Local factors (individual |s - α_i|) -->
  <!-- L_1(s) = |s - 1| : V at s=1 (x=200) -->
  <polyline points="80,320 200,200 720,720" stroke="#ff6b6b" stroke-width="1.5" fill="none" opacity="0.4"
            clip-path="url(#plotClip)"/>
  
  <!-- L_2(s) = |s - 2| : V at s=2 (x=320) -->
  <polyline points="80,380 320,200 720,600" stroke="#4ecdc4" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- L_3(s) = |s - 3| : V at s=3 (x=440) -->
  <polyline points="80,440 440,200 720,480" stroke="#f9ca24" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Clip to plot area -->
  <clipPath id="plotClip">
    <rect x="80" y="60" width="640" height="340"/>
  </clipPath>
  
  <!-- Total L-function: sum of |s - α_i| for α = 1, 2, 3, 5 -->
  <!-- L(s) = |s-1| + |s-2| + |s-3| + |s-5| -->
  <!-- At s=0: 1+2+3+5 = 11 → y = 400 - 11*20 = 180 (scaled) -->
  <!-- At s=1: 0+1+2+4 = 7 → y = 400 - 7*25 = 225 -->
  <!-- At s=2: 1+0+1+3 = 5 → y = 400 - 5*25 = 275 -->
  <!-- At s=3: 2+1+0+2 = 5 → y = 400 - 5*25 = 275 -->
  <!-- At s=5: 4+3+2+0 = 9 → y = 400 - 9*25 = 175 -->
  <!-- Using scale: x = 80 + (s+1)*120/2 = 80 + s*60 + 60, y = 400 - L*25 -->
  <!-- s=-1: L=2+3+4+6=15, x=80, y=400-15*20=100 -->
  <!-- s=0: L=1+2+3+5=11, x=140, y=400-11*20=180 -->
  <!-- s=1: L=0+1+2+4=7, x=200, y=400-7*20=260 -->
  <!-- s=2: L=1+0+1+3=5, x=260, y=400-5*20=300 → but need proper scaling -->
  
  <!-- Let me use proper coordinates: x = 80 + (s+1)*80, y = 400 - L*18 -->
  <g clip-path="url(#plotClip)">
    <polyline 
      points="80,130 160,202 200,238 240,274 280,292 320,292 360,292 400,274 440,256 480,238 520,220 560,202 640,166 720,130"
      stroke="#fff" stroke-width="3" fill="none" filter="url(#glow)"/>
  </g>
  
  <!-- Slope break markers -->
  <circle cx="200" cy="238" r="5" fill="#ff6b6b" stroke="#fff" stroke-width="1.5"/>
  <circle cx="320" cy="292" r="5" fill="#4ecdc4" stroke="#fff" stroke-width="1.5"/>
  <circle cx="440" cy="256" r="5" fill="#f9ca24" stroke="#fff" stroke-width="1.5"/>
  <circle cx="560" cy="202" r="5" fill="#a29bfe" stroke="#fff" stroke-width="1.5"/>
  
  <!-- Minimum indicator -->
  <line x1="300" y1="292" x2="300" y2="400" stroke="#00b894" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="300" y="450" text-anchor="middle" fill="#00b894" font-size="11">minimum</text>
  
  <!-- Legend -->
  <rect x="540" y="65" width="170" height="120" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <line x1="555" y1="85" x2="580" y2="85" stroke="#ff6b6b" stroke-width="2"/>
  <text x="590" y="89" fill="#ff6b6b" font-size="11">|s - α₁|</text>
  <line x1="555" y1="105" x2="580" y2="105" stroke="#4ecdc4" stroke-width="2"/>
  <text x="590" y="109" fill="#4ecdc4" font-size="11">|s - α₂|</text>
  <line x1="555" y1="125" x2="580" y2="125" stroke="#f9ca24" stroke-width="2"/>
  <text x="590" y="129" fill="#f9ca24" font-size="11">|s - α₃|</text>
  <line x1="555" y1="145" x2="580" y2="145" stroke="#a29bfe" stroke-width="2"/>
  <text x="590" y="149" fill="#a29bfe" font-size="11">|s - α₄|</text>
  <line x1="555" y1="170" x2="580" y2="170" stroke="#fff" stroke-width="3"/>
  <text x="590" y="174" fill="#fff" font-size="11" font-weight="bold">L(s) = Σ local</text>
  
  <!-- Annotation -->
  <text x="400" y="475" text-anchor="middle" fill="#b2bec3" font-size="12">
    L(s) = Σᵢ |s - αᵢ| is convex PL — the "tropical Euler product"
  </text>
  <text x="400" y="495" text-anchor="middle" fill="#f9ca24" font-size="12">
    Slope breaks at Satake parameters α₁ &lt; α₂ &lt; α₃ &lt; α₄ — proved convex in Lean ✓
  </text>
</svg>
