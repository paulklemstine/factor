<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg1)" rx="10"/>

  <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1565C0">
    Tropical vs Classical Arithmetic
  </text>

  <!-- Classical side -->
  <rect x="30" y="60" width="350" height="180" rx="12" fill="white" stroke="#1976D2" stroke-width="2"/>
  <text x="205" y="88" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976D2">Classical (ℝ, +, ×)</text>

  <text x="55" y="118" font-family="monospace" font-size="14" fill="#333">3 + 5 = 8</text>
  <text x="55" y="143" font-family="monospace" font-size="14" fill="#333">3 × 5 = 15</text>
  <text x="55" y="168" font-family="monospace" font-size="14" fill="#333">Additive identity: 0</text>
  <text x="55" y="193" font-family="monospace" font-size="14" fill="#333">Mult. identity: 1</text>
  <text x="55" y="218" font-family="monospace" font-size="14" fill="#333">Additive inverse: −a</text>

  <!-- Tropical side -->
  <rect x="420" y="60" width="350" height="180" rx="12" fill="white" stroke="#2E7D32" stroke-width="2"/>
  <text x="595" y="88" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2E7D32">Tropical (ℝ∪{−∞}, max, +)</text>

  <text x="445" y="118" font-family="monospace" font-size="14" fill="#333">3 ⊕ 5 = max(3,5) = 5</text>
  <text x="445" y="143" font-family="monospace" font-size="14" fill="#333">3 ⊗ 5 = 3 + 5 = 8</text>
  <text x="445" y="168" font-family="monospace" font-size="14" fill="#333">Additive identity: −∞</text>
  <text x="445" y="193" font-family="monospace" font-size="14" fill="#333">Mult. identity: 0</text>
  <text x="445" y="218" font-family="monospace" font-size="14" fill="#333">No additive inverse!</text>

  <!-- Arrow between -->
  <text x="400" y="155" text-anchor="middle" font-family="Arial" font-size="24" fill="#9C27B0">⟺</text>

  <!-- Properties comparison -->
  <rect x="30" y="260" width="740" height="210" rx="12" fill="white" stroke="#666" stroke-width="1"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Key Properties (All Formally Verified)</text>

  <!-- Property table -->
  <text x="60" y="320" font-family="Arial" font-size="13" font-weight="bold" fill="#1976D2">Classical</text>
  <text x="400" y="320" font-family="Arial" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Property</text>
  <text x="650" y="320" font-family="Arial" font-size="13" font-weight="bold" fill="#2E7D32">Tropical</text>
  <line x1="50" y1="328" x2="750" y2="328" stroke="#ccc" stroke-width="1"/>

  <text x="60" y="350" font-family="monospace" font-size="12" fill="#333">a + a = 2a</text>
  <text x="400" y="350" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Idempotency</text>
  <text x="650" y="350" font-family="monospace" font-size="12" fill="#2E7D32">a ⊕ a = a ✓</text>

  <text x="60" y="375" font-family="monospace" font-size="12" fill="#333">a(b+c) = ab+ac</text>
  <text x="400" y="375" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Distributivity</text>
  <text x="650" y="375" font-family="monospace" font-size="12" fill="#2E7D32">a⊗(b⊕c) = (a⊗b)⊕(a⊗c) ✓</text>

  <text x="60" y="400" font-family="monospace" font-size="12" fill="#333">det ≠ perm (usually)</text>
  <text x="400" y="400" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Det vs Perm</text>
  <text x="650" y="400" font-family="monospace" font-size="12" fill="#2E7D32">tropDet = tropPerm ✓</text>

  <text x="60" y="425" font-family="monospace" font-size="12" fill="#333">E[X] = Σ p(i)·X(i)</text>
  <text x="400" y="425" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Expectation</text>
  <text x="650" y="425" font-family="monospace" font-size="12" fill="#2E7D32">E_trop = max(logP+X) ✓</text>

  <text x="60" y="450" font-family="monospace" font-size="12" fill="#333">Matrix mult: Σ a·b</text>
  <text x="400" y="450" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Matrix Multiply</text>
  <text x="650" y="450" font-family="monospace" font-size="12" fill="#2E7D32">max(a+b) = shortest path ✓</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">
    All ✓ marks indicate formally verified theorems in Lean 4
  </text>
</svg>
