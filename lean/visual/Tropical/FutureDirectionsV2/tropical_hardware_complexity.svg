<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="900" height="650" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#58a6ff" font-size="22" font-weight="bold" font-family="Arial">
    Tropical Hardware &amp; Complexity Theory
  </text>
  
  <!-- Left Column: Hardware -->
  <rect x="20" y="55" width="420" height="280" rx="12" fill="none" stroke="#f78166" stroke-width="2"/>
  <text x="230" y="80" text-anchor="middle" fill="#f78166" font-size="16" font-weight="bold" font-family="Arial">
    §2: Tropical Hardware
  </text>
  
  <!-- Classical vs Tropical comparison -->
  <text x="40" y="110" fill="#c9d1d9" font-size="13" font-weight="bold" font-family="Arial">Classical Circuit</text>
  <rect x="40" y="120" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#f44336" stroke-width="1"/>
  <rect x="55" y="135" width="60" height="25" rx="4" fill="#f44336" opacity="0.3" stroke="#f44336" stroke-width="1"/>
  <text x="85" y="152" text-anchor="middle" fill="#f44336" font-size="9" font-family="monospace">MULTIPLY</text>
  <text x="85" y="165" text-anchor="middle" fill="#f44336" font-size="8" font-family="monospace">O(n²) gates</text>
  <rect x="135" y="135" width="60" height="25" rx="4" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="152" text-anchor="middle" fill="#4caf50" font-size="9" font-family="monospace">ADD</text>
  <text x="165" y="165" text-anchor="middle" fill="#4caf50" font-size="8" font-family="monospace">O(n) gates</text>
  
  <text x="240" y="110" fill="#c9d1d9" font-size="13" font-weight="bold" font-family="Arial">Tropical Circuit</text>
  <rect x="240" y="120" width="180" height="80" rx="6" fill="#1a2e1a" stroke="#4caf50" stroke-width="1"/>
  <rect x="255" y="135" width="60" height="25" rx="4" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="1"/>
  <text x="285" y="152" text-anchor="middle" fill="#4caf50" font-size="9" font-family="monospace">MAX</text>
  <text x="285" y="165" text-anchor="middle" fill="#4caf50" font-size="8" font-family="monospace">O(n) gates</text>
  <rect x="335" y="135" width="60" height="25" rx="4" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="1"/>
  <text x="365" y="152" text-anchor="middle" fill="#4caf50" font-size="9" font-family="monospace">ADD</text>
  <text x="365" y="165" text-anchor="middle" fill="#4caf50" font-size="8" font-family="monospace">O(n) gates</text>
  
  <!-- Savings arrow -->
  <text x="230" y="230" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold" font-family="Arial">
    Multiplier eliminated! O(n²) → O(n)
  </text>
  
  <!-- Gate decomposition theorem -->
  <rect x="40" y="250" width="380" height="70" rx="8" fill="#1a2e1a" stroke="#4caf50" stroke-width="1"/>
  <text x="230" y="275" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold" font-family="monospace">
    gate_count_decomp ✓
  </text>
  <text x="230" y="295" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">
    maxGateCount + addGateCount = numGates
  </text>
  
  <!-- Right Column: Complexity -->
  <rect x="460" y="55" width="420" height="280" rx="12" fill="none" stroke="#d2a8ff" stroke-width="2"/>
  <text x="670" y="80" text-anchor="middle" fill="#d2a8ff" font-size="16" font-weight="bold" font-family="Arial">
    §3: Tropical Complexity
  </text>
  
  <!-- Tropical Det -->
  <text x="480" y="110" fill="#c9d1d9" font-size="12" font-family="Arial">Tropical Determinant = Assignment Problem</text>
  <rect x="480" y="120" width="380" height="50" rx="6" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="670" y="145" text-anchor="middle" fill="#d2a8ff" font-size="13" font-family="monospace">
    tropDet(A) = max_σ Σᵢ A(i, σ(i))
  </text>
  <text x="670" y="160" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">No signs! det = perm in tropical world</text>
  
  <!-- Matrix powers -->
  <text x="480" y="195" fill="#c9d1d9" font-size="12" font-family="Arial">Matrix Powers = Heaviest Paths</text>
  <rect x="480" y="205" width="380" height="50" rx="6" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="670" y="230" text-anchor="middle" fill="#d2a8ff" font-size="13" font-family="monospace">
    A^k(i,j) = max weight of k-step i→j path
  </text>
  <text x="670" y="245" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">Foundation for Bellman-Ford, Floyd-Warshall</text>
  
  <!-- Associativity -->
  <rect x="480" y="270" width="380" height="50" rx="6" fill="#1a2e1a" stroke="#4caf50" stroke-width="1"/>
  <text x="670" y="290" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold" font-family="monospace">
    tropMatMul_assoc ✓
  </text>
  <text x="670" y="305" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">(A⊗B)⊗C = A⊗(B⊗C)</text>
  
  <!-- Bottom: Langlands -->
  <rect x="20" y="350" width="860" height="280" rx="12" fill="none" stroke="#7ee787" stroke-width="2"/>
  <text x="450" y="375" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="bold" font-family="Arial">
    §4: Tropical Langlands Foundations
  </text>
  
  <!-- Three pillars -->
  <rect x="40" y="395" width="260" height="100" rx="8" fill="#1a1a2e" stroke="#7ee787" stroke-width="1"/>
  <text x="170" y="420" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="bold" font-family="Arial">Tropical Characters</text>
  <text x="170" y="440" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">χ : G → ℝ, additive homomorphism</text>
  <text x="170" y="460" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">χ(a+b) = χ(a) + χ(b)</text>
  <text x="170" y="480" text-anchor="middle" fill="#4caf50" font-size="10" font-family="monospace">map_neg: χ(-a) = -χ(a) ✓</text>
  
  <rect x="320" y="395" width="260" height="100" rx="8" fill="#1a1a2e" stroke="#7ee787" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="bold" font-family="Arial">Tropical Hecke Operators</text>
  <text x="450" y="440" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">T_S f(g) = max_{s∈S} f(g+s)</text>
  <text x="450" y="460" text-anchor="middle" fill="#4caf50" font-size="10" font-family="monospace">Monotone ✓</text>
  <text x="450" y="480" text-anchor="middle" fill="#4caf50" font-size="10" font-family="monospace">Shift-equivariant ✓</text>
  
  <rect x="600" y="395" width="260" height="100" rx="8" fill="#1a1a2e" stroke="#7ee787" stroke-width="1"/>
  <text x="730" y="420" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="bold" font-family="Arial">Tropical L-functions</text>
  <text x="730" y="440" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">L(f,N) = Σ_{p&lt;N} f(p)</text>
  <text x="730" y="460" text-anchor="middle" fill="#4caf50" font-size="10" font-family="monospace">Monotone in N ✓</text>
  <text x="730" y="480" text-anchor="middle" fill="#4caf50" font-size="10" font-family="monospace">Euler product ✓</text>
  
  <!-- Connection arrows -->
  <line x1="170" y1="500" x2="450" y2="530" stroke="#7ee787" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="450" y1="500" x2="450" y2="530" stroke="#7ee787" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="730" y1="500" x2="450" y2="530" stroke="#7ee787" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  
  <text x="450" y="550" text-anchor="middle" fill="#7ee787" font-size="14" font-style="italic" font-family="Arial">
    Toward the Tropical Langlands Correspondence
  </text>
  
  <!-- Stats -->
  <rect x="40" y="570" width="820" height="50" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="450" y="600" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial">
    30+ theorems • 4 research directions • 0 sorry placeholders • Machine-verified in Lean 4 + Mathlib
  </text>
</svg>
