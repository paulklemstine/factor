<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <style>
      .title { font: bold 18px 'Helvetica Neue', Arial, sans-serif; fill: #1a1a2e; }
      .subtitle { font: 13px 'Helvetica Neue', Arial, sans-serif; fill: #4a4a6a; }
      .formula { font: 16px 'Courier New', monospace; fill: #1a1a2e; }
      .label { font: 12px 'Helvetica Neue', Arial, sans-serif; fill: #333; text-anchor: middle; }
      .arrow { stroke: #6c63ff; stroke-width: 2; marker-end: url(#arrowhead); }
      .disk { fill-opacity: 0.15; stroke-width: 2; }
      .point { stroke: #1a1a2e; stroke-width: 1.5; }
      .dist-line { stroke-dasharray: 5,3; stroke-width: 1.5; }
      .theorem-box { fill: #f0f0ff; stroke: #6c63ff; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="#fafafe" rx="10"/>

  <!-- Title -->
  <text x="450" y="30" class="title" text-anchor="middle">P-adic Conformal Distortion Formula</text>
  <text x="450" y="50" class="subtitle" text-anchor="middle">Möbius transformations distort distances predictably</text>

  <!-- Left: Domain -->
  <text x="200" y="85" class="label" font-weight="bold" font-size="14">Domain (ℚ_p)</text>

  <!-- Large disk (domain) -->
  <circle cx="200" cy="190" r="90" class="disk" fill="#6c63ff" stroke="#6c63ff"/>

  <!-- Points z and w -->
  <circle cx="170" cy="170" r="5" class="point" fill="#ff6b6b"/>
  <text x="155" y="165" class="label" fill="#ff6b6b" text-anchor="end">z</text>

  <circle cx="230" cy="200" r="5" class="point" fill="#2ed573"/>
  <text x="248" y="198" class="label" fill="#2ed573" text-anchor="start">w</text>

  <!-- Distance line z-w -->
  <line x1="170" y1="170" x2="230" y2="200" class="dist-line" stroke="#ff9800"/>
  <text x="200" y="175" class="label" fill="#ff9800" font-size="11">‖z − w‖</text>

  <!-- Arrow: M -->
  <line x1="320" y1="190" x2="450" y2="190" class="arrow"/>
  <text x="385" y="180" class="label" font-weight="bold" fill="#6c63ff" font-size="14">M(z) = (az+b)/(cz+d)</text>

  <!-- Right: Codomain -->
  <text x="650" y="85" class="label" font-weight="bold" font-size="14">Codomain (ℚ_p)</text>

  <!-- Transformed disk (possibly different size) -->
  <ellipse cx="650" cy="190" rx="110" ry="75" class="disk" fill="#48dbfb" stroke="#48dbfb"/>

  <!-- Points M(z) and M(w) -->
  <circle cx="610" cy="175" r="5" class="point" fill="#ff6b6b"/>
  <text x="590" y="170" class="label" fill="#ff6b6b" text-anchor="end">M(z)</text>

  <circle cx="690" cy="195" r="5" class="point" fill="#2ed573"/>
  <text x="712" y="192" class="label" fill="#2ed573" text-anchor="start">M(w)</text>

  <!-- Distance line M(z)-M(w) -->
  <line x1="610" y1="175" x2="690" y2="195" class="dist-line" stroke="#ff9800"/>
  <text x="650" y="172" class="label" fill="#ff9800" font-size="11">‖M(z) − M(w)‖</text>

  <!-- Theorem Box -->
  <rect x="100" y="310" width="700" height="120" class="theorem-box"/>

  <text x="450" y="340" class="label" font-weight="bold" font-size="14" fill="#6c63ff">
    Theorem (conformal_distortion) — Formally Verified ✓
  </text>

  <text x="450" y="375" class="formula" text-anchor="middle">
    ‖M(z) − M(w)‖ = ‖z − w‖ · ‖det(M)‖ / (‖cz+d‖ · ‖cw+d‖)
  </text>

  <text x="450" y="405" class="label" fill="#666">
    The distortion factor ‖det(M)‖/(‖cz+d‖·‖cw+d‖) depends on position but NOT on direction.
  </text>

  <text x="450" y="420" class="label" fill="#999" font-style="italic">
    This is the p-adic analog of the Schwarz-Pick lemma. Proof uses div_sub_div and norm multiplicativity.
  </text>
</svg>
