<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="650" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#58a6ff" font-size="22" font-weight="bold">
    Dirichlet's Hyperbola Method
  </text>
  <text x="400" y="62" text-anchor="middle" fill="#8b949e" font-size="13">
    Splitting the divisor sum at √n reduces counting from O(n) to O(√n)
  </text>

  <!-- Coordinate system -->
  <g transform="translate(100, 560) scale(1, -1)">
    <!-- Region fills -->
    <!-- Below-left region (d ≤ √n, n/d ≤ √n is empty for squarefree) -->

    <!-- Region A: d ≤ √n (vertical strip) -->
    <rect x="0" y="0" width="200" height="450" fill="#1f6feb" fill-opacity="0.08"/>

    <!-- Region B: n/d ≤ √n means d ≥ √n (horizontal strip above) -->
    <rect x="0" y="0" width="600" height="200" fill="#f0883e" fill-opacity="0.08"/>

    <!-- Overlap region -->
    <rect x="0" y="0" width="200" height="200" fill="#da3633" fill-opacity="0.12"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="620" y2="0" stroke="#30363d" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="470" stroke="#30363d" stroke-width="2"/>

    <!-- √n lines -->
    <line x1="200" y1="0" x2="200" y2="450" stroke="#58a6ff" stroke-width="1.5"
          stroke-dasharray="6,4"/>
    <line x1="0" y1="200" x2="620" y2="200" stroke="#f0883e" stroke-width="1.5"
          stroke-dasharray="6,4"/>

    <!-- Diagonal y = x -->
    <line x1="0" y1="0" x2="450" y2="450" stroke="#484f58" stroke-width="1"
          stroke-dasharray="3,5"/>

    <!-- Hyperbola curve -->
    <path d="M 10 450 Q 20 250, 40 170 Q 60 120, 80 95 Q 120 68, 160 57
             Q 200 46, 250 37 Q 300 30, 400 23 Q 500 18, 600 15"
          fill="none" stroke="#ffcc02" stroke-width="2.5" filter="url(#glow2)"/>

    <!-- Sample lattice points -->
    <!-- Region A points (d ≤ √n): blue -->
    <circle cx="20" cy="400" r="5" fill="#58a6ff" filter="url(#glow2)"/>
    <circle cx="40" cy="200" r="5" fill="#58a6ff" filter="url(#glow2)"/>
    <circle cx="60" cy="133" r="5" fill="#58a6ff" filter="url(#glow2)"/>
    <circle cx="100" cy="80" r="5" fill="#58a6ff" filter="url(#glow2)"/>
    <circle cx="140" cy="57" r="5" fill="#58a6ff" filter="url(#glow2)"/>
    <circle cx="200" cy="40" r="5" fill="#da3633" filter="url(#glow2)"/>

    <!-- Region B points (d > √n): orange -->
    <circle cx="250" cy="32" r="5" fill="#f0883e" filter="url(#glow2)"/>
    <circle cx="320" cy="25" r="5" fill="#f0883e" filter="url(#glow2)"/>
    <circle cx="400" cy="20" r="5" fill="#f0883e" filter="url(#glow2)"/>
    <circle cx="530" cy="15" r="5" fill="#f0883e" filter="url(#glow2)"/>
  </g>

  <!-- Labels -->
  <g fill="#c9d1d9" font-size="12">
    <text x="88" y="582" text-anchor="middle" fill="#58a6ff" font-size="13">0</text>
    <text x="300" y="582" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">√n</text>
    <text x="700" y="582" text-anchor="middle" fill="#8b949e" font-size="13">n →</text>
    <text x="85" y="365" text-anchor="end" fill="#f0883e" font-size="13" font-weight="bold">√n</text>
    <text x="85" y="115" text-anchor="end" fill="#8b949e" font-size="13">n ↑</text>
    <text x="400" y="605" text-anchor="middle" fill="#8b949e" font-size="14">d (divisor)</text>
    <text x="50" y="350" text-anchor="middle" fill="#8b949e" font-size="14"
          transform="rotate(-90, 50, 350)">n/d (complementary divisor)</text>
  </g>

  <!-- Region labels -->
  <text x="200" y="300" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold"
        font-style="italic" opacity="0.7">Region A</text>
  <text x="200" y="320" text-anchor="middle" fill="#58a6ff" font-size="11" opacity="0.6">d ≤ √n</text>
  <text x="470" y="520" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="bold"
        font-style="italic" opacity="0.7">Region B</text>
  <text x="470" y="540" text-anchor="middle" fill="#f0883e" font-size="11" opacity="0.6">n/d ≤ √n</text>
  <text x="200" y="470" text-anchor="middle" fill="#da3633" font-size="11" opacity="0.6">Overlap</text>

  <!-- Formula box -->
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#161b22"
          stroke="#30363d" stroke-width="1.5"/>
    <text x="140" y="28" text-anchor="middle" fill="#ffcc02" font-size="14" font-weight="bold">
      Dirichlet's Formula
    </text>
    <text x="140" y="55" text-anchor="middle" fill="#c9d1d9" font-size="13">
      Σ τ(k) = 2·Σ ⌊n/d⌋ − (⌊√n⌋)²
    </text>
    <text x="140" y="73" text-anchor="middle" fill="#8b949e" font-size="10">
      k≤n          d≤√n
    </text>
    <line x1="20" y1="85" x2="260" y2="85" stroke="#30363d"/>
    <text x="140" y="105" text-anchor="middle" fill="#58a6ff" font-size="11">
      Region A: count points with d ≤ √n
    </text>
    <text x="140" y="123" text-anchor="middle" fill="#f0883e" font-size="11">
      Region B: by symmetry (d, n/d) ↔ (n/d, d)
    </text>
    <text x="140" y="141" text-anchor="middle" fill="#da3633" font-size="11">
      Subtract overlap at d = n/d = √n
    </text>
    <text x="140" y="165" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">
      Complexity: O(n) → O(√n)
    </text>
  </g>

  <!-- Insight box -->
  <g transform="translate(480, 280)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="#161b22"
          stroke="#3fb950" stroke-width="1"/>
    <text x="140" y="25" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">
      Key Insight
    </text>
    <text x="140" y="48" text-anchor="middle" fill="#c9d1d9" font-size="11">
      The hyperbola's symmetry (d ↔ n/d)
    </text>
    <text x="140" y="66" text-anchor="middle" fill="#c9d1d9" font-size="11">
      means we only need to search d ≤ √n
    </text>
    <text x="140" y="84" text-anchor="middle" fill="#c9d1d9" font-size="11">
      — half the curve determines the whole.
    </text>
  </g>

  <!-- Footer -->
  <text x="400" y="640" text-anchor="middle" fill="#484f58" font-size="10">
    Hyperbolic Factoring Research · Dirichlet Hyperbola Method · 2026
  </text>
</svg>
