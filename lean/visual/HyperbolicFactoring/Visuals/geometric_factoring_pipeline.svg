<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="stage1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="stage2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/>
      <stop offset="100%" style="stop-color:#d47530"/>
    </linearGradient>
    <linearGradient id="stage3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="stage4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="stage5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Geometric Factoring Pipeline: From Hyperbola to AI
  </text>
  <text x="500" y="62" text-anchor="middle" fill="#8b949e" font-size="12">
    Five stages transforming the divisor hyperbola into an algorithmic factoring framework
  </text>

  <!-- Stage 1: Input -->
  <g transform="translate(30, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="url(#stage1)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">① Input</text>
    <line x1="15" y1="40" x2="145" y2="40" stroke="#fff" stroke-opacity="0.3"/>
    <text x="80" y="62" text-anchor="middle" fill="#fff" font-size="11">Composite n</text>
    <text x="80" y="82" text-anchor="middle" fill="#ffd" font-size="20" font-weight="bold">n = p · q</text>
    <text x="80" y="110" text-anchor="middle" fill="#ffa" font-size="10">e.g. n = 210</text>
    <text x="80" y="130" text-anchor="middle" fill="#ffa" font-size="10">= 2×3×5×7</text>
    <rect x="15" y="145" width="130" height="40" rx="6" fill="#fff" fill-opacity="0.15"/>
    <text x="80" y="165" text-anchor="middle" fill="#fff" font-size="9">Bit length: ⌈log₂ n⌉</text>
    <text x="80" y="180" text-anchor="middle" fill="#fff" font-size="9">Smoothness class</text>
  </g>

  <!-- Arrow 1→2 -->
  <g>
    <line x1="195" y1="200" x2="215" y2="200" stroke="#e94560" stroke-width="2"/>
    <polygon points="215,195 225,200 215,205" fill="#e94560"/>
  </g>

  <!-- Stage 2: Hyperbola -->
  <g transform="translate(225, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="url(#stage2)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">② Hyperbola</text>
    <line x1="15" y1="40" x2="145" y2="40" stroke="#fff" stroke-opacity="0.3"/>
    <text x="80" y="62" text-anchor="middle" fill="#fff" font-size="11">Construct xy = n</text>
    <!-- Mini hyperbola -->
    <path d="M 25 170 Q 35 130, 50 110 Q 65 95, 80 88 Q 95 82, 110 78 Q 130 74, 145 72"
          fill="none" stroke="#ffcc02" stroke-width="2"/>
    <circle cx="35" cy="140" r="3" fill="#fff"/>
    <circle cx="50" cy="110" r="3" fill="#fff"/>
    <circle cx="80" cy="88" r="3" fill="#fff"/>
    <circle cx="110" cy="78" r="3" fill="#fff"/>
    <circle cx="140" cy="73" r="3" fill="#fff"/>
    <text x="80" y="195" text-anchor="middle" fill="#ffd" font-size="9">Lattice points = divisors</text>
  </g>

  <!-- Arrow 2→3 -->
  <g>
    <line x1="390" y1="200" x2="410" y2="200" stroke="#f0883e" stroke-width="2"/>
    <polygon points="410,195 420,200 410,205" fill="#f0883e"/>
  </g>

  <!-- Stage 3: Feature Extraction -->
  <g transform="translate(420, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="url(#stage3)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">③ Features</text>
    <line x1="15" y1="40" x2="145" y2="40" stroke="#fff" stroke-opacity="0.3"/>
    <text x="80" y="62" text-anchor="middle" fill="#fff" font-size="11">Geometric metrics</text>
    <text x="25" y="85" fill="#cfc" font-size="9">• Curvature at √n</text>
    <text x="25" y="100" fill="#cfc" font-size="9">• Log-gap distribution</text>
    <text x="25" y="115" fill="#cfc" font-size="9">• Aspect ratios</text>
    <text x="25" y="130" fill="#cfc" font-size="9">• Divisor density</text>
    <text x="25" y="145" fill="#cfc" font-size="9">• Near-square distance</text>
    <text x="25" y="160" fill="#cfc" font-size="9">• Entropy of gaps</text>
    <text x="25" y="175" fill="#cfc" font-size="9">• √n residual</text>
    <text x="80" y="195" text-anchor="middle" fill="#ffd" font-size="9">→ feature vector v ∈ ℝᵈ</text>
  </g>

  <!-- Arrow 3→4 -->
  <g>
    <line x1="585" y1="200" x2="605" y2="200" stroke="#3fb950" stroke-width="2"/>
    <polygon points="605,195 615,200 605,205" fill="#3fb950"/>
  </g>

  <!-- Stage 4: AI Model -->
  <g transform="translate(615, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="url(#stage4)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">④ AI Model</text>
    <line x1="15" y1="40" x2="145" y2="40" stroke="#fff" stroke-opacity="0.3"/>
    <text x="80" y="62" text-anchor="middle" fill="#fff" font-size="11">Neural network</text>
    <!-- Neural net diagram -->
    <g stroke="#8bf" stroke-width="0.8" fill="#fff">
      <circle cx="40" cy="85" r="4"/><circle cx="40" cy="105" r="4"/>
      <circle cx="40" cy="125" r="4"/><circle cx="40" cy="145" r="4"/>
      <circle cx="80" cy="95" r="4"/><circle cx="80" cy="115" r="4"/>
      <circle cx="80" cy="135" r="4"/>
      <circle cx="120" cy="105" r="4"/><circle cx="120" cy="125" r="4"/>
      <line x1="44" y1="85" x2="76" y2="95"/><line x1="44" y1="85" x2="76" y2="115"/>
      <line x1="44" y1="105" x2="76" y2="95"/><line x1="44" y1="105" x2="76" y2="115"/>
      <line x1="44" y1="105" x2="76" y2="135"/>
      <line x1="44" y1="125" x2="76" y2="115"/><line x1="44" y1="125" x2="76" y2="135"/>
      <line x1="44" y1="145" x2="76" y2="135"/>
      <line x1="84" y1="95" x2="116" y2="105"/><line x1="84" y1="95" x2="116" y2="125"/>
      <line x1="84" y1="115" x2="116" y2="105"/><line x1="84" y1="115" x2="116" y2="125"/>
      <line x1="84" y1="135" x2="116" y2="105"/><line x1="84" y1="135" x2="116" y2="125"/>
    </g>
    <text x="80" y="175" text-anchor="middle" fill="#cdf" font-size="9">Predict: strategy,</text>
    <text x="80" y="190" text-anchor="middle" fill="#cdf" font-size="9">search region, factor hint</text>
  </g>

  <!-- Arrow 4→5 -->
  <g>
    <line x1="780" y1="200" x2="800" y2="200" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="800,195 810,200 800,205" fill="#58a6ff"/>
  </g>

  <!-- Stage 5: Output -->
  <g transform="translate(810, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="url(#stage5)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">⑤ Factor</text>
    <line x1="15" y1="40" x2="145" y2="40" stroke="#fff" stroke-opacity="0.3"/>
    <text x="80" y="62" text-anchor="middle" fill="#fff" font-size="11">Guided search</text>
    <text x="80" y="90" text-anchor="middle" fill="#edf" font-size="20" font-weight="bold">n = p · q</text>
    <text x="80" y="115" text-anchor="middle" fill="#edf" font-size="10">Focused trial division</text>
    <text x="80" y="135" text-anchor="middle" fill="#edf" font-size="10">in AI-predicted region</text>
    <rect x="20" y="150" width="120" height="35" rx="6" fill="#fff" fill-opacity="0.15"/>
    <text x="80" y="170" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">
      ✓ Verified correct
    </text>
  </g>

  <!-- Bottom: feedback loop -->
  <g>
    <path d="M 890 310 Q 890 400, 500 420 Q 110 440, 110 310"
          fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="110,315 105,305 115,305" fill="#bc8cff"/>
    <text x="500" y="415" text-anchor="middle" fill="#bc8cff" font-size="11">
      Feedback loop: update model with new factorizations
    </text>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(150, 460)">
    <text x="0" y="0" fill="#8b949e" font-size="10">
      Complexity: O(n^{1/4}) with geometric pruning · Formally verified in Lean 4 · ML-guided search reduces constant factor by 10-100×
    </text>
  </g>
</svg>
