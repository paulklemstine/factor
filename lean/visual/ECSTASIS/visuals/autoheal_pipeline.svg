<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg4)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#166534" font-size="22" font-weight="bold">AutoHeal Self-Repair Pipeline</text>
  <text x="400" y="55" text-anchor="middle" fill="#4ade80" font-size="12">Knaster-Tarski Fixed-Point Convergence</text>
  
  <!-- Pipeline stages -->
  <!-- Stage 1: Monitor -->
  <rect x="30" y="100" width="140" height="100" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="100" y="130" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">⚠ Detect</text>
  <text x="100" y="152" text-anchor="middle" fill="#991b1b" font-size="10">Runtime Monitor</text>
  <text x="100" y="168" text-anchor="middle" fill="#991b1b" font-size="10">Anomaly Detection</text>
  <text x="100" y="184" text-anchor="middle" fill="#991b1b" font-size="10">Defect Score: D(s)</text>
  
  <!-- Arrow 1→2 -->
  <line x1="170" y1="150" x2="215" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Stage 2: Repair -->
  <rect x="220" y="100" width="140" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="130" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="bold">🔧 Repair</text>
  <text x="290" y="152" text-anchor="middle" fill="#1e40af" font-size="10">Monotone Operator</text>
  <text x="290" y="168" text-anchor="middle" fill="#1e40af" font-size="10">f : L → L</text>
  <text x="290" y="184" text-anchor="middle" fill="#1e40af" font-size="10">D(f(s)) ≤ r·D(s)</text>
  
  <!-- Arrow 2→3 -->
  <line x1="360" y1="150" x2="405" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Stage 3: Verify -->
  <rect x="410" y="100" width="140" height="100" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" fill="#6d28d9" font-size="14" font-weight="bold">✓ Verify</text>
  <text x="480" y="152" text-anchor="middle" fill="#5b21b6" font-size="10">Formal Verification</text>
  <text x="480" y="168" text-anchor="middle" fill="#5b21b6" font-size="10">spec(f(s)) = true</text>
  <text x="480" y="184" text-anchor="middle" fill="#5b21b6" font-size="10">Lean 4 Proof</text>
  
  <!-- Arrow 3→4 -->
  <line x1="550" y1="150" x2="595" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Stage 4: Deploy -->
  <rect x="600" y="100" width="140" height="100" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="130" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="bold">🚀 Deploy</text>
  <text x="670" y="152" text-anchor="middle" fill="#166534" font-size="10">Apply Patch</text>
  <text x="670" y="168" text-anchor="middle" fill="#166534" font-size="10">Fixed Point: f(s*)=s*</text>
  <text x="670" y="184" text-anchor="middle" fill="#166534" font-size="10">D(s*) = 0</text>
  
  <!-- Feedback loop arrow -->
  <path d="M670,200 L670,260 Q670,280 650,280 L130,280 Q110,280 110,260 L110,200" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="400" y="295" text-anchor="middle" fill="#dc2626" font-size="11">Feedback: if D(s) > 0, iterate repair</text>
  
  <!-- Convergence graph -->
  <rect x="120" y="315" width="560" height="70" rx="8" fill="white" opacity="0.7" stroke="#e2e8f0"/>
  <text x="140" y="335" fill="#475569" font-size="11" font-weight="bold">Defect convergence:</text>
  
  <!-- Mini bar chart showing defect decreasing -->
  <rect x="280" y="322" width="15" height="50" fill="#ef4444" opacity="0.7"/>
  <rect x="310" y="337" width="15" height="35" fill="#f97316" opacity="0.7"/>
  <rect x="340" y="349" width="15" height="23" fill="#eab308" opacity="0.7"/>
  <rect x="370" y="357" width="15" height="15" fill="#84cc16" opacity="0.7"/>
  <rect x="400" y="362" width="15" height="10" fill="#22c55e" opacity="0.7"/>
  <rect x="430" y="365" width="15" height="7" fill="#16a34a" opacity="0.7"/>
  <rect x="460" y="367" width="15" height="5" fill="#16a34a" opacity="0.7"/>
  <rect x="490" y="369" width="15" height="3" fill="#16a34a" opacity="0.7"/>
  <rect x="520" y="370" width="15" height="2" fill="#16a34a" opacity="0.7"/>
  <rect x="550" y="371" width="15" height="1" fill="#16a34a" opacity="0.7"/>
  
  <text x="600" y="340" fill="#16a34a" font-size="10">D_n → 0</text>
  <text x="600" y="355" fill="#16a34a" font-size="10">exponentially</text>
  <text x="600" y="375" fill="#64748b" font-size="10">r = 0.5</text>
</svg>
