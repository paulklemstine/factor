<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  
  <rect width="700" height="500" fill="url(#bg2)"/>
  
  <text x="350" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">Contraction Mapping Convergence</text>
  <text x="350" y="55" text-anchor="middle" fill="#64748b" font-size="12">d(f ⁿ(x₀), x*) ≤ kⁿ · d(x₀, x*) — Geometric decay to fixed point</text>
  
  <!-- Axes -->
  <line x1="80" y1="420" x2="650" y2="420" stroke="#475569" stroke-width="2"/>
  <line x1="80" y1="420" x2="80" y2="80" stroke="#475569" stroke-width="2"/>
  
  <text x="365" y="460" text-anchor="middle" fill="#475569" font-size="13">Iteration n</text>
  <text x="30" y="250" text-anchor="middle" fill="#475569" font-size="13" transform="rotate(-90, 30, 250)">Distance to x*</text>
  
  <!-- Grid lines -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="80" y1="152" x2="650" y2="152"/>
    <line x1="80" y1="219" x2="650" y2="219"/>
    <line x1="80" y1="286" x2="650" y2="286"/>
    <line x1="80" y1="353" x2="650" y2="353"/>
  </g>
  
  <!-- Y-axis labels -->
  <text x="70" y="90" text-anchor="end" fill="#64748b" font-size="11">100</text>
  <text x="70" y="152" text-anchor="end" fill="#64748b" font-size="11">80</text>
  <text x="70" y="219" text-anchor="end" fill="#64748b" font-size="11">60</text>
  <text x="70" y="286" text-anchor="end" fill="#64748b" font-size="11">40</text>
  <text x="70" y="353" text-anchor="end" fill="#64748b" font-size="11">20</text>
  <text x="70" y="424" text-anchor="end" fill="#64748b" font-size="11">0</text>
  
  <!-- X-axis labels -->
  <text x="80" y="440" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <text x="175" y="440" text-anchor="middle" fill="#64748b" font-size="11">2</text>
  <text x="270" y="440" text-anchor="middle" fill="#64748b" font-size="11">4</text>
  <text x="365" y="440" text-anchor="middle" fill="#64748b" font-size="11">6</text>
  <text x="460" y="440" text-anchor="middle" fill="#64748b" font-size="11">8</text>
  <text x="555" y="440" text-anchor="middle" fill="#64748b" font-size="11">10</text>
  <text x="650" y="440" text-anchor="middle" fill="#64748b" font-size="11">12</text>
  
  <!-- Theoretical bound (k=0.6): shaded region -->
  <path d="M80,85 L127.5,135.8 L175,170.5 L222.5,197.3 L270,218 L317.5,234 L365,247 L412.5,257 L460,264.8 L507.5,271 L555,276 L602.5,279.5 L650,282.5 L650,420 L80,420 Z" fill="#dbeafe" opacity="0.4"/>
  
  <!-- Theoretical bound curve (k=0.6) -->
  <!-- 100 * 0.6^n, mapped: y = 420 - 3.35 * value -->
  <polyline points="80,85 127.5,218.1 175,278.3 222.5,314.4 270,336.1 317.5,349.1 365,356.9 412.5,361.6 460,364.4 507.5,366.1 555,367.1 602.5,367.7 650,368.1" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- Actual convergence curve (k=0.6, exact) -->
  <polyline points="80,85 127.5,218.1 175,278.3 222.5,314.4 270,336.1 317.5,349.1 365,356.9 412.5,361.6 460,364.4 507.5,366.1 555,367.1 602.5,367.7 650,368.1" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  
  <!-- Data points -->
  <g fill="#ef4444">
    <circle cx="80" cy="85" r="5"/>
    <circle cx="127.5" cy="218.1" r="4"/>
    <circle cx="175" cy="278.3" r="4"/>
    <circle cx="222.5" cy="314.4" r="4"/>
    <circle cx="270" cy="336.1" r="4"/>
    <circle cx="317.5" cy="349.1" r="3.5"/>
    <circle cx="365" cy="356.9" r="3.5"/>
    <circle cx="412.5" cy="361.6" r="3"/>
    <circle cx="460" cy="364.4" r="3"/>
    <circle cx="507.5" cy="366.1" r="3"/>
    <circle cx="555" cy="367.1" r="3"/>
  </g>
  
  <!-- Fixed point line -->
  <line x1="80" y1="420" x2="650" y2="420" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="655" y="418" fill="#22c55e" font-size="11">x* (fixed point)</text>
  
  <!-- Legend -->
  <rect x="400" y="80" width="230" height="65" rx="8" fill="white" opacity="0.85" stroke="#e2e8f0"/>
  <line x1="415" y1="100" x2="445" y2="100" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="430" cy="100" r="3" fill="#ef4444"/>
  <text x="455" y="104" fill="#334155" font-size="11">Actual distance d(f ⁿ(x₀), x*)</text>
  <line x1="415" y1="122" x2="445" y2="122" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="455" y="126" fill="#334155" font-size="11">Bound: kⁿ · d(x₀, x*)</text>
  <rect x="415" y="133" width="15" height="8" fill="#dbeafe" opacity="0.6"/>
  <text x="455" y="142" fill="#334155" font-size="11">Convergence region</text>
  
  <!-- Annotation -->
  <text x="180" y="105" fill="#7c3aed" font-size="12" font-weight="bold">k = 0.6</text>
  <text x="180" y="122" fill="#7c3aed" font-size="11">d₀ = 100</text>
</svg>
