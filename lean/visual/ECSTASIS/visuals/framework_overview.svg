<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="musicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="visualGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="healGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="white" font-size="28" font-weight="bold" filter="url(#glow)">ECSTASIS Framework</text>
  <text x="450" y="72" text-anchor="middle" fill="#a5b4fc" font-size="12">Emergent Compositional Systems for Transport, Adaptation, Synthesis &amp; Intelligent Self-repair</text>
  
  <!-- Central Core -->
  <circle cx="450" cy="320" r="85" fill="url(#coreGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="450" cy="320" r="85" fill="none" stroke="#c4b5fd" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Mathematical</text>
  <text x="450" y="325" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Core</text>
  <text x="450" y="350" text-anchor="middle" fill="#e0e7ff" font-size="10">Metric Spaces</text>
  <text x="450" y="365" text-anchor="middle" fill="#e0e7ff" font-size="10">Lattices · Fixed Points</text>
  
  <!-- Music Node (top-left) -->
  <line x1="380" y1="260" x2="230" y2="180" stroke="#ec4899" stroke-width="2" opacity="0.6"/>
  <rect x="120" y="120" width="220" height="120" rx="15" fill="url(#musicGrad)" opacity="0.85"/>
  <text x="230" y="150" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🎵 Music</text>
  <text x="230" y="172" text-anchor="middle" fill="#fce7f3" font-size="11">Adaptive Synthesis</text>
  <text x="230" y="189" text-anchor="middle" fill="#fce7f3" font-size="11">Spatial Audio · Biofeedback</text>
  <text x="230" y="206" text-anchor="middle" fill="#fce7f3" font-size="11">Collaborative Generation</text>
  <text x="230" y="223" text-anchor="middle" fill="#fce7f3" font-size="11">Haptic · Vocal Synthesis</text>
  
  <!-- Visual Node (top-right) -->
  <line x1="520" y1="260" x2="670" y2="180" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <rect x="560" y="120" width="220" height="120" rx="15" fill="url(#visualGrad)" opacity="0.85"/>
  <text x="670" y="150" text-anchor="middle" fill="white" font-size="16" font-weight="bold">👁 Visual</text>
  <text x="670" y="172" text-anchor="middle" fill="#e0f2fe" font-size="11">VR Integration</text>
  <text x="670" y="189" text-anchor="middle" fill="#e0f2fe" font-size="11">Eye Tracking · Biofeedback</text>
  <text x="670" y="206" text-anchor="middle" fill="#e0f2fe" font-size="11">Therapeutic Applications</text>
  <text x="670" y="223" text-anchor="middle" fill="#e0f2fe" font-size="11">Collaborative VR Spaces</text>
  
  <!-- AutoHeal Node (bottom-left) -->
  <line x1="380" y1="380" x2="230" y2="460" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <rect x="120" y="400" width="220" height="120" rx="15" fill="url(#healGrad)" opacity="0.85"/>
  <text x="230" y="430" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🔧 AutoHeal</text>
  <text x="230" y="452" text-anchor="middle" fill="#d1fae5" font-size="11">Self-Repairing Software</text>
  <text x="230" y="469" text-anchor="middle" fill="#d1fae5" font-size="11">Multi-file Bug Repair</text>
  <text x="230" y="486" text-anchor="middle" fill="#d1fae5" font-size="11">Formal Verification Loop</text>
  <text x="230" y="503" text-anchor="middle" fill="#d1fae5" font-size="11">Security · Performance</text>
  
  <!-- Holographic Node (bottom-right) -->
  <line x1="520" y1="380" x2="670" y2="460" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <rect x="560" y="400" width="220" height="120" rx="15" fill="url(#holoGrad)" opacity="0.85"/>
  <text x="670" y="430" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🔮 Holographic</text>
  <text x="670" y="452" text-anchor="middle" fill="#fef3c7" font-size="11">Phase Lattice Hardware</text>
  <text x="670" y="469" text-anchor="middle" fill="#fef3c7" font-size="11">Coherent Wavefront Eng.</text>
  <text x="670" y="486" text-anchor="middle" fill="#fef3c7" font-size="11">Topological Stability</text>
  <text x="670" y="503" text-anchor="middle" fill="#fef3c7" font-size="11">3D Display Technology</text>
  
  <!-- Cross connections (lighter) -->
  <line x1="230" y1="240" x2="230" y2="400" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="670" y1="240" x2="670" y2="400" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="340" y1="180" x2="560" y2="180" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="340" y1="460" x2="560" y2="460" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  
  <!-- Bottom bar: key theorems -->
  <rect x="50" y="570" width="800" height="55" rx="10" fill="#1e1b4b" opacity="0.8"/>
  <text x="450" y="590" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="bold">Key Theorems (Formally Verified in Lean 4)</text>
  <text x="450" y="610" text-anchor="middle" fill="#c4b5fd" font-size="10">Banach Fixed Point · Knaster-Tarski · Lipschitz Composition · Wavefront Coherence Bound · Shannon Entropy · Convex Consensus</text>
</svg>
