<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0a0a25"/>
      <stop offset="100%" style="stop-color:#181842"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg5)"/>

  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" font-weight="bold">
    Spectral Theory of Self-Adjoint Operators
  </text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899bb">
    A = A† ⟹ real eigenvalues, orthogonal eigenvectors
  </text>

  <!-- Spectrum line -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#445566" stroke-width="2"/>
  <text x="750" y="145" font-family="Arial, sans-serif" font-size="12" fill="#8899bb">ℝ</text>

  <!-- Eigenvalues on the real line -->
  <circle cx="160" cy="140" r="8" fill="#ff4444" filter="url(#glow5)"/>
  <text x="160" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff6666">λ₁</text>

  <circle cx="300" cy="140" r="8" fill="#44ff44" filter="url(#glow5)"/>
  <text x="300" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#66ff66">λ₂</text>

  <circle cx="480" cy="140" r="8" fill="#4488ff" filter="url(#glow5)"/>
  <text x="480" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#66aaff">λ₃</text>

  <circle cx="620" cy="140" r="8" fill="#ff88ff" filter="url(#glow5)"/>
  <text x="620" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffaaff">λ₄</text>

  <!-- Eigenspaces hanging below -->
  <!-- E₁ -->
  <line x1="160" y1="148" x2="160" y2="200" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="110" y="200" width="100" height="60" rx="6" fill="rgba(255,68,68,0.1)" stroke="#ff4444" stroke-width="1.5"/>
  <text x="160" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff6666">E(λ₁)</text>
  <text x="160" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cc4444">dim = 1</text>

  <!-- E₂ -->
  <line x1="300" y1="148" x2="300" y2="200" stroke="#44ff44" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="240" y="200" width="120" height="60" rx="6" fill="rgba(68,255,68,0.1)" stroke="#44ff44" stroke-width="1.5"/>
  <text x="300" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#66ff66">E(λ₂)</text>
  <text x="300" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#44cc44">dim = 2</text>

  <!-- E₃ -->
  <line x1="480" y1="148" x2="480" y2="200" stroke="#4488ff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="430" y="200" width="100" height="60" rx="6" fill="rgba(68,136,255,0.1)" stroke="#4488ff" stroke-width="1.5"/>
  <text x="480" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#66aaff">E(λ₃)</text>
  <text x="480" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4488cc">dim = 1</text>

  <!-- E₄ -->
  <line x1="620" y1="148" x2="620" y2="200" stroke="#ff88ff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="570" y="200" width="100" height="60" rx="6" fill="rgba(255,136,255,0.1)" stroke="#ff88ff" stroke-width="1.5"/>
  <text x="620" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffaaff">E(λ₄)</text>
  <text x="620" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cc88cc">dim = 1</text>

  <!-- Orthogonality arrows -->
  <line x1="210" y1="230" x2="240" y2="230" stroke="#aaaaaa" stroke-width="1"/>
  <text x="225" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888">⊥</text>

  <line x1="360" y1="230" x2="430" y2="230" stroke="#aaaaaa" stroke-width="1"/>
  <text x="395" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888">⊥</text>

  <line x1="530" y1="230" x2="570" y2="230" stroke="#aaaaaa" stroke-width="1"/>
  <text x="550" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888">⊥</text>

  <!-- Theorem boxes -->
  <rect x="40" y="290" width="350" height="145" rx="8" fill="rgba(255,255,255,0.04)" stroke="#4488cc" stroke-width="1"/>
  <text x="215" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#88bbee" font-weight="bold">Verified Theorems</text>
  <text x="55" y="340" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Thm 37: E(λ) is a submodule ∈ L(H)</text>
  <text x="55" y="360" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Thm 38: λ₁ ≠ λ₂ ⟹ E(λ₁) ⊓ E(λ₂) = {0}</text>
  <text x="55" y="380" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Thm 39: A = A† ⟹ λ ∈ ℝ</text>
  <text x="55" y="400" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Thm 40: A = A†, λ₁ ≠ λ₂ ⟹ ⟨v₁|v₂⟩ = 0</text>
  <text x="55" y="425" font-family="Arial, sans-serif" font-size="11" fill="#8899bb">Thm 29: Im⟨Av,v⟩ = 0 for self-adjoint A</text>

  <rect x="410" y="290" width="370" height="145" rx="8" fill="rgba(255,255,255,0.04)" stroke="#ff8844" stroke-width="1"/>
  <text x="595" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffaa66" font-weight="bold">Physical Meaning</text>
  <text x="425" y="340" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Each eigenspace E(λ) = quantum proposition</text>
  <text x="425" y="360" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">"Observable A has value λ"</text>
  <text x="425" y="385" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Orthogonality ↔ mutual exclusivity</text>
  <text x="425" y="405" font-family="Arial, sans-serif" font-size="11" fill="#aabbdd">Real eigenvalues ↔ measurable quantities</text>
  <text x="425" y="425" font-family="Arial, sans-serif" font-size="11" fill="#8899bb">H = ⊕ E(λᵢ) — spectral decomposition</text>
</svg>
