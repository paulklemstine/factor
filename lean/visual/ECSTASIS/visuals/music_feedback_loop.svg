<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrowWhite" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e2e8f0"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6"/>
    </marker>
  </defs>
  
  <rect width="700" height="450" fill="url(#bg5)"/>
  
  <text x="350" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="bold">ECSTASIS Adaptive Music Feedback Loop</text>
  <text x="350" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">Contraction Mapping k &lt; 1 → Unique Stable Timbre</text>
  
  <!-- Listener (center) -->
  <circle cx="350" cy="230" r="60" fill="#4c1d95" opacity="0.6" stroke="#a78bfa" stroke-width="2"/>
  <text x="350" y="220" text-anchor="middle" fill="white" font-size="16">🧠</text>
  <text x="350" y="245" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">Listener</text>
  <text x="350" y="262" text-anchor="middle" fill="#a78bfa" font-size="9">Physiological State</text>
  
  <!-- Synthesis Engine (left) -->
  <rect x="40" y="185" width="150" height="90" rx="15" fill="#831843" opacity="0.7" stroke="#f472b6" stroke-width="2"/>
  <text x="115" y="215" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🎹 Synth</text>
  <text x="115" y="235" text-anchor="middle" fill="#fce7f3" font-size="10">f : S → S</text>
  <text x="115" y="252" text-anchor="middle" fill="#fce7f3" font-size="10">Contraction (k&lt;1)</text>
  <text x="115" y="268" text-anchor="middle" fill="#fce7f3" font-size="9">Lipschitz constant k</text>
  
  <!-- Sensors (top) -->
  <rect x="260" y="90" width="180" height="75" rx="15" fill="#0c4a6e" opacity="0.7" stroke="#38bdf8" stroke-width="2"/>
  <text x="350" y="115" text-anchor="middle" fill="white" font-size="14" font-weight="bold">📊 Sensors</text>
  <text x="350" y="133" text-anchor="middle" fill="#bae6fd" font-size="10">HRV · GSR · EEG</text>
  <text x="350" y="150" text-anchor="middle" fill="#bae6fd" font-size="10">σ: ℝ → (0,1)</text>
  
  <!-- Spatial Audio (right) -->
  <rect x="510" y="185" width="150" height="90" rx="15" fill="#713f12" opacity="0.7" stroke="#fbbf24" stroke-width="2"/>
  <text x="585" y="215" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🔊 Spatial</text>
  <text x="585" y="235" text-anchor="middle" fill="#fef3c7" font-size="10">Ambisonics S²</text>
  <text x="585" y="252" text-anchor="middle" fill="#fef3c7" font-size="10">Binaural</text>
  <text x="585" y="268" text-anchor="middle" fill="#fef3c7" font-size="9">Transport on sphere</text>
  
  <!-- Haptic (bottom) -->
  <rect x="260" y="330" width="180" height="65" rx="15" fill="#14532d" opacity="0.7" stroke="#4ade80" stroke-width="2"/>
  <text x="350" y="355" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🫳 Haptic</text>
  <text x="350" y="375" text-anchor="middle" fill="#bbf7d0" font-size="10">Tactile Feedback</text>
  <text x="350" y="390" text-anchor="middle" fill="#bbf7d0" font-size="9">Audio → Vibration Map</text>
  
  <!-- Arrows: circular flow -->
  <!-- Listener → Sensors -->
  <path d="M330,175 L330,165" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowWhite)"/>
  <text x="315" y="172" fill="#38bdf8" font-size="9">physio</text>
  
  <!-- Sensors → Synth -->
  <path d="M265,140 L190,185" fill="none" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="210" y="155" fill="#f472b6" font-size="9">params</text>
  
  <!-- Synth → Listener -->
  <path d="M190,230 L290,230" fill="none" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="240" y="222" fill="#f472b6" font-size="9">audio</text>
  
  <!-- Synth → Spatial -->
  <path d="M190,250 L510,250" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowWhite)" stroke-dasharray="4,3"/>
  
  <!-- Spatial → Listener -->
  <path d="M510,220 L410,220" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="460" y="213" fill="#fbbf24" font-size="9">3D audio</text>
  
  <!-- Listener → Haptic -->
  <path d="M350,290 L350,330" fill="none" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  
  <!-- Convergence annotation -->
  <rect x="30" y="360" width="200" height="70" rx="10" fill="#1e1b4b" opacity="0.8"/>
  <text x="130" y="385" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="bold">Convergence Guarantee</text>
  <text x="130" y="403" text-anchor="middle" fill="#c4b5fd" font-size="10">d(f ⁿ(x₀), x*) ≤ kⁿ·d₀</text>
  <text x="130" y="420" text-anchor="middle" fill="#c4b5fd" font-size="10">→ unique stable timbre x*</text>
</svg>
