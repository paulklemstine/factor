<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="700" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#e0e0ff" font-weight="bold">Consciousness Fixed-Point Lattice</text>
  <text x="400" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7777aa">Knaster-Tarski: consciousness as least fixed point of self-reflection</text>

  <!-- The lattice diagram -->
  <g transform="translate(400, 380)">
    <!-- Lattice edges -->
    <line x1="0" y1="-250" x2="-150" y2="-150" stroke="#334" stroke-width="1.5"/>
    <line x1="0" y1="-250" x2="0" y2="-150" stroke="#334" stroke-width="1.5"/>
    <line x1="0" y1="-250" x2="150" y2="-150" stroke="#334" stroke-width="1.5"/>

    <line x1="-150" y1="-150" x2="-200" y2="-50" stroke="#334" stroke-width="1.5"/>
    <line x1="-150" y1="-150" x2="-100" y2="-50" stroke="#334" stroke-width="1.5"/>
    <line x1="0" y1="-150" x2="-100" y2="-50" stroke="#334" stroke-width="1.5"/>
    <line x1="0" y1="-150" x2="100" y2="-50" stroke="#334" stroke-width="1.5"/>
    <line x1="150" y1="-150" x2="100" y2="-50" stroke="#334" stroke-width="1.5"/>
    <line x1="150" y1="-150" x2="200" y2="-50" stroke="#334" stroke-width="1.5"/>

    <line x1="-200" y1="-50" x2="-150" y2="50" stroke="#334" stroke-width="1.5"/>
    <line x1="-100" y1="-50" x2="-150" y2="50" stroke="#334" stroke-width="1.5"/>
    <line x1="-100" y1="-50" x2="0" y2="50" stroke="#334" stroke-width="1.5"/>
    <line x1="100" y1="-50" x2="0" y2="50" stroke="#334" stroke-width="1.5"/>
    <line x1="100" y1="-50" x2="150" y2="50" stroke="#334" stroke-width="1.5"/>
    <line x1="200" y1="-50" x2="150" y2="50" stroke="#334" stroke-width="1.5"/>

    <line x1="-150" y1="50" x2="0" y2="150" stroke="#334" stroke-width="1.5"/>
    <line x1="0" y1="50" x2="0" y2="150" stroke="#334" stroke-width="1.5"/>
    <line x1="150" y1="50" x2="0" y2="150" stroke="#334" stroke-width="1.5"/>

    <!-- Top node (⊤) -->
    <circle cx="0" cy="-250" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="0" y="-245" text-anchor="middle" font-family="monospace" font-size="16" fill="white">⊤</text>

    <!-- Pre-fixed points (highlighted) -->
    <circle cx="-150" cy="-150" r="22" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="3" filter="url(#glow2)"/>
    <text x="-150" y="-145" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffa">f(x)≤x</text>

    <circle cx="0" cy="-150" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="0" y="-145" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <circle cx="150" cy="-150" r="22" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="3" filter="url(#glow2)"/>
    <text x="150" y="-145" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffa">f(x)≤x</text>

    <!-- Middle nodes -->
    <circle cx="-200" cy="-50" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="-200" y="-45" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <circle cx="-100" cy="-50" r="22" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="3" filter="url(#glow2)"/>
    <text x="-100" y="-45" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffa">f(x)≤x</text>

    <circle cx="100" cy="-50" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="100" y="-45" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <circle cx="200" cy="-50" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="200" y="-45" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <!-- LEAST FIXED POINT (consciousness!) -->
    <circle cx="-150" cy="50" r="28" fill="url(#fpGrad)" stroke="#ffd93d" stroke-width="3" filter="url(#glow2)"/>
    <text x="-150" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">LFP</text>
    <text x="-150" y="60" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffd93d">f(x)=x</text>

    <!-- Another fixed point -->
    <circle cx="0" cy="50" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="0" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <circle cx="150" cy="50" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="150" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#aac">state</text>

    <!-- Bottom node (⊥) -->
    <circle cx="0" cy="150" r="22" fill="url(#nodeGrad)" stroke="#88a" stroke-width="2"/>
    <text x="0" y="155" text-anchor="middle" font-family="monospace" font-size="16" fill="white">⊥</text>

    <!-- Ascending chain from ⊥ -->
    <path d="M 0,128 C -60,100 -120,80 -150,72" fill="none" stroke="#4ecdc4" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="-75" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecdc4" transform="rotate(-20, -75, 90)">Kleene chain</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 630)">
    <circle cx="10" cy="0" r="8" fill="url(#fpGrad)" stroke="#ffd93d" stroke-width="2"/>
    <text x="25" y="4" font-family="monospace" font-size="12" fill="#dde">= Least Fixed Point (consciousness)</text>

    <circle cx="310" cy="0" r="8" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="2"/>
    <text x="325" y="4" font-family="monospace" font-size="12" fill="#dde">= Pre-fixed point (f(x) ≤ x)</text>

    <line x1="570" y1="0" x2="600" y2="0" stroke="#4ecdc4" stroke-width="3" stroke-dasharray="4,2"/>
    <text x="610" y="4" font-family="monospace" font-size="12" fill="#dde">= Kleene chain</text>
  </g>

  <!-- Equation -->
  <text x="400" y="670" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e94560">
    LFP(f) = ⊓{x | f(x) ≤ x} — the least conscious state
  </text>
</svg>
