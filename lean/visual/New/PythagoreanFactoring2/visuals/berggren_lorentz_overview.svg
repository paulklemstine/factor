<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#16213e"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa"/>
  </marker>
</defs>

<!-- Background -->
<rect width="900" height="650" fill="url(#bgGrad)"/>

<!-- Title -->
<text x="450" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Georgia, serif"
      font-size="22" font-weight="bold">The Berggren-Lorentz Correspondence</text>
<text x="450" y="58" text-anchor="middle" fill="#8899aa" font-family="Georgia, serif" font-size="13">
  Pythagorean Triples • Lorentz Group • Hyperbolic Geometry • Integer Factoring</text>

<!-- ═══ Panel 1: Berggren Tree ═══ -->
<rect x="20" y="75" width="270" height="260" rx="10" fill="#0d1b2a" stroke="#334" stroke-width="1"/>
<text x="155" y="98" text-anchor="middle" fill="#e8a735" font-family="sans-serif" font-size="14" font-weight="bold">
  Berggren Tree</text>

<!-- Root -->
<circle cx="155" cy="130" r="15" fill="#f39c12" filter="url(#glow)"/>
<text x="155" y="134" text-anchor="middle" fill="#111" font-family="monospace" font-size="9" font-weight="bold">3,4,5</text>

<!-- A branch -->
<line x1="142" y1="143" x2="80" y2="185" stroke="#e74c3c" stroke-width="2"/>
<circle cx="80" cy="195" r="12" fill="#e74c3c"/>
<text x="80" y="199" text-anchor="middle" fill="white" font-family="monospace" font-size="7">5,12,13</text>
<text x="105" y="162" fill="#e74c3c" font-family="sans-serif" font-size="10">A</text>

<!-- B branch -->
<line x1="155" y1="145" x2="155" y2="185" stroke="#2ecc71" stroke-width="2"/>
<circle cx="155" cy="195" r="12" fill="#2ecc71"/>
<text x="155" y="199" text-anchor="middle" fill="white" font-family="monospace" font-size="7">21,20,29</text>
<text x="163" y="168" fill="#2ecc71" font-family="sans-serif" font-size="10">B</text>

<!-- C branch -->
<line x1="168" y1="143" x2="230" y2="185" stroke="#3498db" stroke-width="2"/>
<circle cx="230" cy="195" r="12" fill="#3498db"/>
<text x="230" y="199" text-anchor="middle" fill="white" font-family="monospace" font-size="7">15,8,17</text>
<text x="205" y="162" fill="#3498db" font-family="sans-serif" font-size="10">C</text>

<!-- Depth 2 hints -->
<line x1="72" y1="207" x2="45" y2="240" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>
<circle cx="45" cy="248" r="8" fill="#e74c3c" opacity="0.6"/>
<text x="45" y="251" text-anchor="middle" fill="white" font-family="monospace" font-size="5">7,24,25</text>

<line x1="80" y1="207" x2="80" y2="240" stroke="#2ecc71" stroke-width="1" opacity="0.5"/>
<circle cx="80" cy="248" r="8" fill="#2ecc71" opacity="0.6"/>
<text x="80" y="251" text-anchor="middle" fill="white" font-family="monospace" font-size="5">55,48,73</text>

<line x1="88" y1="207" x2="115" y2="240" stroke="#3498db" stroke-width="1" opacity="0.5"/>
<circle cx="115" cy="248" r="8" fill="#3498db" opacity="0.6"/>
<text x="115" y="251" text-anchor="middle" fill="white" font-family="monospace" font-size="5">45,28,53</text>

<text x="155" y="290" text-anchor="middle" fill="#8899aa" font-family="serif" font-size="10" font-style="italic">
  Every PPT appears exactly once</text>

<!-- ═══ Panel 2: Lorentz Group ═══ -->
<rect x="310" y="75" width="270" height="260" rx="10" fill="#0d1b2a" stroke="#334" stroke-width="1"/>
<text x="445" y="98" text-anchor="middle" fill="#e8a735" font-family="sans-serif" font-size="14" font-weight="bold">
  Lorentz Group O(2,1;ℤ)</text>

<!-- Lorentz form -->
<text x="445" y="125" text-anchor="middle" fill="#ddd" font-family="serif" font-size="14">
  Q(a,b,c) = a² + b² − c²</text>
<text x="445" y="148" text-anchor="middle" fill="#aaa" font-family="serif" font-size="11">
  Pythagorean triples: Q = 0 (null cone)</text>

<!-- Matrix equation -->
<text x="445" y="178" text-anchor="middle" fill="#7ec8e3" font-family="monospace" font-size="12">
  Bᵢᵀ · Q · Bᵢ = Q  ∀ i ∈ {A,B,C}</text>

<!-- Spacetime connection -->
<rect x="330" y="195" width="230" height="55" rx="6" fill="#1a2744" stroke="#445" stroke-width="0.5"/>
<text x="445" y="213" text-anchor="middle" fill="#e8a735" font-family="serif" font-size="11" font-weight="bold">
  Einstein's Spacetime</text>
<text x="445" y="232" text-anchor="middle" fill="#bbb" font-family="serif" font-size="11">
  ds² = dt² − dx² − dy²</text>
<text x="445" y="248" text-anchor="middle" fill="#888" font-family="serif" font-size="9">
  Same signature: (+,+,−)</text>

<!-- Determinants -->
<text x="445" y="278" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">
  det(A) = +1   det(B) = −1   det(C) = +1</text>
<text x="445" y="298" text-anchor="middle" fill="#888" font-family="serif" font-size="10" font-style="italic">
  Machine-verified in Lean 4</text>

<!-- ═══ Panel 3: Factoring ═══ -->
<rect x="600" y="75" width="280" height="260" rx="10" fill="#0d1b2a" stroke="#334" stroke-width="1"/>
<text x="740" y="98" text-anchor="middle" fill="#e8a735" font-family="sans-serif" font-size="14" font-weight="bold">
  Integer Factoring</text>

<!-- Key identity -->
<text x="740" y="128" text-anchor="middle" fill="#ddd" font-family="serif" font-size="13">
  (c − b)(c + b) = a² = N²</text>
<text x="740" y="148" text-anchor="middle" fill="#aaa" font-family="serif" font-size="10">
  Non-trivial factorization of N²</text>

<!-- Example -->
<rect x="620" y="160" width="240" height="80" rx="6" fill="#1a2744" stroke="#445" stroke-width="0.5"/>
<text x="740" y="178" text-anchor="middle" fill="#e8a735" font-family="monospace" font-size="11">
  N = 667 = 23 × 29</text>
<text x="740" y="198" text-anchor="middle" fill="#bbb" font-family="monospace" font-size="10">
  Triple: (667, 156, 685)</text>
<text x="740" y="216" text-anchor="middle" fill="#bbb" font-family="monospace" font-size="10">
  529 × 841 = 23² × 29²</text>
<text x="740" y="233" text-anchor="middle" fill="#2ecc71" font-family="monospace" font-size="10">
  gcd(667, 529) = 23  ★</text>

<!-- Process -->
<text x="740" y="262" text-anchor="middle" fill="#aaa" font-family="serif" font-size="10">
  Tree descent extracts factors</text>
<text x="740" y="278" text-anchor="middle" fill="#aaa" font-family="serif" font-size="10">
  via gcd at each level</text>
<text x="740" y="298" text-anchor="middle" fill="#2ecc71" font-family="serif" font-size="10" font-weight="bold">
  100% success on all semiprimes tested</text>

<!-- ═══ Panel 4: Depth Spectrum ═══ -->
<rect x="20" y="355" width="420" height="270" rx="10" fill="#0d1b2a" stroke="#334" stroke-width="1"/>
<text x="230" y="378" text-anchor="middle" fill="#e8a735" font-family="sans-serif" font-size="14" font-weight="bold">
  Depth Spectrum</text>

<!-- A-branch curve (quadratic) -->
<polyline points="50,580 95,570 140,555 185,535 230,510 275,480 320,440 365,400"
          fill="none" stroke="#e74c3c" stroke-width="2.5"/>
<text x="375" y="398" fill="#e74c3c" font-family="sans-serif" font-size="10">A: √c growth</text>

<!-- B-branch curve (exponential) -->
<polyline points="50,580 95,540 140,490 185,430 230,410 275,400 320,395 365,392"
          fill="none" stroke="#2ecc71" stroke-width="2.5"/>
<text x="375" y="395" fill="#2ecc71" font-family="sans-serif" font-size="10">B: log c growth</text>

<!-- Axes -->
<line x1="50" y1="585" x2="400" y2="585" stroke="#555" stroke-width="1"/>
<line x1="50" y1="390" x2="50" y2="585" stroke="#555" stroke-width="1"/>
<text x="230" y="605" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Depth d</text>
<text x="30" y="490" fill="#888" font-family="sans-serif" font-size="10"
      transform="rotate(-90, 30, 490)">log(hypotenuse)</text>

<!-- Key insight -->
<text x="230" y="422" text-anchor="middle" fill="#fff" font-family="serif" font-size="11" font-weight="bold">
  B-branch: c_n ≈ (3+2√2)ⁿ · 5</text>
<text x="230" y="442" text-anchor="middle" fill="#aaa" font-family="serif" font-size="10">
  A-branch: c_n ≈ 2n² (Fibonacci worst case)</text>

<!-- ═══ Panel 5: Hyperbolic Geometry ═══ -->
<rect x="460" y="355" width="420" height="270" rx="10" fill="#0d1b2a" stroke="#334" stroke-width="1"/>
<text x="670" y="378" text-anchor="middle" fill="#e8a735" font-family="sans-serif" font-size="14" font-weight="bold">
  Hyperbolic Tiling</text>

<!-- Poincaré disk -->
<circle cx="670" cy="500" r="100" fill="#0a0f1a" stroke="#445" stroke-width="1.5"/>

<!-- Points on boundary (unit circle since a²+b²=c²) -->
<!-- (3,4,5) → (0.6, 0.8) -->
<circle cx="730" cy="420" r="5" fill="#f39c12" filter="url(#glow)"/>
<!-- (5,12,13) → (0.385, 0.923) -->
<circle cx="708.5" cy="407.7" r="4" fill="#e74c3c"/>
<!-- (21,20,29) → (0.724, 0.690) -->
<circle cx="742.4" cy="431" r="4" fill="#2ecc71"/>
<!-- (15,8,17) → (0.882, 0.471) -->
<circle cx="758.2" cy="452.9" r="4" fill="#3498db"/>
<!-- (7,24,25) → (0.28, 0.96) -->
<circle cx="698" cy="404" r="3" fill="#e74c3c" opacity="0.7"/>
<!-- (119,120,169) → (0.704, 0.710) -->
<circle cx="740.4" cy="429" r="3" fill="#2ecc71" opacity="0.7"/>

<!-- Labels -->
<text x="670" y="615" text-anchor="middle" fill="#888" font-family="serif" font-size="10" font-style="italic">
  Each triple maps to (a/c, b/c) on the unit circle</text>
<text x="670" y="600" text-anchor="middle" fill="#aaa" font-family="serif" font-size="10">
  Berggren tree tiles the hyperbolic plane</text>

<!-- Legend at bottom -->
<rect x="20" y="632" width="860" height="2" fill="#334"/>
<text x="450" y="648" text-anchor="middle" fill="#667" font-family="serif" font-size="10" font-style="italic">
  All results machine-verified in Lean 4 with Mathlib  •  Core formalization: sorry-free  •  Axioms: propext, Classical.choice, Quot.sound</text>
</svg>
