<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480"
     viewBox="0 0 900 480">
<rect width="900" height="480" fill="#fafaf5"/>
<text x="450.0" y="30" text-anchor="middle" fill="#333"
      font-family="Georgia, serif" font-size="16" font-weight="bold">
  Factoring N = 667 via Pythagorean Triples</text>
<text x="450.0" y="50" text-anchor="middle" fill="#666"
      font-family="Georgia, serif" font-size="12">
  (c - b)(c + b) = N*N = 444889    |    gcd extraction reveals factors</text>

<rect x="30" y="80" width="840" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
<text x="50" y="100" fill="#333" font-family="monospace" font-size="13">Triple #1: (667, 222444, 222445)</text>
<text x="50" y="120" fill="#555" font-family="monospace" font-size="11">(c−b)(c+b) = 1 × 444889 = 444889</text>
<text x="50" y="140" fill="#888" font-family="monospace" font-size="11">gcd(667, 1) = 1    gcd(667, 444889) = 667</text>
<rect x="30" y="170" width="840" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
<text x="50" y="190" fill="#333" font-family="monospace" font-size="13">Triple #2: (667, 9660, 9683)</text>
<text x="50" y="210" fill="#555" font-family="monospace" font-size="11">(c−b)(c+b) = 23 × 19343 = 444889</text>
<text x="50" y="230" fill="#27ae60" font-family="monospace" font-size="11">gcd(667, 23) = 23  →  667 = 23 × 29  ★    gcd(667, 19343) = 667</text>
<rect x="30" y="260" width="840" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
<text x="50" y="280" fill="#333" font-family="monospace" font-size="13">Triple #3: (667, 7656, 7685)</text>
<text x="50" y="300" fill="#555" font-family="monospace" font-size="11">(c−b)(c+b) = 29 × 15341 = 444889</text>
<text x="50" y="320" fill="#27ae60" font-family="monospace" font-size="11">gcd(667, 29) = 29  →  667 = 29 × 23  ★    gcd(667, 15341) = 667</text>
<rect x="30" y="350" width="840" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
<text x="50" y="370" fill="#333" font-family="monospace" font-size="13">Triple #4: (667, 156, 685)</text>
<text x="50" y="390" fill="#555" font-family="monospace" font-size="11">(c−b)(c+b) = 529 × 841 = 444889</text>
<text x="50" y="410" fill="#27ae60" font-family="monospace" font-size="11">gcd(667, 529) = 23  →  667 = 23 × 29  ★    gcd(667, 841) = 29  →  667 = 29 × 23  ★</text>
</svg>