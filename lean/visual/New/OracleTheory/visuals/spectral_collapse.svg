<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e94560" font-size="24" font-weight="bold">
    SPECTRAL COLLAPSE THEOREM
  </text>
  <text x="400" y="65" text-anchor="middle" fill="#aaa" font-size="14">
    Eigenvalues of idempotent operators collapse to {0, 1}
  </text>
  
  <!-- Axes -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#444" stroke-width="2"/>
  <line x1="100" y1="100" x2="100" y2="400" stroke="#444" stroke-width="2"/>
  
  <!-- X-axis label -->
  <text x="400" y="440" text-anchor="middle" fill="#888" font-size="14">Iteration Step</text>
  <!-- Y-axis label -->
  <text x="50" y="250" text-anchor="middle" fill="#888" font-size="14" transform="rotate(-90,50,250)">Eigenvalue</text>
  
  <!-- Grid lines for 0 and 1 -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="85" y="405" text-anchor="end" fill="#e94560" font-size="12" font-weight="bold">0</text>
  
  <line x1="100" y1="200" x2="700" y2="200" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="85" y="205" text-anchor="end" fill="#00d2ff" font-size="12" font-weight="bold">1</text>
  
  <!-- Eigenvalue trajectories collapsing to 0 -->
  <!-- λ₁: 0.15 → 0 -->
  <path d="M 130,370 Q 200,380 300,392 Q 400,398 500,400 L 670,400" 
        fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.9"/>
  <!-- λ₂: 0.35 → 0 -->
  <path d="M 130,330 Q 200,360 300,385 Q 400,395 500,399 L 670,400" 
        fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.7"/>
  <!-- λ₃: -0.1 → 0 -->
  <path d="M 130,420 Q 200,415 300,405 Q 400,401 500,400 L 670,400" 
        fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Eigenvalue trajectories collapsing to 1 -->
  <!-- λ₄: 0.7 → 1 -->
  <path d="M 130,260 Q 200,230 300,210 Q 400,203 500,201 L 670,200" 
        fill="none" stroke="#00d2ff" stroke-width="2.5" opacity="0.9"/>
  <!-- λ₅: 0.85 → 1 -->
  <path d="M 130,230 Q 200,215 300,205 Q 400,201 500,200 L 670,200" 
        fill="none" stroke="#00d2ff" stroke-width="2.5" opacity="0.7"/>
  
  <!-- Glow effects at collapse points -->
  <circle cx="670" cy="400" r="8" fill="#e94560" opacity="0.6" filter="url(#blur)"/>
  <circle cx="670" cy="400" r="4" fill="#e94560"/>
  <circle cx="670" cy="200" r="8" fill="#00d2ff" opacity="0.6" filter="url(#blur)"/>
  <circle cx="670" cy="200" r="4" fill="#00d2ff"/>
  
  <!-- Starting points -->
  <circle cx="130" cy="370" r="4" fill="#e94560" opacity="0.9"/>
  <circle cx="130" cy="330" r="4" fill="#e94560" opacity="0.7"/>
  <circle cx="130" cy="420" r="4" fill="#e94560" opacity="0.5"/>
  <circle cx="130" cy="260" r="4" fill="#00d2ff" opacity="0.9"/>
  <circle cx="130" cy="230" r="4" fill="#00d2ff" opacity="0.7"/>
  
  <!-- Legend -->
  <rect x="520" y="80" width="250" height="90" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <circle cx="540" cy="100" r="6" fill="#00d2ff"/>
  <text x="555" y="105" fill="#ddd" font-size="12">→ eigenvalue 1 (known)</text>
  <circle cx="540" cy="125" r="6" fill="#e94560"/>
  <text x="555" y="130" fill="#ddd" font-size="12">→ eigenvalue 0 (unknown)</text>
  <text x="540" y="155" fill="#888" font-size="11" font-style="italic">T² = T ⟹ spec(T) ⊆ {0,1}</text>
  
  <!-- Formula -->
  <text x="400" y="480" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">
    Tv = μv, T² = T  ⟹  μ ∈ {0, 1}
  </text>
</svg>
