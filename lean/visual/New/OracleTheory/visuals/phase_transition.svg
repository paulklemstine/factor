<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a30"/>
    </linearGradient>
    <linearGradient id="converge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66"/>
      <stop offset="100%" style="stop-color:#51cf66;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="diverge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg5)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffd43b" font-size="22" font-weight="bold">
    SHARP PHASE TRANSITION IN ORACLE CONVERGENCE
  </text>
  
  <!-- Convergence region (left) -->
  <rect x="80" y="60" width="300" height="340" rx="4" fill="#51cf66" opacity="0.05"/>
  <text x="230" y="85" text-anchor="middle" fill="#51cf66" font-size="14" font-weight="bold">CONVERGENCE</text>
  <text x="230" y="100" text-anchor="middle" fill="#888" font-size="11">|c| &lt; 1</text>
  
  <!-- Divergence region (right) -->
  <rect x="420" y="60" width="300" height="340" rx="4" fill="#e94560" opacity="0.05"/>
  <text x="570" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">DIVERGENCE</text>
  <text x="570" y="100" text-anchor="middle" fill="#888" font-size="11">|c| &gt; 1</text>
  
  <!-- Critical line -->
  <line x1="400" y1="60" x2="400" y2="400" stroke="#ffd43b" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="400" y="415" text-anchor="middle" fill="#ffd43b" font-size="14" font-weight="bold">|c| = 1</text>
  <text x="400" y="435" text-anchor="middle" fill="#ffd43b" font-size="11">CRITICAL POINT</text>
  
  <!-- Convergence curves -->
  <!-- c = 0.3 -->
  <polyline points="100,120 140,130 180,133 220,134 260,134 300,134 340,134" 
            fill="none" stroke="#51cf66" stroke-width="2"/>
  <text x="345" y="138" fill="#51cf66" font-size="10">c=0.3</text>
  
  <!-- c = 0.7 -->
  <polyline points="100,150 140,170 180,185 220,195 260,200 300,203 340,204" 
            fill="none" stroke="#51cf66" stroke-width="2" opacity="0.8"/>
  <text x="345" y="208" fill="#51cf66" font-size="10">c=0.7</text>
  
  <!-- c = 0.9 -->
  <polyline points="100,160 140,200 180,230 220,255 260,270 300,280 340,285" 
            fill="none" stroke="#51cf66" stroke-width="2" opacity="0.6"/>
  <text x="345" y="289" fill="#51cf66" font-size="10">c=0.9</text>
  
  <!-- c = 0.99 -->
  <polyline points="100,165 140,215 180,260 220,295 260,320 300,340 340,355" 
            fill="none" stroke="#51cf66" stroke-width="2" opacity="0.4"/>
  <text x="345" y="359" fill="#51cf66" font-size="10">c=0.99</text>
  
  <!-- Divergence curves -->
  <!-- c = 1.01 -->
  <polyline points="460,355 500,340 540,320 580,295 620,260 660,215 700,165" 
            fill="none" stroke="#e94560" stroke-width="2" opacity="0.4"/>
  <text x="455" y="359" fill="#e94560" font-size="10" text-anchor="end">c=1.01</text>
  
  <!-- c = 1.1 -->
  <polyline points="460,285 500,270 540,240 580,195 620,140 660,125 700,115" 
            fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <text x="455" y="289" fill="#e94560" font-size="10" text-anchor="end">c=1.1</text>
  
  <!-- c = 1.5 -->
  <polyline points="460,204 500,180 540,145 580,115 620,95 660,80 700,70" 
            fill="none" stroke="#e94560" stroke-width="2" opacity="0.8"/>
  <text x="455" y="208" fill="#e94560" font-size="10" text-anchor="end">c=1.5</text>
  
  <!-- c = 2.0 -->
  <polyline points="460,134 500,115 540,95 580,80 620,72 660,67 700,65" 
            fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="455" y="138" fill="#e94560" font-size="10" text-anchor="end">c=2.0</text>
  
  <!-- Y-axis labels -->
  <text x="70" y="120" text-anchor="end" fill="#888" font-size="10">fast</text>
  <text x="70" y="380" text-anchor="end" fill="#888" font-size="10">slow</text>
  <text x="40" y="250" text-anchor="middle" fill="#888" font-size="11" transform="rotate(-90,40,250)">convergence time</text>
  
  <!-- Arrow annotations -->
  <text x="230" y="380" text-anchor="middle" fill="#51cf66" font-size="12">c^n → 0 ✓</text>
  <text x="570" y="380" text-anchor="middle" fill="#e94560" font-size="12">c^n → ∞ ✗</text>
</svg>
