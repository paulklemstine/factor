<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="sat_bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="50%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="gap_fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#4CAF50" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#F44336" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F44336" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#0d1117" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold">
    Spectral Collapse at the SAT Phase Transition
  </text>

  <!-- Phase transition graph area -->
  <rect x="80" y="60" width="640" height="200" fill="#111827" rx="5" stroke="#333" stroke-width="1"/>

  <!-- Axes -->
  <line x1="120" y1="240" x2="700" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="80" x2="120" y2="240" stroke="#555" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="65" y="160" text-anchor="middle" fill="#aaa" font-size="12" transform="rotate(-90 65 160)">
    P(satisfiable)
  </text>
  <text x="110" y="85" text-anchor="end" fill="#aaa" font-size="11">1.0</text>
  <text x="110" y="245" text-anchor="end" fill="#aaa" font-size="11">0.0</text>

  <!-- X axis label -->
  <text x="400" y="258" text-anchor="middle" fill="#aaa" font-size="12">
    Clause density α = m/n
  </text>

  <!-- Phase transition curve (sigmoid-like) -->
  <path d="M 130 90 C 200 90, 300 92, 370 95 C 400 100, 415 120, 425 160 C 435 200, 450 230, 690 238"
        fill="none" stroke="#64B5F6" stroke-width="3"/>

  <!-- Threshold line -->
  <line x1="420" y1="75" x2="420" y2="245" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="420" y="268" text-anchor="middle" fill="#FFC107" font-size="11">
    α* ≈ 4.267
  </text>

  <!-- SAT / UNSAT labels -->
  <text x="250" y="110" text-anchor="middle" fill="#4CAF50" font-size="16" font-weight="bold">SAT</text>
  <text x="580" y="220" text-anchor="middle" fill="#F44336" font-size="16" font-weight="bold">UNSAT</text>

  <!-- Spectral gap graph area -->
  <rect x="80" y="290" width="640" height="180" fill="#111827" rx="5" stroke="#333" stroke-width="1"/>

  <!-- Axes -->
  <line x1="120" y1="450" x2="700" y2="450" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="310" x2="120" y2="450" stroke="#555" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="65" y="380" text-anchor="middle" fill="#aaa" font-size="12" transform="rotate(-90 65 380)">
    Spectral Gap
  </text>
  <text x="110" y="318" text-anchor="end" fill="#aaa" font-size="11">Ω(1)</text>
  <text x="110" y="455" text-anchor="end" fill="#aaa" font-size="11">0</text>

  <!-- X axis label -->
  <text x="400" y="470" text-anchor="middle" fill="#aaa" font-size="12">
    Clause density α = m/n
  </text>

  <!-- Spectral gap curve (drops at threshold) -->
  <path d="M 130 320 C 200 320, 300 322, 370 325 C 400 330, 410 345, 415 370 C 420 400, 425 435, 430 445 C 435 448, 500 449, 690 450"
        fill="none" stroke="#E040FB" stroke-width="3"/>

  <!-- Fill area under curve -->
  <path d="M 130 320 C 200 320, 300 322, 370 325 C 400 330, 410 345, 415 370 C 420 400, 425 435, 430 445 C 435 448, 500 449, 690 450 L 690 450 L 130 450 Z"
        fill="#E040FB" fill-opacity="0.1"/>

  <!-- Threshold line -->
  <line x1="420" y1="305" x2="420" y2="455" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Collapse annotation -->
  <text x="425" y="385" fill="#E040FB" font-size="13" font-weight="bold">
    COLLAPSE
  </text>
  <path d="M 430 395 L 425 430" fill="none" stroke="#E040FB" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Large gap annotation -->
  <text x="250" y="340" text-anchor="middle" fill="#4CAF50" font-size="12">Large gap</text>
  <text x="250" y="356" text-anchor="middle" fill="#4CAF50" font-size="12">= EASY</text>

  <!-- Small gap annotation -->
  <text x="580" y="440" text-anchor="middle" fill="#F44336" font-size="12">Zero gap</text>
  <text x="580" y="456" text-anchor="middle" fill="#F44336" font-size="12">= HARD</text>

  <!-- Proven in Lean box -->
  <rect x="150" y="490" width="500" height="40" rx="8" fill="#1a2332" stroke="#9C27B0" stroke-width="1"/>
  <text x="400" y="515" text-anchor="middle" fill="#CE93D8" font-size="12">
    Lean-verified: spectralGap_nonneg, chiChar_sq, spectralEnergy_sum (Parseval)
  </text>
</svg>
