<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="circle_grad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a237e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold">
    Stereographic Compactification of Parameter Space
  </text>

  <!-- Left panel: Real line -->
  <text x="200" y="75" text-anchor="middle" fill="#aaa" font-size="14" font-weight="bold">
    Parameter Space (ℝ)
  </text>

  <!-- Number line -->
  <line x1="30" y1="250" x2="370" y2="250" stroke="#555" stroke-width="2"/>

  <!-- Tick marks and labels -->
  <line x1="50" y1="245" x2="50" y2="255" stroke="#888" stroke-width="1.5"/>
  <text x="50" y="270" text-anchor="middle" fill="#888" font-size="11">0</text>
  <circle cx="50" cy="250" r="5" fill="#4CAF50"/>

  <line x1="110" y1="245" x2="110" y2="255" stroke="#888" stroke-width="1.5"/>
  <text x="110" y="270" text-anchor="middle" fill="#888" font-size="11">1</text>
  <circle cx="110" cy="250" r="5" fill="#2196F3"/>

  <line x1="170" y1="245" x2="170" y2="255" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="270" text-anchor="middle" fill="#888" font-size="11">5</text>
  <circle cx="170" cy="250" r="5" fill="#FF9800"/>

  <line x1="230" y1="245" x2="230" y2="255" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="270" text-anchor="middle" fill="#888" font-size="11">10</text>
  <circle cx="230" cy="250" r="4" fill="#F44336"/>

  <line x1="290" y1="245" x2="290" y2="255" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="270" text-anchor="middle" fill="#888" font-size="11">100</text>
  <circle cx="290" cy="250" r="3" fill="#9C27B0"/>

  <text x="350" y="245" fill="#888" font-size="14">→ ∞</text>

  <text x="200" y="300" text-anchor="middle" fill="#666" font-size="11">
    Unbounded: parameters can be arbitrarily large
  </text>

  <!-- Arrow between panels -->
  <path d="M 385 250 L 430 250" fill="none" stroke="#FFC107" stroke-width="2" marker-end="url(#arr)"/>
  <text x="408" y="240" text-anchor="middle" fill="#FFC107" font-size="12">arctan</text>

  <!-- Right panel: Circle (compactified) -->
  <text x="600" y="75" text-anchor="middle" fill="#aaa" font-size="14" font-weight="bold">
    Compactified Space (S¹)
  </text>

  <!-- Unit circle -->
  <circle cx="600" cy="250" r="130" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="600" cy="250" r="130" fill="#1a237e" fill-opacity="0.15"/>

  <!-- Points on circle corresponding to parameters -->
  <!-- k=0: arctan(0)=0, maps to (0, -1) on circle (south pole) -->
  <circle cx="600" cy="380" r="6" fill="#4CAF50"/>
  <text x="615" y="395" fill="#4CAF50" font-size="11">k=0</text>

  <!-- k=1: arctan(1)=π/4, maps to ~45° from south -->
  <circle cx="692" cy="342" r="6" fill="#2196F3"/>
  <text x="708" y="348" fill="#2196F3" font-size="11">k=1</text>

  <!-- k=5: arctan(5)≈1.37, maps to ~79° -->
  <circle cx="727" cy="225" r="5" fill="#FF9800"/>
  <text x="740" y="222" fill="#FF9800" font-size="11">k=5</text>

  <!-- k=10: arctan(10)≈1.47, maps to ~84° -->
  <circle cx="724" cy="200" r="4" fill="#F44336"/>
  <text x="738" y="198" fill="#F44336" font-size="11">k=10</text>

  <!-- k=100: arctan(100)≈1.56, maps to ~89° -->
  <circle cx="710" cy="150" r="3" fill="#9C27B0"/>
  <text x="725" y="148" fill="#9C27B0" font-size="11">k=100</text>

  <!-- k=∞: maps to north pole (0, 1) -->
  <circle cx="600" cy="120" r="7" fill="white" stroke="#FFC107" stroke-width="2"/>
  <text x="620" y="115" fill="#FFC107" font-size="12" font-weight="bold">k=∞</text>

  <!-- Distance arc -->
  <path d="M 600 380 A 130 130 0 0 0 710 150" fill="none" stroke="#E040FB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="700" y="280" fill="#E040FB" font-size="11">d ≤ π</text>

  <!-- Properties box -->
  <rect x="100" y="350" width="280" height="130" rx="8" fill="#1a2332" stroke="#607D8B" stroke-width="1"/>
  <text x="240" y="375" text-anchor="middle" fill="#90CAF9" font-size="13" font-weight="bold">
    Proven Properties
  </text>
  <text x="120" y="400" fill="#ccc" font-size="12">✓ d(k₁, k₂) = d(k₂, k₁)</text>
  <text x="120" y="420" fill="#ccc" font-size="12">✓ d(k₁, k₂) ≤ π</text>
  <text x="120" y="440" fill="#ccc" font-size="12">✓ d(k₁, k₃) ≤ d(k₁, k₂) + d(k₂, k₃)</text>
  <text x="120" y="460" fill="#ccc" font-size="12">✓ FPT preserved under compactification</text>

  <!-- Key insight -->
  <rect x="440" y="400" width="330" height="80" rx="8" fill="#1a2332" stroke="#4CAF50" stroke-width="1"/>
  <text x="605" y="425" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">
    Key Insight
  </text>
  <text x="460" y="447" fill="#ccc" font-size="11">All parameters are "close" in the</text>
  <text x="460" y="465" fill="#ccc" font-size="11">compactified space → uniform bounds!</text>
</svg>
