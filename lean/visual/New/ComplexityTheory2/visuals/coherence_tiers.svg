<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="tier0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#388E3C" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tier1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tier2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tier3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F44336" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B71C1C" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e0e0e0" font-size="24" font-weight="bold">
    Coherence-Stratified Complexity
  </text>
  <text x="400" y="70" text-anchor="middle" fill="#aaa" font-size="14">
    Four tiers of computational coordination
  </text>

  <!-- Tier 0 -->
  <rect x="50" y="100" width="700" height="100" rx="12" fill="url(#tier0)" filter="url(#shadow)"/>
  <text x="80" y="135" fill="white" font-size="20" font-weight="bold">TIER 0: Locally Decidable</text>
  <text x="80" y="158" fill="rgba(255,255,255,0.85)" font-size="13">Communication: O(1) · Circuit Depth: O(1)</text>
  <text x="80" y="180" fill="rgba(255,255,255,0.7)" font-size="12">Examples: Element-wise checks, local predicates, AC⁰ circuits</text>
  <text x="680" y="150" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🟢</text>

  <!-- Tier 1 -->
  <rect x="50" y="215" width="700" height="100" rx="12" fill="url(#tier1)" filter="url(#shadow)"/>
  <text x="80" y="250" fill="white" font-size="20" font-weight="bold">TIER 1: Bounded Coordination</text>
  <text x="80" y="273" fill="rgba(255,255,255,0.85)" font-size="13">Communication: O(log n) · Circuit Depth: O(log n)</text>
  <text x="80" y="295" fill="rgba(255,255,255,0.7)" font-size="12">Examples: Maximum finding, tournament, NC¹ circuits, FPT problems</text>
  <text x="680" y="265" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🔵</text>

  <!-- Tier 2 -->
  <rect x="50" y="330" width="700" height="100" rx="12" fill="url(#tier2)" filter="url(#shadow)"/>
  <text x="80" y="365" fill="white" font-size="20" font-weight="bold">TIER 2: Polynomial Coordination</text>
  <text x="80" y="388" fill="rgba(255,255,255,0.85)" font-size="13">Communication: O(n^c) · Circuit Depth: O(n^c)</text>
  <text x="80" y="410" fill="rgba(255,255,255,0.7)" font-size="12">Examples: Sorting, matrix multiplication, polynomial-time algorithms</text>
  <text x="680" y="380" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🟠</text>

  <!-- Tier 3 -->
  <rect x="50" y="445" width="700" height="100" rx="12" fill="url(#tier3)" filter="url(#shadow)"/>
  <text x="80" y="480" fill="white" font-size="20" font-weight="bold">TIER 3: Global Coordination</text>
  <text x="80" y="503" fill="rgba(255,255,255,0.85)" font-size="13">Communication: O(2^n) · Circuit Depth: exponential</text>
  <text x="80" y="525" fill="rgba(255,255,255,0.7)" font-size="12">Examples: SAT (at threshold), subset sum, NP-hard problems</text>
  <text x="680" y="495" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🔴</text>

  <!-- Arrows showing strict containment -->
  <line x1="400" y1="200" x2="400" y2="215" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="315" x2="400" y2="330" stroke="#888" stroke-width="2"/>
  <line x1="400" y1="430" x2="400" y2="445" stroke="#888" stroke-width="2"/>

  <!-- Footer -->
  <text x="400" y="575" text-anchor="middle" fill="#888" font-size="12">
    Proved in Lean 4: tier0_le, tier_total, le_tier3, tier0_fraction
  </text>
</svg>
