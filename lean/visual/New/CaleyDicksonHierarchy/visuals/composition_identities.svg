<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="850" height="550" fill="url(#bg3)"/>

  <text x="425" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">
    The Composition Identity Cascade
  </text>
  <text x="425" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">
    N(xy) = N(x)·N(y) — The Norm Multiplicativity that Dies at Channel 5
  </text>

  <!-- 2-Square Identity (ℂ) -->
  <rect x="30" y="90" width="790" height="90" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="70" cy="135" r="25" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="141" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">ℂ</text>
  <text x="110" y="118" fill="#93c5fd" font-size="14" font-weight="bold">Brahmagupta-Fibonacci (2 squares)</text>
  <text x="110" y="140" fill="#e2e8f0" font-size="13">
    (a² + b²)(c² + d²) = (ac − bd)² + (ad + bc)²
  </text>
  <text x="110" y="162" fill="#64748b" font-size="11">
    Proved by ring. Implies ℂ has no zero divisors. Used in Gaussian integer theory.
  </text>

  <!-- 4-Square Identity (ℍ) -->
  <rect x="30" y="200" width="790" height="90" rx="12" fill="#3b1f4e" stroke="#a855f7" stroke-width="2"/>
  <circle cx="70" cy="245" r="25" fill="#581c87" stroke="#a855f7" stroke-width="2"/>
  <text x="70" y="251" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="bold">ℍ</text>
  <text x="110" y="228" fill="#c4b5fd" font-size="14" font-weight="bold">Euler (4 squares)</text>
  <text x="110" y="250" fill="#e2e8f0" font-size="13">
    (Σ aᵢ²)(Σ bᵢ²) = Σ cᵢ²  where each cᵢ is bilinear in a, b
  </text>
  <text x="110" y="272" fill="#64748b" font-size="11">
    Proved by ring. Implies ℍ has no zero divisors. Foundation of Alamouti space-time codes.
  </text>

  <!-- 8-Square Identity (𝕆) -->
  <rect x="30" y="310" width="790" height="90" rx="12" fill="#4a2c0a" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="70" cy="355" r="25" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="361" text-anchor="middle" fill="#fcd34d" font-size="18" font-weight="bold">𝕆</text>
  <text x="110" y="338" fill="#fcd34d" font-size="14" font-weight="bold">Degen (8 squares) — THE LAST</text>
  <text x="110" y="360" fill="#e2e8f0" font-size="13">
    (Σ aᵢ²)(Σ bᵢ²) = Σ cᵢ²  where each cᵢ is bilinear in a, b (8 terms)
  </text>
  <text x="110" y="382" fill="#64748b" font-size="11">
    Proved by ring. The final composition identity. Connected to E₈ lattice and string theory.
  </text>

  <!-- BARRIER -->
  <line x1="30" y1="418" x2="820" y2="418" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="425" y="437" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold" filter="url(#glow3)">
    ══════  HURWITZ BARRIER: No 16-square identity exists  ══════
  </text>

  <!-- 16-Square Non-Identity (𝕊) -->
  <rect x="30" y="450" width="790" height="80" rx="12" fill="#4a0a0a" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
  <circle cx="70" cy="490" r="25" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="70" y="496" text-anchor="middle" fill="#fca5a5" font-size="18" font-weight="bold">𝕊</text>
  <text x="110" y="478" fill="#fca5a5" font-size="14" font-weight="bold">NO 16-Square Composition Identity</text>
  <text x="110" y="500" fill="#e2e8f0" font-size="13">
    ∄ bilinear cᵢ(a,b) such that (Σ aᵢ²)(Σ bᵢ²) = Σ cᵢ² for 16 variables
  </text>
  <text x="110" y="518" fill="#64748b" font-size="11">
    Proved: 16 ∉ {1,2,4,8} by decide. Zero divisors exist. Norm NOT multiplicative.
  </text>
</svg>
