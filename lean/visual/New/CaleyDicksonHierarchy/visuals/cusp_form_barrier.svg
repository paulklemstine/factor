<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">
    The Cusp Form Barrier
  </text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-size="13">
    Dimension of S_k(Γ₀(4)) — Where Multiplicativity Dies
  </text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="750" y2="420" stroke="#484f58" stroke-width="1"/>
  <line x1="100" y1="420" x2="100" y2="80" stroke="#484f58" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="90" y="425" text-anchor="end" fill="#8b949e" font-size="12">0</text>
  <text x="90" y="357" text-anchor="end" fill="#8b949e" font-size="12">1</text>
  <text x="90" y="289" text-anchor="end" fill="#8b949e" font-size="12">2</text>
  <text x="90" y="221" text-anchor="end" fill="#8b949e" font-size="12">3</text>
  <text x="90" y="153" text-anchor="end" fill="#8b949e" font-size="12">4</text>
  <text x="90" y="93" text-anchor="end" fill="#8b949e" font-size="12">5</text>

  <!-- Y-axis grid -->
  <line x1="100" y1="352" x2="750" y2="352" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="284" x2="750" y2="284" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="216" x2="750" y2="216" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="148" x2="750" y2="148" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="88" x2="750" y2="88" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axis titles -->
  <text x="40" y="250" text-anchor="middle" fill="#8b949e" font-size="13" transform="rotate(-90, 40, 250)">
    Cusp Space Dimension
  </text>
  <text x="425" y="465" text-anchor="middle" fill="#8b949e" font-size="13">
    Modular Form Weight k
  </text>

  <!-- Bars -->
  <!-- Weight 2: dim = 0 -->
  <rect x="130" y="416" width="50" height="4" fill="#238636" rx="2"/>
  <text x="155" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=2</text>
  <text x="155" y="455" text-anchor="middle" fill="#58a6ff" font-size="9">Ch2 (ℂ)</text>

  <!-- Weight 4: dim = 0 -->
  <rect x="210" y="416" width="50" height="4" fill="#238636" rx="2"/>
  <text x="235" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=4</text>
  <text x="235" y="455" text-anchor="middle" fill="#a371f7" font-size="9">Ch3 (ℍ)</text>

  <!-- Weight 6: dim = 0 -->
  <rect x="290" y="416" width="50" height="4" fill="#238636" rx="2"/>
  <text x="315" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=6</text>

  <!-- Weight 8: dim = 1 — THE BARRIER -->
  <rect x="370" y="352" width="50" height="68" fill="#da3633" rx="2" filter="url(#glow2)"/>
  <text x="395" y="440" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="bold">k=8</text>
  <text x="395" y="455" text-anchor="middle" fill="#ff7b72" font-size="9" font-weight="bold">Ch5 (𝕊)</text>
  <text x="395" y="345" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="bold">1</text>

  <!-- Weight 10: dim = 1 -->
  <rect x="450" y="352" width="50" height="68" fill="#d29922" rx="2"/>
  <text x="475" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=10</text>
  <text x="475" y="345" text-anchor="middle" fill="#d29922" font-size="11">1</text>

  <!-- Weight 12: dim = 2 -->
  <rect x="530" y="284" width="50" height="136" fill="#d29922" rx="2"/>
  <text x="555" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=12</text>
  <text x="555" y="277" text-anchor="middle" fill="#d29922" font-size="11">2</text>

  <!-- Weight 14: dim = 2 -->
  <rect x="610" y="284" width="50" height="136" fill="#d29922" rx="2"/>
  <text x="635" y="440" text-anchor="middle" fill="#8b949e" font-size="11">k=14</text>
  <text x="635" y="277" text-anchor="middle" fill="#d29922" font-size="11">2</text>

  <!-- Weight 16: dim = 5 — EXPLOSION -->
  <rect x="690" y="88" width="50" height="332" fill="#da3633" rx="2" filter="url(#glow2)"/>
  <text x="715" y="440" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="bold">k=16</text>
  <text x="715" y="455" text-anchor="middle" fill="#ff7b72" font-size="9" font-weight="bold">Ch6 (𝕋)</text>
  <text x="715" y="81" text-anchor="middle" fill="#ff7b72" font-size="14" font-weight="bold">5</text>

  <!-- Barrier annotation -->
  <line x1="360" y1="340" x2="360" y2="100" stroke="#ff7b72" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="365" y="115" fill="#ff7b72" font-size="11" font-style="italic">
    ← The Barrier
  </text>

  <!-- Annotations -->
  <rect x="120" y="470" width="230" height="25" rx="5" fill="#238636" opacity="0.3"/>
  <text x="135" y="487" fill="#238636" font-size="11">Pure Eisenstein (multiplicative)</text>

  <rect x="380" y="470" width="230" height="25" rx="5" fill="#da3633" opacity="0.3"/>
  <text x="395" y="487" fill="#da3633" font-size="11">Cusp corrections (non-multiplicative)</text>
</svg>
