<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .title { font: bold 18px 'Georgia', serif; fill: #1a1a2e; }
      .label { font: 12px 'Arial', sans-serif; fill: #333; }
      .value { font: bold 13px 'Courier New', monospace; fill: #0f3460; }
      .recurrence { font: italic 14px 'Georgia', serif; fill: #e94560; }
      .arrow { stroke: #e94560; stroke-width: 2; fill: none; marker-end: url(#arrowR); }
    </style>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e94560"/>
    </marker>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a6e"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa" rx="10"/>
  
  <text x="400" y="35" class="title" text-anchor="middle">Middle Branch Chebyshev Recurrence: c_{n+1} = 6c_n − c_{n−1}</text>
  
  <!-- Bar chart of hypotenuses (log scale) -->
  <g transform="translate(80, 60)">
    <!-- Axes -->
    <line x1="0" y1="250" x2="650" y2="250" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="250" stroke="#ccc" stroke-width="1"/>
    
    <text x="-10" y="265" class="label" text-anchor="end">n</text>
    
    <!-- Bars (heights proportional to log(c_n)) -->
    <!-- c0=5, c1=29, c2=169, c3=985, c4=5741, c5=33461, c6=195025 -->
    <!-- log scale: heights = 30, 62, 95, 128, 161, 193, 226 -->
    
    <rect x="20" y="220" width="50" height="30" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="45" y="245" class="value" text-anchor="middle" font-size="11">5</text>
    <text x="45" y="265" class="label" text-anchor="middle">0</text>
    
    <rect x="110" y="188" width="50" height="62" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="135" y="183" class="value" text-anchor="middle" font-size="11">29</text>
    <text x="135" y="265" class="label" text-anchor="middle">1</text>
    
    <rect x="200" y="155" width="50" height="95" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="225" y="150" class="value" text-anchor="middle" font-size="11">169</text>
    <text x="225" y="265" class="label" text-anchor="middle">2</text>
    
    <rect x="290" y="122" width="50" height="128" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="315" y="117" class="value" text-anchor="middle" font-size="11">985</text>
    <text x="315" y="265" class="label" text-anchor="middle">3</text>
    
    <rect x="380" y="89" width="50" height="161" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="405" y="84" class="value" text-anchor="middle" font-size="11">5741</text>
    <text x="405" y="265" class="label" text-anchor="middle">4</text>
    
    <rect x="470" y="57" width="50" height="193" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="495" y="52" class="value" text-anchor="middle" font-size="11">33461</text>
    <text x="495" y="265" class="label" text-anchor="middle">5</text>
    
    <rect x="560" y="24" width="50" height="226" fill="url(#barGrad)" rx="3" opacity="0.9"/>
    <text x="585" y="19" class="value" text-anchor="middle" font-size="11">195025</text>
    <text x="585" y="265" class="label" text-anchor="middle">6</text>
    
    <!-- Recurrence arrows -->
    <path d="M 135,175 C 160,140 185,140 210,155" class="arrow" opacity="0.5"/>
    <path d="M 225,140 C 250,105 275,105 300,122" class="arrow" opacity="0.5"/>
    <path d="M 315,107 C 340,72 365,72 390,89" class="arrow" opacity="0.5"/>
    <path d="M 405,74 C 430,39 455,39 480,57" class="arrow" opacity="0.5"/>
    <path d="M 495,42 C 520,7 545,7 570,24" class="arrow" opacity="0.5"/>
  </g>
  
  <!-- Formula box -->
  <rect x="50" y="340" width="700" height="45" rx="8" fill="#f0f0f5" stroke="#ccc"/>
  <text x="400" y="360" class="recurrence" text-anchor="middle">
    Recurrence: c_{n+1} = 6c_n − c_{n−1}    |    Growth ratio → 3 + 2√2 ≈ 5.828    |    Minimal polynomial: x² − 6x + 1 = 0
  </text>
  <text x="400" y="378" class="label" text-anchor="middle" fill="#666">
    Connected to Pell numbers, convergents of √2, and Chebyshev polynomials of the first kind
  </text>
</svg>
