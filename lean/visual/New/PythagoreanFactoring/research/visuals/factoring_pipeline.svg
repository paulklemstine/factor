<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600">
  <defs>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f48fb1"/>
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="1100" height="600" fill="#fafafa"/>

  <text x="550" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#1a1a2e" font-weight="bold">
    Berggren-Lorentz Factoring Pipeline
  </text>
  <text x="550" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#666">
    From composite integer N to its prime factors via Pythagorean tree descent
  </text>

  <!-- Step 1: Input -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#step1)" stroke="#1565c0" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1565c0" font-weight="bold">1. Input</text>
    <text x="90" y="50" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">N = p · q</text>
    <text x="90" y="70" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">(odd composite)</text>
    <text x="90" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">Example:</text>
    <text x="90" y="110" text-anchor="middle" font-family="monospace" font-size="12" fill="#1565c0">N = 667 = 23 × 29</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="235" y1="160" x2="265" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Divisor Pairs -->
  <g transform="translate(270, 100)">
    <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#step2)" stroke="#2e7d32" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2e7d32" font-weight="bold">2. Divisor Pairs</text>
    <text x="90" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">d · e = N²</text>
    <text x="90" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">d ≡ e (mod 2)</text>
    <text x="90" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Each pair → triple:</text>
    <text x="90" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">b = (e−d)/2</text>
    <text x="90" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">c = (e+d)/2</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="160" x2="485" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Tree Descent -->
  <g transform="translate(490, 100)">
    <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#step3)" stroke="#e65100" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#e65100" font-weight="bold">3. Tree Descent</text>
    <text x="90" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Apply B₁⁻¹, B₂⁻¹, B₃⁻¹</text>
    <text x="90" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Ascend to root</text>
    <text x="90" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Hypotenuse ↓ each step</text>
    <text x="90" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#e65100">0 &lt; c' &lt; c</text>
    <text x="90" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Terminates at (3,4,5)</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="675" y1="160" x2="705" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: GCD Extraction -->
  <g transform="translate(710, 100)">
    <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#step4)" stroke="#c62828" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c62828" font-weight="bold">4. Factor Extract</text>
    <text x="90" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">At each node:</text>
    <text x="90" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">g = gcd(leg, N)</text>
    <text x="90" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">If 1 &lt; g &lt; N:</text>
    <text x="90" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#c62828">g divides N ✓</text>
    <text x="90" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#c62828">N/g divides N ✓</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="895" y1="160" x2="925" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Output -->
  <g transform="translate(930, 100)">
    <rect x="0" y="0" width="140" height="120" rx="15" fill="url(#step5)" stroke="#7b1fa2" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7b1fa2" font-weight="bold">5. Output</text>
    <text x="70" y="55" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">p = 23</text>
    <text x="70" y="75" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">q = 29</text>
    <text x="70" y="100" text-anchor="middle" font-family="monospace" font-size="14" fill="#7b1fa2" font-weight="bold">N = p · q ✓</text>
  </g>

  <!-- Complexity Analysis Box -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="1020" height="130" rx="12" fill="white" stroke="#1565c0" stroke-width="2"/>
    <text x="510" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a2e" font-weight="bold">
      Complexity Analysis
    </text>

    <text x="30" y="52" font-family="monospace" font-size="12" fill="#333">
      Step 2: Enumerate divisor pairs of N² → O(√N) pairs (σ₀(N²) ≤ O(N^ε) for any ε &gt; 0)
    </text>
    <text x="30" y="72" font-family="monospace" font-size="12" fill="#333">
      Step 3: Tree depth per triple → Θ(log c) to Θ(√c) depending on Euclid parameters
    </text>
    <text x="30" y="92" font-family="monospace" font-size="12" fill="#333">
      Step 4: Per-node GCD cost → O(log²(c)) via Euclidean algorithm
    </text>
    <text x="30" y="116" font-family="monospace" font-size="12" fill="#1565c0" font-weight="bold">
      Total: O(σ₀(N²) · depth(c) · log²(c)) — quasi-polynomial tree traversal, polynomial per-node
    </text>
  </g>

  <!-- Hypothesis boxes -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="490" height="130" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="245" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2e7d32" font-weight="bold">
      ✓ Validated Hypothesis
    </text>
    <text x="15" y="45" font-family="monospace" font-size="11" fill="#333">
      H₁: Depth = Θ(log c) along B-branch paths
    </text>
    <text x="15" y="62" font-family="monospace" font-size="11" fill="#333">
      Evidence: Spectral radius of B = 3+2√2 ≈ 5.83
    </text>
    <text x="15" y="82" font-family="monospace" font-size="11" fill="#333">
      H₂: Per-node cost is polynomial in log(c)
    </text>
    <text x="15" y="99" font-family="monospace" font-size="11" fill="#333">
      Evidence: Matrix mult O(log²c), GCD O(log²c)
    </text>
    <text x="15" y="119" font-family="monospace" font-size="11" fill="#333">
      H₃: Non-trivial triples reveal factors via GCD
    </text>
  </g>

  <g transform="translate(560, 440)">
    <rect x="0" y="0" width="510" height="130" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
    <text x="255" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c62828" font-weight="bold">
      ✗ Refined Hypothesis (Original Claim Too Strong)
    </text>
    <text x="15" y="45" font-family="monospace" font-size="11" fill="#333">
      Original: "Depth is always Θ(log c)"
    </text>
    <text x="15" y="62" font-family="monospace" font-size="11" fill="#c62828">
      Corrected: Depth ranges from Θ(log c) to Θ(√c)
    </text>
    <text x="15" y="82" font-family="monospace" font-size="11" fill="#333">
      A-branch (consecutive params): depth = Θ(√c)
    </text>
    <text x="15" y="99" font-family="monospace" font-size="11" fill="#333">
      B-branch (golden ratio params): depth = Θ(log c)
    </text>
    <text x="15" y="119" font-family="monospace" font-size="11" fill="#333">
      Equiv. to Euclidean algorithm steps for (m,n)
    </text>
  </g>
</svg>
