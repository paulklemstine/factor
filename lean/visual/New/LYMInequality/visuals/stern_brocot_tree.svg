<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="800" height="520" fill="url(#bg)" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">The Stern-Brocot Tree</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#7f8c8d">Every positive rational appears exactly once · Adjacency invariant: bc - ad = 1</text>
  
  <!-- Edges -->
  <g stroke="#bdc3c7" stroke-width="1.5" fill="none">
    <!-- Level 0 to 1 -->
    <line x1="400" y1="100" x2="200" y2="180"/>
    <line x1="400" y1="100" x2="600" y2="180"/>
    <!-- Level 1 to 2 -->
    <line x1="200" y1="200" x2="100" y2="280"/>
    <line x1="200" y1="200" x2="300" y2="280"/>
    <line x1="600" y1="200" x2="500" y2="280"/>
    <line x1="600" y1="200" x2="700" y2="280"/>
    <!-- Level 2 to 3 -->
    <line x1="100" y1="300" x2="55" y2="370"/>
    <line x1="100" y1="300" x2="145" y2="370"/>
    <line x1="300" y1="300" x2="255" y2="370"/>
    <line x1="300" y1="300" x2="345" y2="370"/>
    <line x1="500" y1="300" x2="455" y2="370"/>
    <line x1="500" y1="300" x2="545" y2="370"/>
    <line x1="700" y1="300" x2="655" y2="370"/>
    <line x1="700" y1="300" x2="745" y2="370"/>
  </g>
  
  <!-- Nodes -->
  <g filter="url(#shadow)">
    <!-- Root: 1/1 -->
    <circle cx="400" cy="95" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="400" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="bold">1</text>
    <line x1="385" y1="96" x2="415" y2="96" stroke="white" stroke-width="1.5"/>
    <text x="400" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="bold">1</text>
    
    <!-- Level 1: 1/2, 2/1 -->
    <circle cx="200" cy="195" r="22" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
    <text x="200" y="192" text-anchor="middle" fill="white" font-size="13" font-weight="bold">1</text>
    <line x1="185" y1="196" x2="215" y2="196" stroke="white" stroke-width="1.5"/>
    <text x="200" y="208" text-anchor="middle" fill="white" font-size="13" font-weight="bold">2</text>
    
    <circle cx="600" cy="195" r="22" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="600" y="192" text-anchor="middle" fill="white" font-size="13" font-weight="bold">2</text>
    <line x1="585" y1="196" x2="615" y2="196" stroke="white" stroke-width="1.5"/>
    <text x="600" y="208" text-anchor="middle" fill="white" font-size="13" font-weight="bold">1</text>
    
    <!-- Level 2: 1/3, 2/3, 3/2, 3/1 -->
    <circle cx="100" cy="295" r="20" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
    <text x="100" y="292" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
    <line x1="87" y1="296" x2="113" y2="296" stroke="white" stroke-width="1.5"/>
    <text x="100" y="307" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
    
    <circle cx="300" cy="295" r="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="300" y="292" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
    <line x1="287" y1="296" x2="313" y2="296" stroke="white" stroke-width="1.5"/>
    <text x="300" y="307" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
    
    <circle cx="500" cy="295" r="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="500" y="292" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
    <line x1="487" y1="296" x2="513" y2="296" stroke="white" stroke-width="1.5"/>
    <text x="500" y="307" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
    
    <circle cx="700" cy="295" r="20" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
    <text x="700" y="292" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
    <line x1="687" y1="296" x2="713" y2="296" stroke="white" stroke-width="1.5"/>
    <text x="700" y="307" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
    
    <!-- Level 3 (smaller nodes) -->
    <g font-size="10">
      <circle cx="55" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="55" y="373" text-anchor="middle" fill="white" font-weight="bold">1</text>
      <line x1="44" y1="376" x2="66" y2="376" stroke="white" stroke-width="1"/>
      <text x="55" y="385" text-anchor="middle" fill="white" font-weight="bold">4</text>
      
      <circle cx="145" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="145" y="373" text-anchor="middle" fill="white" font-weight="bold">2</text>
      <line x1="134" y1="376" x2="156" y2="376" stroke="white" stroke-width="1"/>
      <text x="145" y="385" text-anchor="middle" fill="white" font-weight="bold">5</text>
      
      <circle cx="255" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="255" y="373" text-anchor="middle" fill="white" font-weight="bold">3</text>
      <line x1="244" y1="376" x2="266" y2="376" stroke="white" stroke-width="1"/>
      <text x="255" y="385" text-anchor="middle" fill="white" font-weight="bold">5</text>
      
      <circle cx="345" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="345" y="373" text-anchor="middle" fill="white" font-weight="bold">3</text>
      <line x1="334" y1="376" x2="356" y2="376" stroke="white" stroke-width="1"/>
      <text x="345" y="385" text-anchor="middle" fill="white" font-weight="bold">4</text>
      
      <circle cx="455" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="455" y="373" text-anchor="middle" fill="white" font-weight="bold">4</text>
      <line x1="444" y1="376" x2="466" y2="376" stroke="white" stroke-width="1"/>
      <text x="455" y="385" text-anchor="middle" fill="white" font-weight="bold">3</text>
      
      <circle cx="545" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="545" y="373" text-anchor="middle" fill="white" font-weight="bold">5</text>
      <line x1="534" y1="376" x2="556" y2="376" stroke="white" stroke-width="1"/>
      <text x="545" y="385" text-anchor="middle" fill="white" font-weight="bold">3</text>
      
      <circle cx="655" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="655" y="373" text-anchor="middle" fill="white" font-weight="bold">5</text>
      <line x1="644" y1="376" x2="666" y2="376" stroke="white" stroke-width="1"/>
      <text x="655" y="385" text-anchor="middle" fill="white" font-weight="bold">2</text>
      
      <circle cx="745" cy="375" r="16" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
      <text x="745" y="373" text-anchor="middle" fill="white" font-weight="bold">4</text>
      <line x1="734" y1="376" x2="756" y2="376" stroke="white" stroke-width="1"/>
      <text x="745" y="385" text-anchor="middle" fill="white" font-weight="bold">1</text>
    </g>
  </g>
  
  <!-- Sentinel labels -->
  <text x="30" y="95" text-anchor="middle" font-size="14" fill="#95a5a6" font-style="italic">0/1</text>
  <text x="770" y="95" text-anchor="middle" font-size="14" fill="#95a5a6" font-style="italic">1/0</text>
  
  <!-- Direction labels -->
  <text x="280" y="140" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">L</text>
  <text x="520" y="140" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">R</text>
  
  <!-- Legend -->
  <rect x="20" y="420" width="760" height="85" rx="8" fill="white" fill-opacity="0.8" stroke="#dee2e6"/>
  <text x="40" y="445" font-size="13" font-weight="bold" fill="#2c3e50">Key Properties (Machine-Verified in Lean 4):</text>
  <text x="40" y="465" font-size="11" fill="#34495e">• Adjacency Invariant: At every node with bounds a/b (left) and c/d (right), bc − ad = 1</text>
  <text x="40" y="482" font-size="11" fill="#34495e">• Mediant: Each node is (a+c)/(b+d), always in lowest terms (guaranteed by adjacency)</text>
  <text x="40" y="499" font-size="11" fill="#34495e">• Completeness: Every positive rational p/q with gcd(p,q)=1 appears at a unique path of L/R directions</text>
</svg>
