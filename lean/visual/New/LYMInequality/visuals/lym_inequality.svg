<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg2)" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">LYM Inequality &amp; Sperner's Theorem</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#7f8c8d">For an antichain 𝒜 in 2^[n]: ∑ 1/C(n,|A|) ≤ 1 · Max antichain = C(n, ⌊n/2⌋)</text>
  
  <!-- Power set lattice for n=4 -->
  <text x="200" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Power Set Lattice 2^[4]</text>
  
  <!-- Level 0: empty set -->
  <circle cx="200" cy="470" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="474" text-anchor="middle" font-size="8" fill="#7f8c8d">∅</text>
  
  <!-- Level 1: singletons -->
  <g>
    <circle cx="120" cy="400" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="120" y="404" text-anchor="middle" font-size="8" fill="#7f8c8d">{1}</text>
    <circle cx="160" cy="400" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="160" y="404" text-anchor="middle" font-size="8" fill="#7f8c8d">{2}</text>
    <circle cx="240" cy="400" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="240" y="404" text-anchor="middle" font-size="8" fill="#7f8c8d">{3}</text>
    <circle cx="280" cy="400" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="280" y="404" text-anchor="middle" font-size="8" fill="#7f8c8d">{4}</text>
  </g>
  
  <!-- Level 2: pairs (ANTICHAIN - highlighted) -->
  <g>
    <circle cx="100" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{1,2}</text>
    <circle cx="140" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="140" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{1,3}</text>
    <circle cx="180" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="180" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{1,4}</text>
    <circle cx="220" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="220" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{2,3}</text>
    <circle cx="260" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="260" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{2,4}</text>
    <circle cx="300" cy="330" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="300" y="334" text-anchor="middle" font-size="7" fill="white" font-weight="bold">{3,4}</text>
  </g>
  
  <!-- Arrow pointing to antichain -->
  <text x="365" y="325" font-size="11" fill="#e74c3c" font-weight="bold">← Maximum antichain</text>
  <text x="365" y="340" font-size="10" fill="#e74c3c">|𝒜| = 6 = C(4,2)</text>
  
  <!-- Level 3: triples -->
  <g>
    <circle cx="120" cy="260" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="120" y="264" text-anchor="middle" font-size="6" fill="#7f8c8d">{1,2,3}</text>
    <circle cx="170" cy="260" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="170" y="264" text-anchor="middle" font-size="6" fill="#7f8c8d">{1,2,4}</text>
    <circle cx="220" cy="260" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="220" y="264" text-anchor="middle" font-size="6" fill="#7f8c8d">{1,3,4}</text>
    <circle cx="270" cy="260" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="270" y="264" text-anchor="middle" font-size="6" fill="#7f8c8d">{2,3,4}</text>
  </g>
  
  <!-- Level 4: full set -->
  <circle cx="200" cy="200" r="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="204" text-anchor="middle" font-size="6" fill="#7f8c8d">{1,2,3,4}</text>
  
  <!-- LYM computation panel -->
  <rect x="480" y="80" width="300" height="250" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="630" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">LYM Computation</text>
  
  <text x="500" y="135" font-size="12" fill="#34495e">For the maximum antichain</text>
  <text x="500" y="155" font-size="12" fill="#34495e">(all 2-element subsets):</text>
  
  <text x="500" y="185" font-size="13" fill="#2c3e50" font-weight="bold">∑ 1/C(4,|A|)</text>
  <text x="500" y="210" font-size="12" fill="#34495e">= 6 × 1/C(4,2)</text>
  <text x="500" y="230" font-size="12" fill="#34495e">= 6 × 1/6</text>
  <text x="500" y="250" font-size="14" fill="#e74c3c" font-weight="bold">= 1  ≤  1  ✓</text>
  
  <text x="500" y="280" font-size="11" fill="#7f8c8d">Equality holds for the</text>
  <text x="500" y="295" font-size="11" fill="#7f8c8d">uniform (middle-layer) antichain</text>
  
  <!-- Sperner bound panel -->
  <rect x="480" y="340" width="300" height="200" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="630" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Sperner's Theorem</text>
  
  <text x="500" y="395" font-size="11" fill="#34495e">n=4:  max antichain = C(4,2) = 6</text>
  <text x="500" y="415" font-size="11" fill="#34495e">n=5:  max antichain = C(5,2) = 10</text>
  <text x="500" y="435" font-size="11" fill="#34495e">n=6:  max antichain = C(6,3) = 20</text>
  <text x="500" y="455" font-size="11" fill="#34495e">n=10: max antichain = C(10,5) = 252</text>
  <text x="500" y="475" font-size="11" fill="#34495e">n=20: max antichain = C(20,10) = 184,756</text>
  
  <text x="500" y="505" font-size="11" fill="#7f8c8d" font-style="italic">Follows directly from LYM:</text>
  <text x="500" y="520" font-size="11" fill="#7f8c8d" font-style="italic">|𝒜|/C(n,⌊n/2⌋) ≤ ∑ 1/C(n,|A|) ≤ 1</text>
  
  <!-- Footer -->
  <rect x="20" y="555" width="760" height="35" rx="6" fill="#2c3e50" fill-opacity="0.05"/>
  <text x="400" y="577" text-anchor="middle" font-size="11" fill="#7f8c8d">
    Machine-verified in Lean 4 · LYM.lym_inequality · LYM.sperner_bound · No sorry
  </text>
</svg>
