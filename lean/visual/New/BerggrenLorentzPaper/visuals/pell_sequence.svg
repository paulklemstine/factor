<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="pellBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a2a1a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="550" fill="url(#pellBg)"/>

  <text x="450" y="35" text-anchor="middle" fill="#e0ffe0" font-size="20" font-weight="bold">
    Pell Numbers &amp; the B-Branch: Best Approximations to √2
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#88cc88" font-size="12">
    B-branch hypotenuses: 5, 29, 169, 985, 5741, ... · Growth rate 3 + 2√2 ≈ 5.828
  </text>

  <!-- Convergence chart -->
  <g transform="translate(50, 80)">
    <text x="350" y="0" text-anchor="middle" fill="#aaddaa" font-size="14" font-weight="bold">
      H(n)/P(n) → √2 = 1.41421356...
    </text>

    <!-- Chart area -->
    <rect x="50" y="20" width="600" height="200" fill="#0a150a" stroke="#336633" rx="5"/>

    <!-- √2 reference line -->
    <line x1="50" y1="120" x2="650" y2="120" stroke="#ffcc00" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="660" y="125" fill="#ffcc00" font-size="11">√2</text>

    <!-- Convergent points and values -->
    <!-- H(1)/P(1) = 1/1 = 1.0 → y = 120 + (1.414-1.0)*400 = 286 (clamp) -->
    <circle cx="100" cy="40" r="5" fill="#66ff66"/>
    <text x="100" y="32" text-anchor="middle" fill="#88ff88" font-size="9">1/1</text>

    <!-- H(2)/P(2) = 3/2 = 1.5 → above √2 → y = 120 - (1.5-1.414)*400 = 86 -->
    <circle cx="175" cy="86" r="5" fill="#66ff66"/>
    <text x="175" y="78" text-anchor="middle" fill="#88ff88" font-size="9">3/2</text>

    <!-- H(3)/P(3) = 7/5 = 1.4 → below √2 → y = 120 + (1.414-1.4)*400 = 126 -->
    <circle cx="250" cy="126" r="5" fill="#66ff66"/>
    <text x="250" y="146" text-anchor="middle" fill="#88ff88" font-size="9">7/5</text>

    <!-- H(4)/P(4) = 17/12 = 1.4167 → above → y = 120 - (1.4167-1.414)*400 = 119 -->
    <circle cx="325" cy="119" r="5" fill="#66ff66"/>
    <text x="325" y="111" text-anchor="middle" fill="#88ff88" font-size="9">17/12</text>

    <!-- H(5)/P(5) = 41/29 = 1.41379 → below → y ≈ 120.2 -->
    <circle cx="400" cy="120" r="5" fill="#66ff66"/>
    <text x="400" y="138" text-anchor="middle" fill="#88ff88" font-size="9">41/29</text>

    <!-- H(6)/P(6) = 99/70 = 1.41429 → above → y ≈ 119.9 -->
    <circle cx="475" cy="120" r="5" fill="#66ff66"/>
    <text x="475" y="112" text-anchor="middle" fill="#88ff88" font-size="9">99/70</text>

    <!-- H(7)/P(7) = 239/169 -->
    <circle cx="550" cy="120" r="5" fill="#66ff66"/>
    <text x="550" y="138" text-anchor="middle" fill="#88ff88" font-size="9">239/169</text>

    <circle cx="625" cy="120" r="5" fill="#66ff66"/>
    <text x="625" y="112" text-anchor="middle" fill="#88ff88" font-size="9">577/408</text>

    <!-- Connect points -->
    <polyline points="100,40 175,86 250,126 325,119 400,120 475,120 550,120 625,120"
              fill="none" stroke="#44cc44" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="350" y="235" text-anchor="middle" fill="#668866" font-size="11">n →</text>
  </g>

  <!-- Pell equation table -->
  <g transform="translate(50, 320)">
    <text x="350" y="0" text-anchor="middle" fill="#aaddaa" font-size="14" font-weight="bold">
      Pell Equation: H(n)² − 2·P(n)² = (−1)ⁿ
    </text>

    <text x="0" y="30" fill="#66cc66" font-size="12" font-family="monospace">
      n │ P(n)   │ H(n)   │ H²−2P²  │ H/P          │ B-branch c_n
    </text>
    <text x="0" y="45" fill="#448844" font-size="12" font-family="monospace">
      ──┼────────┼────────┼─────────┼──────────────┼─────────────
    </text>
    <text x="0" y="60" fill="#88ee88" font-size="12" font-family="monospace">
      1 │      1 │      1 │      -1 │ 1.0000000000 │          5
    </text>
    <text x="0" y="75" fill="#88ee88" font-size="12" font-family="monospace">
      2 │      2 │      3 │      +1 │ 1.5000000000 │         29
    </text>
    <text x="0" y="90" fill="#88ee88" font-size="12" font-family="monospace">
      3 │      5 │      7 │      -1 │ 1.4000000000 │        169
    </text>
    <text x="0" y="105" fill="#88ee88" font-size="12" font-family="monospace">
      4 │     12 │     17 │      +1 │ 1.4166666667 │        985
    </text>
    <text x="0" y="120" fill="#88ee88" font-size="12" font-family="monospace">
      5 │     29 │     41 │      -1 │ 1.4137931034 │       5741
    </text>
    <text x="0" y="135" fill="#88ee88" font-size="12" font-family="monospace">
      6 │     70 │     99 │      +1 │ 1.4142857143 │      33461
    </text>
    <text x="0" y="150" fill="#88ee88" font-size="12" font-family="monospace">
      7 │    169 │    239 │      -1 │ 1.4142011834 │     195025
    </text>

    <text x="0" y="180" fill="#ffcc44" font-size="12">
      Key: The Pell equation |H² − 2P²| = 1 is formally verified in Lean 4 ✓
    </text>
    <text x="0" y="198" fill="#88cc88" font-size="11">
      Application: Best rational √2 for half-band FIR filters and CIC decimators in SDR
    </text>
  </g>
</svg>
