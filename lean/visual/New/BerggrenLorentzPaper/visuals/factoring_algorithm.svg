<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="factBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a1515;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="650" fill="url(#factBg)"/>

  <text x="450" y="35" text-anchor="middle" fill="#ffe0e0" font-size="20" font-weight="bold">
    Integer Factoring via Berggren Tree Descent
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#cc8888" font-size="12">
    Key identity: a² = (c−b)(c+b) · GCD extraction reveals factors of a
  </text>

  <!-- Flowchart -->
  <g transform="translate(50, 80)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="250" height="60" rx="10" fill="#2a1a1a" stroke="#ff6666" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" fill="#ffaaaa" font-size="13" font-weight="bold">Step 1: Input N = pq</text>
    <text x="125" y="45" text-anchor="middle" fill="#cc8888" font-size="11">e.g., N = 77 = 7 × 11</text>

    <line x1="125" y1="60" x2="125" y2="100" stroke="#ff6666" stroke-width="2" marker-end="url(#arrowRed)"/>

    <!-- Step 2 -->
    <rect x="0" y="100" width="250" height="60" rx="10" fill="#2a1a1a" stroke="#ff6666" stroke-width="2"/>
    <text x="125" y="125" text-anchor="middle" fill="#ffaaaa" font-size="13" font-weight="bold">Step 2: Find PPTs with leg N</text>
    <text x="125" y="145" text-anchor="middle" fill="#cc8888" font-size="11">N² = (c−b)(c+b), enumerate divisors</text>

    <line x1="125" y1="160" x2="125" y2="200" stroke="#ff6666" stroke-width="2"/>

    <!-- Step 3 -->
    <rect x="0" y="200" width="250" height="60" rx="10" fill="#2a1a1a" stroke="#ff6666" stroke-width="2"/>
    <text x="125" y="225" text-anchor="middle" fill="#ffaaaa" font-size="13" font-weight="bold">Step 3: Extract GCDs</text>
    <text x="125" y="245" text-anchor="middle" fill="#cc8888" font-size="11">gcd(c±b, N) → factors!</text>

    <line x1="125" y1="260" x2="125" y2="300" stroke="#ff6666" stroke-width="2"/>

    <!-- Result -->
    <rect x="0" y="300" width="250" height="50" rx="10" fill="#1a2a1a" stroke="#66ff66" stroke-width="2"/>
    <text x="125" y="330" text-anchor="middle" fill="#aaffaa" font-size="14" font-weight="bold">
      N = p × q ✓
    </text>
  </g>

  <!-- Example walkthrough -->
  <g transform="translate(350, 80)">
    <text x="250" y="0" text-anchor="middle" fill="#ffaaaa" font-size="14" font-weight="bold">
      Example: Factor N = 77
    </text>

    <rect x="50" y="20" width="400" height="330" rx="10" fill="#1a0d0d" stroke="#663333" opacity="0.9"/>

    <text x="70" y="50" fill="#ee8888" font-size="12" font-family="monospace">N = 77,  N² = 5929</text>
    <text x="70" y="75" fill="#cccccc" font-size="12" font-family="monospace">Divisor pairs of 5929:</text>
    <text x="70" y="95" fill="#cccccc" font-size="12" font-family="monospace">  1 × 5929 → c=2965, b=2964</text>
    <text x="70" y="115" fill="#cccccc" font-size="12" font-family="monospace">  7 × 847  → c=427,  b=420</text>
    <text x="70" y="135" fill="#cccccc" font-size="12" font-family="monospace"> 11 × 539  → c=275,  b=264</text>
    <text x="70" y="155" fill="#cccccc" font-size="12" font-family="monospace"> 77 × 77   → c=77,   b=0  (skip)</text>

    <text x="70" y="185" fill="#ffcc44" font-size="12" font-weight="bold">GCD extraction:</text>
    <text x="70" y="210" fill="#88ff88" font-size="12" font-family="monospace">
      Triple (77, 2964, 2965):
    </text>
    <text x="70" y="230" fill="#88ff88" font-size="12" font-family="monospace">
        gcd(2965-2964, 77) = gcd(1, 77) = 1
    </text>
    <text x="70" y="250" fill="#88ff88" font-size="12" font-family="monospace">
        gcd(2965+2964, 77) = gcd(5929, 77) = 77
    </text>

    <text x="70" y="275" fill="#88ff88" font-size="12" font-family="monospace">
      Triple (77, 420, 427):
    </text>
    <text x="70" y="295" fill="#ffcc44" font-size="12" font-family="monospace" font-weight="bold">
        gcd(427-420, 77) = gcd(7, 77) = 7  ← FACTOR!
    </text>
    <text x="70" y="315" fill="#ffcc44" font-size="12" font-family="monospace" font-weight="bold">
        gcd(427+420, 77) = gcd(847, 77) = 77
    </text>

    <text x="70" y="340" fill="#66ff66" font-size="13" font-weight="bold">
      Result: 77 = 7 × 11 ✓
    </text>
  </g>

  <!-- Complexity table -->
  <g transform="translate(50, 430)">
    <rect x="0" y="0" width="800" height="195" rx="10" fill="#1a0d0d" stroke="#663333" opacity="0.9"/>
    <text x="400" y="25" text-anchor="middle" fill="#ffaaaa" font-size="14" font-weight="bold">
      Complexity Analysis &amp; The Short Triple Conjecture
    </text>

    <text x="20" y="55" fill="#cccccc" font-size="12">
      • Trivial triple (N, (N²−1)/2, (N²+1)/2): depth Θ(N) — no better than trial division
    </text>
    <text x="20" y="78" fill="#cccccc" font-size="12">
      • Non-trivial triple with c = O(N^{1+ε}): depth O(N^ε) — sub-linear but super-polynomial
    </text>
    <text x="20" y="101" fill="#ffcc44" font-size="12" font-weight="bold">
      • Short Triple Conjecture: For balanced semiprimes, c_min = Ω(N^{1+ε}) for some ε > 0
    </text>
    <text x="20" y="124" fill="#cccccc" font-size="12">
      • If true: Berggren factoring cannot beat trial division asymptotically → RSA safe
    </text>
    <text x="20" y="150" fill="#88ccff" font-size="12">
      Connection to lattice cryptography: Short Triple Problem ≈ Short Vector Problem (SVP)
    </text>
    <text x="20" y="173" fill="#88ccff" font-size="12">
      This links Pythagorean geometry to post-quantum security (NTRU, Kyber, Dilithium)
    </text>
  </g>
</svg>
