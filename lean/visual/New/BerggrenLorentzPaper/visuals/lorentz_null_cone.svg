<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="coneBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a25;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15152e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coneGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#4444ff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#coneBg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">
    The Lorentz Null Cone: Q(a,b,c) = a² + b² − c² = 0
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#8888cc" font-size="12">
    Pythagorean triples lie on the null cone of (2,1)-Minkowski space
  </text>

  <!-- 3D perspective cone -->
  <g transform="translate(450, 400)">
    <!-- Cone surface (upper) -->
    <path d="M 0,-250 Q -200,-125 -280,0 Q -200,60 0,80 Q 200,60 280,0 Q 200,-125 0,-250 Z"
          fill="url(#coneGrad)" stroke="#ffcc44" stroke-width="1" opacity="0.6"/>

    <!-- Cone surface (lower, lighter) -->
    <path d="M 0,250 Q -200,125 -280,0 Q -200,-60 0,-80 Q 200,-60 280,0 Q 200,125 0,250 Z"
          fill="url(#coneGrad)" stroke="#44ccff" stroke-width="1" opacity="0.3"/>

    <!-- Cross-section ellipse at center -->
    <ellipse cx="0" cy="0" rx="280" ry="80" fill="none" stroke="#ffcc44" stroke-width="1" opacity="0.4"/>

    <!-- Axis lines -->
    <line x1="0" y1="-280" x2="0" y2="280" stroke="#666688" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="-320" y1="0" x2="320" y2="0" stroke="#666688" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Axis labels -->
    <text x="0" y="-290" text-anchor="middle" fill="#aaaacc" font-size="13">c (hypotenuse)</text>
    <text x="330" y="5" fill="#aaaacc" font-size="13">a</text>
    <text x="-170" y="110" fill="#aaaacc" font-size="13">b</text>

    <!-- PPT points on cone -->
    <!-- (3,4,5): project to 2D -->
    <circle cx="30" cy="-130" r="6" fill="#ffcc00" stroke="#fff" stroke-width="1"/>
    <text x="45" y="-125" fill="#ffcc00" font-size="11" font-weight="bold">(3,4,5)</text>

    <!-- (5,12,13) -->
    <circle cx="35" cy="-175" r="5" fill="#ff6666"/>
    <text x="50" y="-170" fill="#ff9999" font-size="10">(5,12,13)</text>

    <!-- (8,15,17) -->
    <circle cx="50" cy="-195" r="5" fill="#66ff66"/>
    <text x="65" y="-190" fill="#99ff99" font-size="10">(8,15,17)</text>

    <!-- (7,24,25) -->
    <circle cx="40" cy="-210" r="4" fill="#6666ff"/>
    <text x="55" y="-205" fill="#9999ff" font-size="10">(7,24,25)</text>

    <!-- (21,20,29) -->
    <circle cx="100" cy="-200" r="5" fill="#66ff66"/>
    <text x="115" y="-195" fill="#99ff99" font-size="10">(21,20,29)</text>

    <!-- (9,40,41) -->
    <circle cx="45" cy="-225" r="4" fill="#ff6666"/>
    <text x="60" y="-220" fill="#ff9999" font-size="10">(9,40,41)</text>

    <!-- (119,120,169) -->
    <circle cx="130" cy="-240" r="4" fill="#ffcc44"/>
    <text x="145" y="-235" fill="#ffcc88" font-size="9">(119,120,169)</text>

    <!-- Origin vertex -->
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.5"/>
    <text x="15" y="5" fill="#888888" font-size="10">origin</text>
  </g>

  <!-- Info panels -->
  <rect x="30" y="530" width="400" height="150" rx="10" fill="#0d0d2d" stroke="#444477" opacity="0.9"/>
  <text x="50" y="555" fill="#aaaaee" font-size="13" font-weight="bold">Null Cone Q = 0</text>
  <text x="50" y="578" fill="#ccccee" font-size="11">• Q(a,b,c) = a² + b² − c² = 0 ⟺ Pythagorean triple</text>
  <text x="50" y="598" fill="#ccccee" font-size="11">• Q &gt; 0: spacelike (inside cone) — not Pythagorean</text>
  <text x="50" y="618" fill="#ccccee" font-size="11">• Q &lt; 0: timelike (outside cone) — not Pythagorean</text>
  <text x="50" y="638" fill="#ccccee" font-size="11">• Q = 0: lightlike (on cone) — Pythagorean! ✓</text>
  <text x="50" y="665" fill="#ffcc44" font-size="11">Signature (2,1): same as 2+1D Minkowski spacetime</text>

  <rect x="460" y="530" width="410" height="150" rx="10" fill="#0d0d2d" stroke="#444477" opacity="0.9"/>
  <text x="480" y="555" fill="#aaaaee" font-size="13" font-weight="bold">Berggren ⊂ O(2,1;ℤ)</text>
  <text x="480" y="578" fill="#ccccee" font-size="11">• B_A, B_B, B_C preserve Q: they are Lorentz isometries</text>
  <text x="480" y="598" fill="#ccccee" font-size="11">• They map the null cone to itself</text>
  <text x="480" y="618" fill="#ccccee" font-size="11">• det(B_A)=+1, det(B_B)=−1, det(B_C)=+1</text>
  <text x="480" y="638" fill="#ccccee" font-size="11">• Generate infinite discrete subgroup of O(2,1)</text>
  <text x="480" y="665" fill="#ffcc44" font-size="11">Analogy: Lorentz boosts ↔ tree descent</text>
</svg>
