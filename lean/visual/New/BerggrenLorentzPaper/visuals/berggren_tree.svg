<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#e0e0ff" font-size="22" font-weight="bold">
    The Berggren Tree of Primitive Pythagorean Triples
  </text>
  <text x="500" y="62" text-anchor="middle" fill="#8888cc" font-size="13">
    Every PPT appears exactly once · Three Berggren matrices generate the full tree from (3,4,5)
  </text>

  <!-- Edges (drawn first, under nodes) -->
  <g stroke-width="2" fill="none">
    <!-- Root to depth 1 -->
    <line x1="500" y1="120" x2="180" y2="240" stroke="#ff6666" opacity="0.7"/>
    <line x1="500" y1="120" x2="500" y2="240" stroke="#66ff66" opacity="0.7"/>
    <line x1="500" y1="120" x2="820" y2="240" stroke="#6666ff" opacity="0.7"/>

    <!-- A children -->
    <line x1="180" y1="280" x2="60"  y2="400" stroke="#ff6666" opacity="0.5"/>
    <line x1="180" y1="280" x2="180" y2="400" stroke="#66ff66" opacity="0.5"/>
    <line x1="180" y1="280" x2="300" y2="400" stroke="#6666ff" opacity="0.5"/>

    <!-- B children -->
    <line x1="500" y1="280" x2="400" y2="400" stroke="#ff6666" opacity="0.5"/>
    <line x1="500" y1="280" x2="500" y2="400" stroke="#66ff66" opacity="0.5"/>
    <line x1="500" y1="280" x2="600" y2="400" stroke="#6666ff" opacity="0.5"/>

    <!-- C children -->
    <line x1="820" y1="280" x2="720" y2="400" stroke="#ff6666" opacity="0.5"/>
    <line x1="820" y1="280" x2="820" y2="400" stroke="#66ff66" opacity="0.5"/>
    <line x1="820" y1="280" x2="940" y2="400" stroke="#6666ff" opacity="0.5"/>
  </g>

  <!-- Branch labels -->
  <text x="310" y="175" text-anchor="middle" fill="#ff8888" font-size="16" font-weight="bold">A</text>
  <text x="500" y="175" text-anchor="middle" fill="#88ff88" font-size="16" font-weight="bold">B</text>
  <text x="690" y="175" text-anchor="middle" fill="#8888ff" font-size="16" font-weight="bold">C</text>

  <!-- Root node -->
  <g filter="url(#glow)">
    <circle cx="500" cy="110" r="30" fill="#2a2a5a" stroke="#ffcc00" stroke-width="3"/>
    <text x="500" y="107" text-anchor="middle" fill="#ffcc00" font-size="13" font-weight="bold">(3,4,5)</text>
    <text x="500" y="122" text-anchor="middle" fill="#ffcc88" font-size="10">c=5</text>
  </g>

  <!-- Depth 1 nodes -->
  <g filter="url(#shadow)">
    <!-- A: (5,12,13) -->
    <rect x="115" y="235" width="130" height="50" rx="10" fill="#3a1a1a" stroke="#ff6666" stroke-width="2"/>
    <text x="180" y="257" text-anchor="middle" fill="#ff9999" font-size="13" font-weight="bold">(5, 12, 13)</text>
    <text x="180" y="275" text-anchor="middle" fill="#ff6666" font-size="10">A · c=13 · det=1</text>

    <!-- B: (21,20,29) -->
    <rect x="435" y="235" width="130" height="50" rx="10" fill="#1a3a1a" stroke="#66ff66" stroke-width="2"/>
    <text x="500" y="257" text-anchor="middle" fill="#99ff99" font-size="13" font-weight="bold">(21, 20, 29)</text>
    <text x="500" y="275" text-anchor="middle" fill="#66ff66" font-size="10">B · c=29 · det=−1</text>

    <!-- C: (15,8,17) -->
    <rect x="755" y="235" width="130" height="50" rx="10" fill="#1a1a3a" stroke="#6666ff" stroke-width="2"/>
    <text x="820" y="257" text-anchor="middle" fill="#9999ff" font-size="13" font-weight="bold">(15, 8, 17)</text>
    <text x="820" y="275" text-anchor="middle" fill="#6666ff" font-size="10">C · c=17 · det=1</text>
  </g>

  <!-- Depth 2 nodes (smaller) -->
  <g font-size="10" filter="url(#shadow)">
    <!-- AA: (7,24,25) -->
    <rect x="10" y="395" width="100" height="40" rx="8" fill="#2a1515" stroke="#cc5555" stroke-width="1.5"/>
    <text x="60" y="412" text-anchor="middle" fill="#ee8888">(7, 24, 25)</text>
    <text x="60" y="426" text-anchor="middle" fill="#cc5555" font-size="9">AA · c=25</text>

    <!-- AB: (55,48,73) -->
    <rect x="130" y="395" width="100" height="40" rx="8" fill="#1a2a15" stroke="#55cc55" stroke-width="1.5"/>
    <text x="180" y="412" text-anchor="middle" fill="#88ee88">(55, 48, 73)</text>
    <text x="180" y="426" text-anchor="middle" fill="#55cc55" font-size="9">AB · c=73</text>

    <!-- AC: (45,28,53) -->
    <rect x="250" y="395" width="100" height="40" rx="8" fill="#15152a" stroke="#5555cc" stroke-width="1.5"/>
    <text x="300" y="412" text-anchor="middle" fill="#8888ee">(45, 28, 53)</text>
    <text x="300" y="426" text-anchor="middle" fill="#5555cc" font-size="9">AC · c=53</text>

    <!-- BA: (9,40,41) -->
    <rect x="350" y="395" width="100" height="40" rx="8" fill="#2a1515" stroke="#cc5555" stroke-width="1.5"/>
    <text x="400" y="412" text-anchor="middle" fill="#ee8888">(9, 40, 41)</text>
    <text x="400" y="426" text-anchor="middle" fill="#cc5555" font-size="9">BA · c=41</text>

    <!-- BB: (119,120,169) -->
    <rect x="450" y="395" width="100" height="40" rx="8" fill="#1a2a15" stroke="#55cc55" stroke-width="1.5"/>
    <text x="500" y="412" text-anchor="middle" fill="#88ee88">(119,120,169)</text>
    <text x="500" y="426" text-anchor="middle" fill="#55cc55" font-size="9">BB · c=169</text>

    <!-- BC: (77,36,85) -->
    <rect x="550" y="395" width="100" height="40" rx="8" fill="#15152a" stroke="#5555cc" stroke-width="1.5"/>
    <text x="600" y="412" text-anchor="middle" fill="#8888ee">(77, 36, 85)</text>
    <text x="600" y="426" text-anchor="middle" fill="#5555cc" font-size="9">BC · c=85</text>

    <!-- CA: (33,56,65) -->
    <rect x="670" y="395" width="100" height="40" rx="8" fill="#2a1515" stroke="#cc5555" stroke-width="1.5"/>
    <text x="720" y="412" text-anchor="middle" fill="#ee8888">(33, 56, 65)</text>
    <text x="720" y="426" text-anchor="middle" fill="#cc5555" font-size="9">CA · c=65</text>

    <!-- CB: (65,72,97) -->
    <rect x="790" y="395" width="100" height="40" rx="8" fill="#1a2a15" stroke="#55cc55" stroke-width="1.5"/>
    <text x="840" y="412" text-anchor="middle" fill="#88ee88">(65, 72, 97)</text>
    <text x="840" y="426" text-anchor="middle" fill="#55cc55" font-size="9">CB · c=97</text>

    <!-- CC: (35,12,37) -->
    <rect x="900" y="395" width="90" height="40" rx="8" fill="#15152a" stroke="#5555cc" stroke-width="1.5"/>
    <text x="945" y="412" text-anchor="middle" fill="#8888ee">(35, 12, 37)</text>
    <text x="945" y="426" text-anchor="middle" fill="#5555cc" font-size="9">CC · c=37</text>
  </g>

  <!-- Depth indicator -->
  <text x="20" y="115" fill="#666688" font-size="11">d=0</text>
  <text x="20" y="260" fill="#666688" font-size="11">d=1</text>
  <text x="20" y="420" fill="#666688" font-size="11">d=2</text>

  <!-- Info panel -->
  <rect x="30" y="470" width="440" height="210" rx="12" fill="#0d0d2d" stroke="#4444aa" stroke-width="1" opacity="0.9"/>
  <text x="50" y="495" fill="#aaaaee" font-size="14" font-weight="bold">Berggren Matrices (Lorentz Group O(2,1;ℤ))</text>

  <text x="50" y="520" fill="#ff9999" font-size="12" font-family="monospace">
    B_A = | 1 -2  2|   det = +1
  </text>
  <text x="50" y="536" fill="#ff9999" font-size="12" font-family="monospace">
          | 2 -1  2|   Preserves Q ✓
  </text>
  <text x="50" y="552" fill="#ff9999" font-size="12" font-family="monospace">
          | 2 -2  3|
  </text>

  <text x="50" y="578" fill="#99ff99" font-size="12" font-family="monospace">
    B_B = | 1  2  2|   det = -1
  </text>
  <text x="50" y="594" fill="#99ff99" font-size="12" font-family="monospace">
          | 2  1  2|   Preserves Q ✓
  </text>
  <text x="50" y="610" fill="#99ff99" font-size="12" font-family="monospace">
          | 2  2  3|
  </text>

  <text x="50" y="636" fill="#9999ff" font-size="12" font-family="monospace">
    B_C = |-1  2  2|   det = +1
  </text>
  <text x="50" y="652" fill="#9999ff" font-size="12" font-family="monospace">
          |-2  1  2|   Preserves Q ✓
  </text>
  <text x="50" y="668" fill="#9999ff" font-size="12" font-family="monospace">
          |-2  2  3|
  </text>

  <!-- Key properties panel -->
  <rect x="500" y="470" width="470" height="210" rx="12" fill="#0d0d2d" stroke="#4444aa" stroke-width="1" opacity="0.9"/>
  <text x="520" y="495" fill="#aaaaee" font-size="14" font-weight="bold">Key Properties (Machine-Verified in Lean 4)</text>

  <text x="520" y="520" fill="#ccccee" font-size="12">✓ Lorentz preservation: B_iᵀ Q B_i = Q</text>
  <text x="520" y="542" fill="#ccccee" font-size="12">✓ Pythagorean: a²+b²=c² preserved by all B_i</text>
  <text x="520" y="564" fill="#ccccee" font-size="12">✓ Tree soundness: every node is a valid PPT</text>
  <text x="520" y="586" fill="#ccccee" font-size="12">✓ Factoring identity: (c−b)(c+b) = a²</text>
  <text x="520" y="608" fill="#ccccee" font-size="12">✓ Completeness: all PPTs appear exactly once</text>
  <text x="520" y="630" fill="#ccccee" font-size="12">✓ Euclid: (m²−n²)² + (2mn)² = (m²+n²)²</text>
  <text x="520" y="652" fill="#ccccee" font-size="12">✓ Pell recurrence: c_{n+2} = 6c_{n+1} − c_n</text>
  <text x="520" y="674" fill="#ffcc44" font-size="11">Q(a,b,c) = a² + b² − c²   (Lorentz form, signature 2,1)</text>
</svg>
