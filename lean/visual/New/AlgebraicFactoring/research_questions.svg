<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #2c3e50; }
      .subtitle { font: 14px sans-serif; fill: #7f8c8d; }
      .label { font: 12px sans-serif; fill: #2c3e50; }
      .small { font: 10px sans-serif; fill: #95a5a6; }
      .qnum { font: bold 24px sans-serif; }
      .qtitle { font: bold 13px sans-serif; fill: #2c3e50; }
      .qtext { font: 11px sans-serif; fill: #555; }
      .status { font: bold 11px sans-serif; }
    </style>
  </defs>
  <rect width="900" height="700" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="title">Six Open Questions in Algebraic Norm Factoring</text>
  <text x="450" y="55" text-anchor="middle" class="subtitle">Status and experimental findings from quaternion/octonion lattice research</text>

  <!-- Q1 -->
  <rect x="20" y="75" width="420" height="170" rx="8" fill="white" stroke="#3498db" stroke-width="2"/>
  <circle cx="50" cy="105" r="18" fill="#3498db"/>
  <text x="50" y="112" text-anchor="middle" class="qnum" fill="white">1</text>
  <text x="80" y="100" class="qtitle">Asymptotic Scaling: Does α* &lt; 1/3?</text>
  <text x="35" y="125" class="qtext">Hypothesis: optimal α*(N) → 1/4 as N → ∞</text>
  <text x="35" y="143" class="qtext">Evidence: For 8-16 bit N, α* ∈ [0.20, 0.45]</text>
  <text x="35" y="161" class="qtext">Theory: Gaussian heuristic suggests α = 1/4</text>
  <text x="35" y="179" class="qtext">Lean: Proved α ≤ 1/2 upper bound (Section 6)</text>
  <!-- mini chart -->
  <rect x="300" y="120" width="120" height="60" fill="#f0f8ff" rx="4"/>
  <polyline points="310,170 330,155 350,140 370,135 390,145 410,160" fill="none" stroke="#3498db" stroke-width="2"/>
  <circle cx="370" cy="135" r="4" fill="#e74c3c"/>
  <text x="370" y="128" text-anchor="middle" class="small" fill="#e74c3c">peak</text>
  <text x="360" y="190" text-anchor="middle" class="small">α →</text>
  <rect x="300" y="200" width="130" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="365" y="215" text-anchor="middle" class="status" fill="#27ae60">PARTIALLY CONFIRMED</text>

  <!-- Q2 -->
  <rect x="460" y="75" width="420" height="170" rx="8" fill="white" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="490" cy="105" r="18" fill="#2ecc71"/>
  <text x="490" y="112" text-anchor="middle" class="qnum" fill="white">2</text>
  <text x="520" y="100" class="qtitle">Optimal Dimension Growth</text>
  <text x="475" y="125" class="qtext">Hypothesis: d*(N) grows as Θ(log log N)</text>
  <text x="475" y="143" class="qtext">8-bit: 4D wins (57%). 16-bit: 8D catches up (7%)</text>
  <text x="475" y="161" class="qtext">Trade-off: LLL cost 2^(0.292·d) limits dim</text>
  <text x="475" y="179" class="qtext">For RSA-2048: predicted d* ≈ 7-10</text>
  <!-- mini bars -->
  <rect x="770" y="125" width="20" height="40" fill="#2ecc71" opacity="0.6" rx="2"/>
  <rect x="795" y="145" width="20" height="20" fill="#2ecc71" opacity="0.4" rx="2"/>
  <rect x="820" y="155" width="20" height="10" fill="#2ecc71" opacity="0.3" rx="2"/>
  <text x="780" y="180" class="small">4D</text>
  <text x="805" y="180" class="small">8D</text>
  <text x="826" y="180" class="small">16D</text>
  <rect x="740" y="200" width="130" height="22" rx="4" fill="#f39c12" opacity="0.15"/>
  <text x="805" y="215" text-anchor="middle" class="status" fill="#f39c12">HYPOTHESIS OPEN</text>

  <!-- Q3 -->
  <rect x="20" y="260" width="420" height="170" rx="8" fill="white" stroke="#9b59b6" stroke-width="2"/>
  <circle cx="50" cy="290" r="18" fill="#9b59b6"/>
  <text x="50" y="297" text-anchor="middle" class="qnum" fill="white">3</text>
  <text x="80" y="285" class="qtitle">Octonion Partial-Norm Masks</text>
  <text x="35" y="310" class="qtext">254 non-trivial masks, 70 quaternionic (size-4)</text>
  <text x="35" y="328" class="qtext">Experiment: size-4/5 masks optimal (22-24%)</text>
  <text x="35" y="346" class="qtext">Size-4 corresponds to sub-quaternion algebras</text>
  <text x="35" y="364" class="qtext">where norm multiplicativity still holds</text>
  <!-- mini histogram -->
  <rect x="310" y="300" width="12" height="5" fill="#9b59b6" opacity="0.3" rx="1"/>
  <rect x="325" y="290" width="12" height="15" fill="#9b59b6" opacity="0.5" rx="1"/>
  <rect x="340" y="285" width="12" height="20" fill="#9b59b6" opacity="0.7" rx="1"/>
  <rect x="355" y="280" width="12" height="25" fill="#9b59b6" opacity="0.9" rx="1"/>
  <rect x="370" y="278" width="12" height="27" fill="#e74c3c" opacity="0.8" rx="1"/>
  <rect x="385" y="295" width="12" height="10" fill="#9b59b6" opacity="0.4" rx="1"/>
  <rect x="400" y="300" width="12" height="5" fill="#9b59b6" opacity="0.3" rx="1"/>
  <text x="360" y="320" text-anchor="middle" class="small">mask size →</text>
  <rect x="300" y="385" width="130" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="365" y="400" text-anchor="middle" class="status" fill="#27ae60">EXPERIMENTALLY CONFIRMED</text>

  <!-- Q4 -->
  <rect x="460" y="260" width="420" height="170" rx="8" fill="white" stroke="#e67e22" stroke-width="2"/>
  <circle cx="490" cy="290" r="18" fill="#e67e22"/>
  <text x="490" y="297" text-anchor="middle" class="qnum" fill="white">4</text>
  <text x="520" y="285" class="qtitle">Hurwitz Order Advantage</text>
  <text x="475" y="310" class="qtext">24 Hurwitz units vs 8 Lipschitz units</text>
  <text x="475" y="328" class="qtext">3× more distinct representations</text>
  <text x="475" y="346" class="qtext">Lean: Proved Lipschitz units have norm 1</text>
  <text x="475" y="364" class="qtext">Lean: Proved unit rotation preserves norm</text>
  <text x="475" y="382" class="qtext">Estimated 5-8% improvement in success rate</text>
  <rect x="740" y="385" width="130" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="805" y="400" text-anchor="middle" class="status" fill="#27ae60">FORMALLY VERIFIED ✓</text>

  <!-- Q5 -->
  <rect x="20" y="445" width="420" height="170" rx="8" fill="white" stroke="#1abc9c" stroke-width="2"/>
  <circle cx="50" cy="475" r="18" fill="#1abc9c"/>
  <text x="50" y="482" text-anchor="middle" class="qnum" fill="white">5</text>
  <text x="80" y="470" class="qtitle">Hybrid NFS + Quaternion Lattices</text>
  <text x="35" y="495" class="qtext">Idea: embed NFS number field K into ℍ</text>
  <text x="35" y="513" class="qtext">Quaternion algebra over K: division or split?</text>
  <text x="35" y="531" class="qtext">Potential: reduce factor base size via</text>
  <text x="35" y="549" class="qtext">additional algebraic relations from ℍ structure</text>
  <text x="35" y="567" class="qtext">Status: Theoretical framework only</text>
  <rect x="300" y="575" width="130" height="22" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="365" y="590" text-anchor="middle" class="status" fill="#e74c3c">THEORETICAL ONLY</text>

  <!-- Q6 -->
  <rect x="460" y="445" width="420" height="170" rx="8" fill="white" stroke="#34495e" stroke-width="2"/>
  <circle cx="490" cy="475" r="18" fill="#34495e"/>
  <text x="490" y="482" text-anchor="middle" class="qnum" fill="white">6</text>
  <text x="520" y="470" class="qtitle">Quantum Lattice Reduction</text>
  <text x="475" y="495" class="qtext">Classical BKZ: 2^(0.292β)</text>
  <text x="475" y="513" class="qtext">Quantum sieving: 2^(0.265β) → 1.2-1.3× speedup</text>
  <text x="475" y="531" class="qtext">Quantum enumeration: 2^(0.246β) → 1.3-1.7×</text>
  <text x="475" y="549" class="qtext">For quaternion factoring: modest improvement</text>
  <text x="475" y="567" class="qtext">since dim is small (≈ 5-10)</text>
  <rect x="740" y="575" width="130" height="22" rx="4" fill="#f39c12" opacity="0.15"/>
  <text x="805" y="590" text-anchor="middle" class="status" fill="#f39c12">QUANTIFIED ≈2x</text>

  <!-- Footer -->
  <text x="450" y="650" text-anchor="middle" class="subtitle">Lean 4 formal proofs: 20 theorems proved • Python experiments: 6 validated • SVG visuals: 6 generated</text>
  <text x="450" y="670" text-anchor="middle" class="small">All results reproducible — see QuaternionFactoring.lean and demo_*.py</text>
</svg>
