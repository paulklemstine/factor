<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_nn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_compiled" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#grad1)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">
    Neural Network Compilation: From Layers to Single Operations
  </text>

  <!-- Original Network (left side) -->
  <text x="180" y="85" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">
    Original Network
  </text>

  <!-- Layer boxes -->
  <rect x="80" y="100" width="200" height="40" rx="8" fill="url(#grad_nn)" filter="url(#shadow)"/>
  <text x="180" y="125" text-anchor="middle" fill="#fff" font-size="13">Layer 1: W₁x + b₁</text>

  <rect x="80" y="155" width="200" height="30" rx="6" fill="#e94560" opacity="0.6"/>
  <text x="180" y="175" text-anchor="middle" fill="#fff" font-size="12">ReLU: max(x, 0)</text>

  <rect x="80" y="200" width="200" height="40" rx="8" fill="url(#grad_nn)" filter="url(#shadow)"/>
  <text x="180" y="225" text-anchor="middle" fill="#fff" font-size="13">Layer 2: W₂x + b₂</text>

  <rect x="80" y="255" width="200" height="30" rx="6" fill="#e94560" opacity="0.6"/>
  <text x="180" y="275" text-anchor="middle" fill="#fff" font-size="12">ReLU: max(x, 0)</text>

  <rect x="80" y="300" width="200" height="40" rx="8" fill="url(#grad_nn)" filter="url(#shadow)"/>
  <text x="180" y="325" text-anchor="middle" fill="#fff" font-size="13">Layer L: W_Lx + b_L</text>

  <text x="180" y="365" text-anchor="middle" fill="#aaa" font-size="11">
    L layers × O(d²) each
  </text>

  <!-- Compilation arrow -->
  <line x1="310" y1="230" x2="420" y2="230" stroke="#e94560" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="365" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Compile</text>
  <text x="365" y="250" text-anchor="middle" fill="#aaa" font-size="10">Error ∈ [0, log 2]</text>

  <!-- Compiled representation (right side) -->
  <text x="600" y="85" text-anchor="middle" fill="#53d8fb" font-size="16" font-weight="bold">
    Compiled Form
  </text>

  <rect x="440" y="180" width="320" height="100" rx="15" fill="url(#grad_compiled)" filter="url(#shadow)" stroke="#53d8fb" stroke-width="2"/>
  <text x="600" y="220" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">
    Single Operation
  </text>
  <text x="600" y="245" text-anchor="middle" fill="#53d8fb" font-size="14">
    M · x  (one matrix multiply)
  </text>
  <text x="600" y="270" text-anchor="middle" fill="#aaa" font-size="11">
    O(d²) — constant regardless of L
  </text>

  <!-- Approaches section -->
  <text x="450" y="410" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">
    Compilation Approaches
  </text>

  <!-- Approach 1: Tropical -->
  <rect x="30" y="435" width="170" height="90" rx="10" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="115" y="458" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">🌴 Tropical</text>
  <text x="115" y="478" text-anchor="middle" fill="#ccc" font-size="10">max(a,b) = a ⊕ b</text>
  <text x="115" y="495" text-anchor="middle" fill="#ccc" font-size="10">ReLU is linear!</text>
  <text x="115" y="512" text-anchor="middle" fill="#888" font-size="9">Error: T·log(2)</text>

  <!-- Approach 2: Koopman -->
  <rect x="215" y="435" width="170" height="90" rx="10" fill="#1a1a2e" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="300" y="458" text-anchor="middle" fill="#53d8fb" font-size="12" font-weight="bold">🔄 Koopman</text>
  <text x="300" y="478" text-anchor="middle" fill="#ccc" font-size="10">Lift to linear space</text>
  <text x="300" y="495" text-anchor="middle" fill="#ccc" font-size="10">K_f(g) = g ∘ f</text>
  <text x="300" y="512" text-anchor="middle" fill="#888" font-size="9">Preserves symmetry</text>

  <!-- Approach 3: Crystallization -->
  <rect x="400" y="435" width="170" height="90" rx="10" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="485" y="458" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="bold">💎 Crystallize</text>
  <text x="485" y="478" text-anchor="middle" fill="#ccc" font-size="10">Round to integers</text>
  <text x="485" y="495" text-anchor="middle" fill="#ccc" font-size="10">|w - round(w)| ≤ ½</text>
  <text x="485" y="512" text-anchor="middle" fill="#888" font-size="9">Gaussian ℤ[i]</text>

  <!-- Approach 4: Categorical -->
  <rect x="585" y="435" width="170" height="90" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="670" y="458" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">📐 Categorical</text>
  <text x="670" y="478" text-anchor="middle" fill="#ccc" font-size="10">Functor C: NN → Mat</text>
  <text x="670" y="495" text-anchor="middle" fill="#ccc" font-size="10">C(l₂∘l₁) = C(l₂)∘C(l₁)</text>
  <text x="670" y="512" text-anchor="middle" fill="#888" font-size="9">Preserves semantics</text>

  <!-- Trilemma badge -->
  <rect x="770" y="435" width="115" height="90" rx="10" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="828" y="458" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">⚠️ Trilemma</text>
  <text x="828" y="478" text-anchor="middle" fill="#ccc" font-size="10">Exact</text>
  <text x="828" y="493" text-anchor="middle" fill="#ccc" font-size="10">Efficient</text>
  <text x="828" y="508" text-anchor="middle" fill="#ccc" font-size="10">Universal</text>
  <text x="828" y="522" text-anchor="middle" fill="#f59e0b" font-size="9">Pick any 2!</text>

  <!-- Footer -->
  <text x="450" y="565" text-anchor="middle" fill="#666" font-size="11">
    All theorems formally verified in Lean 4 with Mathlib — zero sorry axioms
  </text>
  <text x="450" y="585" text-anchor="middle" fill="#555" font-size="10">
    Neural Network Compilation and Compression Research
  </text>
</svg>
