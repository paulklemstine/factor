<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="550" fill="url(#bg4)"/>

  <text x="300" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    The Compilation Trilemma
  </text>
  <text x="300" y="65" text-anchor="middle" fill="#888" font-size="13">
    Choose any two — you cannot have all three
  </text>

  <!-- Triangle -->
  <polygon points="300,100 80,420 520,420" fill="none" stroke="#444" stroke-width="2"/>

  <!-- Vertices -->
  <!-- Top: Exact -->
  <circle cx="300" cy="100" r="45" fill="#0d1117" stroke="#e94560" stroke-width="3"/>
  <text x="300" y="96" text-anchor="middle" fill="#e94560" font-size="15" font-weight="bold">Exact</text>
  <text x="300" y="113" text-anchor="middle" fill="#ccc" font-size="10">ε = 0</text>

  <!-- Bottom-left: Efficient -->
  <circle cx="80" cy="420" r="45" fill="#0d1117" stroke="#53d8fb" stroke-width="3"/>
  <text x="80" y="416" text-anchor="middle" fill="#53d8fb" font-size="15" font-weight="bold">Efficient</text>
  <text x="80" y="433" text-anchor="middle" fill="#ccc" font-size="10">poly(n)</text>

  <!-- Bottom-right: Universal -->
  <circle cx="520" cy="420" r="45" fill="#0d1117" stroke="#10b981" stroke-width="3"/>
  <text x="520" y="416" text-anchor="middle" fill="#10b981" font-size="15" font-weight="bold">Universal</text>
  <text x="520" y="433" text-anchor="middle" fill="#ccc" font-size="10">∀ networks</text>

  <!-- Edges labeled with what you get -->
  <!-- Exact + Efficient = Not Universal -->
  <text x="165" y="240" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="bold"
        transform="rotate(-55, 165, 240)">
    Exact + Efficient
  </text>
  <text x="140" y="270" text-anchor="middle" fill="#888" font-size="10"
        transform="rotate(-55, 140, 270)">
    → specific architectures only
  </text>

  <!-- Exact + Universal = Not Efficient -->
  <text x="435" y="240" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold"
        transform="rotate(55, 435, 240)">
    Exact + Universal
  </text>
  <text x="460" y="270" text-anchor="middle" fill="#888" font-size="10"
        transform="rotate(55, 460, 270)">
    → exponential size
  </text>

  <!-- Efficient + Universal = Not Exact -->
  <text x="300" y="445" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">
    Efficient + Universal → Approximate (ε > 0)
  </text>

  <!-- Center: Impossible -->
  <circle cx="300" cy="310" r="35" fill="#0d1117" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="307" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">✗</text>
  <text x="300" y="325" text-anchor="middle" fill="#f59e0b" font-size="10">All three</text>

  <!-- Our approaches -->
  <rect x="50" y="470" width="500" height="60" rx="8" fill="#161b22" stroke="#333"/>
  <text x="300" y="490" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">
    Our Approach: Efficient + Universal with Bounded Error
  </text>
  <text x="300" y="510" text-anchor="middle" fill="#10b981" font-size="12">
    Error ∈ [0, log 2] via tropical annealing — formally verified ✓
  </text>
</svg>
