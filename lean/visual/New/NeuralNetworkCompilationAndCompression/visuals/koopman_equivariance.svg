<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="750" height="450" fill="url(#bg3)"/>

  <text x="375" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">
    Equivariant Koopman Lifting: Commutative Diagram
  </text>

  <!-- State Space box (top-left) -->
  <rect x="50" y="80" width="180" height="70" rx="12" fill="#1a1a3e" stroke="#53d8fb" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" fill="#53d8fb" font-size="15" font-weight="bold">State Space X</text>
  <text x="140" y="130" text-anchor="middle" fill="#888" font-size="11">Nonlinear dynamics</text>

  <!-- State Space box (top-right) -->
  <rect x="420" y="80" width="180" height="70" rx="12" fill="#1a1a3e" stroke="#53d8fb" stroke-width="2"/>
  <text x="510" y="110" text-anchor="middle" fill="#53d8fb" font-size="15" font-weight="bold">State Space X</text>
  <text x="510" y="130" text-anchor="middle" fill="#888" font-size="11">After dynamics f</text>

  <!-- Observable Space box (bottom-left) -->
  <rect x="50" y="280" width="180" height="70" rx="12" fill="#1a1a3e" stroke="#a855f7" stroke-width="2"/>
  <text x="140" y="310" text-anchor="middle" fill="#a855f7" font-size="15" font-weight="bold">Observables</text>
  <text x="140" y="330" text-anchor="middle" fill="#888" font-size="11">g : X → ℝ</text>

  <!-- Observable Space box (bottom-right) -->
  <rect x="420" y="280" width="180" height="70" rx="12" fill="#1a1a3e" stroke="#a855f7" stroke-width="2"/>
  <text x="510" y="310" text-anchor="middle" fill="#a855f7" font-size="15" font-weight="bold">Observables</text>
  <text x="510" y="330" text-anchor="middle" fill="#888" font-size="11">K_f(g) = g ∘ f</text>

  <!-- Top arrow: f (dynamics) -->
  <line x1="230" y1="115" x2="415" y2="115" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="325" y="105" text-anchor="middle" fill="#53d8fb" font-size="14" font-weight="bold">f (nonlinear)</text>

  <!-- Bottom arrow: K_f (Koopman) -->
  <line x1="420" y1="315" x2="235" y2="315" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <text x="325" y="305" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="bold">K_f (LINEAR!)</text>

  <!-- Left arrow: lift -->
  <line x1="140" y1="155" x2="140" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#arrow4)" stroke-dasharray="6,3"/>
  <text x="100" y="220" text-anchor="middle" fill="#10b981" font-size="12" transform="rotate(-90, 100, 220)">Koopman Lift</text>

  <!-- Right arrow: lift -->
  <line x1="510" y1="155" x2="510" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#arrow4)" stroke-dasharray="6,3"/>
  <text x="550" y="220" text-anchor="middle" fill="#10b981" font-size="12" transform="rotate(-90, 550, 220)">Koopman Lift</text>

  <!-- Symmetry σ arrows -->
  <path d="M 140,75 C 140,50 510,50 510,75" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="325" y="55" text-anchor="middle" fill="#f59e0b" font-size="12">σ (symmetry)</text>

  <!-- Equivariance box -->
  <rect x="245" y="170" width="160" height="80" rx="10" fill="#0f0f23" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="325" y="195" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Equivariance</text>
  <text x="325" y="215" text-anchor="middle" fill="#ccc" font-size="12">f ∘ σ = σ ∘ f</text>
  <text x="325" y="235" text-anchor="middle" fill="#aaa" font-size="11">⟹ K_f ∘ σ* = σ* ∘ K_f</text>

  <!-- Key properties -->
  <rect x="50" y="375" width="650" height="55" rx="8" fill="#1a1a3e" stroke="#333"/>
  <text x="375" y="395" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">
    Key Properties (Formally Verified)
  </text>
  <text x="170" y="418" text-anchor="middle" fill="#53d8fb" font-size="11">K_f(g₁+g₂) = K_f(g₁)+K_f(g₂)</text>
  <text x="375" y="418" text-anchor="middle" fill="#a855f7" font-size="11">K_f(cg) = c·K_f(g)</text>
  <text x="580" y="418" text-anchor="middle" fill="#10b981" font-size="11">K_{f∘g} = K_g ∘ K_f</text>
</svg>
