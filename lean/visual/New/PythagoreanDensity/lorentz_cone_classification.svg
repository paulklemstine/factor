<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" font-family="Georgia, serif">
  <defs>
    <radialGradient id="cone_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0a0a1e"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="700" height="550" fill="url(#cone_bg)"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">The Lorentz Null Cone: Q(a,b,c) = a² + b² − c²</text>
  <text x="350" y="55" text-anchor="middle" fill="#8899bb" font-size="12">Integer triples classified by the Pythagorean quadratic form</text>

  <!-- Cone visualization -->
  <!-- Light cone (two diagonal lines meeting at origin) -->
  <g transform="translate(350, 300)">
    <!-- Upper cone (c > 0) -->
    <polygon points="0,-200 -180,0 180,0" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.4"/>
    <!-- Lower cone (c < 0) -->
    <polygon points="0,200 -180,0 180,0" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.4"/>

    <!-- Fill regions -->
    <!-- Interior (timelike, Q < 0, massive) -->
    <polygon points="0,-180 -60,-60 60,-60" fill="#2244aa" opacity="0.15"/>
    <polygon points="0,180 -60,60 60,60" fill="#2244aa" opacity="0.15"/>

    <!-- Exterior (spacelike, Q > 0, tachyonic) -->

    <!-- Null cone surface (Q = 0, Pythagorean) -->
    <line x1="0" y1="-200" x2="-180" y2="0" stroke="#ffd700" stroke-width="2" filter="url(#glow2)"/>
    <line x1="0" y1="-200" x2="180" y2="0" stroke="#ffd700" stroke-width="2" filter="url(#glow2)"/>
    <line x1="0" y1="200" x2="-180" y2="0" stroke="#ffd700" stroke-width="2" filter="url(#glow2)"/>
    <line x1="0" y1="200" x2="180" y2="0" stroke="#ffd700" stroke-width="2" filter="url(#glow2)"/>

    <!-- Pythagorean triples on the cone (Q = 0) -->
    <circle cx="0" cy="0" r="4" fill="#ffd700" filter="url(#glow2)"/>
    <circle cx="50" cy="-70" r="5" fill="#ffd700" filter="url(#glow2)"/>
    <text x="65" y="-68" fill="#ffd700" font-size="10">(3,4,5)</text>

    <circle cx="80" cy="-110" r="5" fill="#ffd700" filter="url(#glow2)"/>
    <text x="95" y="-108" fill="#ffd700" font-size="10">(5,12,13)</text>

    <circle cx="-40" cy="-55" r="4" fill="#ffd700" filter="url(#glow2)"/>
    <text x="-100" y="-53" fill="#ffd700" font-size="10">(8,15,17)</text>

    <circle cx="110" cy="-155" r="4" fill="#ffd700" filter="url(#glow2)"/>
    <text x="125" y="-153" fill="#ffd700" font-size="9">(7,24,25)</text>

    <!-- Massive particles (Q < 0, inside cone) -->
    <circle cx="20" cy="-90" r="5" fill="#4488ff"/>
    <text x="35" y="-88" fill="#4488ff" font-size="10">(3,4,6)</text>

    <circle cx="-10" cy="-110" r="4" fill="#4488ff"/>
    <text x="-70" y="-108" fill="#4488ff" font-size="9">(1,2,5)</text>

    <!-- Tachyonic particles (Q > 0, outside cone) -->
    <circle cx="130" cy="-50" r="5" fill="#ff4444"/>
    <text x="145" y="-48" fill="#ff4444" font-size="10">(3,4,4)</text>

    <circle cx="-130" cy="-40" r="4" fill="#ff4444"/>
    <text x="-190" y="-38" fill="#ff4444" font-size="9">(5,5,3)</text>

    <!-- Axis labels -->
    <text x="0" y="-215" text-anchor="middle" fill="#aabbdd" font-size="12">c (hypotenuse)</text>
    <text x="200" y="5" fill="#aabbdd" font-size="12">a² + b²</text>
  </g>

  <!-- Classification boxes -->
  <rect x="30" y="430" width="195" height="90" rx="8" fill="#111133" stroke="#ffd700" stroke-width="1.5"/>
  <text x="128" y="455" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Q = 0: Photons</text>
  <text x="128" y="475" text-anchor="middle" fill="#ccccaa" font-size="10">Pythagorean triples</text>
  <text x="128" y="492" text-anchor="middle" fill="#ccccaa" font-size="10">a² + b² = c²</text>
  <text x="128" y="509" text-anchor="middle" fill="#888866" font-size="9">On the null cone</text>

  <rect x="250" y="430" width="195" height="90" rx="8" fill="#111133" stroke="#4488ff" stroke-width="1.5"/>
  <text x="348" y="455" text-anchor="middle" fill="#4488ff" font-size="13" font-weight="bold">Q &lt; 0: Massive</text>
  <text x="348" y="475" text-anchor="middle" fill="#aabbdd" font-size="10">Timelike triples</text>
  <text x="348" y="492" text-anchor="middle" fill="#aabbdd" font-size="10">a² + b² &lt; c²</text>
  <text x="348" y="509" text-anchor="middle" fill="#8899aa" font-size="9">Inside the cone</text>

  <rect x="470" y="430" width="195" height="90" rx="8" fill="#111133" stroke="#ff4444" stroke-width="1.5"/>
  <text x="568" y="455" text-anchor="middle" fill="#ff4444" font-size="13" font-weight="bold">Q &gt; 0: Tachyons</text>
  <text x="568" y="475" text-anchor="middle" fill="#ddaaaa" font-size="10">Spacelike triples</text>
  <text x="568" y="492" text-anchor="middle" fill="#ddaaaa" font-size="10">a² + b² &gt; c²</text>
  <text x="568" y="509" text-anchor="middle" fill="#aa8888" font-size="9">Outside the cone</text>
</svg>
