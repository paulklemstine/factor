<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="40%" stop-color="#7ee787"/>
      <stop offset="60%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg4)"/>

  <text x="400" y="35" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="bold">
    Scaling Exponent α: Success Rate Landscape
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#8b949e" font-size="11">
    Quaternion lattice factoring — 30-bit semiprimes, 1000 trials per α value
  </text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="720" y2="400" stroke="#484f58" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="80" stroke="#484f58" stroke-width="1.5"/>

  <!-- X axis labels -->
  <text x="100" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.10</text>
  <text x="200" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.15</text>
  <text x="300" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.20</text>
  <text x="400" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.25</text>
  <text x="500" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.30</text>
  <text x="600" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.35</text>
  <text x="700" y="425" text-anchor="middle" fill="#8b949e" font-size="11">0.40</text>
  <text x="400" y="455" text-anchor="middle" fill="#c9d1d9" font-size="13">Scaling exponent α</text>

  <!-- Y axis labels -->
  <text x="88" y="400" text-anchor="end" fill="#8b949e" font-size="11">0%</text>
  <text x="88" y="320" text-anchor="end" fill="#8b949e" font-size="11">25%</text>
  <text x="88" y="240" text-anchor="end" fill="#8b949e" font-size="11">50%</text>
  <text x="88" y="160" text-anchor="end" fill="#8b949e" font-size="11">75%</text>
  <text x="88" y="85" text-anchor="end" fill="#8b949e" font-size="11">100%</text>
  <text x="35" y="240" text-anchor="middle" fill="#c9d1d9" font-size="13" transform="rotate(-90 35 240)">
    Success Rate
  </text>

  <!-- Grid lines -->
  <g stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4">
    <line x1="100" y1="320" x2="720" y2="320"/>
    <line x1="100" y1="240" x2="720" y2="240"/>
    <line x1="100" y1="160" x2="720" y2="160"/>
  </g>

  <!-- Data curve (bell shape peaking around α=0.27) -->
  <!-- Points: (0.10, 15%), (0.15, 30%), (0.20, 45%), (0.25, 62%), (0.27, 67%), (0.30, 63%), (0.33, 58%), (0.35, 50%), (0.40, 41%) -->
  <!-- Y mapping: 400 - rate * 3.2 -->
  <path d="M 100 352 C 150 330, 250 256, 350 202 S 420 168, 440 186 S 520 215, 600 252 S 670 280, 720 290"
        fill="none" stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Data points -->
  <g filter="url(#nodeGlow)">
    <circle cx="100" cy="352" r="5" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="200" cy="304" r="5" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="300" cy="256" r="5" fill="#58a6ff" stroke="#79c0ff" stroke-width="1.5"/>
    <circle cx="400" cy="202" r="5" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"/>
    <!-- Peak -->
    <circle cx="440" cy="186" r="8" fill="#7ee787" stroke="#aff5b4" stroke-width="2.5"/>
    <circle cx="500" cy="198" r="5" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"/>
    <circle cx="560" cy="215" r="5" fill="#ffa657" stroke="#ffbc6e" stroke-width="1.5"/>
    <circle cx="600" cy="240" r="5" fill="#f85149" stroke="#ffa198" stroke-width="1.5"/>
    <circle cx="700" cy="269" r="5" fill="#f85149" stroke="#ffa198" stroke-width="1.5"/>
  </g>

  <!-- Peak annotation -->
  <line x1="440" y1="186" x2="440" y2="100" stroke="#7ee787" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="370" y="75" width="140" height="30" rx="5" fill="#238636" opacity="0.9"/>
  <text x="440" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">
    Peak: α ≈ 0.27
  </text>

  <!-- Conjectured limit annotation -->
  <line x1="400" y1="400" x2="400" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="400" y="445" text-anchor="middle" fill="#58a6ff" font-size="10" font-style="italic">
    Conjectured limit: α* → ¼
  </text>

  <!-- Regime labels -->
  <text x="200" y="380" text-anchor="middle" fill="#1f6feb" font-size="9" opacity="0.7">
    Under-scaled: lattice too dense
  </text>
  <text x="650" y="380" text-anchor="middle" fill="#f85149" font-size="9" opacity="0.7">
    Over-scaled: short vectors too rare
  </text>

  <!-- Theoretical bound -->
  <line x1="600" y1="400" x2="600" y2="80" stroke="#f85149" stroke-width="1" stroke-dasharray="2,4" opacity="0.4"/>
  <text x="620" y="95" fill="#f85149" font-size="9" opacity="0.6">α ≤ ½ (proved)</text>

  <text x="400" y="485" text-anchor="middle" fill="#484f58" font-size="10">
    Figure 4: The α scaling landscape — optimal extraction at α ≈ 0.25–0.28
  </text>
</svg>
