<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="700" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="bold">
    Quaternion Lattice Construction for Factoring
  </text>

  <!-- Step 1: Input -->
  <rect x="30" y="70" width="250" height="130" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="2"/>
  <text x="155" y="95" text-anchor="middle" fill="#2ea043" font-size="14" font-weight="bold">Step 1: Input</text>
  <text x="155" y="120" text-anchor="middle" fill="#c9d1d9" font-size="12">Semiprime N = p × q</text>
  <text x="155" y="145" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="bold">N = 15 = 3 × 5</text>
  <text x="155" y="170" text-anchor="middle" fill="#8b949e" font-size="11">(factors unknown to algorithm)</text>
  <text x="155" y="190" text-anchor="middle" fill="#8b949e" font-size="11">Find: a²+b²+c²+d² = N</text>

  <!-- Arrow 1→2 -->
  <path d="M 280 135 L 320 135" stroke="#484f58" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#484f58"/></marker></defs>

  <!-- Step 2: Four-square -->
  <rect x="330" y="70" width="250" height="130" rx="10" fill="#21262d" stroke="#1f6feb" stroke-width="2"/>
  <text x="455" y="95" text-anchor="middle" fill="#1f6feb" font-size="14" font-weight="bold">Step 2: Four-Square Rep</text>
  <text x="455" y="120" text-anchor="middle" fill="#c9d1d9" font-size="12">N = a² + b² + c² + d²</text>
  <text x="455" y="150" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">15 = 1² + 1² + 2² + 3²</text>
  <text x="455" y="175" text-anchor="middle" fill="#8b949e" font-size="11">Lagrange: always exists!</text>
  <text x="455" y="190" text-anchor="middle" fill="#8b949e" font-size="11">(a,b,c,d) = (1,1,2,3)</text>

  <!-- Arrow 2→3 -->
  <path d="M 580 135 L 620 135" stroke="#484f58" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <!-- Step 3: Build lattice -->
  <rect x="630" y="70" width="250" height="130" rx="10" fill="#21262d" stroke="#a371f7" stroke-width="2"/>
  <text x="755" y="95" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold">Step 3: Build Lattice</text>
  <text x="755" y="115" text-anchor="middle" fill="#c9d1d9" font-size="11">5D lattice with scaling α</text>

  <!-- Matrix visualization -->
  <text x="670" y="140" fill="#d8b4fe" font-size="13" font-family="monospace">⎡ s 0 0 0 1 ⎤</text>
  <text x="670" y="157" fill="#d8b4fe" font-size="13" font-family="monospace">⎢ 0 s 0 0 1 ⎥</text>
  <text x="670" y="174" fill="#d8b4fe" font-size="13" font-family="monospace">⎢ 0 0 s 0 2 ⎥</text>
  <text x="670" y="191" fill="#d8b4fe" font-size="13" font-family="monospace">⎣ 0 0 0 s 3 ⎦</text>

  <!-- Step 4: LLL Reduce — large central panel -->
  <rect x="100" y="240" width="700" height="200" rx="12" fill="#21262d" stroke="#f78166" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" fill="#f78166" font-size="16" font-weight="bold">
    Step 4: LLL Lattice Reduction
  </text>

  <!-- Lattice visualization: before and after -->
  <!-- Before LLL -->
  <rect x="130" y="290" width="280" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="270" y="310" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold">Before LLL</text>

  <!-- Grid of dots (original lattice - skewed) -->
  <g fill="#484f58" opacity="0.6">
    <circle cx="180" cy="380" r="3"/>
    <circle cx="220" cy="340" r="3"/>
    <circle cx="260" cy="360" r="3"/>
    <circle cx="300" cy="330" r="3"/>
    <circle cx="340" cy="370" r="3"/>
    <circle cx="200" cy="400" r="3"/>
    <circle cx="280" cy="390" r="3"/>
    <circle cx="350" cy="340" r="3"/>
    <circle cx="160" cy="350" r="3"/>
    <circle cx="320" cy="400" r="3"/>
    <circle cx="240" cy="410" r="3"/>
  </g>
  <!-- Long basis vectors -->
  <line x1="200" y1="380" x2="340" y2="330" stroke="#f85149" stroke-width="2"/>
  <line x1="200" y1="380" x2="300" y2="400" stroke="#f85149" stroke-width="2"/>
  <text x="270" y="420" text-anchor="middle" fill="#f85149" font-size="10">Long, nearly parallel</text>

  <!-- Arrow -->
  <path d="M 420 370 L 480 370" stroke="#7ee787" stroke-width="3" fill="none" marker-end="url(#garr)"/>
  <text x="450" y="360" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">LLL</text>
  <defs><marker id="garr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#7ee787"/></marker></defs>

  <!-- After LLL -->
  <rect x="500" y="290" width="280" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="640" y="310" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold">After LLL</text>

  <!-- Grid of dots (reduced lattice - orthogonal) -->
  <g fill="#484f58" opacity="0.6">
    <circle cx="560" cy="370" r="3"/>
    <circle cx="600" cy="370" r="3"/>
    <circle cx="640" cy="370" r="3"/>
    <circle cx="680" cy="370" r="3"/>
    <circle cx="720" cy="370" r="3"/>
    <circle cx="560" cy="340" r="3"/>
    <circle cx="600" cy="340" r="3"/>
    <circle cx="640" cy="340" r="3"/>
    <circle cx="680" cy="340" r="3"/>
    <circle cx="720" cy="340" r="3"/>
    <circle cx="560" cy="400" r="3"/>
    <circle cx="600" cy="400" r="3"/>
    <circle cx="640" cy="400" r="3"/>
    <circle cx="680" cy="400" r="3"/>
    <circle cx="720" cy="400" r="3"/>
  </g>
  <!-- Short, nearly orthogonal basis vectors -->
  <line x1="600" y1="370" x2="640" y2="370" stroke="#7ee787" stroke-width="2.5"/>
  <line x1="600" y1="370" x2="600" y2="340" stroke="#7ee787" stroke-width="2.5"/>
  <!-- Highlight the short vector -->
  <circle cx="640" cy="370" r="5" fill="none" stroke="#f0883e" stroke-width="2"/>
  <text x="640" y="420" text-anchor="middle" fill="#7ee787" font-size="10">Short, orthogonal</text>

  <!-- Step 5: Extract factor -->
  <rect x="200" y="480" width="500" height="120" rx="12" fill="#21262d" stroke="#7ee787" stroke-width="2"/>
  <text x="450" y="510" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="bold">
    Step 5: Extract Factor
  </text>
  <text x="450" y="540" text-anchor="middle" fill="#c9d1d9" font-size="13">
    Short vector v = (x₁, x₂, x₃, x₄, 0)  →  compute  x₁² + x₂² + x₃² + x₄²
  </text>
  <text x="450" y="565" text-anchor="middle" fill="#c9d1d9" font-size="13">
    If this equals p or q:  GCD(x₁² + x₂² + x₃² + x₄², N) = factor!
  </text>
  <text x="450" y="590" text-anchor="middle" fill="#7ee787" font-size="15" font-weight="bold">
    ✓  GCD(5, 15) = 5  →  15 = 3 × 5  FACTORED!
  </text>

  <!-- Arrow 3→4 -->
  <path d="M 755 200 Q 755 220 450 240" stroke="#484f58" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <!-- Arrow 4→5 -->
  <path d="M 450 440 L 450 478" stroke="#484f58" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <!-- Footer -->
  <text x="450" y="650" text-anchor="middle" fill="#484f58" font-size="10">
    Figure 2: The quaternion lattice factoring pipeline — from semiprime to factors via LLL reduction
  </text>
  <text x="450" y="670" text-anchor="middle" fill="#484f58" font-size="9">
    The scaling parameter α ≈ 0.25–0.30 controls the balance between lattice determinant and short vector extraction
  </text>
</svg>
