<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="proven" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d5016"/>
      <stop offset="100%" stop-color="#3a6b1e"/>
    </linearGradient>
    <linearGradient id="open" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a2020"/>
      <stop offset="100%" stop-color="#993030"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#fafafa"/>

  <text x="400" y="35" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">
    Proof Structure: From Foundations to Open Problems
  </text>

  <!-- Layer 1: Verified Foundations -->
  <rect x="30" y="60" width="740" height="100" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" fill="#2e7d32" font-size="14" font-weight="bold">
    Layer 1: Machine-Verified Foundations (Lean 4 / Mathlib)
  </text>

  <!-- Proven results boxes -->
  <rect x="45" y="92" width="130" height="55" rx="5" fill="url(#proven)"/>
  <text x="110" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Spectral Theory</text>
  <text x="110" y="126" text-anchor="middle" fill="#b8e6b8" font-size="8">Trace formula</text>
  <text x="110" y="138" text-anchor="middle" fill="#b8e6b8" font-size="8">Real eigenvalues</text>

  <rect x="185" y="92" width="130" height="55" rx="5" fill="url(#proven)"/>
  <text x="250" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Li Criterion</text>
  <text x="250" y="126" text-anchor="middle" fill="#b8e6b8" font-size="8">Unit disk property</text>
  <text x="250" y="138" text-anchor="middle" fill="#b8e6b8" font-size="8">Positivity structure</text>

  <rect x="325" y="92" width="130" height="55" rx="5" fill="url(#proven)"/>
  <text x="390" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Lie Algebra</text>
  <text x="390" y="126" text-anchor="middle" fill="#b8e6b8" font-size="8">Jacobi identity</text>
  <text x="390" y="138" text-anchor="middle" fill="#b8e6b8" font-size="8">Antisymmetry</text>

  <rect x="465" y="92" width="130" height="55" rx="5" fill="url(#proven)"/>
  <text x="530" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Energy Estimates</text>
  <text x="530" y="126" text-anchor="middle" fill="#b8e6b8" font-size="8">Gronwall inequality</text>
  <text x="530" y="138" text-anchor="middle" fill="#b8e6b8" font-size="8">Young's inequality</text>

  <rect x="605" y="92" width="155" height="55" rx="5" fill="url(#proven)"/>
  <text x="682" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Number Theory</text>
  <text x="682" y="126" text-anchor="middle" fill="#b8e6b8" font-size="8">Collatz trajectories</text>
  <text x="682" y="138" text-anchor="middle" fill="#b8e6b8" font-size="8">Brocard, Erdős-Straus</text>

  <!-- Arrows down -->
  <path d="M110 147 L110 190" stroke="#666" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <path d="M250 147 L250 190" stroke="#666" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <path d="M390 147 L390 190" stroke="#666" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <path d="M530 147 L530 190" stroke="#666" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <path d="M682 147 L682 190" stroke="#666" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Layer 2: Structural Bridges -->
  <rect x="30" y="190" width="740" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="400" y="212" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">
    Layer 2: Structural Bridges (Partially Formalized)
  </text>

  <rect x="50" y="222" width="200" height="45" rx="5" fill="#fff8e1" stroke="#ffa726"/>
  <text x="150" y="240" text-anchor="middle" fill="#e65100" font-size="9">Hilbert-Pólya ↔ Random matrices</text>
  <text x="150" y="254" text-anchor="middle" fill="#e65100" font-size="9">Berry-Keating operator</text>

  <rect x="260" y="222" width="200" height="45" rx="5" fill="#fff8e1" stroke="#ffa726"/>
  <text x="360" y="240" text-anchor="middle" fill="#e65100" font-size="9">Diagonalization → Hierarchy thms</text>
  <text x="360" y="254" text-anchor="middle" fill="#e65100" font-size="9">Circuit → algebraic lower bounds</text>

  <rect x="470" y="222" width="290" height="45" rx="5" fill="#fff8e1" stroke="#ffa726"/>
  <text x="615" y="240" text-anchor="middle" fill="#e65100" font-size="9">Sobolev embedding → Regularity criteria</text>
  <text x="615" y="254" text-anchor="middle" fill="#e65100" font-size="9">Lattice gauge → Continuum limit</text>

  <!-- Layer 3: Open Problems -->
  <rect x="30" y="310" width="740" height="130" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="400" y="332" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">
    Layer 3: Open Millennium Problems
  </text>

  <rect x="50" y="345" width="155" height="80" rx="5" fill="url(#open)"/>
  <text x="127" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Riemann</text>
  <text x="127" y="380" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Hypothesis</text>
  <text x="127" y="398" text-anchor="middle" fill="#ffaaaa" font-size="8">All ζ-zeros on Re=½</text>
  <text x="127" y="412" text-anchor="middle" fill="#ff8888" font-size="9">$1,000,000</text>

  <rect x="215" y="345" width="130" height="80" rx="5" fill="url(#open)"/>
  <text x="280" y="372" text-anchor="middle" fill="white" font-size="11" font-weight="bold">P vs NP</text>
  <text x="280" y="398" text-anchor="middle" fill="#ffaaaa" font-size="8">P ≠ NP (or P = NP?)</text>
  <text x="280" y="412" text-anchor="middle" fill="#ff8888" font-size="9">$1,000,000</text>

  <rect x="355" y="345" width="130" height="80" rx="5" fill="url(#open)"/>
  <text x="420" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Yang-Mills</text>
  <text x="420" y="380" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Mass Gap</text>
  <text x="420" y="398" text-anchor="middle" fill="#ffaaaa" font-size="8">Δ > 0 in QYM</text>
  <text x="420" y="412" text-anchor="middle" fill="#ff8888" font-size="9">$1,000,000</text>

  <rect x="495" y="345" width="130" height="80" rx="5" fill="url(#open)"/>
  <text x="560" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Navier-Stokes</text>
  <text x="560" y="380" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Regularity</text>
  <text x="560" y="398" text-anchor="middle" fill="#ffaaaa" font-size="8">Smooth solutions ∀t</text>
  <text x="560" y="412" text-anchor="middle" fill="#ff8888" font-size="9">$1,000,000</text>

  <rect x="635" y="345" width="130" height="80" rx="5" fill="url(#open)"/>
  <text x="700" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Other</text>
  <text x="700" y="380" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Conjectures</text>
  <text x="700" y="398" text-anchor="middle" fill="#ffaaaa" font-size="8">Collatz, Brocard,</text>
  <text x="700" y="412" text-anchor="middle" fill="#ffaaaa" font-size="8">Erdős-Straus</text>

  <!-- Legend -->
  <rect x="30" y="460" width="740" height="130" rx="8" fill="white" stroke="#ddd"/>
  <text x="400" y="485" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">Summary Statistics</text>

  <rect x="60" y="500" width="18" height="18" rx="3" fill="#4caf50"/>
  <text x="85" y="514" fill="#333" font-size="12">25+ theorems formally verified (zero sorry, zero non-standard axioms)</text>

  <rect x="60" y="525" width="18" height="18" rx="3" fill="#ff9800"/>
  <text x="85" y="539" fill="#333" font-size="12">Structural bridges connecting foundations to open problems</text>

  <rect x="60" y="550" width="18" height="18" rx="3" fill="#e53935"/>
  <text x="85" y="564" fill="#333" font-size="12">Open problems: $5M+ in prizes remain unclaimed</text>
</svg>
