<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">
    Li's Criterion: The Map ρ → 1 - 1/ρ
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#555" font-size="12">
    Zeros on the critical line map to the unit circle (formally verified)
  </text>

  <!-- Left panel: Critical line -->
  <rect x="30" y="75" width="340" height="370" rx="10" fill="white" stroke="#ccc"/>
  <text x="200" y="100" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">
    ζ-plane: Critical Strip
  </text>

  <!-- Axes -->
  <line x1="200" y1="130" x2="200" y2="420" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="275" x2="340" y2="275" stroke="#aaa" stroke-width="1"/>
  <text x="345" y="279" fill="#777" font-size="10">Re</text>
  <text x="204" y="125" fill="#777" font-size="10">Im</text>

  <!-- Critical strip shading -->
  <rect x="160" y="130" width="80" height="290" fill="#e8f0fe" opacity="0.5"/>

  <!-- Critical line -->
  <line x1="200" y1="130" x2="200" y2="420" stroke="#4285f4" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="210" y="420" fill="#4285f4" font-size="10">Re = 1/2</text>

  <!-- Zeros on critical line -->
  <circle cx="200" cy="175" r="6" fill="#ea4335"/>
  <text x="215" y="179" fill="#ea4335" font-size="9">ρ₁ ≈ ½+14.1i</text>

  <circle cx="200" cy="210" r="6" fill="#ea4335"/>
  <text x="215" y="214" fill="#ea4335" font-size="9">ρ₂ ≈ ½+21.0i</text>

  <circle cx="200" cy="235" r="6" fill="#ea4335"/>
  <text x="215" y="239" fill="#ea4335" font-size="9">ρ₃ ≈ ½+25.0i</text>

  <circle cx="200" cy="260" r="6" fill="#ea4335"/>
  <circle cx="200" cy="295" r="5" fill="#ea4335" opacity="0.7"/>
  <circle cx="200" cy="320" r="5" fill="#ea4335" opacity="0.5"/>
  <circle cx="200" cy="345" r="4" fill="#ea4335" opacity="0.4"/>
  <circle cx="200" cy="365" r="4" fill="#ea4335" opacity="0.3"/>

  <!-- Arrow between panels -->
  <path d="M380 275 L420 275" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <text x="400" y="260" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">
    w = 1-1/ρ
  </text>

  <!-- Right panel: Unit disk -->
  <rect x="430" y="75" width="340" height="370" rx="10" fill="white" stroke="#ccc"/>
  <text x="600" y="100" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">
    w-plane: Unit Disk
  </text>

  <!-- Unit circle -->
  <circle cx="600" cy="275" r="120" fill="none" stroke="#34a853" stroke-width="2"/>
  <circle cx="600" cy="275" r="120" fill="#e8f8e8" opacity="0.3"/>

  <!-- Axes -->
  <line x1="600" y1="130" x2="600" y2="420" stroke="#aaa" stroke-width="1"/>
  <line x1="450" y1="275" x2="750" y2="275" stroke="#aaa" stroke-width="1"/>

  <!-- Mapped zeros (on unit circle) -->
  <circle cx="599" cy="155" r="6" fill="#ea4335"/>
  <circle cx="587" cy="165" r="6" fill="#ea4335"/>
  <circle cx="580" cy="180" r="6" fill="#ea4335"/>
  <circle cx="575" cy="200" r="5" fill="#ea4335" opacity="0.7"/>
  <circle cx="573" cy="220" r="5" fill="#ea4335" opacity="0.5"/>
  <circle cx="572" cy="240" r="4" fill="#ea4335" opacity="0.4"/>
  <circle cx="571" cy="255" r="4" fill="#ea4335" opacity="0.3"/>

  <!-- Labels -->
  <text x="720" y="170" fill="#34a853" font-size="11" font-weight="bold">|w| = 1</text>
  <text x="490" y="160" fill="#ea4335" font-size="9">mapped zeros</text>
  <text x="490" y="175" fill="#ea4335" font-size="9">lie on circle</text>

  <!-- Center point -->
  <circle cx="600" cy="275" r="3" fill="#333"/>
  <text x="610" y="290" fill="#555" font-size="9">0</text>

  <!-- Bottom annotation -->
  <rect x="50" y="455" width="700" height="35" rx="5" fill="#f0f4f8"/>
  <text x="400" y="477" text-anchor="middle" fill="#333" font-size="12">
    Theorem (verified in Lean 4): Re(ρ) = ½ and ρ ≠ 0 implies ‖1 - 1/ρ‖ ≤ 1
  </text>
</svg>
