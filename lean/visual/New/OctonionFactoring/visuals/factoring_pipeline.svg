<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" 
     width="800" height="350">
  <defs>
    <style>
      text { font-family: 'Georgia', 'Times New Roman', serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .subtitle { font-size: 13px; fill: #444; }
      .label { font-size: 12px; fill: #333; }
      .small { font-size: 10px; fill: #666; }
      .math { font-family: 'Times New Roman', serif; font-style: italic; }
      .axis { stroke: #333; stroke-width: 1.5; fill: none; }
      .grid { stroke: #ddd; stroke-width: 0.5; fill: none; }
      .highlight { fill: #e94560; }
      .accent1 { fill: #0f3460; }
      .accent2 { fill: #16213e; }
      .accent3 { fill: #533483; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  <!-- Quaternion Factoring Pipeline -->
  <rect width="800" height="350" fill="#fafbfc" rx="10"/>
  <text x="400" y="30" text-anchor="middle" class="title">Quaternion Factoring Pipeline</text>
  <rect x="40" y="100" width="100" height="70" rx="8" fill="#e53935" fill-opacity="0.15" stroke="#e53935" stroke-width="2"/>
  <circle cx="55" cy="92" r="12" fill="#e53935"/>
  <text x="55" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1</text>
  <text x="90.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935">Input</text>
  <text x="90.0" y="140" text-anchor="middle" font-size="12" fill="#333">N = p·q</text>
  <text x="90.0" y="190" text-anchor="middle" font-size="10" fill="#666">Composite</text>
  <text x="90.0" y="205" text-anchor="middle" font-size="10" fill="#666">integer</text>
  <line x1="145" y1="135.0" x2="155" y2="135.0" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="160" y="100" width="100" height="70" rx="8" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="2"/>
  <circle cx="175" cy="92" r="12" fill="#FF9800"/>
  <text x="175" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2</text>
  <text x="210.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF9800">Decompose</text>
  <text x="210.0" y="140" text-anchor="middle" font-size="12" fill="#333">4-Square</text>
  <text x="210.0" y="190" text-anchor="middle" font-size="10" fill="#666">N = Σaᵢ²</text>
  <text x="210.0" y="205" text-anchor="middle" font-size="10" fill="#666">(Lagrange)</text>
  <line x1="265" y1="135.0" x2="275" y2="135.0" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="280" y="100" width="100" height="70" rx="8" fill="#4CAF50" fill-opacity="0.15" stroke="#4CAF50" stroke-width="2"/>
  <circle cx="295" cy="92" r="12" fill="#4CAF50"/>
  <text x="295" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">3</text>
  <text x="330.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CAF50">Construct</text>
  <text x="330.0" y="140" text-anchor="middle" font-size="12" fill="#333">Lattice</text>
  <text x="330.0" y="190" text-anchor="middle" font-size="10" fill="#666">L₄(N) ⊂ ℤ⁴</text>
  <line x1="385" y1="135.0" x2="395" y2="135.0" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="400" y="100" width="100" height="70" rx="8" fill="#2196F3" fill-opacity="0.15" stroke="#2196F3" stroke-width="2"/>
  <circle cx="415" cy="92" r="12" fill="#2196F3"/>
  <text x="415" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">4</text>
  <text x="450.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#2196F3">Reduce</text>
  <text x="450.0" y="140" text-anchor="middle" font-size="12" fill="#333">LLL/BKZ</text>
  <text x="450.0" y="190" text-anchor="middle" font-size="10" fill="#666">Short vectors</text>
  <text x="450.0" y="205" text-anchor="middle" font-size="10" fill="#666">‖v‖ ≈ N^{1/4}</text>
  <line x1="505" y1="135.0" x2="515" y2="135.0" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="520" y="100" width="100" height="70" rx="8" fill="#9C27B0" fill-opacity="0.15" stroke="#9C27B0" stroke-width="2"/>
  <circle cx="535" cy="92" r="12" fill="#9C27B0"/>
  <text x="535" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">5</text>
  <text x="570.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#9C27B0">Extract</text>
  <text x="570.0" y="140" text-anchor="middle" font-size="12" fill="#333">GCD</text>
  <text x="570.0" y="190" text-anchor="middle" font-size="10" fill="#666">p = gcd(·,N)</text>
  <line x1="625" y1="135.0" x2="635" y2="135.0" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="640" y="100" width="100" height="70" rx="8" fill="#e53935" fill-opacity="0.15" stroke="#e53935" stroke-width="2"/>
  <circle cx="655" cy="92" r="12" fill="#e53935"/>
  <text x="655" y="96" text-anchor="middle" font-size="11" fill="white" font-weight="bold">6</text>
  <text x="690.0" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935">Output</text>
  <text x="690.0" y="140" text-anchor="middle" font-size="12" fill="#333">p, q</text>
  <text x="690.0" y="190" text-anchor="middle" font-size="10" fill="#666">Factored!</text>
  <text x="400" y="280" text-anchor="middle" font-size="12" fill="#666">Key Insight: Higher dimension d → shorter vectors N^(1/d) → easier factor extraction</text>
  <rect x="80" y="300" width="640" height="35" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="400" y="322" text-anchor="middle" font-size="11" fill="#333">Trial Division: O(N^{1/2}) → Quaternion Lattice (d=4): O(N^{1/4}) → Octonion Lattice (d=8): O(N^{1/8})?</text>
</svg>
