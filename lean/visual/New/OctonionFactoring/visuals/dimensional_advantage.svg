<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 450" 
     width="650" height="450">
  <defs>
    <style>
      text { font-family: 'Georgia', 'Times New Roman', serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .subtitle { font-size: 13px; fill: #444; }
      .label { font-size: 12px; fill: #333; }
      .small { font-size: 10px; fill: #666; }
      .math { font-family: 'Times New Roman', serif; font-style: italic; }
      .axis { stroke: #333; stroke-width: 1.5; fill: none; }
      .grid { stroke: #ddd; stroke-width: 0.5; fill: none; }
      .highlight { fill: #e94560; }
      .accent1 { fill: #0f3460; }
      .accent2 { fill: #16213e; }
      .accent3 { fill: #533483; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  <!-- Dimensional Advantage -->
  <rect width="650" height="450" fill="#fafbfc" rx="10"/>
  <text x="325" y="30" text-anchor="middle" class="title">Minkowski Bound: N^(1/d) by Dimension</text>
  <text x="325" y="50" text-anchor="middle" class="subtitle">Shorter vectors in higher dimensions enable better factoring</text>
  <line x1="80" y1="390" x2="580" y2="390" class="axis"/>
  <line x1="80" y1="390" x2="80" y2="70" class="axis"/>
  <text x="330.0" y="425" text-anchor="middle" class="label">N (log scale)</text>
  <text x="35" y="230.0" text-anchor="middle" class="label" transform="rotate(-90 35 230.0)">Minkowski Bound</text>
  <polyline points="80.0,336.7 180.0,283.3 280.0,230.0 380.0,176.7 480.0,123.3 580.0,70.0" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <polyline points="80.0,363.3 180.0,336.7 280.0,310.0 380.0,283.3 480.0,256.7 580.0,230.0" fill="none" stroke="#FF9800" stroke-width="2.5"/>
  <polyline points="80.0,372.2 180.0,354.4 280.0,336.7 380.0,318.9 480.0,301.1 580.0,283.3" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
  <polyline points="80.0,376.7 180.0,363.3 280.0,350.0 380.0,336.7 480.0,323.3 580.0,310.0" fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <polyline points="80.0,383.3 180.0,376.7 280.0,370.0 380.0,363.3 480.0,356.7 580.0,350.0" fill="none" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="595" y1="90" x2="615" y2="90" stroke="#e53935" stroke-width="2.5"/>
  <text x="620" y="94" font-size="11" fill="#333">d=1 (N)</text>
  <line x1="595" y1="112" x2="615" y2="112" stroke="#FF9800" stroke-width="2.5"/>
  <text x="620" y="116" font-size="11" fill="#333">d=2 (√N)</text>
  <line x1="595" y1="134" x2="615" y2="134" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="620" y="138" font-size="11" fill="#333">d=3 (∛N)</text>
  <line x1="595" y1="156" x2="615" y2="156" stroke="#2196F3" stroke-width="2.5"/>
  <text x="620" y="160" font-size="11" fill="#333">d=4 (⁴√N)</text>
  <line x1="595" y1="178" x2="615" y2="178" stroke="#9C27B0" stroke-width="2.5"/>
  <text x="620" y="182" font-size="11" fill="#333">d=8 (⁸√N)</text>
  <text x="80.0" y="408" text-anchor="middle" font-size="10" fill="#666">10</text>
  <text x="180.0" y="408" text-anchor="middle" font-size="10" fill="#666">100</text>
  <text x="280.0" y="408" text-anchor="middle" font-size="10" fill="#666">1,000</text>
  <text x="380.0" y="408" text-anchor="middle" font-size="10" fill="#666">10,000</text>
  <text x="480.0" y="408" text-anchor="middle" font-size="10" fill="#666">100,000</text>
  <text x="580.0" y="408" text-anchor="middle" font-size="10" fill="#666">1,000,000</text>
</svg>
