<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #333; }
      .subtitle { font: 13px sans-serif; fill: #666; }
      .axis-label { font: 13px sans-serif; fill: #333; }
      .tick-label { font: 11px sans-serif; fill: #555; }
      .legend-text { font: 12px sans-serif; fill: #333; }
      .gridline { stroke: #eee; stroke-width: 0.5; }
      .axis { stroke: #333; stroke-width: 1.5; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#fff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="550" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">
    Sauer–Shelah Growth Function: Polynomial vs Exponential
  </text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">
    VC dimension d = 3: Π(m) = ∑ᵢ₌₀³ C(m,i) ≤ (m+1)³ ≪ 2ᵐ
  </text>

  <!-- Chart area: x from 100 to 700, y from 80 to 450 -->
  <!-- Axes -->
  <line x1="100" y1="450" x2="700" y2="450" class="axis"/>
  <line x1="100" y1="450" x2="100" y2="80" class="axis"/>

  <!-- X-axis label -->
  <text x="400" y="490" text-anchor="middle" class="axis-label">
    Number of points m
  </text>

  <!-- Y-axis label -->
  <text x="30" y="265" text-anchor="middle" class="axis-label"
        transform="rotate(-90, 30, 265)">
    Number of labelings
  </text>

  <!-- Grid lines -->
  <line x1="100" y1="376" x2="700" y2="376" class="gridline"/>
  <line x1="100" y1="302" x2="700" y2="302" class="gridline"/>
  <line x1="100" y1="228" x2="700" y2="228" class="gridline"/>
  <line x1="100" y1="154" x2="700" y2="154" class="gridline"/>

  <!-- Y-axis ticks (log scale approximation for visibility) -->
  <!-- We use a scaled linear chart for the polynomial region -->
  <!-- Max Y = 500, scale: y_pixel = 450 - (value/500)*370 -->

  <!-- X-axis ticks: m = 3,4,5,...,11 -->
  <!-- x_pixel = 100 + (m-3)/(11-3) * 600 = 100 + (m-3)*75 -->
  <text x="100" y="470" text-anchor="middle" class="tick-label">3</text>
  <text x="175" y="470" text-anchor="middle" class="tick-label">4</text>
  <text x="250" y="470" text-anchor="middle" class="tick-label">5</text>
  <text x="325" y="470" text-anchor="middle" class="tick-label">6</text>
  <text x="400" y="470" text-anchor="middle" class="tick-label">7</text>
  <text x="475" y="470" text-anchor="middle" class="tick-label">8</text>
  <text x="550" y="470" text-anchor="middle" class="tick-label">9</text>
  <text x="625" y="470" text-anchor="middle" class="tick-label">10</text>
  <text x="700" y="470" text-anchor="middle" class="tick-label">11</text>

  <!-- Y-axis ticks -->
  <text x="90" y="454" text-anchor="end" class="tick-label">0</text>
  <text x="90" y="380" text-anchor="end" class="tick-label">100</text>
  <text x="90" y="306" text-anchor="end" class="tick-label">200</text>
  <text x="90" y="232" text-anchor="end" class="tick-label">300</text>
  <text x="90" y="158" text-anchor="end" class="tick-label">400</text>
  <text x="90" y="84" text-anchor="end" class="tick-label">500</text>

  <!-- Scale: y = 450 - val * 0.74 (mapping 0-500 to 450-80) -->

  <!-- 2^m (exponential) - red dashed -->
  <!-- m=3: 8, m=4: 16, m=5: 32, m=6: 64, m=7: 128, m=8: 256, m=9: 512→clamp -->
  <polyline points="100,444 175,438 250,426 325,403 400,355 475,260 550,260"
            fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- m=8: 256→450-189=261, m=9: 512→clamp to top -->
  <!-- Actually: 8*.74=5.9→444, 16*.74=11.8→438, 32*.74=23.7→426, 
       64*.74=47.4→403, 128*.74=94.7→355, 256*.74=189→261, 512→clamp -->
  <text x="490" y="248" fill="#e74c3c" class="legend-text" style="font-weight:bold">
    2ᵐ (exceeds chart)
  </text>

  <!-- (m+1)^3 (weak bound) - orange -->
  <!-- m=3: 64, m=4: 125, m=5: 216, m=6: 343, m=7: 512→clamp -->
  <polyline points="100,403 175,357 250,290 325,196 400,71"
            fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="360" y="65" fill="#f39c12" class="legend-text" style="font-weight:bold">
    (m+1)³
  </text>

  <!-- Π(m) = ∑C(m,i) for i≤3 (Sauer-Shelah) - blue solid -->
  <!-- m=3: 1+3+3+1=8, m=4: 1+4+6+4=15, m=5: 1+5+10+10=26, 
       m=6: 1+6+15+20=42, m=7: 1+7+21+35=64, m=8: 1+8+28+56=93,
       m=9: 1+9+36+84=130, m=10: 1+10+45+120=176, m=11: 1+11+55+165=232 -->
  <polyline points="100,444 175,439 250,431 325,419 400,403 475,381 550,354 625,320 700,278"
            fill="none" stroke="#2980b9" stroke-width="3"/>
  <!-- Dots at data points -->
  <circle cx="100" cy="444" r="4" fill="#2980b9"/>
  <circle cx="175" cy="439" r="4" fill="#2980b9"/>
  <circle cx="250" cy="431" r="4" fill="#2980b9"/>
  <circle cx="325" cy="419" r="4" fill="#2980b9"/>
  <circle cx="400" cy="403" r="4" fill="#2980b9"/>
  <circle cx="475" cy="381" r="4" fill="#2980b9"/>
  <circle cx="550" cy="354" r="4" fill="#2980b9"/>
  <circle cx="625" cy="320" r="4" fill="#2980b9"/>
  <circle cx="700" cy="278" r="4" fill="#2980b9"/>

  <text x="710" y="270" fill="#2980b9" class="legend-text" style="font-weight:bold">
    Π(m)
  </text>

  <!-- Legend box -->
  <rect x="130" y="90" width="280" height="130" rx="8" fill="white" stroke="#ddd" opacity="0.95"/>
  <text x="145" y="112" class="legend-text" style="font-weight:bold">Verified bounds (d=3):</text>

  <line x1="145" y1="132" x2="185" y2="132" stroke="#2980b9" stroke-width="3"/>
  <circle cx="165" cy="132" r="3" fill="#2980b9"/>
  <text x="195" y="137" class="legend-text">Π(m) = ∑ᵢ₌₀³ C(m,i) [exact]</text>

  <line x1="145" y1="157" x2="185" y2="157" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="195" y="162" class="legend-text">(m+1)³ [sauer_shelah_weak_bound]</text>

  <line x1="145" y1="182" x2="185" y2="182" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="195" y="187" class="legend-text">2ᵐ [binomialPartialSum_le_pow]</text>

  <text x="145" y="210" class="legend-text" style="font-style:italic">
    Π(m) ≤ (m+1)³ ≤ 2ᵐ for m ≥ 3
  </text>

  <!-- Bottom annotation -->
  <text x="400" y="525" text-anchor="middle" class="subtitle" style="font-style:italic">
    All bounds formally verified in Lean 4 — see CombinatorialBounds.lean
  </text>
</svg>
