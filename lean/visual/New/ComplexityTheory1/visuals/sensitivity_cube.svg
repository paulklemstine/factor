<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #333; }
      .subtitle { font: 14px sans-serif; fill: #666; }
      .node-label { font: bold 12px monospace; fill: #333; }
      .value-label { font: 11px sans-serif; fill: #555; }
      .edge { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .sensitive-edge { stroke: #e74c3c; stroke-width: 3; fill: none; }
      .node { stroke: #333; stroke-width: 2; }
      .node-0 { fill: #3498db; }
      .node-1 { fill: #e74c3c; }
      .legend-text { font: 12px sans-serif; fill: #333; }
      .annotation { font: italic 12px sans-serif; fill: #888; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">
    Boolean Hypercube: Sensitivity of PARITY on 3 Variables
  </text>
  <text x="400" y="55" text-anchor="middle" class="subtitle">
    Red edges = sensitive (flipping that bit changes parity)
  </text>

  <!-- 3D Hypercube Layout -->
  <!-- Back face (z=0) -->
  <!-- 000 (0,0,0) → position (200, 400) -->
  <!-- 100 (1,0,0) → position (350, 400) -->
  <!-- 010 (0,1,0) → position (200, 250) -->
  <!-- 110 (1,1,0) → position (350, 250) -->
  <!-- Front face (z=1) -->
  <!-- 001 (0,0,1) → position (300, 450) -->
  <!-- 101 (1,0,1) → position (450, 450) -->
  <!-- 011 (0,1,1) → position (300, 300) -->
  <!-- 111 (1,1,1) → position (450, 300) -->

  <!-- Edges of the cube -->
  <!-- Back face edges -->
  <line x1="200" y1="400" x2="350" y2="400" class="sensitive-edge"/>
  <line x1="200" y1="400" x2="200" y2="250" class="sensitive-edge"/>
  <line x1="350" y1="400" x2="350" y2="250" class="sensitive-edge"/>
  <line x1="200" y1="250" x2="350" y2="250" class="sensitive-edge"/>

  <!-- Front face edges -->
  <line x1="300" y1="450" x2="450" y2="450" class="sensitive-edge"/>
  <line x1="300" y1="450" x2="300" y2="300" class="sensitive-edge"/>
  <line x1="450" y1="450" x2="450" y2="300" class="sensitive-edge"/>
  <line x1="300" y1="300" x2="450" y2="300" class="sensitive-edge"/>

  <!-- Connecting edges (z-direction) -->
  <line x1="200" y1="400" x2="300" y2="450" class="sensitive-edge"/>
  <line x1="350" y1="400" x2="450" y2="450" class="sensitive-edge"/>
  <line x1="200" y1="250" x2="300" y2="300" class="sensitive-edge"/>
  <line x1="350" y1="250" x2="450" y2="300" class="sensitive-edge"/>

  <!-- Nodes -->
  <!-- Parity: 000→0, 001→1, 010→1, 011→0, 100→1, 101→0, 110→0, 111→1 -->
  <circle cx="200" cy="400" r="18" class="node node-0"/>
  <text x="200" y="405" text-anchor="middle" class="node-label" fill="white">000</text>
  <text x="165" y="425" class="value-label">f=0</text>

  <circle cx="350" cy="400" r="18" class="node node-1"/>
  <text x="350" y="405" text-anchor="middle" class="node-label" fill="white">100</text>
  <text x="365" y="425" class="value-label">f=1</text>

  <circle cx="200" cy="250" r="18" class="node node-1"/>
  <text x="200" y="255" text-anchor="middle" class="node-label" fill="white">010</text>
  <text x="155" y="245" class="value-label">f=1</text>

  <circle cx="350" cy="250" r="18" class="node node-0"/>
  <text x="350" y="255" text-anchor="middle" class="node-label" fill="white">110</text>
  <text x="365" y="245" class="value-label">f=0</text>

  <circle cx="300" cy="450" r="18" class="node node-1"/>
  <text x="300" y="455" text-anchor="middle" class="node-label" fill="white">001</text>
  <text x="265" y="475" class="value-label">f=1</text>

  <circle cx="450" cy="450" r="18" class="node node-0"/>
  <text x="450" y="455" text-anchor="middle" class="node-label" fill="white">101</text>
  <text x="465" y="475" class="value-label">f=0</text>

  <circle cx="300" cy="300" r="18" class="node node-0"/>
  <text x="300" y="305" text-anchor="middle" class="node-label" fill="white">011</text>
  <text x="255" y="295" class="value-label">f=0</text>

  <circle cx="450" cy="300" r="18" class="node node-1"/>
  <text x="450" y="305" text-anchor="middle" class="node-label" fill="white">111</text>
  <text x="465" y="295" class="value-label">f=1</text>

  <!-- Legend -->
  <rect x="550" y="100" width="220" height="200" rx="10" fill="#f8f9fa" stroke="#ddd"/>
  <text x="660" y="125" text-anchor="middle" class="title" style="font-size:16px">Legend</text>

  <circle cx="575" cy="150" r="12" class="node node-0"/>
  <text x="595" y="155" class="legend-text">Parity = 0 (even)</text>

  <circle cx="575" cy="185" r="12" class="node node-1"/>
  <text x="595" y="190" class="legend-text">Parity = 1 (odd)</text>

  <line x1="560" y1="215" x2="600" y2="215" class="sensitive-edge"/>
  <text x="610" y="220" class="legend-text">Sensitive edge</text>

  <text x="570" y="255" class="legend-text" style="font-weight:bold">
    s(PARITY) = 3 = n
  </text>
  <text x="570" y="275" class="legend-text">
    Every edge is sensitive!
  </text>

  <!-- Annotation -->
  <text x="400" y="540" text-anchor="middle" class="annotation">
    Theorem (parity_flipBit): ∀ x i, parity(flipBit x i) ≠ parity(x)
  </text>
  <text x="400" y="560" text-anchor="middle" class="annotation">
    Theorem (sensitivity_parity_allfalse): sensitivityAt parity 0̄ = n
  </text>
  <text x="400" y="580" text-anchor="middle" class="annotation">
    Verified in Lean 4 / Mathlib — no sorry!
  </text>
</svg>
