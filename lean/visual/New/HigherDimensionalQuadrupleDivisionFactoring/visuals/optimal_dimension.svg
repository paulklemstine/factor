<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="450" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="bold">
    Optimal Dimension k* vs. Problem Size N
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#636e72" font-size="12">
    Balancing channel richness (O(k²)) against search space (O(N^{k/2}))
  </text>

  <!-- Chart area -->
  <rect x="80" y="70" width="640" height="300" fill="white" stroke="#dee2e6" rx="4"/>

  <!-- Axes -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#495057" stroke-width="1.5"/>
  <line x1="80" y1="70" x2="80" y2="370" stroke="#495057" stroke-width="1.5"/>

  <!-- X-axis: log₁₀(N) from 1 to 18 -->
  <text x="80" y="390" text-anchor="middle" fill="#495057" font-size="10">10¹</text>
  <text x="155" y="390" text-anchor="middle" fill="#495057" font-size="10">10³</text>
  <text x="230" y="390" text-anchor="middle" fill="#495057" font-size="10">10⁵</text>
  <text x="305" y="390" text-anchor="middle" fill="#495057" font-size="10">10⁷</text>
  <text x="380" y="390" text-anchor="middle" fill="#495057" font-size="10">10⁹</text>
  <text x="455" y="390" text-anchor="middle" fill="#495057" font-size="10">10¹¹</text>
  <text x="530" y="390" text-anchor="middle" fill="#495057" font-size="10">10¹³</text>
  <text x="605" y="390" text-anchor="middle" fill="#495057" font-size="10">10¹⁵</text>
  <text x="680" y="390" text-anchor="middle" fill="#495057" font-size="10">10¹⁷</text>

  <!-- Y-axis: k* from 2 to 10 -->
  <text x="70" y="370" text-anchor="end" fill="#495057" font-size="10">2</text>
  <text x="70" y="332.5" text-anchor="end" fill="#495057" font-size="10">3</text>
  <text x="70" y="295" text-anchor="end" fill="#495057" font-size="10">4</text>
  <text x="70" y="257.5" text-anchor="end" fill="#495057" font-size="10">5</text>
  <text x="70" y="220" text-anchor="end" fill="#495057" font-size="10">6</text>
  <text x="70" y="182.5" text-anchor="end" fill="#495057" font-size="10">7</text>
  <text x="70" y="145" text-anchor="end" fill="#495057" font-size="10">8</text>
  <text x="70" y="107.5" text-anchor="end" fill="#495057" font-size="10">9</text>
  <text x="70" y="75" text-anchor="end" fill="#495057" font-size="10">10</text>

  <!-- Grid -->
  <line x1="80" y1="332.5" x2="720" y2="332.5" stroke="#f1f2f6" stroke-width="0.5"/>
  <line x1="80" y1="295" x2="720" y2="295" stroke="#f1f2f6" stroke-width="0.5"/>
  <line x1="80" y1="257.5" x2="720" y2="257.5" stroke="#f1f2f6" stroke-width="0.5"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#f1f2f6" stroke-width="0.5"/>
  <line x1="80" y1="182.5" x2="720" y2="182.5" stroke="#f1f2f6" stroke-width="0.5"/>
  <line x1="80" y1="145" x2="720" y2="145" stroke="#f1f2f6" stroke-width="0.5"/>

  <!-- Optimal k* curve (estimated) -->
  <!-- k* rises from ~3 at small N, peaks around 7-8 at N~10⁶, then slowly declines -->
  <path d="M 80,332 C 120,295 155,220 230,182 S 380,160 455,182 C 530,200 605,220 720,240"
        fill="none" stroke="#e17055" stroke-width="3" stroke-linecap="round"/>

  <!-- Confidence band -->
  <path d="M 80,295 C 120,257 155,182 230,145 S 380,120 455,145 C 530,165 605,182 720,200
           L 720,280 C 605,260 530,240 455,220 S 380,200 230,220 C 155,257 120,332 80,370 Z"
        fill="#e17055" opacity="0.1"/>

  <!-- Data points -->
  <circle cx="118" cy="332" r="5" fill="#e17055"/>
  <circle cx="155" cy="295" r="5" fill="#e17055"/>
  <circle cx="230" cy="210" r="5" fill="#e17055"/>
  <circle cx="305" cy="182" r="5" fill="#e17055"/>
  <circle cx="380" cy="175" r="5" fill="#e17055"/>
  <circle cx="455" cy="195" r="5" fill="#e17055"/>
  <circle cx="530" cy="215" r="5" fill="#e17055"/>
  <circle cx="605" cy="232" r="5" fill="#e17055"/>
  <circle cx="680" cy="245" r="5" fill="#e17055"/>

  <!-- Sweet spot annotation -->
  <rect x="210" y="80" width="200" height="30" rx="5" fill="#feca57" opacity="0.3" stroke="#f39c12"/>
  <text x="310" y="100" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">
    Sweet Spot: k* ≈ 5-8 for N &lt; 10⁶
  </text>
  <line x1="280" y1="110" x2="260" y2="180" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Axis labels -->
  <text x="400" y="415" text-anchor="middle" fill="#2d3436" font-size="13">log₁₀(N)</text>
  <text x="25" y="220" text-anchor="middle" fill="#2d3436" font-size="13" transform="rotate(-90, 25, 220)">Optimal k*</text>

  <!-- Annotation -->
  <text x="620" y="290" text-anchor="middle" fill="#636e72" font-size="10" font-style="italic">
    k* = O(log log N)
  </text>
  <text x="620" y="305" text-anchor="middle" fill="#636e72" font-size="10" font-style="italic">
    for large N
  </text>
</svg>
