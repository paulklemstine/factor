<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="nodeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff66"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    5-Tuple Bridge Network: Dimension Telescope
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#aaaacc" font-size="13">
    6 projections per 5-tuple · Double bridges to triples
  </text>

  <!-- 5-Tuple (center, large) -->
  <circle cx="400" cy="200" r="60" fill="#6c5ce7" opacity="0.3" stroke="#a29bfe" stroke-width="2"/>
  <circle cx="400" cy="200" r="45" fill="#6c5ce7" opacity="0.5" stroke="#a29bfe" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">5-Tuple</text>
  <text x="400" y="215" text-anchor="middle" fill="#d4d4ff" font-size="11">(a₁,a₂,a₃,a₄,d)</text>
  <text x="400" y="230" text-anchor="middle" fill="#a29bfe" font-size="10">4 channels</text>

  <!-- 6 Quadruple projections (ring around 5-tuple) -->
  <!-- Projection 1: (a₁,a₂) → e₁₂ -->
  <line x1="360" y1="160" x2="200" y2="340" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="340" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="200" y="337" text-anchor="middle" fill="#ffffff" font-size="11">Quad₁₂</text>
  <text x="200" y="352" text-anchor="middle" fill="#48dbfb" font-size="9">(e₁₂,a₃,a₄,d)</text>

  <!-- Projection 2: (a₁,a₃) → e₁₃ -->
  <line x1="355" y1="180" x2="120" y2="420" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="120" cy="420" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="120" y="417" text-anchor="middle" fill="#ffffff" font-size="11">Quad₁₃</text>
  <text x="120" y="432" text-anchor="middle" fill="#48dbfb" font-size="9">(e₁₃,a₂,a₄,d)</text>

  <!-- Projection 3: (a₁,a₄) → e₁₄ -->
  <line x1="370" y1="195" x2="280" y2="450" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="280" cy="450" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="280" y="447" text-anchor="middle" fill="#ffffff" font-size="11">Quad₁₄</text>
  <text x="280" y="462" text-anchor="middle" fill="#48dbfb" font-size="9">(e₁₄,a₂,a₃,d)</text>

  <!-- Projection 4: (a₂,a₃) → e₂₃ -->
  <line x1="430" y1="195" x2="520" y2="450" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="520" cy="450" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="520" y="447" text-anchor="middle" fill="#ffffff" font-size="11">Quad₂₃</text>
  <text x="520" y="462" text-anchor="middle" fill="#48dbfb" font-size="9">(a₁,e₂₃,a₄,d)</text>

  <!-- Projection 5: (a₂,a₄) → e₂₄ -->
  <line x1="445" y1="180" x2="680" y2="420" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="680" cy="420" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="680" y="417" text-anchor="middle" fill="#ffffff" font-size="11">Quad₂₄</text>
  <text x="680" y="432" text-anchor="middle" fill="#48dbfb" font-size="9">(a₁,e₂₄,a₃,d)</text>

  <!-- Projection 6: (a₃,a₄) → e₃₄ -->
  <line x1="440" y1="160" x2="600" y2="340" stroke="#48dbfb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="600" cy="340" r="30" fill="#0984e3" opacity="0.4" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="600" y="337" text-anchor="middle" fill="#ffffff" font-size="11">Quad₃₄</text>
  <text x="600" y="352" text-anchor="middle" fill="#48dbfb" font-size="9">(a₁,a₂,e₃₄,d)</text>

  <!-- Double bridge arrows to triples -->
  <line x1="175" y1="360" x2="100" y2="530" stroke="#ff6b6b" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="100" cy="540" r="18" fill="#d63031" opacity="0.4" stroke="#ff6b6b" stroke-width="1"/>
  <text x="100" y="543" text-anchor="middle" fill="#ffffff" font-size="9">Triple</text>

  <line x1="580" y1="360" x2="700" y2="530" stroke="#ff6b6b" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="700" cy="540" r="18" fill="#d63031" opacity="0.4" stroke="#ff6b6b" stroke-width="1"/>
  <text x="700" y="543" text-anchor="middle" fill="#ffffff" font-size="9">Triple</text>

  <!-- Legend -->
  <rect x="250" y="555" width="300" height="35" rx="6" fill="#ffffff11" stroke="#ffffff33"/>
  <circle cx="280" cy="572" r="6" fill="#6c5ce7" stroke="#a29bfe"/>
  <text x="295" y="576" fill="#d4d4ff" font-size="10">5-Tuple</text>
  <circle cx="355" cy="572" r="6" fill="#0984e3" stroke="#48dbfb"/>
  <text x="370" y="576" fill="#48dbfb" font-size="10">Quadruple</text>
  <circle cx="450" cy="572" r="6" fill="#d63031" stroke="#ff6b6b"/>
  <text x="465" y="576" fill="#ff6b6b" font-size="10">Triple</text>

  <!-- Annotation -->
  <text x="400" y="85" text-anchor="middle" fill="#feca57" font-size="12" font-style="italic">
    C(4,2) = 6 projection bridges per 5-tuple
  </text>
</svg>
