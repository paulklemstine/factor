<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="500" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">
    Complexity Landscape: k-Tuple Factoring vs. Known Algorithms
  </text>

  <!-- Chart area -->
  <rect x="100" y="60" width="620" height="360" fill="#16213e" stroke="#ffffff22" rx="4"/>

  <!-- Axes -->
  <line x1="100" y1="420" x2="720" y2="420" stroke="#ffffff88" stroke-width="1"/>
  <line x1="100" y1="60" x2="100" y2="420" stroke="#ffffff88" stroke-width="1"/>

  <!-- X labels: log N -->
  <text x="100" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10</text>
  <text x="225" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10²</text>
  <text x="350" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10⁵</text>
  <text x="475" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10¹⁰</text>
  <text x="600" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10²⁰</text>
  <text x="720" y="440" text-anchor="middle" fill="#ffffffaa" font-size="10">10⁵⁰</text>

  <!-- Y label -->
  <text x="50" y="240" text-anchor="middle" fill="#ffffffaa" font-size="12" transform="rotate(-90, 50, 240)">
    log(operations)
  </text>
  <text x="400" y="470" text-anchor="middle" fill="#ffffffaa" font-size="12">log₁₀(N)</text>

  <!-- Trial Division: O(N^{1/2}) — steep line -->
  <line x1="100" y1="400" x2="720" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <text x="680" y="90" fill="#ff6b6b" font-size="11">Trial Division O(√N)</text>

  <!-- k=4 tuple: O(N^{3/2}) — steeper -->
  <line x1="100" y1="410" x2="500" y2="70" stroke="#feca57" stroke-width="2" opacity="0.7"/>
  <text x="460" y="65" fill="#feca57" font-size="11">k=4 tuples O(N^{3/2})</text>

  <!-- k=5 tuple: O(N^2) — even steeper -->
  <line x1="100" y1="415" x2="400" y2="70" stroke="#e17055" stroke-width="2" opacity="0.7" stroke-dasharray="5,3"/>
  <text x="360" y="65" fill="#e17055" font-size="11">k=5 tuples O(N²)</text>

  <!-- GNFS: L[1/3, c] — subexponential curve -->
  <path d="M 100,400 C 200,390 350,350 475,280 S 600,180 720,120"
        fill="none" stroke="#00b894" stroke-width="3" opacity="0.9"/>
  <text x="730" y="130" fill="#00b894" font-size="11" font-weight="bold">GNFS L[1/3]</text>

  <!-- Quantum Shor: O(log³ N) — nearly flat -->
  <path d="M 100,395 L 720,370"
        fill="none" stroke="#48dbfb" stroke-width="2" opacity="0.8" stroke-dasharray="8,4"/>
  <text x="730" y="365" fill="#48dbfb" font-size="11">Shor (quantum)</text>

  <!-- Annotation box -->
  <rect x="130" y="80" width="250" height="80" rx="6" fill="#ffffff11" stroke="#ffffff33"/>
  <text x="145" y="100" fill="#ffffff" font-size="12" font-weight="bold">Key Result:</text>
  <text x="145" y="118" fill="#ffffffcc" font-size="11">k-tuple approach does NOT</text>
  <text x="145" y="134" fill="#ffffffcc" font-size="11">change complexity class.</text>
  <text x="145" y="150" fill="#feca57" font-size="11">Value is in diversification,</text>
  <text x="145" y="166" fill="#feca57" font-size="11">not asymptotic speedup.</text>

  <!-- Legend marker -->
  <rect x="130" y="200" width="200" height="25" rx="4" fill="#00b89422" stroke="#00b894"/>
  <text x="230" y="217" text-anchor="middle" fill="#00b894" font-size="11">
    GNFS is asymptotically best (classical)
  </text>
</svg>
