<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="chartbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#chartbg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="bold">
    Factor Channel &amp; Cross-Collision Growth by Dimension k
  </text>

  <!-- Chart area -->
  <rect x="100" y="60" width="620" height="360" fill="white" stroke="#dee2e6" rx="4"/>

  <!-- Y-axis -->
  <line x1="100" y1="60" x2="100" y2="420" stroke="#495057" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="100" y1="420" x2="720" y2="420" stroke="#495057" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="90" y="420" text-anchor="end" fill="#495057" font-size="11">0</text>
  <text x="90" y="348" text-anchor="end" fill="#495057" font-size="11">10</text>
  <text x="90" y="276" text-anchor="end" fill="#495057" font-size="11">20</text>
  <text x="90" y="204" text-anchor="end" fill="#495057" font-size="11">30</text>
  <text x="90" y="132" text-anchor="end" fill="#495057" font-size="11">40</text>
  <text x="90" y="68" text-anchor="end" fill="#495057" font-size="11">50</text>

  <!-- Y gridlines -->
  <line x1="100" y1="348" x2="720" y2="348" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="100" y1="276" x2="720" y2="276" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="100" y1="204" x2="720" y2="204" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="100" y1="132" x2="720" y2="132" stroke="#dee2e6" stroke-width="0.5"/>

  <!-- X-axis labels: k = 3,4,5,6,7,8,9 -->
  <!-- spacing: 620/8 = 77.5, start at 100+77.5 -->
  <text x="178" y="440" text-anchor="middle" fill="#495057" font-size="12">k=3</text>
  <text x="255" y="440" text-anchor="middle" fill="#495057" font-size="12">k=4</text>
  <text x="333" y="440" text-anchor="middle" fill="#495057" font-size="12">k=5</text>
  <text x="410" y="440" text-anchor="middle" fill="#495057" font-size="12">k=6</text>
  <text x="488" y="440" text-anchor="middle" fill="#495057" font-size="12">k=7</text>
  <text x="565" y="440" text-anchor="middle" fill="#495057" font-size="12">k=8</text>
  <text x="643" y="440" text-anchor="middle" fill="#495057" font-size="12">k=9</text>

  <!-- Scale: 1 unit = 7.2 pixels (360/50) -->
  <!-- Factor channels (k-1): 2,3,4,5,6,7,8 → bars -->
  <!-- Cross pairs C(k-1,2): 1,3,6,10,15,21,28 → bars -->
  <!-- Total GCD ops (k-1)²: 4,9,16,25,36,49,64→capped at 49 → line -->

  <!-- Channel bars (blue) -->
  <rect x="158" y="{420-2*7.2}" width="25" height="{2*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="235" y="{420-3*7.2}" width="25" height="{3*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="313" y="{420-4*7.2}" width="25" height="{4*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="390" y="{420-5*7.2}" width="25" height="{5*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="468" y="{420-6*7.2}" width="25" height="{6*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="545" y="{420-7*7.2}" width="25" height="{7*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>
  <rect x="623" y="{420-8*7.2}" width="25" height="{8*7.2}" fill="#0984e3" opacity="0.8" rx="2"/>

  <!-- Computed positions -->
  <!-- k=3: channels=2 → y=420-14.4=405.6, h=14.4 -->
  <rect x="158" y="405.6" width="25" height="14.4" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=4: channels=3 → y=398.4, h=21.6 -->
  <rect x="235" y="398.4" width="25" height="21.6" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=5: channels=4 → y=391.2, h=28.8 -->
  <rect x="313" y="391.2" width="25" height="28.8" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=6: channels=5 → y=384, h=36 -->
  <rect x="390" y="384" width="25" height="36" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=7: channels=6 → y=376.8, h=43.2 -->
  <rect x="468" y="376.8" width="25" height="43.2" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=8: channels=7 → y=369.6, h=50.4 -->
  <rect x="545" y="369.6" width="25" height="50.4" fill="#0984e3" opacity="0.8" rx="2"/>
  <!-- k=9: channels=8 → y=362.4, h=57.6 -->
  <rect x="623" y="362.4" width="25" height="57.6" fill="#0984e3" opacity="0.8" rx="2"/>

  <!-- Cross-collision bars (orange) -->
  <!-- k=3: C(2,2)=1 → y=412.8, h=7.2 -->
  <rect x="185" y="412.8" width="25" height="7.2" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=4: C(3,2)=3 → y=398.4, h=21.6 -->
  <rect x="262" y="398.4" width="25" height="21.6" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=5: C(4,2)=6 → y=376.8, h=43.2 -->
  <rect x="340" y="376.8" width="25" height="43.2" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=6: C(5,2)=10 → y=348, h=72 -->
  <rect x="417" y="348" width="25" height="72" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=7: C(6,2)=15 → y=312, h=108 -->
  <rect x="495" y="312" width="25" height="108" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=8: C(7,2)=21 → y=268.8, h=151.2 -->
  <rect x="572" y="268.8" width="25" height="151.2" fill="#e17055" opacity="0.8" rx="2"/>
  <!-- k=9: C(8,2)=28 → y=218.4, h=201.6 -->
  <rect x="650" y="218.4" width="25" height="201.6" fill="#e17055" opacity="0.8" rx="2"/>

  <!-- Total GCD ops line (green) (k-1)²: 4,9,16,25,36,49,64→cap 50 -->
  <polyline points="178,391.2 255,355.2 333,304.8 410,240 488,160.8 565,67.2"
            fill="none" stroke="#00b894" stroke-width="3" stroke-linecap="round"/>
  <circle cx="178" cy="391.2" r="4" fill="#00b894"/>
  <circle cx="255" cy="355.2" r="4" fill="#00b894"/>
  <circle cx="333" cy="304.8" r="4" fill="#00b894"/>
  <circle cx="410" cy="240" r="4" fill="#00b894"/>
  <circle cx="488" cy="160.8" r="4" fill="#00b894"/>
  <circle cx="565" cy="67.2" r="4" fill="#00b894"/>

  <!-- Labels on line -->
  <text x="178" y="385" text-anchor="middle" fill="#00b894" font-size="10">4</text>
  <text x="255" y="349" text-anchor="middle" fill="#00b894" font-size="10">9</text>
  <text x="333" y="298" text-anchor="middle" fill="#00b894" font-size="10">16</text>
  <text x="410" y="234" text-anchor="middle" fill="#00b894" font-size="10">25</text>
  <text x="488" y="154" text-anchor="middle" fill="#00b894" font-size="10">36</text>
  <text x="565" y="62" text-anchor="middle" fill="#00b894" font-size="10">49</text>

  <!-- Legend -->
  <rect x="120" y="460" width="15" height="15" fill="#0984e3" rx="2"/>
  <text x="140" y="473" fill="#2d3436" font-size="12">Factor Channels (k−1, linear)</text>

  <rect x="340" y="460" width="15" height="15" fill="#e17055" rx="2"/>
  <text x="360" y="473" fill="#2d3436" font-size="12">Cross Pairs (C(k−1,2), quadratic)</text>

  <line x1="560" y1="467" x2="580" y2="467" stroke="#00b894" stroke-width="3"/>
  <circle cx="570" cy="467" r="3" fill="#00b894"/>
  <text x="585" y="473" fill="#2d3436" font-size="12">Total GCD Ops ((k−1)²)</text>

  <!-- Axis labels -->
  <text x="400" y="490" text-anchor="middle" fill="#2d3436" font-size="13">Dimension k</text>
  <text x="30" y="240" text-anchor="middle" fill="#2d3436" font-size="13" transform="rotate(-90, 30, 240)">Count</text>
</svg>
