<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950" />
      <stop offset="25%" style="stop-color:#58a6ff" />
      <stop offset="50%" style="stop-color:#d4a843" />
      <stop offset="75%" style="stop-color:#da6e42" />
      <stop offset="100%" style="stop-color:#f778ba" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#d4a843" font-size="20" font-weight="bold">
    The Idempotent Spectrum: q = 0 → 1 → ∞
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#8888bb" font-size="12">
    One parameter interpolates between Tropical, Classical, and Quantum
  </text>

  <!-- Spectrum bar -->
  <rect x="80" y="80" width="640" height="20" rx="10" fill="url(#spectrum)" opacity="0.8"/>

  <!-- q labels -->
  <text x="80" y="118" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">q → 0</text>
  <text x="80" y="133" text-anchor="middle" fill="#3fb950" font-size="10">TROPICAL</text>

  <text x="400" y="118" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="bold">q = 1</text>
  <text x="400" y="133" text-anchor="middle" fill="#d4a843" font-size="10">CLASSICAL</text>

  <text x="720" y="118" text-anchor="middle" fill="#f778ba" font-size="12" font-weight="bold">q → ∞</text>
  <text x="720" y="133" text-anchor="middle" fill="#f778ba" font-size="10">QUANTUM</text>

  <!-- Tick marks -->
  <line x1="80" y1="100" x2="80" y2="80" stroke="#3fb950" stroke-width="2"/>
  <line x1="240" y1="100" x2="240" y2="80" stroke="#58a6ff" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="80" stroke="#d4a843" stroke-width="2"/>
  <line x1="560" y1="100" x2="560" y2="80" stroke="#da6e42" stroke-width="2"/>
  <line x1="720" y1="100" x2="720" y2="80" stroke="#f778ba" stroke-width="2"/>
  <text x="240" y="118" text-anchor="middle" fill="#58a6ff" font-size="10">q = 2 (𝔽₂)</text>
  <text x="560" y="118" text-anchor="middle" fill="#da6e42" font-size="10">q = p^k</text>

  <!-- Properties at each point -->
  <!-- Tropical -->
  <rect x="20" y="155" width="200" height="120" rx="8" fill="#0a1a0a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="178" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Tropical</text>
  <text x="120" y="198" text-anchor="middle" fill="#88cc88" font-size="10">ρ = 1 (ALL idempotent)</text>
  <text x="120" y="215" text-anchor="middle" fill="#88cc88" font-size="10">a ⊕ a = a (max is idem)</text>
  <text x="120" y="232" text-anchor="middle" fill="#88cc88" font-size="10">No inverses exist</text>
  <text x="120" y="249" text-anchor="middle" fill="#88cc88" font-size="10">Neural networks live here</text>
  <text x="120" y="266" text-anchor="middle" fill="#55aa55" font-size="9">✓ Verified</text>

  <!-- Classical -->
  <rect x="295" y="155" width="210" height="120" rx="8" fill="#1a1a0a" stroke="#d4a843" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="bold">Classical</text>
  <text x="400" y="198" text-anchor="middle" fill="#ccaa66" font-size="10">ρ = 2^ω(n) / n (sparse)</text>
  <text x="400" y="215" text-anchor="middle" fill="#ccaa66" font-size="10">[n,k]₁ = C(n,k) (binomial)</text>
  <text x="400" y="232" text-anchor="middle" fill="#ccaa66" font-size="10">Total idem = 2^n (Boolean)</text>
  <text x="400" y="249" text-anchor="middle" fill="#ccaa66" font-size="10">Only {0,1} are idem in ℤ</text>
  <text x="400" y="266" text-anchor="middle" fill="#aa8833" font-size="9">✓ Verified</text>

  <!-- Quantum -->
  <rect x="570" y="155" width="210" height="120" rx="8" fill="#1a0a1a" stroke="#f778ba" stroke-width="1.5"/>
  <text x="675" y="178" text-anchor="middle" fill="#f778ba" font-size="12" font-weight="bold">Quantum / Finite Field</text>
  <text x="675" y="198" text-anchor="middle" fill="#cc88bb" font-size="10">ρ → 0 as q → ∞</text>
  <text x="675" y="215" text-anchor="middle" fill="#cc88bb" font-size="10">[n,k]_q = Grassmannian</text>
  <text x="675" y="232" text-anchor="middle" fill="#cc88bb" font-size="10">Rich lattice of projections</text>
  <text x="675" y="249" text-anchor="middle" fill="#cc88bb" font-size="10">Quantum measurement</text>
  <text x="675" y="266" text-anchor="middle" fill="#aa5588" font-size="9">✓ Verified (small cases)</text>

  <!-- Gaussian binomial table -->
  <rect x="100" y="300" width="600" height="130" rx="8" fill="#0a0a1e" stroke="#5577aa" stroke-width="1"/>
  <text x="400" y="325" text-anchor="middle" fill="#88aadd" font-size="13" font-weight="bold">
    Gaussian Binomial Triangle [n choose k]_q
  </text>

  <!-- q=2 triangle -->
  <text x="400" y="350" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Consolas, monospace">
    q=2:  n=0: [1]
  </text>
  <text x="400" y="367" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Consolas, monospace">
         n=1: [1, 1]
  </text>
  <text x="400" y="384" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Consolas, monospace">
         n=2: [1, 3, 1]
  </text>
  <text x="400" y="401" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Consolas, monospace">
         n=3: [1, 7, 7, 1]
  </text>
  <text x="400" y="418" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Consolas, monospace">
         n=4: [1, 15, 35, 15, 1]      (cf. Pascal: 1, 4, 6, 4, 1)
  </text>
</svg>
