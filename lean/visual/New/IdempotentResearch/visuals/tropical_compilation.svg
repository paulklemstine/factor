<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Consolas, monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#58a6ff" font-size="20" font-weight="bold">
    Tropical Neural Network Compilation Pipeline
  </text>

  <!-- Classical side -->
  <rect x="30" y="70" width="340" height="380" rx="10" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">CLASSICAL (ℝ, +, ×)</text>

  <!-- Input layer -->
  <rect x="60" y="120" width="120" height="40" rx="5" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="145" text-anchor="middle" fill="#58a6ff" font-size="12">Input x ∈ ℝⁿ</text>

  <!-- Weight multiply -->
  <line x1="120" y1="160" x2="120" y2="190" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="60" y="190" width="120" height="40" rx="5" fill="#1f2937" stroke="#da6e42" stroke-width="1.5"/>
  <text x="120" y="215" text-anchor="middle" fill="#da6e42" font-size="12">W·x + b</text>

  <!-- ReLU -->
  <line x1="120" y1="230" x2="120" y2="260" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="50" y="260" width="140" height="40" rx="5" fill="#1a2332" stroke="#3fb950" stroke-width="2"/>
  <text x="120" y="285" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">ReLU(z) = max(z,0)</text>

  <!-- More layers -->
  <line x1="120" y1="300" x2="120" y2="320" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="120" y="340" text-anchor="middle" fill="#8b949e" font-size="11">... repeat L times ...</text>

  <!-- Output -->
  <line x1="120" y1="355" x2="120" y2="380" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="60" y="380" width="120" height="40" rx="5" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="405" text-anchor="middle" fill="#58a6ff" font-size="12">Output y ∈ ℝᵐ</text>

  <!-- Compilation arrow -->
  <line x1="380" y1="250" x2="430" y2="250" stroke="#f0d080" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="405" y="240" text-anchor="middle" fill="#f0d080" font-size="11" font-weight="bold">COMPILE</text>
  <text x="405" y="268" text-anchor="middle" fill="#f0d080" font-size="9">rfl proof</text>

  <!-- Tropical side -->
  <rect x="430" y="70" width="340" height="380" rx="10" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">TROPICAL (ℝ, max, +)</text>

  <!-- Input layer tropical -->
  <rect x="470" y="120" width="120" height="40" rx="5" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="530" y="145" text-anchor="middle" fill="#58a6ff" font-size="12">Input x ∈ ℝⁿ</text>

  <!-- Tropical matvec -->
  <line x1="530" y1="160" x2="530" y2="190" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="460" y="190" width="140" height="40" rx="5" fill="#1f2937" stroke="#da6e42" stroke-width="1.5"/>
  <text x="530" y="210" text-anchor="middle" fill="#da6e42" font-size="11">W ⊙ x ⊕ b</text>
  <text x="530" y="224" text-anchor="middle" fill="#8b949e" font-size="9">(max-plus matvec)</text>

  <!-- Tropical ReLU -->
  <line x1="530" y1="230" x2="530" y2="260" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="460" y="260" width="140" height="40" rx="5" fill="#1a2332" stroke="#3fb950" stroke-width="2"/>
  <text x="530" y="285" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">z ⊕_T 0 = max(z,0)</text>

  <!-- More layers -->
  <line x1="530" y1="300" x2="530" y2="320" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="530" y="340" text-anchor="middle" fill="#8b949e" font-size="11">... repeat L times ...</text>

  <!-- Output -->
  <line x1="530" y1="355" x2="530" y2="380" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="470" y="380" width="120" height="40" rx="5" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="530" y="405" text-anchor="middle" fill="#58a6ff" font-size="12">Output y ∈ ℝᵐ</text>

  <!-- Key identity box -->
  <rect x="210" y="445" width="380" height="40" rx="8" fill="#1a2332" stroke="#f0d080" stroke-width="2"/>
  <text x="400" y="465" text-anchor="middle" fill="#f0d080" font-size="13">
    ReLU(x) = x ⊕_T 0    —    proof: rfl    ✓ Machine-Verified
  </text>

  <!-- Equivalence badge -->
  <text x="325" y="415" text-anchor="middle" fill="#3fb950" font-size="28" font-weight="bold">=</text>
  <text x="325" y="435" text-anchor="middle" fill="#3fb950" font-size="10">EXACT</text>
</svg>
