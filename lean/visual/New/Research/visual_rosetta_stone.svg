<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#FFD700" font-size="24" font-weight="bold" filter="url(#glow)">
    The Idempotent Rosetta Stone
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#aab" font-size="13">
    e² = e — The equation that connects everything
  </text>

  <!-- Central node: e² = e -->
  <circle cx="450" cy="350" r="65" fill="#1a1a3e" stroke="#FFD700" stroke-width="3" filter="url(#glow)"/>
  <text x="450" y="340" text-anchor="middle" fill="#FFD700" font-size="22" font-weight="bold">e² = e</text>
  <text x="450" y="362" text-anchor="middle" fill="#ddd" font-size="11">Master Equation:</text>
  <text x="450" y="378" text-anchor="middle" fill="#aaa" font-size="10">Im(f) = Fix(f)</text>

  <!-- Connection lines -->
  <!-- Ring Theory -->
  <line x1="450" y1="285" x2="300" y2="140" stroke="#FF6B6B" stroke-width="2" opacity="0.6"/>
  <!-- Linear Algebra -->
  <line x1="450" y1="285" x2="600" y2="140" stroke="#4ECDC4" stroke-width="2" opacity="0.6"/>
  <!-- Topology -->
  <line x1="385" y1="340" x2="130" y2="290" stroke="#45B7D1" stroke-width="2" opacity="0.6"/>
  <!-- Tropical -->
  <line x1="385" y1="360" x2="130" y2="450" stroke="#96CEB4" stroke-width="2" opacity="0.6"/>
  <!-- Neural Networks -->
  <line x1="515" y1="340" x2="770" y2="290" stroke="#FFEAA7" stroke-width="2" opacity="0.6"/>
  <!-- Computation -->
  <line x1="515" y1="360" x2="770" y2="450" stroke="#DDA0DD" stroke-width="2" opacity="0.6"/>
  <!-- Number Theory -->
  <line x1="450" y1="415" x2="300" y2="570" stroke="#F0E68C" stroke-width="2" opacity="0.6"/>
  <!-- Physics -->
  <line x1="450" y1="415" x2="600" y2="570" stroke="#87CEEB" stroke-width="2" opacity="0.6"/>

  <!-- Ring Theory -->
  <rect x="210" y="95" width="180" height="80" rx="12" fill="#2a1a1a" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="120" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold">Ring Theory</text>
  <text x="300" y="140" text-anchor="middle" fill="#ccc" font-size="10">e² = e in ℤ/nℤ</text>
  <text x="300" y="156" text-anchor="middle" fill="#aaa" font-size="10">#Idem = 2^ω(n)</text>
  <text x="300" y="168" text-anchor="middle" fill="#888" font-size="9">Boolean algebra structure</text>

  <!-- Linear Algebra -->
  <rect x="510" y="95" width="180" height="80" rx="12" fill="#1a2a2a" stroke="#4ECDC4" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="120" text-anchor="middle" fill="#4ECDC4" font-size="14" font-weight="bold">Linear Algebra</text>
  <text x="600" y="140" text-anchor="middle" fill="#ccc" font-size="10">P² = P projections</text>
  <text x="600" y="156" text-anchor="middle" fill="#aaa" font-size="10">Peirce decomposition</text>
  <text x="600" y="168" text-anchor="middle" fill="#888" font-size="9">x = exe + ex(1-e) + ...</text>

  <!-- Topology -->
  <rect x="40" y="250" width="180" height="80" rx="12" fill="#1a1a2a" stroke="#45B7D1" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="275" text-anchor="middle" fill="#45B7D1" font-size="14" font-weight="bold">Topology</text>
  <text x="130" y="295" text-anchor="middle" fill="#ccc" font-size="10">r² = r retractions</text>
  <text x="130" y="311" text-anchor="middle" fill="#aaa" font-size="10">Deformation retracts</text>
  <text x="130" y="323" text-anchor="middle" fill="#888" font-size="9">Fixed point theorems</text>

  <!-- Tropical Geometry -->
  <rect x="40" y="410" width="180" height="80" rx="12" fill="#1a2a1a" stroke="#96CEB4" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="435" text-anchor="middle" fill="#96CEB4" font-size="14" font-weight="bold">Tropical Geometry</text>
  <text x="130" y="455" text-anchor="middle" fill="#ccc" font-size="10">max(a,a) = a</text>
  <text x="130" y="471" text-anchor="middle" fill="#aaa" font-size="10">Density = 100%</text>
  <text x="130" y="483" text-anchor="middle" fill="#888" font-size="9">Every element idempotent</text>

  <!-- Neural Networks -->
  <rect x="680" y="250" width="180" height="80" rx="12" fill="#2a2a1a" stroke="#FFEAA7" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="275" text-anchor="middle" fill="#FFEAA7" font-size="14" font-weight="bold">Neural Networks</text>
  <text x="770" y="295" text-anchor="middle" fill="#ccc" font-size="10">ReLU(ReLU(x)) = ReLU(x)</text>
  <text x="770" y="311" text-anchor="middle" fill="#aaa" font-size="10">ReLU = x ⊕_trop 0</text>
  <text x="770" y="323" text-anchor="middle" fill="#888" font-size="9">Tropical compilation</text>

  <!-- Computation -->
  <rect x="680" y="410" width="180" height="80" rx="12" fill="#2a1a2a" stroke="#DDA0DD" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="435" text-anchor="middle" fill="#DDA0DD" font-size="14" font-weight="bold">Computation</text>
  <text x="770" y="455" text-anchor="middle" fill="#ccc" font-size="10">O ∘ O = O oracles</text>
  <text x="770" y="471" text-anchor="middle" fill="#aaa" font-size="10">Fix(O₁∘O₂) = Fix(O₁)∩Fix(O₂)</text>
  <text x="770" y="483" text-anchor="middle" fill="#888" font-size="9">Gazing Pool theory</text>

  <!-- Number Theory -->
  <rect x="210" y="530" width="180" height="80" rx="12" fill="#2a2a1a" stroke="#F0E68C" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="555" text-anchor="middle" fill="#F0E68C" font-size="14" font-weight="bold">Number Theory</text>
  <text x="300" y="575" text-anchor="middle" fill="#ccc" font-size="10">Berggren tree factoring</text>
  <text x="300" y="591" text-anchor="middle" fill="#aaa" font-size="10">Gaussian composition</text>
  <text x="300" y="603" text-anchor="middle" fill="#888" font-size="9">(a²+b²)(c²+d²) = ...</text>

  <!-- Physics -->
  <rect x="510" y="530" width="180" height="80" rx="12" fill="#1a2a2a" stroke="#87CEEB" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="555" text-anchor="middle" fill="#87CEEB" font-size="14" font-weight="bold">Physics</text>
  <text x="600" y="575" text-anchor="middle" fill="#ccc" font-size="10">Arithmetic photons</text>
  <text x="600" y="591" text-anchor="middle" fill="#aaa" font-size="10">a²+b²+c² = d²</text>
  <text x="600" y="603" text-anchor="middle" fill="#888" font-size="9">3+1 dim specialness</text>

  <!-- Footer -->
  <text x="450" y="660" text-anchor="middle" fill="#666" font-size="11">
    682 files · 139,500 lines · Machine-verified in Lean 4 + Mathlib
  </text>
  <text x="450" y="680" text-anchor="middle" fill="#555" font-size="10">
    All connections formally proved — zero unverified axioms
  </text>
</svg>
