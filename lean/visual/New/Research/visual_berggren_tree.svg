<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold">
    The Berggren Tree of Pythagorean Triples
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#8b949e" font-size="11">
    Every primitive triple generated from (3,4,5) via three Lorentz-preserving matrices
  </text>

  <!-- Root node -->
  <rect x="340" y="75" width="120" height="45" rx="10" fill="#2a1a1a" stroke="#FFD700" stroke-width="2.5"/>
  <text x="400" y="95" text-anchor="middle" fill="#FFD700" font-size="14" font-weight="bold">(3, 4, 5)</text>
  <text x="400" y="112" text-anchor="middle" fill="#aaa" font-size="9">9 + 16 = 25</text>

  <!-- Level 1 connections -->
  <line x1="360" y1="120" x2="160" y2="170" stroke="#FF6B6B" stroke-width="2" opacity="0.7"/>
  <line x1="400" y1="120" x2="400" y2="170" stroke="#4ECDC4" stroke-width="2" opacity="0.7"/>
  <line x1="440" y1="120" x2="640" y2="170" stroke="#96CEB4" stroke-width="2" opacity="0.7"/>

  <!-- Matrix labels on edges -->
  <text x="248" y="148" text-anchor="middle" fill="#FF6B6B" font-size="11" font-weight="bold">A</text>
  <text x="408" y="148" text-anchor="middle" fill="#4ECDC4" font-size="11" font-weight="bold">B</text>
  <text x="530" y="148" text-anchor="middle" fill="#96CEB4" font-size="11" font-weight="bold">C</text>

  <!-- Level 1 nodes -->
  <rect x="90" y="170" width="140" height="45" rx="8" fill="#2a1a1a" stroke="#FF6B6B" stroke-width="2"/>
  <text x="160" y="190" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">(5, 12, 13)</text>
  <text x="160" y="207" text-anchor="middle" fill="#aaa" font-size="9">25 + 144 = 169</text>

  <rect x="330" y="170" width="140" height="45" rx="8" fill="#1a2a2a" stroke="#4ECDC4" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#4ECDC4" font-size="13" font-weight="bold">(21, 20, 29)</text>
  <text x="400" y="207" text-anchor="middle" fill="#aaa" font-size="9">441 + 400 = 841</text>

  <rect x="570" y="170" width="140" height="45" rx="8" fill="#1a2a1a" stroke="#96CEB4" stroke-width="2"/>
  <text x="640" y="190" text-anchor="middle" fill="#96CEB4" font-size="13" font-weight="bold">(15, 8, 17)</text>
  <text x="640" y="207" text-anchor="middle" fill="#aaa" font-size="9">225 + 64 = 289</text>

  <!-- Level 2 from A -->
  <line x1="120" y1="215" x2="60" y2="275" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="215" x2="160" y2="275" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="215" x2="260" y2="275" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>

  <rect x="15" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#FF6B6B" stroke-width="1"/>
  <text x="65" y="295" text-anchor="middle" fill="#FF6B6B" font-size="10">(7, 24, 25)</text>
  <text x="65" y="307" text-anchor="middle" fill="#777" font-size="8">49+576=625</text>

  <rect x="115" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#FF6B6B" stroke-width="1"/>
  <text x="165" y="295" text-anchor="middle" fill="#FF6B6B" font-size="10">(55, 48, 73)</text>
  <text x="165" y="307" text-anchor="middle" fill="#777" font-size="8">3025+2304</text>

  <rect x="215" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#FF6B6B" stroke-width="1"/>
  <text x="265" y="295" text-anchor="middle" fill="#FF6B6B" font-size="10">(45, 28, 53)</text>
  <text x="265" y="307" text-anchor="middle" fill="#777" font-size="8">2025+784</text>

  <!-- Level 2 from B -->
  <line x1="370" y1="215" x2="340" y2="275" stroke="#4ECDC4" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="215" x2="410" y2="275" stroke="#4ECDC4" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="215" x2="480" y2="275" stroke="#4ECDC4" stroke-width="1.5" opacity="0.5"/>

  <rect x="296" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#4ECDC4" stroke-width="1"/>
  <text x="346" y="295" text-anchor="middle" fill="#4ECDC4" font-size="10">(9, 40, 41)</text>

  <rect x="366" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#4ECDC4" stroke-width="1"/>
  <text x="416" y="295" text-anchor="middle" fill="#4ECDC4" font-size="10">(119,120,169)</text>

  <rect x="436" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#4ECDC4" stroke-width="1"/>
  <text x="486" y="295" text-anchor="middle" fill="#4ECDC4" font-size="10">(77, 36, 85)</text>

  <!-- Level 2 from C -->
  <line x1="610" y1="215" x2="570" y2="275" stroke="#96CEB4" stroke-width="1.5" opacity="0.5"/>
  <line x1="640" y1="215" x2="640" y2="275" stroke="#96CEB4" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="215" x2="720" y2="275" stroke="#96CEB4" stroke-width="1.5" opacity="0.5"/>

  <rect x="525" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#96CEB4" stroke-width="1"/>
  <text x="575" y="295" text-anchor="middle" fill="#96CEB4" font-size="10">(11, 60, 61)</text>

  <rect x="595" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#96CEB4" stroke-width="1"/>
  <text x="645" y="295" text-anchor="middle" fill="#96CEB4" font-size="10">(39, 80, 89)</text>

  <rect x="672" y="275" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#96CEB4" stroke-width="1"/>
  <text x="722" y="295" text-anchor="middle" fill="#96CEB4" font-size="10">(35, 12, 37)</text>

  <!-- Dots indicating more -->
  <text x="160" y="340" text-anchor="middle" fill="#555" font-size="20">⋮</text>
  <text x="400" y="340" text-anchor="middle" fill="#555" font-size="20">⋮</text>
  <text x="640" y="340" text-anchor="middle" fill="#555" font-size="20">⋮</text>

  <!-- Lorentz form box -->
  <rect x="50" y="370" width="320" height="100" rx="10" fill="#1a1a2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="210" y="395" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Lorentz Form Preservation</text>
  <text x="210" y="415" text-anchor="middle" fill="#ccc" font-size="11">Q(a, b, c) = a² + b² − c²</text>
  <text x="210" y="440" text-anchor="middle" fill="#aaa" font-size="10">All three matrices A, B, C preserve Q = 0</text>
  <text x="210" y="458" text-anchor="middle" fill="#888" font-size="9">⟹ Tree navigation = hyperbolic geometry</text>

  <!-- Factoring connection box -->
  <rect x="430" y="370" width="320" height="100" rx="10" fill="#2a1a1a" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="590" y="395" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">Connection to Factoring</text>
  <text x="590" y="415" text-anchor="middle" fill="#ccc" font-size="11">(a²+b²)(c²+d²) = (ac−bd)²+(ad+bc)²</text>
  <text x="590" y="440" text-anchor="middle" fill="#aaa" font-size="10">Two representations ⟹ nontrivial factor</text>
  <text x="590" y="458" text-anchor="middle" fill="#888" font-size="9">Euler's method + Berggren tree search</text>

  <!-- Key insight -->
  <rect x="150" y="490" width="500" height="55" rx="10" fill="#1a2a1a" stroke="#FFD700" stroke-width="1.5"/>
  <text x="400" y="512" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">
    Key Insight: The ternary tree is a discrete model of the hyperbolic plane
  </text>
  <text x="400" y="530" text-anchor="middle" fill="#aaa" font-size="10">
    Geodesic shortcuts through hyperbolic space may yield faster factoring algorithms
  </text>

  <!-- Footer -->
  <text x="400" y="575" text-anchor="middle" fill="#555" font-size="9">
    All structural properties machine-verified in Lean 4 · Berggren (1934) + new results
  </text>
</svg>
