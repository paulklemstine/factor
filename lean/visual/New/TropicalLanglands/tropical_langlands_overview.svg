<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
    <linearGradient id="autoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
    <linearGradient id="galGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335"/>
      <stop offset="100%" style="stop-color:#c5221f"/>
    </linearGradient>
    <linearGradient id="tropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#1e8e3e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">
    Tropical Langlands Program
  </text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#555">
    A Piecewise-Linear Framework for the Grand Unified Theory of Mathematics
  </text>

  <!-- Classical Langlands (top) -->
  <rect x="50" y="85" width="800" height="100" rx="10" fill="white" filter="url(#shadow)" stroke="#ddd"/>
  <text x="450" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Classical Langlands Program</text>

  <!-- Automorphic side -->
  <rect x="75" y="120" width="230" height="50" rx="8" fill="url(#autoGrad)"/>
  <text x="190" y="140" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Automorphic Forms</text>
  <text x="190" y="158" text-anchor="middle" font-size="10" fill="#dde8ff">π : G(𝔸) → GL(V)</text>

  <!-- L-functions (middle) -->
  <rect x="340" y="120" width="220" height="50" rx="8" fill="#fbbc04" stroke="#f9ab00"/>
  <text x="450" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">L-Functions</text>
  <text x="450" y="158" text-anchor="middle" font-size="10" fill="#555">L(s,π) = ∏ₚ Lₚ(s,π)</text>

  <!-- Galois side -->
  <rect x="595" y="120" width="230" height="50" rx="8" fill="url(#galGrad)"/>
  <text x="710" y="140" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Galois Representations</text>
  <text x="710" y="158" text-anchor="middle" font-size="10" fill="#ffdde0">ρ : Gal(K̄/K) → GLₙ(ℂ)</text>

  <!-- Arrows -->
  <line x1="305" y1="145" x2="340" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="145" x2="595" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Tropicalization arrow -->
  <text x="450" y="210" text-anchor="middle" font-size="14" fill="#1e8e3e" font-weight="bold">⬇ Tropicalization (take valuations) ⬇</text>

  <!-- Tropical Langlands (bottom) -->
  <rect x="50" y="230" width="800" height="110" rx="10" fill="white" filter="url(#shadow)" stroke="#1e8e3e" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8e3e">Tropical Langlands Program</text>

  <!-- Tropical automorphic -->
  <rect x="75" y="270" width="230" height="55" rx="8" fill="#e8f5e9"/>
  <text x="190" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8e3e">Tropical Automorphic</text>
  <text x="190" y="305" text-anchor="middle" font-size="9" fill="#2e7d32">PL functions on buildings</text>
  <text x="190" y="318" text-anchor="middle" font-size="9" fill="#2e7d32">Sorted slopes α₁ ≤ ··· ≤ αₙ</text>

  <!-- Tropical L-functions -->
  <rect x="340" y="270" width="220" height="55" rx="8" fill="#fff3e0"/>
  <text x="450" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Tropical L-Functions</text>
  <text x="450" y="305" text-anchor="middle" font-size="9" fill="#bf360c">L(s) = Σₚ Lₚ(s) (convex PL)</text>
  <text x="450" y="318" text-anchor="middle" font-size="9" fill="#bf360c">Newton polygons</text>

  <!-- Tropical Galois -->
  <rect x="595" y="270" width="230" height="55" rx="8" fill="#fce4ec"/>
  <text x="710" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Tropical Galois</text>
  <text x="710" y="305" text-anchor="middle" font-size="9" fill="#b71c1c">PL actions on ℝⁿ</text>
  <text x="710" y="318" text-anchor="middle" font-size="9" fill="#b71c1c">Sorted breaks β₁ ≤ ··· ≤ βₙ</text>

  <!-- Five extensions (bottom boxes) -->
  <text x="450" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Five Research Directions</text>

  <!-- Box 1: Higher Rank -->
  <rect x="30" y="390" width="160" height="105" rx="8" fill="#e3f2fd" filter="url(#shadow)"/>
  <text x="110" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Higher Rank</text>
  <text x="110" y="428" text-anchor="middle" font-size="8" fill="#1976d2">Root systems</text>
  <text x="110" y="442" text-anchor="middle" font-size="8" fill="#1976d2">Weyl chambers</text>
  <text x="110" y="456" text-anchor="middle" font-size="8" fill="#1976d2">Parabolic induction</text>
  <text x="110" y="470" text-anchor="middle" font-size="8" fill="#1976d2">Cartan decomposition</text>
  <text x="110" y="486" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">5 theorems ✅</text>

  <!-- Box 2: Graph Automorphic -->
  <rect x="205" y="390" width="160" height="105" rx="8" fill="#e8f5e9" filter="url(#shadow)"/>
  <text x="285" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Graph Theory</text>
  <text x="285" y="428" text-anchor="middle" font-size="8" fill="#388e3c">Laplacian spectral theory</text>
  <text x="285" y="442" text-anchor="middle" font-size="8" fill="#388e3c">Baker-Norine RR</text>
  <text x="285" y="456" text-anchor="middle" font-size="8" fill="#388e3c">Ramanujan property</text>
  <text x="285" y="470" text-anchor="middle" font-size="8" fill="#388e3c">Energy functionals</text>
  <text x="285" y="486" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">5 theorems ✅</text>

  <!-- Box 3: p-adic -->
  <rect x="380" y="390" width="160" height="105" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
  <text x="460" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">p-adic Bridge</text>
  <text x="460" y="428" text-anchor="middle" font-size="8" fill="#ef6c00">Newton polygons</text>
  <text x="460" y="442" text-anchor="middle" font-size="8" fill="#ef6c00">Slope metric space</text>
  <text x="460" y="456" text-anchor="middle" font-size="8" fill="#ef6c00">Filtered φ-modules</text>
  <text x="460" y="470" text-anchor="middle" font-size="8" fill="#ef6c00">Weak admissibility</text>
  <text x="460" y="486" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">5 theorems ✅</text>

  <!-- Box 4: Function Fields -->
  <rect x="555" y="390" width="160" height="105" rx="8" fill="#fce4ec" filter="url(#shadow)"/>
  <text x="635" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Function Fields</text>
  <text x="635" y="428" text-anchor="middle" font-size="8" fill="#d32f2f">Tropical Jacobian</text>
  <text x="635" y="442" text-anchor="middle" font-size="8" fill="#d32f2f">Hecke eigensheaves</text>
  <text x="635" y="456" text-anchor="middle" font-size="8" fill="#d32f2f">Geometric Langlands</text>
  <text x="635" y="470" text-anchor="middle" font-size="8" fill="#d32f2f">Hitchin fibration</text>
  <text x="635" y="486" text-anchor="middle" font-size="9" fill="#b71c1c" font-weight="bold">5 theorems ✅</text>

  <!-- Box 5: Machine Learning -->
  <rect x="730" y="390" width="160" height="105" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <text x="810" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#6a1b9a">Machine Learning</text>
  <text x="810" y="428" text-anchor="middle" font-size="8" fill="#7b1fa2">ReLU = tropical</text>
  <text x="810" y="442" text-anchor="middle" font-size="8" fill="#7b1fa2">Network duality</text>
  <text x="810" y="456" text-anchor="middle" font-size="8" fill="#7b1fa2">Loss metrics</text>
  <text x="810" y="470" text-anchor="middle" font-size="8" fill="#7b1fa2">Tropical convexity</text>
  <text x="810" y="486" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">7 theorems ✅</text>

  <!-- Key duality -->
  <rect x="120" y="520" width="660" height="55" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="450" y="543" text-anchor="middle" font-size="13" fill="white" font-weight="bold">
    Core Duality: Legendre-Fenchel Transform = Tropical Fourier
  </text>
  <text x="450" y="563" text-anchor="middle" font-size="11" fill="#aab8d0">
    f*(p) = sup_x(px − f(x))    |    f** = f (Fenchel-Moreau)    |    Connects all five directions
  </text>

  <!-- Footer -->
  <text x="450" y="610" text-anchor="middle" font-size="11" fill="#555">
    41 theorems fully formalized and machine-verified in Lean 4 with Mathlib
  </text>
  <text x="450" y="630" text-anchor="middle" font-size="10" fill="#888">
    All proofs sorry-free • Standard axioms only (propext, Classical.choice, Quot.sound)
  </text>
</svg>
