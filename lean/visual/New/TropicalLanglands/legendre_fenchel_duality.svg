<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#fafafa" rx="10"/>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">
    Legendre-Fenchel Duality = Tropical Fourier Transform
  </text>

  <!-- Left: f(x) = x² -->
  <rect x="30" y="50" width="350" height="280" rx="8" fill="white" stroke="#4285f4" stroke-width="2"/>
  <text x="205" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#4285f4">Primal: f(x) = x²</text>
  <text x="205" y="92" text-anchor="middle" font-size="11" fill="#666">"Automorphic Side"</text>

  <!-- Axes for f -->
  <line x1="80" y1="280" x2="330" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="205" y1="310" x2="205" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="295" font-size="10" fill="#333">x</text>
  <text x="210" y="108" font-size="10" fill="#333">f(x)</text>

  <!-- Parabola f(x) = x² -->
  <path d="M 105,270 Q 155,250 175,210 Q 195,160 205,130 Q 215,160 225,210 Q 245,250 305,270"
        fill="none" stroke="#4285f4" stroke-width="2.5"/>

  <!-- Supporting lines (tangents) -->
  <line x1="120" y1="200" x2="290" y2="300" stroke="#ea4335" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="100" y1="280" x2="310" y2="280" stroke="#34a853" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="120" y1="300" x2="290" y2="200" stroke="#fbbc04" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <text x="205" y="325" text-anchor="middle" font-size="10" fill="#666">Each tangent line gives a dual point</text>

  <!-- Right: f*(p) = p²/4 -->
  <rect x="420" y="50" width="350" height="280" rx="8" fill="white" stroke="#ea4335" stroke-width="2"/>
  <text x="595" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#ea4335">Dual: f*(p) = p²/4</text>
  <text x="595" y="92" text-anchor="middle" font-size="11" fill="#666">"Galois Side"</text>

  <!-- Axes for f* -->
  <line x1="470" y1="280" x2="720" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="595" y1="310" x2="595" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="295" font-size="10" fill="#333">p</text>
  <text x="600" y="108" font-size="10" fill="#333">f*(p)</text>

  <!-- Parabola f*(p) = p²/4 (wider) -->
  <path d="M 495,250 Q 530,230 555,195 Q 575,155 595,130 Q 615,155 635,195 Q 660,230 695,250"
        fill="none" stroke="#ea4335" stroke-width="2.5"/>

  <!-- Dual points corresponding to tangent slopes -->
  <circle cx="595" cy="280" r="4" fill="#34a853"/>
  <circle cx="545" cy="220" r="4" fill="#ea4335"/>
  <circle cx="645" cy="220" r="4" fill="#fbbc04"/>

  <!-- Bidirectional arrow -->
  <text x="400" y="195" text-anchor="middle" font-size="28" fill="#333">⟷</text>
  <text x="400" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">f*(p) = sup_x(px − f(x))</text>

  <!-- Bottom: Fenchel-Moreau -->
  <rect x="100" y="355" width="600" height="120" rx="10" fill="#1a1a2e"/>

  <text x="400" y="385" text-anchor="middle" font-size="15" font-weight="bold" fill="white">
    Fenchel-Moreau Biconjugation Theorem
  </text>
  <text x="400" y="410" text-anchor="middle" font-size="16" fill="#fbbc04" font-style="italic">
    f** = f   (for convex, lower semicontinuous f)
  </text>
  <text x="400" y="435" text-anchor="middle" font-size="12" fill="#aab8d0">
    The tropical Fourier inversion formula:
  </text>
  <text x="400" y="455" text-anchor="middle" font-size="12" fill="#aab8d0">
    applying duality twice recovers the original — just like in classical Langlands.
  </text>
  <text x="400" y="470" text-anchor="middle" font-size="10" fill="#7a8ca8">
    Machine-verified in Lean 4 ✅
  </text>
</svg>
