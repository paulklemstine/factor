<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
<rect width="900" height="500" fill="#1a1a2e"/>

<text x="450" y="30" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif" font-weight="bold">
The Berggren-Lorentz Correspondence</text>
<text x="450" y="52" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">
Three views of the same mathematical structure</text>

<!-- Left: Pythagorean Triples -->
<rect x="30" y="80" width="260" height="350" rx="12" fill="#162040" stroke="#4488FF" stroke-width="1.5"/>
<text x="160" y="110" text-anchor="middle" fill="#4488FF" font-size="15" font-family="sans-serif" font-weight="bold">Number Theory</text>
<text x="160" y="135" text-anchor="middle" fill="#ccc" font-size="11" font-family="sans-serif">Primitive Pythagorean Triples</text>
<text x="160" y="160" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">a² + b² = c²</text>

<text x="55" y="195" fill="#888" font-size="10" font-family="monospace">(3, 4, 5)</text>
<text x="70" y="215" fill="#888" font-size="10" font-family="monospace">├ (5, 12, 13)</text>
<text x="70" y="235" fill="#888" font-size="10" font-family="monospace">├ (21, 20, 29)</text>
<text x="70" y="255" fill="#888" font-size="10" font-family="monospace">└ (15, 8, 17)</text>

<text x="160" y="290" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Ternary tree</text>
<text x="160" y="308" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Every PPT appears once</text>
<text x="160" y="326" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Berggren (1934)</text>

<text x="160" y="365" text-anchor="middle" fill="#FFD700" font-size="11" font-family="sans-serif" font-weight="bold">Key Identity:</text>
<text x="160" y="385" text-anchor="middle" fill="#FFD700" font-size="10" font-family="monospace">(c-b)(c+b) = a²</text>
<text x="160" y="405" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">→ Factoring connection</text>

<!-- Center: Lorentz Group -->
<rect x="320" y="80" width="260" height="350" rx="12" fill="#1a2a1a" stroke="#44CC44" stroke-width="1.5"/>
<text x="450" y="110" text-anchor="middle" fill="#44CC44" font-size="15" font-family="sans-serif" font-weight="bold">Algebra</text>
<text x="450" y="135" text-anchor="middle" fill="#ccc" font-size="11" font-family="sans-serif">Integer Lorentz Group O(2,1;ℤ)</text>
<text x="450" y="160" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">Bᵀ · Q · B = Q</text>

<text x="345" y="195" fill="#888" font-size="10" font-family="monospace">Q = diag(1, 1, -1)</text>
<text x="345" y="215" fill="#888" font-size="10" font-family="monospace">det(B_A) = +1 (SO)</text>
<text x="345" y="235" fill="#888" font-size="10" font-family="monospace">det(B_B) = -1 (O\SO)</text>
<text x="345" y="255" fill="#888" font-size="10" font-family="monospace">det(B_C) = +1 (SO)</text>

<text x="450" y="290" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Quadratic form preserved</text>
<text x="450" y="308" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Q(a,b,c) = a²+b²-c²</text>
<text x="450" y="326" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Minkowski signature (2,1)</text>

<text x="450" y="365" text-anchor="middle" fill="#FFD700" font-size="11" font-family="sans-serif" font-weight="bold">Machine Verified:</text>
<text x="450" y="385" text-anchor="middle" fill="#FFD700" font-size="10" font-family="monospace">native_decide in Lean 4</text>
<text x="450" y="405" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">0 sorry, clean axioms</text>

<!-- Right: Hyperbolic Geometry -->
<rect x="610" y="80" width="260" height="350" rx="12" fill="#2a1a1a" stroke="#FF4444" stroke-width="1.5"/>
<text x="740" y="110" text-anchor="middle" fill="#FF4444" font-size="15" font-family="sans-serif" font-weight="bold">Geometry</text>
<text x="740" y="135" text-anchor="middle" fill="#ccc" font-size="11" font-family="sans-serif">Hyperbolic Plane H²</text>
<text x="740" y="160" text-anchor="middle" fill="#aaa" font-size="11" font-family="monospace">(a/c, b/c) ∈ S¹</text>

<!-- Mini Poincaré disk -->
<circle cx="740" cy="240" r="50" fill="#16213e" stroke="#334" stroke-width="1"/>
<circle cx="720" cy="220" r="3" fill="#FF4444"/>
<circle cx="755" cy="225" r="3" fill="#4488FF"/>
<circle cx="730" cy="255" r="3" fill="#44CC44"/>
<circle cx="740" cy="210" r="4" fill="#FFD700"/>

<text x="740" y="310" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">PPTs on unit circle</text>
<text x="740" y="328" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">= boundary of Poincaré disk</text>
<text x="740" y="346" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Hyperbolic tiling</text>

<text x="740" y="383" text-anchor="middle" fill="#FFD700" font-size="11" font-family="sans-serif" font-weight="bold">Growth Rates:</text>
<text x="740" y="403" text-anchor="middle" fill="#FFD700" font-size="10" font-family="monospace">B: O((3+2√2)^d)</text>
<text x="740" y="418" text-anchor="middle" fill="#FFD700" font-size="10" font-family="monospace">A: O(d²)</text>

<!-- Arrows connecting -->
<line x1="290" y1="255" x2="320" y2="255" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
<line x1="580" y1="255" x2="610" y2="255" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

<text x="305" y="248" text-anchor="middle" fill="#888" font-size="20">↔</text>
<text x="595" y="248" text-anchor="middle" fill="#888" font-size="20">↔</text>

<!-- Bottom summary -->
<text x="450" y="470" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif">
Three perspectives on a single structure: Berggren tree ≅ O(2,1;ℤ) quotient ≅ hyperbolic tiling</text>
<text x="450" y="490" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">
All core results formally verified in Lean 4 with Mathlib</text>
</svg>
