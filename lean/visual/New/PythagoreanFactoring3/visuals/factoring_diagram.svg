<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#1a1a2e"/>
<text x="400.0" y="35" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif" font-weight="bold">
Integer Factoring via Berggren Tree Descent</text>
<rect x="240.0" y="80" width="320" height="45" rx="8" fill="#162040" stroke="#4488FF" stroke-width="1.5"/>
<text x="400.0" y="100" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">N = 21 = 3 × 7</text>
<text x="400.0" y="116" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">Find PPTs with leg 21</text>
<line x1="400.0" y1="125" x2="400.0" y2="145" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240.0" y="145" width="320" height="45" rx="8" fill="#162040" stroke="#4488FF" stroke-width="1.5"/>
<text x="400.0" y="165" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">(21, 20, 29)</text>
<text x="400.0" y="181" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">Triple found: 21² + 20² = 29²</text>
<line x1="400.0" y1="190" x2="400.0" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240.0" y="210" width="320" height="45" rx="8" fill="#162040" stroke="#4488FF" stroke-width="1.5"/>
<text x="400.0" y="230" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">gcd(21, 20) = 1</text>
<text x="400.0" y="246" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">No factor from legs</text>
<line x1="400.0" y1="255" x2="400.0" y2="275" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240.0" y="275" width="320" height="45" rx="8" fill="#162040" stroke="#4488FF" stroke-width="1.5"/>
<text x="400.0" y="295" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">Descend: A⁻¹ applied</text>
<text x="400.0" y="311" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">→ (7, 24, 25)</text>
<line x1="400.0" y1="320" x2="400.0" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240.0" y="340" width="320" height="45" rx="8" fill="#4a4a1a" stroke="#FFD700" stroke-width="1.5"/>
<text x="400.0" y="360" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">gcd(7, 21) = 7 ✓</text>
<text x="400.0" y="376" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">FACTOR FOUND!</text>
<line x1="400.0" y1="385" x2="400.0" y2="405" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240.0" y="405" width="320" height="45" rx="8" fill="#1a4a1a" stroke="#44CC44" stroke-width="1.5"/>
<text x="400.0" y="425" text-anchor="middle" fill="white" font-size="13" font-family="monospace" font-weight="bold">21 = 3 × 7</text>
<text x="400.0" y="441" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">Complete factorization</text>
<text x="700" y="100" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">Complexity:</text>
<text x="700" y="118" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">O(depth × gcd)</text>
<text x="700" y="136" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">= O(√c · log N)</text>
<rect x="30" y="450" width="250" height="130" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
<text x="45" y="470" fill="#FF9944" font-size="11" font-family="monospace" font-weight="bold">Algorithm Overview:</text>
<text x="45" y="488" fill="#ccc" font-size="10" font-family="monospace">1. N² = (c-b)(c+b)</text>
<text x="45" y="504" fill="#ccc" font-size="10" font-family="monospace">2. Enumerate divisors of N²</text>
<text x="45" y="520" fill="#ccc" font-size="10" font-family="monospace">3. Build PPT (N, b, c)</text>
<text x="45" y="536" fill="#ccc" font-size="10" font-family="monospace">4. Descend Berggren tree</text>
<text x="45" y="552" fill="#ccc" font-size="10" font-family="monospace">5. Check gcd(leg, N) at</text>
<text x="45" y="568" fill="#ccc" font-size="10" font-family="monospace">   each step</text>
</svg>