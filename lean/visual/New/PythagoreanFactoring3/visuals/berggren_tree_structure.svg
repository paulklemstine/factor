<text x="50" y="590" fill="#4488FF" font-size="11" font-family="monospace">B_B = [1, 2,2; 2, 1,2; 2, 2,3]</text>
<text x="50" y="610" fill="#44CC44" font-size="11" font-family="monospace">B_C = [-1,2,2;-2,1,2;-2,2,3]</text>
<text x="650" y="570" fill="#aaa" font-size="11" font-family="sans-serif">All matrices preserve Q(a,b,c) = a²+b²-c²</text>
<text x="650" y="590" fill="#aaa" font-size="11" font-family="sans-serif">They are elements of O(2,1;ℤ) — the integer Lorentz group</text>
<text x="650" y="610" fill="#aaa" font-size="11" font-family="sans-serif">Every primitive Pythagorean triple appears exactly once</text>
