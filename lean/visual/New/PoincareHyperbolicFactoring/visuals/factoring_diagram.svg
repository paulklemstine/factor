<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2d8a83"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <linearGradient id="result" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00a86b"/>
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd93d"/>
    </marker>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#fff" font-size="30" font-weight="bold">
    The Shortcut Factoring Algorithm
  </text>
  <text x="600" y="80" text-anchor="middle" fill="#888" font-size="16">
    Factoring integers via Pythagorean triples and Berggren tree descent
  </text>
  
  <!-- Step 1: Input -->
  <rect x="50" y="120" width="250" height="160" rx="15" fill="url(#step1)" filter="url(#boxShadow)"/>
  <text x="175" y="155" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Step 1: Input</text>
  <line x1="80" y1="170" x2="270" y2="170" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="175" y="200" text-anchor="middle" fill="#d4fffa" font-size="16">N = 221</text>
  <text x="175" y="225" text-anchor="middle" fill="#aee" font-size="13">Odd composite to factor</text>
  <text x="175" y="250" text-anchor="middle" fill="#aee" font-size="13">N² = 48841</text>
  
  <!-- Arrow 1→2 -->
  <line x1="300" y1="200" x2="370" y2="200" stroke="#888" stroke-width="2" marker-end="url(#arrowWhite)"/>
  
  <!-- Step 2: Divisor Pairs -->
  <rect x="380" y="120" width="250" height="160" rx="15" fill="url(#step2)" filter="url(#boxShadow)"/>
  <text x="505" y="155" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Step 2: Divisor Pairs</text>
  <line x1="410" y1="170" x2="600" y2="170" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="505" y="195" text-anchor="middle" fill="#ffd4d4" font-size="13">Find d · e = N² = 48841</text>
  <text x="505" y="215" text-anchor="middle" fill="#ffd4d4" font-size="13">with d &lt; e, d ≡ e (mod 2)</text>
  <text x="505" y="240" text-anchor="middle" fill="#fff" font-size="14">d = 13, e = 3757</text>
  <text x="505" y="260" text-anchor="middle" fill="#fff" font-size="14">d = 169, e = 289</text>
  
  <!-- Arrow 2→3 -->
  <line x1="630" y1="200" x2="700" y2="200" stroke="#888" stroke-width="2" marker-end="url(#arrowWhite)"/>
  
  <!-- Step 3: Construct Triple -->
  <rect x="710" y="120" width="250" height="160" rx="15" fill="url(#step3)" filter="url(#boxShadow)"/>
  <text x="835" y="155" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Step 3: Triple</text>
  <line x1="740" y1="170" x2="930" y2="170" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="835" y="195" text-anchor="middle" fill="#e0d4ff" font-size="13">b = (e − d) / 2</text>
  <text x="835" y="215" text-anchor="middle" fill="#e0d4ff" font-size="13">c = (e + d) / 2</text>
  <text x="835" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">
    (221, 60, 229)
  </text>
  <text x="835" y="265" text-anchor="middle" fill="#e0d4ff" font-size="12">221² + 60² = 229² ✓</text>
  
  <!-- Arrow 3→4 -->
  <path d="M 960 200 Q 1050 200 1050 350" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrowWhite)"/>
  
  <!-- Step 4: Factor Extraction -->
  <rect x="710" y="330" width="250" height="160" rx="15" fill="url(#step4)" filter="url(#boxShadow)"/>
  <text x="835" y="365" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Step 4: Extract</text>
  <line x1="740" y1="380" x2="930" y2="380" stroke="#333" stroke-width="1" opacity="0.3"/>
  <text x="835" y="405" text-anchor="middle" fill="#333" font-size="13">(c−b)(c+b) = a²</text>
  <text x="835" y="425" text-anchor="middle" fill="#333" font-size="13">(229−60)(229+60) = 221²</text>
  <text x="835" y="450" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">gcd(d, N) = gcd(169, 221)</text>
  <text x="835" y="475" text-anchor="middle" fill="#333" font-size="15" font-weight="bold">= 13</text>
  
  <!-- Arrow 4→Result -->
  <line x1="710" y1="410" x2="640" y2="410" stroke="#ffd93d" stroke-width="3" marker-end="url(#arrowGold)"/>
  
  <!-- Result -->
  <rect x="380" y="340" width="250" height="140" rx="15" fill="url(#result)" filter="url(#boxShadow)"/>
  <text x="505" y="380" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">✓ FACTORED!</text>
  <line x1="410" y1="395" x2="600" y2="395" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="505" y="425" text-anchor="middle" fill="#d4fff0" font-size="18" font-weight="bold">
    221 = 13 × 17
  </text>
  <text x="505" y="455" text-anchor="middle" fill="#b4ffe0" font-size="13">
    Verified: 13 × 17 = 221 ✓
  </text>
  
  <!-- Mathematical Identity Box -->
  <rect x="50" y="340" width="300" height="140" rx="15" fill="#1a1f2e" stroke="#4ecdc4" stroke-width="2" filter="url(#boxShadow)"/>
  <text x="200" y="375" text-anchor="middle" fill="#4ecdc4" font-size="16" font-weight="bold">The Core Identity</text>
  <line x1="80" y1="390" x2="320" y2="390" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
  <text x="200" y="420" text-anchor="middle" fill="#fff" font-size="18" font-style="italic">
    (c − b)(c + b) = a²
  </text>
  <text x="200" y="448" text-anchor="middle" fill="#aaa" font-size="13">when a² + b² = c²</text>
  <text x="200" y="468" text-anchor="middle" fill="#888" font-size="12">(Formally verified in Lean 4)</text>
  
  <!-- Worked Example Section -->
  <rect x="50" y="530" width="1100" height="340" rx="15" fill="#13171f" stroke="#333" stroke-width="1"/>
  <text x="600" y="565" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">
    Worked Example: Factoring N = 1001
  </text>
  
  <!-- Step by step -->
  <text x="80" y="600" fill="#4ecdc4" font-size="14" font-weight="bold">1.</text>
  <text x="100" y="600" fill="#ddd" font-size="14">N = 1001, N² = 1,002,001</text>
  
  <text x="80" y="630" fill="#ff6b6b" font-size="14" font-weight="bold">2.</text>
  <text x="100" y="630" fill="#ddd" font-size="14">Divisor pairs of N²: (7, 143143), (11, 91091), (13, 77077), (77, 13013), (91, 11011), (143, 7007), ...</text>
  
  <text x="80" y="660" fill="#a29bfe" font-size="14" font-weight="bold">3.</text>
  <text x="100" y="660" fill="#ddd" font-size="14">Take d = 77, e = 13013: b = (13013−77)/2 = 6468, c = (13013+77)/2 = 6545</text>
  
  <text x="80" y="690" fill="#ffd93d" font-size="14" font-weight="bold">4.</text>
  <text x="100" y="690" fill="#ddd" font-size="14">Verify: 1001² + 6468² = 1,002,001 + 41,834,624 = 42,836,625 = 6545² ✓</text>
  
  <text x="80" y="720" fill="#00b894" font-size="14" font-weight="bold">5.</text>
  <text x="100" y="720" fill="#ddd" font-size="14">gcd(77, 1001) = 77 → but 77 = 7 × 11, and 1001/77 = 13</text>
  
  <text x="80" y="755" fill="#fff" font-size="16" font-weight="bold">Result:</text>
  <text x="160" y="755" fill="#00b894" font-size="16" font-weight="bold">1001 = 7 × 11 × 13</text>
  
  <!-- Another example inline -->
  <line x1="80" y1="780" x2="1120" y2="780" stroke="#333" stroke-width="1"/>
  
  <text x="80" y="810" fill="#4ecdc4" font-size="14" font-weight="bold">Quick examples:</text>
  
  <text x="80" y="840" fill="#ddd" font-size="13">
    N=15: d=9, gcd(9,15)=3 → 15 = 3×5 ✓   |   N=77: d=49, gcd(49,77)=7 → 77 = 7×11 ✓   |   N=143: d=121, gcd(121,143)=11 → 143 = 11×13 ✓
  </text>
</svg>
