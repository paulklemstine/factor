<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1000" height="700" fill="url(#bg)"/>
  
  <text x="500" y="45" text-anchor="middle" fill="#fff" font-size="26" font-weight="bold">
    The Lorentz Connection
  </text>
  <text x="500" y="72" text-anchor="middle" fill="#888" font-size="14">
    How Pythagorean triples, hyperbolic geometry, and special relativity connect
  </text>
  
  <!-- Three circles representing the three domains -->
  
  <!-- Number Theory Circle -->
  <circle cx="250" cy="280" r="160" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="280" r="160" fill="#4ecdc4" opacity="0.05"/>
  <text x="150" y="170" fill="#4ecdc4" font-size="18" font-weight="bold">Number Theory</text>
  
  <text x="160" y="220" fill="#aee" font-size="13">a² + b² = c²</text>
  <text x="160" y="245" fill="#aee" font-size="13">Primitive triples</text>
  <text x="160" y="270" fill="#aee" font-size="13">GCD, factoring</text>
  <text x="160" y="295" fill="#aee" font-size="13">Gaussian integers</text>
  <text x="160" y="320" fill="#aee" font-size="13">Berggren tree</text>
  
  <!-- Hyperbolic Geometry Circle -->
  <circle cx="500" cy="380" r="160" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
  <circle cx="500" cy="380" r="160" fill="#ff6b6b" opacity="0.05"/>
  <text x="430" y="480" fill="#ff6b6b" font-size="18" font-weight="bold">Hyperbolic</text>
  <text x="430" y="500" fill="#ff6b6b" font-size="18" font-weight="bold">Geometry</text>
  
  <text x="440" y="370" fill="#fbb" font-size="13">Poincaré disk</text>
  <text x="440" y="395" fill="#fbb" font-size="13">Hyperboloid model</text>
  <text x="440" y="420" fill="#fbb" font-size="13">Geodesics</text>
  <text x="440" y="445" fill="#fbb" font-size="13">Ideal triangulations</text>
  
  <!-- Special Relativity Circle -->
  <circle cx="750" cy="280" r="160" fill="none" stroke="#a29bfe" stroke-width="2" opacity="0.4"/>
  <circle cx="750" cy="280" r="160" fill="#a29bfe" opacity="0.05"/>
  <text x="690" y="170" fill="#a29bfe" font-size="18" font-weight="bold">Relativity</text>
  
  <text x="690" y="220" fill="#d4d0ff" font-size="13">Lorentz group O(2,1)</text>
  <text x="690" y="245" fill="#d4d0ff" font-size="13">Minkowski metric</text>
  <text x="690" y="270" fill="#d4d0ff" font-size="13">Light cone</text>
  <text x="690" y="295" fill="#d4d0ff" font-size="13">Spacetime intervals</text>
  <text x="690" y="320" fill="#d4d0ff" font-size="13">Boost transformations</text>
  
  <!-- Intersection labels -->
  <!-- NT ∩ HG -->
  <text x="330" y="340" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    Berggren
  </text>
  <text x="330" y="356" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    shortcuts
  </text>
  
  <!-- HG ∩ SR -->
  <text x="650" y="365" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    Hyperboloid
  </text>
  <text x="650" y="381" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    model
  </text>
  
  <!-- NT ∩ SR -->
  <text x="500" y="240" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    Integer
  </text>
  <text x="500" y="256" fill="#ffd93d" font-size="12" font-weight="bold" text-anchor="middle">
    Lorentz group
  </text>
  
  <!-- Center: all three -->
  <text x="500" y="310" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    Q = x² + y² − z²
  </text>
  
  <!-- Key equation box -->
  <rect x="100" y="560" width="800" height="110" rx="15" fill="#151540" stroke="#ffd93d" stroke-width="2"/>
  
  <text x="500" y="595" text-anchor="middle" fill="#ffd93d" font-size="18" font-weight="bold">
    The Unifying Equation
  </text>
  
  <text x="500" y="625" text-anchor="middle" fill="#fff" font-size="16">
    Bᵢᵀ · Q · Bᵢ = Q    where    Q = diag(1, 1, −1)
  </text>
  
  <text x="500" y="655" text-anchor="middle" fill="#aaa" font-size="13">
    Berggren matrices are integer Lorentz transformations that preserve the Pythagorean form — formally verified in Lean 4
  </text>
</svg>
