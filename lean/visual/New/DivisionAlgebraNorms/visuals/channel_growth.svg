<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <rect width="700" height="500" fill="#fafbfc" rx="8"/>

  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">
    Factoring Channels by Dimension
  </text>
  <text x="350" y="55" text-anchor="middle" font-size="13" fill="#7f8c8d">
    With m = 3 representations per dimension
  </text>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="120" y1="80" x2="120" y2="420" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="120" y1="420" x2="650" y2="420" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="110" y="420" text-anchor="end" font-size="11" fill="#666">0</text>
  <text x="110" y="352" text-anchor="end" font-size="11" fill="#666">10</text>
  <text x="110" y="284" text-anchor="end" font-size="11" fill="#666">20</text>
  <text x="110" y="216" text-anchor="end" font-size="11" fill="#666">30</text>
  <text x="110" y="148" text-anchor="end" font-size="11" fill="#666">40</text>
  <text x="110" y="92" text-anchor="end" font-size="11" fill="#666">48</text>

  <!-- Grid lines -->
  <line x1="120" y1="352" x2="650" y2="352" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="120" y1="284" x2="650" y2="284" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="120" y1="216" x2="650" y2="216" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="120" y1="148" x2="650" y2="148" stroke="#ecf0f1" stroke-width="1"/>

  <!-- Scale: 0→420, max=48 → 1 unit = (420-80)/48 = 7.08px -->

  <!-- Dim 1: peel=3, cross=0, total=3 -->
  <g transform="translate(170, 0)">
    <!-- Peel (blue) -->
    <rect x="0" y="{420 - 3*7.08}" width="30" height="{3*7.08}" fill="url(#barGrad1)" rx="3"/>
    <rect x="0" y="398.76" width="30" height="21.24" fill="url(#barGrad1)" rx="3"/>
    <!-- Cross (orange) - 0 -->
    <text x="15" y="438" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">k=1</text>
    <text x="15" y="453" text-anchor="middle" font-size="10" fill="#95a5a6">ℝ</text>
    <text x="15" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">3</text>
  </g>

  <!-- Dim 2: peel=6, cross=2*3=6, total=12 -->
  <g transform="translate(290, 0)">
    <!-- Peel (blue) -->
    <rect x="0" y="{420 - 12*7.08}" width="30" height="{6*7.08}" fill="url(#barGrad1)" rx="3" ry="0"/>
    <rect x="0" y="335.04" width="30" height="42.48" fill="url(#barGrad1)"/>
    <!-- Cross (orange) -->
    <rect x="0" y="{335.04 - 42.48}" width="30" height="42.48" fill="url(#barGrad2)"/>
    <rect x="0" y="292.56" width="30" height="42.48" fill="url(#barGrad2)"/>
    <!-- Total label -->
    <text x="15" y="438" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">k=2</text>
    <text x="15" y="453" text-anchor="middle" font-size="10" fill="#3498db">ℂ</text>
    <text x="15" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">12</text>
  </g>

  <!-- Dim 4: peel=12, cross=4*3=12, total=24 -->
  <g transform="translate(410, 0)">
    <!-- Peel (blue) -->
    <rect x="0" y="{420 - 12*7.08}" width="30" height="{12*7.08}" fill="url(#barGrad1)"/>
    <rect x="0" y="250.08" width="30" height="84.96" fill="url(#barGrad1)"/>
    <!-- Cross (orange) -->
    <rect x="0" y="{250.08 - 84.96}" width="30" height="84.96" fill="url(#barGrad2)"/>
    <rect x="0" y="165.12" width="30" height="84.96" fill="url(#barGrad2)"/>
    <text x="15" y="438" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">k=4</text>
    <text x="15" y="453" text-anchor="middle" font-size="10" fill="#e67e22">ℍ</text>
    <text x="15" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">24</text>
  </g>

  <!-- Dim 8: peel=24, cross=8*3=24, total=48 -->
  <g transform="translate(530, 0)">
    <!-- Peel (blue) -->
    <rect x="0" y="{420 - 24*7.08}" width="30" height="{24*7.08}" fill="url(#barGrad1)"/>
    <rect x="0" y="250.08" width="30" height="169.92" fill="url(#barGrad1)"/>
    <!-- Cross (orange) - extends from top of peel -->
    <rect x="0" y="80.16" width="30" height="169.92" fill="url(#barGrad2)"/>
    <text x="15" y="438" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">k=8</text>
    <text x="15" y="453" text-anchor="middle" font-size="10" fill="#8e44ad">𝕆</text>
    <text x="15" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">48</text>
  </g>

  <!-- Y axis title -->
  <text x="30" y="250" text-anchor="middle" font-size="13" fill="#2c3e50" transform="rotate(-90, 30, 250)">
    Total Factoring Channels
  </text>

  <!-- Legend -->
  <rect x="300" y="470" width="15" height="12" fill="url(#barGrad1)" rx="2"/>
  <text x="322" y="481" font-size="11" fill="#333">Peel channels (k·m)</text>
  <rect x="460" y="470" width="15" height="12" fill="url(#barGrad2)" rx="2"/>
  <text x="482" y="481" font-size="11" fill="#333">Cross-collisions (k·C(m,2))</text>
</svg>
