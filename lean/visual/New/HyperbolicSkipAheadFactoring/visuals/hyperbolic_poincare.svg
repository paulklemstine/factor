<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="diskBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="85%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#000020"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#ffb74d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffb74d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="diskClip">
      <circle cx="400" cy="400" r="340"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#050515"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold">
    Poincaré Disk Model — Pythagorean Triple Hyperbolic Geometry
  </text>
  <text x="400" y="58" text-anchor="middle" fill="#78909c" font-size="12">
    Berggren tree nodes mapped to the hyperbolic plane · Skip-ahead = geodesic jumps
  </text>
  
  <!-- Poincaré disk boundary -->
  <circle cx="400" cy="400" r="340" fill="url(#diskBg)" stroke="#5c6bc0" stroke-width="2"/>
  <circle cx="400" cy="400" r="340" fill="url(#centerGlow)"/>
  
  <!-- Hyperbolic geodesics (circular arcs) - background grid -->
  <g clip-path="url(#diskClip)" stroke="#1a237e" stroke-width="0.5" fill="none" opacity="0.4">
    <!-- Concentric horocycles -->
    <circle cx="400" cy="400" r="60"/>
    <circle cx="400" cy="400" r="120"/>
    <circle cx="400" cy="400" r="190"/>
    <circle cx="400" cy="400" r="260"/>
    <circle cx="400" cy="400" r="320"/>
    <!-- Radial geodesics -->
    <line x1="400" y1="60" x2="400" y2="740"/>
    <line x1="60" y1="400" x2="740" y2="400"/>
    <line x1="160" y1="160" x2="640" y2="640"/>
    <line x1="640" y1="160" x2="160" y2="640"/>
  </g>
  
  <!-- Tree structure in hyperbolic space -->
  <g clip-path="url(#diskClip)">
    
    <!-- Level 0 → Level 1 edges -->
    <g stroke="#4fc3f7" stroke-width="2" opacity="0.6">
      <line x1="400" y1="400" x2="300" y2="300"/>
      <line x1="400" y1="400" x2="400" y2="280"/>
      <line x1="400" y1="400" x2="500" y2="300"/>
    </g>
    
    <!-- Level 1 → Level 2 edges -->
    <g stroke="#42a5f5" stroke-width="1.5" opacity="0.5">
      <line x1="300" y1="300" x2="220" y2="230"/>
      <line x1="300" y1="300" x2="270" y2="210"/>
      <line x1="300" y1="300" x2="340" y2="220"/>
      
      <line x1="400" y1="280" x2="360" y2="190"/>
      <line x1="400" y1="280" x2="400" y2="170"/>
      <line x1="400" y1="280" x2="440" y2="190"/>
      
      <line x1="500" y1="300" x2="460" y2="220"/>
      <line x1="500" y1="300" x2="530" y2="210"/>
      <line x1="500" y1="300" x2="580" y2="230"/>
    </g>
    
    <!-- Level 2 → Level 3 edges (getting dense near boundary) -->
    <g stroke="#2196f3" stroke-width="1" opacity="0.35">
      <line x1="220" y1="230" x2="170" y2="180"/>
      <line x1="220" y1="230" x2="195" y2="165"/>
      <line x1="220" y1="230" x2="240" y2="175"/>
      
      <line x1="400" y1="170" x2="375" y2="110"/>
      <line x1="400" y1="170" x2="400" y2="100"/>
      <line x1="400" y1="170" x2="425" y2="110"/>
      
      <line x1="580" y1="230" x2="560" y2="175"/>
      <line x1="580" y1="230" x2="605" y2="165"/>
      <line x1="580" y1="230" x2="630" y2="180"/>
    </g>
    
    <!-- Deeper edges near boundary (visual density) -->
    <g stroke="#1565c0" stroke-width="0.5" opacity="0.2">
      <line x1="170" y1="180" x2="140" y2="145"/>
      <line x1="170" y1="180" x2="155" y2="135"/>
      <line x1="170" y1="180" x2="185" y2="140"/>
      <line x1="400" y1="100" x2="390" y2="75"/>
      <line x1="400" y1="100" x2="400" y2="72"/>
      <line x1="400" y1="100" x2="410" y2="75"/>
      <line x1="630" y1="180" x2="615" y2="140"/>
      <line x1="630" y1="180" x2="645" y2="135"/>
      <line x1="630" y1="180" x2="660" y2="145"/>
    </g>
    
    <!-- SKIP-AHEAD GEODESIC (dramatic red arc) -->
    <path d="M 400 395 C 300 250 250 150 170 100" 
          stroke="#ff1744" stroke-width="3.5" fill="none" 
          stroke-dasharray="10,5" filter="url(#glow3)"/>
    <circle cx="170" cy="100" r="8" fill="#ff1744" filter="url(#glow3)"/>
    <text x="200" y="95" fill="#ff8a80" font-size="13" font-weight="bold">
      Skip-Ahead Target
    </text>
    <text x="200" y="112" fill="#ef9a9a" font-size="10">
      depth k in O(log k)
    </text>
    
    <!-- Another skip path -->
    <path d="M 405 395 C 500 300 600 200 650 120" 
          stroke="#e91e63" stroke-width="2.5" fill="none" 
          stroke-dasharray="8,4" filter="url(#glow3)"/>
    <circle cx="650" cy="120" r="6" fill="#e91e63" filter="url(#glow3)"/>
    
    <!-- Root node -->
    <circle cx="400" cy="400" r="12" fill="#ffb74d" stroke="#ff8f00" stroke-width="2" filter="url(#glow3)"/>
    <text x="420" y="415" fill="#ffcc80" font-size="12" font-weight="bold">(3,4,5)</text>
    
    <!-- Level 1 nodes -->
    <circle cx="300" cy="300" r="8" fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5"/>
    <text x="248" y="305" fill="#b3e5fc" font-size="10">(5,12,13)</text>
    
    <circle cx="400" cy="280" r="8" fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5"/>
    <text x="415" y="275" fill="#b3e5fc" font-size="10">(21,20,29)</text>
    
    <circle cx="500" cy="300" r="8" fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5"/>
    <text x="510" y="295" fill="#b3e5fc" font-size="10">(15,8,17)</text>
    
    <!-- Level 2 nodes (smaller) -->
    <g fill="#2196f3" opacity="0.8">
      <circle cx="220" cy="230" r="5"/>
      <circle cx="270" cy="210" r="5"/>
      <circle cx="340" cy="220" r="5"/>
      <circle cx="360" cy="190" r="5"/>
      <circle cx="400" cy="170" r="5"/>
      <circle cx="440" cy="190" r="5"/>
      <circle cx="460" cy="220" r="5"/>
      <circle cx="530" cy="210" r="5"/>
      <circle cx="580" cy="230" r="5"/>
    </g>
    
    <!-- Level 3 nodes (tiny, near boundary) -->
    <g fill="#1976d2" opacity="0.5">
      <circle cx="170" cy="180" r="3.5"/>
      <circle cx="195" cy="165" r="3.5"/>
      <circle cx="240" cy="175" r="3.5"/>
      <circle cx="375" cy="110" r="3.5"/>
      <circle cx="400" cy="100" r="3.5"/>
      <circle cx="425" cy="110" r="3.5"/>
      <circle cx="560" cy="175" r="3.5"/>
      <circle cx="605" cy="165" r="3.5"/>
      <circle cx="630" cy="180" r="3.5"/>
    </g>
    
    <!-- Level 4 dots (very tiny) -->
    <g fill="#0d47a1" opacity="0.3">
      <circle cx="140" cy="145" r="2"/>
      <circle cx="155" cy="135" r="2"/>
      <circle cx="185" cy="140" r="2"/>
      <circle cx="390" cy="75" r="2"/>
      <circle cx="400" cy="72" r="2"/>
      <circle cx="410" cy="75" r="2"/>
      <circle cx="615" cy="140" r="2"/>
      <circle cx="645" cy="135" r="2"/>
      <circle cx="660" cy="145" r="2"/>
    </g>
  </g>
  
  <!-- Legend -->
  <g>
    <rect x="30" y="640" width="740" height="140" rx="10" fill="#0d1b2a" fill-opacity="0.8" stroke="#37474f"/>
    
    <text x="400" y="668" text-anchor="middle" fill="#b0bec5" font-size="14" font-weight="bold">
      Hyperbolic Interpretation
    </text>
    
    <circle cx="70" cy="695" r="6" fill="#ffb74d"/>
    <text x="85" y="699" fill="#b0bec5" font-size="12">Root (3,4,5) at center</text>
    
    <circle cx="70" cy="720" r="5" fill="#4fc3f7"/>
    <text x="85" y="724" fill="#b0bec5" font-size="12">Tree nodes (each = primitive Pythagorean triple)</text>
    
    <line x1="55" y1="745" x2="85" y2="745" stroke="#ff1744" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="95" y="749" fill="#b0bec5" font-size="12">Skip-ahead geodesic: Bᵢᵏ jumps k levels in O(log k)</text>
    
    <text x="420" y="695" fill="#78909c" font-size="11">• Nodes crowd near boundary = exponential growth</text>
    <text x="420" y="715" fill="#78909c" font-size="11">• Distance in disk ∝ depth in tree</text>
    <text x="420" y="735" fill="#78909c" font-size="11">• Each node (a,b,c): check gcd(a, N) for factors</text>
    <text x="420" y="755" fill="#78909c" font-size="11">• Berggren matrices ∈ O(2,1;ℤ) = hyperbolic isometries</text>
  </g>
</svg>
