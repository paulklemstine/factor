<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <rect width="800" height="450" fill="white"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Higher-Dimensional Extension: O(3,1;ℤ)</text>
  <text x="400" y="58" text-anchor="middle" font-size="14" fill="#666">Pythagorean Quadruples and the Full Lorentz Group</text>
  <rect x="50" y="90" width="300" height="200" rx="10" fill="#fff0f0" stroke="#e41a1c" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#e41a1c">2+1 Dimensions</text>
  <text x="200" y="145" text-anchor="middle" font-size="13" fill="#333">a² + b² = c²</text>
  <text x="200" y="170" text-anchor="middle" font-size="13" fill="#333">Q = diag(1, 1, −1)</text>
  <text x="200" y="195" text-anchor="middle" font-size="13" fill="#333">Group: O(2,1;ℤ)</text>
  <text x="200" y="220" text-anchor="middle" font-size="13" fill="#333">3 generators (B₁, B₂, B₃)</text>
  <text x="200" y="245" text-anchor="middle" font-size="13" fill="#333">1 factoring identity per triple</text>
  <text x="200" y="270" text-anchor="middle" font-size="13" fill="#333">3^k nodes at depth k</text>
  <line x1="370" y1="190" x2="430" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/></marker></defs>
  <text x="400" y="180" text-anchor="middle" font-size="12" fill="#333">extend</text>
  <rect x="450" y="90" width="300" height="200" rx="10" fill="#f0f0ff" stroke="#377eb8" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#377eb8">3+1 Dimensions</text>
  <text x="600" y="145" text-anchor="middle" font-size="13" fill="#333">a² + b² + c² = d²</text>
  <text x="600" y="170" text-anchor="middle" font-size="13" fill="#333">η₄ = diag(1, 1, 1, −1)</text>
  <text x="600" y="195" text-anchor="middle" font-size="13" fill="#333">Group: O(3,1;ℤ)</text>
  <text x="600" y="220" text-anchor="middle" font-size="13" fill="#333">4+ generators (G₄, G₄′, R₁₂, R₂₃)</text>
  <text x="600" y="245" text-anchor="middle" font-size="13" fill="#e41a1c" font-weight="bold">3 factoring identities per quadruple</text>
  <text x="600" y="270" text-anchor="middle" font-size="13" fill="#333">4^k+ nodes at depth k</text>
  <text x="400" y="330" text-anchor="middle" font-size="14" fill="#333">Verified: G₄ᵀ · η₄ · G₄ = η₄  (4×4 Lorentz preservation)</text>
  <text x="400" y="355" text-anchor="middle" font-size="14" fill="#333">Verified: (d−c)(d+c) = a²+b²,  (d−b)(d+b) = a²+c²,  (d−a)(d+a) = b²+c²</text>
  <text x="400" y="395" text-anchor="middle" font-size="13" fill="#666">Root quadruple: (1, 2, 2, 3): 1² + 2² + 2² = 9 = 3²</text>
  <text x="400" y="440" text-anchor="middle" font-size="11" fill="#aaa">All properties machine-verified in Lean 4</text>
</svg>