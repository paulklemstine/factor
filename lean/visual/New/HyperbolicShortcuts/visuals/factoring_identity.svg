<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400">
  <rect width="700" height="400" fill="white"/>
  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">The Factoring Identity</text>
  <text x="350" y="85" text-anchor="middle" font-size="24" fill="#e41a1c" font-style="italic">If a² + b² = c², then (c − b)(c + b) = a²</text>
  <text x="350" y="130" text-anchor="middle" font-size="16" fill="#666">Example: Factor 667</text>
  <polygon points="150,300 350,300 150,150" fill="none" stroke="#377eb8" stroke-width="2"/>
  <text x="250" y="325" text-anchor="middle" font-size="14" fill="#333">a = 667</text>
  <text x="125" y="235" text-anchor="middle" font-size="14" fill="#333">b = 156</text>
  <text x="270" y="215" text-anchor="middle" font-size="14" fill="#333">c = 685</text>
  <rect x="150" y="285" width="15" height="15" fill="none" stroke="#333" stroke-width="1"/>
  <text x="420" y="175" font-size="14" fill="#333">667² + 156² = 685²</text>
  <text x="420" y="205" font-size="14" fill="#333">(685 − 156)(685 + 156) = 667²</text>
  <text x="420" y="235" font-size="14" fill="#e41a1c" font-weight="bold">529 × 841 = 667²</text>
  <text x="420" y="265" font-size="14" fill="#333">23² × 29² = (23 × 29)²</text>
  <text x="420" y="305" font-size="18" fill="#4daf4a" font-weight="bold">667 = 23 × 29 ✓</text>
  <text x="420" y="345" font-size="12" fill="#888">Berggren tree descent reveals factors</text>
  <text x="350" y="390" text-anchor="middle" font-size="11" fill="#aaa">Machine-verified: factoring_identity theorem in Lean 4</text>
</svg>