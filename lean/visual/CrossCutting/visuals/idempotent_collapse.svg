<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3cfe2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg_grad)" rx="10"/>

  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="24" font-weight="bold" fill="#2d3436">
    The Idempotent Collapse Principle
  </text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="16" fill="#636e72" font-style="italic">
    f(f(x)) = f(x) — Convergence in One Step
  </text>

  <!-- Domain boxes -->
  <!-- Linear Algebra -->
  <rect x="30" y="100" width="160" height="100" rx="10" fill="#667eea" opacity="0.9" filter="url(#glow)"/>
  <text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Linear Algebra</text>
  <text x="110" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">P² = P</text>
  <text x="110" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">V = range ⊕ ker</text>
  <text x="110" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">13 theorems ✓</text>

  <!-- Topology -->
  <rect x="220" y="100" width="160" height="100" rx="10" fill="#a29bfe" opacity="0.9" filter="url(#glow)"/>
  <text x="300" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Topology</text>
  <text x="300" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">r ∘ i = id</text>
  <text x="300" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">⟹ i ∘ r idempotent</text>
  <text x="300" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">retractions</text>

  <!-- Neural Networks -->
  <rect x="410" y="100" width="160" height="100" rx="10" fill="#fd79a8" opacity="0.9" filter="url(#glow)"/>
  <text x="490" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Neural Nets</text>
  <text x="490" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">ReLU(ReLU(x)) = ReLU(x)</text>
  <text x="490" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">max(x, 0)</text>
  <text x="490" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">1-step convergence</text>

  <!-- Quantum -->
  <rect x="600" y="100" width="160" height="100" rx="10" fill="#00b894" opacity="0.9" filter="url(#glow)"/>
  <text x="680" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Quantum</text>
  <text x="680" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">|ψ⟩ → P|ψ⟩</text>
  <text x="680" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">measurement</text>
  <text x="680" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">wavefunction collapse</text>

  <!-- Central equation -->
  <rect x="250" y="240" width="300" height="60" rx="15" fill="#2d3436" filter="url(#glow)"/>
  <text x="400" y="278" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffeaa7" font-weight="bold">
    f ∘ f = f
  </text>

  <!-- Arrows from center to domains -->
  <line x1="300" y1="240" x2="130" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="240" x2="300" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="240" x2="490" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="240" x2="660" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Key theorems -->
  <rect x="50" y="340" width="320" height="140" rx="8" fill="white" stroke="#667eea" stroke-width="1.5"/>
  <text x="210" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#667eea">Key Theorems</text>
  <text x="60" y="388" font-family="monospace" font-size="10" fill="#2d3436">• range(f) = {x | f(x) = x}</text>
  <text x="60" y="406" font-family="monospace" font-size="10" fill="#2d3436">• f^[n+1] = f  (n ≥ 0)</text>
  <text x="60" y="424" font-family="monospace" font-size="10" fill="#2d3436">• (id-f)² = id-f  (complement)</text>
  <text x="60" y="442" font-family="monospace" font-size="10" fill="#2d3436">• ker(f) = range(id-f)</text>
  <text x="60" y="460" font-family="monospace" font-size="10" fill="#2d3436">• f,g commute ⟹ fg idempotent</text>

  <!-- Convergence diagram -->
  <rect x="430" y="340" width="320" height="140" rx="8" fill="white" stroke="#fd79a8" stroke-width="1.5"/>
  <text x="590" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fd79a8">Convergence</text>

  <!-- Convergence illustration -->
  <circle cx="470" cy="410" r="8" fill="#e17055"/>
  <text x="470" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">x</text>
  <line x1="478" y1="410" x2="520" y2="410" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <circle cx="530" cy="410" r="8" fill="#00b894"/>
  <text x="530" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">f(x)</text>
  <line x1="538" y1="410" x2="580" y2="410" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <circle cx="590" cy="410" r="8" fill="#00b894"/>
  <text x="590" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">f(x)</text>
  <line x1="598" y1="410" x2="640" y2="410" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="660" y="414" font-family="Arial, sans-serif" font-size="10" fill="#636e72">= f(x) ...</text>

  <text x="590" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">
    Idempotent: converges in 1 step
  </text>
  <text x="590" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">
    General: may need ∞ steps
  </text>
</svg>
