<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa" rx="10"/>

  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="22" font-weight="bold" fill="#2d3436">
    The Berggren Tree: O(2,1;ℤ) Structure
  </text>

  <!-- Tree -->
  <!-- Root -->
  <circle cx="400" cy="100" r="30" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">(3,4,5)</text>
  <text x="400" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.8)">c=5</text>

  <!-- Level 1 -->
  <line x1="380" y1="128" x2="200" y2="180" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="400" y2="180" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="420" y1="128" x2="600" y2="180" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- M1 child -->
  <circle cx="200" cy="200" r="28" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="200" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="white">(5,12,13)</text>
  <text x="200" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.8)">M₁</text>

  <!-- M2 child -->
  <circle cx="400" cy="200" r="28" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="white">(21,20,29)</text>
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.8)">M₂</text>

  <!-- M3 child -->
  <circle cx="600" cy="200" r="28" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="600" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="white">(15,8,17)</text>
  <text x="600" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.8)">M₃</text>

  <!-- Level 2 (M1 children) -->
  <line x1="185" y1="226" x2="100" y2="270" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="200" y1="228" x2="200" y2="270" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="215" y1="226" x2="300" y2="270" stroke="#7f8c8d" stroke-width="1"/>

  <circle cx="100" cy="290" r="22" fill="#3498db" stroke="#2980b9" stroke-width="1.5" opacity="0.8"/>
  <text x="100" y="286" text-anchor="middle" font-family="monospace" font-size="8" fill="white">(7,24,25)</text>
  <text x="100" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.7)">LL</text>

  <circle cx="200" cy="290" r="22" fill="#3498db" stroke="#2980b9" stroke-width="1.5" opacity="0.8"/>
  <text x="200" y="286" text-anchor="middle" font-family="monospace" font-size="8" fill="white">(55,48,73)</text>
  <text x="200" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.7)">LM</text>

  <circle cx="300" cy="290" r="22" fill="#3498db" stroke="#2980b9" stroke-width="1.5" opacity="0.8"/>
  <text x="300" y="286" text-anchor="middle" font-family="monospace" font-size="8" fill="white">(45,28,53)</text>
  <text x="300" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.7)">LR</text>

  <!-- Dots for deeper levels -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#aaa">⋮</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#aaa">⋮</text>
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#aaa">⋮</text>

  <!-- Matrix info boxes -->
  <rect x="30" y="365" width="230" height="120" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="145" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">Matrix M₁ ∈ SO(2,1;ℤ)</text>
  <text x="40" y="410" font-family="monospace" font-size="10" fill="#2d3436">det(M₁) = +1</text>
  <text x="40" y="428" font-family="monospace" font-size="10" fill="#2d3436">tr(M₁) = 3</text>
  <text x="40" y="446" font-family="monospace" font-size="10" fill="#2d3436">M₁ᵀ · Σ · M₁ = Σ  ✓</text>
  <text x="40" y="464" font-family="monospace" font-size="10" fill="#2d3436">Σ = diag(1, 1, -1)</text>

  <rect x="285" y="365" width="230" height="120" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">Matrix M₂ ∈ O(2,1;ℤ)\SO</text>
  <text x="295" y="410" font-family="monospace" font-size="10" fill="#2d3436">det(M₂) = -1</text>
  <text x="295" y="428" font-family="monospace" font-size="10" fill="#2d3436">tr(M₂) = 5</text>
  <text x="295" y="446" font-family="monospace" font-size="10" fill="#2d3436">M₂ᵀ · Σ · M₂ = Σ  ✓</text>
  <text x="295" y="464" font-family="monospace" font-size="10" fill="#2d3436">improper isometry</text>

  <rect x="540" y="365" width="230" height="120" rx="8" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="655" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">Matrix M₃ ∈ SO(2,1;ℤ)</text>
  <text x="550" y="410" font-family="monospace" font-size="10" fill="#2d3436">det(M₃) = +1</text>
  <text x="550" y="428" font-family="monospace" font-size="10" fill="#2d3436">tr(M₃) = 3</text>
  <text x="550" y="446" font-family="monospace" font-size="10" fill="#2d3436">M₃ᵀ · Σ · M₃ = Σ  ✓</text>
  <text x="550" y="464" font-family="monospace" font-size="10" fill="#2d3436">tr(M₁) = tr(M₃) but M₁ ≠ M₃</text>
</svg>
