<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sphere" cx="45%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#2a4a7f;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0.3" />
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="22" font-weight="bold">
    Pythagorean k-Tuples on the (k−1)-Sphere
  </text>
  <text x="400" y="62" text-anchor="middle" fill="#8899aa" font-family="Georgia, serif" font-size="13">
    Integer points satisfying Σvᵢ² = d² → Factor extraction via GCD cascades
  </text>

  <!-- Sphere (2D projection) -->
  <circle cx="300" cy="300" r="180" fill="url(#sphere)" stroke="#3366aa" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="300" cy="300" rx="180" ry="60" fill="none" stroke="#3366aa" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <ellipse cx="300" cy="300" rx="60" ry="180" fill="none" stroke="#3366aa" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Integer points on the sphere (Pythagorean tuples) -->
  <!-- Triple: 3² + 4² = 5², normalized to sphere -->
  <circle cx="192" cy="204" r="6" fill="#4CAF50" filter="url(#glow2)"/>
  <text x="175" y="195" fill="#4CAF50" font-family="monospace" font-size="10">(3,4,5)</text>

  <!-- 5,12,13 -->
  <circle cx="338" cy="133" r="6" fill="#4CAF50" filter="url(#glow2)"/>
  <text x="348" y="128" fill="#4CAF50" font-family="monospace" font-size="10">(5,12,13)</text>

  <!-- 8,15,17 -->
  <circle cx="410" cy="240" r="6" fill="#4CAF50" filter="url(#glow2)"/>
  <text x="420" y="235" fill="#4CAF50" font-family="monospace" font-size="10">(8,15,17)</text>

  <!-- 7,24,25 -->
  <circle cx="240" cy="405" r="6" fill="#4CAF50" filter="url(#glow2)"/>
  <text x="250" y="425" fill="#4CAF50" font-family="monospace" font-size="10">(7,24,25)</text>

  <!-- Quadruple points (orange) -->
  <circle cx="355" cy="370" r="6" fill="#FF9800" filter="url(#glow2)"/>
  <text x="365" y="385" fill="#FF9800" font-family="monospace" font-size="10">(1,2,2,3)</text>

  <circle cx="165" cy="310" r="6" fill="#FF9800" filter="url(#glow2)"/>
  <text x="100" y="325" fill="#FF9800" font-family="monospace" font-size="10">(2,3,6,7)</text>

  <!-- 5-tuple point (pink) -->
  <circle cx="275" cy="150" r="6" fill="#E91E63" filter="url(#glow2)"/>
  <text x="200" y="142" fill="#E91E63" font-family="monospace" font-size="10">(1,2,3,4,√30)</text>

  <!-- Shared hypotenuse connection -->
  <line x1="355" y1="370" x2="165" y2="310" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="250" y="345" fill="#FFCC80" font-family="monospace" font-size="9">shared hypotenuse</text>

  <!-- Peel identity illustration -->
  <rect x="530" y="90" width="250" height="170" rx="8" fill="#1a2233" stroke="#334455" stroke-width="1"/>
  <text x="655" y="115" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14" font-weight="bold">
    Peel Identity
  </text>
  <text x="545" y="140" fill="#4CAF50" font-family="monospace" font-size="12">For k-tuple (v, d):</text>
  <text x="545" y="165" fill="#81C784" font-family="monospace" font-size="11">(d − vⱼ)(d + vⱼ) =</text>
  <text x="560" y="185" fill="#81C784" font-family="monospace" font-size="11">Σ_{i≠j} vᵢ²</text>
  <text x="545" y="215" fill="#aabbcc" font-family="monospace" font-size="10">→ gcd(d − vⱼ, N) may</text>
  <text x="555" y="232" fill="#aabbcc" font-family="monospace" font-size="10">reveal factors of N</text>

  <!-- GCD cascade illustration -->
  <rect x="530" y="280" width="250" height="140" rx="8" fill="#1a2233" stroke="#334455" stroke-width="1"/>
  <text x="655" y="305" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14" font-weight="bold">
    GCD Cascade
  </text>
  <text x="545" y="330" fill="#2196F3" font-family="monospace" font-size="11">Channel 1: gcd(d−v₁, N)</text>
  <text x="545" y="348" fill="#4CAF50" font-family="monospace" font-size="11">Channel 2: gcd(d−v₂, N)</text>
  <text x="545" y="366" fill="#FF9800" font-family="monospace" font-size="11">Channel 3: gcd(d−v₃, N)</text>
  <text x="545" y="384" fill="#E91E63" font-family="monospace" font-size="11">Channel k-1: gcd(d−vₖ₋₁, N)</text>
  <text x="545" y="408" fill="#aaa" font-family="monospace" font-size="10">+ complementary gcd(d+vⱼ, N)</text>

  <!-- Bridge projection illustration -->
  <rect x="530" y="440" width="250" height="130" rx="8" fill="#1a2233" stroke="#334455" stroke-width="1"/>
  <text x="655" y="465" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14" font-weight="bold">
    Dimension Telescope
  </text>

  <!-- Arrows showing dimension reduction -->
  <rect x="555" y="478" width="70" height="25" rx="5" fill="#E91E63" opacity="0.7"/>
  <text x="590" y="495" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">5-tuple</text>
  <text x="640" y="495" fill="#aaa" font-family="monospace" font-size="14">→</text>
  <rect x="655" y="478" width="55" height="25" rx="5" fill="#FF9800" opacity="0.7"/>
  <text x="682" y="495" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">quad</text>
  <text x="720" y="495" fill="#aaa" font-family="monospace" font-size="14">→</text>
  <rect x="730" y="478" width="40" height="25" rx="5" fill="#4CAF50" opacity="0.7"/>
  <text x="750" y="495" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">trip</text>

  <text x="545" y="525" fill="#aabbcc" font-family="monospace" font-size="10">5-tuple: C(4,2) = 6</text>
  <text x="555" y="542" fill="#aabbcc" font-family="monospace" font-size="10">projection bridges</text>
  <text x="545" y="560" fill="#aabbcc" font-family="monospace" font-size="10">Each bridge → deeper</text>
  <text x="555" y="577" fill="#aabbcc" font-family="monospace" font-size="10">factor extraction</text>

  <!-- Legend -->
  <circle cx="50" cy="540" r="5" fill="#4CAF50"/>
  <text x="62" y="544" fill="#aaa" font-family="monospace" font-size="10">Triples (3D)</text>
  <circle cx="50" cy="560" r="5" fill="#FF9800"/>
  <text x="62" y="564" fill="#aaa" font-family="monospace" font-size="10">Quadruples (4D)</text>
  <circle cx="50" cy="580" r="5" fill="#E91E63"/>
  <text x="62" y="584" fill="#aaa" font-family="monospace" font-size="10">5-Tuples (5D)</text>
</svg>
