<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="450" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="20" font-weight="bold">
    Octonion Non-Associativity: Multiple Independent Factor Channels
  </text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-family="Georgia, serif" font-size="13">
    Different association orders → Different 8-tuples → Independent factor extraction
  </text>

  <!-- Three input octets -->
  <rect x="50" y="90" width="120" height="40" rx="8" fill="#2196F3" opacity="0.8"/>
  <text x="110" y="115" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">a</text>

  <rect x="200" y="90" width="120" height="40" rx="8" fill="#4CAF50" opacity="0.8"/>
  <text x="260" y="115" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">b</text>

  <rect x="350" y="90" width="120" height="40" rx="8" fill="#FF9800" opacity="0.8"/>
  <text x="410" y="115" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">c</text>

  <!-- Left association: (a·b)·c -->
  <rect x="50" y="170" width="230" height="35" rx="8" fill="#1a2a4a" stroke="#2196F3" stroke-width="1.5"/>
  <text x="165" y="192" text-anchor="middle" fill="#90CAF9" font-family="monospace" font-size="13">(a · b) · c</text>

  <!-- Arrow down -->
  <line x1="165" y1="205" x2="165" y2="230" stroke="#90CAF9" stroke-width="1.5"/>
  <polygon points="160,228 170,228 165,238" fill="#90CAF9"/>

  <!-- Result 1 -->
  <rect x="50" y="240" width="230" height="60" rx="8" fill="#1a2a4a" stroke="#2196F3" stroke-width="2" filter="url(#glow4)"/>
  <text x="165" y="262" text-anchor="middle" fill="#64B5F6" font-family="monospace" font-size="11">Tuple₁ = (c₁, c₂, ..., c₈)</text>
  <text x="165" y="282" text-anchor="middle" fill="#42A5F5" font-family="monospace" font-size="11">||Tuple₁||² = ||a||²·||b||²·||c||²</text>

  <!-- Right association: a·(b·c) -->
  <rect x="310" y="170" width="230" height="35" rx="8" fill="#2a1a2a" stroke="#E91E63" stroke-width="1.5"/>
  <text x="425" y="192" text-anchor="middle" fill="#F48FB1" font-family="monospace" font-size="13">a · (b · c)</text>

  <!-- Arrow down -->
  <line x1="425" y1="205" x2="425" y2="230" stroke="#F48FB1" stroke-width="1.5"/>
  <polygon points="420,228 430,228 425,238" fill="#F48FB1"/>

  <!-- Result 2 -->
  <rect x="310" y="240" width="230" height="60" rx="8" fill="#2a1a2a" stroke="#E91E63" stroke-width="2" filter="url(#glow4)"/>
  <text x="425" y="262" text-anchor="middle" fill="#F48FB1" font-family="monospace" font-size="11">Tuple₂ = (d₁, d₂, ..., d₈)</text>
  <text x="425" y="282" text-anchor="middle" fill="#EC407A" font-family="monospace" font-size="11">||Tuple₂||² = ||a||²·||b||²·||c||²</text>

  <!-- NOT EQUAL -->
  <text x="290" y="272" text-anchor="middle" fill="#FF5252" font-family="Georgia, serif" font-size="24" font-weight="bold">≠</text>

  <!-- Same norm box -->
  <rect x="560" y="170" width="310" height="55" rx="8" fill="#1a2a1a" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="715" y="192" text-anchor="middle" fill="#81C784" font-family="monospace" font-size="12">✓ SAME norm (product property)</text>
  <text x="715" y="210" text-anchor="middle" fill="#A5D6A7" font-family="monospace" font-size="11">||Tuple₁||² = ||Tuple₂||² always</text>

  <!-- Different components box -->
  <rect x="560" y="240" width="310" height="55" rx="8" fill="#2a1a1a" stroke="#FF5252" stroke-width="1.5"/>
  <text x="715" y="262" text-anchor="middle" fill="#EF9A9A" font-family="monospace" font-size="12">✗ DIFFERENT components</text>
  <text x="715" y="280" text-anchor="middle" fill="#E57373" font-family="monospace" font-size="11">Tuple₁ ≠ Tuple₂ (100% of time!)</text>

  <!-- Catalan numbers table -->
  <rect x="50" y="320" width="400" height="110" rx="10" fill="#151525" stroke="#333" stroke-width="1"/>
  <text x="250" y="348" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14" font-weight="bold">
    Catalan Number Growth of Independent Tuples
  </text>

  <text x="80" y="375" fill="#aaa" font-family="monospace" font-size="11">n inputs</text>
  <text x="190" y="375" fill="#aaa" font-family="monospace" font-size="11">Cₙ₋₁</text>
  <text x="280" y="375" fill="#aaa" font-family="monospace" font-size="11">Distinct tuples</text>

  <line x1="70" y1="382" x2="430" y2="382" stroke="#444" stroke-width="0.5"/>

  <text x="95" y="398" fill="#CE93D8" font-family="monospace" font-size="11">2</text>
  <text x="200" y="398" fill="#CE93D8" font-family="monospace" font-size="11">1</text>
  <text x="310" y="398" fill="#CE93D8" font-family="monospace" font-size="11">1</text>

  <text x="95" y="413" fill="#CE93D8" font-family="monospace" font-size="11">3</text>
  <text x="200" y="413" fill="#CE93D8" font-family="monospace" font-size="11">2</text>
  <text x="310" y="413" fill="#4CAF50" font-family="monospace" font-size="11" font-weight="bold">2 ✓</text>

  <text x="95" y="428" fill="#CE93D8" font-family="monospace" font-size="11">4</text>
  <text x="200" y="428" fill="#CE93D8" font-family="monospace" font-size="11">5</text>
  <text x="310" y="428" fill="#4CAF50" font-family="monospace" font-size="11" font-weight="bold">5 ✓</text>

  <!-- Feature box -->
  <rect x="480" y="320" width="390" height="110" rx="10" fill="#151525" stroke="#333" stroke-width="1"/>
  <text x="675" y="348" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14" font-weight="bold">
    Why This Matters for Factoring
  </text>

  <text x="500" y="375" fill="#81C784" font-family="monospace" font-size="11">• Each tuple gives 7 independent GCD channels</text>
  <text x="500" y="395" fill="#81C784" font-family="monospace" font-size="11">• 5 tuples × 7 channels = 35 GCD operations</text>
  <text x="500" y="415" fill="#81C784" font-family="monospace" font-size="11">• All tuples share same norm → same sphere</text>
  <text x="500" y="435" fill="#FFCC80" font-family="monospace" font-size="11">• Free parallelism from algebraic structure!</text>
</svg>
