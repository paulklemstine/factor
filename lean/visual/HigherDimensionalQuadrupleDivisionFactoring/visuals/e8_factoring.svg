<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="e8glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0" />
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="20" font-weight="bold">
    E₈ Lattice &amp; Optimal Factor Extraction in 8 Dimensions
  </text>

  <!-- E₈ visualization (2D projection of root system) -->
  <circle cx="250" cy="260" r="160" fill="url(#e8glow)"/>
  <circle cx="250" cy="260" r="160" fill="none" stroke="#9C27B0" stroke-width="0.5" opacity="0.4"/>

  <!-- Root vectors (simplified 2D projection of 240 kissing vectors) -->
  <!-- Show representative vectors as dots on concentric rings -->
  <!-- Inner ring -->
  <g filter="url(#neon)">
    <circle cx="250" cy="120" r="3" fill="#CE93D8"/>
    <circle cx="340" cy="140" r="3" fill="#CE93D8"/>
    <circle cx="390" cy="210" r="3" fill="#CE93D8"/>
    <circle cx="390" cy="310" r="3" fill="#CE93D8"/>
    <circle cx="340" cy="380" r="3" fill="#CE93D8"/>
    <circle cx="250" cy="400" r="3" fill="#CE93D8"/>
    <circle cx="160" cy="380" r="3" fill="#CE93D8"/>
    <circle cx="110" cy="310" r="3" fill="#CE93D8"/>
    <circle cx="110" cy="210" r="3" fill="#CE93D8"/>
    <circle cx="160" cy="140" r="3" fill="#CE93D8"/>

    <!-- More vectors at different angles -->
    <circle cx="295" cy="130" r="2.5" fill="#AB47BC"/>
    <circle cx="365" cy="175" r="2.5" fill="#AB47BC"/>
    <circle cx="395" cy="260" r="2.5" fill="#AB47BC"/>
    <circle cx="365" cy="345" r="2.5" fill="#AB47BC"/>
    <circle cx="295" cy="390" r="2.5" fill="#AB47BC"/>
    <circle cx="205" cy="390" r="2.5" fill="#AB47BC"/>
    <circle cx="135" cy="345" r="2.5" fill="#AB47BC"/>
    <circle cx="105" cy="260" r="2.5" fill="#AB47BC"/>
    <circle cx="135" cy="175" r="2.5" fill="#AB47BC"/>
    <circle cx="205" cy="130" r="2.5" fill="#AB47BC"/>

    <!-- Inner ring -->
    <circle cx="250" cy="170" r="2" fill="#7B1FA2"/>
    <circle cx="310" cy="195" r="2" fill="#7B1FA2"/>
    <circle cx="340" cy="260" r="2" fill="#7B1FA2"/>
    <circle cx="310" cy="325" r="2" fill="#7B1FA2"/>
    <circle cx="250" cy="350" r="2" fill="#7B1FA2"/>
    <circle cx="190" cy="325" r="2" fill="#7B1FA2"/>
    <circle cx="160" cy="260" r="2" fill="#7B1FA2"/>
    <circle cx="190" cy="195" r="2" fill="#7B1FA2"/>

    <!-- Additional scattered points -->
    <circle cx="270" cy="155" r="2" fill="#BA68C8"/>
    <circle cx="330" cy="165" r="2" fill="#BA68C8"/>
    <circle cx="370" cy="230" r="2" fill="#BA68C8"/>
    <circle cx="380" cy="280" r="2" fill="#BA68C8"/>
    <circle cx="350" cy="350" r="2" fill="#BA68C8"/>
    <circle cx="280" cy="385" r="2" fill="#BA68C8"/>
    <circle cx="220" cy="385" r="2" fill="#BA68C8"/>
    <circle cx="150" cy="350" r="2" fill="#BA68C8"/>
    <circle cx="120" cy="280" r="2" fill="#BA68C8"/>
    <circle cx="130" cy="230" r="2" fill="#BA68C8"/>
    <circle cx="170" cy="165" r="2" fill="#BA68C8"/>
    <circle cx="230" cy="155" r="2" fill="#BA68C8"/>
  </g>

  <!-- Cross-collision lines (sample) -->
  <line x1="250" y1="120" x2="340" y2="140" stroke="#CE93D8" stroke-width="0.3" opacity="0.3"/>
  <line x1="340" y1="140" x2="390" y2="210" stroke="#CE93D8" stroke-width="0.3" opacity="0.3"/>
  <line x1="250" y1="120" x2="390" y2="210" stroke="#CE93D8" stroke-width="0.3" opacity="0.3"/>
  <line x1="110" y1="210" x2="160" y2="140" stroke="#CE93D8" stroke-width="0.3" opacity="0.3"/>
  <line x1="110" y1="310" x2="160" y2="380" stroke="#CE93D8" stroke-width="0.3" opacity="0.3"/>

  <!-- Center label -->
  <text x="250" y="265" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="18" font-weight="bold" opacity="0.8">E₈</text>

  <!-- Info Panel -->
  <rect x="450" y="80" width="330" height="380" rx="10" fill="#151525" stroke="#333" stroke-width="1"/>

  <text x="615" y="110" text-anchor="middle" fill="#CE93D8" font-family="Georgia, serif" font-size="16" font-weight="bold">
    E₈ Lattice Properties
  </text>

  <!-- Properties -->
  <text x="470" y="145" fill="#E1BEE7" font-family="monospace" font-size="12">Dimension: 8</text>
  <text x="470" y="168" fill="#E1BEE7" font-family="monospace" font-size="12">Kissing number: 240</text>
  <text x="470" y="191" fill="#E1BEE7" font-family="monospace" font-size="12">Packing density: π⁴/384</text>
  <text x="470" y="214" fill="#E1BEE7" font-family="monospace" font-size="12">Type: Even unimodular</text>

  <line x1="470" y1="228" x2="760" y2="228" stroke="#444" stroke-width="1"/>

  <text x="615" y="252" text-anchor="middle" fill="#FF9800" font-family="Georgia, serif" font-size="14" font-weight="bold">
    Factoring Implications
  </text>

  <text x="470" y="278" fill="#FFE0B2" font-family="monospace" font-size="11">• 240 kissing vectors</text>
  <text x="480" y="296" fill="#FFE0B2" font-family="monospace" font-size="11">→ 240 × 7 = 1,680 GCD ops</text>

  <text x="470" y="322" fill="#FFE0B2" font-family="monospace" font-size="11">• C(240,2) = 28,680</text>
  <text x="480" y="340" fill="#FFE0B2" font-family="monospace" font-size="11">cross-collision pairs</text>

  <text x="470" y="366" fill="#FFE0B2" font-family="monospace" font-size="11">• Densest 8D packing</text>
  <text x="480" y="384" fill="#FFE0B2" font-family="monospace" font-size="11">→ maximum tuple density</text>

  <text x="470" y="410" fill="#FFE0B2" font-family="monospace" font-size="11">• Norm-multiplicative</text>
  <text x="480" y="428" fill="#FFE0B2" font-family="monospace" font-size="11">via Degen identity</text>

  <!-- Bottom note -->
  <text x="400" y="485" text-anchor="middle" fill="#667788" font-family="Georgia, serif" font-size="12" font-style="italic">
    Viazovska (2016, Fields Medal 2022): E₈ achieves the densest sphere packing in 8 dimensions
  </text>
</svg>
