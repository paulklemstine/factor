<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sphere" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.9" />
    </radialGradient>
  </defs>

  <rect width="900" height="800" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Collision-Based Factoring on S¹(√N)
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#8899aa" font-size="14">
    Two representations of N = 65 as sum of two squares reveal the factor 5
  </text>

  <!-- The circle S¹(√65) -->
  <circle cx="300" cy="350" r="200" fill="url(#sphere)" stroke="#2196F3" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="300" y="580" text-anchor="middle" fill="#2196F3" font-size="14">S¹(√65) — Circle of radius √65 ≈ 8.06</text>

  <!-- Representation 1: (1, 8) -->
  <circle cx="325" cy="152" r="8" fill="#4CAF50" stroke="#fff" stroke-width="2"/>
  <text x="345" y="145" fill="#4CAF50" font-size="14" font-weight="bold">(1, 8)</text>
  <text x="345" y="162" fill="#81C784" font-size="12">1² + 8² = 65</text>

  <!-- Representation 2: (4, 7) -->
  <circle cx="170" cy="195" r="8" fill="#FF9800" stroke="#fff" stroke-width="2"/>
  <text x="95" y="190" fill="#FF9800" font-size="14" font-weight="bold">(4, 7)</text>
  <text x="95" y="207" fill="#FFB74D" font-size="12">4² + 7² = 65</text>

  <!-- Collision line -->
  <line x1="325" y1="152" x2="170" y2="195" stroke="#E91E63" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="240" y="160" fill="#E91E63" font-size="12" font-weight="bold">COLLISION</text>

  <!-- Center point -->
  <circle cx="300" cy="350" r="3" fill="#fff"/>
  <text x="310" y="365" fill="#666" font-size="12">origin</text>

  <!-- Axes -->
  <line x1="80" y1="350" x2="520" y2="350" stroke="#333" stroke-width="1"/>
  <line x1="300" y1="130" x2="300" y2="570" stroke="#333" stroke-width="1"/>
  <text x="525" y="355" fill="#555" font-size="12">a</text>
  <text x="305" y="125" fill="#555" font-size="12">b</text>

  <!-- Right side: Computation -->
  <rect x="560" y="100" width="310" height="580" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <text x="715" y="135" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Factor Extraction</text>

  <!-- Step 1 -->
  <text x="580" y="175" fill="#4CAF50" font-size="14" font-weight="bold">Rep 1:</text>
  <text x="580" y="195" fill="#81C784" font-size="14">a = 1, b = 8</text>

  <!-- Step 2 -->
  <text x="580" y="230" fill="#FF9800" font-size="14" font-weight="bold">Rep 2:</text>
  <text x="580" y="250" fill="#FFB74D" font-size="14">c = 4, d = 7</text>

  <!-- Step 3: Cross products -->
  <text x="580" y="290" fill="#E91E63" font-size="14" font-weight="bold">Cross Products:</text>
  <text x="580" y="310" fill="#F48FB1" font-size="14">ad - bc = 1·7 - 8·4 = -25</text>
  <text x="580" y="330" fill="#F48FB1" font-size="14">ac + bd = 1·4 + 8·7 = 60</text>

  <!-- Step 4: Collision-norm identity -->
  <text x="580" y="370" fill="#9C27B0" font-size="14" font-weight="bold">Collision-Norm Identity:</text>
  <text x="580" y="390" fill="#CE93D8" font-size="14">(-25)² + 60² = 4225 = 65²  ✓</text>

  <!-- Step 5: GCD -->
  <text x="580" y="430" fill="#2196F3" font-size="14" font-weight="bold">GCD Cascade:</text>
  <text x="580" y="450" fill="#64B5F6" font-size="14">gcd(|-25|, 65) = gcd(25, 65)</text>
  <text x="580" y="470" fill="#64B5F6" font-size="14">                = 5</text>

  <!-- Result -->
  <rect x="575" y="495" width="280" height="55" rx="8" fill="rgba(76,175,80,0.15)" stroke="#4CAF50" stroke-width="2"/>
  <text x="715" y="520" text-anchor="middle" fill="#4CAF50" font-size="18" font-weight="bold">FACTOR FOUND: 5</text>
  <text x="715" y="540" text-anchor="middle" fill="#81C784" font-size="14">65 = 5 × 13</text>

  <!-- Theorem box -->
  <rect x="575" y="570" width="280" height="90" rx="8" fill="rgba(33,150,243,0.1)" stroke="#2196F3" stroke-width="1"/>
  <text x="715" y="595" text-anchor="middle" fill="#2196F3" font-size="13" font-weight="bold">Collision-Norm Theorem</text>
  <text x="715" y="615" text-anchor="middle" fill="#64B5F6" font-size="12">If a²+b² = c²+d² = N, then</text>
  <text x="715" y="635" text-anchor="middle" fill="#64B5F6" font-size="12">(ad-bc)² + (ac+bd)² = N²</text>
  <text x="715" y="650" text-anchor="middle" fill="#90CAF9" font-size="11" font-style="italic">Formally verified in Lean 4 ✓</text>

  <!-- Bottom: More examples -->
  <rect x="50" y="720" width="800" height="55" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)"/>
  <text x="450" y="745" text-anchor="middle" fill="#aaa" font-size="13">
    More collisions: 85 = 2²+9² = 6²+7² → gcd(8,85)=17  •  221 = 5²+14² = 10²+11² → gcd(65,221)=13
  </text>
  <text x="450" y="762" text-anchor="middle" fill="#888" font-size="12">
    Every composite sum-of-two-squares with multiple representations yields a factor via collision
  </text>
</svg>
