<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <linearGradient id="tcbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e" />
      <stop offset="100%" style="stop-color:#0a1a2e" />
    </linearGradient>
  </defs>
  
  <rect width="700" height="450" fill="url(#tcbg)"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold" font-family="Arial">
    Tropical Limit: Softmax → Hard Attention as β → ∞
  </text>
  <text x="350" y="50" text-anchor="middle" fill="#888" font-size="11" font-family="Arial">
    Theorem: b ≤ (1/β)·log(exp(βa) + exp(βb))  [Lean-verified]
  </text>
  
  <!-- Axes -->
  <line x1="80" y1="380" x2="650" y2="380" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="380" x2="80" y2="70" stroke="#555" stroke-width="1.5"/>
  
  <!-- X axis labels -->
  <text x="365" y="410" text-anchor="middle" fill="#999" font-size="12" font-family="Arial">Inverse Temperature β</text>
  <text x="80" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">0</text>
  <text x="195" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">1</text>
  <text x="310" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">5</text>
  <text x="425" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">10</text>
  <text x="540" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">50</text>
  <text x="630" y="398" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">100</text>
  
  <!-- Y axis labels -->
  <text x="55" y="225" text-anchor="middle" fill="#999" font-size="12" font-family="Arial" transform="rotate(-90,55,225)">
    LSE(a,b)/β
  </text>
  
  <!-- Target line (max = b = 3.0) -->
  <line x1="80" y1="130" x2="650" y2="130" stroke="#55efc4" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="660" y="134" fill="#55efc4" font-size="11" font-family="Arial">max(a,b) = b</text>
  
  <!-- a value line -->
  <line x1="80" y1="280" x2="650" y2="280" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="660" y="284" fill="#ff6b6b" font-size="10" font-family="Arial" opacity="0.7">a</text>
  
  <!-- Convergence curve: LSE/β as β increases -->
  <!-- Points: β=0.1→~2.25, β=0.5→~2.85, β=1→~3.13, β=2→~3.06, β=5→~3.01, β=10→~3.003, β=50→~3.0001, β=100→~3.00001 -->
  <polyline points="90,240 130,200 195,155 250,145 310,137 365,133 425,131 540,130.5 630,130.2"
    stroke="#a29bfe" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  
  <!-- Data points -->
  <circle cx="90" cy="240" r="4" fill="#a29bfe"/>
  <circle cx="130" cy="200" r="4" fill="#a29bfe"/>
  <circle cx="195" cy="155" r="4" fill="#a29bfe"/>
  <circle cx="250" cy="145" r="4" fill="#a29bfe"/>
  <circle cx="310" cy="137" r="4" fill="#a29bfe"/>
  <circle cx="365" cy="133" r="4" fill="#a29bfe"/>
  <circle cx="425" cy="131" r="4" fill="#a29bfe"/>
  <circle cx="540" cy="130.5" r="4" fill="#a29bfe"/>
  <circle cx="630" cy="130.2" r="4" fill="#a29bfe"/>
  
  <!-- Annotation -->
  <rect x="400" y="300" width="240" height="65" rx="8" fill="#222244" stroke="#6c5ce7" stroke-width="1"/>
  <text x="520" y="320" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold" font-family="Arial">
    Key Insight
  </text>
  <text x="520" y="338" text-anchor="middle" fill="#ccc" font-size="10" font-family="Arial">
    At β=10: within 0.1% of hard attention
  </text>
  <text x="520" y="354" text-anchor="middle" fill="#ccc" font-size="10" font-family="Arial">
    → Tropical attention ≈ free sparsity
  </text>
</svg>
