<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg3)"/>

  <text x="450" y="35" text-anchor="middle" fill="#58a6ff" font-size="20" font-weight="bold">
    QDF Homomorphic Encryption Architecture
  </text>

  <!-- Layer 1: Plaintext -->
  <g transform="translate(50, 70)">
    <rect width="180" height="80" rx="10" fill="#1f2937" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">PLAINTEXT</text>
    <text x="90" y="45" text-anchor="middle" fill="#d1d5db" font-size="11">Message m</text>
    <text x="90" y="65" text-anchor="middle" fill="#6b7280" font-size="10">Integer value</text>
  </g>

  <!-- Arrow: Encrypt -->
  <g transform="translate(240, 100)">
    <line x1="0" y1="10" x2="60" y2="10" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>
    <text x="30" y="0" text-anchor="middle" fill="#fbbf24" font-size="10">Encrypt</text>
  </g>

  <!-- Layer 2: QDF Encoding -->
  <g transform="translate(310, 70)">
    <rect width="250" height="80" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="125" y="25" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">QDF ENCODING</text>
    <text x="125" y="45" text-anchor="middle" fill="#d1d5db" font-size="11">m → (m·a, m·b, m·c, m·d)</text>
    <text x="125" y="65" text-anchor="middle" fill="#6b7280" font-size="10">Scale family quadruple by plaintext</text>
  </g>

  <!-- Arrow: Reduce -->
  <g transform="translate(570, 100)">
    <line x1="0" y1="10" x2="60" y2="10" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="0" text-anchor="middle" fill="#fbbf24" font-size="10">mod M</text>
  </g>

  <!-- Layer 3: Ciphertext -->
  <g transform="translate(640, 70)">
    <rect width="210" height="80" rx="10" fill="#1f2937" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="105" y="25" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">CIPHERTEXT</text>
    <text x="105" y="45" text-anchor="middle" fill="#d1d5db" font-size="11">(a', b', c', d') mod M</text>
    <text x="105" y="65" text-anchor="middle" fill="#6b7280" font-size="10">QDF identity preserved</text>
  </g>

  <!-- Middle Section: Operations -->
  <g transform="translate(50, 200)">
    <rect width="800" height="180" rx="15" fill="rgba(59,130,246,0.05)" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="400" y="25" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="bold">
      HOMOMORPHIC OPERATIONS (on encrypted data)
    </text>

    <!-- Op 1: Addition -->
    <g transform="translate(20, 45)">
      <rect width="230" height="110" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
      <text x="115" y="22" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">⊕ Addition</text>
      <text x="115" y="42" text-anchor="middle" fill="#d1d5db" font-size="10">(a₁+a₂, b₁+b₂, c₁+c₂, d₁+d₂)</text>
      <line x1="15" y1="52" x2="215" y2="52" stroke="#374151" stroke-width="0.5"/>
      <text x="115" y="70" text-anchor="middle" fill="#fbbf24" font-size="10">Noise-free when aligned:</text>
      <text x="115" y="85" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="monospace">⟨v₁,v₂⟩ = d₁d₂</text>
      <text x="115" y="102" text-anchor="middle" fill="#6b7280" font-size="9">Otherwise: noise = 2(⟨v₁,v₂⟩−d₁d₂)</text>
    </g>

    <!-- Op 2: Scaling -->
    <g transform="translate(280, 45)">
      <rect width="230" height="110" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="115" y="22" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">⊗ Scaling</text>
      <text x="115" y="42" text-anchor="middle" fill="#d1d5db" font-size="10">(ka, kb, kc, kd)</text>
      <line x1="15" y1="52" x2="215" y2="52" stroke="#374151" stroke-width="0.5"/>
      <text x="115" y="70" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">Always noise-free! ✓</text>
      <text x="115" y="90" text-anchor="middle" fill="#6b7280" font-size="10">k²(a²+b²+c²) = k²d²</text>
      <text x="115" y="105" text-anchor="middle" fill="#6b7280" font-size="9">Multiplies plaintext by k</text>
    </g>

    <!-- Op 3: Verification -->
    <g transform="translate(540, 45)">
      <rect width="230" height="110" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="115" y="22" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">🔍 Verification</text>
      <text x="115" y="42" text-anchor="middle" fill="#d1d5db" font-size="10">Check: a²+b²+c² ≡ d² (mod M)</text>
      <line x1="15" y1="52" x2="215" y2="52" stroke="#374151" stroke-width="0.5"/>
      <text x="115" y="70" text-anchor="middle" fill="#d1d5db" font-size="10">Error detection:</text>
      <text x="115" y="88" text-anchor="middle" fill="#ef4444" font-size="11" font-family="monospace">syndrome = e(2a+e)</text>
      <text x="115" y="105" text-anchor="middle" fill="#6b7280" font-size="9">Detects & localizes corruption</text>
    </g>
  </g>

  <!-- Bottom: Properties -->
  <g transform="translate(50, 420)">
    <!-- Lattice -->
    <g transform="translate(0, 0)">
      <rect width="180" height="90" rx="8" fill="#1f2937" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="90" y="20" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="bold">Lattice Structure</text>
      <text x="90" y="40" text-anchor="middle" fill="#d1d5db" font-size="9">• Cone in ℤ⁴</text>
      <text x="90" y="55" text-anchor="middle" fill="#d1d5db" font-size="9">• Gram: ‖v‖² = 2d²</text>
      <text x="90" y="70" text-anchor="middle" fill="#d1d5db" font-size="9">• CS: ⟨v₁,v₂⟩² ≤ d₁²d₂²</text>
      <text x="90" y="85" text-anchor="middle" fill="#d1d5db" font-size="9">• GCD primitivity</text>
    </g>

    <!-- Modular -->
    <g transform="translate(200, 0)">
      <rect width="180" height="90" rx="8" fill="#1f2937" stroke="#a855f7" stroke-width="1.5"/>
      <text x="90" y="20" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="bold">Modular Arithmetic</text>
      <text x="90" y="40" text-anchor="middle" fill="#d1d5db" font-size="9">• QDF preserved mod m</text>
      <text x="90" y="55" text-anchor="middle" fill="#d1d5db" font-size="9">• CRT compatible</text>
      <text x="90" y="70" text-anchor="middle" fill="#d1d5db" font-size="9">• Cascade: (mod m₁) mod m₂</text>
      <text x="90" y="85" text-anchor="middle" fill="#d1d5db" font-size="9">• Radical preserved</text>
    </g>

    <!-- Quantum -->
    <g transform="translate(400, 0)">
      <rect width="180" height="90" rx="8" fill="#1f2937" stroke="#ec4899" stroke-width="1.5"/>
      <text x="90" y="20" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="bold">Quantum Connection</text>
      <text x="90" y="40" text-anchor="middle" fill="#d1d5db" font-size="9">• Bloch sphere: (a/d,b/d,c/d)</text>
      <text x="90" y="55" text-anchor="middle" fill="#d1d5db" font-size="9">• Rational points on S²</text>
      <text x="90" y="70" text-anchor="middle" fill="#d1d5db" font-size="9">• Error syndromes</text>
      <text x="90" y="85" text-anchor="middle" fill="#d1d5db" font-size="9">• Fidelity bound ≤ 1</text>
    </g>

    <!-- Symmetry -->
    <g transform="translate(600, 0)">
      <rect width="200" height="90" rx="8" fill="#1f2937" stroke="#f97316" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">Symmetry &amp; Topology</text>
      <text x="100" y="40" text-anchor="middle" fill="#d1d5db" font-size="9">• O_h group (48 elements)</text>
      <text x="100" y="55" text-anchor="middle" fill="#d1d5db" font-size="9">• Signs × Permutations</text>
      <text x="100" y="70" text-anchor="middle" fill="#d1d5db" font-size="9">• Filtration: gap = 2n+2</text>
      <text x="100" y="85" text-anchor="middle" fill="#d1d5db" font-size="9">• Max dist² ≤ 4d²</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" fill="#4b5563" font-size="10">
    30+ Theorems Formally Verified in Lean 4 with Mathlib • Zero Sorry • Standard Axioms Only
  </text>
  <text x="450" y="565" text-anchor="middle" fill="#374151" font-size="9">
    Cryptography/HomomorphicEncryption__QDF.lean
  </text>
</svg>
