<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF007A;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF5CAA;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#627EEA;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8FA8FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="verifiedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#69F0AE;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="Arial">
    Uniswap v4 Hook Architecture — Formally Verified
  </text>

  <!-- User -->
  <rect x="30" y="180" width="100" height="60" rx="10" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="80" y="215" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">User</text>

  <!-- Arrow: User → Before Hook -->
  <line x1="130" y1="210" x2="170" y2="210" stroke="#aaa" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/></marker></defs>

  <!-- Before Hook -->
  <rect x="175" y="150" width="120" height="50" rx="8" fill="url(#hookGrad)" filter="url(#shadow)"/>
  <text x="235" y="172" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">beforeSwap</text>
  <text x="235" y="190" text-anchor="middle" fill="white" font-size="10" font-family="Arial">adjustFee()</text>

  <!-- Dynamic Fee Box -->
  <rect x="175" y="210" width="120" height="50" rx="8" fill="url(#hookGrad)" filter="url(#shadow)" opacity="0.7"/>
  <text x="235" y="232" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">Dynamic Fee</text>
  <text x="235" y="248" text-anchor="middle" fill="white" font-size="10" font-family="Arial">min ≤ fee ≤ max</text>

  <!-- Arrow: Hook → Pool -->
  <line x1="295" y1="185" x2="340" y2="185" stroke="#aaa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool -->
  <rect x="345" y="140" width="150" height="140" rx="12" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="420" y="170" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">Pool v4</text>
  <text x="420" y="195" text-anchor="middle" fill="white" font-size="11" font-family="Arial">x · y = k</text>
  <text x="420" y="215" text-anchor="middle" fill="white" font-size="11" font-family="Arial">dy = y·dx/(x+dx)</text>
  <text x="420" y="240" text-anchor="middle" fill="white" font-size="10" font-family="Arial" opacity="0.8">Reserves: (x, y)</text>
  <text x="420" y="260" text-anchor="middle" fill="white" font-size="10" font-family="Arial" opacity="0.8">Fee: baseFee</text>

  <!-- Arrow: Pool → After Hook -->
  <line x1="495" y1="210" x2="540" y2="210" stroke="#aaa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- After Hook -->
  <rect x="545" y="150" width="120" height="50" rx="8" fill="url(#hookGrad)" filter="url(#shadow)"/>
  <text x="605" y="172" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">afterSwap</text>
  <text x="605" y="190" text-anchor="middle" fill="white" font-size="10" font-family="Arial">redistribute()</text>

  <!-- TWAMM Hook -->
  <rect x="545" y="210" width="120" height="50" rx="8" fill="url(#hookGrad)" filter="url(#shadow)" opacity="0.7"/>
  <text x="605" y="232" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">TWAMM Hook</text>
  <text x="605" y="248" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Split over n blocks</text>

  <!-- Arrow: After Hook → Output -->
  <line x1="665" y1="185" x2="700" y2="185" stroke="#aaa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="705" y="170" width="70" height="40" rx="8" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="740" y="195" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Output</text>

  <!-- Verified Properties -->
  <rect x="50" y="320" width="700" height="150" rx="10" fill="url(#verifiedGrad)" filter="url(#shadow)" opacity="0.15"/>
  <text x="400" y="345" text-anchor="middle" fill="#69F0AE" font-size="16" font-weight="bold" font-family="Arial">
    ✓ Formally Verified Properties
  </text>

  <text x="120" y="375" fill="#a0f0c0" font-size="12" font-family="Arial">✓ Identity hook = no-hook output</text>
  <text x="120" y="395" fill="#a0f0c0" font-size="12" font-family="Arial">✓ Dynamic fees bounded: minFee ≤ fee ≤ maxFee</text>
  <text x="120" y="415" fill="#a0f0c0" font-size="12" font-family="Arial">✓ TWAMM: per-block amount &lt; total</text>
  <text x="450" y="375" fill="#a0f0c0" font-size="12" font-family="Arial">✓ Higher fees → less output</text>
  <text x="450" y="395" fill="#a0f0c0" font-size="12" font-family="Arial">✓ Price impact monotone in trade size</text>
  <text x="450" y="415" fill="#a0f0c0" font-size="12" font-family="Arial">✓ Hooks compose correctly</text>

  <!-- Lean 4 badge -->
  <rect x="310" y="440" width="180" height="30" rx="15" fill="#333" stroke="#69F0AE" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" fill="#69F0AE" font-size="12" font-weight="bold" font-family="Arial">
    Verified in Lean 4 + Mathlib
  </text>

  <!-- Hook composition arrows -->
  <path d="M 235 200 Q 235 280 350 280" fill="none" stroke="#627EEA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <path d="M 490 280 Q 605 280 605 210" fill="none" stroke="#627EEA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="420" y="295" text-anchor="middle" fill="#627EEA" font-size="10" opacity="0.7" font-family="Arial">
    composeHooks(h₁, h₂)
  </text>
</svg>
