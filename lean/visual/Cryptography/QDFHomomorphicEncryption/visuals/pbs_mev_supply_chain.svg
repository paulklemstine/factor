<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#81C784"/>
    </linearGradient>
    <linearGradient id="searcherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#FFB74D"/>
    </linearGradient>
    <linearGradient id="builderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#64B5F6"/>
    </linearGradient>
    <linearGradient id="relayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#CE93D8"/>
    </linearGradient>
    <linearGradient id="proposerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="Arial">
    MEV Supply Chain: Proposer-Builder Separation — Formally Verified
  </text>

  <!-- Layer 1: Users -->
  <text x="80" y="70" fill="#888" font-size="13" font-family="Arial" font-weight="bold">USERS</text>
  <rect x="30" y="80" width="80" height="40" rx="8" fill="url(#userGrad)"/>
  <text x="70" y="105" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Trader A</text>
  <rect x="120" y="80" width="80" height="40" rx="8" fill="url(#userGrad)"/>
  <text x="160" y="105" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Trader B</text>
  <rect x="210" y="80" width="80" height="40" rx="8" fill="url(#userGrad)"/>
  <text x="250" y="105" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Trader C</text>

  <!-- Mempool -->
  <rect x="60" y="140" width="200" height="35" rx="8" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="160" y="162" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial">Mempool (public txs)</text>

  <!-- Layer 2: Searchers -->
  <text x="380" y="70" fill="#888" font-size="13" font-family="Arial" font-weight="bold">SEARCHERS</text>
  <rect x="340" y="80" width="90" height="40" rx="8" fill="url(#searcherGrad)"/>
  <text x="385" y="100" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Arb Bot</text>
  <text x="385" y="112" text-anchor="middle" fill="white" font-size="9" opacity="0.7" font-family="Arial">ε = 0.9</text>
  <rect x="440" y="80" width="90" height="40" rx="8" fill="url(#searcherGrad)"/>
  <text x="485" y="100" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Liquidator</text>
  <text x="485" y="112" text-anchor="middle" fill="white" font-size="9" opacity="0.7" font-family="Arial">ε = 0.85</text>

  <!-- Arrows: Users → Mempool -->
  <line x1="70" y1="120" x2="100" y2="140" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <line x1="160" y1="120" x2="160" y2="140" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <line x1="250" y1="120" x2="220" y2="140" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#greenArrow)"/>

  <!-- Arrows: Mempool → Searchers -->
  <line x1="260" y1="157" x2="340" y2="115" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Layer 3: Builders -->
  <text x="80" y="210" fill="#888" font-size="13" font-family="Arial" font-weight="bold">BUILDERS</text>
  <rect x="30" y="220" width="160" height="65" rx="8" fill="url(#builderGrad)"/>
  <text x="110" y="240" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Builder 1 (General)</text>
  <text x="110" y="256" text-anchor="middle" fill="white" font-size="10" font-family="Arial">eff = 70%, cost = 0.5 ETH</text>
  <text x="110" y="272" text-anchor="middle" fill="white" font-size="10" font-family="Arial">bid = eff×MEV - cost</text>

  <rect x="210" y="220" width="160" height="65" rx="8" fill="url(#builderGrad)"/>
  <text x="290" y="240" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Builder 2 (Specialist)</text>
  <text x="290" y="256" text-anchor="middle" fill="white" font-size="10" font-family="Arial">specEff = 95%, frac = 40%</text>
  <text x="290" y="272" text-anchor="middle" fill="white" font-size="10" font-family="Arial">capture ≥ general ✓</text>

  <!-- Arrows: Searchers → Builders -->
  <line x1="385" y1="120" x2="200" y2="220" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="165" fill="#FF9800" font-size="10" font-family="Arial">bundles</text>

  <!-- Layer 4: Relay -->
  <text x="520" y="210" fill="#888" font-size="13" font-family="Arial" font-weight="bold">RELAYS</text>
  <rect x="500" y="225" width="120" height="50" rx="8" fill="url(#relayGrad)"/>
  <text x="560" y="248" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">MEV-Boost</text>
  <text x="560" y="263" text-anchor="middle" fill="white" font-size="10" font-family="Arial">max(bid₁, bid₂)</text>

  <!-- Arrows: Builders → Relay -->
  <line x1="370" y1="252" x2="500" y2="250" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="242" fill="#888" font-size="10" font-family="Arial">sealed bids</text>

  <!-- Layer 5: Proposer -->
  <text x="700" y="210" fill="#888" font-size="13" font-family="Arial" font-weight="bold">PROPOSER</text>
  <rect x="680" y="225" width="120" height="50" rx="8" fill="url(#proposerGrad)"/>
  <text x="740" y="248" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Validator</text>
  <text x="740" y="263" text-anchor="middle" fill="white" font-size="10" font-family="Arial">selects winner</text>

  <!-- Arrow: Relay → Proposer -->
  <line x1="620" y1="250" x2="680" y2="250" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MEV-Share Return Arrow -->
  <path d="M 740 225 Q 740 60 250 60 Q 70 60 70 80" fill="none" stroke="#4CAF50" stroke-width="2"
        stroke-dasharray="6,3" marker-end="url(#greenArrow)"/>
  <text x="500" y="55" fill="#4CAF50" font-size="11" font-weight="bold" font-family="Arial">
    MEV-Share: userShare × MEV returned to users ✓
  </text>

  <!-- Verified Properties Box -->
  <rect x="30" y="310" width="840" height="190" rx="10" fill="#1a2332" stroke="#2196F3" stroke-width="1"/>
  <text x="450" y="340" text-anchor="middle" fill="#64B5F6" font-size="16" font-weight="bold" font-family="Arial">
    ✓ Machine-Verified Theorems (Lean 4)
  </text>

  <text x="60" y="370" fill="#90CAF9" font-size="12" font-family="Arial">
    • competition_drives_bids: B₂ outbids B₁ when margin(B₂) > margin(B₁)
  </text>
  <text x="60" y="392" fill="#90CAF9" font-size="12" font-family="Arial">
    • specialization_beneficial: specEff × frac + eff × (1-frac) ≥ eff
  </text>
  <text x="60" y="414" fill="#90CAF9" font-size="12" font-family="Arial">
    • multi_relay_correctness: max(bid₁, bid₂) ≥ bid₁ ∧ max(bid₁, bid₂) ≥ bid₂
  </text>
  <text x="60" y="436" fill="#90CAF9" font-size="12" font-family="Arial">
    • mev_share_tradeoff: s₁ ≤ s₂ → (1-s₂)×MEV ≤ (1-s₁)×MEV
  </text>
  <text x="60" y="458" fill="#90CAF9" font-size="12" font-family="Arial">
    • delay_increases_mev: baseMEV + delay × growthRate > baseMEV
  </text>
  <text x="60" y="480" fill="#90CAF9" font-size="12" font-family="Arial">
    • mev_share_improves_welfare: 0 &lt; userShare × totalMEV
  </text>
</svg>
