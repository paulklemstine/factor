<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f1f5f9">
    IOF Factoring Pipeline
  </text>
  <text x="500" y="70" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">
    From orbit enumeration to factor extraction — with formally verified correctness at every step
  </text>

  <!-- Step 1: Orbit Generation -->
  <g transform="translate(130, 160)" filter="url(#glow)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="url(#step1)" opacity="0.95"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="11" fill="#bfdbfe" font-weight="bold">STEP 1</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Orbit Generation</text>
    <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#bfdbfe">x → x² → x⁴ → ... (mod n)</text>
    <text x="0" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#93c5fd">sqIter_eq_pow ✓</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="160" x2="340" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="295" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#94a3b8">enumerate</text>

  <!-- Step 2: Smooth Detection -->
  <g transform="translate(460, 160)" filter="url(#glow)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="url(#step2)" opacity="0.95"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="11" fill="#ddd6fe" font-weight="bold">STEP 2</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Smooth Detection</text>
    <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#ddd6fe">a² mod n = ∏pᵢᵉⁱ ?</text>
    <text x="0" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#c4b5fd">IOF.isSmooth ✓</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="580" y1="160" x2="670" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="625" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#94a3b8">collect</text>

  <!-- Step 3: Linear Algebra -->
  <g transform="translate(790, 160)" filter="url(#glow)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="url(#step3)" opacity="0.95"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fef3c7" font-weight="bold">STEP 3</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">GF(2) Linear Algebra</text>
    <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#fef3c7">∑ᵢ eᵢ ≡ 0 (mod 2)</text>
    <text x="0" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#fcd34d">IOF_factoring_correctness ✓</text>
  </g>

  <!-- Arrow 3→4 (going down) -->
  <line x1="790" y1="215" x2="790" y2="310" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="805" y="265" font-family="Arial" font-size="9" fill="#94a3b8">combine</text>

  <!-- Step 4: Congruence -->
  <g transform="translate(790, 380)" filter="url(#glow)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="url(#step4)" opacity="0.95"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="11" fill="#bbf7d0" font-weight="bold">STEP 4</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Congruence of Squares</text>
    <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#bbf7d0">x² ≡ y² (mod n)</text>
    <text x="0" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#6ee7b7">IOF_gcd_extraction ✓</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="675" y1="380" x2="580" y2="380" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="625" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#94a3b8">gcd</text>

  <!-- Step 5: Factor -->
  <g transform="translate(460, 380)" filter="url(#glow)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="url(#step5)" opacity="0.95"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fecaca" font-weight="bold">STEP 5</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Factor Extraction</text>
    <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#fecaca">gcd(x-y, n) = p</text>
    <text x="0" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#fca5a5">IOF_gcd_success_probability ✓</text>
  </g>

  <!-- Result box -->
  <g transform="translate(460, 520)" filter="url(#glow)">
    <rect x="-130" y="-30" width="260" height="60" rx="30" fill="#22c55e" opacity="0.9" stroke="#16a34a" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">n = p × q  ✓</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial" font-size="10" fill="#dcfce7">Formally verified factorization</text>
  </g>
  <line x1="460" y1="435" x2="460" y2="488" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- CRT insight box -->
  <g transform="translate(130, 380)">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-28" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8" font-weight="bold">KEY INSIGHT</text>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial" font-size="12" fill="#e2e8f0">CRT Decomposition</text>
    <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">orbit(n) ≅ orbit(p) × orbit(q)</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">IOF_orbit_CRT_decomposition ✓</text>
    <text x="0" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">IOF_orbit_period_divides_lcm ✓</text>
  </g>
  <line x1="130" y1="325" x2="130" y2="215" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="145" y="270" font-family="Arial" font-size="9" fill="#64748b">structural</text>
  <text x="145" y="282" font-family="Arial" font-size="9" fill="#64748b">advantage</text>

  <!-- Complexity box -->
  <g transform="translate(500, 620)">
    <rect x="-480" y="-30" width="960" height="55" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-450" y="-8" font-family="Arial" font-size="11" font-weight="bold" fill="#f1f5f9">Complexity:</text>
    <text x="-340" y="-8" font-family="monospace" font-size="11" fill="#fbbf24">L_n[1/2, c] = exp(c · √(ln n · ln ln n))</text>
    <text x="-450" y="14" font-family="Arial" font-size="10" fill="#94a3b8">Sub-exponential — faster than trial division, slower than polynomial</text>
    <text x="200" y="-8" font-family="Arial" font-size="10" fill="#94a3b8">IOF_subexponential_bound ✓</text>
    <text x="200" y="14" font-family="Arial" font-size="10" fill="#94a3b8">IOF_not_polynomial_unconditional ✓</text>
  </g>
</svg>
