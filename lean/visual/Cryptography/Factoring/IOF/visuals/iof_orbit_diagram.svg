<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1e293b">
    Integer Orbit Factoring (IOF) — Squaring Orbit Structure
  </text>
  <text x="450" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">
    n = 77 (= 7 × 11), starting value x = 2
  </text>

  <!-- Orbit mod 77 -->
  <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">
    Orbit mod 77
  </text>

  <!-- Orbit nodes: 2 → 4 → 16 → 25 → 9 → 4 (cycle) -->
  <g transform="translate(450, 200)">
    <!-- Tail: 2 → 4 -->
    <circle cx="-300" cy="0" r="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="-300" y="5" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#1e40af">2</text>
    <text x="-300" y="-35" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">x</text>

    <line x1="-270" y1="0" x2="-210" y2="0" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="-240" y="-10" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">x²</text>

    <!-- Cycle: 4 → 16 → 25 → 9 → 4 -->
    <circle cx="-180" cy="0" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="-180" y="5" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#166534">4</text>
    <text x="-180" y="20" text-anchor="middle" font-family="Arial" font-size="8" fill="#16a34a">2²-smooth✓</text>

    <line x1="-152" y1="-8" x2="-88" y2="-40" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

    <circle cx="-60" cy="-55" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="-60" y="-50" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#92400e">16</text>
    <text x="-60" y="-35" text-anchor="middle" font-family="Arial" font-size="8" fill="#d97706">2⁴-smooth✓</text>

    <line x1="-32" y1="-50" x2="32" y2="-50" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

    <circle cx="60" cy="-55" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="-50" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#92400e">25</text>
    <text x="60" y="-35" text-anchor="middle" font-family="Arial" font-size="8" fill="#d97706">5²-smooth✓</text>

    <line x1="88" y1="-40" x2="152" y2="-8" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

    <circle cx="180" cy="0" r="28" fill="#fecaca" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="180" y="5" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#991b1b">9</text>
    <text x="180" y="20" text-anchor="middle" font-family="Arial" font-size="8" fill="#dc2626">3²-smooth✓</text>

    <!-- Back arrow: 9 → 4 -->
    <path d="M 160 25 Q 0 120 -155 25" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
    <text x="0" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#16a34a" font-weight="bold">cycle!</text>
  </g>

  <!-- CRT Decomposition Section -->
  <text x="450" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">
    CRT Decomposition: orbit mod 77 ≅ orbit mod 7 × orbit mod 11
  </text>

  <!-- Orbit mod 7 -->
  <g transform="translate(180, 400)">
    <rect x="-150" y="-55" width="300" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-35" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1d4ed8">mod 7</text>

    <circle cx="-100" cy="15" r="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="-100" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">2</text>

    <line x1="-78" y1="15" x2="-32" y2="15" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="-10" cy="15" r="20" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
    <text x="-10" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#166534">4</text>

    <line x1="12" y1="15" x2="68" y2="15" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="90" cy="15" r="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400e">2</text>

    <path d="M 75 -5 Q -10 -30 -5 -5" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="40" y="-18" text-anchor="middle" font-family="Arial" font-size="9" fill="#16a34a">period=2</text>
  </g>

  <!-- × symbol -->
  <text x="450" y="405" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#64748b">×</text>

  <!-- Orbit mod 11 -->
  <g transform="translate(720, 400)">
    <rect x="-150" y="-55" width="300" height="110" rx="10" fill="#fefce8" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-35" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#92400e">mod 11</text>

    <circle cx="-100" cy="15" r="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="-100" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">2</text>

    <line x1="-78" y1="15" x2="-32" y2="15" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="-10" cy="15" r="20" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
    <text x="-10" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#166534">4</text>

    <line x1="12" y1="15" x2="68" y2="15" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="90" cy="15" r="20" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">5</text>

    <path d="M 75 -5 Q -10 -30 -5 -5" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="40" y="-18" text-anchor="middle" font-family="Arial" font-size="9" fill="#16a34a">period=4</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 530)">
    <rect width="840" height="55" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="22" font-family="Arial" font-size="11" font-weight="bold" fill="#1e293b">Legend:</text>
    <circle cx="100" cy="18" r="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
    <text x="115" y="22" font-family="Arial" font-size="11" fill="#334155">B-smooth value</text>
    <circle cx="240" cy="18" r="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="255" y="22" font-family="Arial" font-size="11" fill="#334155">Smooth (larger factors)</text>
    <circle cx="420" cy="18" r="8" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
    <text x="435" y="22" font-family="Arial" font-size="11" fill="#334155">Smooth (prime power)</text>
    <line x1="570" y1="18" x2="610" y2="18" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="620" y="22" font-family="Arial" font-size="11" fill="#334155">Cycle edge</text>
    <text x="20" y="44" font-family="Arial" font-size="10" fill="#64748b">
      Orbit period mod 77 = lcm(period mod 7, period mod 11) = lcm(2, 4) = 4 — verified by IOF_orbit_period_divides_lcm
    </text>
  </g>
</svg>
