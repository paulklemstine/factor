<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1a1a2e">
    Factoring Complexity Landscape
  </text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">
    Where IOF sits among known factoring algorithms (log-log scale)
  </text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="750" y2="420" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="420" x2="100" y2="80" stroke="#333" stroke-width="2"/>

  <!-- X-axis label -->
  <text x="425" y="460" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">
    Input size (bits of n) →
  </text>
  <!-- Y-axis label -->
  <text x="35" y="250" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90, 35, 250)">
    log₂(operations) →
  </text>

  <!-- X ticks -->
  <g font-family="Arial" font-size="10" fill="#666">
    <text x="150" y="438" text-anchor="middle">64</text>
    <text x="260" y="438" text-anchor="middle">256</text>
    <text x="370" y="438" text-anchor="middle">512</text>
    <text x="480" y="438" text-anchor="middle">1024</text>
    <text x="590" y="438" text-anchor="middle">2048</text>
    <text x="700" y="438" text-anchor="middle">4096</text>
  </g>

  <!-- Y ticks -->
  <g font-family="Arial" font-size="10" fill="#666">
    <text x="90" y="400" text-anchor="end">20</text>
    <text x="90" y="340" text-anchor="end">40</text>
    <text x="90" y="280" text-anchor="end">60</text>
    <text x="90" y="220" text-anchor="end">80</text>
    <text x="90" y="160" text-anchor="end">100</text>
    <text x="90" y="100" text-anchor="end">120</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3">
    <line x1="100" y1="400" x2="750" y2="400"/>
    <line x1="100" y1="340" x2="750" y2="340"/>
    <line x1="100" y1="280" x2="750" y2="280"/>
    <line x1="100" y1="220" x2="750" y2="220"/>
    <line x1="100" y1="160" x2="750" y2="160"/>
    <line x1="100" y1="100" x2="750" y2="100"/>
  </g>

  <!-- Trial Division: O(√n) = O(2^(b/2)) -->
  <polyline points="150,400 260,340 370,280 480,220 590,160 700,100"
    fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,4"/>
  <circle cx="700" cy="100" r="4" fill="#dc2626"/>
  <text x="715" y="100" font-family="Arial" font-size="10" fill="#dc2626" font-weight="bold">Trial Division</text>
  <text x="715" y="112" font-family="monospace" font-size="9" fill="#dc2626">O(√n) = exp</text>

  <!-- Pollard rho: O(n^(1/4)) = O(2^(b/4)) -->
  <polyline points="150,405 260,370 370,340 480,310 590,280 700,250"
    fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="700" cy="250" r="4" fill="#f59e0b"/>
  <text x="715" y="250" font-family="Arial" font-size="10" fill="#f59e0b" font-weight="bold">Pollard ρ</text>
  <text x="715" y="262" font-family="monospace" font-size="9" fill="#f59e0b">O(n^¼)</text>

  <!-- QS / IOF: L[1/2, 1] -->
  <polyline points="150,410 260,385 370,365 480,350 590,340 700,330"
    fill="none" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="700" cy="330" r="5" fill="#3b82f6"/>
  <text x="600" y="358" font-family="Arial" font-size="11" fill="#3b82f6" font-weight="bold">QS / IOF-Sieve</text>
  <text x="600" y="370" font-family="monospace" font-size="9" fill="#3b82f6">L_n[1/2, c] — sub-exp</text>

  <!-- NFS: L[1/3] -->
  <polyline points="150,412 260,398 370,388 480,382 590,378 700,375"
    fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <circle cx="700" cy="375" r="4" fill="#8b5cf6"/>
  <text x="715" y="375" font-family="Arial" font-size="10" fill="#8b5cf6" font-weight="bold">NFS</text>
  <text x="715" y="387" font-family="monospace" font-size="9" fill="#8b5cf6">L_n[1/3, c']</text>

  <!-- Shor (quantum): polynomial -->
  <polyline points="150,416 260,412 370,409 480,407 590,405 700,404"
    fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="700" cy="404" r="4" fill="#22c55e"/>
  <text x="715" y="404" font-family="Arial" font-size="10" fill="#22c55e" font-weight="bold">Shor (quantum)</text>
  <text x="715" y="416" font-family="monospace" font-size="9" fill="#22c55e">O(b³) = poly</text>

  <!-- IOF highlight region -->
  <rect x="550" y="310" width="165" height="50" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend box -->
  <g transform="translate(120, 80)">
    <rect width="200" height="60" rx="6" fill="white" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="10" y="18" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Complexity Classes:</text>
    <text x="10" y="33" font-family="Arial" font-size="9" fill="#dc2626">■ Exponential: trial division</text>
    <text x="10" y="46" font-family="Arial" font-size="9" fill="#3b82f6">■ Sub-exponential: QS, IOF, NFS</text>
    <text x="10" y="56" font-family="Arial" font-size="9" fill="#22c55e">■ Polynomial: Shor (quantum only)</text>
  </g>
</svg>
