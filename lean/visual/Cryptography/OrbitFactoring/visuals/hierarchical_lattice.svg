<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <marker id="harr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a" font-weight="bold">
    Hierarchical Orbit Decomposition
  </text>
  <text x="350" y="52" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">
    n = p₁ × p₂ × p₃ — Divisor lattice of orbit projections
  </text>

  <!-- Level 0: n = p1*p2*p3 (top) -->
  <rect x="250" y="75" width="200" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="95" text-anchor="middle" font-family="Arial" font-size="13" fill="#166534" font-weight="bold">n = p₁p₂p₃</text>
  <text x="350" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#15803d">Period = lcm(λ₁, λ₂, λ₃)</text>

  <!-- Level 1: two-factor products -->
  <!-- p1*p2 -->
  <line x1="290" y1="120" x2="150" y2="170" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="60" y="170" width="160" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#1d4ed8" font-weight="bold">p₁p₂</text>
  <text x="140" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#2563eb">Period = lcm(λ₁, λ₂)</text>

  <!-- p1*p3 -->
  <line x1="350" y1="120" x2="350" y2="170" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="270" y="170" width="160" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#1d4ed8" font-weight="bold">p₁p₃</text>
  <text x="350" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#2563eb">Period = lcm(λ₁, λ₃)</text>

  <!-- p2*p3 -->
  <line x1="410" y1="120" x2="550" y2="170" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="480" y="170" width="160" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="560" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#1d4ed8" font-weight="bold">p₂p₃</text>
  <text x="560" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#2563eb">Period = lcm(λ₂, λ₃)</text>

  <!-- Level 2: single primes -->
  <!-- p1 -->
  <line x1="110" y1="215" x2="110" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <line x1="320" y1="215" x2="150" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="50" y="280" width="130" height="45" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="115" y="300" text-anchor="middle" font-family="Arial" font-size="13" fill="#92400e" font-weight="bold">p₁</text>
  <text x="115" y="317" text-anchor="middle" font-family="Arial" font-size="10" fill="#b45309">Period = λ₁</text>

  <!-- p2 -->
  <line x1="170" y1="215" x2="350" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <line x1="530" y1="215" x2="380" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="285" y="280" width="130" height="45" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="350" y="300" text-anchor="middle" font-family="Arial" font-size="13" fill="#92400e" font-weight="bold">p₂</text>
  <text x="350" y="317" text-anchor="middle" font-family="Arial" font-size="10" fill="#b45309">Period = λ₂</text>

  <!-- p3 -->
  <line x1="380" y1="215" x2="570" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <line x1="590" y1="215" x2="590" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="520" y="280" width="130" height="45" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="585" y="300" text-anchor="middle" font-family="Arial" font-size="13" fill="#92400e" font-weight="bold">p₃</text>
  <text x="585" y="317" text-anchor="middle" font-family="Arial" font-size="10" fill="#b45309">Period = λ₃</text>

  <!-- Level 3: trivial (1) -->
  <line x1="115" y1="325" x2="340" y2="375" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <line x1="350" y1="325" x2="350" y2="375" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <line x1="585" y1="325" x2="360" y2="375" stroke="#6b7280" stroke-width="1.5" marker-end="url(#harr)"/>
  <rect x="300" y="375" width="100" height="40" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="350" y="400" text-anchor="middle" font-family="Arial" font-size="13" fill="#374151" font-weight="bold">1</text>

  <!-- Key insight box -->
  <rect x="100" y="435" width="500" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="455" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1e40af" font-style="italic">
    Key: A collision at any level reveals the corresponding factor.
  </text>
  <text x="350" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#1e40af">
    Period divisibility: λ_d | λ_n for every d | n (Theorem 3.6)
  </text>
</svg>
