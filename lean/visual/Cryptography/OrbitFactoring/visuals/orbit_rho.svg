<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1a1a1a" font-weight="bold">
    The ρ-Shaped Orbit
  </text>
  <text x="300" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">
    Orbit of f(x) = x² + 1 mod 8051 (= 83 × 97)
  </text>

  <!-- Tail (rho stem) -->
  <!-- x₀ = 2 -->
  <circle cx="80" cy="400" r="18" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
  <text x="80" y="405" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">2</text>
  <text x="80" y="430" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">x₀</text>

  <!-- x₁ = 5 -->
  <line x1="98" y1="395" x2="132" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <circle cx="150" cy="360" r="18" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="365" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">5</text>
  <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">x₁</text>

  <!-- x₂ = 26 -->
  <line x1="165" y1="345" x2="195" y2="315" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <circle cx="210" cy="305" r="18" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">26</text>
  <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">x₂</text>

  <!-- x₃ = 677 -->
  <line x1="225" y1="290" x2="258" y2="262" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <circle cx="275" cy="250" r="18" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
  <text x="275" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e40af">677</text>
  <text x="275" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">x₃</text>

  <!-- Cycle entry point -->
  <line x1="290" y1="237" x2="332" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Cycle (circle of nodes) -->
  <!-- Cycle center at (400, 220), radius 80 -->
  <!-- Node at angle 180° (entry point) -->
  <circle cx="320" cy="220" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="320" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">2839</text>

  <!-- Node at 225° -->
  <circle cx="343" cy="277" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="343" y="282" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">1056</text>

  <!-- Node at 270° -->
  <circle cx="400" cy="300" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">7077</text>

  <!-- Node at 315° -->
  <circle cx="457" cy="277" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="457" y="282" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">3555</text>

  <!-- Node at 0° -->
  <circle cx="480" cy="220" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="480" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">4963</text>

  <!-- Node at 45° -->
  <circle cx="457" cy="163" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="457" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">612</text>

  <!-- Node at 90° -->
  <circle cx="400" cy="140" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">5765</text>

  <!-- Node at 135° -->
  <circle cx="343" cy="163" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="343" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e">2198</text>

  <!-- Cycle arrows (connecting nodes in the cycle) -->
  <path d="M 335 233 Q 330 258 340 264" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 357 290 Q 375 300 387 298" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 415 293 Q 438 290 448 280" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 468 263 Q 478 248 480 237" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 475 205 Q 470 185 462 175" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 445 152 Q 428 142 413 140" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 387 145 Q 368 150 352 158" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 335 175 Q 325 192 322 205" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Labels -->
  <text x="120" y="460" font-family="Arial" font-size="11" fill="#2563eb">
    Tail (τ = 4 steps)
  </text>
  <text x="370" y="350" font-family="Arial" font-size="11" fill="#d97706">
    Cycle (λ = 8 steps)
  </text>

  <!-- Legend -->
  <rect x="20" y="75" width="200" height="60" fill="white" stroke="#ccc" rx="4"/>
  <circle cx="40" cy="95" r="8" fill="#e0f2fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="55" y="99" font-family="Arial" font-size="11" fill="#333">Tail nodes</text>
  <circle cx="40" cy="120" r="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="55" y="124" font-family="Arial" font-size="11" fill="#333">Cycle nodes</text>

  <!-- Formula -->
  <text x="300" y="475" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#333" font-style="italic">
    gcd(x_i − x_j, n) reveals factor when shadow orbits collide
  </text>
</svg>
