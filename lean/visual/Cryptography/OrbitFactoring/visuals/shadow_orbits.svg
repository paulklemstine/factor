<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1a1a1a" font-weight="bold">
    Shadow Orbit Decomposition
  </text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">
    n = p × q: The orbit mod n projects onto shadow orbits mod p and mod q
  </text>

  <!-- Main orbit (top) -->
  <rect x="50" y="80" width="700" height="130" rx="8" fill="url(#grad-green)" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="14" fill="#15803d" font-weight="bold">
    Full Orbit mod n = pq
  </text>

  <!-- Full orbit nodes -->
  <g font-family="monospace" font-size="10">
    <circle cx="120" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="120" y="154" text-anchor="middle" fill="#166534">x₀</text>

    <line x1="140" y1="150" x2="172" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="195" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="154" text-anchor="middle" fill="#166534">x₁</text>

    <line x1="215" y1="150" x2="247" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="270" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="270" y="154" text-anchor="middle" fill="#166534">x₂</text>

    <line x1="290" y1="150" x2="322" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="345" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="345" y="154" text-anchor="middle" fill="#166534">x₃</text>

    <line x1="365" y1="150" x2="397" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="420" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="420" y="154" text-anchor="middle" fill="#166534">x₄</text>

    <line x1="440" y1="150" x2="472" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="495" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="495" y="154" text-anchor="middle" fill="#166534">x₅</text>

    <line x1="515" y1="150" x2="547" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="570" cy="150" r="20" fill="#f87171" stroke="#dc2626" stroke-width="3"/>
    <text x="570" y="154" text-anchor="middle" fill="#7f1d1d" font-weight="bold">x₆</text>

    <line x1="590" y1="150" x2="622" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <circle cx="645" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="645" y="154" text-anchor="middle" fill="#166534">x₇</text>

    <text x="700" y="154" font-family="Arial" font-size="14" fill="#555">···</text>
  </g>

  <!-- Projection arrows -->
  <text x="200" y="235" text-anchor="middle" font-family="Arial" font-size="12" fill="#2563eb">π_p</text>
  <line x1="200" y1="210" x2="200" y2="260" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>

  <text x="600" y="235" text-anchor="middle" font-family="Arial" font-size="12" fill="#dc2626">π_q</text>
  <line x1="600" y1="210" x2="600" y2="260" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>

  <!-- Shadow orbit mod p (bottom left) -->
  <rect x="50" y="270" width="340" height="120" rx="8" fill="url(#grad-blue)" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="220" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#1d4ed8" font-weight="bold">
    Shadow Orbit mod p (smaller!)
  </text>

  <g font-family="monospace" font-size="10">
    <circle cx="100" cy="340" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="100" y="344" text-anchor="middle" fill="#1e40af">a₀</text>

    <line x1="118" y1="340" x2="147" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <circle cx="165" cy="340" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="165" y="344" text-anchor="middle" fill="#1e40af">a₁</text>

    <line x1="183" y1="340" x2="212" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <circle cx="230" cy="340" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="230" y="344" text-anchor="middle" fill="#1e40af">a₂</text>

    <line x1="248" y1="340" x2="277" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <!-- COLLISION! a₃ = a₀ -->
    <circle cx="295" cy="340" r="18" fill="#fbbf24" stroke="#dc2626" stroke-width="3"/>
    <text x="295" y="344" text-anchor="middle" fill="#7f1d1d" font-weight="bold">a₃=a₀</text>
    <text x="295" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#dc2626" font-weight="bold">COLLISION!</text>
  </g>

  <!-- Shadow orbit mod q (bottom right) -->
  <rect x="410" y="270" width="340" height="120" rx="8" fill="url(#grad-red)" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="580" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#b91c1c" font-weight="bold">
    Shadow Orbit mod q (larger)
  </text>

  <g font-family="monospace" font-size="10">
    <circle cx="460" cy="340" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="460" y="344" text-anchor="middle" fill="#991b1b">b₀</text>

    <line x1="478" y1="340" x2="507" y2="340" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
    <circle cx="525" cy="340" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="525" y="344" text-anchor="middle" fill="#991b1b">b₁</text>

    <line x1="543" y1="340" x2="572" y2="340" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
    <circle cx="590" cy="340" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="590" y="344" text-anchor="middle" fill="#991b1b">b₂</text>

    <line x1="608" y1="340" x2="637" y2="340" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
    <circle cx="655" cy="340" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="655" y="344" text-anchor="middle" fill="#991b1b">b₃</text>

    <text x="695" y="344" font-family="Arial" font-size="14" fill="#555">···</text>
  </g>

  <!-- Factor discovery box -->
  <rect x="120" y="420" width="560" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c2410c" font-weight="bold">
    Factor Discovery
  </text>
  <text x="400" y="470" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">
    At step 3: x₃ ≡ x₀ (mod p) but x₃ ≢ x₀ (mod n)
  </text>
  <text x="400" y="492" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#1a1a1a" font-style="italic">
    ⟹ gcd(x₃ − x₀, n) = p — nontrivial factor found!
  </text>
  <text x="400" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">
    Birthday bound: collision expected after ~√p steps (much less than √n)
  </text>
</svg>
