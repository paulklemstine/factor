<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">
    Factor Quadruple Graph for n = 210
  </text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-size="13">
    Vertices = factor pairs (a,b) with ab = 210. Edges = shared prime factors in first components.
  </text>

  <!-- Edges (drawn first, behind vertices) -->
  <g stroke-width="2" opacity="0.5">
    <!-- gcd(2,6)=2 -->
    <line x1="200" y1="200" x2="350" y2="150" stroke="#ff6666"/>
    <!-- gcd(2,10)=2 -->
    <line x1="200" y1="200" x2="500" y2="200" stroke="#ff6666"/>
    <!-- gcd(2,14)=2 -->
    <line x1="200" y1="200" x2="600" y2="300" stroke="#ff6666"/>
    <!-- gcd(3,6)=3 -->
    <line x1="250" y1="350" x2="350" y2="150" stroke="#66ff66"/>
    <!-- gcd(5,10)=5 -->
    <line x1="350" y1="400" x2="500" y2="200" stroke="#6666ff"/>
    <!-- gcd(6,10)=2 -->
    <line x1="350" y1="150" x2="500" y2="200" stroke="#ff6666"/>
    <!-- gcd(6,14)=2 -->
    <line x1="350" y1="150" x2="600" y2="300" stroke="#ff6666"/>
    <!-- gcd(7,14)=7 -->
    <line x1="450" y1="450" x2="600" y2="300" stroke="#ffaa00"/>
    <!-- gcd(10,14)=2 -->
    <line x1="500" y1="200" x2="600" y2="300" stroke="#ff6666"/>
  </g>

  <!-- Isolated vertex (1, 210) -->
  <circle cx="120" cy="300" r="25" fill="#1a1a3e" stroke="#4466aa" stroke-width="2" filter="url(#glow2)"/>
  <text x="120" y="296" text-anchor="middle" fill="#aabbff" font-size="11" font-weight="bold">(1, 210)</text>
  <text x="120" y="310" text-anchor="middle" fill="#667799" font-size="9">isolated</text>

  <!-- (2, 105) -->
  <circle cx="200" cy="200" r="25" fill="#3a1a1a" stroke="#ff6666" stroke-width="2" filter="url(#glow2)"/>
  <text x="200" y="196" text-anchor="middle" fill="#ffaaaa" font-size="11" font-weight="bold">(2, 105)</text>
  <text x="200" y="210" text-anchor="middle" fill="#996666" font-size="9">p=2</text>

  <!-- (3, 70) -->
  <circle cx="250" cy="350" r="25" fill="#1a3a1a" stroke="#66ff66" stroke-width="2" filter="url(#glow2)"/>
  <text x="250" y="346" text-anchor="middle" fill="#aaffaa" font-size="11" font-weight="bold">(3, 70)</text>
  <text x="250" y="360" text-anchor="middle" fill="#669966" font-size="9">p=3</text>

  <!-- (5, 42) -->
  <circle cx="350" cy="400" r="25" fill="#1a1a3a" stroke="#6666ff" stroke-width="2" filter="url(#glow2)"/>
  <text x="350" y="396" text-anchor="middle" fill="#aaaaff" font-size="11" font-weight="bold">(5, 42)</text>
  <text x="350" y="410" text-anchor="middle" fill="#666699" font-size="9">p=5</text>

  <!-- (6, 35) — linked to 2 and 3 -->
  <circle cx="350" cy="150" r="28" fill="#3a2a1a" stroke="#ffaa44" stroke-width="2.5" filter="url(#glow2)"/>
  <text x="350" y="146" text-anchor="middle" fill="#ffcc88" font-size="11" font-weight="bold">(6, 35)</text>
  <text x="350" y="160" text-anchor="middle" fill="#997744" font-size="9">p=2,3</text>

  <!-- (7, 30) -->
  <circle cx="450" cy="450" r="25" fill="#3a3a1a" stroke="#ffaa00" stroke-width="2" filter="url(#glow2)"/>
  <text x="450" y="446" text-anchor="middle" fill="#ffdd88" font-size="11" font-weight="bold">(7, 30)</text>
  <text x="450" y="460" text-anchor="middle" fill="#998844" font-size="9">p=7</text>

  <!-- (10, 21) — linked to 2 and 5 -->
  <circle cx="500" cy="200" r="28" fill="#2a1a3a" stroke="#cc44ff" stroke-width="2.5" filter="url(#glow2)"/>
  <text x="500" y="196" text-anchor="middle" fill="#dd88ff" font-size="11" font-weight="bold">(10, 21)</text>
  <text x="500" y="210" text-anchor="middle" fill="#885599" font-size="9">p=2,5</text>

  <!-- (14, 15) — linked to 2 and 7 -->
  <circle cx="600" cy="300" r="28" fill="#3a1a2a" stroke="#ff44aa" stroke-width="2.5" filter="url(#glow2)"/>
  <text x="600" y="296" text-anchor="middle" fill="#ff88cc" font-size="11" font-weight="bold">(14, 15)</text>
  <text x="600" y="310" text-anchor="middle" fill="#994466" font-size="9">p=2,7</text>

  <!-- Legend -->
  <rect x="580" y="400" width="200" height="170" rx="8" fill="#111122" stroke="#333344" opacity="0.95"/>
  <text x="600" y="425" fill="#e6edf3" font-size="14" font-weight="bold">Edge colors</text>
  <line x1="600" y1="445" x2="625" y2="445" stroke="#ff6666" stroke-width="3"/>
  <text x="635" y="449" fill="#ccccdd" font-size="11">Shared factor 2</text>
  <line x1="600" y1="468" x2="625" y2="468" stroke="#66ff66" stroke-width="3"/>
  <text x="635" y="472" fill="#ccccdd" font-size="11">Shared factor 3</text>
  <line x1="600" y1="491" x2="625" y2="491" stroke="#6666ff" stroke-width="3"/>
  <text x="635" y="495" fill="#ccccdd" font-size="11">Shared factor 5</text>
  <line x1="600" y1="514" x2="625" y2="514" stroke="#ffaa00" stroke-width="3"/>
  <text x="635" y="518" fill="#ccccdd" font-size="11">Shared factor 7</text>
  <text x="600" y="550" fill="#8b949e" font-size="10">9 edges, 2 components</text>
  <text x="600" y="563" fill="#8b949e" font-size="10">(1 isolated + 7 connected)</text>

  <!-- Caption -->
  <text x="400" y="585" text-anchor="middle" fill="#8b949e" font-size="11">
    The graph structure reveals the prime factorization: 210 = 2 × 3 × 5 × 7
  </text>
</svg>
