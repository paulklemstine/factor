<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e0e0ff" font-size="22" font-weight="bold">
    The Divisor Hyperbola: xy = 210
  </text>
  <text x="400" y="62" text-anchor="middle" fill="#8888cc" font-size="13">
    Lattice points on the rectangular hyperbola encode the factorization of n
  </text>

  <!-- Axes -->
  <line x1="80" y1="520" x2="750" y2="520" stroke="#556" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="520" x2="80" y2="80" stroke="#556" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760" y="525" fill="#889" font-size="12">d</text>
  <text x="75" y="75" fill="#889" font-size="12">n/d</text>

  <!-- Grid lines -->
  <g stroke="#223" stroke-width="0.5">
    <line x1="80" y1="520" x2="750" y2="520"/>
    <line x1="80" y1="420" x2="750" y2="420"/>
    <line x1="80" y1="320" x2="750" y2="320"/>
    <line x1="80" y1="220" x2="750" y2="220"/>
    <line x1="80" y1="120" x2="750" y2="120"/>
    <line x1="180" y1="80" x2="180" y2="520"/>
    <line x1="280" y1="80" x2="280" y2="520"/>
    <line x1="380" y1="80" x2="380" y2="520"/>
    <line x1="480" y1="80" x2="480" y2="520"/>
    <line x1="580" y1="80" x2="580" y2="520"/>
    <line x1="680" y1="80" x2="680" y2="520"/>
  </g>

  <!-- Axis labels -->
  <g fill="#667" font-size="10" text-anchor="middle">
    <text x="80" y="535">0</text>
    <text x="180" y="535">30</text>
    <text x="280" y="535">60</text>
    <text x="380" y="535">90</text>
    <text x="480" y="535">120</text>
    <text x="580" y="535">150</text>
    <text x="680" y="535">180</text>
  </g>
  <g fill="#667" font-size="10" text-anchor="end">
    <text x="75" y="524">0</text>
    <text x="75" y="424">50</text>
    <text x="75" y="324">100</text>
    <text x="75" y="224">150</text>
    <text x="75" y="124">200</text>
  </g>

  <!-- Hyperbola curve xy = 210 (smooth) -->
  <path d="M 90,120 Q 100,200 120,320 Q 140,380 180,440 Q 220,470 280,490 Q 380,505 480,512 Q 580,515 680,518"
        fill="none" stroke="#4466aa" stroke-width="2" opacity="0.4"/>

  <!-- √n line (diagonal symmetry) -->
  <line x1="80" y1="520" x2="520" y2="80" stroke="#ffaa00" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="310" y="275" fill="#ffaa00" font-size="11" opacity="0.6" transform="rotate(-45, 310, 275)">d = n/d (√n ≈ 14.5)</text>

  <!-- Divisor points: (d, n/d) for 210 = 2·3·5·7 -->
  <!-- Scale: x = 80 + d*10/3, y = 520 - (n/d)*2 -->

  <!-- (1, 210) -->
  <circle cx="83" cy="100" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="93" y="95" fill="#ff8899" font-size="10">(1, 210)</text>

  <!-- (2, 105) -->
  <circle cx="87" cy="310" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="97" y="305" fill="#ff8899" font-size="10">(2, 105)</text>

  <!-- (3, 70) -->
  <circle cx="90" cy="380" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="100" y="375" fill="#ff8899" font-size="10">(3, 70)</text>

  <!-- (5, 42) -->
  <circle cx="97" cy="436" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="107" y="431" fill="#ff8899" font-size="10">(5, 42)</text>

  <!-- (6, 35) -->
  <circle cx="100" cy="450" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="110" y="445" fill="#ff8899" font-size="10">(6, 35)</text>

  <!-- (7, 30) -->
  <circle cx="103" cy="460" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="113" y="458" fill="#ff8899" font-size="10">(7, 30)</text>

  <!-- (10, 21) -->
  <circle cx="113" cy="478" r="6" fill="#44ff66" filter="url(#glow)"/>
  <text x="123" y="475" fill="#88ff99" font-size="10">(10, 21)</text>

  <!-- (14, 15) — closest to √n -->
  <circle cx="127" cy="490" r="8" fill="#ffdd44" filter="url(#glow)"/>
  <text x="137" y="487" fill="#ffee88" font-size="11" font-weight="bold">(14, 15) ← nearest √n</text>

  <!-- (15, 14) — closest to √n -->
  <circle cx="130" cy="492" r="8" fill="#ffdd44" filter="url(#glow)"/>
  <text x="140" y="503" fill="#ffee88" font-size="11" font-weight="bold">(15, 14)</text>

  <!-- (21, 10) -->
  <circle cx="150" cy="500" r="6" fill="#44ff66" filter="url(#glow)"/>
  <text x="160" y="498" fill="#88ff99" font-size="10">(21, 10)</text>

  <!-- (30, 7) -->
  <circle cx="180" cy="506" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="190" y="504" fill="#ff8899" font-size="10">(30, 7)</text>

  <!-- (35, 6) -->
  <circle cx="197" cy="508" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="207" y="508" fill="#ff8899" font-size="10">(35, 6)</text>

  <!-- (42, 5) -->
  <circle cx="220" cy="510" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="230" y="510" fill="#ff8899" font-size="10">(42, 5)</text>

  <!-- (70, 3) -->
  <circle cx="313" cy="514" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="323" y="514" fill="#ff8899" font-size="10">(70, 3)</text>

  <!-- (105, 2) -->
  <circle cx="430" cy="516" r="6" fill="#ff4466" filter="url(#glow)"/>
  <text x="440" y="516" fill="#ff8899" font-size="10">(105, 2)</text>

  <!-- (210, 1) -->
  <circle cx="780" cy="518" r="6" fill="#ff4466" filter="url(#glow)"/>

  <!-- Legend -->
  <rect x="500" y="90" width="260" height="130" rx="8" fill="#111133" stroke="#334" opacity="0.9"/>
  <text x="520" y="115" fill="#e0e0ff" font-size="14" font-weight="bold">Legend</text>
  <circle cx="530" cy="135" r="5" fill="#ff4466"/>
  <text x="545" y="140" fill="#ccccee" font-size="12">Divisor pair (d, n/d)</text>
  <circle cx="530" cy="160" r="5" fill="#44ff66"/>
  <text x="545" y="165" fill="#ccccee" font-size="12">Close to √n (easy to find)</text>
  <circle cx="530" cy="185" r="7" fill="#ffdd44"/>
  <text x="545" y="190" fill="#ccccee" font-size="12">Nearest to √n (Fermat target)</text>
  <line x1="520" y1="205" x2="545" y2="205" stroke="#ffaa00" stroke-dasharray="4,3"/>
  <text x="555" y="210" fill="#ccccee" font-size="12">Symmetry axis d = n/d</text>

  <!-- Caption -->
  <text x="400" y="575" text-anchor="middle" fill="#8888bb" font-size="11">
    n = 210 = 2 × 3 × 5 × 7 has 16 divisor points on the hyperbola xy = 210
  </text>
</svg>
