<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="700" height="400" fill="url(#bg4)"/>

  <text x="350" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">
    Idempotent Decomposition: 1 = e + (1-e)
  </text>
  <text x="350" y="50" text-anchor="middle" fill="#aaa" font-size="11">
    Formally verified: idempotent_complement, idempotent_orthogonal_right/left
  </text>

  <!-- The big square = Identity -->
  <rect x="50" y="80" width="280" height="280" rx="5" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="190" y="375" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">V (full space)</text>
  <text x="190" y="74" text-anchor="middle" fill="#aaa" font-size="11">1 = e + (1-e)</text>

  <!-- e part -->
  <rect x="52" y="82" width="100" height="276" rx="3" fill="#e94560" opacity="0.6"/>
  <text x="102" y="225" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">e</text>
  <text x="102" y="250" text-anchor="middle" fill="#fff" font-size="11">e² = e</text>

  <!-- (1-e) part -->
  <rect x="154" y="82" width="174" height="276" rx="3" fill="#0f3460" opacity="0.6"/>
  <text x="241" y="225" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">1-e</text>
  <text x="241" y="250" text-anchor="middle" fill="#fff" font-size="11">(1-e)² = 1-e</text>

  <!-- Orthogonality -->
  <text x="153" y="170" text-anchor="middle" fill="#ffc300" font-size="14" font-weight="bold">⊥</text>
  <text x="153" y="190" text-anchor="middle" fill="#ffc300" font-size="9">e(1-e)=0</text>

  <!-- Right side: Applications -->
  <g transform="translate(420, 90)">
    <text x="0" y="0" fill="#52b788" font-size="14" font-weight="bold">Applications:</text>

    <rect x="0" y="15" width="250" height="50" rx="5" fill="#1b4332" stroke="#52b788" stroke-width="1"/>
    <text x="125" y="35" text-anchor="middle" fill="#52b788" font-size="11" font-weight="bold">Hecke Algebra</text>
    <text x="125" y="52" text-anchor="middle" fill="#95d5b2" font-size="9">Bernstein center: 1 = Σ eᵢ</text>

    <rect x="0" y="75" width="250" height="50" rx="5" fill="#3c1642" stroke="#c77dff" stroke-width="1"/>
    <text x="125" y="95" text-anchor="middle" fill="#c77dff" font-size="11" font-weight="bold">Temperley-Lieb TLₙ(δ)</text>
    <text x="125" y="112" text-anchor="middle" fill="#e0aaff" font-size="9">At δ=2: (eᵢ/2)² = eᵢ/2 ✓</text>

    <rect x="0" y="135" width="250" height="50" rx="5" fill="#3d0000" stroke="#ff6b6b" stroke-width="1"/>
    <text x="125" y="155" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">Quantum Channels</text>
    <text x="125" y="172" text-anchor="middle" fill="#ffa8a8" font-size="9">Projective measurement: Σ Pᵢ = I</text>

    <rect x="0" y="195" width="250" height="50" rx="5" fill="#002855" stroke="#48cae4" stroke-width="1"/>
    <text x="125" y="215" text-anchor="middle" fill="#48cae4" font-size="11" font-weight="bold">Jones-Wenzl</text>
    <text x="125" y="232" text-anchor="middle" fill="#90e0ef" font-size="9">cos(π/(n+1)) > -1 ✓</text>

    <rect x="0" y="255" width="250" height="50" rx="5" fill="#462b00" stroke="#ffc300" stroke-width="1"/>
    <text x="125" y="275" text-anchor="middle" fill="#ffc300" font-size="11" font-weight="bold">Karoubi Envelope</text>
    <text x="125" y="292" text-anchor="middle" fill="#ffe066" font-size="9">C → Karoubi(C): idempotent completion</text>
  </g>
</svg>
