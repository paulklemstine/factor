<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Cross-Domain Bridges &amp; The Langlands Program
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#aaa" font-size="12">
    Formalized in Lean 4 with Mathlib — 25+ Machine-Verified Theorems
  </text>

  <!-- Number Theory Island -->
  <g transform="translate(100, 180)">
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="#1b4332" stroke="#52b788" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" fill="#52b788" font-size="14" font-weight="bold">Number Theory</text>
    <text x="0" y="-10" text-anchor="middle" fill="#95d5b2" font-size="10">Primes, L-functions</text>
    <text x="0" y="8" text-anchor="middle" fill="#95d5b2" font-size="10">Galois representations</text>
    <text x="0" y="26" text-anchor="middle" fill="#95d5b2" font-size="10">Riemann Hypothesis</text>
    <text x="0" y="50" text-anchor="middle" fill="#b7e4c7" font-size="9" font-style="italic">ζ_K(s), Cl(K)</text>
  </g>

  <!-- Graph Theory Island -->
  <g transform="translate(450, 130)">
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="#3c1642" stroke="#c77dff" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" fill="#c77dff" font-size="14" font-weight="bold">Graph Theory</text>
    <text x="0" y="-10" text-anchor="middle" fill="#e0aaff" font-size="10">Ihara zeta function</text>
    <text x="0" y="8" text-anchor="middle" fill="#e0aaff" font-size="10">Ramanujan graphs</text>
    <text x="0" y="26" text-anchor="middle" fill="#e0aaff" font-size="10">Chip-firing</text>
    <text x="0" y="50" text-anchor="middle" fill="#e0aaff" font-size="9" font-style="italic">ζ_G(u), Jac(G)</text>
  </g>

  <!-- Representation Theory Island -->
  <g transform="translate(800, 180)">
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="#3d0000" stroke="#ff6b6b" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Representation Theory</text>
    <text x="0" y="-10" text-anchor="middle" fill="#ffa8a8" font-size="10">Automorphic forms</text>
    <text x="0" y="8" text-anchor="middle" fill="#ffa8a8" font-size="10">Hecke algebras</text>
    <text x="0" y="26" text-anchor="middle" fill="#ffa8a8" font-size="10">Idempotent decomp.</text>
    <text x="0" y="50" text-anchor="middle" fill="#ffa8a8" font-size="9" font-style="italic">TL_n(δ), Karoubi(C)</text>
  </g>

  <!-- Tropical Geometry Island -->
  <g transform="translate(200, 380)">
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="#002855" stroke="#48cae4" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" fill="#48cae4" font-size="14" font-weight="bold">Tropical Geometry</text>
    <text x="0" y="-10" text-anchor="middle" fill="#90e0ef" font-size="10">Tropical Jacobians</text>
    <text x="0" y="8" text-anchor="middle" fill="#90e0ef" font-size="10">Baker-Norine theorem</text>
    <text x="0" y="26" text-anchor="middle" fill="#90e0ef" font-size="10">Linear equivalence</text>
    <text x="0" y="50" text-anchor="middle" fill="#90e0ef" font-size="9" font-style="italic">Pic⁰(G), K = deg-2</text>
  </g>

  <!-- Category Theory Island -->
  <g transform="translate(650, 380)">
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="#462b00" stroke="#ffc300" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" fill="#ffc300" font-size="14" font-weight="bold">Category Theory</text>
    <text x="0" y="-10" text-anchor="middle" fill="#ffe066" font-size="10">Adjunctions (F ⊣ G)</text>
    <text x="0" y="8" text-anchor="middle" fill="#ffe066" font-size="10">Bridge composition</text>
    <text x="0" y="26" text-anchor="middle" fill="#ffe066" font-size="10">Bridge hierarchy</text>
    <text x="0" y="50" text-anchor="middle" fill="#ffe066" font-size="9" font-style="italic">Stone → ... → HoTT</text>
  </g>

  <!-- Analysis Island -->
  <g transform="translate(450, 480)">
    <ellipse cx="0" cy="0" rx="110" ry="55" fill="#1a3a1a" stroke="#80ed99" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" fill="#80ed99" font-size="14" font-weight="bold">Analysis</text>
    <text x="0" y="0" text-anchor="middle" fill="#b5f5c8" font-size="10">Riemann sums → ∫</text>
    <text x="0" y="18" text-anchor="middle" fill="#b5f5c8" font-size="10">Spectral convergence</text>
    <text x="0" y="40" text-anchor="middle" fill="#b5f5c8" font-size="9" font-style="italic">Rₙ(f) → ∫₀¹ f dx</text>
  </g>

  <!-- Bridge Arrows -->
  <g filter="url(#glow)">
    <!-- Number Theory ↔ Graph Theory -->
    <line x1="200" y1="150" x2="350" y2="140" stroke="#e94560" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="275" y="130" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Ihara ↔ Dedekind</text>

    <!-- Graph Theory ↔ Representation Theory -->
    <line x1="550" y1="150" x2="700" y2="160" stroke="#ff6b6b" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="625" y="140" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="bold">Spectral ↔ Hecke</text>

    <!-- Number Theory ↔ Tropical -->
    <line x1="130" y1="250" x2="180" y2="310" stroke="#48cae4" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="120" y="290" text-anchor="middle" fill="#48cae4" font-size="9" font-weight="bold">Cl(K) ↔ Jac(G)</text>

    <!-- Graph Theory ↔ Tropical -->
    <line x1="400" y1="195" x2="280" y2="330" stroke="#7b68ee" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="310" y="260" text-anchor="middle" fill="#7b68ee" font-size="9" font-weight="bold">Divisors ↔ Chips</text>

    <!-- Representation Theory ↔ Category Theory -->
    <line x1="760" y1="250" x2="700" y2="315" stroke="#ffc300" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="760" y="290" text-anchor="middle" fill="#ffc300" font-size="9" font-weight="bold">Karoubi</text>

    <!-- Category Theory ↔ Analysis -->
    <line x1="570" y1="420" x2="510" y2="450" stroke="#80ed99" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="560" y="445" text-anchor="middle" fill="#80ed99" font-size="9" font-weight="bold">Limits</text>

    <!-- Tropical ↔ Analysis -->
    <line x1="290" y1="430" x2="370" y2="460" stroke="#80ed99" stroke-width="3" stroke-dasharray="8,4"/>
  </g>

  <!-- Central "L-functions" Node -->
  <g transform="translate(450, 280)">
    <circle cx="0" cy="0" r="40" fill="#e94560" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">L-functions</text>
    <text x="0" y="10" text-anchor="middle" fill="#fff" font-size="10">Rosetta Stone</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 560)">
    <rect width="840" height="70" rx="5" fill="#0a0a1a" stroke="#333" stroke-width="1"/>
    <text x="420" y="18" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">
      Formally Verified Theorems (Lean 4 + Mathlib, 0 sorry)
    </text>
    <text x="140" y="40" text-anchor="middle" fill="#52b788" font-size="9">• Ihara matrix simplification</text>
    <text x="350" y="40" text-anchor="middle" fill="#c77dff" font-size="9">• Ramanujan spectral gap</text>
    <text x="560" y="40" text-anchor="middle" fill="#ff6b6b" font-size="9">• Idempotent complement</text>
    <text x="760" y="40" text-anchor="middle" fill="#ffc300" font-size="9">• Bridge composition</text>
    <text x="140" y="58" text-anchor="middle" fill="#48cae4" font-size="9">• Chip-fire preserves class</text>
    <text x="350" y="58" text-anchor="middle" fill="#80ed99" font-size="9">• Riemann sum convergence</text>
    <text x="560" y="58" text-anchor="middle" fill="#e0aaff" font-size="9">• Jones-Wenzl bound</text>
    <text x="760" y="58" text-anchor="middle" fill="#ffe066" font-size="9">• deg(K) = 2g-2</text>
  </g>
</svg>
