<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="futureGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.25" />
    </linearGradient>
    <linearGradient id="pastGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#6b6bff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#6b6bff;stop-opacity:0.25" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0ff" font-size="22" font-weight="bold">
    Light Cone Structure in Minkowski Spacetime
  </text>

  <g transform="translate(400, 320)">
    <!-- Future light cone (filled) -->
    <polygon points="0,-230 -180,0 0,0" fill="url(#futureGrad)"/>
    <polygon points="0,-230 180,0 0,0" fill="url(#futureGrad)"/>

    <!-- Past light cone (filled) -->
    <polygon points="0,230 -180,0 0,0" fill="url(#pastGrad)"/>
    <polygon points="0,230 180,0 0,0" fill="url(#pastGrad)"/>

    <!-- Grid lines (space) -->
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#333366" stroke-width="0.5"/>
    <line x1="-280" y1="60" x2="280" y2="60" stroke="#333366" stroke-width="0.3"/>
    <line x1="-280" y1="-60" x2="280" y2="-60" stroke="#333366" stroke-width="0.3"/>
    <line x1="-280" y1="120" x2="280" y2="120" stroke="#333366" stroke-width="0.3"/>
    <line x1="-280" y1="-120" x2="280" y2="-120" stroke="#333366" stroke-width="0.3"/>

    <!-- Grid lines (time) -->
    <line x1="0" y1="-250" x2="0" y2="250" stroke="#333366" stroke-width="0.5"/>
    <line x1="60" y1="-250" x2="60" y2="250" stroke="#333366" stroke-width="0.3"/>
    <line x1="-60" y1="-250" x2="-60" y2="250" stroke="#333366" stroke-width="0.3"/>
    <line x1="120" y1="-250" x2="120" y2="250" stroke="#333366" stroke-width="0.3"/>
    <line x1="-120" y1="-250" x2="-120" y2="250" stroke="#333366" stroke-width="0.3"/>

    <!-- Light cone edges -->
    <line x1="-180" y1="0" x2="0" y2="-230" stroke="#ffd93d" stroke-width="2.5" filter="url(#glow2)"/>
    <line x1="180" y1="0" x2="0" y2="-230" stroke="#ffd93d" stroke-width="2.5" filter="url(#glow2)"/>
    <line x1="-180" y1="0" x2="0" y2="230" stroke="#ffd93d" stroke-width="2.5" filter="url(#glow2)"/>
    <line x1="180" y1="0" x2="0" y2="230" stroke="#ffd93d" stroke-width="2.5" filter="url(#glow2)"/>

    <!-- Origin event -->
    <circle cx="0" cy="0" r="6" fill="#ffffff" filter="url(#glow2)"/>

    <!-- Timelike worldline (curved) -->
    <path d="M0,0 C-20,-40 -10,-80 0,-120 S20,-200 15,-230" 
          fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Spacelike vector -->
    <line x1="0" y1="0" x2="150" y2="30" stroke="#6b9bff" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- Null vector -->
    <line x1="0" y1="0" x2="100" y2="-128" stroke="#ffd93d" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Markers -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#6b9bff"/>
      </marker>
    </defs>

    <!-- Labels -->
    <text x="5" y="-240" fill="#ff6b6b" font-size="14" font-weight="bold">Future</text>
    <text x="5" y="248" fill="#6b6bff" font-size="14" font-weight="bold">Past</text>
    <text x="250" y="-5" fill="#aaa" font-size="13">x (space)</text>
    <text x="8" y="-250" fill="#aaa" font-size="13">t (time)</text>

    <!-- Causal regions -->
    <text x="-40" y="-100" fill="#ff6b6b" font-size="13" font-style="italic">Timelike</text>
    <text x="-55" y="-82" fill="#ff8888" font-size="10">η(v,v) &lt; 0</text>

    <text x="160" y="-70" fill="#6b9bff" font-size="13" font-style="italic">Spacelike</text>
    <text x="155" y="-52" fill="#8888ff" font-size="10">η(v,v) > 0</text>

    <text x="110" y="-150" fill="#ffd93d" font-size="13" font-style="italic">Null</text>
    <text x="105" y="-132" fill="#ffdd66" font-size="10">η(v,v) = 0</text>

    <!-- Key equations -->
    <rect x="-280" y="155" width="220" height="80" rx="5" fill="#1a1a3e" stroke="#444"/>
    <text x="-170" y="175" text-anchor="middle" fill="#ffd93d" font-size="12" font-weight="bold">
      Minkowski Metric
    </text>
    <text x="-170" y="195" text-anchor="middle" fill="#ddd" font-size="11">
      η(u,v) = -u₀v₀ + u₁v₁ + u₂v₂ + u₃v₃
    </text>
    <text x="-170" y="215" text-anchor="middle" fill="#4a9" font-size="10">
      ✓ Symmetry: η(u,v) = η(v,u)
    </text>
    <text x="-170" y="228" text-anchor="middle" fill="#4a9" font-size="10">
      ✓ Lorentz invariance preserved
    </text>
  </g>

  <!-- Footer -->
  <text x="400" y="580" text-anchor="middle" fill="#555" font-size="10">
    All properties formally verified in Lean 4 · theorem causal_trichotomy · theorem lorentz_boost_preserves_inner
  </text>
</svg>
