<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1e3a5f">
    Squaring Orbit Structure: x ↦ x² mod 35
  </text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">
    n = 35 = 5 × 7  |  Starting value x₀ = 2
  </text>
  
  <!-- Orbit nodes -->
  <!-- x₀ = 2 -->
  <circle cx="100" cy="200" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="100" y="205" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#1e40af">2</text>
  <text x="100" y="248" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">x₀</text>
  
  <!-- x₀² = 4 -->
  <circle cx="250" cy="200" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="250" y="205" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#1e40af">4</text>
  <text x="250" y="248" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">k=1</text>
  
  <!-- x₀⁴ = 16 -->
  <circle cx="430" cy="200" r="32" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="430" y="205" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#92400e">16</text>
  <text x="430" y="248" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">k=2 (cycle start)</text>
  
  <!-- x₀⁸ = 11 -->
  <circle cx="610" cy="140" r="32" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="610" y="145" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#92400e">11</text>
  <text x="610" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">k=3</text>
  
  <!-- Arrows (tail) -->
  <line x1="132" y1="200" x2="216" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="282" y1="200" x2="396" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cycle arrows -->
  <path d="M 455 180 Q 530 100 590 125" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <path d="M 590 160 Q 530 240 460 215" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  
  <!-- Labels on arrows -->
  <text x="174" y="192" font-family="Arial" font-size="11" fill="#2563eb">x²</text>
  <text x="340" y="192" font-family="Arial" font-size="11" fill="#2563eb">x²</text>
  <text x="535" y="115" font-family="Arial" font-size="11" fill="#d97706">x²</text>
  <text x="535" y="235" font-family="Arial" font-size="11" fill="#d97706">x²</text>
  
  <!-- Cycle indicator -->
  <text x="520" y="80" text-anchor="middle" font-family="Arial" font-size="12" fill="#d97706" font-weight="bold">
    Period λ = 2
  </text>
  <text x="160" y="160" text-anchor="middle" font-family="Arial" font-size="12" fill="#2563eb" font-weight="bold">
    Preperiod ρ = 2
  </text>
  
  <!-- CRT Decomposition Box -->
  <rect x="50" y="300" width="380" height="170" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="325" text-anchor="middle" font-family="Georgia" font-size="15" font-weight="bold" fill="#1e3a5f">CRT Decomposition</text>
  
  <text x="70" y="350" font-family="monospace" font-size="13" fill="#334155">mod 5: 2 → 4 → 1 → 1 → ...</text>
  <text x="70" y="370" font-family="Arial" font-size="11" fill="#64748b">      (ρ=2, λ=1)</text>
  
  <text x="70" y="400" font-family="monospace" font-size="13" fill="#334155">mod 7: 2 → 4 → 2 → 4 → ...</text>
  <text x="70" y="420" font-family="Arial" font-size="11" fill="#64748b">      (ρ=0, λ=2)</text>
  
  <text x="70" y="450" font-family="Arial" font-size="13" fill="#059669" font-weight="bold">λ₃₅ = 2 divides lcm(1, 2) = 2 ✓</text>
  
  <!-- Smooth Numbers Box -->
  <rect x="470" y="300" width="380" height="170" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="325" text-anchor="middle" font-family="Georgia" font-size="15" font-weight="bold" fill="#1e3a5f">Smooth Orbit Elements</text>
  
  <text x="490" y="355" font-family="monospace" font-size="13" fill="#334155">B = 7 (factor base: {2,3,5,7})</text>
  
  <text x="490" y="385" font-family="monospace" font-size="12" fill="#059669">  2 = 2¹        ← 7-smooth ✓</text>
  <text x="490" y="405" font-family="monospace" font-size="12" fill="#059669">  4 = 2²        ← 7-smooth ✓</text>
  <text x="490" y="425" font-family="monospace" font-size="12" fill="#dc2626"> 16 = 2⁴        ← 7-smooth ✓</text>
  <text x="490" y="445" font-family="monospace" font-size="12" fill="#dc2626"> 11 = 11¹       ← NOT 7-smooth ✗</text>
</svg>
