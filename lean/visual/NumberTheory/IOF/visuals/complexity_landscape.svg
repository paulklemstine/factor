<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg2)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1e3a5f">
    Factoring Complexity Landscape
  </text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial" font-size="13" fill="#64748b">
    Sub-exponential bounds: L_n[α, c] = exp(c · (ln n)^α · (ln ln n)^{1-α})
  </text>
  
  <!-- Axes -->
  <line x1="100" y1="450" x2="830" y2="450" stroke="#334155" stroke-width="2"/>
  <line x1="100" y1="450" x2="100" y2="80" stroke="#334155" stroke-width="2"/>
  
  <!-- X axis label -->
  <text x="465" y="490" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155">
    Input size (log₂ n)
  </text>
  
  <!-- Y axis label -->
  <text x="30" y="265" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155" transform="rotate(-90, 30, 265)">
    Operations (log scale)
  </text>
  
  <!-- X axis ticks -->
  <text x="100" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">0</text>
  <text x="250" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">256</text>
  <text x="400" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">512</text>
  <text x="550" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">1024</text>
  <text x="700" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">2048</text>
  
  <!-- Exponential curve (trial division ~2^(n/2)) -->
  <path d="M 100 440 Q 200 430 300 400 Q 400 340 500 220 Q 550 150 600 100" 
        stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <text x="610" y="95" font-family="Arial" font-size="13" fill="#ef4444" font-weight="bold">
    Trial Division O(√n)
  </text>
  
  <!-- Sub-exponential L[1/3] (NFS) -->
  <path d="M 100 445 Q 250 440 350 430 Q 500 400 650 350 Q 750 310 830 280" 
        stroke="#059669" stroke-width="3" fill="none"/>
  <text x="770" y="270" font-family="Arial" font-size="13" fill="#059669" font-weight="bold">
    NFS L[1/3]
  </text>
  
  <!-- Sub-exponential L[1/2] (QS/IOF) -->
  <path d="M 100 443 Q 250 435 350 415 Q 500 370 650 300 Q 750 245 830 200" 
        stroke="#2563eb" stroke-width="3.5" fill="none" filter="url(#glow)"/>
  <text x="770" y="192" font-family="Arial" font-size="13" fill="#2563eb" font-weight="bold">
    IOF/QS L[1/2]
  </text>
  
  <!-- Polynomial curve -->
  <path d="M 100 448 Q 300 445 500 440 Q 700 432 830 420" 
        stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="4,4"/>
  <text x="770" y="415" font-family="Arial" font-size="13" fill="#7c3aed" font-weight="bold">
    Polynomial O(n^ε)
  </text>
  
  <!-- Pollard rho -->
  <path d="M 100 442 Q 250 432 350 410 Q 500 360 650 270 Q 750 210 830 150" 
        stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="770" y="143" font-family="Arial" font-size="12" fill="#f59e0b">
    Pollard ρ O(n^{1/4})
  </text>
  
  <!-- Legend Box -->
  <rect x="120" y="90" width="280" height="180" rx="8" fill="white" fill-opacity="0.9" stroke="#94a3b8" stroke-width="1"/>
  <text x="260" y="115" text-anchor="middle" font-family="Georgia" font-size="14" font-weight="bold" fill="#1e3a5f">Complexity Classes</text>
  
  <line x1="140" y1="138" x2="180" y2="138" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="190" y="142" font-family="Arial" font-size="12" fill="#334155">Exponential: 2^{Ω(n)}</text>
  
  <line x1="140" y1="163" x2="180" y2="163" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="190" y="167" font-family="Arial" font-size="12" fill="#334155">Pollard: O(n^{1/4})</text>
  
  <line x1="140" y1="188" x2="180" y2="188" stroke="#2563eb" stroke-width="3"/>
  <text x="190" y="192" font-family="Arial" font-size="12" fill="#334155" font-weight="bold">IOF/QS: L_n[1/2, c]</text>
  
  <line x1="140" y1="213" x2="180" y2="213" stroke="#059669" stroke-width="3"/>
  <text x="190" y="217" font-family="Arial" font-size="12" fill="#334155">NFS: L_n[1/3, c']</text>
  
  <line x1="140" y1="238" x2="180" y2="238" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="190" y="242" font-family="Arial" font-size="12" fill="#334155">Polynomial: n^{O(1)}</text>
  
  <text x="260" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">(n = input number, not bit length)</text>
  
  <!-- IOF highlight -->
  <rect x="480" y="495" width="380" height="42" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="670" y="515" text-anchor="middle" font-family="Arial" font-size="12" fill="#1e40af" font-weight="bold">
    IOF achieves L_n[1/2, c] — formally verified in Lean 4
  </text>
  <text x="670" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#3b82f6">
    Sub-exponential in bit-length: ∀ ε > 0, L_n[1/2,c] &lt; n^ε for large n
  </text>
</svg>
