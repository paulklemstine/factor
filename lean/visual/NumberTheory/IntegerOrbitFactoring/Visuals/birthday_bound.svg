<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="chart-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <filter id="bar-shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#chart-bg)" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#78350f">
    Birthday Bound: Collision Steps vs √p
  </text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#92400e">
    Expected collision time E[T] = √(πp/2) — empirical verification
  </text>
  
  <!-- Chart area -->
  <rect x="120" y="75" width="620" height="340" fill="white" stroke="#d6d3d1" stroke-width="1" rx="4"/>
  
  <!-- Y-axis label -->
  <text x="30" y="250" text-anchor="middle" font-size="13" fill="#44403c" transform="rotate(-90, 30, 250)">
    Average Steps to Collision
  </text>
  
  <!-- X-axis label -->
  <text x="430" y="445" text-anchor="middle" font-size="13" fill="#44403c">
    Smallest Prime Factor p
  </text>
  
  <!-- Y-axis ticks -->
  <line x1="120" y1="115" x2="740" y2="115" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="110" y="119" text-anchor="end" font-size="10" fill="#78716c">40</text>
  
  <line x1="120" y1="180" x2="740" y2="180" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="110" y="184" text-anchor="end" font-size="10" fill="#78716c">30</text>
  
  <line x1="120" y1="245" x2="740" y2="245" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="110" y="249" text-anchor="end" font-size="10" fill="#78716c">20</text>
  
  <line x1="120" y1="310" x2="740" y2="310" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="110" y="314" text-anchor="end" font-size="10" fill="#78716c">10</text>
  
  <line x1="120" y1="375" x2="740" y2="375" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="110" y="379" text-anchor="end" font-size="10" fill="#78716c">0</text>
  
  <!-- Data bars - empirical (blue) vs √(πp/2) predicted (orange outline) -->
  <!-- p=7: √(πp/2)≈3.3, empirical≈3.5 -->
  <rect x="160" y="352" width="30" height="23" fill="#3b82f6" rx="2" filter="url(#bar-shadow)"/>
  <rect x="195" y="354" width="30" height="21" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="193" y="398" text-anchor="middle" font-size="11" fill="#44403c">p=7</text>
  
  <!-- p=13: √(πp/2)≈4.5, empirical≈4.8 -->
  <rect x="270" y="344" width="30" height="31" fill="#3b82f6" rx="2" filter="url(#bar-shadow)"/>
  <rect x="305" y="346" width="30" height="29" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="303" y="398" text-anchor="middle" font-size="11" fill="#44403c">p=13</text>
  
  <!-- p=101: √(πp/2)≈12.6, empirical≈13.1 -->
  <rect x="380" y="290" width="30" height="85" fill="#3b82f6" rx="2" filter="url(#bar-shadow)"/>
  <rect x="415" y="293" width="30" height="82" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="413" y="398" text-anchor="middle" font-size="11" fill="#44403c">p=101</text>
  
  <!-- p=503: √(πp/2)≈28.1, empirical≈29.3 -->
  <rect x="490" y="185" width="30" height="190" fill="#3b82f6" rx="2" filter="url(#bar-shadow)"/>
  <rect x="525" y="192" width="30" height="183" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="523" y="398" text-anchor="middle" font-size="11" fill="#44403c">p=503</text>
  
  <!-- p=1009: √(πp/2)≈39.8, empirical≈41.2 -->
  <rect x="600" y="106" width="30" height="269" fill="#3b82f6" rx="2" filter="url(#bar-shadow)"/>
  <rect x="635" y="116" width="30" height="259" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="633" y="398" text-anchor="middle" font-size="11" fill="#44403c">p=1009</text>
  
  <!-- Legend -->
  <rect x="540" y="80" width="190" height="55" rx="6" fill="white" stroke="#d6d3d1" stroke-width="1"/>
  <rect x="555" y="94" width="16" height="12" fill="#3b82f6" rx="2"/>
  <text x="578" y="104" font-size="11" fill="#44403c">Empirical avg steps</text>
  <rect x="555" y="114" width="16" height="12" fill="none" stroke="#f97316" stroke-width="2" rx="2"/>
  <text x="578" y="124" font-size="11" fill="#44403c">Predicted √(πp/2)</text>
  
  <!-- Annotation -->
  <rect x="130" y="450" width="610" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="435" y="472" text-anchor="middle" font-size="12" fill="#92400e">
    ✓ Empirical results closely match the √(πp/2) birthday bound prediction — Theorem 4.1 validated
  </text>
</svg>
