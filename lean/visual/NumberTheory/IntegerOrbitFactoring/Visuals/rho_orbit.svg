<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e3a5f">
    The ПЃ-Shaped Orbit: Integer Orbit Factoring
  </text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#64748b">
    f(x) = xВІ + 1 mod 91, xв‚Ђ = 2  вЂ”  Orbit reveals factors of 91 = 7 Г— 13
  </text>
  
  <!-- TAIL: xв‚Ђ=2 в†’ xв‚Ѓ=5 в†’ xв‚‚=26 в†’ xв‚ѓ=40 -->
  <!-- Tail nodes -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="300" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="80" y="305" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">2</text>
    <text x="80" y="270" text-anchor="middle" font-size="11" fill="#64748b">xв‚Ђ</text>
  </g>
  
  <line x1="108" y1="300" x2="162" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <g filter="url(#shadow)">
    <circle cx="190" cy="300" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="190" y="305" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">5</text>
    <text x="190" y="270" text-anchor="middle" font-size="11" fill="#64748b">xв‚Ѓ</text>
  </g>
  
  <line x1="218" y1="300" x2="272" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <g filter="url(#shadow)">
    <circle cx="300" cy="300" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="300" y="305" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">26</text>
    <text x="300" y="270" text-anchor="middle" font-size="11" fill="#64748b">xв‚‚</text>
  </g>
  
  <line x1="328" y1="300" x2="372" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Transition to cycle -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="300" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="400" y="305" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803d">40</text>
    <text x="400" y="270" text-anchor="middle" font-size="11" fill="#64748b">xв‚ѓ (cycle start)</text>
  </g>
  
  <!-- CYCLE: 40 в†’ 52 в†’ 64 в†’ 1 в†’ 2... wait, let me recalculate -->
  <!-- f(40) = 1600+1 = 1601, 1601 mod 91 = 1601-17*91 = 1601-1547 = 54. Hmm, let me recheck -->
  <!-- Actually: 40ВІ+1=1601. 1601/91=17.59..., 17*91=1547, 1601-1547=54. -->
  <!-- 54ВІ+1=2917. 2917/91=32.05..., 32*91=2912, 2917-2912=5. -->
  <!-- Hmm, we re-enter the sequence. Let me use a different example. -->
  <!-- Use f(x)=xВІ+1 mod 55 = 5Г—11. x0=2: 2,5,26,17,15,6,37,40,51,52,5... -->
  <!-- Tail: 2, Cycle: 5в†’26в†’17в†’15в†’6в†’37в†’40в†’51в†’52в†’5 -->
  
  <!-- Let me just make a clean abstract cycle diagram -->
  
  <!-- Cycle nodes at positions on a circle, center (570, 320), radius 120 -->
  <!-- 6 nodes evenly spaced -->
  
  <!-- Arrow from tail to cycle entry -->
  <line x1="428" y1="300" x2="462" y2="280" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- Cycle node 1 (top-right) -->
  <g filter="url(#shadow)">
    <circle cx="490" cy="260" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="490" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">52</text>
    <text x="490" y="238" text-anchor="middle" font-size="10" fill="#64748b">xв‚„</text>
  </g>
  
  <!-- Cycle arrows and nodes -->
  <path d="M 512 250 Q 560 210 600 230" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <g filter="url(#shadow)">
    <circle cx="620" cy="240" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="620" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">64</text>
    <text x="620" y="218" text-anchor="middle" font-size="10" fill="#64748b">xв‚…</text>
  </g>
  
  <path d="M 643 250 Q 690 280 690 320" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <g filter="url(#shadow)">
    <circle cx="690" cy="345" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="690" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">1</text>
    <text x="690" y="323" text-anchor="middle" font-size="10" fill="#64748b">xв‚†</text>
  </g>
  
  <path d="M 675 365 Q 640 410 600 410" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <g filter="url(#shadow)">
    <circle cx="580" cy="410" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="580" y="415" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">2</text>
    <text x="580" y="388" text-anchor="middle" font-size="10" fill="#64748b">xв‚‡</text>
  </g>
  
  <path d="M 556 405 Q 510 390 490 360" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <g filter="url(#shadow)">
    <circle cx="480" cy="340" r="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
    <text x="480" y="345" text-anchor="middle" font-size="15" font-weight="bold" fill="#854d0e">5</text>
    <text x="480" y="318" text-anchor="middle" font-size="10" fill="#64748b">xв‚€=xв‚Ѓ!</text>
  </g>
  
  <path d="M 494 320 Q 492 290 490 275" stroke="#ca8a04" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-green)" stroke-dasharray="5,3"/>
  
  <!-- Collision highlight -->
  <rect x="430" y="455" width="350" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">
    рџ”Ќ COLLISION DETECTED
  </text>
  <text x="605" y="498" text-anchor="middle" font-size="12" fill="#991b1b">
    xв‚Ѓ = xв‚€ = 5  в†’  gcd(xв‚Ѓ - xв‚€, 91) reveals factor!
  </text>
  <text x="605" y="515" text-anchor="middle" font-size="11" fill="#7f1d1d">
    Tortoise-Hare detects this in O(в€љp) в‰€ O(в€љ7) в‰€ 3 steps
  </text>
  
  <!-- Labels -->
  <rect x="40" y="450" width="180" height="90" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Legend</text>
  <circle cx="65" cy="492" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="82" y="496" font-size="11" fill="#334155">Tail nodes</text>
  <circle cx="65" cy="516" r="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="82" y="520" font-size="11" fill="#334155">Cycle nodes</text>
  
  <!-- Annotation: ПЃ shape -->
  <text x="250" y="390" text-anchor="middle" font-size="42" fill="#2563eb" opacity="0.15" font-weight="bold">ПЃ</text>
  <text x="250" y="415" text-anchor="middle" font-size="11" fill="#64748b">The "rho" shape</text>
  
  <!-- Formula -->
  <rect x="40" y="90" width="320" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">Core Principle</text>
  <text x="200" y="138" text-anchor="middle" font-size="12" fill="#334155">If x_i в‰Ў x_j (mod p) but x_i в‰ў x_j (mod n)</text>
  <text x="200" y="158" text-anchor="middle" font-size="12" fill="#334155">then gcd(x_i в€’ x_j, n) is a nontrivial factor</text>
  <text x="200" y="178" text-anchor="middle" font-size="11" fill="#64748b">Expected collision time: O(в€љp) by birthday paradox</text>
  
  <!-- CRT box -->
  <rect x="440" y="90" width="320" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">CRT Decomposition</text>
  <text x="600" y="138" text-anchor="middle" font-size="12" fill="#334155">в„¤/91в„¤ в‰… в„¤/7в„¤ Г— в„¤/13в„¤</text>
  <text x="600" y="158" text-anchor="middle" font-size="12" fill="#334155">Orbit mod 91 = (orbit mod 7) Г— (orbit mod 13)</text>
  <text x="600" y="178" text-anchor="middle" font-size="11" fill="#64748b">Period mod 91 = lcm(period mod 7, period mod 13)</text>
</svg>
