<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#fafafa" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Stereographic Positional Encoding</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Encoding positions via a spiral curve on S²</text>
  
  <!-- Left: Spiral on sphere -->
  <g transform="translate(200, 240)">
    <text x="0" y="-155" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b">Spiral on S²</text>
    
    <!-- Sphere -->
    <ellipse cx="0" cy="0" rx="130" ry="130" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="130" ry="40" fill="none" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,3"/>
    <ellipse cx="0" cy="0" rx="40" ry="130" fill="none" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,3"/>
    
    <!-- Spiral path (approximation) -->
    <path d="M 0,-130 C 30,-125 55,-105 70,-85 C 90,-55 95,-20 85,10 C 75,45 50,70 20,85 C -15,100 -50,95 -75,75 C -100,50 -110,15 -100,-20 C -90,-55 -65,-80 -35,-95 C -5,-105 25,-100 50,-80 C 72,-60 80,-30 75,0 C 65,35 40,55 10,65 C -20,72 -45,65 -60,45 C -72,25 -70,-5 -55,-25"
          fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Position markers on spiral -->
    <circle cx="0" cy="-130" r="7" fill="#ef4444"/>
    <text x="15" y="-130" font-family="Arial" font-size="10" fill="#ef4444" font-weight="bold">0</text>
    
    <circle cx="70" cy="-85" r="6" fill="#f59e0b"/>
    <text x="82" y="-80" font-family="Arial" font-size="10" fill="#f59e0b" font-weight="bold">1</text>
    
    <circle cx="85" cy="10" r="6" fill="#10b981"/>
    <text x="97" y="15" font-family="Arial" font-size="10" fill="#10b981" font-weight="bold">2</text>
    
    <circle cx="20" cy="85" r="6" fill="#3b82f6"/>
    <text x="32" y="90" font-family="Arial" font-size="10" fill="#3b82f6" font-weight="bold">3</text>
    
    <circle cx="-75" cy="75" r="6" fill="#8b5cf6"/>
    <text x="-90" y="75" font-family="Arial" font-size="10" fill="#8b5cf6" font-weight="bold">4</text>
    
    <circle cx="-100" cy="-20" r="6" fill="#ec4899"/>
    <text x="-115" y="-15" font-family="Arial" font-size="10" fill="#ec4899" font-weight="bold">5</text>
    
    <circle cx="-35" cy="-95" r="6" fill="#14b8a6"/>
    <text x="-48" y="-95" font-family="Arial" font-size="10" fill="#14b8a6" font-weight="bold">6</text>
    
    <circle cx="50" cy="-80" r="5" fill="#f97316"/>
    <text x="60" y="-75" font-family="Arial" font-size="9" fill="#f97316" font-weight="bold">7</text>
    
    <!-- Formula -->
    <text x="0" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">p(t) = (sin t·cos(t/3), sin t·sin(t/3), cos t)</text>
    <text x="0" y="175" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">‖p(t)‖ = 1 ∀t (proved in Lean 4)</text>
  </g>
  
  <!-- Right: Positional Encoding Matrix -->
  <g transform="translate(550, 130)">
    <text x="100" y="-50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b">Position Similarity Matrix</text>
    <text x="100" y="-33" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">PE(i,j) = ⟨p(tᵢ), p(tⱼ)⟩</text>
    
    <!-- Grid -->
    <g transform="translate(0, -10)">
      <!-- Headers -->
      <text x="-10" y="20" text-anchor="end" font-family="Arial" font-size="9" fill="#ef4444">0</text>
      <text x="-10" y="45" text-anchor="end" font-family="Arial" font-size="9" fill="#f59e0b">1</text>
      <text x="-10" y="70" text-anchor="end" font-family="Arial" font-size="9" fill="#10b981">2</text>
      <text x="-10" y="95" text-anchor="end" font-family="Arial" font-size="9" fill="#3b82f6">3</text>
      <text x="-10" y="120" text-anchor="end" font-family="Arial" font-size="9" fill="#8b5cf6">4</text>
      <text x="-10" y="145" text-anchor="end" font-family="Arial" font-size="9" fill="#ec4899">5</text>
      <text x="-10" y="170" text-anchor="end" font-family="Arial" font-size="9" fill="#14b8a6">6</text>
      <text x="-10" y="195" text-anchor="end" font-family="Arial" font-size="9" fill="#f97316">7</text>
      
      <!-- Row 0: diagonal = 1 -->
      <rect x="0" y="8" width="25" height="22" fill="#1e40af"/> <!-- 1.00 -->
      <rect x="25" y="8" width="25" height="22" fill="#3b82f6"/> <!-- 0.70 -->
      <rect x="50" y="8" width="25" height="22" fill="#93c5fd"/> <!-- 0.30 -->
      <rect x="75" y="8" width="25" height="22" fill="#e2e8f0"/> <!-- 0.05 -->
      <rect x="100" y="8" width="25" height="22" fill="#fecaca"/> <!-- -0.20 -->
      <rect x="125" y="8" width="25" height="22" fill="#e2e8f0"/> <!-- 0.10 -->
      <rect x="150" y="8" width="25" height="22" fill="#93c5fd"/> <!-- 0.40 -->
      <rect x="175" y="8" width="25" height="22" fill="#3b82f6"/> <!-- 0.65 -->
      
      <!-- Row 1 -->
      <rect x="0" y="33" width="25" height="22" fill="#3b82f6"/>
      <rect x="25" y="33" width="25" height="22" fill="#1e40af"/>
      <rect x="50" y="33" width="25" height="22" fill="#3b82f6"/>
      <rect x="75" y="33" width="25" height="22" fill="#93c5fd"/>
      <rect x="100" y="33" width="25" height="22" fill="#e2e8f0"/>
      <rect x="125" y="33" width="25" height="22" fill="#fecaca"/>
      <rect x="150" y="33" width="25" height="22" fill="#e2e8f0"/>
      <rect x="175" y="33" width="25" height="22" fill="#93c5fd"/>
      
      <!-- Rows 2-7 (simplified pattern) -->
      <rect x="0" y="58" width="25" height="22" fill="#93c5fd"/>
      <rect x="25" y="58" width="25" height="22" fill="#3b82f6"/>
      <rect x="50" y="58" width="25" height="22" fill="#1e40af"/>
      <rect x="75" y="58" width="25" height="22" fill="#3b82f6"/>
      <rect x="100" y="58" width="25" height="22" fill="#93c5fd"/>
      <rect x="125" y="58" width="25" height="22" fill="#e2e8f0"/>
      <rect x="150" y="58" width="25" height="22" fill="#fecaca"/>
      <rect x="175" y="58" width="25" height="22" fill="#e2e8f0"/>
      
      <rect x="0" y="83" width="25" height="22" fill="#e2e8f0"/>
      <rect x="25" y="83" width="25" height="22" fill="#93c5fd"/>
      <rect x="50" y="83" width="25" height="22" fill="#3b82f6"/>
      <rect x="75" y="83" width="25" height="22" fill="#1e40af"/>
      <rect x="100" y="83" width="25" height="22" fill="#3b82f6"/>
      <rect x="125" y="83" width="25" height="22" fill="#93c5fd"/>
      <rect x="150" y="83" width="25" height="22" fill="#e2e8f0"/>
      <rect x="175" y="83" width="25" height="22" fill="#fecaca"/>
      
      <rect x="0" y="108" width="25" height="22" fill="#fecaca"/>
      <rect x="25" y="108" width="25" height="22" fill="#e2e8f0"/>
      <rect x="50" y="108" width="25" height="22" fill="#93c5fd"/>
      <rect x="75" y="108" width="25" height="22" fill="#3b82f6"/>
      <rect x="100" y="108" width="25" height="22" fill="#1e40af"/>
      <rect x="125" y="108" width="25" height="22" fill="#3b82f6"/>
      <rect x="150" y="108" width="25" height="22" fill="#93c5fd"/>
      <rect x="175" y="108" width="25" height="22" fill="#e2e8f0"/>
      
      <rect x="0" y="133" width="25" height="22" fill="#e2e8f0"/>
      <rect x="25" y="133" width="25" height="22" fill="#fecaca"/>
      <rect x="50" y="133" width="25" height="22" fill="#e2e8f0"/>
      <rect x="75" y="133" width="25" height="22" fill="#93c5fd"/>
      <rect x="100" y="133" width="25" height="22" fill="#3b82f6"/>
      <rect x="125" y="133" width="25" height="22" fill="#1e40af"/>
      <rect x="150" y="133" width="25" height="22" fill="#3b82f6"/>
      <rect x="175" y="133" width="25" height="22" fill="#93c5fd"/>
      
      <rect x="0" y="158" width="25" height="22" fill="#93c5fd"/>
      <rect x="25" y="158" width="25" height="22" fill="#e2e8f0"/>
      <rect x="50" y="158" width="25" height="22" fill="#fecaca"/>
      <rect x="75" y="158" width="25" height="22" fill="#e2e8f0"/>
      <rect x="100" y="158" width="25" height="22" fill="#93c5fd"/>
      <rect x="125" y="158" width="25" height="22" fill="#3b82f6"/>
      <rect x="150" y="158" width="25" height="22" fill="#1e40af"/>
      <rect x="175" y="158" width="25" height="22" fill="#3b82f6"/>
      
      <rect x="0" y="183" width="25" height="22" fill="#3b82f6"/>
      <rect x="25" y="183" width="25" height="22" fill="#93c5fd"/>
      <rect x="50" y="183" width="25" height="22" fill="#e2e8f0"/>
      <rect x="75" y="183" width="25" height="22" fill="#fecaca"/>
      <rect x="100" y="183" width="25" height="22" fill="#e2e8f0"/>
      <rect x="125" y="183" width="25" height="22" fill="#93c5fd"/>
      <rect x="150" y="183" width="25" height="22" fill="#3b82f6"/>
      <rect x="175" y="183" width="25" height="22" fill="#1e40af"/>
      
      <!-- Grid lines -->
      <rect x="0" y="8" width="200" height="197" fill="none" stroke="#94a3b8" stroke-width="0.5"/>
    </g>
    
    <!-- Legend -->
    <g transform="translate(0, 215)">
      <rect x="0" y="0" width="15" height="12" fill="#1e40af"/>
      <text x="20" y="10" font-family="Arial" font-size="9" fill="#475569">1.0 (self)</text>
      <rect x="65" y="0" width="15" height="12" fill="#3b82f6"/>
      <text x="85" y="10" font-family="Arial" font-size="9" fill="#475569">high</text>
      <rect x="120" y="0" width="15" height="12" fill="#93c5fd"/>
      <text x="140" y="10" font-family="Arial" font-size="9" fill="#475569">med</text>
      <rect x="170" y="0" width="15" height="12" fill="#fecaca"/>
      <text x="190" y="10" font-family="Arial" font-size="9" fill="#475569">neg</text>
    </g>
    
    <text x="100" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">Toeplitz-like structure from spiral geometry</text>
    <text x="100" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">PE(i,i) = 1 ∀i (proved in Lean 4)</text>
  </g>
</svg>
