<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="gaugeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#4338ca;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="massGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="600" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0">Gauge Theory of Stereographic Attention</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">The conformal factor as a gauge field on the attention manifold</text>
  
  <!-- Left panel: Gauge Field -->
  <g transform="translate(200, 220)">
    <text x="0" y="-130" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#c4b5fd">Gauge Field A(x)</text>
    <text x="0" y="-112" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">A(x) = 2/(1+‖x‖²)</text>
    
    <!-- Gauge field visualization (concentric rings) -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1e1b4b" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#312e81" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#3730a3" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#4338ca" stroke-width="0.7"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#6366f1" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#a78bfa"/>
    
    <!-- Gauge field value labels -->
    <text x="0" y="-5" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">2.0</text>
    <text x="35" y="4" font-family="monospace" font-size="8" fill="#c4b5fd">1.0</text>
    <text x="75" y="4" font-family="monospace" font-size="8" fill="#818cf8">0.3</text>
    <text x="115" y="4" font-family="monospace" font-size="8" fill="#6366f1">0.1</text>
    
    <!-- Tokens as particles -->
    <circle cx="20" cy="-10" r="6" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
    <text x="20" y="-18" text-anchor="middle" font-family="Arial" font-size="8" fill="#fbbf24">t₁</text>
    
    <circle cx="-40" cy="25" r="6" fill="#34d399" stroke="#fff" stroke-width="1"/>
    <text x="-40" y="17" text-anchor="middle" font-family="Arial" font-size="8" fill="#34d399">t₂</text>
    
    <circle cx="70" cy="-45" r="6" fill="#f87171" stroke="#fff" stroke-width="1"/>
    <text x="70" y="-53" text-anchor="middle" font-family="Arial" font-size="8" fill="#f87171">t₃</text>
    
    <circle cx="-80" cy="60" r="6" fill="#60a5fa" stroke="#fff" stroke-width="1"/>
    <text x="-80" y="52" text-anchor="middle" font-family="Arial" font-size="8" fill="#60a5fa">t₄</text>
    
    <!-- Labels below -->
    <text x="0" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">Brighter = stronger gauge field</text>
    <text x="0" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">= smaller gradients, lighter "mass"</text>
  </g>
  
  <!-- Right panel: Effective Mass -->
  <g transform="translate(600, 220)">
    <text x="0" y="-130" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#fcd34d">Effective Mass m(x)</text>
    <text x="0" y="-112" text-anchor="middle" font-family="monospace" font-size="12" fill="#fbbf24">m(x) = (1+‖x‖²)/2</text>
    
    <!-- Mass field (inverse of gauge) -->
    <circle cx="0" cy="0" r="110" fill="url(#massGrad)" opacity="0.6"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#78350f" stroke-width="0.5"/>
    
    <!-- Mass value labels -->
    <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e293b">0.5</text>
    <text x="35" y="4" font-family="monospace" font-size="8" fill="#451a03">1.0</text>
    <text x="75" y="4" font-family="monospace" font-size="8" fill="#fff">3.6</text>
    <text x="115" y="4" font-family="monospace" font-size="8" fill="#fff">8.1</text>
    
    <!-- Tokens with mass circles -->
    <circle cx="20" cy="-10" r="4" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
    <circle cx="20" cy="-10" r="8" fill="none" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="2,2"/>
    
    <circle cx="-40" cy="25" r="5" fill="#34d399" stroke="#fff" stroke-width="1"/>
    <circle cx="-40" cy="25" r="12" fill="none" stroke="#34d399" stroke-width="0.5" stroke-dasharray="2,2"/>
    
    <circle cx="70" cy="-45" r="7" fill="#f87171" stroke="#fff" stroke-width="1"/>
    <circle cx="70" cy="-45" r="18" fill="none" stroke="#f87171" stroke-width="0.5" stroke-dasharray="2,2"/>
    
    <circle cx="-80" cy="60" r="9" fill="#60a5fa" stroke="#fff" stroke-width="1"/>
    <circle cx="-80" cy="60" r="25" fill="none" stroke="#60a5fa" stroke-width="0.5" stroke-dasharray="2,2"/>
    
    <text x="0" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">Darker = heavier effective mass</text>
    <text x="0" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">= stronger gradients, more "inertia"</text>
  </g>
  
  <!-- Arrow between panels -->
  <g transform="translate(400, 220)">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="0" y="-10" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">m = 1/A</text>
    <polygon points="80,-5 90,0 80,5" fill="#64748b"/>
    <polygon points="-80,-5 -90,0 -80,5" fill="#64748b"/>
  </g>
  
  <!-- Bottom panel: Gauge Transformations -->
  <g transform="translate(400, 460)">
    <rect x="-350" y="-40" width="700" height="120" rx="8" fill="#1e293b" stroke="#334155"/>
    
    <text x="0" y="-20" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e2e8f0">Gauge Structure</text>
    
    <text x="-250" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#c4b5fd">Gauge Field</text>
    <text x="-250" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">A(x) = cf(x)</text>
    
    <text x="-80" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#fcd34d">Gauge Transform</text>
    <text x="-80" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">μ ∈ Möb(n)</text>
    
    <text x="80" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#34d399">Connection</text>
    <text x="80" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ee7b7">Γᵢ = ∂ᵢ log A</text>
    
    <text x="250" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#f87171">Curvature</text>
    <text x="250" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">Fᵢⱼ = ∂ᵢΓⱼ - ∂ⱼΓᵢ</text>
    
    <text x="0" y="60" text-anchor="middle" font-family="Arial" font-size="11" fill="#94a3b8">
      Choosing a projection point breaks gauge symmetry → tokens acquire effective mass (cf. Higgs mechanism)
    </text>
  </g>
</svg>
