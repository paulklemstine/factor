    <rect x="240" y="125" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="270" y="125" width="30" height="25" fill="#fef3c7" opacity="0.85"/>
    <rect x="300" y="125" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="330" y="125" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="360" y="125" width="30" height="25" fill="#dbeafe" opacity="0.85"/>
    <rect x="390" y="125" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="420" y="125" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="450" y="125" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="480" y="125" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="510" y="125" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="540" y="125" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="570" y="125" width="30" height="25" fill="#1d4ed8" opacity="0.85"/>

    <!-- Row 10 (y=0, center row) -->
    <rect x="0" y="250" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="30" y="250" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="60" y="250" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="90" y="250" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="120" y="250" width="30" height="25" fill="#dbeafe" opacity="0.85"/>
    <rect x="150" y="250" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="180" y="250" width="30" height="25" fill="#fef3c7" opacity="0.85"/>
    <rect x="210" y="250" width="30" height="25" fill="#fde68a" opacity="0.85"/>
    <rect x="240" y="250" width="30" height="25" fill="#fbbf24" opacity="0.85"/>
    <rect x="270" y="250" width="30" height="25" fill="#f59e0b" opacity="0.85"/>
    <rect x="300" y="250" width="30" height="25" fill="#ef4444" opacity="0.9"/>
    <rect x="330" y="250" width="30" height="25" fill="#f59e0b" opacity="0.85"/>
    <rect x="360" y="250" width="30" height="25" fill="#fbbf24" opacity="0.85"/>
    <rect x="390" y="250" width="30" height="25" fill="#fde68a" opacity="0.85"/>
    <rect x="420" y="250" width="30" height="25" fill="#fef3c7" opacity="0.85"/>
    <rect x="450" y="250" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="480" y="250" width="30" height="25" fill="#dbeafe" opacity="0.85"/>
    <rect x="510" y="250" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="540" y="250" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="570" y="250" width="30" height="25" fill="#93c5fd" opacity="0.85"/>

    <!-- Row 15 (y≈−1.5) - mirror of row 5 -->
    <rect x="0" y="375" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="30" y="375" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="60" y="375" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="90" y="375" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="120" y="375" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="150" y="375" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="180" y="375" width="30" height="25" fill="#dbeafe" opacity="0.85"/>
    <rect x="210" y="375" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="240" y="375" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="270" y="375" width="30" height="25" fill="#fef3c7" opacity="0.85"/>
    <rect x="300" y="375" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="330" y="375" width="30" height="25" fill="#eff6ff" opacity="0.85"/>
    <rect x="360" y="375" width="30" height="25" fill="#dbeafe" opacity="0.85"/>
    <rect x="390" y="375" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="420" y="375" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="450" y="375" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="480" y="375" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="510" y="375" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="540" y="375" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="570" y="375" width="30" height="25" fill="#1d4ed8" opacity="0.85"/>

    <!-- Row 19 (y=−3) - mirror of row 0 -->
    <rect x="0" y="500" width="30" height="25" fill="#1e3a8a" opacity="0.85"/>
    <rect x="30" y="500" width="30" height="25" fill="#1e40af" opacity="0.85"/>
    <rect x="60" y="500" width="30" height="25" fill="#1d4ed8" opacity="0.85"/>
    <rect x="90" y="500" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="120" y="500" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="150" y="500" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="180" y="500" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="210" y="500" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="240" y="500" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="270" y="500" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="300" y="500" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="330" y="500" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="360" y="500" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="390" y="500" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="420" y="500" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="450" y="500" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="480" y="500" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="510" y="500" width="30" height="25" fill="#1d4ed8" opacity="0.85"/>
    <rect x="540" y="500" width="30" height="25" fill="#1e40af" opacity="0.85"/>
    <rect x="570" y="500" width="30" height="25" fill="#1e3a8a" opacity="0.85"/>

    <!-- Reference point marker -->
    <circle cx="300" cy="262" r="8" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <text x="320" y="245" fill="#ef4444" font-size="11" font-weight="bold">Reference</text>
    <text x="320" y="258" fill="#ef4444" font-size="11" font-weight="bold">point (0,0)</text>
  </g>

  <!-- Color legend -->
  <g transform="translate(730, 120)">
    <text x="50" y="0" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Kernel Value</text>
    <rect x="30" y="15" width="40" height="20" fill="#ef4444"/>
    <text x="80" y="30" fill="#e2e8f0" font-size="11">K = −1 (identical)</text>
    <rect x="30" y="45" width="40" height="20" fill="#f59e0b"/>
    <text x="80" y="60" fill="#e2e8f0" font-size="11">K ≈ −0.6</text>
    <rect x="30" y="75" width="40" height="20" fill="#fef3c7"/>
    <text x="80" y="90" fill="#e2e8f0" font-size="11">K ≈ 0</text>
    <rect x="30" y="105" width="40" height="20" fill="#bfdbfe"/>
    <text x="80" y="120" fill="#e2e8f0" font-size="11">K ≈ 0.4</text>
    <rect x="30" y="135" width="40" height="20" fill="#3b82f6"/>
    <text x="80" y="150" fill="#e2e8f0" font-size="11">K ≈ 0.7</text>
    <rect x="30" y="165" width="40" height="20" fill="#1e3a8a"/>
    <text x="80" y="180" fill="#e2e8f0" font-size="11">K → 1 (antipodal)</text>

    <text x="50" y="220" text-anchor="middle" fill="#94a3b8" font-size="11">
      Note: K(0,p) =
    </text>
    <text x="50" y="240" text-anchor="middle" fill="#94a3b8" font-size="11">
      (‖p‖²−1)/(‖p‖²+1)
    </text>
    <text x="50" y="270" text-anchor="middle" fill="#94a3b8" font-size="11">
      K(0,0) = −1 (same point)
    </text>
    <text x="50" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">
      K → 1 as ‖p‖ → ∞
    </text>
  </g>
</svg>
