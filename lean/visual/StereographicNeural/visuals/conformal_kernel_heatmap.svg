    <rect x="330" y="0" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="360" y="0" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="390" y="0" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="420" y="0" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="450" y="0" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="480" y="0" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="510" y="0" width="30" height="25" fill="#1d4ed8" opacity="0.85"/>
    <rect x="540" y="0" width="30" height="25" fill="#1e40af" opacity="0.85"/>
    <rect x="570" y="0" width="30" height="25" fill="#1e3a8a" opacity="0.85"/>

    <!-- Middle rows showing gradient from center -->
    <!-- Row 5 (y≈1.5) -->
    <rect x="0" y="125" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="30" y="125" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="60" y="125" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="90" y="125" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
