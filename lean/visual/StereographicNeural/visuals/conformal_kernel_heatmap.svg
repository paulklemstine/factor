<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="700" fill="url(#bg2)" rx="12"/>

  <text x="450" y="45" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">
    Conformal Kernel Heatmap: K(x,y) = ⟨σ⁻¹(x), σ⁻¹(y)⟩
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">
    Stereographic kernel value as a function of distance from reference point at origin
  </text>

  <!-- Heatmap grid (20x20) showing kernel values -->
  <g transform="translate(100, 100)">
    <!-- Axes -->
    <text x="300" y="530" text-anchor="middle" fill="#94a3b8" font-size="14">x-coordinate</text>
    <text x="-40" y="250" text-anchor="middle" fill="#94a3b8" font-size="14" transform="rotate(-90, -40, 250)">y-coordinate</text>

    <!-- Axis labels -->
    <text x="0" y="520" text-anchor="middle" fill="#64748b" font-size="11">-3</text>
    <text x="150" y="520" text-anchor="middle" fill="#64748b" font-size="11">-1.5</text>
    <text x="300" y="520" text-anchor="middle" fill="#64748b" font-size="11">0</text>
    <text x="450" y="520" text-anchor="middle" fill="#64748b" font-size="11">1.5</text>
    <text x="600" y="520" text-anchor="middle" fill="#64748b" font-size="11">3</text>

    <text x="-15" y="5" text-anchor="end" fill="#64748b" font-size="11">3</text>
    <text x="-15" y="130" text-anchor="end" fill="#64748b" font-size="11">1.5</text>
    <text x="-15" y="255" text-anchor="end" fill="#64748b" font-size="11">0</text>
    <text x="-15" y="380" text-anchor="end" fill="#64748b" font-size="11">-1.5</text>
    <text x="-15" y="505" text-anchor="end" fill="#64748b" font-size="11">-3</text>

    <!-- Heatmap cells - kernel K(0, (x,y)) = (|p|²-1)/(|p|²+1) where p=(x,y) -->
    <!-- Center: K=−1 (dark blue), edges: K≈0.8 (bright) -->

    <!-- Row 0 (y=3): far from origin, K ≈ 0.8 -->
    <rect x="0" y="0" width="30" height="25" fill="#2563eb" opacity="0.85"/>
    <rect x="30" y="0" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="60" y="0" width="30" height="25" fill="#3b82f6" opacity="0.85"/>
    <rect x="90" y="0" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="120" y="0" width="30" height="25" fill="#60a5fa" opacity="0.85"/>
    <rect x="150" y="0" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="180" y="0" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="210" y="0" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
    <rect x="240" y="0" width="30" height="25" fill="#93c5fd" opacity="0.85"/>
    <rect x="270" y="0" width="30" height="25" fill="#bfdbfe" opacity="0.85"/>
