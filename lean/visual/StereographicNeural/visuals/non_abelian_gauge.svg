<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <radialGradient id="gaugeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8F6F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1ABC9C;stop-opacity:0.3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#FAFAFA" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia" font-size="20" fill="#2C3E50" font-weight="bold">Non-Abelian Gauge Extensions: U(1) → SU(2)</text>

  <!-- U(1) section -->
  <rect x="30" y="60" width="350" height="200" fill="#EBF5FB" stroke="#3498DB" stroke-width="2" rx="10"/>
  <text x="205" y="85" text-anchor="middle" font-family="Georgia" font-size="14" fill="#2C3E50" font-weight="bold">U(1) Gauge (Abelian)</text>

  <!-- U(1) circle -->
  <circle cx="205" cy="160" r="50" fill="none" stroke="#3498DB" stroke-width="2"/>
  <text x="205" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#2C3E50">A(x) = 2/(1+‖x‖²)</text>
  <text x="205" y="230" text-anchor="middle" font-family="Georgia" font-size="11" fill="#7F8C8D">Scalar conformal factor</text>
  <text x="205" y="248" text-anchor="middle" font-family="Georgia" font-size="10" fill="#7F8C8D">Commutative: AB = BA</text>

  <!-- Arrow -->
  <line x1="400" y1="160" x2="430" y2="160" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowFlow)"/>
  <text x="415" y="150" text-anchor="middle" font-family="Georgia" font-size="12" fill="#E74C3C" font-weight="bold">generalize</text>

  <!-- SU(2) section -->
  <rect x="420" y="60" width="350" height="200" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2" rx="10"/>
  <text x="595" y="85" text-anchor="middle" font-family="Georgia" font-size="14" fill="#2C3E50" font-weight="bold">SU(2) Gauge (Non-Abelian)</text>

  <!-- SU(2) sphere -->
  <circle cx="595" cy="155" r="50" fill="url(#gaugeGrad)" stroke="#E74C3C" stroke-width="2"/>
  <text x="595" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#2C3E50">A = cf/2·I₂</text>
  <text x="595" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#2C3E50">+ α₁σ₁ + α₂σ₂ + α₃σ₃</text>

  <text x="595" y="230" text-anchor="middle" font-family="Georgia" font-size="11" fill="#7F8C8D">Matrix-valued gauge field</text>
  <text x="595" y="248" text-anchor="middle" font-family="Georgia" font-size="10" fill="#E74C3C" font-weight="bold">[σ₁, σ₃] ≠ 0 (proven!)</text>

  <!-- Pauli Matrices -->
  <rect x="30" y="280" width="740" height="100" fill="white" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <text x="400" y="305" text-anchor="middle" font-family="Georgia" font-size="13" fill="#2C3E50" font-weight="bold">Pauli Matrices (SU(2) Generators)</text>

  <text x="150" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#3498DB">σ₁ = [0 1; 1 0]</text>
  <text x="150" y="360" text-anchor="middle" font-family="Georgia" font-size="10" fill="#7F8C8D">tr(σ₁) = 0 ✓</text>

  <text x="400" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#9B59B6">σ₂ = [0 -i; i 0]</text>
  <text x="400" y="360" text-anchor="middle" font-family="Georgia" font-size="10" fill="#7F8C8D">tr(σ₂) = 0 ✓</text>

  <text x="650" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#E74C3C">σ₃ = [1 0; 0 -1]</text>
  <text x="650" y="360" text-anchor="middle" font-family="Georgia" font-size="10" fill="#7F8C8D">tr(σ₃) = 0 ✓</text>

  <!-- Key Properties -->
  <rect x="30" y="400" width="355" height="130" fill="#FEF9E7" stroke="#F39C12" stroke-width="1" rx="5"/>
  <text x="207" y="425" text-anchor="middle" font-family="Georgia" font-size="13" fill="#2C3E50" font-weight="bold">Key Properties (Formally Verified)</text>
  <text x="45" y="448" font-family="Georgia" font-size="11" fill="#2C3E50">• tr(A) = conformal factor</text>
  <text x="45" y="468" font-family="Georgia" font-size="11" fill="#2C3E50">• Yang-Mills action ≥ 0</text>
  <text x="45" y="488" font-family="Georgia" font-size="11" fill="#2C3E50">• Non-abelian mass &gt; 0</text>
  <text x="45" y="508" font-family="Georgia" font-size="11" fill="#2C3E50">• Frobenius norm ≥ 0</text>

  <!-- Applications -->
  <rect x="415" y="400" width="355" height="130" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1" rx="5"/>
  <text x="592" y="425" text-anchor="middle" font-family="Georgia" font-size="13" fill="#2C3E50" font-weight="bold">Applications</text>
  <text x="430" y="448" font-family="Georgia" font-size="11" fill="#2C3E50">• Multi-modal fusion (color = modality)</text>
  <text x="430" y="468" font-family="Georgia" font-size="11" fill="#2C3E50">• Hierarchical attention (color = level)</text>
  <text x="430" y="488" font-family="Georgia" font-size="11" fill="#2C3E50">• Cross-attention mediated by gauge</text>
  <text x="430" y="508" font-family="Georgia" font-size="11" fill="#2C3E50">• Natural regularization via YM action</text>
</svg>
