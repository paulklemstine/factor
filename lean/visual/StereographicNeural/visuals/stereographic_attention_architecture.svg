<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="sphereGrad" cx="35%" cy="35%" r="60%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="bold">
    Stereographic Attention Architecture
  </text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">
    Conformal Neural Attention via Spherical Geometry
  </text>

  <!-- Input tokens -->
  <g transform="translate(80, 140)">
    <text x="60" y="-10" text-anchor="middle" fill="#94a3b8" font-size="13">Input Tokens</text>
    <rect x="0" y="0" width="120" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="23" text-anchor="middle" fill="#e2e8f0" font-size="12">x₁ ∈ ℝᵈ</text>
    <rect x="0" y="45" width="120" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="68" text-anchor="middle" fill="#e2e8f0" font-size="12">x₂ ∈ ℝᵈ</text>
    <rect x="0" y="90" width="120" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12">x₃ ∈ ℝᵈ</text>
    <text x="60" y="150" text-anchor="middle" fill="#64748b" font-size="20">⋮</text>
    <rect x="0" y="165" width="120" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="188" text-anchor="middle" fill="#e2e8f0" font-size="12">xₙ ∈ ℝᵈ</text>
  </g>

  <!-- Q, K, V projections -->
  <g transform="translate(260, 140)">
    <text x="50" y="-10" text-anchor="middle" fill="#94a3b8" font-size="13">Linear Projections</text>
    <rect x="0" y="30" width="100" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="52" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Q = xWq</text>
    <text x="50" y="70" text-anchor="middle" fill="#93c5fd" font-size="10">Queries</text>

    <rect x="0" y="100" width="100" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="122" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">K = xWk</text>
    <text x="50" y="140" text-anchor="middle" fill="#93c5fd" font-size="10">Keys</text>

    <rect x="0" y="170" width="100" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="192" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">V = xWv</text>
    <text x="50" y="210" text-anchor="middle" fill="#93c5fd" font-size="10">Values</text>
  </g>

  <!-- Arrows: input to projections -->
  <line x1="200" y1="240" x2="255" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- The Sphere (central element) -->
  <g transform="translate(520, 250)">
    <text x="0" y="-120" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">
      Inverse Stereographic Projection
    </text>
    <text x="0" y="-98" text-anchor="middle" fill="#94a3b8" font-size="12">
      σ⁻¹: ℝᵈ → Sᵈ⁺¹
    </text>

    <!-- Sphere -->
    <circle cx="0" cy="0" r="90" fill="url(#sphereGrad)" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="25" ry="90" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- Points on sphere -->
    <circle cx="-30" cy="-50" r="6" fill="#fbbf24" filter="url(#glow)"/>
    <text x="-30" y="-60" text-anchor="middle" fill="#fbbf24" font-size="10">q̃₁</text>

    <circle cx="40" cy="-30" r="6" fill="#fbbf24" filter="url(#glow)"/>
    <text x="40" y="-40" text-anchor="middle" fill="#fbbf24" font-size="10">q̃₂</text>

    <circle cx="20" cy="40" r="6" fill="#34d399" filter="url(#glow)"/>
    <text x="20" y="55" text-anchor="middle" fill="#34d399" font-size="10">k̃₁</text>

    <circle cx="-50" cy="20" r="6" fill="#34d399" filter="url(#glow)"/>
    <text x="-50" y="35" text-anchor="middle" fill="#34d399" font-size="10">k̃₂</text>

    <!-- North pole -->
    <circle cx="0" cy="-90" r="4" fill="#ef4444"/>
    <text x="0" y="-97" text-anchor="middle" fill="#ef4444" font-size="9">N (pole)</text>

    <!-- Geodesic arcs (attention connections) -->
    <path d="M-30,-50 Q5,-60 40,-30" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
    <path d="M-30,-50 Q-20,0 20,40" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <path d="M40,-30 Q35,5 20,40" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

    <!-- Label -->
    <text x="0" y="110" text-anchor="middle" fill="#94a3b8" font-size="11">
      Sᵈ⁺¹ ⊂ ℝᵈ⁺²
    </text>
  </g>

  <!-- Arrows: projections to sphere -->
  <line x1="365" y1="195" x2="425" y2="230" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="365" y1="245" x2="425" y2="250" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Conformal Kernel Box -->
  <g transform="translate(700, 140)">
    <rect x="0" y="0" width="180" height="80" rx="10" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">
      Conformal Kernel
    </text>
    <text x="90" y="48" text-anchor="middle" fill="#c4b5fd" font-size="12">
      K(q,k) = ⟨σ⁻¹(q), σ⁻¹(k)⟩
    </text>
    <text x="90" y="68" text-anchor="middle" fill="#94a3b8" font-size="10">
      Inner product on sphere
    </text>
  </g>

  <!-- Arrow: sphere to kernel -->
  <line x1="615" y1="210" x2="695" y2="190" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Softmax -->
  <g transform="translate(700, 250)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">
      Spherical Softmax
    </text>
    <text x="90" y="45" text-anchor="middle" fill="#fcd34d" font-size="11">
      αᵢⱼ = exp(Kᵢⱼ/T) / Σⱼ exp(Kᵢⱼ/T)
    </text>
  </g>

  <!-- Arrow: kernel to softmax -->
  <line x1="790" y1="225" x2="790" y2="245" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <g transform="translate(700, 340)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#1a1a2e" stroke="#34d399" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">
      Weighted Sum
    </text>
    <text x="90" y="45" text-anchor="middle" fill="#6ee7b7" font-size="11">
      oᵢ = Σⱼ αᵢⱼ · vⱼ
    </text>
  </g>

  <!-- Arrow: softmax to output -->
  <line x1="790" y1="315" x2="790" y2="335" stroke="#34d399" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Properties Panel -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="520" height="280" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="260" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">
      Key Properties (Formally Verified in Lean 4)
    </text>
    <line x1="30" y1="45" x2="490" y2="45" stroke="#334155" stroke-width="1"/>

    <text x="30" y="75" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="75" fill="#e2e8f0" font-size="13">Unit sphere guarantee: ‖σ⁻¹(x)‖ = 1 for all x ∈ ℝᵈ</text>

    <text x="30" y="105" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="105" fill="#e2e8f0" font-size="13">Conformality: angles preserved by stereographic map</text>

    <text x="30" y="135" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="135" fill="#e2e8f0" font-size="13">Gradient bound: ‖∇L‖ ≤ 2·‖∇L_sphere‖ (no explosion)</text>

    <text x="30" y="165" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="165" fill="#e2e8f0" font-size="13">Kernel symmetry: K(x,y) = K(y,x)</text>

    <text x="30" y="195" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="195" fill="#e2e8f0" font-size="13">Positive weights: all attention weights &gt; 0</text>

    <text x="30" y="225" fill="#34d399" font-size="13">✓</text>
    <text x="50" y="225" fill="#e2e8f0" font-size="13">Möbius equivariance: rotation-invariant attention</text>

    <text x="30" y="255" fill="#fbbf24" font-size="13">★</text>
    <text x="50" y="255" fill="#fcd34d" font-size="13">Natural gradient clipping via conformal factor cf ∈ (0, 2]</text>
  </g>

  <!-- Comparison Panel -->
  <g transform="translate(620, 480)">
    <rect x="0" y="0" width="530" height="280" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="265" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">
      Standard vs Stereographic Attention
    </text>
    <line x1="30" y1="45" x2="500" y2="45" stroke="#334155" stroke-width="1"/>

    <!-- Standard -->
    <text x="30" y="75" fill="#ef4444" font-size="14" font-weight="bold">Standard:</text>
    <text x="30" y="100" fill="#94a3b8" font-size="12">• Kernel: K(q,k) = q·k / √d</text>
    <text x="30" y="120" fill="#94a3b8" font-size="12">• Gradients: unbounded (∝ ‖q‖·‖k‖)</text>
    <text x="30" y="140" fill="#94a3b8" font-size="12">• Symmetry: translation only</text>
    <text x="30" y="160" fill="#94a3b8" font-size="12">• Geometry: flat Euclidean</text>

    <!-- Stereographic -->
    <text x="30" y="195" fill="#34d399" font-size="14" font-weight="bold">Stereographic:</text>
    <text x="30" y="220" fill="#e2e8f0" font-size="12">• Kernel: K(q,k) = ⟨σ⁻¹(q), σ⁻¹(k)⟩</text>
    <text x="30" y="240" fill="#e2e8f0" font-size="12">• Gradients: bounded by 2 (conformal factor)</text>
    <text x="30" y="260" fill="#e2e8f0" font-size="12">• Symmetry: full Möbius group</text>
    <text x="30" y="280" fill="#e2e8f0" font-size="12">• Geometry: spherical (compact, curved)</text>
  </g>
</svg>
