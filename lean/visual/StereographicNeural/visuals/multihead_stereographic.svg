<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sphereGrad1" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="sphereGrad2" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="sphereGrad3" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="sphereGrad4" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Multi-Head Stereographic Attention</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Each head projects from a different pole on the sphere</text>
  
  <!-- Input tokens -->
  <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Input</text>
  <rect x="25" y="100" width="70" height="25" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">x₁ ∈ ℝᵈ</text>
  <rect x="25" y="135" width="70" height="25" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">x₂ ∈ ℝᵈ</text>
  <rect x="25" y="170" width="70" height="25" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">x₃ ∈ ℝᵈ</text>
  <rect x="25" y="205" width="70" height="25" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">x₄ ∈ ℝᵈ</text>
  
  <!-- Arrows to heads -->
  <line x1="95" y1="160" x2="140" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="95" y1="160" x2="140" y2="200" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="95" y1="160" x2="140" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="95" y1="160" x2="140" y2="360" stroke="#94a3b8" stroke-width="1.5"/>
  
  <!-- Head 1: North Pole -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="45" fill="url(#sphereGrad1)" opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="0" cy="-40" r="5" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
    <text x="0" y="-48" text-anchor="middle" font-family="Arial" font-size="8" fill="#ef4444">N</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4338ca">Head 1</text>
    <text x="0" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#6366f1">θ = 0°</text>
    <!-- Projected points -->
    <circle cx="-15" cy="10" r="3" fill="#6366f1"/>
    <circle cx="12" cy="-5" r="3" fill="#6366f1"/>
    <circle cx="5" cy="20" r="3" fill="#6366f1"/>
    <circle cx="-10" cy="-15" r="3" fill="#6366f1"/>
  </g>
  
  <!-- Head 2: East Pole -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="45" fill="url(#sphereGrad2)" opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="40" cy="0" r="5" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
    <text x="48" y="4" font-family="Arial" font-size="8" fill="#ef4444">E</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b45309">Head 2</text>
    <text x="0" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#f59e0b">θ = 90°</text>
    <circle cx="-20" cy="5" r="3" fill="#f59e0b"/>
    <circle cx="8" cy="-18" r="3" fill="#f59e0b"/>
    <circle cx="-5" cy="22" r="3" fill="#f59e0b"/>
    <circle cx="15" cy="12" r="3" fill="#f59e0b"/>
  </g>
  
  <!-- Head 3: South Pole -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="45" fill="url(#sphereGrad3)" opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="0" cy="40" r="5" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
    <text x="0" y="50" text-anchor="middle" font-family="Arial" font-size="8" fill="#ef4444">S</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#047857">Head 3</text>
    <text x="0" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#10b981">θ = 180°</text>
    <circle cx="18" cy="-12" r="3" fill="#10b981"/>
    <circle cx="-15" cy="8" r="3" fill="#10b981"/>
    <circle cx="10" cy="15" r="3" fill="#10b981"/>
    <circle cx="-8" cy="-20" r="3" fill="#10b981"/>
  </g>
  
  <!-- Head 4: West Pole -->
  <g transform="translate(200, 360)">
    <circle cx="0" cy="0" r="45" fill="url(#sphereGrad4)" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="-40" cy="0" r="5" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
    <text x="-48" y="4" text-anchor="end" font-family="Arial" font-size="8" fill="#ef4444">W</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b91c1c">Head 4</text>
    <text x="0" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef4444">θ = 270°</text>
    <circle cx="12" cy="-15" r="3" fill="#ef4444"/>
    <circle cx="-18" cy="10" r="3" fill="#ef4444"/>
    <circle cx="5" cy="18" r="3" fill="#ef4444"/>
    <circle cx="-10" cy="-8" r="3" fill="#ef4444"/>
  </g>
  
  <!-- Attention matrices -->
  <g transform="translate(330, 80)">
    <text x="50" y="0" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#475569">Attention Weights</text>
    
    <!-- Head 1 matrix -->
    <rect x="0" y="10" width="100" height="60" rx="4" fill="#eef2ff" stroke="#6366f1"/>
    <text x="50" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#4338ca">α¹ᵢⱼ = softmax(K₁)</text>
    
    <!-- Head 2 matrix -->
    <rect x="0" y="80" width="100" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="50" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#b45309">α²ᵢⱼ = softmax(K₂)</text>
    
    <!-- Head 3 matrix -->
    <rect x="0" y="150" width="100" height="60" rx="4" fill="#d1fae5" stroke="#10b981"/>
    <text x="50" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#047857">α³ᵢⱼ = softmax(K₃)</text>
    
    <!-- Head 4 matrix -->
    <rect x="0" y="220" width="100" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
    <text x="50" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#b91c1c">α⁴ᵢⱼ = softmax(K₄)</text>
  </g>
  
  <!-- Concatenation -->
  <g transform="translate(490, 80)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#475569">Combine</text>
    <rect x="10" y="30" width="100" height="250" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#334155">Concat</text>
    <text x="60" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#334155">+</text>
    <text x="60" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#334155">Project</text>
    <text x="60" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">W_O ∈ ℝ^{Hd×d}</text>
  </g>
  
  <!-- Output -->
  <g transform="translate(650, 80)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#475569">Output</text>
    <rect x="25" y="70" width="70" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="60" y="87" text-anchor="middle" font-family="monospace" font-size="10" fill="#1d4ed8">o₁</text>
    <rect x="25" y="105" width="70" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="60" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#1d4ed8">o₂</text>
    <rect x="25" y="140" width="70" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="60" y="157" text-anchor="middle" font-family="monospace" font-size="10" fill="#1d4ed8">o₃</text>
    <rect x="25" y="175" width="70" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="60" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#1d4ed8">o₄</text>
  </g>
  
  <!-- Bottom: Key equation -->
  <rect x="50" y="450" width="700" height="40" rx="6" fill="#1e293b"/>
  <text x="400" y="475" text-anchor="middle" font-family="monospace" font-size="13" fill="#e2e8f0">
    K_h(x,y) = ⟨σ⁻¹(R_h·x), σ⁻¹(R_h·y)⟩    where R_h ∈ SO(d), h = 1,...,H
  </text>
</svg>
