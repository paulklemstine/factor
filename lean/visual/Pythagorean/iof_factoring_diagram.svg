<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="iofbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#iofbg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f0f0ff" font-size="20" font-weight="bold">
    Inside-Out Factoring via Berggren Descent
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#888" font-size="12">
    Factor N by solving Diophantine equations on the Pythagorean tree
  </text>

  <!-- Step 1: Embed -->
  <rect x="30" y="80" width="220" height="120" rx="10" fill="#1e1e3f" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="bold">① Embed</text>
  <text x="50" y="130" fill="#c7d2fe" font-size="11">Given: N = p × q (to factor)</text>
  <text x="50" y="150" fill="#c7d2fe" font-size="11">Form triple: (N, u, h)</text>
  <text x="50" y="170" fill="#c7d2fe" font-size="11">where h² = N² + u²</text>
  <text x="50" y="190" fill="#818cf8" font-size="10">u is the unknown parameter</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="140" x2="290" y2="140" stroke="#4f46e5" stroke-width="2"/>
  <polygon points="290,135 300,140 290,145" fill="#4f46e5"/>

  <!-- Step 2: Descend -->
  <rect x="300" y="80" width="200" height="120" rx="10" fill="#1e1e3f" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="bold">② Descend</text>
  <text x="320" y="130" fill="#ddd6fe" font-size="11">Apply B⁻¹ repeatedly</text>
  <text x="320" y="150" fill="#ddd6fe" font-size="11">c' = 3c - 2(a+b)</text>
  <text x="320" y="170" fill="#ddd6fe" font-size="11">Hypotenuse decreases</text>
  <text x="320" y="190" fill="#a78bfa" font-size="10">Target: reach (3,4,5)</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="140" x2="540" y2="140" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="540,135 550,140 540,145" fill="#7c3aed"/>

  <!-- Step 3: Solve -->
  <rect x="550" y="80" width="220" height="120" rx="10" fill="#1e1e3f" stroke="#a855f7" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="bold">③ Solve</text>
  <text x="570" y="130" fill="#e9d5ff" font-size="11">Root equation at depth d:</text>
  <text x="570" y="150" fill="#e9d5ff" font-size="11">Polynomial in u of</text>
  <text x="570" y="170" fill="#e9d5ff" font-size="11">degree O(2ᵈ)</text>
  <text x="570" y="190" fill="#c084fc" font-size="10">Integer roots → factors</text>

  <!-- Step 4: Extract -->
  <rect x="200" y="240" width="400" height="100" rx="10" fill="#1a0a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">④ Factor Extraction</text>
  <text x="220" y="290" fill="#fef3c7" font-size="12">Core Identity: (h - u)(h + u) = N²</text>
  <text x="220" y="310" fill="#fef3c7" font-size="12">Factor: gcd(h - u, N)  →  nontrivial if ∉ {1, N}</text>
  <text x="220" y="330" fill="#fbbf24" font-size="10">Lean-verified: iof_core_identity, diff_of_squares_factoring</text>

  <!-- Arrows to step 4 -->
  <line x1="400" y1="200" x2="400" y2="240" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="395,240 400,250 405,240" fill="#f59e0b"/>

  <!-- Depth-1 equation box -->
  <rect x="50" y="370" width="340" height="110" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="395" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Depth-1 IOF Equation</text>
  <text x="70" y="420" fill="#6ee7b7" font-size="12">5N² - 8Nu + 5u² - 20N - 20u - 25 = 0</text>
  <text x="70" y="445" fill="#a7f3d0" font-size="11">Discriminant: Δ = -36(N² - 10N/3 - ···)</text>
  <text x="70" y="465" fill="#94a3b8" font-size="10">Verified: iof_depth1_constraint + iof_depth1_quadratic</text>

  <!-- Example box -->
  <rect x="420" y="370" width="350" height="110" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="595" y="395" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="bold">Example: N = 15</text>
  <text x="440" y="420" fill="#fda4af" font-size="12">15 = 3 × 5</text>
  <text x="440" y="440" fill="#fda4af" font-size="12">Depth-1 solution: u = 4, h = √(225+16) ✗</text>
  <text x="440" y="460" fill="#fda4af" font-size="12">IOF finds: u where gcd(h-u, 15) = 3 or 5</text>
  <text x="440" y="480" fill="#94a3b8" font-size="10">Multiple depths may be needed for large N</text>
</svg>
