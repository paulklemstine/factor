<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="700" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#FFD700" font-size="22" font-weight="bold">
    Five New Directions: Berggren–Theta Group Correspondence
  </text>
  
  <!-- Central node -->
  <circle cx="450" cy="350" r="70" fill="none" stroke="#FFD700" stroke-width="2.5" filter="url(#glow)"/>
  <text x="450" y="340" text-anchor="middle" fill="#FFD700" font-size="15" font-weight="bold">Berggren Tree</text>
  <text x="450" y="358" text-anchor="middle" fill="#FFD700" font-size="12">↔ Γ_θ</text>
  <text x="450" y="375" text-anchor="middle" fill="#aaa" font-size="10">M₃ = T², M₁ = T²S</text>
  
  <!-- Direction 1: SO(3,1;Z) - Top -->
  <line x1="450" y1="280" x2="450" y2="130" stroke="#4FC3F7" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="450" cy="120" r="55" fill="rgba(79,195,247,0.15)" stroke="#4FC3F7" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" fill="#4FC3F7" font-size="13" font-weight="bold">1. SO(3,1;ℤ)</text>
  <text x="450" y="122" text-anchor="middle" fill="#ccc" font-size="10">Pythagorean</text>
  <text x="450" y="136" text-anchor="middle" fill="#ccc" font-size="10">Quadruples</text>
  <text x="450" y="155" text-anchor="middle" fill="#888" font-size="9">a²+b²+c²=d²</text>
  
  <!-- Direction 2: Spectral Gap - Top Right -->
  <line x1="510" y1="300" x2="700" y2="170" stroke="#66BB6A" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="720" cy="155" r="55" fill="rgba(102,187,106,0.15)" stroke="#66BB6A" stroke-width="2"/>
  <text x="720" y="138" text-anchor="middle" fill="#66BB6A" font-size="13" font-weight="bold">2. Spectral Gap</text>
  <text x="720" y="155" text-anchor="middle" fill="#ccc" font-size="10">λ₁ = 1/4</text>
  <text x="720" y="172" text-anchor="middle" fill="#888" font-size="9">O(log N) descent</text>
  
  <!-- Direction 3: L-functions - Bottom Right -->
  <line x1="510" y1="400" x2="700" y2="510" stroke="#EF5350" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="720" cy="530" r="55" fill="rgba(239,83,80,0.15)" stroke="#EF5350" stroke-width="2"/>
  <text x="720" y="515" text-anchor="middle" fill="#EF5350" font-size="13" font-weight="bold">3. L-Functions</text>
  <text x="720" y="532" text-anchor="middle" fill="#ccc" font-size="10">r₂(n) = 4Σ χ₋₄(d)</text>
  <text x="720" y="549" text-anchor="middle" fill="#888" font-size="9">L(1,χ₋₄) = π/4</text>
  
  <!-- Direction 4: Quantum - Bottom Left -->
  <line x1="390" y1="400" x2="200" y2="510" stroke="#AB47BC" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="180" cy="530" r="55" fill="rgba(171,71,188,0.15)" stroke="#AB47BC" stroke-width="2"/>
  <text x="180" y="515" text-anchor="middle" fill="#AB47BC" font-size="13" font-weight="bold">4. Quantum</text>
  <text x="180" y="532" text-anchor="middle" fill="#ccc" font-size="10">Exact Gates</text>
  <text x="180" y="549" text-anchor="middle" fill="#888" font-size="9">S⁴=I, ‖M-I‖²=4</text>
  
  <!-- Direction 5: Hauptmodul - Top Left -->
  <line x1="390" y1="300" x2="200" y2="170" stroke="#FFA726" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="180" cy="155" r="55" fill="rgba(255,167,38,0.15)" stroke="#FFA726" stroke-width="2"/>
  <text x="180" y="138" text-anchor="middle" fill="#FFA726" font-size="13" font-weight="bold">5. Hauptmodul</text>
  <text x="180" y="155" text-anchor="middle" fill="#ccc" font-size="10">λ(τ) = (θ₂/θ₃)⁴</text>
  <text x="180" y="172" text-anchor="middle" fill="#888" font-size="9">j(i) = 1728</text>
  
  <!-- Key equations -->
  <rect x="60" y="620" width="780" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="#555" stroke-width="1"/>
  <text x="450" y="643" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">Key Identity</text>
  <text x="450" y="665" text-anchor="middle" fill="#ddd" font-size="14" font-style="italic">
    M₁ = T²·S,  M₃ = T²  ⟹  ⟨M₁, M₃⟩ = Γ_θ = ⟨T², S⟩ ⊂ SL(2,ℤ)
  </text>
  
  <!-- Connecting arcs between directions -->
  <path d="M 220 120 Q 350 70 415 100" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 485 100 Q 550 70 680 120" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 750 190 Q 800 350 750 495" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 680 565 Q 450 630 220 565" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 150 495 Q 100 350 150 190" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Verification badge -->
  <rect x="680" y="8" width="200" height="28" rx="14" fill="rgba(76,175,80,0.2)" stroke="#4CAF50"/>
  <text x="780" y="27" text-anchor="middle" fill="#4CAF50" font-size="11">✓ 165+ theorems, 0 sorry</text>
</svg>
