<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d2a"/>
    </linearGradient>
    <linearGradient id="exact" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#55efc4"/>
    </linearGradient>
    <linearGradient id="noisy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="550" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">The Exact Homomorphism Theorem</text>
  <text x="400" y="62" text-anchor="middle" fill="#aaaacc" font-size="12">When is encrypted addition perfectly noise-free?</text>
  
  <!-- Left side: The theorem -->
  <rect x="30" y="85" width="350" height="180" rx="12" fill="#ffffff" opacity="0.05" stroke="#48dbfb" stroke-width="1"/>
  <text x="205" y="110" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Theorem (Iff)</text>
  
  <text x="50" y="140" fill="#ffffff" font-size="13">Given QDF quadruples v₁, v₂:</text>
  
  <text x="50" y="170" fill="#55efc4" font-size="13" font-weight="bold">(a₁+a₂)² + (b₁+b₂)² + (c₁+c₂)² = (d₁+d₂)²</text>
  
  <text x="205" y="195" text-anchor="middle" fill="#feca57" font-size="16" font-weight="bold">⟺</text>
  
  <text x="50" y="220" fill="#48dbfb" font-size="13" font-weight="bold">a₁a₂ + b₁b₂ + c₁c₂ = d₁d₂</text>
  
  <text x="50" y="250" fill="#999999" font-size="10">Machine-verified in Lean 4 (qdf_exact_homomorphism_iff)</text>
  
  <!-- Right side: Noise diagram -->
  <rect x="420" y="85" width="350" height="180" rx="12" fill="#ffffff" opacity="0.05" stroke="#ff6b6b" stroke-width="1"/>
  <text x="595" y="110" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Noise Characterization</text>
  
  <text x="440" y="140" fill="#ffffff" font-size="12">When condition fails:</text>
  <text x="440" y="165" fill="#ff9999" font-size="13">noise = 2·(⟨v₁,v₂⟩ − d₁d₂)</text>
  
  <text x="440" y="195" fill="#ffffff" font-size="12">Cauchy-Schwarz bound:</text>
  <text x="440" y="220" fill="#ffdd99" font-size="13">|⟨v₁,v₂⟩| ≤ d₁·d₂</text>
  
  <text x="440" y="250" fill="#ffffff" font-size="12">Maximum noise: |noise| ≤ 4·d₁·d₂</text>
  
  <!-- Examples section -->
  <text x="400" y="300" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Computational Examples</text>
  
  <!-- Exact example -->
  <rect x="30" y="315" width="350" height="100" rx="10" fill="url(#exact)" opacity="0.1" stroke="url(#exact)" stroke-width="1.5"/>
  <text x="50" y="338" fill="#55efc4" font-size="13" font-weight="bold">✓ Noise-Free Example</text>
  <text x="50" y="358" fill="#dddddd" font-size="11">v = (1, 2, 2, 3): self-addition</text>
  <text x="50" y="378" fill="#dddddd" font-size="11">⟨v,v⟩ = 1+4+4 = 9 = 3·3 = d²  ✓</text>
  <text x="50" y="398" fill="#55efc4" font-size="11">2² + 4² + 4² = 36 = 6² = (3+3)²  ✓</text>
  
  <!-- Noisy example -->
  <rect x="420" y="315" width="350" height="100" rx="10" fill="url(#noisy)" opacity="0.1" stroke="url(#noisy)" stroke-width="1.5"/>
  <text x="440" y="338" fill="#ff6b6b" font-size="13" font-weight="bold">✗ Noisy Example</text>
  <text x="440" y="358" fill="#dddddd" font-size="11">v₁=(1,2,2,3), v₂=(2,3,6,7)</text>
  <text x="440" y="378" fill="#dddddd" font-size="11">⟨v₁,v₂⟩ = 2+6+12 = 20 ≠ 21 = d₁d₂</text>
  <text x="440" y="398" fill="#ff9999" font-size="11">noise = 2·(20−21) = −2</text>
  
  <!-- Noise-free operations -->
  <rect x="30" y="435" width="740" height="95" rx="12" fill="#ffffff" opacity="0.05" stroke="#feca57" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" fill="#feca57" font-size="14" font-weight="bold">Always Noise-Free Operations</text>
  
  <rect x="50" y="470" width="140" height="45" rx="8" fill="#55efc4" opacity="0.15"/>
  <text x="120" y="490" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">Scalar Mult</text>
  <text x="120" y="505" text-anchor="middle" fill="#aaaacc" font-size="10">(ka)²+(kb)²+(kc)²=(kd)²</text>
  
  <rect x="210" y="470" width="140" height="45" rx="8" fill="#55efc4" opacity="0.15"/>
  <text x="280" y="490" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">Self-Addition</text>
  <text x="280" y="505" text-anchor="middle" fill="#aaaacc" font-size="10">⟨v,v⟩ = d² always</text>
  
  <rect x="370" y="470" width="140" height="45" rx="8" fill="#55efc4" opacity="0.15"/>
  <text x="440" y="490" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">Mod Reduction</text>
  <text x="440" y="505" text-anchor="middle" fill="#aaaacc" font-size="10">a²+b²+c² ≡ d² (mod m)</text>
  
  <rect x="530" y="470" width="140" height="45" rx="8" fill="#55efc4" opacity="0.15"/>
  <text x="600" y="490" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">Exact Subtract</text>
  <text x="600" y="505" text-anchor="middle" fill="#aaaacc" font-size="10">Same iff condition</text>
</svg>
