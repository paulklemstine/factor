<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1e3a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e6ff" font-size="22" font-weight="bold"
        filter="url(#glow)">The Quadruple Forest is a Single Tree</text>
  <text x="450" y="62" text-anchor="middle" fill="#8890b0" font-size="13">
    Universal descent via R₁₁₁₁ ∈ O(3,1;ℤ) — Every primitive Pythagorean quadruple reaches (0,0,1,1)
  </text>

  <!-- Tree edges -->
  <g stroke="#4466aa" stroke-width="2" opacity="0.6">
    <!-- Root to (1,2,2,3) -->
    <line x1="450" y1="120" x2="450" y2="190"/>
    <!-- (1,2,2,3) to children -->
    <line x1="450" y1="220" x2="150" y2="300"/>
    <line x1="450" y1="220" x2="350" y2="300"/>
    <line x1="450" y1="220" x2="550" y2="300"/>
    <line x1="450" y1="220" x2="750" y2="300"/>
    <!-- (0,3,4,5) to children -->
    <line x1="150" y1="330" x2="80" y2="410"/>
    <line x1="150" y1="330" x2="220" y2="410"/>
    <!-- (2,3,6,7) to children -->
    <line x1="350" y1="330" x2="300" y2="410"/>
    <line x1="350" y1="330" x2="400" y2="410"/>
    <!-- (4,4,7,9) to children -->
    <line x1="550" y1="330" x2="510" y2="410"/>
    <line x1="550" y1="330" x2="590" y2="410"/>
    <!-- (6,6,7,11) to children -->
    <line x1="750" y1="330" x2="700" y2="410"/>
    <line x1="750" y1="330" x2="800" y2="410"/>
    <!-- Third generation -->
    <line x1="80" y1="440" x2="60" y2="510"/>
    <line x1="80" y1="440" x2="100" y2="510"/>
    <line x1="300" y1="440" x2="280" y2="510"/>
    <line x1="300" y1="440" x2="320" y2="510"/>
  </g>

  <!-- Root node -->
  <circle cx="450" cy="110" r="22" fill="#ff6644" stroke="#ff9977" stroke-width="2" filter="url(#glow2)"/>
  <text x="450" y="115" text-anchor="middle" fill="white" font-size="11" font-weight="bold">(0,0,1,1)</text>

  <!-- Level 1: (1,2,2,3) -->
  <circle cx="450" cy="210" r="20" fill="#44aaff" stroke="#77ccff" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">(1,2,2,3)</text>

  <!-- Level 2 -->
  <circle cx="150" cy="320" r="18" fill="#44cc88" stroke="#66eebb" stroke-width="2" filter="url(#glow)"/>
  <text x="150" y="325" text-anchor="middle" fill="white" font-size="9">(0,3,4,5)</text>

  <circle cx="350" cy="320" r="18" fill="#44cc88" stroke="#66eebb" stroke-width="2" filter="url(#glow)"/>
  <text x="350" y="325" text-anchor="middle" fill="white" font-size="9">(2,3,6,7)</text>

  <circle cx="550" cy="320" r="18" fill="#44cc88" stroke="#66eebb" stroke-width="2" filter="url(#glow)"/>
  <text x="550" y="325" text-anchor="middle" fill="white" font-size="9">(4,4,7,9)</text>

  <circle cx="750" cy="320" r="18" fill="#44cc88" stroke="#66eebb" stroke-width="2" filter="url(#glow)"/>
  <text x="750" y="325" text-anchor="middle" fill="white" font-size="9">(6,6,7,11)</text>

  <!-- Level 3 -->
  <circle cx="80" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="80" y="434" text-anchor="middle" fill="white" font-size="8">(1,4,8,9)</text>

  <circle cx="220" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="220" y="434" text-anchor="middle" fill="white" font-size="8">(0,7,24,25)</text>

  <circle cx="300" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="300" y="434" text-anchor="middle" fill="white" font-size="8">(3,4,12,13)</text>

  <circle cx="400" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="400" y="434" text-anchor="middle" fill="white" font-size="8">(6,9,18,21)</text>

  <circle cx="510" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="510" y="434" text-anchor="middle" fill="white" font-size="8">(1,12,12,17)</text>

  <circle cx="590" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="590" y="434" text-anchor="middle" fill="white" font-size="8">(8,8,14,18)</text>

  <circle cx="700" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="700" y="434" text-anchor="middle" fill="white" font-size="8">(5,10,10,15)</text>

  <circle cx="800" cy="430" r="15" fill="#aa66dd" stroke="#cc88ff" stroke-width="1.5"/>
  <text x="800" y="434" text-anchor="middle" fill="white" font-size="8">(6,6,17,19)</text>

  <!-- Level 4 (dots) -->
  <circle cx="60" cy="520" r="12" fill="#dd8844" stroke="#ffaa66" stroke-width="1.5"/>
  <text x="60" y="524" text-anchor="middle" fill="white" font-size="7">(2,5,14,15)</text>

  <circle cx="100" cy="520" r="12" fill="#dd8844" stroke="#ffaa66" stroke-width="1.5"/>
  <text x="100" y="524" text-anchor="middle" fill="white" font-size="7">(3,8,24,25)</text>

  <circle cx="280" cy="520" r="12" fill="#dd8844" stroke="#ffaa66" stroke-width="1.5"/>
  <text x="280" y="524" text-anchor="middle" fill="white" font-size="7">(2,10,25,27)</text>

  <circle cx="320" cy="520" r="12" fill="#dd8844" stroke="#ffaa66" stroke-width="1.5"/>
  <text x="320" y="524" text-anchor="middle" fill="white" font-size="7">(6,8,24,26)</text>

  <!-- Ellipsis -->
  <text x="450" y="560" text-anchor="middle" fill="#8890b0" font-size="18">⋮ ⋮ ⋮</text>

  <!-- Legend -->
  <rect x="20" y="590" width="860" height="95" rx="8" fill="#151832" stroke="#334" stroke-width="1"/>
  <text x="40" y="612" fill="#e0e6ff" font-size="13" font-weight="bold">Legend</text>

  <circle cx="55" cy="632" r="8" fill="#ff6644"/>
  <text x="70" y="636" fill="#ccd" font-size="11">Root: (0,0,1,1) — the unique fixed point</text>

  <circle cx="55" cy="655" r="8" fill="#44aaff"/>
  <text x="70" y="659" fill="#ccd" font-size="11">Depth 1: single child (1,2,2,3)</text>

  <circle cx="400" cy="632" r="8" fill="#44cc88"/>
  <text x="415" y="636" fill="#ccd" font-size="11">Depth 2: 4 quadruples</text>

  <circle cx="400" cy="655" r="8" fill="#aa66dd"/>
  <text x="415" y="659" fill="#ccd" font-size="11">Depth 3: variable branching</text>

  <text x="40" y="678" fill="#8890b0" font-size="10">
    Descent: R₁₁₁₁(a,b,c,d) = (d−b−c, d−a−c, d−a−b, 2d−a−b−c) then |·| and sort.
    Verified for all 93 primitive quadruples with d ≤ 50.
  </text>
</svg>
