<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#ffd700" font-size="24" font-weight="bold"
        filter="url(#glow)">QDF Five Research Directions</text>
  <text x="500" y="70" text-anchor="middle" fill="#aaaacc" font-size="14">
    a² + b² + c² = d² — One Equation, Five Frontiers
  </text>

  <!-- Center: QDF Core -->
  <circle cx="500" cy="350" r="70" fill="#1a1a4e" stroke="#ffd700" stroke-width="3" filter="url(#shadow)"/>
  <text x="500" y="340" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold">QDF</text>
  <text x="500" y="358" text-anchor="middle" fill="#ffffff" font-size="11">a²+b²+c²=d²</text>
  <text x="500" y="375" text-anchor="middle" fill="#aaaacc" font-size="10">45+ verified</text>
  <text x="500" y="390" text-anchor="middle" fill="#aaaacc" font-size="10">theorems</text>

  <!-- Direction 1: Lattice Cryptography (top-left) -->
  <line x1="440" y1="300" x2="250" y2="170" stroke="#4a9eff" stroke-width="2" opacity="0.7"/>
  <rect x="120" y="100" width="260" height="130" rx="15" fill="#0d1b3e" stroke="#4a9eff" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="130" text-anchor="middle" fill="#4a9eff" font-size="15" font-weight="bold">🔐 Lattice Cryptography</text>
  <text x="250" y="152" text-anchor="middle" fill="#ccccee" font-size="11">• QDF cone in ℤ⁴</text>
  <text x="250" y="170" text-anchor="middle" fill="#ccccee" font-size="11">• Cauchy–Schwarz bounds</text>
  <text x="250" y="188" text-anchor="middle" fill="#ccccee" font-size="11">• GCD primitivity reduction</text>
  <text x="250" y="206" text-anchor="middle" fill="#ccccee" font-size="11">• Gram diagonal: ‖v‖² = 2d²</text>
  <text x="250" y="224" text-anchor="middle" fill="#88aaff" font-size="10" font-style="italic">Post-quantum security</text>

  <!-- Direction 2: Homomorphic Encryption (top-right) -->
  <line x1="560" y1="300" x2="750" y2="170" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
  <rect x="620" y="100" width="260" height="130" rx="15" fill="#3e0d1b" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="130" text-anchor="middle" fill="#ff6b6b" font-size="15" font-weight="bold">🔒 Homomorphic Encryption</text>
  <text x="750" y="152" text-anchor="middle" fill="#eecccc" font-size="11">• Modular preservation</text>
  <text x="750" y="170" text-anchor="middle" fill="#eecccc" font-size="11">• Noise = 2(⟨v₁,v₂⟩ − d₁d₂)</text>
  <text x="750" y="188" text-anchor="middle" fill="#eecccc" font-size="11">• Exact homomorphism cond.</text>
  <text x="750" y="206" text-anchor="middle" fill="#eecccc" font-size="11">• CRT compatibility</text>
  <text x="750" y="224" text-anchor="middle" fill="#ffaaaa" font-size="10" font-style="italic">Encrypted computation</text>

  <!-- Direction 3: Quantum Error Correction (bottom-left) -->
  <line x1="440" y1="400" x2="220" y2="500" stroke="#50fa7b" stroke-width="2" opacity="0.7"/>
  <rect x="80" y="460" width="280" height="140" rx="15" fill="#0d3e1b" stroke="#50fa7b" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="490" text-anchor="middle" fill="#50fa7b" font-size="15" font-weight="bold">⚛️ Quantum Error Correction</text>
  <text x="220" y="512" text-anchor="middle" fill="#cceecc" font-size="11">• Rational Bloch sphere</text>
  <text x="220" y="530" text-anchor="middle" fill="#cceecc" font-size="11">• Syndrome: e(2a+e)</text>
  <text x="220" y="548" text-anchor="middle" fill="#cceecc" font-size="11">• Stabilizer triples</text>
  <text x="220" y="566" text-anchor="middle" fill="#cceecc" font-size="11">• Code distance bounds</text>
  <text x="220" y="588" text-anchor="middle" fill="#aaffaa" font-size="10" font-style="italic">Fault-tolerant quantum computing</text>

  <!-- Direction 4: Topological Data Analysis (bottom-right) -->
  <line x1="560" y1="400" x2="780" y2="500" stroke="#bd93f9" stroke-width="2" opacity="0.7"/>
  <rect x="640" y="460" width="280" height="140" rx="15" fill="#1b0d3e" stroke="#bd93f9" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="490" text-anchor="middle" fill="#bd93f9" font-size="15" font-weight="bold">📐 Topological Data Analysis</text>
  <text x="780" y="512" text-anchor="middle" fill="#ddccee" font-size="11">• dist² = 2d² − 2⟨v₁,v₂⟩</text>
  <text x="780" y="530" text-anchor="middle" fill="#ddccee" font-size="11">• Maximum dist² ≤ 4d²</text>
  <text x="780" y="548" text-anchor="middle" fill="#ddccee" font-size="11">• 48-element symmetry group</text>
  <text x="780" y="566" text-anchor="middle" fill="#ddccee" font-size="11">• Birth time filtration</text>
  <text x="780" y="588" text-anchor="middle" fill="#cc99ff" font-size="10" font-style="italic">Shape of number theory</text>

  <!-- Direction 5: Automated Theorem Proving (bottom-center) -->
  <line x1="500" y1="420" x2="500" y2="610" stroke="#ffb86c" stroke-width="2" opacity="0.7"/>
  <rect x="360" y="615" width="280" height="75" rx="15" fill="#3e2a0d" stroke="#ffb86c" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="640" text-anchor="middle" fill="#ffb86c" font-size="15" font-weight="bold">🤖 Automated Discovery</text>
  <text x="500" y="660" text-anchor="middle" fill="#eeddcc" font-size="11">Quartic family • Triple composition • Difference factoring</text>
  <text x="500" y="678" text-anchor="middle" fill="#ffcc88" font-size="10" font-style="italic">AI-verified mathematical identities</text>

  <!-- Cross-domain bridges -->
  <line x1="250" y1="230" x2="750" y2="230" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="500" y="248" text-anchor="middle" fill="#888888" font-size="9">Lattice ↔ HE bridge</text>

  <line x1="220" y1="460" x2="780" y2="460" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="500" y="450" text-anchor="middle" fill="#888888" font-size="9">QEC ↔ TDA bridge</text>
</svg>
