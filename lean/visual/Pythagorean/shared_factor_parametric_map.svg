<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd32a"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">Parametric Factor Revelation Map</text>
  <text x="450" y="55" text-anchor="middle" fill="#8899bb" font-size="12">(m,n,p,q) → (a,b,c,d) : How parametrization reveals multiplicative structure</text>

  <!-- Left: Parameter Space -->
  <g transform="translate(40, 85)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Parameter Space</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-size="15">(m, n, p, q) ∈ ℤ⁴</text>
    <text x="100" y="85" text-anchor="middle" fill="#cccccc" font-size="12">α = m + ni ∈ ℤ[i]</text>
    <text x="100" y="105" text-anchor="middle" fill="#cccccc" font-size="12">β = p + qi ∈ ℤ[i]</text>
    <text x="100" y="135" text-anchor="middle" fill="#88aacc" font-size="11">Two Gaussian integers</text>
  </g>

  <!-- Arrow -->
  <line x1="250" y1="160" x2="310" y2="160" stroke="#ffd32a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="150" text-anchor="middle" fill="#ffd32a" font-size="10">map</text>

  <!-- Middle: Quadruple -->
  <g transform="translate(320, 85)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="none" stroke="#48dbfb" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Quadruple Space</text>
    <text x="125" y="50" text-anchor="middle" fill="#ffffff" font-size="11">a = m²+n²−p²−q²</text>
    <text x="125" y="70" text-anchor="middle" fill="#ffffff" font-size="11">b = 2(mq+np)</text>
    <text x="125" y="90" text-anchor="middle" fill="#ffffff" font-size="11">c = 2(nq−mp)</text>
    <text x="125" y="115" text-anchor="middle" fill="#ffd32a" font-size="14" font-weight="bold">d = |α|² + |β|²</text>
    <text x="125" y="140" text-anchor="middle" fill="#88ff88" font-size="12">= (m²+n²) + (p²+q²)</text>
  </g>

  <!-- Arrow -->
  <line x1="580" y1="160" x2="640" y2="160" stroke="#ffd32a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="150" text-anchor="middle" fill="#ffd32a" font-size="10">factor</text>

  <!-- Right: Factor Structure -->
  <g transform="translate(650, 85)">
    <rect x="0" y="0" width="220" height="150" rx="10" fill="none" stroke="#88ff88" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#88ff88" font-size="14" font-weight="bold">Factor Structure</text>
    <text x="110" y="55" text-anchor="middle" fill="#ffffff" font-size="13">d = S₁ + S₂</text>
    <text x="110" y="80" text-anchor="middle" fill="#cccccc" font-size="11">S₁ = m²+n² (sum of 2 sq)</text>
    <text x="110" y="100" text-anchor="middle" fill="#cccccc" font-size="11">S₂ = p²+q² (sum of 2 sq)</text>
    <text x="110" y="130" text-anchor="middle" fill="#ffd32a" font-size="12">Brahmagupta reveals</text>
    <text x="110" y="145" text-anchor="middle" fill="#ffd32a" font-size="12">prime factors of S₁, S₂</text>
  </g>

  <!-- Example Row -->
  <g transform="translate(40, 270)">
    <rect x="0" y="0" width="830" height="100" rx="10" fill="none" stroke="#aabbcc" stroke-width="1" opacity="0.4"/>
    <text x="415" y="25" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Worked Example</text>

    <text x="20" y="55" fill="#ff6b6b" font-size="12">(m,n,p,q) = (2,1,1,1)</text>
    <text x="20" y="75" fill="#cccccc" font-size="12">α = 2+i, |α|² = 5</text>
    <text x="20" y="90" fill="#cccccc" font-size="12">β = 1+i, |β|² = 2</text>

    <text x="280" y="55" fill="#48dbfb" font-size="12">a = 5−2 = 3</text>
    <text x="280" y="75" fill="#48dbfb" font-size="12">b = 2(2+1) = 6</text>
    <text x="280" y="90" fill="#48dbfb" font-size="12">c = 2(1−2) = −2, d = 5+2 = 7</text>

    <text x="550" y="55" fill="#88ff88" font-size="12">Quadruple: (3, 6, −2, 7)</text>
    <text x="550" y="75" fill="#88ff88" font-size="12">9+36+4 = 49 = 7² ✓</text>
    <text x="550" y="90" fill="#ffd32a" font-size="12">d = 7 = 5 + 2 (sum of sq. decomp)</text>
  </g>

  <!-- Key Insight -->
  <g transform="translate(40, 395)">
    <rect x="0" y="0" width="830" height="70" rx="10" fill="#ffd32a" opacity="0.08" stroke="#ffd32a" stroke-width="1.5"/>
    <text x="415" y="25" text-anchor="middle" fill="#ffd32a" font-size="14" font-weight="bold">Key Insight</text>
    <text x="415" y="50" text-anchor="middle" fill="#ffffff" font-size="13">The parametrization decomposes d into S₁ + S₂ where each Sᵢ is a sum of two squares.</text>
    <text x="415" y="65" text-anchor="middle" fill="#cccccc" font-size="11">Factoring each Sᵢ via Gaussian integers reveals the multiplicative structure of d.</text>
  </g>

  <text x="450" y="490" text-anchor="middle" fill="#445566" font-size="10">Shared Factor Bridge — Parametric Factor Revelation</text>
</svg>
