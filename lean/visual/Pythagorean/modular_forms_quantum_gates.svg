<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="qbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="qglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="600" fill="url(#qbg)"/>
  
  <text x="450" y="35" text-anchor="middle" fill="#58a6ff" font-size="20" font-weight="bold">
    Berggren Matrices as Quantum Gates
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#8b949e" font-size="12">
    Exact integer gates in SU(1,1) — no Solovay-Kitaev approximation needed
  </text>
  
  <!-- Gate M₁ -->
  <rect x="30" y="80" width="250" height="170" rx="10" fill="rgba(136,198,255,0.08)" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="155" y="105" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">Gate M₁ = T²S</text>
  <text x="155" y="130" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">┌       ┐</text>
  <text x="155" y="150" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  2  -1 │</text>
  <text x="155" y="170" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  1   0 │</text>
  <text x="155" y="190" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">└       ┘</text>
  <text x="155" y="215" text-anchor="middle" fill="#7ee787" font-size="11">det = 1 · tr = 2 (parabolic)</text>
  <text x="155" y="235" text-anchor="middle" fill="#ffa657" font-size="11">1 zero entry → sparse gate</text>
  
  <!-- Gate S -->
  <rect x="320" y="80" width="250" height="170" rx="10" fill="rgba(210,153,255,0.08)" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="445" y="105" text-anchor="middle" fill="#d2a8ff" font-size="16" font-weight="bold">Gate S (π/2 rotation)</text>
  <text x="445" y="130" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">┌       ┐</text>
  <text x="445" y="150" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  0  -1 │</text>
  <text x="445" y="170" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  1   0 │</text>
  <text x="445" y="190" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">└       ┘</text>
  <text x="445" y="215" text-anchor="middle" fill="#7ee787" font-size="11">det = 1 · tr = 0 (elliptic)</text>
  <text x="445" y="235" text-anchor="middle" fill="#ffa657" font-size="11">S⁴ = I · S² = -I (Pauli Z)</text>
  
  <!-- Gate M₃ -->
  <rect x="610" y="80" width="250" height="170" rx="10" fill="rgba(126,231,135,0.08)" stroke="#7ee787" stroke-width="1.5"/>
  <text x="735" y="105" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="bold">Gate M₃ = T²</text>
  <text x="735" y="130" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">┌       ┐</text>
  <text x="735" y="150" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  1   2 │</text>
  <text x="735" y="170" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">│  0   1 │</text>
  <text x="735" y="190" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="monospace">└       ┘</text>
  <text x="735" y="215" text-anchor="middle" fill="#7ee787" font-size="11">det = 1 · tr = 2 (parabolic)</text>
  <text x="735" y="235" text-anchor="middle" fill="#ffa657" font-size="11">M₃ⁿ = [[1,2n],[0,1]]</text>
  
  <!-- Quantum Circuit Diagram -->
  <rect x="30" y="280" width="540" height="140" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="300" y="305" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Quantum Circuit: Berggren Descent</text>
  
  <!-- Qubit lines -->
  <line x1="60" y1="340" x2="550" y2="340" stroke="#484f58" stroke-width="2"/>
  <line x1="60" y1="380" x2="550" y2="380" stroke="#484f58" stroke-width="2"/>
  <text x="50" y="345" text-anchor="end" fill="#8b949e" font-size="12">|m⟩</text>
  <text x="50" y="385" text-anchor="end" fill="#8b949e" font-size="12">|n⟩</text>
  
  <!-- Gate boxes on circuit -->
  <rect x="100" y="325" width="60" height="70" rx="5" fill="rgba(126,231,135,0.15)" stroke="#7ee787"/>
  <text x="130" y="365" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="bold">T²</text>
  
  <rect x="200" y="325" width="60" height="70" rx="5" fill="rgba(210,153,255,0.15)" stroke="#d2a8ff"/>
  <text x="230" y="365" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">S</text>
  
  <rect x="300" y="325" width="60" height="70" rx="5" fill="rgba(136,198,255,0.15)" stroke="#58a6ff"/>
  <text x="330" y="365" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">M₁</text>
  
  <rect x="400" y="325" width="60" height="70" rx="5" fill="rgba(126,231,135,0.15)" stroke="#7ee787"/>
  <text x="430" y="365" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="bold">T²</text>
  
  <rect x="500" y="325" width="40" height="70" rx="5" fill="rgba(255,166,87,0.15)" stroke="#ffa657"/>
  <text x="520" y="365" text-anchor="middle" fill="#ffa657" font-size="13">⟨·⟩</text>
  
  <!-- Properties box -->
  <rect x="600" y="280" width="270" height="140" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="735" y="305" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Gate Properties</text>
  <text x="620" y="330" fill="#7ee787" font-size="11">✓ Integer entries (exact gates)</text>
  <text x="620" y="350" fill="#7ee787" font-size="11">✓ Determinant 1 (unitary)</text>
  <text x="620" y="370" fill="#7ee787" font-size="11">✓ Discrete subgroup (error correction)</text>
  <text x="620" y="390" fill="#7ee787" font-size="11">✓ Sparse matrices (efficient circuits)</text>
  <text x="620" y="410" fill="#7ee787" font-size="11">✓ 3ⁿ codewords at depth n</text>
  
  <!-- Tree growth diagram -->
  <rect x="30" y="445" width="350" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="205" y="470" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Codebook Growth (3ⁿ)</text>
  
  <!-- Bar chart -->
  <rect x="70" y="540" width="15" height="10" fill="#58a6ff" rx="2"/>
  <text x="77" y="555" text-anchor="middle" fill="#8b949e" font-size="9">n=0</text>
  <text x="77" y="535" text-anchor="middle" fill="#e6edf3" font-size="9">1</text>
  
  <rect x="110" y="530" width="15" height="20" fill="#58a6ff" rx="2"/>
  <text x="117" y="555" text-anchor="middle" fill="#8b949e" font-size="9">1</text>
  <text x="117" y="525" text-anchor="middle" fill="#e6edf3" font-size="9">3</text>
  
  <rect x="150" y="510" width="15" height="40" fill="#58a6ff" rx="2"/>
  <text x="157" y="555" text-anchor="middle" fill="#8b949e" font-size="9">2</text>
  <text x="157" y="505" text-anchor="middle" fill="#e6edf3" font-size="9">9</text>
  
  <rect x="190" y="490" width="15" height="60" fill="#58a6ff" rx="2"/>
  <text x="197" y="555" text-anchor="middle" fill="#8b949e" font-size="9">3</text>
  <text x="197" y="485" text-anchor="middle" fill="#e6edf3" font-size="9">27</text>
  
  <rect x="230" y="480" width="15" height="70" fill="#d2a8ff" rx="2"/>
  <text x="237" y="555" text-anchor="middle" fill="#8b949e" font-size="9">4</text>
  <text x="237" y="475" text-anchor="middle" fill="#e6edf3" font-size="9">81</text>
  
  <rect x="270" y="480" width="15" height="70" fill="#d2a8ff" rx="2"/>
  <text x="277" y="555" text-anchor="middle" fill="#8b949e" font-size="9">5</text>
  <text x="277" y="475" text-anchor="middle" fill="#e6edf3" font-size="9">243</text>
  
  <rect x="310" y="480" width="15" height="70" fill="#ffa657" rx="2"/>
  <text x="317" y="555" text-anchor="middle" fill="#8b949e" font-size="9">6</text>
  <text x="317" y="475" text-anchor="middle" fill="#e6edf3" font-size="9">729</text>
  
  <!-- Discreteness diagram -->
  <rect x="420" y="445" width="450" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="645" y="470" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Discreteness Gap: ||M - I||²</text>
  
  <!-- Discrete points -->
  <circle cx="500" cy="520" r="4" fill="#58a6ff"/>
  <text x="500" y="545" text-anchor="middle" fill="#58a6ff" font-size="10">I</text>
  <text x="500" y="510" text-anchor="middle" fill="#8b949e" font-size="9">gap=0</text>
  
  <circle cx="580" cy="500" r="4" fill="#7ee787"/>
  <text x="580" y="545" text-anchor="middle" fill="#7ee787" font-size="10">M₃</text>
  <text x="580" y="490" text-anchor="middle" fill="#8b949e" font-size="9">gap=4</text>
  
  <circle cx="660" cy="510" r="4" fill="#d2a8ff"/>
  <text x="660" y="545" text-anchor="middle" fill="#d2a8ff" font-size="10">S</text>
  <text x="660" y="500" text-anchor="middle" fill="#8b949e" font-size="9">gap=4</text>
  
  <circle cx="740" cy="505" r="4" fill="#ffa657"/>
  <text x="740" y="545" text-anchor="middle" fill="#ffa657" font-size="10">M₁</text>
  <text x="740" y="495" text-anchor="middle" fill="#8b949e" font-size="9">gap=3</text>
  
  <circle cx="800" cy="495" r="4" fill="#ff7b72"/>
  <text x="800" y="545" text-anchor="middle" fill="#ff7b72" font-size="10">M₁M₃</text>
  <text x="800" y="485" text-anchor="middle" fill="#8b949e" font-size="9">gap=6</text>
  
  <!-- Min distance annotation -->
  <line x1="500" y1="520" x2="740" y2="505" stroke="rgba(255,166,87,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="620" y="525" text-anchor="middle" fill="#ffa657" font-size="10">min gap = 3 &gt; 0 ✓</text>
</svg>
