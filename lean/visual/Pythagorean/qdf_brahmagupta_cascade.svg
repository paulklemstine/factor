<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa"/>
    </marker>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg3)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="19" font-weight="bold">
    Brahmagupta–Fibonacci Composition in QDF
  </text>
  
  <!-- Top: Quadruple -->
  <rect x="250" y="55" width="300" height="50" rx="10" fill="rgba(255,107,107,0.15)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">
    a² + b² + c² = d²
  </text>
  <text x="400" y="96" text-anchor="middle" fill="#ccc" font-size="11">
    Pythagorean Quadruple
  </text>
  
  <!-- Arrow down -->
  <line x1="400" y1="105" x2="400" y2="135" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Factor identity -->
  <rect x="200" y="140" width="400" height="40" rx="8" fill="rgba(72,219,251,0.12)" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" fill="#48dbfb" font-size="14">
    (d − c)(d + c) = a² + b²
  </text>
  
  <!-- Two branches -->
  <line x1="300" y1="180" x2="200" y2="220" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="180" x2="600" y2="220" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Left: d-c decomposition -->
  <rect x="60" y="220" width="280" height="55" rx="8" fill="rgba(255,215,61,0.1)" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="200" y="243" text-anchor="middle" fill="#ffd93d" font-size="13" font-weight="bold">
    d − c = p² + q²
  </text>
  <text x="200" y="263" text-anchor="middle" fill="#bbb" font-size="11">
    Sum of two squares decomposition
  </text>
  
  <!-- Right: d+c decomposition -->
  <rect x="460" y="220" width="280" height="55" rx="8" fill="rgba(85,239,196,0.1)" stroke="#55efc4" stroke-width="1.5"/>
  <text x="600" y="243" text-anchor="middle" fill="#55efc4" font-size="13" font-weight="bold">
    d + c = r² + s²
  </text>
  <text x="600" y="263" text-anchor="middle" fill="#bbb" font-size="11">
    Sum of two squares decomposition
  </text>
  
  <!-- Merge arrows -->
  <line x1="200" y1="275" x2="300" y2="320" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="275" x2="500" y2="320" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Brahmagupta identity -->
  <rect x="150" y="320" width="500" height="65" rx="10" fill="rgba(162,155,254,0.15)" stroke="#a29bfe" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">
    Brahmagupta–Fibonacci Identity
  </text>
  <text x="400" y="370" text-anchor="middle" fill="#fff" font-size="13">
    a² + b² = (pr − qs)² + (ps + qr)²
  </text>
  
  <!-- Arrow down -->
  <line x1="400" y1="385" x2="400" y2="415" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Result -->
  <rect x="170" y="420" width="460" height="55" rx="10" fill="rgba(0,255,0,0.08)" stroke="#0f0" stroke-width="2"/>
  <text x="400" y="445" text-anchor="middle" fill="#0f0" font-size="14" font-weight="bold">
    Explicit Sum-of-Two-Squares Factoring
  </text>
  <text x="400" y="465" text-anchor="middle" fill="#bbb" font-size="11">
    gcd(pr−qs, N) or gcd(ps+qr, N) reveals factors of N
  </text>
  
  <!-- Example -->
  <rect x="20" y="320" width="120" height="100" rx="6" fill="rgba(255,255,255,0.04)" stroke="#555" stroke-width="1"/>
  <text x="80" y="340" text-anchor="middle" fill="#ffd93d" font-size="10" font-weight="bold">Example</text>
  <text x="30" y="358" fill="#ddd" font-size="9">(2,3,6,7):</text>
  <text x="30" y="373" fill="#ddd" font-size="9">d−c=1=0²+1²</text>
  <text x="30" y="388" fill="#ddd" font-size="9">d+c=13=2²+3²</text>
  <text x="30" y="403" fill="#ddd" font-size="9">→ 4+9=(0·2−3)²+</text>
  <text x="30" y="415" fill="#ddd" font-size="9">  (0·3+2)²=13 ✓</text>
</svg>
