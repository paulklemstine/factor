<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Arial, sans-serif">
  <defs>
    <radialGradient id="sphere" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3a3aaf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1a4e" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
  </defs>
  
  <rect width="700" height="600" fill="url(#bg2)"/>
  
  <text x="350" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">
    Bloch Sphere from Pythagorean Quadruples
  </text>
  <text x="350" y="55" text-anchor="middle" fill="#aaa" font-size="12">
    (a/d)² + (b/d)² + (c/d)² = 1 — Rational Points on S²
  </text>
  
  <!-- Sphere -->
  <ellipse cx="300" cy="300" rx="200" ry="200" fill="url(#sphere)" stroke="#5555cc" stroke-width="1.5"/>
  <ellipse cx="300" cy="300" rx="200" ry="60" fill="none" stroke="#4444aa" stroke-width="0.8" stroke-dasharray="5,5"/>
  <ellipse cx="300" cy="300" rx="60" ry="200" fill="none" stroke="#4444aa" stroke-width="0.8" stroke-dasharray="5,5"/>
  
  <!-- Axes -->
  <line x1="80" y1="300" x2="520" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="300" y1="80" x2="300" y2="520" stroke="#555" stroke-width="1"/>
  <line x1="220" y1="380" x2="380" y2="220" stroke="#555" stroke-width="1"/>
  
  <text x="525" y="305" fill="#888" font-size="12">a/d</text>
  <text x="305" y="75" fill="#888" font-size="12">c/d</text>
  <text x="385" y="215" fill="#888" font-size="12">b/d</text>
  
  <!-- Quadruple points -->
  <!-- (1,2,2,3): (1/3, 2/3, 2/3) -->
  <circle cx="367" cy="167" r="6" fill="#ff6b6b" stroke="#fff" stroke-width="1.5"/>
  <text x="380" y="165" fill="#ff6b6b" font-size="10">(1,2,2,3)</text>
  
  <!-- (2,3,6,7): (2/7, 3/7, 6/7) -->
  <circle cx="357" cy="129" r="6" fill="#48dbfb" stroke="#fff" stroke-width="1.5"/>
  <text x="370" y="125" fill="#48dbfb" font-size="10">(2,3,6,7)</text>
  
  <!-- (1,4,8,9): (1/9, 4/9, 8/9) -->
  <circle cx="322" cy="122" r="6" fill="#a29bfe" stroke="#fff" stroke-width="1.5"/>
  <text x="335" y="118" fill="#a29bfe" font-size="10">(1,4,8,9)</text>
  
  <!-- (4,4,7,9): (4/9, 4/9, 7/9) -->
  <circle cx="389" cy="144" r="6" fill="#ffd93d" stroke="#fff" stroke-width="1.5"/>
  <text x="400" y="140" fill="#ffd93d" font-size="10">(4,4,7,9)</text>
  
  <!-- (6,6,7,11): (6/11, 6/11, 7/11) -->
  <circle cx="409" cy="173" r="6" fill="#55efc4" stroke="#fff" stroke-width="1.5"/>
  <text x="420" y="169" fill="#55efc4" font-size="10">(6,6,7,11)</text>
  
  <!-- (3,4,12,13): (3/13, 4/13, 12/13) -->
  <circle cx="346" cy="115" r="6" fill="#fd79a8" stroke="#fff" stroke-width="1.5"/>
  <text x="220" y="108" fill="#fd79a8" font-size="10">(3,4,12,13)</text>
  
  <!-- Legend -->
  <rect x="530" y="100" width="155" height="200" rx="8" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="607" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Theorem</text>
  
  <text x="545" y="150" fill="#ccc" font-size="10">Every quadruple</text>
  <text x="545" y="165" fill="#ccc" font-size="10">(a,b,c,d) with d≠0</text>
  <text x="545" y="180" fill="#ccc" font-size="10">maps to a rational</text>
  <text x="545" y="195" fill="#ccc" font-size="10">point on S²</text>
  
  <line x1="545" y1="210" x2="670" y2="210" stroke="#444" stroke-width="0.5"/>
  
  <text x="545" y="230" fill="#ffd93d" font-size="10" font-weight="bold">Cauchy–Schwarz:</text>
  <text x="545" y="248" fill="#ccc" font-size="10">⟨v₁,v₂⟩² ≤ d₁²d₂²</text>
  
  <text x="545" y="275" fill="#55efc4" font-size="10" font-weight="bold">Orthogonal states:</text>
  <text x="545" y="293" fill="#ccc" font-size="10">⟨v₁,v₂⟩ = 0</text>
  
  <!-- Quantum state notation -->
  <rect x="100" y="530" width="500" height="50" rx="8" fill="rgba(162,155,254,0.1)" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="350" y="555" text-anchor="middle" fill="#a29bfe" font-size="14">
    |ψ⟩ = (a/d)|x⟩ + (b/d)|y⟩ + (c/d)|z⟩  — Quantum State Encoding
  </text>
  <text x="350" y="573" text-anchor="middle" fill="#888" font-size="11">
    Dense rational cover of Bloch sphere for exact quantum gate synthesis
  </text>
</svg>
