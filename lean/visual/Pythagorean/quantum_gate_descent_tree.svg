<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="node_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#44a08d"/>
    </linearGradient>
    <linearGradient id="t_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="h_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#4ecdc4" font-size="22" font-weight="bold">
    Quantum Gate Descent Tree: Clifford+T Decomposition
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#88d8d8" font-size="13">
    Each descent step extracts one elementary gate — depth = T-count
  </text>

  <!-- Legend -->
  <rect x="20" y="80" width="16" height="16" rx="3" fill="url(#t_grad)"/>
  <text x="42" y="93" fill="#ff9999" font-size="12">T gate (norm 2)</text>
  <rect x="150" y="80" width="16" height="16" rx="3" fill="url(#h_grad)"/>
  <text x="172" y="93" fill="#c4b5fd" font-size="12">H gate (norm 2)</text>
  <rect x="290" y="80" width="16" height="16" rx="3" fill="url(#node_grad)"/>
  <text x="312" y="93" fill="#88d8d8" font-size="12">Intermediate node</text>

  <!-- The descent tree -->
  <!-- Root: Target quaternion at norm 2^k -->
  <g filter="url(#glow)">
    <!-- Level 0: Target at norm 16 -->
    <rect x="350" y="115" width="200" height="45" rx="8" fill="url(#node_grad)" opacity="0.9"/>
    <text x="450" y="135" text-anchor="middle" fill="#0a0a2e" font-size="13" font-weight="bold">Target: α = (2,2,2,2)</text>
    <text x="450" y="152" text-anchor="middle" fill="#0a0a2e" font-size="11">|α|² = 16 = 2⁴</text>
  </g>

  <!-- Edge: extract T -->
  <line x1="450" y1="160" x2="300" y2="210" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
  <text x="365" y="190" fill="#ff9999" font-size="11" transform="rotate(-20 365 190)">÷ T gate</text>

  <line x1="450" y1="160" x2="600" y2="210" stroke="#a29bfe" stroke-width="2.5" opacity="0.8"/>
  <text x="535" y="190" fill="#c4b5fd" font-size="11" transform="rotate(20 535 190)">÷ H gate</text>

  <!-- Level 1: norm 8 nodes -->
  <g filter="url(#glow)">
    <rect x="200" y="210" width="200" height="45" rx="8" fill="url(#t_grad)" opacity="0.85"/>
    <text x="300" y="230" text-anchor="middle" fill="white" font-size="12" font-weight="bold">T extracted: β₁</text>
    <text x="300" y="247" text-anchor="middle" fill="white" font-size="11">|β₁|² = 8 = 2³</text>
  </g>

  <g filter="url(#glow)">
    <rect x="500" y="210" width="200" height="45" rx="8" fill="url(#h_grad)" opacity="0.85"/>
    <text x="600" y="230" text-anchor="middle" fill="white" font-size="12" font-weight="bold">H extracted: β₂</text>
    <text x="600" y="247" text-anchor="middle" fill="white" font-size="11">|β₂|² = 8 = 2³</text>
  </g>

  <!-- Level 2 edges -->
  <line x1="300" y1="255" x2="200" y2="305" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
  <line x1="300" y1="255" x2="400" y2="305" stroke="#a29bfe" stroke-width="2" opacity="0.7"/>
  <line x1="600" y1="255" x2="500" y2="305" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
  <line x1="600" y1="255" x2="700" y2="305" stroke="#a29bfe" stroke-width="2" opacity="0.7"/>

  <!-- Level 2: norm 4 nodes -->
  <rect x="130" y="305" width="140" height="38" rx="6" fill="url(#t_grad)" opacity="0.75"/>
  <text x="200" y="322" text-anchor="middle" fill="white" font-size="11" font-weight="bold">T: γ₁, |γ|²=4</text>
  <text x="200" y="337" text-anchor="middle" fill="white" font-size="10">= 2²</text>

  <rect x="330" y="305" width="140" height="38" rx="6" fill="url(#h_grad)" opacity="0.75"/>
  <text x="400" y="322" text-anchor="middle" fill="white" font-size="11" font-weight="bold">H: γ₂, |γ|²=4</text>
  <text x="400" y="337" text-anchor="middle" fill="white" font-size="10">= 2²</text>

  <rect x="430" y="305" width="140" height="38" rx="6" fill="url(#t_grad)" opacity="0.75"/>
  <text x="500" y="322" text-anchor="middle" fill="white" font-size="11" font-weight="bold">T: γ₃, |γ|²=4</text>
  <text x="500" y="337" text-anchor="middle" fill="white" font-size="10">= 2²</text>

  <rect x="630" y="305" width="140" height="38" rx="6" fill="url(#h_grad)" opacity="0.75"/>
  <text x="700" y="322" text-anchor="middle" fill="white" font-size="11" font-weight="bold">H: γ₄, |γ|²=4</text>
  <text x="700" y="337" text-anchor="middle" fill="white" font-size="10">= 2²</text>

  <!-- Level 3 edges -->
  <line x1="200" y1="343" x2="150" y2="393" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="343" x2="250" y2="393" stroke="#a29bfe" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="343" x2="350" y2="393" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="343" x2="450" y2="393" stroke="#a29bfe" stroke-width="1.5" opacity="0.6"/>

  <!-- Level 3: norm 2 nodes -->
  <rect x="110" y="393" width="80" height="32" rx="5" fill="url(#t_grad)" opacity="0.65"/>
  <text x="150" y="413" text-anchor="middle" fill="white" font-size="10">T, |·|²=2</text>

  <rect x="210" y="393" width="80" height="32" rx="5" fill="url(#h_grad)" opacity="0.65"/>
  <text x="250" y="413" text-anchor="middle" fill="white" font-size="10">H, |·|²=2</text>

  <rect x="310" y="393" width="80" height="32" rx="5" fill="url(#t_grad)" opacity="0.65"/>
  <text x="350" y="413" text-anchor="middle" fill="white" font-size="10">T, |·|²=2</text>

  <rect x="410" y="393" width="80" height="32" rx="5" fill="url(#h_grad)" opacity="0.65"/>
  <text x="450" y="413" text-anchor="middle" fill="white" font-size="10">H, |·|²=2</text>

  <!-- Level 4: Clifford units (norm 1) -->
  <line x1="150" y1="425" x2="150" y2="460" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="250" y1="425" x2="250" y2="460" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="350" y1="425" x2="350" y2="460" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="425" x2="450" y2="460" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,4"/>

  <circle cx="150" cy="472" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="150" y="476" text-anchor="middle" fill="#0a0a2e" font-size="10" font-weight="bold">1</text>

  <circle cx="250" cy="472" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="250" y="476" text-anchor="middle" fill="#0a0a2e" font-size="10" font-weight="bold">1</text>

  <circle cx="350" cy="472" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="350" y="476" text-anchor="middle" fill="#0a0a2e" font-size="10" font-weight="bold">1</text>

  <circle cx="450" cy="472" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="450" y="476" text-anchor="middle" fill="#0a0a2e" font-size="10" font-weight="bold">1</text>

  <text x="300" y="505" text-anchor="middle" fill="#88d8d8" font-size="12">Clifford units (|q|² = 1)</text>

  <!-- Right panel: Key equations -->
  <rect x="600" y="370" width="280" height="260" rx="10" fill="#1a1a4e" stroke="#4ecdc4" stroke-width="1" opacity="0.9"/>
  <text x="740" y="395" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">Key Results</text>

  <text x="620" y="420" fill="#ff9999" font-size="12">T = (1,1,0,0), |T|² = 2</text>
  <text x="620" y="440" fill="#c4b5fd" font-size="12">H = (1,0,0,1), |H|² = 2</text>
  <text x="620" y="460" fill="#88d8d8" font-size="12">V = (2,1,0,0), |V|² = 5</text>

  <line x1="620" y1="470" x2="860" y2="470" stroke="#4ecdc4" stroke-width="0.5" opacity="0.5"/>

  <text x="620" y="490" fill="white" font-size="12">|α·β|² = |α|²·|β|²</text>
  <text x="620" y="510" fill="#aaa" font-size="11">→ Gate composition = norm multiplication</text>

  <text x="620" y="535" fill="white" font-size="12">Depth = log₂(d) steps</text>
  <text x="620" y="555" fill="#aaa" font-size="11">→ T-count is logarithmic</text>

  <text x="620" y="580" fill="white" font-size="12">T⁸ = (16,0,0,0) = scalar</text>
  <text x="620" y="600" fill="#aaa" font-size="11">→ T gate has order 8 in PSU(2)</text>

  <text x="620" y="622" fill="#ffd700" font-size="11" font-weight="bold">✓ All results formally verified in Lean 4</text>

  <!-- Bottom label -->
  <text x="450" y="640" text-anchor="middle" fill="#666" font-size="10">
    Quaternion Descent Tree for Quantum Gate Synthesis — Research Team PHOTON-4
  </text>
</svg>
