<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="hyperbolic" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.9" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#bggrad)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f0f4ff" font-size="22" font-weight="bold">
    Berggren Tree ↔ Lorentz Group ↔ Hyperbolic Geometry
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#8892b0" font-size="12">
    Three perspectives on the same mathematical structure
  </text>

  <!-- === Left Panel: Number Theory === -->
  <rect x="20" y="75" width="270" height="240" rx="12" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <text x="155" y="100" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="bold">Number Theory</text>

  <text x="40" y="125" fill="#e0e7ff" font-size="12">Pythagorean Triples</text>
  <text x="40" y="145" fill="#a5b4fc" font-size="11">a² + b² = c²</text>
  <text x="40" y="170" fill="#e0e7ff" font-size="12">Berggren Tree</text>
  <text x="40" y="190" fill="#a5b4fc" font-size="11">3 matrices: B₁, B₂, B₃</text>
  <text x="40" y="210" fill="#a5b4fc" font-size="11">Root: (3, 4, 5)</text>
  <text x="40" y="235" fill="#e0e7ff" font-size="12">Pell Equation</text>
  <text x="40" y="255" fill="#a5b4fc" font-size="11">c'' = 6c' - c</text>
  <text x="40" y="275" fill="#a5b4fc" font-size="11">x² - 2y² = 1</text>
  <text x="40" y="300" fill="#e0e7ff" font-size="12">IOF Factoring</text>
  <text x="40" y="300" fill="#a5b4fc" font-size="11">(h-u)(h+u) = N²</text>

  <!-- === Center Panel: Algebra === -->
  <rect x="315" y="75" width="270" height="240" rx="12" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Algebra</text>

  <text x="335" y="125" fill="#e0e7ff" font-size="12">Lorentz Form</text>
  <text x="335" y="145" fill="#93c5fd" font-size="11">Q(a,b,c) = a² + b² - c²</text>
  <text x="335" y="170" fill="#e0e7ff" font-size="12">Integer Lorentz Group</text>
  <text x="335" y="190" fill="#93c5fd" font-size="11">O(2,1;ℤ) ⊃ ⟨B₁,B₂,B₃⟩</text>
  <text x="335" y="210" fill="#93c5fd" font-size="11">Free group of rank 3</text>
  <text x="335" y="235" fill="#e0e7ff" font-size="12">Preservation</text>
  <text x="335" y="255" fill="#93c5fd" font-size="11">BᵢᵀQBᵢ = Q ∀i</text>
  <text x="335" y="275" fill="#93c5fd" font-size="11">det(Bᵢ) = ±1</text>
  <text x="335" y="300" fill="#e0e7ff" font-size="12">SL(2,ℤ) action</text>

  <!-- === Right Panel: Geometry === -->
  <rect x="610" y="75" width="270" height="240" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="745" y="100" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">Geometry</text>

  <text x="630" y="125" fill="#e0e7ff" font-size="12">Null Cone</text>
  <text x="630" y="145" fill="#6ee7b7" font-size="11">a² + b² - c² = 0</text>
  <text x="630" y="170" fill="#e0e7ff" font-size="12">Hyperbolic Plane</text>
  <text x="630" y="190" fill="#6ee7b7" font-size="11">PPTs tile ℍ²</text>
  <text x="630" y="210" fill="#6ee7b7" font-size="11">Poincaré disk model</text>
  <text x="630" y="235" fill="#e0e7ff" font-size="12">Geodesic Descent</text>
  <text x="630" y="255" fill="#6ee7b7" font-size="11">Parent = retraction</text>
  <text x="630" y="275" fill="#6ee7b7" font-size="11">toward fundamental domain</text>
  <text x="630" y="300" fill="#e0e7ff" font-size="12">Modular Surface</text>

  <!-- Connecting arrows -->
  <line x1="290" y1="195" x2="315" y2="195" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="585" y1="195" x2="610" y2="195" stroke="#34d399" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- === Bottom Section: Unified View === -->
  <rect x="50" y="340" width="800" height="190" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="370" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold">
    Unified Correspondence (Machine-Verified in Lean 4)
  </text>

  <!-- Correspondence table -->
  <text x="100" y="400" fill="#fcd34d" font-size="12" font-weight="bold">Number Theory</text>
  <text x="370" y="400" fill="#fcd34d" font-size="12" font-weight="bold">Algebra</text>
  <text x="640" y="400" fill="#fcd34d" font-size="12" font-weight="bold">Geometry</text>

  <line x1="70" y1="410" x2="830" y2="410" stroke="#334155" stroke-width="1"/>

  <text x="100" y="430" fill="#e2e8f0" font-size="11">PPT (a,b,c)</text>
  <text x="370" y="430" fill="#e2e8f0" font-size="11">Null vector of Q</text>
  <text x="640" y="430" fill="#e2e8f0" font-size="11">Point on light cone</text>

  <text x="100" y="450" fill="#e2e8f0" font-size="11">Berggren transform Bᵢ</text>
  <text x="370" y="450" fill="#e2e8f0" font-size="11">O(2,1;ℤ) element</text>
  <text x="640" y="450" fill="#e2e8f0" font-size="11">Hyperbolic isometry</text>

  <text x="100" y="470" fill="#e2e8f0" font-size="11">Descent to (3,4,5)</text>
  <text x="370" y="470" fill="#e2e8f0" font-size="11">Word reduction in free group</text>
  <text x="640" y="470" fill="#e2e8f0" font-size="11">Geodesic retraction</text>

  <text x="100" y="490" fill="#e2e8f0" font-size="11">Pell recurrence</text>
  <text x="370" y="490" fill="#e2e8f0" font-size="11">Matrix power spectrum</text>
  <text x="640" y="490" fill="#e2e8f0" font-size="11">Closed geodesic</text>

  <text x="100" y="510" fill="#e2e8f0" font-size="11">Factor extraction</text>
  <text x="370" y="510" fill="#e2e8f0" font-size="11">(c-a)(c+a) = b²</text>
  <text x="640" y="510" fill="#e2e8f0" font-size="11">Intersection with lattice</text>
</svg>
