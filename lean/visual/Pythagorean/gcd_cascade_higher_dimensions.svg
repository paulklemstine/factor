<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="url(#hdbg)"/>

  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">HIGHER-DIMENSIONAL GCD CASCADES</text>
  <text x="450" y="55" text-anchor="middle" fill="#7799bb" font-size="12">More dimensions → More channels → More factoring opportunities</text>

  <!-- 3D Section -->
  <rect x="30" y="80" width="195" height="250" rx="8" fill="#111a2e" stroke="#4488cc" stroke-width="1.5"/>
  <text x="127" y="105" text-anchor="middle" fill="#4488cc" font-size="16" font-weight="bold">3D</text>
  <text x="127" y="122" text-anchor="middle" fill="#88aacc" font-size="11">a²+b²+c² = d²</text>

  <!-- Triangle for 3 channels -->
  <polygon points="127,155 85,225 169,225" fill="none" stroke="#4488cc" stroke-width="2"/>
  <circle cx="127" cy="155" r="5" fill="#ff6b35"/>
  <circle cx="85" cy="225" r="5" fill="#4ecdc4"/>
  <circle cx="169" cy="225" r="5" fill="#f7c948"/>

  <text x="100" y="180" text-anchor="middle" fill="#aabbcc" font-size="9">ch₁</text>
  <text x="155" y="180" text-anchor="middle" fill="#aabbcc" font-size="9">ch₂</text>
  <text x="127" y="248" text-anchor="middle" fill="#aabbcc" font-size="9">ch₃</text>

  <text x="127" y="275" text-anchor="middle" fill="#88ffaa" font-size="12" font-weight="bold">3 channels</text>
  <text x="127" y="292" text-anchor="middle" fill="#aabbcc" font-size="10">Sum = 2d²</text>
  <text x="127" y="308" text-anchor="middle" fill="#aabbcc" font-size="10">3 GCD pairs</text>

  <!-- 4D Section -->
  <rect x="245" y="80" width="195" height="250" rx="8" fill="#111a2e" stroke="#44aa88" stroke-width="1.5"/>
  <text x="342" y="105" text-anchor="middle" fill="#44aa88" font-size="16" font-weight="bold">4D</text>
  <text x="342" y="122" text-anchor="middle" fill="#88ccaa" font-size="11">a²+b²+c²+e² = d²</text>

  <!-- Square + diagonals for 6 channels -->
  <rect x="302" y="150" width="80" height="80" fill="none" stroke="#44aa88" stroke-width="2"/>
  <line x1="302" y1="150" x2="382" y2="230" stroke="#44aa88" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="382" y1="150" x2="302" y2="230" stroke="#44aa88" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="302" cy="150" r="5" fill="#ff6b35"/>
  <circle cx="382" cy="150" r="5" fill="#4ecdc4"/>
  <circle cx="302" cy="230" r="5" fill="#f7c948"/>
  <circle cx="382" cy="230" r="5" fill="#cc44aa"/>

  <text x="342" y="275" text-anchor="middle" fill="#88ffaa" font-size="12" font-weight="bold">6 channels</text>
  <text x="342" y="292" text-anchor="middle" fill="#aabbcc" font-size="10">Sum = 3d²</text>
  <text x="342" y="308" text-anchor="middle" fill="#aabbcc" font-size="10">3 complement pairs</text>

  <!-- 5D Section -->
  <rect x="460" y="80" width="195" height="250" rx="8" fill="#111a2e" stroke="#aa8844" stroke-width="1.5"/>
  <text x="557" y="105" text-anchor="middle" fill="#aa8844" font-size="16" font-weight="bold">5D</text>
  <text x="557" y="122" text-anchor="middle" fill="#ccaa88" font-size="11">5 spatial components</text>

  <!-- Pentagon for 10 channels -->
  <polygon points="557,150 595,180 582,220 532,220 519,180" fill="none" stroke="#aa8844" stroke-width="2"/>
  <!-- Inner star lines -->
  <line x1="557" y1="150" x2="532" y2="220" stroke="#aa8844" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="557" y1="150" x2="582" y2="220" stroke="#aa8844" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="595" y1="180" x2="532" y2="220" stroke="#aa8844" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="595" y1="180" x2="519" y2="180" stroke="#aa8844" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="582" y1="220" x2="519" y2="180" stroke="#aa8844" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="557" cy="150" r="4" fill="#ff6b35"/>
  <circle cx="595" cy="180" r="4" fill="#4ecdc4"/>
  <circle cx="582" cy="220" r="4" fill="#f7c948"/>
  <circle cx="532" cy="220" r="4" fill="#cc44aa"/>
  <circle cx="519" cy="180" r="4" fill="#88aaff"/>

  <text x="557" y="275" text-anchor="middle" fill="#88ffaa" font-size="12" font-weight="bold">10 channels</text>
  <text x="557" y="292" text-anchor="middle" fill="#aabbcc" font-size="10">Sum = 4d²</text>
  <text x="557" y="308" text-anchor="middle" fill="#aabbcc" font-size="10">45 GCD pairs</text>

  <!-- 6D Section -->
  <rect x="675" y="80" width="195" height="250" rx="8" fill="#111a2e" stroke="#cc4466" stroke-width="1.5"/>
  <text x="772" y="105" text-anchor="middle" fill="#cc4466" font-size="16" font-weight="bold">6D</text>
  <text x="772" y="122" text-anchor="middle" fill="#cc8899" font-size="11">6 spatial components</text>

  <!-- Hexagon for 15 channels -->
  <polygon points="772,150 808,172 808,210 772,232 736,210 736,172" fill="none" stroke="#cc4466" stroke-width="2"/>
  <!-- Some diagonals -->
  <line x1="772" y1="150" x2="772" y2="232" stroke="#cc4466" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="808" y1="172" x2="736" y2="210" stroke="#cc4466" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="808" y1="210" x2="736" y2="172" stroke="#cc4466" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="772" y1="150" x2="808" y2="210" stroke="#cc4466" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="772" y1="150" x2="736" y2="210" stroke="#cc4466" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="772" cy="150" r="4" fill="#ff6b35"/>
  <circle cx="808" cy="172" r="4" fill="#4ecdc4"/>
  <circle cx="808" cy="210" r="4" fill="#f7c948"/>
  <circle cx="772" cy="232" r="4" fill="#cc44aa"/>
  <circle cx="736" cy="210" r="4" fill="#88aaff"/>
  <circle cx="736" cy="172" r="4" fill="#66cc99"/>

  <text x="772" y="275" text-anchor="middle" fill="#88ffaa" font-size="12" font-weight="bold">15 channels</text>
  <text x="772" y="292" text-anchor="middle" fill="#aabbcc" font-size="10">Sum = 5d²</text>
  <text x="772" y="308" text-anchor="middle" fill="#aabbcc" font-size="10">105 GCD pairs</text>

  <!-- General Formula Bar -->
  <rect x="30" y="360" width="840" height="60" rx="8" fill="#1a1a3a" stroke="#6688cc" stroke-width="1.5"/>
  <text x="450" y="385" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">General Formula (Verified n = 3, 4, 5, 6):</text>
  <text x="450" y="407" text-anchor="middle" fill="#88ffaa" font-size="15">n spatial components → C(n,2) pair-channels → Sum = (n−1) × d²</text>

  <!-- Implications section -->
  <rect x="30" y="440" width="270" height="140" rx="8" fill="#111a2e" stroke="#4488cc" stroke-width="1"/>
  <text x="165" y="465" text-anchor="middle" fill="#4488cc" font-size="13" font-weight="bold">🔍 More Channels</text>
  <text x="45" y="488" fill="#aabbcc" font-size="10">• Each pair provides a factoring</text>
  <text x="45" y="505" fill="#aabbcc" font-size="10">  equation (d−x)(d+x) = sum</text>
  <text x="45" y="525" fill="#aabbcc" font-size="10">• Cross-channel GCDs multiply</text>
  <text x="45" y="545" fill="#aabbcc" font-size="10">• More cascade propagation paths</text>
  <text x="45" y="565" fill="#88aaff" font-size="10">  4D: 3 complement pairs = 3 planes</text>

  <rect x="315" y="440" width="270" height="140" rx="8" fill="#111a2e" stroke="#44aa88" stroke-width="1"/>
  <text x="450" y="465" text-anchor="middle" fill="#44aa88" font-size="13" font-weight="bold">⚡ Cascade Network</text>
  <text x="330" y="488" fill="#aabbcc" font-size="10">• k reps in nD: C(k,2) × C(n,2)</text>
  <text x="330" y="505" fill="#aabbcc" font-size="10">  cascade opportunities</text>
  <text x="330" y="525" fill="#aabbcc" font-size="10">• 4D with 10 reps: 6×45 = 270</text>
  <text x="330" y="545" fill="#aabbcc" font-size="10">  GCD computations</text>
  <text x="330" y="565" fill="#88aaff" font-size="10">  Massive factor extraction potential</text>

  <rect x="600" y="440" width="270" height="140" rx="8" fill="#111a2e" stroke="#cc4466" stroke-width="1"/>
  <text x="735" y="465" text-anchor="middle" fill="#cc4466" font-size="13" font-weight="bold">❓ Open Question</text>
  <text x="615" y="488" fill="#aabbcc" font-size="10">Does factoring get easier or</text>
  <text x="615" y="505" fill="#aabbcc" font-size="10">harder in higher dimensions?</text>
  <text x="615" y="525" fill="#aabbcc" font-size="10">• More channels = more info</text>
  <text x="615" y="545" fill="#aabbcc" font-size="10">• But reps harder to find</text>
  <text x="615" y="565" fill="#88aaff" font-size="10">  Trade-off is not yet understood</text>
</svg>
