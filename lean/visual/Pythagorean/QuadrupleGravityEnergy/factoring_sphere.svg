<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Georgia, serif">
  <defs>
    <radialGradient id="sphereGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#4488cc" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#2255aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#112255" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#cc8844" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#885522" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="650" fill="url(#bgGrad)"/>

  <text x="450" y="35" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">
    The Factoring Sphere: S¹ vs S² vs S⁷ (E₈)
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#88aacc" font-size="12">
    Quantum Collision Search on Higher-Dimensional Spheres
  </text>

  <!-- S¹ Circle (Left) -->
  <g transform="translate(150, 250)">
    <ellipse cx="0" cy="0" rx="100" ry="100" fill="url(#circleGrad)" stroke="#cc8844" stroke-width="1.5"/>
    <text x="0" y="-120" text-anchor="middle" fill="#cc8844" font-size="15" font-weight="bold">S¹(√N)</text>
    <text x="0" y="-105" text-anchor="middle" fill="#998866" font-size="11">Circle</text>

    <!-- Lattice points on circle -->
    <circle cx="100" cy="0" r="4" fill="#ffd700"/>
    <circle cx="70" cy="70" r="4" fill="#ffd700"/>
    <circle cx="0" cy="100" r="4" fill="#ffd700"/>
    <circle cx="-70" cy="70" r="4" fill="#ffd700"/>
    <circle cx="-100" cy="0" r="4" fill="#ffd700"/>
    <circle cx="-70" cy="-70" r="4" fill="#ffd700"/>
    <circle cx="0" cy="-100" r="4" fill="#ffd700"/>
    <circle cx="70" cy="-70" r="4" fill="#ffd700"/>

    <!-- Collision line -->
    <line x1="70" y1="70" x2="-70" y2="-70" stroke="#ff4444" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#ff4444" opacity="0.8"/>

    <text x="0" y="130" text-anchor="middle" fill="#cc8844" font-size="10">~O(√N) lattice points</text>
    <text x="0" y="145" text-anchor="middle" fill="#998866" font-size="10">C(2,2) = 1 cross channel</text>
    <text x="0" y="160" text-anchor="middle" fill="#ff8866" font-size="10">Classical: O(N^{1/4})</text>
    <text x="0" y="175" text-anchor="middle" fill="#ff6644" font-size="10">Quantum: O(N^{1/6})</text>
  </g>

  <!-- S² Sphere (Center) -->
  <g transform="translate(450, 250)">
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="url(#sphereGrad)" stroke="#4488cc" stroke-width="2"/>
    <!-- Equator -->
    <ellipse cx="0" cy="0" rx="120" ry="30" fill="none" stroke="#4488cc" stroke-width="0.5"
             opacity="0.4"/>
    <!-- Meridian -->
    <ellipse cx="0" cy="0" rx="30" ry="120" fill="none" stroke="#4488cc" stroke-width="0.5"
             opacity="0.4"/>

    <text x="0" y="-140" text-anchor="middle" fill="#4488cc" font-size="15" font-weight="bold">S²(√N)</text>
    <text x="0" y="-125" text-anchor="middle" fill="#6699bb" font-size="11">2-Sphere ★</text>

    <!-- Many lattice points on sphere -->
    <circle cx="100" cy="0" r="3.5" fill="#ffd700"/>
    <circle cx="70" cy="70" r="3.5" fill="#ffd700"/>
    <circle cx="0" cy="100" r="3.5" fill="#ffd700"/>
    <circle cx="-70" cy="70" r="3.5" fill="#ffd700"/>
    <circle cx="-100" cy="0" r="3.5" fill="#ffd700"/>
    <circle cx="-70" cy="-70" r="3.5" fill="#ffd700"/>
    <circle cx="0" cy="-100" r="3.5" fill="#ffd700"/>
    <circle cx="70" cy="-70" r="3.5" fill="#ffd700"/>
    <circle cx="85" cy="40" r="3.5" fill="#ffd700"/>
    <circle cx="40" cy="85" r="3.5" fill="#ffd700"/>
    <circle cx="-40" cy="85" r="3.5" fill="#ffd700"/>
    <circle cx="-85" cy="40" r="3.5" fill="#ffd700"/>
    <circle cx="-85" cy="-40" r="3.5" fill="#ffd700"/>
    <circle cx="-40" cy="-85" r="3.5" fill="#ffd700"/>
    <circle cx="40" cy="-85" r="3.5" fill="#ffd700"/>
    <circle cx="85" cy="-40" r="3.5" fill="#ffd700"/>
    <circle cx="110" cy="25" r="3.5" fill="#ffd700"/>
    <circle cx="25" cy="110" r="3.5" fill="#ffd700"/>
    <circle cx="-25" cy="110" r="3.5" fill="#ffd700"/>
    <circle cx="-110" cy="25" r="3.5" fill="#ffd700"/>

    <!-- Collision triangle -->
    <line x1="70" y1="70" x2="-85" y2="-40" stroke="#ff4444" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.7"/>
    <line x1="-85" y1="-40" x2="40" y2="-85" stroke="#ff4444" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.7"/>
    <line x1="40" y1="-85" x2="70" y2="70" stroke="#ff4444" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.7"/>

    <text x="0" y="148" text-anchor="middle" fill="#4488cc" font-size="10">~O(N) lattice points</text>
    <text x="0" y="163" text-anchor="middle" fill="#6699bb" font-size="10">C(3,2) = 3 cross channels</text>
    <text x="0" y="178" text-anchor="middle" fill="#ff8866" font-size="10">Classical: O(N^{1/3})</text>
    <text x="0" y="193" text-anchor="middle" fill="#ff6644" font-size="10" font-weight="bold">
      Quantum: O(N^{1/5})
    </text>
  </g>

  <!-- S⁷ / E₈ (Right) -->
  <g transform="translate(750, 250)">
    <!-- Multiple concentric ellipses to suggest high dimension -->
    <ellipse cx="0" cy="0" rx="100" ry="100" fill="url(#sphereGrad)" stroke="#aa44cc"
             stroke-width="2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="100" ry="25" fill="none" stroke="#aa44cc" stroke-width="0.5"
             opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="25" ry="100" fill="none" stroke="#aa44cc" stroke-width="0.5"
             opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="none" stroke="#aa44cc" stroke-width="0.5"
             opacity="0.3" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="none" stroke="#aa44cc" stroke-width="0.5"
             opacity="0.3" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="none" stroke="#aa44cc" stroke-width="0.5"
             opacity="0.3" transform="rotate(60)"/>

    <text x="0" y="-120" text-anchor="middle" fill="#aa44cc" font-size="15" font-weight="bold">S⁷ / E₈</text>
    <text x="0" y="-105" text-anchor="middle" fill="#8866aa" font-size="11">8D Lattice</text>

    <!-- Dense lattice points -->
    <g fill="#ffd700" opacity="0.8">
      <circle cx="90" cy="0" r="2.5"/><circle cx="63" cy="63" r="2.5"/>
      <circle cx="0" cy="90" r="2.5"/><circle cx="-63" cy="63" r="2.5"/>
      <circle cx="-90" cy="0" r="2.5"/><circle cx="-63" cy="-63" r="2.5"/>
      <circle cx="0" cy="-90" r="2.5"/><circle cx="63" cy="-63" r="2.5"/>
      <circle cx="80" cy="30" r="2.5"/><circle cx="30" cy="80" r="2.5"/>
      <circle cx="-30" cy="80" r="2.5"/><circle cx="-80" cy="30" r="2.5"/>
      <circle cx="-80" cy="-30" r="2.5"/><circle cx="-30" cy="-80" r="2.5"/>
      <circle cx="30" cy="-80" r="2.5"/><circle cx="80" cy="-30" r="2.5"/>
      <circle cx="55" cy="55" r="2.5"/><circle cx="-55" cy="55" r="2.5"/>
      <circle cx="-55" cy="-55" r="2.5"/><circle cx="55" cy="-55" r="2.5"/>
      <circle cx="45" cy="20" r="2.5"/><circle cx="20" cy="45" r="2.5"/>
      <circle cx="-20" cy="45" r="2.5"/><circle cx="-45" cy="20" r="2.5"/>
      <circle cx="-45" cy="-20" r="2.5"/><circle cx="-20" cy="-45" r="2.5"/>
      <circle cx="20" cy="-45" r="2.5"/><circle cx="45" cy="-20" r="2.5"/>
      <circle cx="70" cy="10" r="2.5"/><circle cx="10" cy="70" r="2.5"/>
    </g>

    <!-- Collision web -->
    <line x1="63" y1="63" x2="-63" y2="-63" stroke="#ff4444" stroke-width="1"
          stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="80" y1="30" x2="-80" y2="-30" stroke="#ff4444" stroke-width="1"
          stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="30" y1="80" x2="-30" y2="-80" stroke="#ff4444" stroke-width="1"
          stroke-dasharray="3,3" opacity="0.5"/>

    <text x="0" y="130" text-anchor="middle" fill="#aa44cc" font-size="10">~O(N³) lattice points</text>
    <text x="0" y="145" text-anchor="middle" fill="#8866aa" font-size="10">C(8,2) = 28 cross ch</text>
    <text x="0" y="160" text-anchor="middle" fill="#8866aa" font-size="10">240 nearest neighbors</text>
    <text x="0" y="175" text-anchor="middle" fill="#ff8866" font-size="10">r₈(N) = 480·σ₃(N)</text>
  </g>

  <!-- Progression arrows -->
  <text x="300" y="250" text-anchor="middle" fill="#fff" font-size="24" opacity="0.5">→</text>
  <text x="600" y="250" text-anchor="middle" fill="#fff" font-size="24" opacity="0.5">→</text>

  <!-- Bottom summary table -->
  <rect x="100" y="490" width="700" height="130" rx="8" fill="#0d0d2b" stroke="#445" stroke-width="1"/>

  <text x="450" y="515" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">
    Dimensional Hierarchy of Factoring Power
  </text>

  <!-- Table headers -->
  <text x="200" y="540" text-anchor="middle" fill="#888" font-size="10">Dimension</text>
  <text x="320" y="540" text-anchor="middle" fill="#888" font-size="10">Peel Ch.</text>
  <text x="420" y="540" text-anchor="middle" fill="#888" font-size="10">Cross Ch.</text>
  <text x="520" y="540" text-anchor="middle" fill="#888" font-size="10">Rep. Growth</text>
  <text x="650" y="540" text-anchor="middle" fill="#888" font-size="10">Quantum (BHT)</text>

  <!-- k=2 row -->
  <text x="200" y="558" text-anchor="middle" fill="#cc8844" font-size="10">k=2 (Triples)</text>
  <text x="320" y="558" text-anchor="middle" fill="#cc8844" font-size="10">1</text>
  <text x="420" y="558" text-anchor="middle" fill="#cc8844" font-size="10">1</text>
  <text x="520" y="558" text-anchor="middle" fill="#cc8844" font-size="10">O(N^ε)</text>
  <text x="650" y="558" text-anchor="middle" fill="#cc8844" font-size="10">O(N^{1/6})</text>

  <!-- k=3 row -->
  <text x="200" y="576" text-anchor="middle" fill="#4488cc" font-size="11" font-weight="bold">k=3 (Quads) ★</text>
  <text x="320" y="576" text-anchor="middle" fill="#4488cc" font-size="11" font-weight="bold">3</text>
  <text x="420" y="576" text-anchor="middle" fill="#4488cc" font-size="11" font-weight="bold">3</text>
  <text x="520" y="576" text-anchor="middle" fill="#4488cc" font-size="11" font-weight="bold">O(N^{1/2})</text>
  <text x="650" y="576" text-anchor="middle" fill="#4488cc" font-size="11" font-weight="bold">O(N^{1/5})</text>

  <!-- k=8 row -->
  <text x="200" y="594" text-anchor="middle" fill="#aa44cc" font-size="10">k=8 (E₈)</text>
  <text x="320" y="594" text-anchor="middle" fill="#aa44cc" font-size="10">8</text>
  <text x="420" y="594" text-anchor="middle" fill="#aa44cc" font-size="10">28</text>
  <text x="520" y="594" text-anchor="middle" fill="#aa44cc" font-size="10">O(N³)</text>
  <text x="650" y="594" text-anchor="middle" fill="#aa44cc" font-size="10">O(N^{1/9})</text>

  <text x="450" y="635" text-anchor="middle" fill="#556" font-size="9">
    Formally verified in Lean 4 / Mathlib · Pythagorean/QuadrupleGravityEnergy/Foundations.lean
  </text>
</svg>
