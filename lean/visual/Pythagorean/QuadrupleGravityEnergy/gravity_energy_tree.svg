<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Georgia, serif">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="50%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#2a2a6e"/>
    </linearGradient>
    <linearGradient id="energyGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="gravGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2d6a9f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#skyGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold"
        filter="url(#glow)">Gravity &amp; Energy on the Pythagorean Quadruple Tree</text>
  <text x="450" y="62" text-anchor="middle" fill="#88aacc" font-size="13">
    a² + b² + c² = d²  ·  Conservation Law: K = Φ²
  </text>

  <!-- Energy Arrow (up, left side) -->
  <line x1="80" y1="600" x2="80" y2="100" stroke="url(#energyGrad)" stroke-width="3"
        marker-end="url(#arrowUp)" opacity="0.8"/>
  <text x="65" y="350" fill="#ffd700" font-size="14" transform="rotate(-90, 65, 350)"
        text-anchor="middle" font-weight="bold">ENERGY (Ascent)</text>

  <!-- Gravity Arrow (down, right side) -->
  <line x1="820" y1="100" x2="820" y2="600" stroke="url(#gravGrad)" stroke-width="3" opacity="0.8"/>
  <text x="845" y="350" fill="#4ecdc4" font-size="14" transform="rotate(90, 845, 350)"
        text-anchor="middle" font-weight="bold">GRAVITY (Descent)</text>

  <!-- Tree Structure -->
  <!-- Root node -->
  <circle cx="450" cy="120" r="28" fill="#2a2a6e" stroke="#ffd700" stroke-width="2.5"/>
  <text x="450" y="116" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="bold">d = N</text>
  <text x="450" y="130" text-anchor="middle" fill="#88aacc" font-size="9">Target</text>

  <!-- Three branches from root -->
  <!-- Branch 1: Peel-a -->
  <line x1="430" y1="145" x2="250" y2="220" stroke="#ff6b35" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="230" r="24" fill="#1a1a4e" stroke="#ff6b35" stroke-width="2"/>
  <text x="250" y="226" text-anchor="middle" fill="#ff6b35" font-size="9" font-weight="bold">Peel-a</text>
  <text x="250" y="238" text-anchor="middle" fill="#ddd" font-size="8">(d-a)(d+a)</text>

  <!-- Branch 2: Peel-b -->
  <line x1="450" y1="148" x2="450" y2="220" stroke="#4ecdc4" stroke-width="2" opacity="0.7"/>
  <circle cx="450" cy="230" r="24" fill="#1a1a4e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="450" y="226" text-anchor="middle" fill="#4ecdc4" font-size="9" font-weight="bold">Peel-b</text>
  <text x="450" y="238" text-anchor="middle" fill="#ddd" font-size="8">(d-b)(d+b)</text>

  <!-- Branch 3: Peel-c -->
  <line x1="470" y1="145" x2="650" y2="220" stroke="#e056a0" stroke-width="2" opacity="0.7"/>
  <circle cx="650" cy="230" r="24" fill="#1a1a4e" stroke="#e056a0" stroke-width="2"/>
  <text x="650" y="226" text-anchor="middle" fill="#e056a0" font-size="9" font-weight="bold">Peel-c</text>
  <text x="650" y="238" text-anchor="middle" fill="#ddd" font-size="8">(d-c)(d+c)</text>

  <!-- Cross-collision connections -->
  <line x1="274" y1="230" x2="426" y2="230" stroke="#ffd700" stroke-width="1"
        stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="474" y1="230" x2="626" y2="230" stroke="#ffd700" stroke-width="1"
        stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="260" y1="252" x2="640" y2="252" stroke="#ffd700" stroke-width="1"
        stroke-dasharray="4,4" opacity="0.5"/>
  <text x="450" y="268" text-anchor="middle" fill="#ffd700" font-size="9" font-style="italic">
    3 cross-collision channels
  </text>

  <!-- Second level: GCD extractions -->
  <!-- From Peel-a -->
  <line x1="235" y1="254" x2="170" y2="320" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="254" x2="250" y2="320" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <line x1="265" y1="254" x2="330" y2="320" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>

  <!-- GCD nodes -->
  <circle cx="170" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="170" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₁</text>

  <circle cx="250" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="250" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₂</text>

  <circle cx="330" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="330" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₃</text>

  <!-- From Peel-b -->
  <line x1="435" y1="254" x2="390" y2="320" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="254" x2="450" y2="320" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="465" y1="254" x2="510" y2="320" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>

  <circle cx="390" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="390" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₄</text>

  <circle cx="450" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="450" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₅</text>

  <circle cx="510" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="510" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₆</text>

  <!-- From Peel-c -->
  <line x1="635" y1="254" x2="570" y2="320" stroke="#e056a0" stroke-width="1.5" opacity="0.5"/>
  <line x1="650" y1="254" x2="650" y2="320" stroke="#e056a0" stroke-width="1.5" opacity="0.5"/>
  <line x1="665" y1="254" x2="730" y2="320" stroke="#e056a0" stroke-width="1.5" opacity="0.5"/>

  <circle cx="570" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="570" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₇</text>

  <circle cx="650" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="650" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₈</text>

  <circle cx="730" cy="330" r="16" fill="#1a1a4e" stroke="#88ff88" stroke-width="1.5"/>
  <text x="730" y="334" text-anchor="middle" fill="#88ff88" font-size="8">GCD₉</text>

  <!-- 9 channels label -->
  <text x="450" y="370" text-anchor="middle" fill="#88ff88" font-size="12" font-weight="bold">
    9 Independent Factoring Channels
  </text>

  <!-- Conservation Law Box -->
  <rect x="150" y="400" width="600" height="80" rx="10" fill="none"
        stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="425" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold"
        filter="url(#softGlow)">Conservation Law: K = Φ²</text>
  <text x="450" y="448" text-anchor="middle" fill="#ddd" font-size="12">
    a² + b² + c² = d²  ⟹  Kinetic Energy = Gravitational Potential²
  </text>
  <text x="450" y="468" text-anchor="middle" fill="#aaa" font-size="11">
    Σ (d² - aᵢ²) = 2d²  ·  Π(d±aᵢ) = Π(aᵢ²+aⱼ²)
  </text>

  <!-- Comparison Box -->
  <rect x="150" y="500" width="280" height="130" rx="8" fill="#1a1a4e" stroke="#4ecdc4"
        stroke-width="1" opacity="0.8"/>
  <text x="290" y="522" text-anchor="middle" fill="#4ecdc4" font-size="13" font-weight="bold">
    Triples (2+1)D
  </text>
  <text x="290" y="542" text-anchor="middle" fill="#aaa" font-size="11">1 peel channel</text>
  <text x="290" y="558" text-anchor="middle" fill="#aaa" font-size="11">1 cross-collision</text>
  <text x="290" y="574" text-anchor="middle" fill="#aaa" font-size="11">3 total equations</text>
  <text x="290" y="594" text-anchor="middle" fill="#aaa" font-size="11">r₂(N) ~ O(N^ε)</text>
  <text x="290" y="614" text-anchor="middle" fill="#aaa" font-size="11">Search: S¹(√N)</text>

  <rect x="470" y="500" width="280" height="130" rx="8" fill="#1a1a4e" stroke="#ffd700"
        stroke-width="1.5" opacity="0.8"/>
  <text x="610" y="522" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">
    Quadruples (3+1)D ★
  </text>
  <text x="610" y="542" text-anchor="middle" fill="#ffd700" font-size="11">3 peel channels</text>
  <text x="610" y="558" text-anchor="middle" fill="#ffd700" font-size="11">3 cross-collisions</text>
  <text x="610" y="574" text-anchor="middle" fill="#ffd700" font-size="11">9 total equations</text>
  <text x="610" y="594" text-anchor="middle" fill="#ffd700" font-size="11">r₃(N) ~ O(N^{1/2})</text>
  <text x="610" y="614" text-anchor="middle" fill="#ffd700" font-size="11">Search: S²(√N)</text>

  <!-- 3× arrow between boxes -->
  <text x="445" y="570" text-anchor="middle" fill="#ff6b35" font-size="20" font-weight="bold">3×</text>

  <!-- Footer -->
  <text x="450" y="665" text-anchor="middle" fill="#667" font-size="10">
    All theorems formally verified in Lean 4 / Mathlib — Zero sorry statements
  </text>
  <text x="450" y="685" text-anchor="middle" fill="#556" font-size="9">
    Pythagorean/QuadrupleGravityEnergy/Foundations.lean
  </text>
</svg>
