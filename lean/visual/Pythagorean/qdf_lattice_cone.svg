<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <radialGradient id="sphere" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <rect width="800" height="550" fill="url(#bg4)"/>

  <text x="400" y="35" text-anchor="middle" fill="#4a9eff" font-size="20" font-weight="bold">
    QDF Lattice Cone Structure in ℤ⁴
  </text>

  <!-- Cone visualization -->
  <!-- Origin -->
  <circle cx="400" cy="450" r="5" fill="#ffd700"/>
  <text x="415" y="465" fill="#ffd700" font-size="12">Origin (0,0,0,0)</text>

  <!-- Cone lines -->
  <line x1="400" y1="450" x2="200" y2="80" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="450" x2="600" y2="80" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="450" x2="300" y2="80" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="450" x2="500" y2="80" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>

  <!-- Sphere slices at different d values -->
  <!-- d=3 -->
  <ellipse cx="400" cy="370" rx="60" ry="15" fill="none" stroke="#50fa7b" stroke-width="1" opacity="0.5"/>
  <text x="470" y="375" fill="#50fa7b" font-size="11">d = 3</text>

  <!-- d=7 -->
  <ellipse cx="400" cy="280" rx="120" ry="30" fill="none" stroke="#ffb86c" stroke-width="1" opacity="0.5"/>
  <text x="530" y="285" fill="#ffb86c" font-size="11">d = 7</text>

  <!-- d=13 -->
  <ellipse cx="400" cy="180" rx="190" ry="45" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <text x="600" y="185" fill="#ff6b6b" font-size="11">d = 13</text>

  <!-- Lattice points -->
  <!-- d=3: (1,2,2,3) -->
  <circle cx="380" cy="370" r="4" fill="#50fa7b"/>
  <text x="340" y="360" fill="#50fa7b" font-size="9">(1,2,2)</text>

  <!-- d=7: (2,3,6,7), (1,2,2,3)×k, etc -->
  <circle cx="350" cy="280" r="4" fill="#ffb86c"/>
  <text x="295" y="275" fill="#ffb86c" font-size="9">(2,3,6)</text>
  <circle cx="430" cy="275" r="4" fill="#ffb86c"/>
  <text x="440" y="268" fill="#ffb86c" font-size="9">(1,3,√39)?</text>

  <!-- d=13: (3,4,12,13) -->
  <circle cx="340" cy="180" r="4" fill="#ff6b6b"/>
  <text x="280" y="170" fill="#ff6b6b" font-size="9">(3,4,12)</text>
  <circle cx="460" cy="185" r="4" fill="#ff6b6b"/>
  <text x="470" y="178" fill="#ff6b6b" font-size="9">(4,6,11)</text>

  <!-- Scaling rays -->
  <line x1="400" y1="450" x2="380" y2="370" stroke="#50fa7b" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="370" x2="360" y2="290" stroke="#50fa7b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="345" y="330" fill="#50fa7b" font-size="9" transform="rotate(-80 345 330)">k=1,2,3...</text>

  <!-- Properties panel -->
  <rect x="50" y="430" width="300" height="100" rx="10" fill="#0d1b3e" stroke="#4a9eff" stroke-width="1"/>
  <text x="200" y="455" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="bold">Lattice Properties</text>
  <text x="70" y="475" fill="#ccccee" font-size="11">• Cone: k(a,b,c,d) ∈ C for all k ∈ ℤ</text>
  <text x="70" y="495" fill="#ccccee" font-size="11">• Gram: ‖v‖² = 2d² on the cone</text>
  <text x="70" y="515" fill="#ccccee" font-size="11">• Cauchy-Schwarz: |⟨v₁,v₂⟩| ≤ d₁d₂</text>

  <!-- Reduction panel -->
  <rect x="450" y="430" width="300" height="100" rx="10" fill="#3e0d1b" stroke="#ff6b6b" stroke-width="1"/>
  <text x="600" y="455" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Reduction</text>
  <text x="470" y="475" fill="#eecccc" font-size="11">• GCD primitivity: divide out g</text>
  <text x="470" y="495" fill="#eecccc" font-size="11">• Component bound: |a| ≤ d</text>
  <text x="470" y="515" fill="#eecccc" font-size="11">• Difference formula for sieving</text>
</svg>
