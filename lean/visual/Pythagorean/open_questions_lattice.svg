<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Georgia, serif">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2848;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="900" height="550" fill="url(#lbg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    Question 5: Lattice-Cryptography Connection
  </text>
  <text x="450" y="58" text-anchor="middle" fill="#aabbcc" font-size="13">
    Berggren Group ⊂ O(2,1;ℤ) — Lorentz Lattice and Short Vector Problems
  </text>

  <!-- Left panel: Lorentz cone -->
  <g transform="translate(30, 80)">
    <text x="180" y="15" text-anchor="middle" fill="#ff8888" font-size="14" font-weight="bold">
      Null Cone: a² + b² = c²
    </text>

    <!-- Cone shape -->
    <ellipse cx="180" cy="380" rx="160" ry="40" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="50" x2="20" y2="380" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="50" x2="340" y2="380" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>

    <!-- Cone fill -->
    <path d="M180,50 L20,380 A160,40 0 0,0 340,380 Z" fill="url(#cone)"/>

    <!-- PPT points on cone -->
    <circle cx="180" cy="100" r="6" fill="#4ecdc4" stroke="#7eddd6" stroke-width="1.5"/>
    <text x="200" y="100" fill="#7eddd6" font-size="10">(3,4,5)</text>

    <circle cx="150" cy="150" r="5" fill="#4ecdc4" opacity="0.8"/>
    <text x="110" y="153" fill="#7eddd6" font-size="9">(5,12,13)</text>

    <circle cx="220" cy="160" r="5" fill="#4ecdc4" opacity="0.8"/>
    <text x="235" y="163" fill="#7eddd6" font-size="9">(21,20,29)</text>

    <circle cx="130" cy="200" r="5" fill="#4ecdc4" opacity="0.7"/>
    <circle cx="200" cy="210" r="5" fill="#4ecdc4" opacity="0.7"/>
    <circle cx="250" cy="220" r="5" fill="#4ecdc4" opacity="0.7"/>
    <circle cx="100" cy="260" r="4" fill="#4ecdc4" opacity="0.5"/>
    <circle cx="160" cy="270" r="4" fill="#4ecdc4" opacity="0.5"/>
    <circle cx="230" cy="280" r="4" fill="#4ecdc4" opacity="0.5"/>
    <circle cx="280" cy="275" r="4" fill="#4ecdc4" opacity="0.5"/>

    <!-- Target point (N, u, h) -->
    <circle cx="120" cy="320" r="8" fill="#ffe66d" stroke="#ffcc00" stroke-width="2"/>
    <text x="60" y="325" fill="#ffe66d" font-size="11" font-weight="bold">(N, u, h)</text>

    <!-- Path from root to target -->
    <path d="M180,100 Q160,130 150,150 Q140,180 130,200 Q125,250 120,320"
          stroke="#ffe66d" stroke-width="2" fill="none" stroke-dasharray="5,3"/>

    <text x="80" y="420" fill="#aabbcc" font-size="11" font-style="italic">
      Berggren transforms navigate
    </text>
    <text x="80" y="435" fill="#aabbcc" font-size="11" font-style="italic">
      the integer null cone
    </text>
  </g>

  <!-- Right panel: Lattice structure -->
  <g transform="translate(420, 80)">
    <text x="220" y="15" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">
      Lattice Problem Analogy
    </text>

    <!-- Lattice grid -->
    <g opacity="0.3">
      <line x1="40" y1="40" x2="40" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="120" y1="40" x2="120" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="200" y1="40" x2="200" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="280" y1="40" x2="280" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="360" y1="40" x2="360" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="40" y1="80" x2="400" y2="80" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="40" y1="160" x2="400" y2="160" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="40" y1="240" x2="400" y2="240" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="40" y1="320" x2="400" y2="320" stroke="#4ecdc4" stroke-width="0.5"/>
      <line x1="40" y1="400" x2="400" y2="400" stroke="#4ecdc4" stroke-width="0.5"/>
    </g>

    <!-- Lattice points -->
    <g opacity="0.4">
      <circle cx="40" cy="80" r="3" fill="#4ecdc4"/>
      <circle cx="120" cy="80" r="3" fill="#4ecdc4"/>
      <circle cx="200" cy="80" r="3" fill="#4ecdc4"/>
      <circle cx="280" cy="80" r="3" fill="#4ecdc4"/>
      <circle cx="360" cy="80" r="3" fill="#4ecdc4"/>
      <circle cx="40" cy="160" r="3" fill="#4ecdc4"/>
      <circle cx="120" cy="160" r="3" fill="#4ecdc4"/>
      <circle cx="200" cy="160" r="3" fill="#4ecdc4"/>
      <circle cx="280" cy="160" r="3" fill="#4ecdc4"/>
      <circle cx="360" cy="160" r="3" fill="#4ecdc4"/>
      <circle cx="40" cy="240" r="3" fill="#4ecdc4"/>
      <circle cx="120" cy="240" r="3" fill="#4ecdc4"/>
      <circle cx="200" cy="240" r="3" fill="#4ecdc4"/>
      <circle cx="280" cy="240" r="3" fill="#4ecdc4"/>
      <circle cx="360" cy="240" r="3" fill="#4ecdc4"/>
      <circle cx="40" cy="320" r="3" fill="#4ecdc4"/>
      <circle cx="120" cy="320" r="3" fill="#4ecdc4"/>
      <circle cx="200" cy="320" r="3" fill="#4ecdc4"/>
      <circle cx="280" cy="320" r="3" fill="#4ecdc4"/>
      <circle cx="360" cy="320" r="3" fill="#4ecdc4"/>
    </g>

    <!-- Target vector -->
    <line x1="200" y1="240" x2="310" y2="140" stroke="#ffe66d" stroke-width="2.5"
          marker-end="url(#arrowY)"/>
    <circle cx="200" cy="240" r="5" fill="#4ecdc4" stroke="#7eddd6" stroke-width="2"/>
    <text x="320" y="135" fill="#ffe66d" font-size="11" font-weight="bold">target</text>

    <!-- Short vector (SVP) -->
    <line x1="200" y1="240" x2="280" y2="160" stroke="#ff6b6b" stroke-width="2"
          stroke-dasharray="4,3"/>
    <text x="250" y="195" fill="#ff8888" font-size="10" transform="rotate(-45, 250, 195)">
      SVP
    </text>

    <!-- Closest vector (CVP) -->
    <line x1="310" y1="140" x2="280" y2="160" stroke="#88ff88" stroke-width="2"
          stroke-dasharray="4,3"/>
    <text x="305" y="165" fill="#88ff88" font-size="10">CVP</text>

    <!-- Annotations -->
    <rect x="20" y="360" width="400" height="90" fill="#0a1628" rx="8" stroke="#334466" stroke-width="1"/>
    <text x="220" y="385" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">
      Key Relationships:
    </text>
    <text x="30" y="405" fill="#ff8888" font-size="11">• SVP in Lorentz lattice ↔ shortest descent path</text>
    <text x="30" y="425" fill="#88ff88" font-size="11">• CVP ↔ closest PPT with leg N</text>
    <text x="30" y="445" fill="#ffe66d" font-size="11">• LLL reduction ↔ efficient system solving</text>
  </g>

  <!-- Bottom: Formal verification badge -->
  <g transform="translate(30, 510)">
    <rect x="0" y="0" width="840" height="30" fill="#1a2848" rx="8" stroke="#334466" stroke-width="1"/>
    <text x="420" y="20" text-anchor="middle" fill="#88ff88" font-size="12">
      ✓ Berggren ∈ O(2,1;ℤ): B₁ᵀηB₁ = η, B₂ᵀηB₂ = η, B₃ᵀηB₃ = η — Formally verified (native_decide)
    </text>
  </g>
</svg>
