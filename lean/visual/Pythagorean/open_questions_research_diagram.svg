<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="q2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48dbfb"/>
      <stop offset="100%" style="stop-color:#0abde3"/>
    </linearGradient>
    <linearGradient id="q3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
    <linearGradient id="q4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="q5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold" filter="url(#glow)">
    Five Open Questions in Inside-Out Pythagorean Factoring
  </text>
  <text x="600" y="75" text-anchor="middle" fill="#aaa" font-size="14">
    Research Roadmap · Formally Verified in Lean 4
  </text>
  
  <!-- Center node -->
  <circle cx="600" cy="420" r="90" fill="url(#center)" opacity="0.9" filter="url(#shadow)"/>
  <text x="600" y="405" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Inside-Out</text>
  <text x="600" y="425" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Root Search</text>
  <text x="600" y="450" text-anchor="middle" fill="#fff" font-size="12">N² + u² = h²</text>
  
  <!-- Connection lines -->
  <line x1="510" y1="380" x2="300" y2="250" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>
  <line x1="690" y1="380" x2="900" y2="250" stroke="#48dbfb" stroke-width="2" opacity="0.6"/>
  <line x1="510" y1="460" x2="200" y2="650" stroke="#feca57" stroke-width="2" opacity="0.6"/>
  <line x1="690" y1="460" x2="1000" y2="650" stroke="#a29bfe" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="510" x2="600" y2="720" stroke="#55efc4" stroke-width="2" opacity="0.6"/>
  
  <!-- Q1: Complexity Bounds (top-left) -->
  <rect x="100" y="130" width="300" height="180" rx="15" fill="url(#q1)" opacity="0.85" filter="url(#shadow)"/>
  <text x="250" y="160" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Q1: Complexity</text>
  <text x="250" y="185" text-anchor="middle" fill="#fff" font-size="12">Can we achieve sub-exponential?</text>
  <text x="120" y="210" fill="#fff" font-size="11">• 3ᵏ systems at depth k</text>
  <text x="120" y="230" fill="#fff" font-size="11">• Descent: O(log N) steps</text>
  <text x="120" y="250" fill="#fff" font-size="11">• Lattice reduction on poly systems</text>
  <text x="120" y="270" fill="#fff" font-size="11">• Bottleneck: finding optimal u</text>
  <rect x="120" y="280" width="260" height="18" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="250" y="294" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">OPEN — requires new algebraic techniques</text>
  
  <!-- Q2: Optimal Starting (top-right) -->
  <rect x="800" y="130" width="300" height="180" rx="15" fill="url(#q2)" opacity="0.85" filter="url(#shadow)"/>
  <text x="950" y="160" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Q2: Optimal Start</text>
  <text x="950" y="185" text-anchor="middle" fill="#fff" font-size="12">Best starting triple for N?</text>
  <text x="820" y="210" fill="#fff" font-size="11">• Trivial: gap = 1 (worst)</text>
  <text x="820" y="230" fill="#fff" font-size="11">• Euclid: gap = (m-n)² (better)</text>
  <text x="820" y="250" fill="#fff" font-size="11">• Finding m,n ≡ factoring N</text>
  <text x="820" y="270" fill="#fff" font-size="11">• Partial info → shortcut?</text>
  <rect x="820" y="280" width="260" height="18" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="950" y="294" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">PARTIAL — circular without heuristics</text>
  
  <!-- Q3: Higher Dimensions (bottom-left) -->
  <rect x="30" y="560" width="300" height="180" rx="15" fill="url(#q3)" opacity="0.85" filter="url(#shadow)"/>
  <text x="180" y="590" text-anchor="middle" fill="#000" font-size="18" font-weight="bold">Q3: Higher Dim</text>
  <text x="180" y="615" text-anchor="middle" fill="#333" font-size="12">Pythagorean quadruples tree?</text>
  <text x="50" y="640" fill="#333" font-size="11">• a² + b² + c² = d²</text>
  <text x="50" y="660" fill="#333" font-size="11">• O(3,1;ℤ) Lorentz group</text>
  <text x="50" y="680" fill="#333" font-size="11">• 4ᵏ branching (vs 3ᵏ)</text>
  <text x="50" y="700" fill="#333" font-size="11">• Two GCD projections</text>
  <rect x="50" y="710" width="260" height="18" rx="4" fill="rgba(0,0,0,0.15)"/>
  <text x="180" y="724" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">PROVEN — constant advantage only</text>
  
  <!-- Q4: Quantum (bottom-right) -->
  <rect x="870" y="560" width="300" height="180" rx="15" fill="url(#q4)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1020" y="590" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Q4: Quantum</text>
  <text x="1020" y="615" text-anchor="middle" fill="#fff" font-size="12">Grover on branch sequences?</text>
  <text x="890" y="640" fill="#fff" font-size="11">• √(3ᵏ) evaluations vs 3ᵏ</text>
  <text x="890" y="660" fill="#fff" font-size="11">• Oracle: O(k·log N) gates</text>
  <text x="890" y="680" fill="#fff" font-size="11">• Total: ≈ O(N^0.79 · log² N)</text>
  <text x="890" y="700" fill="#fff" font-size="11">• Does NOT match Shor</text>
  <rect x="890" y="710" width="260" height="18" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="1020" y="724" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">ANALYZED — sub-exponential, not poly</text>
  
  <!-- Q5: Lattice (bottom-center) -->
  <rect x="430" y="730" width="340" height="150" rx="15" fill="url(#q5)" opacity="0.85" filter="url(#shadow)"/>
  <text x="600" y="760" text-anchor="middle" fill="#000" font-size="18" font-weight="bold">Q5: Lattice Crypto</text>
  <text x="600" y="785" text-anchor="middle" fill="#333" font-size="12">Connection to SVP/CVP?</text>
  <text x="450" y="810" fill="#333" font-size="11">• Γ = ⟨B₁,B₂,B₃⟩ ⊂ O(2,1;ℤ) is a lattice</text>
  <text x="450" y="830" fill="#333" font-size="11">• PPT search ≈ constrained SVP</text>
  <text x="450" y="850" fill="#333" font-size="11">• dim = 3 (fixed), not high-dim like LWE</text>
  <rect x="460" y="855" width="280" height="18" rx="4" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="869" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">STRUCTURAL — different regime than PQ crypto</text>
  
  <!-- Status indicator -->
  <rect x="50" y="15" width="180" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="70" cy="30" r="6" fill="#55efc4"/>
  <text x="85" y="35" fill="#aaa" font-size="12">Lean 4 Verified</text>
  
  <rect x="250" y="15" width="180" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="270" cy="30" r="6" fill="#feca57"/>
  <text x="285" y="35" fill="#aaa" font-size="12">Python Demos</text>
  
  <rect x="450" y="15" width="180" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="470" cy="30" r="6" fill="#a29bfe"/>
  <text x="485" y="35" fill="#aaa" font-size="12">SVG Visuals</text>
</svg>
