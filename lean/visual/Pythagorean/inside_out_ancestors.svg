<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d1b4e;stop-opacity:1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e0aaff" font-size="24" font-weight="bold" font-family="Georgia, serif">
    Nested Ancestor Equations: Parent → Grandparent → Root
  </text>
  <text x="600" y="65" text-anchor="middle" fill="#9d4edd" font-size="13" font-family="Georgia, serif">
    Each level of substitution builds a higher-degree polynomial in (N, u)
  </text>

  <!-- ============================================================ -->
  <!-- Level 0: The Starting Triple -->
  <!-- ============================================================ -->
  <rect x="50" y="100" width="340" height="120" rx="12" fill="#2d1b4e" stroke="#e0aaff" stroke-width="2"/>
  <text x="220" y="125" text-anchor="middle" fill="#e0aaff" font-size="15" font-weight="bold">Level 0: Starting Triple</text>

  <text x="70" y="155" fill="#c77dff" font-size="14">(N, u, h)</text>
  <text x="70" y="178" fill="#9d4edd" font-size="12">where h² = N² + u²</text>
  <text x="70" y="200" fill="#7b2cbf" font-size="11">One leg is N, the target to factor</text>

  <!-- Arrow down -->
  <line x1="220" y1="220" x2="220" y2="260" stroke="#e0aaff" stroke-width="2"/>
  <polygon points="212,258 220,275 228,258" fill="#e0aaff"/>
  <text x="240" y="248" fill="#e0aaff" font-size="11">B₂⁻¹</text>

  <!-- ============================================================ -->
  <!-- Level 1: Parent -->
  <!-- ============================================================ -->
  <rect x="50" y="280" width="500" height="130" rx="12" fill="#2d1b4e" stroke="#c77dff" stroke-width="2"/>
  <text x="300" y="305" text-anchor="middle" fill="#c77dff" font-size="15" font-weight="bold">Level 1: Parent</text>

  <text x="70" y="335" fill="#e0aaff" font-size="13">a₁ = N + 2u − 2h</text>
  <text x="70" y="355" fill="#e0aaff" font-size="13">b₁ = 2N + u − 2h</text>
  <text x="70" y="375" fill="#e0aaff" font-size="13">c₁ = −2N − 2u + 3h</text>

  <text x="320" y="335" fill="#9d4edd" font-size="11">Linear in (N, u, h)</text>
  <text x="320" y="355" fill="#9d4edd" font-size="11">Since h = √(N²+u²),</text>
  <text x="320" y="375" fill="#9d4edd" font-size="11">degree 1 in N,u (with h)</text>

  <!-- Arrow down -->
  <line x1="300" y1="410" x2="300" y2="450" stroke="#c77dff" stroke-width="2"/>
  <polygon points="292,448 300,465 308,448" fill="#c77dff"/>
  <text x="320" y="438" fill="#c77dff" font-size="11">B₂⁻¹</text>

  <!-- ============================================================ -->
  <!-- Level 2: Grandparent -->
  <!-- ============================================================ -->
  <rect x="50" y="470" width="700" height="130" rx="12" fill="#2d1b4e" stroke="#9d4edd" stroke-width="2"/>
  <text x="400" y="495" text-anchor="middle" fill="#9d4edd" font-size="15" font-weight="bold">Level 2: Grandparent (Proven Formula)</text>

  <text x="70" y="525" fill="#c77dff" font-size="13">a₂ = 9N + 8u − 12h</text>
  <text x="70" y="545" fill="#c77dff" font-size="13">b₂ = 8N + 9u − 12h</text>
  <text x="70" y="565" fill="#c77dff" font-size="13">c₂ = −12N − 12u + 17h</text>

  <text x="350" y="525" fill="#7b2cbf" font-size="11">Still linear in (N, u, h)</text>
  <text x="350" y="545" fill="#7b2cbf" font-size="11">Coefficients grow: Chebyshev-like pattern</text>
  <text x="350" y="565" fill="#7b2cbf" font-size="11">Matrix: B₂⁻² has det = 1 (area-preserving)</text>

  <!-- ============================================================ -->
  <!-- The Root Condition Panel -->
  <!-- ============================================================ -->
  <rect x="800" y="100" width="370" height="500" rx="15" fill="#1a0a2e" stroke="#ff6b9d" stroke-width="2"/>
  <text x="985" y="130" text-anchor="middle" fill="#ff6b9d" font-size="16" font-weight="bold">Root Condition</text>
  <text x="985" y="150" text-anchor="middle" fill="#ff6b9d" font-size="13">(aₖ, bₖ, cₖ) = (3, 4, 5)</text>

  <!-- Depth 1 -->
  <rect x="820" y="170" width="330" height="100" rx="8" fill="#2d1b4e" stroke="#c77dff" stroke-width="1"/>
  <text x="985" y="192" text-anchor="middle" fill="#c77dff" font-size="13" font-weight="bold">Depth 1</text>
  <text x="835" y="215" fill="#e0aaff" font-size="11">N + 2u − 2h = 3</text>
  <text x="835" y="233" fill="#e0aaff" font-size="11">→ u = N−1, h = (4N+3)/3</text>
  <text x="835" y="255" fill="#ff6b9d" font-size="12" font-weight="bold">→ 2N(N−21) = 0</text>

  <!-- Depth 2 -->
  <rect x="820" y="285" width="330" height="100" rx="8" fill="#2d1b4e" stroke="#9d4edd" stroke-width="1"/>
  <text x="985" y="307" text-anchor="middle" fill="#9d4edd" font-size="13" font-weight="bold">Depth 2</text>
  <text x="835" y="330" fill="#e0aaff" font-size="11">9N + 8u − 12h = 3</text>
  <text x="835" y="348" fill="#e0aaff" font-size="11">→ u = N+1, h = (24N+17)/17</text>
  <text x="835" y="370" fill="#ff6b9d" font-size="12" font-weight="bold">→ N ≡ 0 (mod 17) + quadratic</text>

  <!-- Depth k -->
  <rect x="820" y="400" width="330" height="100" rx="8" fill="#2d1b4e" stroke="#7b2cbf" stroke-width="1"/>
  <text x="985" y="422" text-anchor="middle" fill="#7b2cbf" font-size="13" font-weight="bold">Depth k (general)</text>
  <text x="835" y="445" fill="#e0aaff" font-size="11">αₖN + βₖu − γₖh = 3</text>
  <text x="835" y="465" fill="#e0aaff" font-size="11">→ u = f(N), h = g(N)</text>
  <text x="835" y="487" fill="#ff6b9d" font-size="12" font-weight="bold">→ degree-2 polynomial in N</text>

  <!-- Key insight -->
  <rect x="820" y="515" width="330" height="65" rx="8" fill="#ff6b9d" opacity="0.15" stroke="#ff6b9d" stroke-width="2"/>
  <text x="985" y="540" text-anchor="middle" fill="#ff6b9d" font-size="12" font-weight="bold">Each depth produces a NEW</text>
  <text x="985" y="558" text-anchor="middle" fill="#ff6b9d" font-size="12" font-weight="bold">factoring equation for N!</text>
  <text x="985" y="573" text-anchor="middle" fill="#e0aaff" font-size="10">3ᵏ equations × depth k = rich structure</text>

  <!-- ============================================================ -->
  <!-- Bottom: The Key Pattern -->
  <!-- ============================================================ -->
  <rect x="50" y="625" width="1100" height="60" rx="12" fill="#1a0a2e" stroke="#e0aaff" stroke-width="1.5"/>
  <text x="600" y="650" text-anchor="middle" fill="#e0aaff" font-size="14" font-weight="bold" font-family="Georgia, serif">
    Key Pattern: B₂⁻ᵏ coefficients follow Chebyshev recurrences — each level's polynomial encodes deeper factor structure
  </text>
  <text x="600" y="672" text-anchor="middle" fill="#9d4edd" font-size="12" font-family="Georgia, serif">
    The "inside-out" approach solves these polynomials instead of searching the tree — algebra replaces enumeration
  </text>
</svg>
