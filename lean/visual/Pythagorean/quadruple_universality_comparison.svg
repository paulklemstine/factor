<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1e3a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="450" fill="url(#bgc)"/>

  <text x="450" y="35" text-anchor="middle" fill="#e0e6ff" font-size="20" font-weight="bold">
    Triples vs Quadruples: The All-Ones Descent Pattern
  </text>

  <!-- Left: Triples -->
  <rect x="30" y="55" width="400" height="380" rx="10" fill="#0d1520" stroke="#2244aa" stroke-width="2"/>
  <text x="230" y="82" text-anchor="middle" fill="#6699ff" font-size="16" font-weight="bold">
    Pythagorean Triples (2+1)
  </text>
  <text x="230" y="100" text-anchor="middle" fill="#667799" font-size="12">a² + b² = c²</text>

  <!-- Triple tree -->
  <g transform="translate(230, 140)">
    <!-- Root -->
    <circle cx="0" cy="0" r="18" fill="#ff6644" stroke="#ff9977" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="9" font-weight="bold">(3,4,5)</text>

    <!-- Children -->
    <line x1="0" y1="18" x2="-120" y2="60" stroke="#4466aa" stroke-width="1.5"/>
    <line x1="0" y1="18" x2="0" y2="60" stroke="#4466aa" stroke-width="1.5"/>
    <line x1="0" y1="18" x2="120" y2="60" stroke="#4466aa" stroke-width="1.5"/>

    <circle cx="-120" cy="75" r="15" fill="#44aaff" stroke="#77ccff" stroke-width="1.5"/>
    <text x="-120" y="79" text-anchor="middle" fill="white" font-size="8">(5,12,13)</text>

    <circle cx="0" cy="75" r="15" fill="#44aaff" stroke="#77ccff" stroke-width="1.5"/>
    <text x="0" y="79" text-anchor="middle" fill="white" font-size="8">(8,15,17)</text>

    <circle cx="120" cy="75" r="15" fill="#44aaff" stroke="#77ccff" stroke-width="1.5"/>
    <text x="120" y="79" text-anchor="middle" fill="white" font-size="8">(20,21,29)</text>

    <!-- Grandchildren (3 from each) -->
    <line x1="-120" y1="90" x2="-155" y2="130" stroke="#4466aa" stroke-width="1"/>
    <line x1="-120" y1="90" x2="-120" y2="130" stroke="#4466aa" stroke-width="1"/>
    <line x1="-120" y1="90" x2="-85" y2="130" stroke="#4466aa" stroke-width="1"/>

    <circle cx="-155" cy="142" r="10" fill="#44cc88"/>
    <circle cx="-120" cy="142" r="10" fill="#44cc88"/>
    <circle cx="-85" cy="142" r="10" fill="#44cc88"/>

    <line x1="0" y1="90" x2="-25" y2="130" stroke="#4466aa" stroke-width="1"/>
    <line x1="0" y1="90" x2="0" y2="130" stroke="#4466aa" stroke-width="1"/>
    <line x1="0" y1="90" x2="25" y2="130" stroke="#4466aa" stroke-width="1"/>

    <circle cx="-25" cy="142" r="10" fill="#44cc88"/>
    <circle cx="0" cy="142" r="10" fill="#44cc88"/>
    <circle cx="25" cy="142" r="10" fill="#44cc88"/>

    <text x="0" y="180" text-anchor="middle" fill="#8899bb" font-size="11">Always 3 children</text>
  </g>

  <!-- Info box left -->
  <g transform="translate(50, 340)">
    <text x="0" y="0" fill="#aabbdd" font-size="11">• Descent vector: <tspan fill="#ffcc44">(1,1,1)</tspan></text>
    <text x="0" y="18" fill="#aabbdd" font-size="11">• Root: <tspan fill="#ff9966">(3,4,5)</tspan></text>
    <text x="0" y="36" fill="#aabbdd" font-size="11">• Group: <tspan fill="#88ccff">O(2,1;ℤ)</tspan></text>
    <text x="0" y="54" fill="#aabbdd" font-size="11">• Generators: <tspan fill="#88ffaa">3 matrices</tspan></text>
    <text x="0" y="72" fill="#aabbdd" font-size="11">• Branching: <tspan fill="#ddcc88">Ternary (fixed)</tspan></text>
  </g>

  <!-- Right: Quadruples -->
  <rect x="470" y="55" width="400" height="380" rx="10" fill="#0d1520" stroke="#22aa44" stroke-width="2"/>
  <text x="670" y="82" text-anchor="middle" fill="#66ff99" font-size="16" font-weight="bold">
    Pythagorean Quadruples (3+1)
  </text>
  <text x="670" y="100" text-anchor="middle" fill="#667799" font-size="12">a² + b² + c² = d²</text>

  <!-- Quadruple tree -->
  <g transform="translate(670, 140)">
    <!-- Root -->
    <circle cx="0" cy="0" r="18" fill="#ff6644" stroke="#ff9977" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="9" font-weight="bold">(0,0,1,1)</text>

    <!-- Single child -->
    <line x1="0" y1="18" x2="0" y2="55" stroke="#44aa66" stroke-width="1.5"/>
    <circle cx="0" cy="70" r="15" fill="#44aaff" stroke="#77ccff" stroke-width="1.5"/>
    <text x="0" y="74" text-anchor="middle" fill="white" font-size="8">(1,2,2,3)</text>

    <!-- 4 children -->
    <line x1="0" y1="85" x2="-130" y2="120" stroke="#44aa66" stroke-width="1.5"/>
    <line x1="0" y1="85" x2="-45" y2="120" stroke="#44aa66" stroke-width="1.5"/>
    <line x1="0" y1="85" x2="45" y2="120" stroke="#44aa66" stroke-width="1.5"/>
    <line x1="0" y1="85" x2="130" y2="120" stroke="#44aa66" stroke-width="1.5"/>

    <circle cx="-130" cy="135" r="13" fill="#44cc88"/>
    <text x="-130" y="139" text-anchor="middle" fill="white" font-size="7">(0,3,4,5)</text>

    <circle cx="-45" cy="135" r="13" fill="#44cc88"/>
    <text x="-45" y="139" text-anchor="middle" fill="white" font-size="7">(2,3,6,7)</text>

    <circle cx="45" cy="135" r="13" fill="#44cc88"/>
    <text x="45" y="139" text-anchor="middle" fill="white" font-size="7">(4,4,7,9)</text>

    <circle cx="130" cy="135" r="13" fill="#44cc88"/>
    <text x="130" y="139" text-anchor="middle" fill="white" font-size="7">(6,6,7,11)</text>

    <text x="0" y="180" text-anchor="middle" fill="#8899bb" font-size="11">Variable branching (1,4,...)</text>
  </g>

  <!-- Info box right -->
  <g transform="translate(490, 340)">
    <text x="0" y="0" fill="#aabbdd" font-size="11">• Descent vector: <tspan fill="#ffcc44">(1,1,1,1)</tspan></text>
    <text x="0" y="18" fill="#aabbdd" font-size="11">• Root: <tspan fill="#ff9966">(0,0,1,1)</tspan></text>
    <text x="0" y="36" fill="#aabbdd" font-size="11">• Group: <tspan fill="#88ccff">O(3,1;ℤ)</tspan></text>
    <text x="0" y="54" fill="#aabbdd" font-size="11">• Generators: <tspan fill="#88ffaa">4 matrices</tspan></text>
    <text x="0" y="72" fill="#aabbdd" font-size="11">• Branching: <tspan fill="#ddcc88">Variable</tspan></text>
  </g>

  <!-- Central "=" -->
  <text x="450" y="240" text-anchor="middle" fill="#ffcc44" font-size="28" font-weight="bold">≈</text>
  <text x="450" y="265" text-anchor="middle" fill="#aabb88" font-size="10">Same pattern!</text>
</svg>
