<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d30"/>
      <stop offset="100%" style="stop-color:#1a1a50"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0044ff"/>
      <stop offset="30%" style="stop-color:#00ccff"/>
      <stop offset="50%" style="stop-color:#00ff88"/>
      <stop offset="70%" style="stop-color:#ffcc00"/>
      <stop offset="100%" style="stop-color:#ff4400"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <text x="400" y="35" fill="#e0e0ff" font-size="18" font-weight="bold" text-anchor="middle">
    Spectral Gap of the Berggren Tree
  </text>

  <!-- Spectrum axis -->
  <text x="400" y="65" fill="#aabbdd" font-size="12" text-anchor="middle">
    Spectrum of adjacency operator on infinite d-regular tree = [−2√(d−1), 2√(d−1)]
  </text>

  <!-- d=3 spectrum line -->
  <text x="60" y="115" fill="#88aaff" font-size="14" font-weight="bold">d = 3</text>

  <!-- Axis for d=3 -->
  <line x1="120" y1="130" x2="700" y2="130" stroke="#445566" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="120" y1="125" x2="120" y2="135" stroke="#445566"/>
  <text x="120" y="148" fill="#778899" font-size="10" text-anchor="middle">−3</text>

  <line x1="216" y1="125" x2="216" y2="135" stroke="#445566"/>
  <text x="216" y="148" fill="#778899" font-size="10" text-anchor="middle">−2</text>

  <line x1="313" y1="125" x2="313" y2="135" stroke="#445566"/>
  <text x="313" y="148" fill="#778899" font-size="10" text-anchor="middle">−1</text>

  <line x1="410" y1="125" x2="410" y2="135" stroke="#445566"/>
  <text x="410" y="148" fill="#778899" font-size="10" text-anchor="middle">0</text>

  <line x1="506" y1="125" x2="506" y2="135" stroke="#445566"/>
  <text x="506" y="148" fill="#778899" font-size="10" text-anchor="middle">1</text>

  <line x1="603" y1="125" x2="603" y2="135" stroke="#445566"/>
  <text x="603" y="148" fill="#778899" font-size="10" text-anchor="middle">2</text>

  <line x1="700" y1="125" x2="700" y2="135" stroke="#445566"/>
  <text x="700" y="148" fill="#778899" font-size="10" text-anchor="middle">3</text>

  <!-- Spectrum interval [-2√2, 2√2] for d=3 -->
  <!-- 2√2 ≈ 2.828, so at position: 410 + 2.828 * 96.67 ≈ 683 -->
  <!-- -2√2 at: 410 - 2.828 * 96.67 ≈ 137 -->
  <rect x="137" y="120" width="546" height="20" fill="url(#spectrum)" opacity="0.4" rx="3"/>
  <line x1="137" y1="110" x2="137" y2="150" stroke="#44aaff" stroke-width="2"/>
  <text x="137" y="105" fill="#44aaff" font-size="10" text-anchor="middle">−2√2</text>
  <line x1="683" y1="110" x2="683" y2="150" stroke="#ff6644" stroke-width="2"/>
  <text x="683" y="105" fill="#ff6644" font-size="10" text-anchor="middle">2√2</text>

  <!-- Trivial eigenvalue at d=3 -->
  <circle cx="700" cy="130" r="6" fill="#ffdd44" stroke="#ffff88" stroke-width="2"/>
  <text x="720" y="125" fill="#ffdd44" font-size="10">λ₁ = 3</text>

  <!-- Spectral gap arrow for d=3 -->
  <line x1="683" y1="165" x2="700" y2="165" stroke="#44ff88" stroke-width="2" marker-start="url(#arrow)"/>
  <text x="692" y="178" fill="#44ff88" font-size="9" text-anchor="middle">gap</text>
  <rect x="683" y="160" width="17" height="10" fill="#44ff88" opacity="0.3"/>

  <!-- d=4 spectrum line -->
  <text x="60" y="225" fill="#88ffaa" font-size="14" font-weight="bold">d = 4</text>

  <!-- Axis for d=4 -->
  <line x1="120" y1="240" x2="700" y2="240" stroke="#445566" stroke-width="1"/>
  <line x1="120" y1="235" x2="120" y2="245" stroke="#445566"/>
  <text x="120" y="258" fill="#778899" font-size="10" text-anchor="middle">−4</text>

  <line x1="192" y1="235" x2="192" y2="245" stroke="#445566"/>
  <text x="192" y="258" fill="#778899" font-size="10" text-anchor="middle">−3</text>

  <line x1="265" y1="235" x2="265" y2="245" stroke="#445566"/>
  <text x="265" y="258" fill="#778899" font-size="10" text-anchor="middle">−2</text>

  <line x1="337" y1="235" x2="337" y2="245" stroke="#445566"/>
  <text x="337" y="258" fill="#778899" font-size="10" text-anchor="middle">−1</text>

  <line x1="410" y1="235" x2="410" y2="245" stroke="#445566"/>
  <text x="410" y="258" fill="#778899" font-size="10" text-anchor="middle">0</text>

  <line x1="482" y1="235" x2="482" y2="245" stroke="#445566"/>
  <text x="482" y="258" fill="#778899" font-size="10" text-anchor="middle">1</text>

  <line x1="555" y1="235" x2="555" y2="245" stroke="#445566"/>
  <text x="555" y="258" fill="#778899" font-size="10" text-anchor="middle">2</text>

  <line x1="627" y1="235" x2="627" y2="245" stroke="#445566"/>
  <text x="627" y="258" fill="#778899" font-size="10" text-anchor="middle">3</text>

  <line x1="700" y1="235" x2="700" y2="245" stroke="#445566"/>
  <text x="700" y="258" fill="#778899" font-size="10" text-anchor="middle">4</text>

  <!-- Spectrum interval [-2√3, 2√3] for d=4 -->
  <!-- 2√3 ≈ 3.464, at 410 + 3.464 * 72.5 ≈ 661 -->
  <!-- -2√3 at 410 - 3.464 * 72.5 ≈ 159 -->
  <rect x="159" y="230" width="502" height="20" fill="url(#spectrum)" opacity="0.4" rx="3"/>
  <line x1="159" y1="220" x2="159" y2="260" stroke="#44aaff" stroke-width="2"/>
  <text x="159" y="215" fill="#44aaff" font-size="10" text-anchor="middle">−2√3</text>
  <line x1="661" y1="220" x2="661" y2="260" stroke="#ff6644" stroke-width="2"/>
  <text x="661" y="215" fill="#ff6644" font-size="10" text-anchor="middle">2√3</text>

  <!-- Trivial eigenvalue at d=4 -->
  <circle cx="700" cy="240" r="6" fill="#ffdd44" stroke="#ffff88" stroke-width="2"/>
  <text x="720" y="235" fill="#ffdd44" font-size="10">λ₁ = 4</text>

  <!-- Spectral gap for d=4 -->
  <rect x="661" y="270" width="39" height="10" fill="#44ff88" opacity="0.3"/>
  <text x="680" y="290" fill="#44ff88" font-size="9" text-anchor="middle">gap ≈ 0.54</text>

  <!-- Summary box -->
  <rect x="100" y="310" width="600" height="170" rx="10" fill="#111133" stroke="#334466" opacity="0.9"/>
  <text x="400" y="340" fill="#e0e0ff" font-size="16" font-weight="bold" text-anchor="middle">
    Ramanujan Bounds &amp; Spectral Gaps (Verified in Lean 4)
  </text>

  <text x="150" y="375" fill="#88aaff" font-size="13">d = 3 (3-regular):</text>
  <text x="400" y="375" fill="#ffffff" font-size="13">spectral gap = 3 − 2√2 ≈ 0.172</text>

  <text x="150" y="400" fill="#88ffaa" font-size="13">d = 4 (4-regular):</text>
  <text x="400" y="400" fill="#ffffff" font-size="13">spectral gap = 4 − 2√3 ≈ 0.536</text>

  <text x="150" y="430" fill="#ffcc44" font-size="13">Cheeger bound (d=3):</text>
  <text x="400" y="430" fill="#ffffff" font-size="13">h(G) ≥ (3 − 2√2)/2 ≈ 0.086</text>

  <text x="150" y="460" fill="#ff8844" font-size="13">Mixing time:</text>
  <text x="400" y="460" fill="#ffffff" font-size="13">τ_mix = O(log n / γ)</text>
</svg>
