<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dim3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="dim4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="dim5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="dim6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e5e7eb" font-family="Georgia, serif" font-size="22" font-weight="bold">
    k-Tuple Factor Identity Hierarchy
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="12">
    Higher dimensions provide strictly richer factoring structure
  </text>

  <!-- Dimension columns -->
  <!-- k=3 -->
  <g transform="translate(120,100)">
    <rect x="-90" y="0" width="180" height="400" rx="12" fill="url(#dim3)" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" fill="#60a5fa" font-family="Arial" font-size="18" font-weight="bold">k = 3</text>
    <text x="0" y="52" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="12">Triple</text>

    <text x="0" y="85" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="11">a² + b² = c²</text>

    <rect x="-75" y="100" width="150" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="0" y="120" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="11" font-weight="bold">1 Factorization:</text>
    <text x="0" y="140" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="10">(c−b)(c+b) = a²</text>

    <text x="0" y="180" text-anchor="middle" fill="#60a5fa" font-family="Arial" font-size="28" font-weight="bold">2</text>
    <text x="0" y="200" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="11">GCD candidates</text>

    <!-- Visual: 1 arrow -->
    <line x1="-20" y1="230" x2="20" y2="230" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <text x="0" y="260" text-anchor="middle" fill="#bfdbfe" font-family="Arial" font-size="10">gcd(c±b, N)</text>

    <!-- Bar chart -->
    <rect x="-20" y="290" width="40" height="80" rx="4" fill="#3b82f6" opacity="0.6"/>
    <text x="0" y="385" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="10">Power: 1</text>
  </g>

  <!-- k=4 -->
  <g transform="translate(320,100)">
    <rect x="-90" y="0" width="180" height="400" rx="12" fill="url(#dim4)" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="18" font-weight="bold">k = 4</text>
    <text x="0" y="52" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="12">Quadruple</text>

    <text x="0" y="85" text-anchor="middle" fill="#ddd6fe" font-family="monospace" font-size="11">a²+b²+c² = d²</text>

    <rect x="-75" y="100" width="150" height="50" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
    <text x="0" y="120" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="11" font-weight="bold">1 Factorization:</text>
    <text x="0" y="140" text-anchor="middle" fill="#ddd6fe" font-family="monospace" font-size="10">(d−c)(d+c) = a²+b²</text>

    <text x="0" y="180" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="28" font-weight="bold">2</text>
    <text x="0" y="200" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="11">GCD candidates</text>

    <rect x="-20" y="290" width="40" height="80" rx="4" fill="#8b5cf6" opacity="0.6"/>
    <text x="0" y="385" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="10">Power: 1</text>
  </g>

  <!-- k=5 -->
  <g transform="translate(520,100)">
    <rect x="-90" y="0" width="180" height="400" rx="12" fill="url(#dim5)" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" fill="#f472b6" font-family="Arial" font-size="18" font-weight="bold">k = 5</text>
    <text x="0" y="52" text-anchor="middle" fill="#f9a8d4" font-family="Arial" font-size="12">Quintuple</text>

    <text x="0" y="85" text-anchor="middle" fill="#fce7f3" font-family="monospace" font-size="10">a²+b²+c²+d² = e²</text>

    <rect x="-75" y="100" width="150" height="65" rx="8" fill="#4a1942" stroke="#ec4899" stroke-width="1"/>
    <text x="0" y="118" text-anchor="middle" fill="#f9a8d4" font-family="Arial" font-size="11" font-weight="bold">4 Factorizations:</text>
    <text x="0" y="135" text-anchor="middle" fill="#fce7f3" font-family="monospace" font-size="9">(e−d)(e+d) = a²+b²+c²</text>
    <text x="0" y="150" text-anchor="middle" fill="#fce7f3" font-family="monospace" font-size="9">(e−c)(e+c), (e−b), (e−a)</text>

    <text x="0" y="190" text-anchor="middle" fill="#f472b6" font-family="Arial" font-size="28" font-weight="bold">8</text>
    <text x="0" y="210" text-anchor="middle" fill="#f9a8d4" font-family="Arial" font-size="11">GCD candidates</text>

    <rect x="-20" y="210" width="40" height="160" rx="4" fill="#ec4899" opacity="0.6"/>
    <text x="0" y="385" text-anchor="middle" fill="#f9a8d4" font-family="Arial" font-size="10">Power: 4×</text>
  </g>

  <!-- k=6 -->
  <g transform="translate(720,100)">
    <rect x="-90" y="0" width="180" height="400" rx="12" fill="url(#dim6)" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="18" font-weight="bold">k = 6</text>
    <text x="0" y="52" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="12">Sextuple</text>

    <text x="0" y="85" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="9">a²+b²+c²+d²+e² = f²</text>

    <rect x="-75" y="100" width="150" height="65" rx="8" fill="#4a3800" stroke="#f59e0b" stroke-width="1"/>
    <text x="0" y="118" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="11" font-weight="bold">5 Factorizations:</text>
    <text x="0" y="135" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="9">(f−e)(f+e) = a²+b²+c²+d²</text>
    <text x="0" y="150" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="9">+ 4 more independent</text>

    <text x="0" y="190" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="28" font-weight="bold">10</text>
    <text x="0" y="210" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="11">GCD candidates</text>

    <rect x="-20" y="170" width="40" height="200" rx="4" fill="#f59e0b" opacity="0.6"/>
    <text x="0" y="385" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="10">Power: 5×</text>
  </g>

  <!-- Arrows between dimensions -->
  <g>
    <line x1="210" y1="300" x2="230" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="410" y1="300" x2="430" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="610" y1="300" x2="630" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Bottom formula -->
  <g transform="translate(450,540)">
    <rect x="-280" y="-20" width="560" height="45" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#e5e7eb" font-family="Georgia, serif" font-size="14">
      General: k-tuple provides k−1 independent factorizations, 2(k−1) GCD candidates
    </text>
    <text x="0" y="20" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">
      Lean: general_factor_identity_k3, k4, k5, k6 — all formally verified ✓
    </text>
  </g>
</svg>
