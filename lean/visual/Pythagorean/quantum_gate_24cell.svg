<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <radialGradient id="sphere" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#2a5a8a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#4ecdc4" font-size="20" font-weight="bold">
    Hurwitz vs Lipschitz: The 24-Cell Advantage
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#6699aa" font-size="12">
    r₄(1) = 8 Lipschitz units vs r₄(2) = 24 Hurwitz units — 3× denser approximation
  </text>

  <!-- Left panel: Lipschitz (8 units) -->
  <text x="225" y="85" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">
    Lipschitz Units (ℤ⁴)
  </text>
  <text x="225" y="102" text-anchor="middle" fill="#cc8888" font-size="11">
    8 vertices: ±1, ±i, ±j, ±k
  </text>

  <!-- Projection of 4D cross-polytope to 2D -->
  <circle cx="225" cy="290" r="140" fill="url(#sphere)" stroke="#334466" stroke-width="1"/>

  <!-- 8 vertices of the cross-polytope (projected) -->
  <g filter="url(#glow2)">
    <!-- ±w axis (projected to x) -->
    <circle cx="365" cy="290" r="8" fill="#ff6b6b"/>
    <text x="380" y="295" fill="#ff9999" font-size="10">+1</text>
    <circle cx="85" cy="290" r="8" fill="#ff6b6b"/>
    <text x="55" y="295" fill="#ff9999" font-size="10">-1</text>

    <!-- ±x axis (projected to y) -->
    <circle cx="225" cy="150" r="8" fill="#ff6b6b"/>
    <text x="235" y="145" fill="#ff9999" font-size="10">+i</text>
    <circle cx="225" cy="430" r="8" fill="#ff6b6b"/>
    <text x="235" y="445" fill="#ff9999" font-size="10">-i</text>

    <!-- ±y axis (projected diagonally) -->
    <circle cx="320" cy="195" r="8" fill="#ff8888" opacity="0.7"/>
    <text x="330" y="190" fill="#ff9999" font-size="10">+j</text>
    <circle cx="130" cy="385" r="8" fill="#ff8888" opacity="0.7"/>
    <text x="100" y="395" fill="#ff9999" font-size="10">-j</text>

    <!-- ±z axis (projected diagonally) -->
    <circle cx="130" cy="195" r="8" fill="#ff8888" opacity="0.7"/>
    <text x="100" y="190" fill="#ff9999" font-size="10">+k</text>
    <circle cx="320" cy="385" r="8" fill="#ff8888" opacity="0.7"/>
    <text x="330" y="395" fill="#ff9999" font-size="10">-k</text>
  </g>

  <!-- Edges of the cross-polytope -->
  <line x1="365" y1="290" x2="225" y2="150" stroke="#ff6b6b" stroke-width="0.8" opacity="0.3"/>
  <line x1="365" y1="290" x2="225" y2="430" stroke="#ff6b6b" stroke-width="0.8" opacity="0.3"/>
  <line x1="85" y1="290" x2="225" y2="150" stroke="#ff6b6b" stroke-width="0.8" opacity="0.3"/>
  <line x1="85" y1="290" x2="225" y2="430" stroke="#ff6b6b" stroke-width="0.8" opacity="0.3"/>
  <line x1="365" y1="290" x2="320" y2="195" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>
  <line x1="365" y1="290" x2="130" y2="195" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>
  <line x1="85" y1="290" x2="320" y2="385" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>
  <line x1="85" y1="290" x2="130" y2="385" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>

  <!-- Right panel: Hurwitz (24 units = 24-cell) -->
  <text x="675" y="85" text-anchor="middle" fill="#a29bfe" font-size="16" font-weight="bold">
    Hurwitz Units (D₄)
  </text>
  <text x="675" y="102" text-anchor="middle" fill="#8888cc" font-size="11">
    24 vertices: ±1, ±i, ±j, ±k, (±½,±½,±½,±½)
  </text>

  <!-- Projection of 24-cell -->
  <circle cx="675" cy="290" r="140" fill="url(#sphere)" stroke="#445566" stroke-width="1"/>

  <!-- 8 cross-polytope vertices (same as Lipschitz) -->
  <g filter="url(#glow2)">
    <circle cx="815" cy="290" r="6" fill="#6c5ce7"/>
    <circle cx="535" cy="290" r="6" fill="#6c5ce7"/>
    <circle cx="675" cy="150" r="6" fill="#6c5ce7"/>
    <circle cx="675" cy="430" r="6" fill="#6c5ce7"/>
    <circle cx="770" cy="195" r="6" fill="#6c5ce7" opacity="0.7"/>
    <circle cx="580" cy="385" r="6" fill="#6c5ce7" opacity="0.7"/>
    <circle cx="580" cy="195" r="6" fill="#6c5ce7" opacity="0.7"/>
    <circle cx="770" cy="385" r="6" fill="#6c5ce7" opacity="0.7"/>

    <!-- 16 additional half-integer vertices -->
    <!-- (½,½,½,½) projected -->
    <circle cx="745" cy="220" r="5" fill="#a29bfe"/>
    <circle cx="605" cy="360" r="5" fill="#a29bfe"/>
    <circle cx="745" cy="360" r="5" fill="#a29bfe"/>
    <circle cx="605" cy="220" r="5" fill="#a29bfe"/>

    <circle cx="720" cy="185" r="5" fill="#a29bfe" opacity="0.8"/>
    <circle cx="630" cy="395" r="5" fill="#a29bfe" opacity="0.8"/>
    <circle cx="720" cy="395" r="5" fill="#a29bfe" opacity="0.8"/>
    <circle cx="630" cy="185" r="5" fill="#a29bfe" opacity="0.8"/>

    <circle cx="775" cy="250" r="5" fill="#a29bfe" opacity="0.7"/>
    <circle cx="575" cy="330" r="5" fill="#a29bfe" opacity="0.7"/>
    <circle cx="775" cy="330" r="5" fill="#a29bfe" opacity="0.7"/>
    <circle cx="575" cy="250" r="5" fill="#a29bfe" opacity="0.7"/>

    <circle cx="710" cy="170" r="5" fill="#a29bfe" opacity="0.6"/>
    <circle cx="640" cy="410" r="5" fill="#a29bfe" opacity="0.6"/>
    <circle cx="710" cy="410" r="5" fill="#a29bfe" opacity="0.6"/>
    <circle cx="640" cy="170" r="5" fill="#a29bfe" opacity="0.6"/>
  </g>

  <!-- Some 24-cell edges -->
  <g stroke="#a29bfe" stroke-width="0.5" opacity="0.2">
    <line x1="815" y1="290" x2="745" y2="220"/>
    <line x1="815" y1="290" x2="745" y2="360"/>
    <line x1="535" y1="290" x2="605" y2="220"/>
    <line x1="535" y1="290" x2="605" y2="360"/>
    <line x1="675" y1="150" x2="745" y2="220"/>
    <line x1="675" y1="150" x2="605" y2="220"/>
    <line x1="675" y1="430" x2="745" y2="360"/>
    <line x1="675" y1="430" x2="605" y2="360"/>
    <line x1="745" y1="220" x2="745" y2="360"/>
    <line x1="605" y1="220" x2="605" y2="360"/>
    <line x1="745" y1="220" x2="605" y2="220"/>
    <line x1="745" y1="360" x2="605" y2="360"/>
  </g>

  <!-- Comparison table -->
  <rect x="100" y="475" width="700" height="110" rx="10" fill="#0d2137" stroke="#4ecdc4" stroke-width="1"/>

  <text x="450" y="498" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">
    Comparison: Quantum Gate Approximation Density
  </text>

  <!-- Table headers -->
  <text x="200" y="520" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">Property</text>
  <text x="420" y="520" text-anchor="middle" fill="#ff9999" font-size="11" font-weight="bold">Lipschitz (ℤ⁴)</text>
  <text x="640" y="520" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Hurwitz (D₄)</text>

  <line x1="120" y1="525" x2="780" y2="525" stroke="#334" stroke-width="0.5"/>

  <text x="200" y="542" text-anchor="middle" fill="#aaa" font-size="10">Unit count</text>
  <text x="420" y="542" text-anchor="middle" fill="#ff8888" font-size="10">8</text>
  <text x="640" y="542" text-anchor="middle" fill="#a29bfe" font-size="10">24 (3×)</text>

  <text x="200" y="558" text-anchor="middle" fill="#aaa" font-size="10">Covering radius²</text>
  <text x="420" y="558" text-anchor="middle" fill="#ff8888" font-size="10">1.0</text>
  <text x="640" y="558" text-anchor="middle" fill="#a29bfe" font-size="10">0.25 (4× better)</text>

  <text x="200" y="574" text-anchor="middle" fill="#aaa" font-size="10">Descent depth</text>
  <text x="420" y="574" text-anchor="middle" fill="#ff8888" font-size="10">O(log₍₄/₃₎ d)</text>
  <text x="640" y="574" text-anchor="middle" fill="#a29bfe" font-size="10">O(log₂ d) — 2.4× shallower</text>

  <!-- Arrow between panels -->
  <text x="450" y="290" text-anchor="middle" fill="#4ecdc4" font-size="40">→</text>
  <text x="450" y="315" text-anchor="middle" fill="#4ecdc4" font-size="11">3× denser</text>
</svg>
