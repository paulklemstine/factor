<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b71c1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1b5e20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#37474f"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#fafafa" rx="10"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a237e">
    Q1: Complete Gate Synthesis Pipeline
  </text>
  
  <!-- Stage 1: Target -->
  <rect x="30" y="70" width="180" height="120" rx="10" fill="url(#grad1)" opacity="0.9"/>
  <text x="120" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Stage 1: Target</text>
  <text x="120" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#bbdefb">U ∈ SU(2)</text>
  <text x="120" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#bbdefb">→ quaternion t ∈ S³</text>
  <text x="120" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#bbdefb">|t|² = 1</text>
  
  <!-- Arrow 1→2 -->
  <line x1="210" y1="130" x2="240" y2="130" stroke="#37474f" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 2: Lattice CVP -->
  <rect x="245" y="70" width="180" height="120" rx="10" fill="url(#grad2)" opacity="0.9"/>
  <text x="335" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Stage 2: CVP</text>
  <text x="335" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffcdd2">Find closest q ∈ ℤ⁴</text>
  <text x="335" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffcdd2">with |q|² = d</text>
  <text x="335" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffcdd2">to √d · t</text>
  
  <!-- Arrow 2→3 -->
  <line x1="425" y1="130" x2="455" y2="130" stroke="#37474f" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: Descent -->
  <rect x="460" y="70" width="180" height="120" rx="10" fill="url(#grad3)" opacity="0.9"/>
  <text x="550" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Stage 3: Descent</text>
  <text x="550" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#c8e6c9">q = g₁ · g₂ · ... · gₖ</text>
  <text x="550" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#c8e6c9">k ≤ log_p(d) + 1</text>
  <text x="550" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#c8e6c9">Each |gᵢ|² = p</text>
  
  <!-- Arrow 3→4 -->
  <line x1="640" y1="130" x2="670" y2="130" stroke="#37474f" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Gates -->
  <rect x="675" y="70" width="190" height="120" rx="10" fill="url(#grad4)" opacity="0.9"/>
  <text x="770" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Stage 4: Gates</text>
  <text x="770" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff3e0">Map gᵢ → Gate_i</text>
  <text x="770" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff3e0">U ≈ G₁ · G₂ · ... · Gₖ</text>
  <text x="770" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff3e0">ε ~ 1/√d</text>
  
  <!-- Optimality box -->
  <rect x="100" y="230" width="700" height="80" rx="8" fill="none" stroke="#1a237e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="450" y="255" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a237e">
    Theorem: Gate count ≤ ⌊log_p(d)⌋ + 1 — Information-Theoretically Optimal
  </text>
  <text x="450" y="280" text-anchor="middle" font-family="Arial" font-size="13" fill="#455a64">
    Verified in Lean 4: pipeline_gate_count (machine-checked proof)
  </text>
  
  <!-- Gate set comparison table -->
  <rect x="100" y="340" width="700" height="140" rx="8" fill="#e8eaf6"/>
  <text x="450" y="365" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a237e">
    Gate Set Comparison at d = 100
  </text>
  
  <!-- Table headers -->
  <text x="200" y="395" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f" font-weight="bold">Gate Set</text>
  <text x="370" y="395" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f" font-weight="bold">Prime p</text>
  <text x="520" y="395" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f" font-weight="bold">log_p(100)</text>
  <text x="680" y="395" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f" font-weight="bold">Gates</text>
  <line x1="130" y1="402" x2="770" y2="402" stroke="#90a4ae" stroke-width="1"/>
  
  <!-- Row 1 -->
  <text x="200" y="422" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">Clifford+T</text>
  <text x="370" y="422" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">2</text>
  <text x="520" y="422" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">6</text>
  <text x="680" y="422" text-anchor="middle" font-family="monospace" font-size="12" fill="#b71c1c" font-weight="bold">7</text>
  
  <!-- Row 2 -->
  <text x="200" y="447" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">Clifford+V</text>
  <text x="370" y="447" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">5</text>
  <text x="520" y="447" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">2</text>
  <text x="680" y="447" text-anchor="middle" font-family="monospace" font-size="12" fill="#1b5e20" font-weight="bold">3</text>
  
  <!-- Row 3 -->
  <text x="200" y="472" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">Clifford+P₇</text>
  <text x="370" y="472" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">7</text>
  <text x="520" y="472" text-anchor="middle" font-family="monospace" font-size="12" fill="#37474f">2</text>
  <text x="680" y="472" text-anchor="middle" font-family="monospace" font-size="12" fill="#0d47a1" font-weight="bold">3</text>
</svg>
