<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sbg)"/>

  <text x="400" y="35" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">
    Cross-Dimensional Spectral Gap Analysis
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#888" font-size="12">
    γ_d = d − 2√(d−1) for Ramanujan graphs of degree d
  </text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="750" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="80" stroke="#555" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="90" y="420" text-anchor="end" fill="#aaa" font-size="11">0</text>
  <text x="90" y="340" text-anchor="end" fill="#aaa" font-size="11">1</text>
  <text x="90" y="260" text-anchor="end" fill="#aaa" font-size="11">2</text>
  <text x="90" y="180" text-anchor="end" fill="#aaa" font-size="11">3</text>
  <text x="90" y="100" text-anchor="end" fill="#aaa" font-size="11">4</text>

  <!-- Y gridlines -->
  <line x1="100" y1="340" x2="750" y2="340" stroke="#333" stroke-width="0.5"/>
  <line x1="100" y1="260" x2="750" y2="260" stroke="#333" stroke-width="0.5"/>
  <line x1="100" y1="180" x2="750" y2="180" stroke="#333" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="750" y2="100" stroke="#333" stroke-width="0.5"/>

  <!-- Y axis title -->
  <text x="30" y="250" text-anchor="middle" fill="#aaa" font-size="13" transform="rotate(-90, 30, 250)">
    Spectral Gap γ
  </text>

  <!-- X axis title -->
  <text x="425" y="465" text-anchor="middle" fill="#aaa" font-size="13">
    Graph Degree d
  </text>

  <!-- Data points: d=3 (tree), d=4 (near-reg tree), d=6 (Cayley), d=8 (4D Cayley), d=10, d=12 -->
  <!-- Scale: x maps d in [3,20] to [150, 700], y maps gap in [0,4] to [420,100] -->
  <!-- d=3: gap=3-2√2≈0.172 → y≈406 -->
  <circle cx="150" cy="406" r="8" fill="#00ddff" opacity="0.9"/>
  <text x="150" y="396" text-anchor="middle" fill="#00ddff" font-size="10">d=3</text>
  <text x="150" y="440" text-anchor="middle" fill="#aaa" font-size="9">0.17</text>

  <!-- d=4: gap=4-2√3≈0.536 → y≈377 -->
  <circle cx="212" cy="377" r="8" fill="#44aaff" opacity="0.9"/>
  <text x="212" y="367" text-anchor="middle" fill="#44aaff" font-size="10">d=4</text>
  <text x="212" y="440" text-anchor="middle" fill="#aaa" font-size="9">0.54</text>

  <!-- d=6: gap=6-2√5≈1.528 → y≈298 -->
  <circle cx="337" cy="298" r="10" fill="#ff44ff" opacity="0.9"/>
  <text x="337" y="285" text-anchor="middle" fill="#ff44ff" font-size="11" font-weight="bold">d=6 (3D Cayley)</text>
  <text x="337" y="440" text-anchor="middle" fill="#aaa" font-size="9">1.53</text>

  <!-- d=8: gap=8-2√7≈2.708 → y≈203 -->
  <circle cx="462" cy="203" r="10" fill="#44ff44" opacity="0.9"/>
  <text x="462" y="190" text-anchor="middle" fill="#44ff44" font-size="11" font-weight="bold">d=8 (4D Cayley)</text>
  <text x="462" y="440" text-anchor="middle" fill="#aaa" font-size="9">2.71</text>

  <!-- d=10: gap≈4.0 → y≈100 -->
  <circle cx="587" cy="117" r="7" fill="#ffaa00" opacity="0.7"/>
  <text x="587" y="107" text-anchor="middle" fill="#ffaa00" font-size="10">d=10</text>
  <text x="587" y="440" text-anchor="middle" fill="#aaa" font-size="9">3.76</text>

  <!-- d=14: gap≈6-2√13≈0.79... no, 14-2√13≈6.79 → y=... -->
  <circle cx="700" cy="80" r="7" fill="#ff6644" opacity="0.7"/>
  <text x="700" y="70" text-anchor="middle" fill="#ff6644" font-size="10">d=14</text>
  <text x="700" y="440" text-anchor="middle" fill="#aaa" font-size="9">6.79</text>

  <!-- Connecting curve -->
  <path d="M150,406 Q250,360 337,298 Q400,245 462,203 Q525,155 587,117 Q640,90 700,80"
        stroke="#ffd700" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6,3"/>

  <!-- Verified markers -->
  <rect x="120" y="470" width="12" height="12" fill="#0f0" rx="2"/>
  <text x="138" y="481" fill="#aaa" font-size="10">= Verified in Lean 4 (γ > 0)</text>
  <rect x="120" y="470" width="12" height="12" fill="none" stroke="#0f0" stroke-width="2" rx="2"/>

  <!-- Annotation boxes -->
  <rect x="520" y="300" width="230" height="85" rx="8" fill="#1a2a3e" stroke="#ffd700" stroke-width="1" opacity="0.9"/>
  <text x="635" y="320" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">Key Theorem (Verified)</text>
  <text x="530" y="340" fill="#ccc" font-size="11">γ₈ > γ₆ > γ₃ > 0</text>
  <text x="530" y="358" fill="#ccc" font-size="11">Higher dimensions →</text>
  <text x="530" y="376" fill="#ccc" font-size="11">larger spectral gaps</text>
</svg>
