<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">
    QDF Parity Classification
  </text>
  <text x="500" y="72" text-anchor="middle" fill="#90CAF9" font-size="14">
    Complete characterization of odd/even patterns in a² + b² + c² = d²
  </text>

  <!-- Theorem 1: Parity Propagation -->
  <rect x="50" y="100" width="420" height="200" rx="12" fill="#1b5e20" fill-opacity="0.3" stroke="#4CAF50" stroke-width="2"/>
  <text x="260" y="130" text-anchor="middle" fill="#66BB6A" font-size="18" font-weight="bold">Theorem: Parity Propagation</text>
  <text x="70" y="160" fill="#C8E6C9" font-size="14">If 2 | d, and a, b are both odd,</text>
  <text x="70" y="185" fill="#C8E6C9" font-size="14">then c must be even.</text>
  <text x="70" y="220" fill="#A5D6A7" font-size="13" font-style="italic">Proof sketch (mod 4):</text>
  <text x="70" y="245" fill="#81C784" font-size="13">  odd² ≡ 1 (mod 4)</text>
  <text x="70" y="265" fill="#81C784" font-size="13">  a²+b²+c² ≡ 1+1+c² (mod 4)</text>
  <text x="70" y="285" fill="#81C784" font-size="13">  d even ⟹ d² ≡ 0 (mod 4) ⟹ c² ≡ 2 ✗</text>

  <!-- Theorem 2: Three-Odd Constraint -->
  <rect x="530" y="100" width="420" height="200" rx="12" fill="#e65100" fill-opacity="0.2" stroke="#FF9800" stroke-width="2"/>
  <text x="740" y="130" text-anchor="middle" fill="#FFB74D" font-size="18" font-weight="bold">Theorem: Three-Odd Constraint</text>
  <text x="550" y="160" fill="#FFE0B2" font-size="14">If a, b, c are all odd,</text>
  <text x="550" y="185" fill="#FFE0B2" font-size="14">then d must be odd.</text>
  <text x="550" y="220" fill="#FFCC80" font-size="13" font-style="italic">Proof:</text>
  <text x="550" y="245" fill="#FFA726" font-size="13">  Contrapositive of parity propagation.</text>
  <text x="550" y="265" fill="#FFA726" font-size="13">  If d even, c must be even by Thm 1.</text>
  <text x="550" y="285" fill="#FFA726" font-size="13">  Contradicts c being odd.</text>

  <!-- Classification Table -->
  <rect x="50" y="330" width="900" height="340" rx="12" fill="#1a237e" fill-opacity="0.3" stroke="#5C6BC0" stroke-width="2"/>
  <text x="500" y="365" text-anchor="middle" fill="#9FA8DA" font-size="18" font-weight="bold">
    Complete Parity Pattern Table
  </text>

  <!-- Table header -->
  <text x="130" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">a</text>
  <text x="230" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">b</text>
  <text x="330" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">c</text>
  <text x="430" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">d</text>
  <text x="600" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">Valid?</text>
  <text x="800" y="400" text-anchor="middle" fill="#7986CB" font-size="14" font-weight="bold">Example</text>
  <line x1="70" y1="412" x2="930" y2="412" stroke="#5C6BC0" stroke-width="1" opacity="0.5"/>

  <!-- Row 1: E E E E -->
  <text x="130" y="435" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="230" y="435" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="330" y="435" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="430" y="435" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="600" y="435" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">✓</text>
  <text x="800" y="435" text-anchor="middle" fill="#B0BEC5" font-size="12">(2,4,4,6)</text>

  <!-- Row 2: O O E E -->
  <text x="130" y="465" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="230" y="465" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="330" y="465" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="430" y="465" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="600" y="465" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">✓ (forced by Thm 1)</text>
  <text x="800" y="465" text-anchor="middle" fill="#B0BEC5" font-size="12">(1,1,2,√6) ✗</text>

  <!-- Row 3: O E E O -->
  <text x="130" y="495" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="230" y="495" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="330" y="495" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="430" y="495" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="600" y="495" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">✓</text>
  <text x="800" y="495" text-anchor="middle" fill="#B0BEC5" font-size="12">(1,2,2,3)</text>

  <!-- Row 4: E E O O -->
  <text x="130" y="525" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="230" y="525" text-anchor="middle" fill="#E8EAF6" font-size="13">even</text>
  <text x="330" y="525" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="430" y="525" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="600" y="525" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">✓</text>
  <text x="800" y="525" text-anchor="middle" fill="#B0BEC5" font-size="12">(2,6,3,7)</text>

  <!-- Row 5: O O O O -->
  <text x="130" y="555" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="230" y="555" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="330" y="555" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="430" y="555" text-anchor="middle" fill="#E8EAF6" font-size="13">odd</text>
  <text x="600" y="555" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">✓ (d forced odd, Thm 2)</text>
  <text x="800" y="555" text-anchor="middle" fill="#B0BEC5" font-size="12">(1,1,1,√3) ✗</text>

  <!-- Row 6: O O O E - FORBIDDEN -->
  <text x="130" y="585" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="230" y="585" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="330" y="585" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="430" y="585" text-anchor="middle" fill="#EF9A9A" font-size="13">even</text>
  <text x="600" y="585" text-anchor="middle" fill="#EF5350" font-size="13" font-weight="bold">✗ FORBIDDEN (Thm 2)</text>
  <text x="800" y="585" text-anchor="middle" fill="#EF9A9A" font-size="12">impossible</text>

  <!-- Row 7: O O E E with d even and c forced -->
  <text x="130" y="615" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="230" y="615" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="330" y="615" text-anchor="middle" fill="#EF9A9A" font-size="13">odd</text>
  <text x="430" y="615" text-anchor="middle" fill="#EF9A9A" font-size="13">even</text>
  <text x="600" y="615" text-anchor="middle" fill="#EF5350" font-size="13" font-weight="bold">✗ FORBIDDEN (Thm 1)</text>
  <text x="800" y="615" text-anchor="middle" fill="#EF9A9A" font-size="12">impossible</text>

  <!-- Footer -->
  <text x="500" y="665" text-anchor="middle" fill="#78909C" font-size="12">
    All theorems formally verified in Lean 4 with Mathlib • File: Pythagorean__QDF_NewDirections.lean
  </text>
</svg>
