<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bgc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowc">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="url(#bgc)"/>

  <text x="500" y="40" text-anchor="middle" fill="#ffd700" font-family="Georgia" font-size="24" font-weight="bold" filter="url(#glowc)">
    Universal Chebyshev Trace Formula
  </text>
  <text x="500" y="65" text-anchor="middle" fill="#88aacc" font-family="Arial" font-size="14">
    For any M ∈ O(2,1;ℤ): tr(Mⁿ) = det(M)ⁿ + 2·Tₙ(c_M)
  </text>

  <!-- det = -1 section -->
  <rect x="30" y="90" width="460" height="280" rx="10" fill="#1a1a3a" stroke="#ff6666" stroke-width="2"/>
  <text x="260" y="120" text-anchor="middle" fill="#ff8888" font-family="Arial" font-size="18" font-weight="bold">
    det(M) = -1 → eigenvalue -1
  </text>
  <text x="260" y="148" text-anchor="middle" fill="#ffaaaa" font-family="Georgia" font-size="16" font-style="italic">
    tr(Mⁿ) = (-1)ⁿ + 2Tₙ(c)
  </text>

  <!-- B2 -->
  <rect x="50" y="165" width="420" height="55" rx="6" fill="#2a1a2a" stroke="#cc4444" stroke-width="1"/>
  <text x="60" y="188" fill="#ffcccc" font-family="monospace" font-size="13">B₂</text>
  <text x="120" y="185" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: -1, 3±2√2</text>
  <text x="120" y="203" fill="#88ddaa" font-family="monospace" font-size="11">c = 3    char: (λ+1)(λ²-6λ+1)</text>

  <!-- B1B2 -->
  <rect x="50" y="230" width="420" height="55" rx="6" fill="#2a1a2a" stroke="#cc4444" stroke-width="1"/>
  <text x="60" y="253" fill="#ffcccc" font-family="monospace" font-size="13">B₁B₂</text>
  <text x="120" y="250" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: -1, 9±4√5</text>
  <text x="120" y="268" fill="#88ddaa" font-family="monospace" font-size="11">c = 9    char: (λ+1)(λ²-18λ+1)</text>

  <!-- B2B3 -->
  <rect x="50" y="295" width="420" height="55" rx="6" fill="#2a1a2a" stroke="#cc4444" stroke-width="1"/>
  <text x="60" y="318" fill="#ffcccc" font-family="monospace" font-size="13">B₂B₃</text>
  <text x="120" y="315" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: -1, α, 1/α</text>
  <text x="120" y="333" fill="#88ddaa" font-family="monospace" font-size="11">c = 9    char: (λ+1)(λ²-18λ+1)</text>

  <!-- det = +1 section -->
  <rect x="510" y="90" width="460" height="280" rx="10" fill="#1a1a3a" stroke="#6666ff" stroke-width="2"/>
  <text x="740" y="120" text-anchor="middle" fill="#8888ff" font-family="Arial" font-size="18" font-weight="bold">
    det(M) = +1 → eigenvalue +1
  </text>
  <text x="740" y="148" text-anchor="middle" fill="#aaaaff" font-family="Georgia" font-size="16" font-style="italic">
    tr(Mⁿ) = 1 + 2Tₙ(c)
  </text>

  <!-- B1B3 -->
  <rect x="530" y="165" width="420" height="55" rx="6" fill="#1a1a2a" stroke="#4444cc" stroke-width="1"/>
  <text x="540" y="188" fill="#ccccff" font-family="monospace" font-size="13">B₁B₃</text>
  <text x="600" y="185" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: +1, 7±4√3</text>
  <text x="600" y="203" fill="#88ddaa" font-family="monospace" font-size="11">c = 7    char: (λ-1)(λ²-14λ+1)</text>

  <!-- B1 -->
  <rect x="530" y="230" width="420" height="55" rx="6" fill="#1a1a2a" stroke="#4444cc" stroke-width="1"/>
  <text x="540" y="253" fill="#ccccff" font-family="monospace" font-size="13">B₁</text>
  <text x="600" y="250" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: +1, +1, +1</text>
  <text x="600" y="268" fill="#88ddaa" font-family="monospace" font-size="11">c = 1    parabolic (unipotent)</text>

  <!-- B3 -->
  <rect x="530" y="295" width="420" height="55" rx="6" fill="#1a1a2a" stroke="#4444cc" stroke-width="1"/>
  <text x="540" y="318" fill="#ccccff" font-family="monospace" font-size="13">B₃</text>
  <text x="600" y="315" fill="#aaaacc" font-family="monospace" font-size="11">eigenvalues: +1, +1, +1</text>
  <text x="600" y="333" fill="#88ddaa" font-family="monospace" font-size="11">c = 1    parabolic (unipotent)</text>

  <!-- Trace verification table -->
  <rect x="30" y="395" width="940" height="280" rx="10" fill="#0d0d2d" stroke="#ffd700" stroke-width="2"/>
  <text x="500" y="425" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="18" font-weight="bold">
    Machine-Verified Trace Sequences
  </text>

  <!-- B2 traces -->
  <text x="60" y="460" fill="#ff8888" font-family="monospace" font-size="13" font-weight="bold">B₂ traces (c=3):</text>
  <text x="60" y="480" fill="#aaccee" font-family="monospace" font-size="12">
    n: 0    1    2     3      4       5        6
  </text>
  <text x="60" y="498" fill="#ccddff" font-family="monospace" font-size="12">
    tr: 3    5    35    197    1155    6725     39203
  </text>
  <text x="60" y="516" fill="#88ddaa" font-family="monospace" font-size="12">
    Tₙ: 1    3    17    99     577     3363     19601
  </text>

  <!-- B1B2 traces -->
  <text x="60" y="550" fill="#ff8888" font-family="monospace" font-size="13" font-weight="bold">B₁B₂ traces (c=9):</text>
  <text x="60" y="570" fill="#aaccee" font-family="monospace" font-size="12">
    n: 0    1     2      3
  </text>
  <text x="60" y="588" fill="#ccddff" font-family="monospace" font-size="12">
    tr: 3    17    323    5777
  </text>
  <text x="60" y="606" fill="#88ddaa" font-family="monospace" font-size="12">
    Tₙ: 1    9     161    2889
  </text>

  <!-- B1B3 traces -->
  <text x="530" y="550" fill="#8888ff" font-family="monospace" font-size="13" font-weight="bold">B₁B₃ traces (c=7):</text>
  <text x="530" y="570" fill="#aaccee" font-family="monospace" font-size="12">
    n: 0    1     2      3
  </text>
  <text x="530" y="588" fill="#ccddff" font-family="monospace" font-size="12">
    tr: 3    15    195    2703
  </text>
  <text x="530" y="606" fill="#88ddaa" font-family="monospace" font-size="12">
    Tₙ: 1    7     97     1351
  </text>

  <!-- Pell connection -->
  <text x="530" y="460" fill="#ffdd88" font-family="monospace" font-size="13" font-weight="bold">Pell Connection (c=3):</text>
  <text x="530" y="480" fill="#eeddaa" font-family="monospace" font-size="12">
    Tₙ(3)² - 2·yₙ² = 1
  </text>
  <text x="530" y="498" fill="#eeddaa" font-family="monospace" font-size="12">
    3²-2·2²=1  17²-2·12²=1
  </text>
  <text x="530" y="516" fill="#eeddaa" font-family="monospace" font-size="12">
    99²-2·70²=1  577²-2·408²=1
  </text>

  <!-- Footer -->
  <text x="500" y="660" text-anchor="middle" fill="#88aacc" font-family="Arial" font-size="12">
    All formulas machine-verified in Lean 4 via native_decide + omega + nlinarith
  </text>
</svg>
