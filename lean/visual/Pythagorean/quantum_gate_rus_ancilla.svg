<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#37474f"/>
    </marker>
  </defs>
  
  <rect width="900" height="480" fill="#fafafa" rx="10"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#b71c1c">
    Q3: Ancilla-Assisted Repeat-Until-Success Synthesis
  </text>
  
  <!-- Quantum circuit diagram -->
  <rect x="30" y="55" width="420" height="210" rx="8" fill="white" stroke="#90a4ae" stroke-width="1"/>
  <text x="240" y="80" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#37474f">RUS Circuit</text>
  
  <!-- Data qubit line -->
  <text x="50" y="120" font-family="monospace" font-size="12" fill="#37474f">|ψ⟩</text>
  <line x1="80" y1="117" x2="420" y2="117" stroke="#37474f" stroke-width="2"/>
  
  <!-- Ancilla qubit line -->
  <text x="50" y="180" font-family="monospace" font-size="12" fill="#37474f">|0⟩</text>
  <line x1="80" y1="177" x2="350" y2="177" stroke="#37474f" stroke-width="2"/>
  
  <!-- T gate on ancilla -->
  <rect x="120" y="162" width="30" height="30" fill="#e53935" rx="3"/>
  <text x="135" y="182" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">T</text>
  
  <!-- CNOT -->
  <circle cx="200" cy="117" r="8" fill="none" stroke="#1a237e" stroke-width="2"/>
  <line x1="192" y1="117" x2="208" y2="117" stroke="#1a237e" stroke-width="2"/>
  <line x1="200" y1="109" x2="200" y2="125" stroke="#1a237e" stroke-width="2"/>
  <line x1="200" y1="125" x2="200" y2="177" stroke="#1a237e" stroke-width="2"/>
  <circle cx="200" cy="177" r="5" fill="#1a237e"/>
  
  <!-- H gate -->
  <rect x="250" y="162" width="30" height="30" fill="#1565c0" rx="3"/>
  <text x="265" y="182" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">H</text>
  
  <!-- Measurement -->
  <rect x="310" y="162" width="35" height="30" fill="#f5f5f5" stroke="#37474f" stroke-width="1.5" rx="3"/>
  <path d="M 315 187 Q 327 172 340 187" fill="none" stroke="#37474f" stroke-width="1.5"/>
  <line x1="327" y1="177" x2="335" y2="167" stroke="#37474f" stroke-width="1.5"/>
  
  <!-- Classical wire -->
  <line x1="345" y1="177" x2="390" y2="177" stroke="#37474f" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Success/Fail -->
  <text x="395" y="165" font-family="Arial" font-size="11" fill="#1b5e20" font-weight="bold">✓ Success</text>
  <text x="395" y="195" font-family="Arial" font-size="11" fill="#b71c1c" font-weight="bold">✗ Retry</text>
  
  <!-- Output -->
  <text x="430" y="120" font-family="monospace" font-size="12" fill="#1b5e20">R|ψ⟩</text>
  
  <!-- Retry loop arrow -->
  <path d="M 400 200 C 400 240 80 240 80 200 L 80 177" fill="none" stroke="#b71c1c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="240" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">retry on failure</text>
  
  <!-- Comparison table -->
  <rect x="480" y="55" width="390" height="210" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="675" y="80" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a237e">
    Deterministic vs RUS Comparison
  </text>
  
  <!-- Table -->
  <text x="520" y="110" font-family="monospace" font-size="11" fill="#37474f" font-weight="bold">Method</text>
  <text x="640" y="110" font-family="monospace" font-size="11" fill="#37474f" font-weight="bold">T-count</text>
  <text x="720" y="110" font-family="monospace" font-size="11" fill="#37474f" font-weight="bold">Prob</text>
  <text x="800" y="110" font-family="monospace" font-size="11" fill="#37474f" font-weight="bold">E[T]</text>
  <line x1="500" y1="118" x2="850" y2="118" stroke="#90a4ae"/>
  
  <text x="520" y="140" font-family="monospace" font-size="11" fill="#37474f">Deterministic</text>
  <text x="660" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#b71c1c">4</text>
  <text x="730" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#37474f">1.00</text>
  <text x="810" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#b71c1c" font-weight="bold">4.00</text>
  
  <text x="520" y="165" font-family="monospace" font-size="11" fill="#37474f">RUS (p=½)</text>
  <text x="660" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">1</text>
  <text x="730" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#37474f">0.50</text>
  <text x="810" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20" font-weight="bold">2.00</text>
  
  <text x="520" y="190" font-family="monospace" font-size="11" fill="#37474f">RUS (p=⅓)</text>
  <text x="660" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">1</text>
  <text x="730" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#37474f">0.33</text>
  <text x="810" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#e65100" font-weight="bold">3.00</text>
  
  <text x="520" y="215" font-family="monospace" font-size="11" fill="#37474f">RUS (p=⅔)</text>
  <text x="660" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">2</text>
  <text x="730" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#37474f">0.67</text>
  <text x="810" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20" font-weight="bold">3.00</text>
  
  <text x="675" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#1b5e20" font-weight="bold">
    Up to 2× T-count reduction!
  </text>
  
  <!-- Physical qubit savings -->
  <rect x="30" y="290" width="840" height="170" rx="8" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="450" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1b5e20">
    Impact: Physical Qubit Savings from Ancilla-Assisted Synthesis
  </text>
  
  <!-- Before bar -->
  <text x="90" y="345" font-family="Arial" font-size="12" fill="#37474f">Without RUS:</text>
  <rect x="200" y="330" width="600" height="25" fill="#ef5350" rx="4" opacity="0.8"/>
  <text x="500" y="348" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">
    1000 qubits → 800 for magic state distillation (80%)
  </text>
  
  <!-- After bar -->
  <text x="90" y="385" font-family="Arial" font-size="12" fill="#37474f">With RUS:</text>
  <rect x="200" y="370" width="360" height="25" fill="#66bb6a" rx="4" opacity="0.8"/>
  <text x="380" y="388" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">
    600 qubits → 320 for distillation (53%)
  </text>
  
  <text x="450" y="430" text-anchor="middle" font-family="Arial" font-size="14" fill="#1b5e20" font-weight="bold">
    → 40% fewer physical qubits for fault-tolerant quantum computing
  </text>
  
  <text x="450" y="450" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">
    Formally verified: rus_cliffordT_reduction, expected_trials_bound ✓
  </text>
</svg>
