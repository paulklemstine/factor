<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <radialGradient id="sphere" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#334;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#112;stop-opacity:0.8"/>
    </radialGradient>
  </defs>

  <rect width="900" height="650" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" font-family="Georgia">
    Representation Geometry on the d-Sphere
  </text>

  <!-- Left panel: Sphere with lattice points -->
  <text x="225" y="70" text-anchor="middle" fill="#aaa" font-size="14">
    Lattice Points on S²(d) for d = 15
  </text>

  <!-- Sphere outline -->
  <ellipse cx="225" cy="250" rx="150" ry="150" fill="url(#sphere)" stroke="#446" stroke-width="1.5"/>
  <!-- Equator -->
  <ellipse cx="225" cy="250" rx="150" ry="40" fill="none" stroke="#335" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- Lattice points -->
  <!-- Q1: (0,9,12,15) → normalized direction -->
  <circle cx="175" cy="140" r="6" fill="#ff6b6b" stroke="#fff" stroke-width="1"/>
  <text x="155" y="130" fill="#ff6b6b" font-size="10">(0,9,12)</text>

  <!-- Q2: (2,5,14,15) -->
  <circle cx="310" cy="170" r="6" fill="#48dbfb" stroke="#fff" stroke-width="1"/>
  <text x="320" y="165" fill="#48dbfb" font-size="10">(2,5,14)</text>

  <!-- Q3: (2,10,11,15) -->
  <circle cx="280" cy="290" r="6" fill="#feca57" stroke="#fff" stroke-width="1"/>
  <text x="290" y="305" fill="#feca57" font-size="10">(2,10,11)</text>

  <!-- Q4: (5,10,10,15) -->
  <circle cx="140" cy="300" r="6" fill="#a29bfe" stroke="#fff" stroke-width="1"/>
  <text x="85" y="315" fill="#a29bfe" font-size="10">(5,10,10)</text>

  <!-- Distance lines -->
  <line x1="175" y1="140" x2="310" y2="170" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="310" y1="170" x2="280" y2="290" stroke="#48dbfb" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="280" y1="290" x2="140" y2="300" stroke="#feca57" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="175" y1="140" x2="140" y2="300" stroke="#a29bfe" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- No balanced line (body diagonal) -->
  <line x1="120" y1="350" x2="330" y2="150" stroke="#f55" stroke-width="1" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="330" y="145" fill="#f55" font-size="9">a=b=c line (forbidden!)</text>

  <!-- Right panel: Channel cascade diagram -->
  <text x="650" y="70" text-anchor="middle" fill="#aaa" font-size="14">
    GCD Cascade Flow
  </text>

  <!-- Representation boxes -->
  <rect x="520" y="90" width="120" height="40" rx="6" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="580" y="115" text-anchor="middle" fill="#ff6b6b" font-size="12">Rep 1: (a₁,b₁,c₁)</text>

  <rect x="670" y="90" width="120" height="40" rx="6" fill="#1a1a2a" stroke="#48dbfb" stroke-width="1.5"/>
  <text x="730" y="115" text-anchor="middle" fill="#48dbfb" font-size="12">Rep 2: (a₂,b₂,c₂)</text>

  <!-- Channel extraction -->
  <line x1="580" y1="130" x2="580" y2="160" stroke="#ff6b6b" stroke-width="1.5"/>
  <line x1="730" y1="130" x2="730" y2="160" stroke="#48dbfb" stroke-width="1.5"/>

  <rect x="510" y="160" width="140" height="35" rx="5" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <text x="580" y="182" text-anchor="middle" fill="#ccc" font-size="11" font-family="monospace">d−c₁, d+c₁</text>

  <rect x="660" y="160" width="140" height="35" rx="5" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <text x="730" y="182" text-anchor="middle" fill="#ccc" font-size="11" font-family="monospace">d−c₂, d+c₂</text>

  <!-- GCD computation -->
  <line x1="580" y1="195" x2="655" y2="225" stroke="#6d6" stroke-width="1.5"/>
  <line x1="730" y1="195" x2="655" y2="225" stroke="#6d6" stroke-width="1.5"/>

  <rect x="590" y="220" width="130" height="40" rx="6" fill="#1a2a1a" stroke="#4a4" stroke-width="2"/>
  <text x="655" y="238" text-anchor="middle" fill="#6d6" font-size="11" font-weight="bold">GCD</text>
  <text x="655" y="252" text-anchor="middle" fill="#aaa" font-size="10" font-family="monospace">g | (c₂−c₁)</text>

  <!-- Cascade arrow -->
  <line x1="655" y1="260" x2="655" y2="290" stroke="#6d6" stroke-width="1.5"/>
  <polygon points="655,295 650,285 660,285" fill="#6d6"/>

  <!-- Factor test -->
  <rect x="580" y="295" width="150" height="40" rx="6" fill="#2a2a1a" stroke="#feca57" stroke-width="2"/>
  <text x="655" y="313" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">gcd(g, d)</text>
  <text x="655" y="328" text-anchor="middle" fill="#aaa" font-size="10">Factor test</text>

  <!-- Result -->
  <line x1="655" y1="335" x2="655" y2="365" stroke="#feca57" stroke-width="1.5"/>
  <polygon points="655,370 650,360 660,360" fill="#feca57"/>

  <rect x="575" y="370" width="160" height="35" rx="6" fill="#1a3a1a" stroke="#6f6" stroke-width="2"/>
  <text x="655" y="393" text-anchor="middle" fill="#6f6" font-size="13" font-weight="bold">Factor of d found!</text>

  <!-- Bottom: Key identities -->
  <rect x="50" y="430" width="800" height="200" rx="10" fill="#0d0d2a" stroke="#444" stroke-width="1"/>

  <text x="450" y="460" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Verified Geometric Identities</text>

  <!-- Distance identity -->
  <text x="80" y="490" fill="#ff6b6b" font-size="13" font-weight="bold">Distance Identity:</text>
  <text x="80" y="510" fill="#ccc" font-size="12" font-family="monospace">‖v₁−v₂‖² = 2d² − 2⟨v₁,v₂⟩</text>

  <!-- Cauchy-Schwarz -->
  <text x="80" y="540" fill="#48dbfb" font-size="13" font-weight="bold">Cauchy-Schwarz:</text>
  <text x="80" y="560" fill="#ccc" font-size="12" font-family="monospace">⟨v₁,v₂⟩² ≤ d⁴</text>

  <!-- Antipodal -->
  <text x="80" y="590" fill="#feca57" font-size="13" font-weight="bold">Antipodal Maximum:</text>
  <text x="80" y="610" fill="#ccc" font-size="12" font-family="monospace">max dist² = 4d² (when v₂ = −v₁)</text>

  <!-- Channel product -->
  <text x="480" y="490" fill="#a29bfe" font-size="13" font-weight="bold">Channel Product (Brahmagupta):</text>
  <text x="480" y="510" fill="#ccc" font-size="12" font-family="monospace">(a²+b²)(a²+c²) = a²d² + b²c²</text>

  <!-- Full product -->
  <text x="480" y="540" fill="#6d6" font-size="13" font-weight="bold">Full Channel Product:</text>
  <text x="480" y="560" fill="#ccc" font-size="12" font-family="monospace">∏(d±xᵢ) = (b²+c²)(a²+c²)(a²+b²)</text>

  <!-- Channel sum -->
  <text x="480" y="590" fill="#f9ca24" font-size="13" font-weight="bold">General Channel Sum (n dims):</text>
  <text x="480" y="610" fill="#ccc" font-size="12" font-family="monospace">Σ pair-channels = (n−1)·y²</text>
</svg>
