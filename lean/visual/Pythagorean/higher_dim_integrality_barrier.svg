<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#ecf0f1" font-size="22" font-weight="bold">
    The Integrality Trichotomy: (k−2) | 4
  </text>
  <text x="500" y="65" text-anchor="middle" fill="#bdc3c7" font-size="14">
    All-ones descent works on the null cone ⟺ k ∈ {3, 4, 6}
  </text>

  <!-- Formula bar -->
  <rect x="200" y="80" width="600" height="45" rx="8" fill="rgba(255,255,255,0.08)" stroke="#7f8c8d" stroke-width="1"/>
  <text x="500" y="100" text-anchor="middle" fill="#f1c40f" font-size="14" font-family="monospace">
    R_s(v)_i = v_i − 2·η(s,v)/(k−2)     η always even on null cone → need (k−2) | 4
  </text>

  <!-- Dimension boxes -->
  <!-- k=3 -->
  <rect x="30" y="145" width="150" height="200" rx="12" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="2"/>
  <text x="105" y="175" text-anchor="middle" fill="#2ecc71" font-size="20" font-weight="bold">k = 3</text>
  <text x="105" y="198" text-anchor="middle" fill="#ecf0f1" font-size="12">Triples</text>
  <text x="105" y="218" text-anchor="middle" fill="#ecf0f1" font-size="12">a²+b²=c²</text>
  <text x="105" y="245" text-anchor="middle" fill="#bdc3c7" font-size="14">k−2 = 1</text>
  <text x="105" y="270" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">1 | 4 ✓</text>
  <text x="105" y="295" text-anchor="middle" fill="#ecf0f1" font-size="11">Berggren tree</text>
  <text x="105" y="315" text-anchor="middle" fill="#bdc3c7" font-size="10">Root: (3,4,5)</text>
  <text x="105" y="335" text-anchor="middle" fill="#bdc3c7" font-size="10">Ternary branching</text>

  <!-- k=4 -->
  <rect x="210" y="145" width="150" height="200" rx="12" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="2"/>
  <text x="285" y="175" text-anchor="middle" fill="#2ecc71" font-size="20" font-weight="bold">k = 4</text>
  <text x="285" y="198" text-anchor="middle" fill="#ecf0f1" font-size="12">Quadruples</text>
  <text x="285" y="218" text-anchor="middle" fill="#ecf0f1" font-size="12">a²+b²+c²=d²</text>
  <text x="285" y="245" text-anchor="middle" fill="#bdc3c7" font-size="14">k−2 = 2</text>
  <text x="285" y="270" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">2 | 4 ✓</text>
  <text x="285" y="295" text-anchor="middle" fill="#ecf0f1" font-size="11">Quadruple tree</text>
  <text x="285" y="315" text-anchor="middle" fill="#bdc3c7" font-size="10">Root: (0,0,1,1)</text>
  <text x="285" y="335" text-anchor="middle" fill="#bdc3c7" font-size="10">Variable branching</text>

  <!-- k=5 FAILS -->
  <rect x="390" y="145" width="150" height="200" rx="12" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2"/>
  <text x="465" y="175" text-anchor="middle" fill="#e74c3c" font-size="20" font-weight="bold">k = 5</text>
  <text x="465" y="198" text-anchor="middle" fill="#ecf0f1" font-size="12">Quintuples</text>
  <text x="465" y="218" text-anchor="middle" fill="#ecf0f1" font-size="11">a²+b²+c²+e²=d²</text>
  <text x="465" y="245" text-anchor="middle" fill="#bdc3c7" font-size="14">k−2 = 3</text>
  <text x="465" y="270" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">3 ∤ 4 ✗</text>
  <text x="465" y="295" text-anchor="middle" fill="#e74c3c" font-size="11">FAILS</text>
  <text x="465" y="315" text-anchor="middle" fill="#bdc3c7" font-size="10">(1,1,1,1,2) → ℚ</text>
  <text x="465" y="335" text-anchor="middle" fill="#bdc3c7" font-size="10">Entries = −1/3</text>

  <!-- k=6 WORKS! -->
  <rect x="570" y="145" width="150" height="200" rx="12" fill="rgba(52,152,219,0.2)" stroke="#3498db" stroke-width="2.5"/>
  <text x="645" y="175" text-anchor="middle" fill="#3498db" font-size="20" font-weight="bold">k = 6</text>
  <text x="645" y="198" text-anchor="middle" fill="#ecf0f1" font-size="12">Sextuples</text>
  <text x="645" y="218" text-anchor="middle" fill="#ecf0f1" font-size="10">a₁²+a₂²+a₃²+a₄²+a₅²=a₆²</text>
  <text x="645" y="245" text-anchor="middle" fill="#bdc3c7" font-size="14">k−2 = 4</text>
  <text x="645" y="270" text-anchor="middle" fill="#3498db" font-size="15" font-weight="bold">4 | 4 ✓</text>
  <text x="645" y="295" text-anchor="middle" fill="#3498db" font-size="11">NEW: Sextuple tree!</text>
  <text x="645" y="315" text-anchor="middle" fill="#bdc3c7" font-size="10">Root: (0,0,0,0,1,1)</text>
  <text x="645" y="335" text-anchor="middle" fill="#f39c12" font-size="10">η even → 4|2η ✓</text>

  <!-- k≥7 -->
  <rect x="750" y="145" width="220" height="200" rx="12" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2"/>
  <text x="860" y="175" text-anchor="middle" fill="#e74c3c" font-size="20" font-weight="bold">k ≥ 7</text>
  <text x="860" y="198" text-anchor="middle" fill="#ecf0f1" font-size="12">Higher k-tuples</text>
  <text x="860" y="245" text-anchor="middle" fill="#bdc3c7" font-size="14">k−2 ≥ 5</text>
  <text x="860" y="270" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">(k−2) ∤ 4 ✗</text>
  <text x="860" y="295" text-anchor="middle" fill="#e74c3c" font-size="11">Always fails</text>
  <text x="860" y="315" text-anchor="middle" fill="#bdc3c7" font-size="10">5 ∤ 4, 6 ∤ 4, ...</text>
  <text x="860" y="335" text-anchor="middle" fill="#bdc3c7" font-size="10">Different methods needed</text>

  <!-- Explanation bar -->
  <rect x="50" y="370" width="900" height="80" rx="10" fill="rgba(241,196,15,0.1)" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="500" y="395" text-anchor="middle" fill="#f1c40f" font-size="15" font-weight="bold">
    The Two-Level Argument
  </text>
  <text x="500" y="418" text-anchor="middle" fill="#ecf0f1" font-size="13">
    Level 1: Reflection divides by (k−2).  Level 2: On null cone, η is always even (x² ≡ x mod 2).
  </text>
  <text x="500" y="438" text-anchor="middle" fill="#bdc3c7" font-size="13">
    Combined: need (k−2) | 2·(2m) = 4m for all m ∈ ℤ, i.e., (k−2) | 4 ⟹ k ∈ {3, 4, 6}
  </text>

  <!-- Counterexample box -->
  <rect x="50" y="470" width="420" height="80" rx="10" fill="rgba(231,76,60,0.1)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="260" y="495" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">
    k = 5 Counterexample
  </text>
  <text x="260" y="515" text-anchor="middle" fill="#ecf0f1" font-size="12">
    v = (1,1,1,1,2): 1²+1²+1²+1² = 2²
  </text>
  <text x="260" y="535" text-anchor="middle" fill="#f39c12" font-size="12" font-family="monospace">
    R(v) = (−1/3, −1/3, −1/3, −1/3, 2/3) ∉ ℤ⁵
  </text>

  <!-- k=6 discovery box -->
  <rect x="530" y="470" width="420" height="80" rx="10" fill="rgba(52,152,219,0.1)" stroke="#3498db" stroke-width="1.5"/>
  <text x="740" y="495" text-anchor="middle" fill="#3498db" font-size="14" font-weight="bold">
    k = 6 Discovery
  </text>
  <text x="740" y="515" text-anchor="middle" fill="#ecf0f1" font-size="12">
    v = (0,1,1,1,1,2): η = 2 (even!), coeff = 4/4 = 1
  </text>
  <text x="740" y="535" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="monospace">
    R(v) = (−1, 0, 0, 0, 0, 1) ∈ ℤ⁶ → Root!
  </text>

  <!-- Bottom banner -->
  <rect x="150" y="570" width="700" height="55" rx="10" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="500" y="593" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">
    Theorem: All-ones descent works ⟺ k ∈ {3, 4, 6}
  </text>
  <text x="500" y="615" text-anchor="middle" fill="#bdc3c7" font-size="12">
    The divisors of 4, shifted by 2 · Formalized in Lean 4 · Zero sorry statements
  </text>
</svg>
