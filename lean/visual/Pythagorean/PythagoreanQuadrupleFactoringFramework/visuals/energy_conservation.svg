<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="kinetic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="potential" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Energy Conservation in Arithmetic Spacetime
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#8b949e" font-size="14">
    K(q) = Φ(q)²  —  Kinetic energy equals gravitational potential squared
  </text>

  <!-- Conservation equation -->
  <rect x="200" y="85" width="500" height="60" rx="12" fill="#21262d" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="120" text-anchor="middle" fill="#fff" font-size="22">
    <tspan fill="#f97316">a²</tspan> + <tspan fill="#f97316">b²</tspan> + <tspan fill="#f97316">c²</tspan>
    <tspan fill="#8b949e"> = </tspan>
    <tspan fill="#3b82f6">d²</tspan>
  </text>

  <!-- Kinetic energy bar -->
  <text x="100" y="195" text-anchor="middle" fill="#f97316" font-size="16" font-weight="bold">Kinetic Energy</text>
  <text x="100" y="215" text-anchor="middle" fill="#8b949e" font-size="12">K = a² + b² + c²</text>

  <!-- Example: (3, 4, 12, 13) -->
  <text x="450" y="195" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">
    Example: (3, 4, 12, 13)
  </text>

  <!-- a² component -->
  <rect x="50" y="230" width="27" height="30" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="63" y="250" text-anchor="middle" fill="#fff" font-size="10">9</text>

  <!-- b² component -->
  <rect x="85" y="230" width="48" height="30" rx="3" fill="#f97316" opacity="0.8"/>
  <text x="109" y="250" text-anchor="middle" fill="#fff" font-size="10">16</text>

  <!-- c² component -->
  <rect x="141" y="230" width="432" height="30" rx="3" fill="#fb923c" opacity="0.8"/>
  <text x="357" y="250" text-anchor="middle" fill="#fff" font-size="11">144</text>

  <text x="600" y="250" fill="#f97316" font-size="14">← K = 9 + 16 + 144 = 169</text>

  <!-- Potential energy bar -->
  <text x="100" y="300" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="bold">Potential Energy</text>
  <text x="100" y="320" text-anchor="middle" fill="#8b949e" font-size="12">Φ² = d²</text>

  <rect x="50" y="335" width="507" height="30" rx="3" fill="url(#potential)" opacity="0.8"/>
  <text x="303" y="355" text-anchor="middle" fill="#fff" font-size="11">169</text>

  <text x="600" y="355" fill="#3b82f6" font-size="14">← Φ² = 13² = 169</text>

  <!-- Equals sign -->
  <text x="35" y="310" fill="#7bed9f" font-size="30" font-weight="bold">=</text>

  <!-- Binding energies -->
  <text x="450" y="410" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">
    Binding Energies: d² − aᵢ²
  </text>

  <!-- Three binding energy blocks -->
  <rect x="80" y="430" width="200" height="50" rx="8" fill="#21262d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="180" y="450" text-anchor="middle" fill="#ef4444" font-size="13">d² − a² = 160</text>
  <text x="180" y="468" text-anchor="middle" fill="#8b949e" font-size="11">(13−3)(13+3) = 10×16</text>

  <rect x="300" y="430" width="200" height="50" rx="8" fill="#21262d" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="450" text-anchor="middle" fill="#f97316" font-size="13">d² − b² = 153</text>
  <text x="400" y="468" text-anchor="middle" fill="#8b949e" font-size="11">(13−4)(13+4) = 9×17</text>

  <rect x="520" y="430" width="200" height="50" rx="8" fill="#21262d" stroke="#fb923c" stroke-width="1.5"/>
  <text x="620" y="450" text-anchor="middle" fill="#fb923c" font-size="13">d² − c² = 25</text>
  <text x="620" y="468" text-anchor="middle" fill="#8b949e" font-size="11">(13−12)(13+12) = 1×25</text>

  <!-- Sum -->
  <text x="450" y="510" text-anchor="middle" fill="#7bed9f" font-size="15" font-weight="bold">
    Sum: 160 + 153 + 25 = 338 = 2 × 169 = 2d²  ✓
  </text>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" fill="#484f58" font-size="11">
    Formally verified: binding_energy_sum, energy_conservation, binding_energy_factored
  </text>
</svg>
