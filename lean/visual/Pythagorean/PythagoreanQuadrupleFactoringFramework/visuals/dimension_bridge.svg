<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="450" fill="url(#bg6)"/>

  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">
    The Quadruple → Quintuple → E₈ Bridge
  </text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">
    Products of sums of 3 squares "leak" into higher dimensions — connecting factoring structures
  </text>

  <!-- Dimension boxes -->
  <!-- k=2: Triples -->
  <rect x="30" y="100" width="160" height="140" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="110" y="125" text-anchor="middle" fill="#64748b" font-size="15" font-weight="bold">k = 2</text>
  <text x="110" y="145" text-anchor="middle" fill="#94a3b8" font-size="11">Triples</text>
  <text x="110" y="168" text-anchor="middle" fill="#fff" font-size="12">a² + b² = c²</text>
  <text x="110" y="190" text-anchor="middle" fill="#64748b" font-size="11">S¹ (circle)</text>
  <text x="110" y="210" text-anchor="middle" fill="#64748b" font-size="11">3 channels</text>
  <text x="110" y="230" text-anchor="middle" fill="#64748b" font-size="10">O(N^ε) reps</text>

  <!-- Arrow -->
  <line x1="195" y1="170" x2="225" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="210" y="160" text-anchor="middle" fill="#475569" font-size="10">+1 dim</text>

  <!-- k=3: Quadruples -->
  <rect x="230" y="90" width="160" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="115" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="bold">k = 3</text>
  <text x="310" y="135" text-anchor="middle" fill="#60a5fa" font-size="11">Quadruples</text>
  <text x="310" y="158" text-anchor="middle" fill="#fff" font-size="12">a²+b²+c² = d²</text>
  <text x="310" y="180" text-anchor="middle" fill="#60a5fa" font-size="11">S² (sphere)</text>
  <text x="310" y="200" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">9 channels</text>
  <text x="310" y="220" text-anchor="middle" fill="#60a5fa" font-size="10">O(N^{1/2}) reps</text>
  <text x="310" y="240" text-anchor="middle" fill="#fbbf24" font-size="10">★ This paper</text>

  <!-- Arrow with "dimension leak" -->
  <path d="M 395 170 C 420 170 420 140 430 140 L 450 140" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="425" y="125" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">dimension</text>
  <text x="425" y="137" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">leak!</text>

  <!-- k=4: Quintuples -->
  <rect x="455" y="80" width="160" height="170" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="535" y="105" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold">k = 4</text>
  <text x="535" y="125" text-anchor="middle" fill="#c4b5fd" font-size="11">Quintuples</text>
  <text x="535" y="148" text-anchor="middle" fill="#fff" font-size="11">a²+b²+c²+d² = e²</text>
  <text x="535" y="170" text-anchor="middle" fill="#c4b5fd" font-size="11">S³ (3-sphere)</text>
  <text x="535" y="190" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">14 channels</text>
  <text x="535" y="210" text-anchor="middle" fill="#c4b5fd" font-size="10">Lagrange: always exists</text>
  <text x="535" y="230" text-anchor="middle" fill="#c4b5fd" font-size="10">Euler composition ✓</text>

  <!-- Arrow -->
  <path d="M 620 150 C 660 150 660 140 690 140" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="655" y="130" text-anchor="middle" fill="#818cf8" font-size="10">embed</text>

  <!-- k=8: E₈ -->
  <rect x="695" y="75" width="180" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="785" y="100" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold">k = 8</text>
  <text x="785" y="120" text-anchor="middle" fill="#fbbf24" font-size="11">E₈ Lattice</text>
  <text x="785" y="143" text-anchor="middle" fill="#fff" font-size="11">Σ aᵢ² = N</text>
  <text x="785" y="165" text-anchor="middle" fill="#fbbf24" font-size="11">240 neighbours</text>
  <text x="785" y="185" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">44 channels</text>
  <text x="785" y="205" text-anchor="middle" fill="#fbbf24" font-size="10">r₈(N) = 480·σ₃(N)</text>
  <text x="785" y="225" text-anchor="middle" fill="#fbbf24" font-size="10">Kissing number: 240</text>
  <text x="785" y="245" text-anchor="middle" fill="#f59e0b" font-size="10">Self-dual lattice</text>

  <!-- Key insight box at bottom -->
  <rect x="100" y="290" width="700" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <text x="450" y="315" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">
    The Dimension Leak (Hurwitz's Theorem)
  </text>

  <text x="450" y="345" text-anchor="middle" fill="#94a3b8" font-size="13">
    Sums of 1, 2, 4, or 8 squares have composition laws (ℝ, ℂ, ℍ, 𝕆).
  </text>
  <text x="450" y="365" text-anchor="middle" fill="#94a3b8" font-size="13">
    Sums of 3 squares do NOT — their product "leaks" into 4 squares.
  </text>
  <text x="450" y="390" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">
    (Σ₃ aᵢ²) × (Σ₃ bᵢ²) = Σ₄ cᵢ²     [but not necessarily Σ₃]
  </text>
  <text x="450" y="415" text-anchor="middle" fill="#7bed9f" font-size="12">
    This irreversible bridge connects quadruple factoring to the full hierarchy of higher dimensions.
  </text>
</svg>
