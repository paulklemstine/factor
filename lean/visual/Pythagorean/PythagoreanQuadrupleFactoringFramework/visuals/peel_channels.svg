<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="peelA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff4757"/>
    </linearGradient>
    <linearGradient id="peelB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48dbfb"/>
      <stop offset="100%" style="stop-color:#0abde3"/>
    </linearGradient>
    <linearGradient id="peelC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">
    The Three Peel Channels of a Pythagorean Quadruple
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#aaa" font-size="14">
    a² + b² + c² = d²  →  Three independent difference-of-squares factorisations
  </text>

  <!-- Central quadruple box -->
  <rect x="300" y="100" width="300" height="80" rx="12" fill="#2d2d6e" stroke="#5f5faf" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">(a, b, c, d)</text>
  <text x="450" y="155" text-anchor="middle" fill="#ccc" font-size="14">a² + b² + c² = d²</text>

  <!-- Peel Channel A -->
  <line x1="350" y1="180" x2="150" y2="280" stroke="url(#peelA)" stroke-width="3" filter="url(#glow)"/>
  <rect x="30" y="260" width="260" height="100" rx="10" fill="#2d1a1a" stroke="#ff4757" stroke-width="2"/>
  <text x="160" y="290" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">Peel Channel A</text>
  <text x="160" y="315" text-anchor="middle" fill="#fff" font-size="15">(d − a)(d + a) = b² + c²</text>
  <text x="160" y="340" text-anchor="middle" fill="#aaa" font-size="12">Factors of b² + c²</text>

  <!-- Peel Channel B -->
  <line x1="450" y1="180" x2="450" y2="280" stroke="url(#peelB)" stroke-width="3" filter="url(#glow)"/>
  <rect x="320" y="280" width="260" height="100" rx="10" fill="#1a2d2d" stroke="#0abde3" stroke-width="2"/>
  <text x="450" y="310" text-anchor="middle" fill="#48dbfb" font-size="16" font-weight="bold">Peel Channel B</text>
  <text x="450" y="335" text-anchor="middle" fill="#fff" font-size="15">(d − b)(d + b) = a² + c²</text>
  <text x="450" y="360" text-anchor="middle" fill="#aaa" font-size="12">Factors of a² + c²</text>

  <!-- Peel Channel C -->
  <line x1="550" y1="180" x2="750" y2="280" stroke="url(#peelC)" stroke-width="3" filter="url(#glow)"/>
  <rect x="620" y="260" width="260" height="100" rx="10" fill="#2d2d1a" stroke="#ff9f43" stroke-width="2"/>
  <text x="750" y="290" text-anchor="middle" fill="#feca57" font-size="16" font-weight="bold">Peel Channel C</text>
  <text x="750" y="315" text-anchor="middle" fill="#fff" font-size="15">(d − c)(d + c) = a² + b²</text>
  <text x="750" y="340" text-anchor="middle" fill="#aaa" font-size="12">Factors of a² + b²</text>

  <!-- Cross-collision arrows -->
  <line x1="290" y1="350" x2="320" y2="350" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="580" y1="340" x2="620" y2="330" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="200" y1="360" x2="660" y2="360" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Cross-collision label -->
  <text x="450" y="410" text-anchor="middle" fill="#ff69b4" font-size="13">+ 3 cross-collision channels</text>
  <text x="450" y="430" text-anchor="middle" fill="#ff69b4" font-size="13">+ 3 GCD channels</text>

  <!-- Example -->
  <rect x="150" y="460" width="600" height="110" rx="10" fill="#1a1a3e" stroke="#5f5faf" stroke-width="1"/>
  <text x="450" y="490" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">
    Example: (1, 4, 8, 9)  →  1² + 4² + 8² = 81 = 9²
  </text>
  <text x="250" y="520" text-anchor="middle" fill="#ff6b6b" font-size="13">
    Peel-a: 8 × 10 = 80
  </text>
  <text x="450" y="520" text-anchor="middle" fill="#48dbfb" font-size="13">
    Peel-b: 5 × 13 = 65
  </text>
  <text x="650" y="520" text-anchor="middle" fill="#feca57" font-size="13">
    Peel-c: 1 × 17 = 17
  </text>
  <text x="450" y="550" text-anchor="middle" fill="#7bed9f" font-size="14" font-weight="bold">
    9 independent factoring equations from one quadruple
  </text>

  <!-- Footer -->
  <text x="450" y="590" text-anchor="middle" fill="#666" font-size="11">
    Formally verified in Lean 4 / Mathlib — zero sorry statements
  </text>
</svg>
