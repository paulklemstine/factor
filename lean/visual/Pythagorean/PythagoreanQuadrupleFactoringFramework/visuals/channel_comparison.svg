<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg3)"/>

  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    Channel Density Across Dimensions
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#8b949e" font-size="13">
    Each dimension k provides k peel + C(k,2) cross-collision + k GCD channels
  </text>

  <!-- Bar chart -->
  <!-- Axis -->
  <line x1="120" y1="400" x2="820" y2="400" stroke="#30363d" stroke-width="2"/>
  <line x1="120" y1="400" x2="120" y2="90" stroke="#30363d" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="110" y="400" text-anchor="end" fill="#8b949e" font-size="12">0</text>
  <text x="110" y="330" text-anchor="end" fill="#8b949e" font-size="12">10</text>
  <text x="110" y="260" text-anchor="end" fill="#8b949e" font-size="12">20</text>
  <text x="110" y="190" text-anchor="end" fill="#8b949e" font-size="12">30</text>
  <text x="110" y="120" text-anchor="end" fill="#8b949e" font-size="12">40</text>

  <!-- Grid lines -->
  <line x1="120" y1="330" x2="820" y2="330" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="260" x2="820" y2="260" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="190" x2="820" y2="190" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="120" x2="820" y2="120" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- k=2 Triples: Total = 5 -->
  <rect x="160" y="365" width="35" fill="#ef4444" height="14" rx="2" opacity="0.9"/>
  <rect x="160" y="358" width="35" fill="#3b82f6" height="7" rx="2" opacity="0.9"/>
  <rect x="160" y="344" width="35" fill="#22c55e" height="14" rx="2" opacity="0.9"/>
  <text x="177" y="335" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5</text>
  <text x="177" y="425" text-anchor="middle" fill="#fff" font-size="13">k=2</text>
  <text x="177" y="442" text-anchor="middle" fill="#8b949e" font-size="10">Triples</text>

  <!-- k=3 Quadruples: Total = 9 -->
  <rect x="310" y="337" width="55" fill="#ef4444" height="21" rx="2" opacity="0.9"/>
  <rect x="310" y="316" width="55" fill="#3b82f6" height="21" rx="2" opacity="0.9"/>
  <rect x="310" y="295" width="55" fill="#22c55e" height="21" rx="2" opacity="0.9"/>
  <text x="337" y="286" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">9</text>
  <text x="337" y="425" text-anchor="middle" fill="#fff" font-size="13">k=3</text>
  <text x="337" y="442" text-anchor="middle" fill="#8b949e" font-size="10">Quadruples</text>

  <!-- k=4 Quintuples: Total = 14 -->
  <rect x="470" y="302" width="70" fill="#ef4444" height="28" rx="2" opacity="0.9"/>
  <rect x="470" y="260" width="70" fill="#3b82f6" height="42" rx="2" opacity="0.9"/>
  <rect x="470" y="232" width="70" fill="#22c55e" height="28" rx="2" opacity="0.9"/>
  <text x="505" y="223" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">14</text>
  <text x="505" y="425" text-anchor="middle" fill="#fff" font-size="13">k=4</text>
  <text x="505" y="442" text-anchor="middle" fill="#8b949e" font-size="10">Quintuples</text>

  <!-- k=8 E₈: Total = 44 -->
  <rect x="640" y="344" width="100" fill="#ef4444" height="56" rx="2" opacity="0.9"/>
  <rect x="640" y="148" width="100" fill="#3b82f6" height="196" rx="2" opacity="0.9"/>
  <rect x="640" y="92" width="100" fill="#22c55e" height="56" rx="2" opacity="0.9"/>
  <text x="690" y="83" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">44</text>
  <text x="690" y="425" text-anchor="middle" fill="#fff" font-size="13">k=8</text>
  <text x="690" y="442" text-anchor="middle" fill="#8b949e" font-size="10">E₈</text>

  <!-- Legend -->
  <rect x="180" y="465" width="14" height="14" rx="2" fill="#22c55e" opacity="0.9"/>
  <text x="200" y="477" fill="#22c55e" font-size="12">GCD Channels (k)</text>

  <rect x="380" y="465" width="14" height="14" rx="2" fill="#3b82f6" opacity="0.9"/>
  <text x="400" y="477" fill="#3b82f6" font-size="12">Cross-Collision (C(k,2))</text>

  <rect x="580" y="465" width="14" height="14" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="600" y="477" fill="#ef4444" font-size="12">Peel Channels (k)</text>

  <!-- Amplification annotations -->
  <text x="257" y="355" text-anchor="middle" fill="#feca57" font-size="11">1.8×</text>
  <path d="M 210 358 L 240 340 L 300 340" fill="none" stroke="#feca57" stroke-width="1"/>

  <text x="420" y="290" text-anchor="middle" fill="#feca57" font-size="11">1.6×</text>
  <path d="M 380 295 L 400 280 L 460 280" fill="none" stroke="#feca57" stroke-width="1"/>

  <text x="590" y="190" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">3.1×</text>
  <path d="M 555 193 L 570 180 L 630 180" fill="none" stroke="#feca57" stroke-width="1.5"/>
</svg>
