<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#66aaff"/>
    </marker>
    <filter id="g3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <text x="400" y="35" text-anchor="middle" fill="#e0e6ff" font-size="20" font-weight="bold">
    The Universal Descent: How R₁₁₁₁ Reduces Every Quadruple
  </text>

  <!-- Example descent: (2,5,14,15) → (1,4,8,9) → (0,3,4,5) → (1,2,2,3) → (0,0,1,1) -->

  <!-- Step boxes -->
  <!-- Box 1 -->
  <rect x="40" y="70" width="140" height="60" rx="10" fill="#1a3055" stroke="#3366aa" stroke-width="2"/>
  <text x="110" y="92" text-anchor="middle" fill="#ffcc44" font-size="15" font-weight="bold">(2, 5, 14, 15)</text>
  <text x="110" y="118" text-anchor="middle" fill="#8899bb" font-size="11">2²+5²+14²=15²</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="100" x2="230" y2="100" stroke="#66aaff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="90" text-anchor="middle" fill="#66aaff" font-size="9">R₁₁₁₁</text>

  <!-- Box 2 -->
  <rect x="240" y="70" width="130" height="60" rx="10" fill="#1a3055" stroke="#3366aa" stroke-width="2"/>
  <text x="305" y="92" text-anchor="middle" fill="#ffcc44" font-size="15" font-weight="bold">(1, 4, 8, 9)</text>
  <text x="305" y="118" text-anchor="middle" fill="#8899bb" font-size="11">1²+4²+8²=9²</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="100" x2="420" y2="100" stroke="#66aaff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="395" y="90" text-anchor="middle" fill="#66aaff" font-size="9">R₁₁₁₁</text>

  <!-- Box 3 -->
  <rect x="430" y="70" width="130" height="60" rx="10" fill="#1a3055" stroke="#3366aa" stroke-width="2"/>
  <text x="495" y="92" text-anchor="middle" fill="#ffcc44" font-size="15" font-weight="bold">(0, 3, 4, 5)</text>
  <text x="495" y="118" text-anchor="middle" fill="#8899bb" font-size="11">0²+3²+4²=5²</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="100" x2="610" y2="100" stroke="#66aaff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="90" text-anchor="middle" fill="#66aaff" font-size="9">R₁₁₁₁</text>

  <!-- Box 4 -->
  <rect x="620" y="70" width="130" height="60" rx="10" fill="#1a4530" stroke="#33aa66" stroke-width="2"/>
  <text x="685" y="92" text-anchor="middle" fill="#88ffaa" font-size="15" font-weight="bold">(1, 2, 2, 3)</text>
  <text x="685" y="118" text-anchor="middle" fill="#8899bb" font-size="11">1²+2²+2²=3²</text>

  <!-- Arrow to root -->
  <line x1="685" y1="130" x2="685" y2="165" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Root -->
  <rect x="625" y="170" width="120" height="50" rx="10" fill="#553311" stroke="#ff6644" stroke-width="3"/>
  <text x="685" y="192" text-anchor="middle" fill="#ff9966" font-size="16" font-weight="bold">(0, 0, 1, 1)</text>
  <text x="685" y="210" text-anchor="middle" fill="#aa8866" font-size="10">ROOT ★</text>

  <!-- Key Inequalities Box -->
  <rect x="40" y="160" width="540" height="130" rx="8" fill="#111827" stroke="#334466" stroke-width="1"/>
  <text x="60" y="185" fill="#e0e6ff" font-size="14" font-weight="bold">Key Inequalities (Formally Verified in Lean 4)</text>

  <text x="60" y="210" fill="#88ccff" font-size="12">1. Cauchy-Schwarz:  (a+b+c)² ≤ 3(a²+b²+c²) = 3d² &lt; (2d)²</text>
  <text x="60" y="230" fill="#88ffaa" font-size="12">   ⟹  a+b+c &lt; 2d  ⟹  d' = 2d−(a+b+c) &gt; 0  ✓</text>

  <text x="60" y="255" fill="#88ccff" font-size="12">2. Cross terms:  (a+b+c)² = d² + 2(ab+ac+bc) &gt; d²</text>
  <text x="60" y="275" fill="#88ffaa" font-size="12">   ⟹  a+b+c &gt; d  ⟹  d' = 2d−(a+b+c) &lt; d  ✓</text>

  <!-- Hypotenuse decrease diagram -->
  <rect x="40" y="310" width="720" height="170" rx="8" fill="#111827" stroke="#334466" stroke-width="1"/>
  <text x="60" y="335" fill="#e0e6ff" font-size="14" font-weight="bold">Hypotenuse Strictly Decreases at Each Step</text>

  <!-- Bar chart -->
  <g transform="translate(100, 350)">
    <!-- d=15 -->
    <rect x="0" y="0" width="60" height="100" rx="4" fill="#4466aa" opacity="0.8"/>
    <text x="30" y="115" text-anchor="middle" fill="#aabbcc" font-size="10">d=15</text>
    <text x="30" y="-5" text-anchor="middle" fill="#ccddff" font-size="11">15</text>

    <!-- d=9 -->
    <rect x="100" y="40" width="60" height="60" rx="4" fill="#44aa66" opacity="0.8"/>
    <text x="130" y="115" text-anchor="middle" fill="#aabbcc" font-size="10">d=9</text>
    <text x="130" y="35" text-anchor="middle" fill="#ccddff" font-size="11">9</text>

    <!-- d=5 -->
    <rect x="200" y="67" width="60" height="33" rx="4" fill="#aaaa44" opacity="0.8"/>
    <text x="230" y="115" text-anchor="middle" fill="#aabbcc" font-size="10">d=5</text>
    <text x="230" y="62" text-anchor="middle" fill="#ccddff" font-size="11">5</text>

    <!-- d=3 -->
    <rect x="300" y="80" width="60" height="20" rx="4" fill="#dd8844" opacity="0.8"/>
    <text x="330" y="115" text-anchor="middle" fill="#aabbcc" font-size="10">d=3</text>
    <text x="330" y="75" text-anchor="middle" fill="#ccddff" font-size="11">3</text>

    <!-- d=1 -->
    <rect x="400" y="93" width="60" height="7" rx="4" fill="#ff6644" opacity="0.8"/>
    <text x="430" y="115" text-anchor="middle" fill="#aabbcc" font-size="10">d=1</text>
    <text x="430" y="88" text-anchor="middle" fill="#ccddff" font-size="11">1</text>

    <!-- Arrows between bars -->
    <line x1="65" y1="50" x2="95" y2="50" stroke="#66aaff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="165" y1="50" x2="195" y2="50" stroke="#66aaff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="265" y1="50" x2="295" y2="50" stroke="#66aaff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="365" y1="50" x2="395" y2="50" stroke="#66aaff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Caption -->
  <text x="590" y="430" fill="#88aacc" font-size="11" font-style="italic">
    0 &lt; d' &lt; d guaranteed
  </text>
  <text x="590" y="450" fill="#88aacc" font-size="11" font-style="italic">
    by Cauchy-Schwarz + cross terms
  </text>
</svg>
