<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="bold">
    The Berggren Pythagorean Triple Tree
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">
    Every primitive Pythagorean triple appears exactly once
  </text>

  <!-- Level 0: Root -->
  <rect x="385" y="75" width="130" height="35" rx="8" fill="#7c3aed" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="97" text-anchor="middle" fill="white" font-size="14" font-weight="bold">(3, 4, 5)</text>
  <text x="450" y="67" text-anchor="middle" fill="#c4b5fd" font-size="10">ROOT — depth 0</text>

  <!-- Edges from root to level 1 -->
  <line x1="415" y1="110" x2="170" y2="165" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="110" x2="450" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="485" y1="110" x2="730" y2="165" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Branch labels -->
  <text x="280" y="140" text-anchor="middle" fill="#818cf8" font-size="10">B₁</text>
  <text x="458" y="140" text-anchor="middle" fill="#60a5fa" font-size="10">B₂</text>
  <text x="620" y="140" text-anchor="middle" fill="#818cf8" font-size="10">B₃</text>

  <!-- Level 1 -->
  <rect x="95" y="170" width="150" height="35" rx="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="170" y="192" text-anchor="middle" fill="white" font-size="13">(5, 12, 13)</text>

  <rect x="375" y="170" width="150" height="35" rx="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="450" y="192" text-anchor="middle" fill="white" font-size="13">(21, 20, 29)</text>

  <rect x="655" y="170" width="150" height="35" rx="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="730" y="192" text-anchor="middle" fill="white" font-size="13">(15, 8, 17)</text>

  <!-- Edges from level 1 to level 2 -->
  <!-- From (5,12,13) -->
  <line x1="130" y1="205" x2="55" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="170" y1="205" x2="170" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="210" y1="205" x2="285" y2="265" stroke="#334155" stroke-width="1.5"/>

  <!-- From (21,20,29) -->
  <line x1="410" y1="205" x2="350" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="450" y1="205" x2="450" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="490" y1="205" x2="550" y2="265" stroke="#334155" stroke-width="1.5"/>

  <!-- From (15,8,17) -->
  <line x1="690" y1="205" x2="630" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="730" y1="205" x2="730" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="770" y1="205" x2="845" y2="265" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 2 nodes -->
  <rect x="10" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="60" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(7, 24, 25)</text>

  <rect x="120" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="170" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(55, 48, 73)</text>

  <rect x="230" y="270" width="110" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="285" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(45, 28, 53)</text>

  <rect x="300" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="350" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(39, 80, 89)</text>

  <rect x="402" y="270" width="110" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="457" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(119,120,169)</text>

  <rect x="512" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="562" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(77, 36, 85)</text>

  <rect x="580" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="630" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(33, 56, 65)</text>

  <rect x="680" y="270" width="110" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="735" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(65, 72, 97)</text>

  <rect x="790" y="270" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
  <text x="840" y="289" text-anchor="middle" fill="#cbd5e1" font-size="10">(35, 12, 37)</text>

  <!-- Dots indicating further depth -->
  <text x="450" y="330" text-anchor="middle" fill="#64748b" font-size="14">⋮ ⋮ ⋮ ⋮ ⋮ ⋮ ⋮ ⋮ ⋮</text>
  <text x="450" y="350" text-anchor="middle" fill="#64748b" font-size="11">3ⁿ triples at depth n</text>

  <!-- Key formulas -->
  <rect x="30" y="380" width="380" height="200" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="405" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Key Formulas</text>

  <text x="50" y="430" fill="#e2e8f0" font-size="11">Pythagorean:  a² + b² = c²</text>
  <text x="50" y="450" fill="#e2e8f0" font-size="11">Lorentz form: Q(a,b,c) = a² + b² - c² = 0</text>
  <text x="50" y="475" fill="#e2e8f0" font-size="11">Parent hypotenuse: c' = 3c - 2(a+b)</text>
  <text x="50" y="495" fill="#e2e8f0" font-size="11">Triangle ineq:  a + b > c  (legs > 0)</text>
  <text x="50" y="520" fill="#e2e8f0" font-size="11">Pell recurrence: c'' = 6c' - c  (B₂-chain)</text>
  <text x="50" y="545" fill="#e2e8f0" font-size="11">Factor identity: (c-a)(c+a) = b²</text>
  <text x="50" y="565" fill="#e2e8f0" font-size="11">Brahmagupta:  (a²+b²)(c²+d²) = (ac-bd)²+(ad+bc)²</text>

  <!-- Descent illustration -->
  <rect x="440" y="380" width="430" height="200" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="655" y="405" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Descent Example: (119,120,169)</text>

  <text x="460" y="435" fill="#a7f3d0" font-size="12">Step 1: (119, 120, 169) → (21, 20, 29)</text>
  <text x="480" y="455" fill="#6ee7b7" font-size="10">c' = 3·169 - 2·(119+120) = 507-478 = 29 ✓</text>

  <text x="460" y="485" fill="#a7f3d0" font-size="12">Step 2: (21, 20, 29) → (3, 4, 5)</text>
  <text x="480" y="505" fill="#6ee7b7" font-size="10">c' = 3·29 - 2·(21+20) = 87-82 = 5 ✓</text>

  <text x="460" y="535" fill="#fbbf24" font-size="12">Depth = 2 ≤ c-5 = 164 ✓</text>
  <text x="460" y="555" fill="#94a3b8" font-size="10">Hypotenuse strictly decreases: 169 → 29 → 5</text>
  <text x="460" y="575" fill="#94a3b8" font-size="10">All 35+ theorems verified in Lean 4 / Mathlib</text>
</svg>
