<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#2a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="700" height="400" fill="url(#bg6)"/>

  <text x="350" y="35" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="bold">
    Lipschitz Division: Strict Inequality FAILS
  </text>
  <text x="350" y="55" text-anchor="middle" fill="#aaa" font-size="12">
    Formalized counterexample: theorem lipschitz_strict_fails
  </text>

  <!-- Counterexample box -->
  <rect x="50" y="75" width="600" height="140" rx="12" fill="#1a1a2a" stroke="#ff6b6b" stroke-width="1.5"/>

  <text x="350" y="100" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold">
    α = 1 + i + j + k,   β = 2k
  </text>
  <text x="350" y="125" text-anchor="middle" fill="#ddd" font-size="13">
    |β|² = 0² + 0² + 0² + 2² = 4
  </text>

  <text x="70" y="155" fill="#ddd" font-size="12">
    For ANY γ = (w, x, y, z):  β·γ = (−2z, −2y, 2x, 2w)
  </text>
  <text x="70" y="178" fill="#ddd" font-size="12">
    ρ = α − β·γ = (1+2z, 1+2y, 1−2x, 1−2w)  ← all components are ODD
  </text>
  <text x="70" y="201" fill="#ff6b6b" font-size="13" font-weight="bold">
    |ρ|² = (odd)² + (odd)² + (odd)² + (odd)² ≥ 1+1+1+1 = 4 = |β|²
  </text>

  <!-- Comparison -->
  <rect x="50" y="235" width="290" height="140" rx="10" fill="#0a2a0a" stroke="#33cc33" stroke-width="1"/>
  <text x="195" y="260" text-anchor="middle" fill="#33cc33" font-size="14" font-weight="bold">
    Lipschitz (non-strict) ✓
  </text>
  <text x="195" y="285" text-anchor="middle" fill="#ddd" font-size="12">|ρ|² ≤ |β|²</text>
  <text x="195" y="310" text-anchor="middle" fill="#ddd" font-size="11">Worst case: all errors = ±½</text>
  <text x="195" y="330" text-anchor="middle" fill="#ddd" font-size="11">Sum of squared errors = 1</text>
  <text x="195" y="355" text-anchor="middle" fill="#33cc33" font-size="11">
    ✓ lipschitz_division_exists
  </text>

  <rect x="360" y="235" width="290" height="140" rx="10" fill="#0a0a2a" stroke="#4a9eff" stroke-width="1"/>
  <text x="505" y="260" text-anchor="middle" fill="#4a9eff" font-size="14" font-weight="bold">
    Hurwitz (strict) ✓
  </text>
  <text x="505" y="285" text-anchor="middle" fill="#ddd" font-size="12">|ρ|² &lt; |β|² (always!)</text>
  <text x="505" y="310" text-anchor="middle" fill="#ddd" font-size="11">D₄ lattice: errors ≤ ±¼</text>
  <text x="505" y="330" text-anchor="middle" fill="#ddd" font-size="11">Sum of squared errors ≤ ¼ &lt; 1</text>
  <text x="505" y="355" text-anchor="middle" fill="#4a9eff" font-size="11">
    → Hurwitz IS Euclidean domain
  </text>
</svg>
