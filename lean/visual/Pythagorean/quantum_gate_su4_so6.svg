<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="su4grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1fa2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="so6grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006064;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#37474f"/>
    </marker>
    <marker id="darr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>
  
  <rect width="900" height="550" fill="#fafafa" rx="10"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#4a148c">
    Q2: Multi-Qubit Extension — SU(4) ≅ SO(6) Isomorphism
  </text>
  
  <!-- SU(2) box -->
  <rect x="50" y="60" width="250" height="180" rx="12" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
  <text x="175" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a237e">SU(2) — Single Qubit</text>
  <text x="175" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#37474f">Quaternions ℤ⁴</text>
  <text x="175" y="135" text-anchor="middle" font-family="Arial" font-size="13" fill="#37474f">dim = 4² - 1 = 3</text>
  <text x="175" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#37474f">r₄(1) = 8 units</text>
  <text x="175" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#37474f">r₄(2) = 24 points</text>
  <text x="175" y="210" text-anchor="middle" font-family="Arial" font-size="13" fill="#3f51b5" font-weight="bold">Gates: T, H, S</text>
  
  <!-- Arrow SU(2) → SU(4) -->
  <line x1="300" y1="150" x2="370" y2="150" stroke="#e65100" stroke-width="3" marker-end="url(#darr)"/>
  <text x="335" y="140" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">extend</text>
  
  <!-- SU(4) box -->
  <rect x="375" y="60" width="250" height="180" rx="12" fill="url(#su4grad)" opacity="0.9"/>
  <text x="500" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">SU(4) — Two Qubit</text>
  <text x="500" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#e1bee7">4×4 unitary matrices</text>
  <text x="500" y="135" text-anchor="middle" font-family="Arial" font-size="13" fill="#e1bee7">dim = 4² - 1 = 15</text>
  <text x="500" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#e1bee7">Plücker: ∧²(ℂ⁴) → ℂ⁶</text>
  <text x="500" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#e1bee7">C(4,2) = 6 components</text>
  <text x="500" y="210" text-anchor="middle" font-family="Arial" font-size="13" fill="#ffab40" font-weight="bold">Gates: CNOT, CZ, SWAP</text>
  
  <!-- Double arrow SU(4) ↔ SO(6) -->
  <line x1="625" y1="140" x2="645" y2="140" stroke="#e65100" stroke-width="3" marker-end="url(#darr)"/>
  <line x1="645" y1="160" x2="625" y2="160" stroke="#e65100" stroke-width="3" marker-end="url(#darr)"/>
  <text x="635" y="130" text-anchor="middle" font-family="Arial" font-size="16" fill="#e65100" font-weight="bold">≅</text>
  
  <!-- SO(6) box -->
  <rect x="650" y="60" width="220" height="180" rx="12" fill="url(#so6grad)" opacity="0.9"/>
  <text x="760" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">SO(6)</text>
  <text x="760" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="#b2dfdb">6D rotations</text>
  <text x="760" y="135" text-anchor="middle" font-family="Arial" font-size="13" fill="#b2dfdb">dim = 6·5/2 = 15 ✓</text>
  <text x="760" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#b2dfdb">Lattice: ℤ⁶</text>
  <text x="760" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#b2dfdb">r₆(1) = 12 units</text>
  <text x="760" y="210" text-anchor="middle" font-family="Arial" font-size="13" fill="#ffab40" font-weight="bold">r₆(2) = 60 points</text>
  
  <!-- Density comparison -->
  <rect x="50" y="270" width="400" height="250" rx="8" fill="white" stroke="#90a4ae" stroke-width="1"/>
  <text x="250" y="295" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#37474f">
    Lattice Point Density Comparison
  </text>
  
  <!-- Bar chart -->
  <!-- r4(1)=8 -->
  <rect x="90" y="320" width="80" height="80" fill="#3f51b5" opacity="0.8" rx="3"/>
  <text x="130" y="360" text-anchor="middle" font-family="Arial" font-size="20" fill="white" font-weight="bold">8</text>
  <text x="130" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#37474f">r₄(1)</text>
  
  <!-- r6(1)=12 -->
  <rect x="190" y="280" width="80" height="120" fill="#00897b" opacity="0.8" rx="3"/>
  <text x="230" y="340" text-anchor="middle" font-family="Arial" font-size="20" fill="white" font-weight="bold">12</text>
  <text x="230" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#37474f">r₆(1)</text>
  
  <!-- r4(2)=24 -->
  <rect x="290" y="340" width="60" height="60" fill="#3f51b5" opacity="0.8" rx="3"/>
  <text x="320" y="375" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">24</text>
  <text x="320" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#37474f">r₄(2)</text>
  
  <!-- r6(2)=60 -->
  <rect x="370" y="310" width="60" height="90" fill="#00897b" opacity="0.8" rx="3"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">60</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#37474f">r₆(2)</text>
  
  <text x="250" y="500" text-anchor="middle" font-family="Arial" font-size="13" fill="#1b5e20" font-weight="bold">
    SO(6) provides 50-150% denser approximation grids
  </text>
  
  <!-- Key insight box -->
  <rect x="490" y="270" width="380" height="250" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="680" y="295" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e65100">Key Insights</text>
  
  <text x="510" y="325" font-family="Arial" font-size="12" fill="#37474f">• su(4) ≅ so(6) as Lie algebras (both 15-dim)</text>
  <text x="510" y="350" font-family="Arial" font-size="12" fill="#37474f">• Spin(6) ≅ SU(4) as Lie groups</text>
  <text x="510" y="375" font-family="Arial" font-size="12" fill="#37474f">• Plücker map: ∧²(ℂ⁴) → ℂ⁶ is explicit</text>
  <text x="510" y="400" font-family="Arial" font-size="12" fill="#37474f">• CNOT → (1,0,0,0,0,1) ∈ ℤ⁶, norm 2</text>
  <text x="510" y="425" font-family="Arial" font-size="12" fill="#37474f">• Descent works identically in 6D</text>
  <text x="510" y="450" font-family="Arial" font-size="12" fill="#37474f">• Gate count: still O(log_p(d))</text>
  
  <text x="680" y="490" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a148c" font-weight="bold">
    Formally verified: su4_so6_dim_match ✓
  </text>
  <text x="680" y="510" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a148c" font-weight="bold">
    so6_denser_than_su2sq ✓
  </text>
</svg>
