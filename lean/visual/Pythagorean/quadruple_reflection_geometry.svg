<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Helvetica', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="cone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    The Reflection Through (1,1,1,1) in Minkowski Space
  </text>

  <!-- Light cone (projected) -->
  <ellipse cx="400" cy="300" rx="250" ry="100" fill="none" stroke="#ffaa44" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="100" x2="150" y2="300" stroke="#ffaa44" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="100" x2="650" y2="300" stroke="#ffaa44" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="500" x2="150" y2="300" stroke="#ffaa44" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="500" x2="650" y2="300" stroke="#ffaa44" stroke-width="1" opacity="0.4"/>

  <!-- Null cone label -->
  <text x="660" y="280" fill="#ffaa44" font-size="12" opacity="0.6">Null Cone</text>
  <text x="660" y="296" fill="#ffaa44" font-size="12" opacity="0.6">a²+b²+c²=d²</text>

  <!-- The spacelike vector (1,1,1,1) -->
  <line x1="400" y1="300" x2="550" y2="200" stroke="#ff4444" stroke-width="3"/>
  <circle cx="550" cy="200" r="5" fill="#ff4444"/>
  <text x="560" y="195" fill="#ff6666" font-size="14" font-weight="bold">s = (1,1,1,1)</text>
  <text x="560" y="213" fill="#ff6666" font-size="11">η(s,s) = 2 &gt; 0 (spacelike)</text>

  <!-- Reflection plane (perpendicular to s) -->
  <line x1="200" y1="150" x2="600" y2="450" stroke="#4488ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="605" y="460" fill="#4488ff" font-size="11" opacity="0.8">Reflection hyperplane</text>

  <!-- A quadruple point on the null cone -->
  <circle cx="280" cy="220" r="6" fill="#44ff44" stroke="#88ffaa" stroke-width="2"/>
  <text x="195" y="215" fill="#44ff44" font-size="13" font-weight="bold">(2,3,6,7)</text>
  <text x="195" y="232" fill="#88ffaa" font-size="10">d = 7</text>

  <!-- Its reflection -->
  <circle cx="520" cy="380" r="6" fill="#44aaff" stroke="#88ccff" stroke-width="2"/>
  <text x="530" y="375" fill="#44aaff" font-size="13" font-weight="bold">(1,2,2,3)</text>
  <text x="530" y="392" fill="#88ccff" font-size="10">d = 3 (smaller!)</text>

  <!-- Reflection arrow -->
  <line x1="290" y1="226" x2="510" y2="374" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="410" y="290" fill="#ffffff" font-size="12" font-weight="bold" transform="rotate(35, 410, 290)">R₁₁₁₁</text>

  <!-- Origin point -->
  <circle cx="400" cy="300" r="4" fill="#ffffff"/>
  <text x="408" y="296" fill="#ffffff" font-size="10">Origin</text>

  <!-- Root point -->
  <circle cx="400" cy="415" r="8" fill="#ff4444" stroke="#ff8888" stroke-width="2"/>
  <text x="415" y="412" fill="#ff8888" font-size="13" font-weight="bold">(0,0,1,1)</text>
  <text x="415" y="430" fill="#ff8888" font-size="10">Root · d = 1</text>
  <text x="415" y="445" fill="#ffaaaa" font-size="10">Fixed point of R₁₁₁₁</text>

  <!-- Key formula -->
  <rect x="50" y="490" width="700" height="90" rx="10" fill="rgba(0,0,0,0.5)" stroke="#8888ff" stroke-width="1"/>
  <text x="400" y="520" text-anchor="middle" fill="#ccccff" font-size="15">
    R₁₁₁₁ = I − s·(η·s)ᵀ/η(s,s)  =  Lorentz reflection through s = (1,1,1,1)
  </text>
  <text x="400" y="545" text-anchor="middle" fill="#aaaadd" font-size="13">
    Every null vector reflects to a "closer-to-origin" null vector
  </text>
  <text x="400" y="565" text-anchor="middle" fill="#88ff88" font-size="12">
    Descent: d' = 2d − (a+b+c), satisfying 0 &lt; d' &lt; d
  </text>
</svg>
