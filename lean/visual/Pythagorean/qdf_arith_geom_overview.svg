<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="arith" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="comp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48dbfb"/>
      <stop offset="100%" stop-color="#0abde3"/>
    </linearGradient>
    <linearGradient id="quant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">
    QDF: Arithmetic Geometry × Complexity × Quantum Information
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#aaa" font-size="13">
    40+ Formally Verified Theorems in Lean 4
  </text>
  
  <!-- Central identity -->
  <rect x="275" y="85" width="350" height="55" rx="10" fill="#2d2d6d" stroke="#5f5faf" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">
    a² + b² + c² = d²
  </text>
  <text x="450" y="130" text-anchor="middle" fill="#ccc" font-size="12">
    ⟹ (d−c)(d+c) = a² + b²
  </text>
  
  <!-- Arithmetic Geometry Box -->
  <rect x="30" y="170" width="260" height="290" rx="12" fill="rgba(255,107,107,0.1)" stroke="url(#arith)" stroke-width="2"/>
  <text x="160" y="195" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">Arithmetic Geometry</text>
  
  <text x="50" y="225" fill="#ffb8b8" font-size="12" font-weight="bold">Brahmagupta–Fibonacci</text>
  <text x="50" y="245" fill="#ddd" font-size="11">(a₁²+b₁²)(a₂²+b₂²) =</text>
  <text x="50" y="262" fill="#ddd" font-size="11">  (a₁a₂−b₁b₂)²+(a₁b₂+b₁a₂)²</text>
  
  <text x="50" y="290" fill="#ffb8b8" font-size="12" font-weight="bold">Euler Four-Square</text>
  <text x="50" y="310" fill="#ddd" font-size="11">d₁²·d₂² = Σᵢ eᵢ² (quaternion)</text>
  
  <text x="50" y="338" fill="#ffb8b8" font-size="12" font-weight="bold">Perfect Square Criterion</text>
  <text x="50" y="358" fill="#ddd" font-size="11">d−c=s², d+c=t² ⟹ a²+b²=(st)²</text>
  
  <text x="50" y="386" fill="#ffb8b8" font-size="12" font-weight="bold">Modular Cascades</text>
  <text x="50" y="406" fill="#ddd" font-size="11">p|d ∧ p|c ⟹ p² | (a²+b²)</text>
  
  <text x="50" y="434" fill="#ffb8b8" font-size="12" font-weight="bold">Thin Quadruples</text>
  <text x="50" y="450" fill="#ddd" font-size="11">d−c=1 ⟹ a²+b²=2d−1</text>

  <!-- Computational Complexity Box -->
  <rect x="320" y="170" width="260" height="290" rx="12" fill="rgba(72,219,251,0.1)" stroke="url(#comp)" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" fill="#48dbfb" font-size="16" font-weight="bold">Complexity Bounds</text>
  
  <text x="340" y="225" fill="#b8ecff" font-size="12" font-weight="bold">Component Range</text>
  <text x="340" y="245" fill="#ddd" font-size="11">−d ≤ a,b,c ≤ d</text>
  <text x="340" y="262" fill="#ddd" font-size="11">Search space: O(d³)</text>
  
  <text x="340" y="290" fill="#b8ecff" font-size="12" font-weight="bold">Parity Filters</text>
  <text x="340" y="310" fill="#ddd" font-size="11">2|d ⟹ 4|(a²+b²+c²)</text>
  <text x="340" y="327" fill="#ddd" font-size="11">Reduces space by 4×</text>
  
  <text x="340" y="355" fill="#b8ecff" font-size="12" font-weight="bold">Descent Chains</text>
  <text x="340" y="375" fill="#ddd" font-size="11">d → d/g₁ → d/(g₁g₂) &lt; d</text>
  <text x="340" y="392" fill="#ddd" font-size="11">Max depth: O(log d)</text>
  
  <text x="340" y="420" fill="#b8ecff" font-size="12" font-weight="bold">GCD Amplification</text>
  <text x="340" y="440" fill="#ddd" font-size="11">gcd(a,d−c)·gcd(a,d+c) | a²</text>

  <!-- Quantum Information Box -->
  <rect x="610" y="170" width="260" height="290" rx="12" fill="rgba(162,155,254,0.1)" stroke="url(#quant)" stroke-width="2"/>
  <text x="740" y="195" text-anchor="middle" fill="#a29bfe" font-size="16" font-weight="bold">Quantum Information</text>
  
  <text x="630" y="225" fill="#d4d0ff" font-size="12" font-weight="bold">Bloch Sphere</text>
  <text x="630" y="245" fill="#ddd" font-size="11">(a/d)²+(b/d)²+(c/d)²=1</text>
  <text x="630" y="262" fill="#ddd" font-size="11">Rational points on S²</text>
  
  <text x="630" y="290" fill="#d4d0ff" font-size="12" font-weight="bold">Cauchy–Schwarz</text>
  <text x="630" y="310" fill="#ddd" font-size="11">(a₁a₂+b₁b₂+c₁c₂)² ≤ d₁²d₂²</text>
  <text x="630" y="327" fill="#ddd" font-size="11">Bounds state fidelity</text>
  
  <text x="630" y="355" fill="#d4d0ff" font-size="12" font-weight="bold">Orthogonality</text>
  <text x="630" y="375" fill="#ddd" font-size="11">⟨ψ₁|ψ₂⟩=0 ↔ perfect</text>
  <text x="630" y="392" fill="#ddd" font-size="11">distinguishability</text>
  
  <text x="630" y="420" fill="#d4d0ff" font-size="12" font-weight="bold">Energy Gap</text>
  <text x="630" y="440" fill="#ddd" font-size="11">Σ(aᵢ−aⱼ)(aᵢ+aⱼ) = 0</text>
  <text x="630" y="455" fill="#ddd" font-size="11">Conservation law</text>

  <!-- Connecting arrows -->
  <line x1="290" y1="315" x2="320" y2="315" stroke="#666" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="580" y1="315" x2="610" y2="315" stroke="#666" stroke-width="1.5" stroke-dasharray="4"/>
  
  <!-- Parametric Families -->
  <rect x="100" y="490" width="700" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="#555" stroke-width="1.5"/>
  <text x="450" y="515" text-anchor="middle" fill="#ffd93d" font-size="15" font-weight="bold">
    Infinite Parametric Families
  </text>
  <text x="450" y="540" text-anchor="middle" fill="#eee" font-size="13">
    Quadratic: n² + (n+1)² + (n(n+1))² = (n²+n+1)²
  </text>
  <text x="450" y="558" text-anchor="middle" fill="#bbb" font-size="11">
    (1,2,2,3) → (2,3,6,7) → (3,4,12,13) → (4,5,20,21) → ···
  </text>
  
  <!-- Footer -->
  <rect x="200" y="590" width="500" height="40" rx="8" fill="rgba(0,255,0,0.08)" stroke="#0f0" stroke-width="1" opacity="0.7"/>
  <text x="450" y="615" text-anchor="middle" fill="#0f0" font-size="13" filter="url(#glow)">
    ✓ All 40+ theorems formally verified in Lean 4 — zero sorry
  </text>
</svg>
