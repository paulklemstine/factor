<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8888ff"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="url(#bg5)" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    5-Tuple Projection Bridges
  </text>
  <text x="400" y="55" fill="#aaaacc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    C(4,2) = 6 projections from a single 5-tuple create bridges to quadruples
  </text>

  <!-- Central 5-tuple -->
  <circle cx="400" cy="280" r="60" fill="none" stroke="#ff6b6b" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="270" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5-Tuple</text>
  <text x="400" y="290" fill="#ffaaaa" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">(a₁,a₂,a₃,a₄,a₅)</text>

  <!-- Projection targets (6 quadruples) -->
  <!-- Top -->
  <circle cx="400" cy="100" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="95" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 1</text>
  <text x="400" y="110" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₁₂,a₃,a₄,a₅)</text>
  <line x1="400" y1="220" x2="400" y2="140" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="415" y="180" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₁,a₂}→e₁₂</text>

  <!-- Top-right -->
  <circle cx="600" cy="150" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="600" y="145" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 2</text>
  <text x="600" y="160" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₁₃,a₂,a₄,a₅)</text>
  <line x1="450" y1="245" x2="565" y2="175" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="520" y="195" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₁,a₃}</text>

  <!-- Bottom-right -->
  <circle cx="620" cy="340" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="620" y="335" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 3</text>
  <text x="620" y="350" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₁₄,a₂,a₃,a₅)</text>
  <line x1="455" y1="300" x2="582" y2="325" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="530" y="300" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₁,a₄}</text>

  <!-- Bottom -->
  <circle cx="400" cy="460" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="455" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 4</text>
  <text x="400" y="470" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₂₃,a₁,a₄,a₅)</text>
  <line x1="400" y1="340" x2="400" y2="420" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="415" y="385" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₂,a₃}</text>

  <!-- Bottom-left -->
  <circle cx="180" cy="340" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="180" y="335" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 5</text>
  <text x="180" y="350" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₂₄,a₁,a₃,a₅)</text>
  <line x1="345" y1="300" x2="218" y2="325" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="265" y="300" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₂,a₄}</text>

  <!-- Top-left -->
  <circle cx="200" cy="150" r="40" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="200" y="145" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quad 6</text>
  <text x="200" y="160" fill="#88ddff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(e₃₄,a₁,a₂,a₅)</text>
  <line x1="350" y1="245" x2="235" y2="175" stroke="#8888ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="270" y="195" fill="#aaaaff" font-family="Arial, sans-serif" font-size="9">{a₃,a₄}</text>

  <!-- Condition -->
  <rect x="150" y="530" width="500" height="45" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="400" y="550" fill="#ffcc00" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
    Bridge condition: aᵢ² + aⱼ² = eᵢⱼ²  (eᵢⱼ must be an integer)
  </text>
  <text x="400" y="567" fill="#aaaacc" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
    Each valid projection creates a new Berggren tree bridge link
  </text>
</svg>
