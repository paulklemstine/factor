<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#69f0ae"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1744"/>
      <stop offset="100%" style="stop-color:#ff8a80"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd600"/>
      <stop offset="100%" style="stop-color:#fff176"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="700" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">
    The Integrality Trichotomy: k ∈ {3, 4, 6}
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#b0bec5" font-size="13">
    All-ones descent works on the null cone ⟺ (k−2) | 4
  </text>
  
  <!-- k=3 column -->
  <rect x="30" y="95" width="260" height="85" rx="12" fill="#1b5e20" fill-opacity="0.4" stroke="#4caf50" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" fill="#69f0ae" font-size="16" font-weight="bold">k = 3: Triples</text>
  <text x="160" y="140" text-anchor="middle" fill="#a5d6a7" font-size="12">η(s,s) = 1  •  1 | 2η always</text>
  <text x="160" y="158" text-anchor="middle" fill="#c8e6c9" font-size="11">Root: (3, 4, 5)  •  Berggren 1934</text>
  <text x="160" y="173" text-anchor="middle" fill="#00e676" font-size="13" font-weight="bold">✓ WORKS</text>
  
  <!-- k=4 column -->
  <rect x="320" y="95" width="260" height="85" rx="12" fill="#0d47a1" fill-opacity="0.4" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="450" y="120" text-anchor="middle" fill="#90caf9" font-size="16" font-weight="bold">k = 4: Quadruples</text>
  <text x="450" y="140" text-anchor="middle" fill="#bbdefb" font-size="12">η(s,s) = 2  •  2 | 2η always</text>
  <text x="450" y="158" text-anchor="middle" fill="#e3f2fd" font-size="11">Root: (0, 0, 1, 1)</text>
  <text x="450" y="173" text-anchor="middle" fill="#40c4ff" font-size="13" font-weight="bold">✓ WORKS</text>
  
  <!-- k=6 column -->
  <rect x="610" y="95" width="260" height="85" rx="12" fill="#e65100" fill-opacity="0.4" stroke="#ff9800" stroke-width="1.5"/>
  <text x="740" y="120" text-anchor="middle" fill="#ffcc80" font-size="16" font-weight="bold">k = 6: Sextuples ★</text>
  <text x="740" y="140" text-anchor="middle" fill="#ffe0b2" font-size="12">η(s,s) = 4  •  η even → 4 | 2η</text>
  <text x="740" y="158" text-anchor="middle" fill="#fff3e0" font-size="11">Root: (0, 0, 0, 0, 1, 1)  •  NEW!</text>
  <text x="740" y="173" text-anchor="middle" fill="#ffab40" font-size="13" font-weight="bold">✓ WORKS</text>
  
  <!-- The Key Insight Box -->
  <rect x="150" y="200" width="600" height="70" rx="10" fill="#4a148c" fill-opacity="0.5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="450" y="225" text-anchor="middle" fill="#e1bee7" font-size="14" font-weight="bold">
    Key Insight: x² ≡ x (mod 2) ⟹ η(s,v) ≡ 0 (mod 2) on null cone
  </text>
  <text x="450" y="248" text-anchor="middle" fill="#f3e5f5" font-size="12">
    Need (k−2) | 2η  ⟹  (k−2) | 4  ⟹  k−2 ∈ {1, 2, 4}  ⟹  k ∈ {3, 4, 6}
  </text>
  
  <!-- Failure cases -->
  <rect x="30" y="295" width="410" height="120" rx="10" fill="#b71c1c" fill-opacity="0.3" stroke="#ef5350" stroke-width="1.2"/>
  <text x="235" y="318" text-anchor="middle" fill="#ef9a9a" font-size="15" font-weight="bold">
    k = 5: FAILS ✗
  </text>
  <text x="235" y="340" text-anchor="middle" fill="#ffcdd2" font-size="11">
    Counterexample: (1, 1, 1, 1, 2)
  </text>
  <text x="235" y="358" text-anchor="middle" fill="#ffcdd2" font-size="11">
    η = 1+1+1+1−2 = 2,  2η = 4
  </text>
  <text x="235" y="376" text-anchor="middle" fill="#ffcdd2" font-size="11">
    k−2 = 3,  3 ∤ 4  →  R(v) = (−⅓, −⅓, −⅓, −⅓, ⅔) ∉ ℤ⁵
  </text>
  <text x="235" y="400" text-anchor="middle" fill="#ff8a80" font-size="12" font-weight="bold">
    ALL uniform reflections s=(a,a,a,a,a) fail!
  </text>
  
  <rect x="460" y="295" width="410" height="120" rx="10" fill="#b71c1c" fill-opacity="0.3" stroke="#ef5350" stroke-width="1.2"/>
  <text x="665" y="318" text-anchor="middle" fill="#ef9a9a" font-size="15" font-weight="bold">
    k ≥ 7: FAILS ✗
  </text>
  <text x="665" y="340" text-anchor="middle" fill="#ffcdd2" font-size="11">
    Counterexample: (1, 1, 1, 1, 0, ..., 0, 2)
  </text>
  <text x="665" y="358" text-anchor="middle" fill="#ffcdd2" font-size="11">
    η = 2,  2η = 4
  </text>
  <text x="665" y="376" text-anchor="middle" fill="#ffcdd2" font-size="11">
    k−2 ≥ 5 has prime p ≥ 5,  p ∤ 4
  </text>
  <text x="665" y="400" text-anchor="middle" fill="#ff8a80" font-size="12" font-weight="bold">
    Barrier prime blocks integrality
  </text>
  
  <!-- Division Algebra Connection -->
  <rect x="30" y="440" width="840" height="100" rx="12" fill="#006064" fill-opacity="0.4" stroke="#00bcd4" stroke-width="1.5"/>
  <text x="450" y="465" text-anchor="middle" fill="#80deea" font-size="16" font-weight="bold">
    Division Algebra Connection: k−2 = dim of associative division algebra
  </text>
  
  <!-- Three algebras -->
  <rect x="55" y="478" width="200" height="48" rx="8" fill="#004d40" fill-opacity="0.6" stroke="#26a69a"/>
  <text x="155" y="498" text-anchor="middle" fill="#80cbc4" font-size="13" font-weight="bold">k−2 = 1: ℝ (reals)</text>
  <text x="155" y="518" text-anchor="middle" fill="#b2dfdb" font-size="11">Dimension 1, associative</text>
  
  <rect x="280" y="478" width="200" height="48" rx="8" fill="#004d40" fill-opacity="0.6" stroke="#26a69a"/>
  <text x="380" y="498" text-anchor="middle" fill="#80cbc4" font-size="13" font-weight="bold">k−2 = 2: ℂ (complex)</text>
  <text x="380" y="518" text-anchor="middle" fill="#b2dfdb" font-size="11">Dimension 2, associative</text>
  
  <rect x="505" y="478" width="220" height="48" rx="8" fill="#004d40" fill-opacity="0.6" stroke="#26a69a"/>
  <text x="615" y="498" text-anchor="middle" fill="#80cbc4" font-size="13" font-weight="bold">k−2 = 4: ℍ (quaternions)</text>
  <text x="615" y="518" text-anchor="middle" fill="#b2dfdb" font-size="11">Dimension 4, associative</text>

  <rect x="745" y="478" width="110" height="48" rx="8" fill="#4e0000" fill-opacity="0.6" stroke="#d32f2f"/>
  <text x="800" y="498" text-anchor="middle" fill="#ef9a9a" font-size="11" font-weight="bold">k−2=8: 𝕆</text>
  <text x="800" y="516" text-anchor="middle" fill="#ffcdd2" font-size="10">Non-assoc. ✗</text>
  
  <!-- Summary formula -->
  <rect x="150" y="565" width="600" height="55" rx="10" fill="#1a237e" fill-opacity="0.5" stroke="#5c6bc0" stroke-width="2"/>
  <text x="450" y="590" text-anchor="middle" fill="#c5cae9" font-size="16" font-weight="bold">
    Theorem: All-ones descent integral on null cone ⟺ (k−2) | 4
  </text>
  <text x="450" y="610" text-anchor="middle" fill="#e8eaf6" font-size="13">
    k ∈ {3, 4, 6}  ←→  k−2 ∈ {1, 2, 4}  ←→  dim(ℝ, ℂ, ℍ)
  </text>
  
  <!-- Machine verified badge -->
  <rect x="300" y="640" width="300" height="35" rx="17" fill="#2e7d32" fill-opacity="0.7" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="450" y="662" text-anchor="middle" fill="#e8f5e9" font-size="13" font-weight="bold">
    ✓ Machine-verified in Lean 4 • Zero sorry
  </text>
</svg>
