<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="900" height="550" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">The Gaussian Integer Bridge</text>
  <text x="450" y="62" text-anchor="middle" fill="#7799bb" font-size="13">Connecting Pythagorean Quadruples to ℤ[i] Factoring</text>

  <!-- Left: Pythagorean Quadruple -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="250" height="180" rx="12" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="0" y="0" width="250" height="35" rx="12" fill="#ff6b6b" opacity="0.15"/>
    <text x="125" y="24" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Pythagorean Quadruple</text>
    <text x="125" y="65" text-anchor="middle" fill="#ffffff" font-size="18">a² + b² + c² = d²</text>
    <text x="125" y="100" text-anchor="middle" fill="#cccccc" font-size="13">↓ rearrange</text>
    <text x="125" y="130" text-anchor="middle" fill="#ffffff" font-size="16">a² + b² = d² − c²</text>
    <text x="125" y="160" text-anchor="middle" fill="#ffffff" font-size="16">= (d−c)(d+c)</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(290, 180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffd32a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="30" y="-10" text-anchor="middle" fill="#ffd32a" font-size="11">= |z|²</text>
  </g>

  <!-- Center: Gaussian Integer -->
  <g transform="translate(360, 100)">
    <rect x="0" y="0" width="200" height="180" rx="12" fill="none" stroke="#48dbfb" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="35" rx="12" fill="#48dbfb" opacity="0.15"/>
    <text x="100" y="24" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Gaussian Integer</text>
    <text x="100" y="65" text-anchor="middle" fill="#ffffff" font-size="16">z = a + bi ∈ ℤ[i]</text>
    <text x="100" y="95" text-anchor="middle" fill="#cccccc" font-size="13">|z|² = a² + b²</text>
    <text x="100" y="125" text-anchor="middle" fill="#ffffff" font-size="14">Factor in ℤ[i]:</text>
    <text x="100" y="150" text-anchor="middle" fill="#88ff88" font-size="14">z = π₁ · π₂ · … · πₖ</text>
    <text x="100" y="170" text-anchor="middle" fill="#cccccc" font-size="11">(Gaussian primes)</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(570, 180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffd32a" stroke-width="2"/>
    <text x="30" y="-10" text-anchor="middle" fill="#ffd32a" font-size="11">norms</text>
  </g>

  <!-- Right: Factoring -->
  <g transform="translate(640, 100)">
    <rect x="0" y="0" width="230" height="180" rx="12" fill="none" stroke="#88ff88" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="35" rx="12" fill="#88ff88" opacity="0.15"/>
    <text x="115" y="24" text-anchor="middle" fill="#88ff88" font-size="14" font-weight="bold">Factor Extraction</text>
    <text x="115" y="60" text-anchor="middle" fill="#ffffff" font-size="13">|z|² = |π₁|²·|π₂|²·…·|πₖ|²</text>
    <text x="115" y="90" text-anchor="middle" fill="#cccccc" font-size="13">Each |πᵢ|² divides</text>
    <text x="115" y="110" text-anchor="middle" fill="#ffffff" font-size="15">(d−c)(d+c)</text>
    <text x="115" y="140" text-anchor="middle" fill="#cccccc" font-size="13">→ reveals factors of</text>
    <text x="115" y="165" text-anchor="middle" fill="#ffd32a" font-size="18" font-weight="bold">d ± c</text>
  </g>

  <!-- Bottom: Concrete Example -->
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="800" height="170" rx="12" fill="none" stroke="#aabbcc" stroke-width="1" opacity="0.5"/>
    <text x="400" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Worked Example: (2, 3, 6, 7)</text>

    <text x="30" y="55" fill="#ff6b6b" font-size="13">Quadruple: 2² + 3² + 6² = 7²</text>
    <text x="30" y="80" fill="#ffffff" font-size="13">Channel 1: a² + b² = 4 + 9 = 13 = (7−6)(7+6) = 1 × 13</text>

    <text x="30" y="110" fill="#48dbfb" font-size="13">Gaussian: z = 2 + 3i, |z|² = 13</text>
    <text x="30" y="135" fill="#88ff88" font-size="13">In ℤ[i]: 13 = (2+3i)(2−3i) — 13 is a Gaussian prime norm!</text>
    <text x="30" y="160" fill="#ffd32a" font-size="13">Since 13 is prime, (d−c)(d+c) = 1 × 13 is the only factoring. d−c=1, d+c=13 → d=7, c=6 ✓</text>
  </g>

  <text x="450" y="535" text-anchor="middle" fill="#445566" font-size="10">Shared Factor Bridge — Gaussian Integer Connection</text>
</svg>
