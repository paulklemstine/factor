<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffd700" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">
    Five Open Questions in Quaternion Descent
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#aaa" font-size="13">
    The Pythagorean Quadruple Tree: a² + b² + c² = d²
  </text>

  <!-- Central node: Descent Tree -->
  <circle cx="450" cy="350" r="65" fill="none" stroke="#ffd700" stroke-width="2.5" filter="url(#glow)"/>
  <text x="450" y="340" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold">DESCENT</text>
  <text x="450" y="358" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold">TREE</text>
  <text x="450" y="378" text-anchor="middle" fill="#aaa" font-size="11">ℍ(ℤ)/(σ)</text>

  <!-- Q1: Explicit Isomorphism (top-left) -->
  <rect x="40" y="100" width="220" height="110" rx="12" fill="#1a2a4a" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="150" y="125" text-anchor="middle" fill="#4a9eff" font-size="14" font-weight="bold">Q1: Quotient Map</text>
  <text x="150" y="148" text-anchor="middle" fill="#ddd" font-size="11">Variable branching</text>
  <text x="150" y="165" text-anchor="middle" fill="#ddd" font-size="11">governed by r₃(d²)</text>
  <text x="150" y="185" text-anchor="middle" fill="#4a9eff" font-size="10">B(d) ~ r₃(d²) / 48</text>
  <text x="150" y="200" text-anchor="middle" fill="#88ff88" font-size="10">✓ Formalized</text>
  <line x1="260" y1="170" x2="390" y2="320" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrowGold)"/>

  <!-- Q2: Hurwitz vs Lipschitz (top-right) -->
  <rect x="640" y="100" width="220" height="110" rx="12" fill="#1a2a4a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="750" y="125" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Q2: Hurwitz Order</text>
  <text x="750" y="148" text-anchor="middle" fill="#ddd" font-size="11">D₄ lattice: |ρ|² ≤ ½|β|²</text>
  <text x="750" y="165" text-anchor="middle" fill="#ddd" font-size="11">Depth: log₂(d) vs log₄/₃(d)</text>
  <text x="750" y="185" text-anchor="middle" fill="#ff6b6b" font-size="10">2.4× shallower tree</text>
  <text x="750" y="200" text-anchor="middle" fill="#88ff88" font-size="10">✓ Formalized</text>
  <line x1="640" y1="170" x2="510" y2="320" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrowGold)"/>

  <!-- Q3: Octonions (bottom-left) -->
  <rect x="40" y="480" width="220" height="120" rx="12" fill="#1a2a4a" stroke="#ff9933" stroke-width="1.5"/>
  <text x="150" y="505" text-anchor="middle" fill="#ff9933" font-size="14" font-weight="bold">Q3: Octonion Obstruction</text>
  <text x="150" y="528" text-anchor="middle" fill="#ddd" font-size="11">η(1,...,1) = 6 → div by 3</text>
  <text x="150" y="545" text-anchor="middle" fill="#ddd" font-size="11">(2,3,6,0,0,0,0,7): 3∤4</text>
  <text x="150" y="565" text-anchor="middle" fill="#ff9933" font-size="10">Non-associativity blocks trees</text>
  <text x="150" y="585" text-anchor="middle" fill="#88ff88" font-size="10">✓ Counterexample formalized</text>
  <line x1="260" y1="520" x2="390" y2="390" stroke="#ff9933" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrowGold)"/>

  <!-- Q4: Quantum (bottom-right) -->
  <rect x="640" y="480" width="220" height="120" rx="12" fill="#1a2a4a" stroke="#cc66ff" stroke-width="1.5"/>
  <text x="750" y="505" text-anchor="middle" fill="#cc66ff" font-size="14" font-weight="bold">Q4: Quantum Gates</text>
  <text x="750" y="528" text-anchor="middle" fill="#ddd" font-size="11">Integer SU(2) → gate synthesis</text>
  <text x="750" y="545" text-anchor="middle" fill="#ddd" font-size="11">Depth O(log d) = gate count</text>
  <text x="750" y="565" text-anchor="middle" fill="#cc66ff" font-size="10">Solovay-Kitaev optimal</text>
  <text x="750" y="585" text-anchor="middle" fill="#88ff88" font-size="10">✓ Depth bound formalized</text>
  <line x1="640" y1="520" x2="510" y2="390" stroke="#cc66ff" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrowGold)"/>

  <!-- Q5: Modular Forms (bottom center) -->
  <rect x="330" y="560" width="240" height="110" rx="12" fill="#1a2a4a" stroke="#33cc99" stroke-width="1.5"/>
  <text x="450" y="585" text-anchor="middle" fill="#33cc99" font-size="14" font-weight="bold">Q5: Modular Forms</text>
  <text x="450" y="608" text-anchor="middle" fill="#ddd" font-size="11">θ₃(q)³ = Σ r₃(n) qⁿ — weight 3/2</text>
  <text x="450" y="625" text-anchor="middle" fill="#ddd" font-size="11">r₃(n) = 12·h(-4n) for squarefree n</text>
  <text x="450" y="645" text-anchor="middle" fill="#33cc99" font-size="10">Shimura lift → class numbers</text>
  <text x="450" y="660" text-anchor="middle" fill="#88ff88" font-size="10">✓ r₃ values verified by native_decide</text>
  <line x1="450" y1="560" x2="450" y2="415" stroke="#33cc99" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrowGold)"/>

  <!-- The equation -->
  <rect x="350" y="80" width="200" height="30" rx="8" fill="#2a2a5e" stroke="#ffd700" stroke-width="1"/>
  <text x="450" y="100" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">
    a² + b² + c² = d²
  </text>

  <!-- Key: σ = 1+i+j+k -->
  <text x="450" y="415" text-anchor="middle" fill="#888" font-size="10">
    σ = 1+i+j+k, |σ|² = 4
  </text>
</svg>
