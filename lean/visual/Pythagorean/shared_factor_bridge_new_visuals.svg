<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="channel1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="channel2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48dbfb"/>
      <stop offset="100%" stop-color="#0abde3"/>
    </linearGradient>
    <linearGradient id="channel3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="url(#gold)" font-size="28" font-weight="bold" filter="url(#glow)">
    The Shared Factor Bridge: Three-Channel Framework
  </text>
  <text x="600" y="80" text-anchor="middle" fill="#aaa" font-size="14">
    a² + b² + c² = d²  →  Three independent factoring channels
  </text>

  <!-- Central sphere representing d² -->
  <circle cx="600" cy="320" r="100" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <circle cx="600" cy="320" r="3" fill="#dfe6e9"/>
  <text x="600" y="310" text-anchor="middle" fill="#dfe6e9" font-size="16" font-weight="bold">d²</text>
  <text x="600" y="335" text-anchor="middle" fill="#b2bec3" font-size="12">Sphere of radius d</text>

  <!-- Channel 1: Red (top-left) -->
  <g transform="translate(200, 200)">
    <rect x="-120" y="-60" width="240" height="120" rx="15" fill="rgba(255,107,107,0.15)" stroke="url(#channel1)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" fill="url(#channel1)" font-size="16" font-weight="bold">Channel 1</text>
    <text x="0" y="0" text-anchor="middle" fill="#fff" font-size="18">(d−c)(d+c) = a²+b²</text>
    <text x="0" y="30" text-anchor="middle" fill="#b2bec3" font-size="12">removes c component</text>
    <text x="0" y="50" text-anchor="middle" fill="#dfe6e9" font-size="11">→ Gaussian integer factoring</text>
  </g>

  <!-- Channel 2: Blue (top-right) -->
  <g transform="translate(1000, 200)">
    <rect x="-120" y="-60" width="240" height="120" rx="15" fill="rgba(72,219,251,0.15)" stroke="url(#channel2)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" fill="url(#channel2)" font-size="16" font-weight="bold">Channel 2</text>
    <text x="0" y="0" text-anchor="middle" fill="#fff" font-size="18">(d−b)(d+b) = a²+c²</text>
    <text x="0" y="30" text-anchor="middle" fill="#b2bec3" font-size="12">removes b component</text>
    <text x="0" y="50" text-anchor="middle" fill="#dfe6e9" font-size="11">→ sum-of-squares structure</text>
  </g>

  <!-- Channel 3: Green (bottom) -->
  <g transform="translate(600, 500)">
    <rect x="-120" y="-60" width="240" height="120" rx="15" fill="rgba(85,239,196,0.15)" stroke="url(#channel3)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" fill="url(#channel3)" font-size="16" font-weight="bold">Channel 3</text>
    <text x="0" y="0" text-anchor="middle" fill="#fff" font-size="18">(d−a)(d+a) = b²+c²</text>
    <text x="0" y="30" text-anchor="middle" fill="#b2bec3" font-size="12">removes a component</text>
    <text x="0" y="50" text-anchor="middle" fill="#dfe6e9" font-size="11">→ difference-of-squares attack</text>
  </g>

  <!-- Connecting lines from sphere to channels -->
  <line x1="520" y1="260" x2="320" y2="200" stroke="url(#channel1)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <line x1="680" y1="260" x2="880" y2="200" stroke="url(#channel2)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <line x1="600" y1="420" x2="600" y2="440" stroke="url(#channel3)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>

  <!-- Channel Sum Identity -->
  <g transform="translate(600, 650)">
    <rect x="-250" y="-30" width="500" height="60" rx="10" fill="rgba(249,202,36,0.1)" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="url(#gold)" font-size="18" font-weight="bold" filter="url(#glow)">
      Ch₁ + Ch₂ + Ch₃ = 2d²
    </text>
    <text x="0" y="22" text-anchor="middle" fill="#b2bec3" font-size="11">
      Triple Channel Consistency — any two channels determine the third
    </text>
  </g>

  <!-- Example box -->
  <g transform="translate(600, 770)">
    <rect x="-350" y="-50" width="700" height="100" rx="10" fill="rgba(255,255,255,0.05)" stroke="#636e72" stroke-width="1"/>
    <text x="0" y="-25" text-anchor="middle" fill="#dfe6e9" font-size="14" font-weight="bold">
      Example: (6, 10, 33, 35)  where 35 = 5 × 7
    </text>
    <text x="-250" y="5" text-anchor="start" fill="#ff6b6b" font-size="12">
      Ch₁: 2×68 = 136 = 6²+10²
    </text>
    <text x="0" y="5" text-anchor="middle" fill="#48dbfb" font-size="12">
      Ch₂: 25×45 = 1125 = 6²+33²
    </text>
    <text x="250" y="5" text-anchor="end" fill="#55efc4" font-size="12">
      Ch₃: 29×41 = 1189 = 10²+33²
    </text>
    <text x="0" y="30" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">
      Ch₂: gcd(25, 45) = 5 → Factor 5 of 35 discovered! ★
    </text>
  </g>

  <!-- Legend: lattice points on sphere -->
  <g transform="translate(150, 500)">
    <text x="0" y="0" fill="#dfe6e9" font-size="14" font-weight="bold">Key Theorems:</text>
    <circle cx="10" cy="25" r="5" fill="#ff6b6b"/>
    <text x="25" y="30" fill="#b2bec3" font-size="11">Prime Divisor Dichotomy</text>
    <circle cx="10" cy="50" r="5" fill="#48dbfb"/>
    <text x="25" y="55" fill="#b2bec3" font-size="11">GCD Cascade Extraction</text>
    <circle cx="10" cy="75" r="5" fill="#55efc4"/>
    <text x="25" y="80" fill="#b2bec3" font-size="11">Full Channel Product</text>
    <circle cx="10" cy="100" r="5" fill="#f9ca24"/>
    <text x="25" y="105" fill="#b2bec3" font-size="11">Channel Sum = 2d²</text>
  </g>

  <!-- Formally verified badge -->
  <g transform="translate(1050, 500)">
    <rect x="-80" y="-25" width="160" height="50" rx="25" fill="rgba(0,184,148,0.2)" stroke="#00b894" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00b894" font-size="13" font-weight="bold">✓ Lean 4 Verified</text>
    <text x="0" y="20" text-anchor="middle" fill="#00b894" font-size="9">0 sorry • all proved</text>
  </g>
</svg>
