<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e64a19;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    GCD Channel Growth with Dimension k
  </text>
  <text x="400" y="55" fill="#aaaacc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    Linear channels (k−1) vs Quadratic cross-collision pairs C(k−1, 2)
  </text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="750" y2="420" stroke="#555588" stroke-width="1"/>
  <line x1="100" y1="420" x2="100" y2="70" stroke="#555588" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="30" y="250" fill="#aaaacc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 30 250)">Count</text>

  <!-- X-axis label -->
  <text x="425" y="470" fill="#aaaacc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Dimension k</text>

  <!-- Y-axis ticks -->
  <text x="90" y="424" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">0</text>
  <text x="90" y="354" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">5</text>
  <text x="90" y="284" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">10</text>
  <text x="90" y="214" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">15</text>
  <text x="90" y="144" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">20</text>
  <text x="90" y="78" fill="#888" font-family="Arial, sans-serif" font-size="10" text-anchor="end">25</text>

  <!-- Grid lines -->
  <line x1="100" y1="350" x2="750" y2="350" stroke="#333355" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="280" x2="750" y2="280" stroke="#333355" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="210" x2="750" y2="210" stroke="#333355" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="140" x2="750" y2="140" stroke="#333355" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- k=3: channels=2, cross=1 -->
  <rect x="125" y="392" width="25" height="28" fill="url(#bar1)" rx="2"/>
  <rect x="155" y="406" width="25" height="14" fill="url(#bar2)" rx="2"/>
  <text x="152" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=3</text>

  <!-- k=4: channels=3, cross=3 -->
  <rect x="215" y="378" width="25" height="42" fill="url(#bar1)" rx="2"/>
  <rect x="245" y="378" width="25" height="42" fill="url(#bar2)" rx="2"/>
  <text x="242" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=4</text>

  <!-- k=5: channels=4, cross=6 -->
  <rect x="305" y="364" width="25" height="56" fill="url(#bar1)" rx="2"/>
  <rect x="335" y="336" width="25" height="84" fill="url(#bar2)" rx="2"/>
  <text x="332" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=5</text>

  <!-- k=6: channels=5, cross=10 -->
  <rect x="395" y="350" width="25" height="70" fill="url(#bar1)" rx="2"/>
  <rect x="425" y="280" width="25" height="140" fill="url(#bar2)" rx="2"/>
  <text x="422" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=6</text>

  <!-- k=7: channels=6, cross=15 -->
  <rect x="485" y="336" width="25" height="84" fill="url(#bar1)" rx="2"/>
  <rect x="515" y="210" width="25" height="210" fill="url(#bar2)" rx="2"/>
  <text x="512" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=7</text>

  <!-- k=8: channels=7, cross=21 -->
  <rect x="575" y="322" width="25" height="98" fill="url(#bar1)" rx="2"/>
  <rect x="605" y="126" width="25" height="294" fill="url(#bar2)" rx="2"/>
  <text x="602" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=8</text>

  <!-- k=9: channels=8, cross=28 -->
  <rect x="665" y="308" width="25" height="112" fill="url(#bar1)" rx="2"/>
  <rect x="695" y="28" width="25" height="392" fill="url(#bar2)" rx="2"/>
  <text x="692" y="445" fill="#aaaacc" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">k=9</text>

  <!-- Legend -->
  <rect x="550" y="60" width="15" height="15" fill="url(#bar1)" rx="2"/>
  <text x="572" y="72" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Factor Channels (k−1)</text>

  <rect x="550" y="82" width="15" height="15" fill="url(#bar2)" rx="2"/>
  <text x="572" y="94" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Cross Pairs C(k−1, 2)</text>

  <!-- Annotation -->
  <text x="400" y="490" fill="#666699" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
    Cross-collision pairs grow quadratically, providing richer factor structure in higher dimensions
  </text>
</svg>
