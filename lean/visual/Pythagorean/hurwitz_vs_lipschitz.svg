<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2f"/>
      <stop offset="100%" style="stop-color:#1f1f4f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <text x="400" y="35" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">
    Hurwitz vs. Lipschitz: Descent Depth Comparison
  </text>

  <!-- Axis -->
  <line x1="100" y1="430" x2="750" y2="430" stroke="#555" stroke-width="1"/>
  <line x1="100" y1="430" x2="100" y2="70" stroke="#555" stroke-width="1"/>
  <text x="425" y="470" text-anchor="middle" fill="#aaa" font-size="12">Hypotenuse d</text>
  <text x="50" y="250" text-anchor="middle" fill="#aaa" font-size="12" transform="rotate(-90,50,250)">Descent Depth</text>

  <!-- Grid lines -->
  <g stroke="#333" stroke-width="0.5">
    <line x1="100" y1="130" x2="750" y2="130"/>
    <line x1="100" y1="230" x2="750" y2="230"/>
    <line x1="100" y1="330" x2="750" y2="330"/>
  </g>

  <!-- Y-axis labels -->
  <text x="90" y="434" text-anchor="end" fill="#888" font-size="10">0</text>
  <text x="90" y="334" text-anchor="end" fill="#888" font-size="10">10</text>
  <text x="90" y="234" text-anchor="end" fill="#888" font-size="10">20</text>
  <text x="90" y="134" text-anchor="end" fill="#888" font-size="10">30</text>

  <!-- X-axis labels -->
  <text x="100" y="450" text-anchor="middle" fill="#888" font-size="10">1</text>
  <text x="230" y="450" text-anchor="middle" fill="#888" font-size="10">10</text>
  <text x="360" y="450" text-anchor="middle" fill="#888" font-size="10">100</text>
  <text x="490" y="450" text-anchor="middle" fill="#888" font-size="10">1000</text>
  <text x="620" y="450" text-anchor="middle" fill="#888" font-size="10">10⁴</text>
  <text x="750" y="450" text-anchor="middle" fill="#888" font-size="10">10⁵</text>

  <!-- Lipschitz curve (slower descent, log_{4/3}) -->
  <polyline fill="none" stroke="#ff6b6b" stroke-width="2.5"
    points="100,430 165,398 230,366 295,334 360,302 425,270 490,238 555,206 620,174 685,142 750,110"/>
  <text x="760" y="105" fill="#ff6b6b" font-size="12" font-weight="bold">Lipschitz</text>
  <text x="760" y="120" fill="#ff6b6b" font-size="10">O(log₄/₃ d)</text>

  <!-- Hurwitz curve (faster descent, log_2) -->
  <polyline fill="none" stroke="#4a9eff" stroke-width="2.5"
    points="100,430 165,404 230,378 295,352 360,326 425,300 490,274 555,248 620,222 685,196 750,170"/>
  <text x="760" y="165" fill="#4a9eff" font-size="12" font-weight="bold">Hurwitz</text>
  <text x="760" y="180" fill="#4a9eff" font-size="10">O(log₂ d)</text>

  <!-- Ratio annotation -->
  <rect x="200" y="80" width="280" height="70" rx="8" fill="#1a1a3e" stroke="#ffd700" stroke-width="1"/>
  <text x="340" y="102" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">
    Hurwitz is 2.41× shallower
  </text>
  <text x="340" y="122" text-anchor="middle" fill="#ddd" font-size="11">
    log(4/3) / log(2) ≈ 2.41
  </text>
  <text x="340" y="142" text-anchor="middle" fill="#aaa" font-size="10">
    D₄ lattice covering radius: ½ vs 1
  </text>

  <!-- Comparison table -->
  <rect x="120" y="260" width="300" height="90" rx="6" fill="#1a1a3e" stroke="#666" stroke-width="0.5"/>
  <text x="270" y="280" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">Comparison at d = 10⁶</text>
  <text x="270" y="300" text-anchor="middle" fill="#ff6b6b" font-size="11">Lipschitz: ~48 steps</text>
  <text x="270" y="320" text-anchor="middle" fill="#4a9eff" font-size="11">Hurwitz: ~20 steps</text>
  <text x="270" y="340" text-anchor="middle" fill="#88ff88" font-size="10">Both formally verified</text>
</svg>
