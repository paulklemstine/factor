<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="550" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" font-family="Georgia">
    Channel GCD Lattice Structure
  </text>
  <text x="450" y="58" text-anchor="middle" fill="#aaa" font-size="13">
    How pairwise GCDs of channel values reveal factor structure
  </text>

  <!-- Three channel nodes -->
  <circle cx="450" cy="130" r="50" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="450" y="125" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Ch₁</text>
  <text x="450" y="143" text-anchor="middle" fill="#ccc" font-size="11">a²+b²</text>

  <circle cx="250" cy="310" r="50" fill="#1a1a3e" stroke="#48dbfb" stroke-width="2.5"/>
  <text x="250" y="305" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Ch₂</text>
  <text x="250" y="323" text-anchor="middle" fill="#ccc" font-size="11">a²+c²</text>

  <circle cx="650" cy="310" r="50" fill="#1a1a3e" stroke="#feca57" stroke-width="2.5"/>
  <text x="650" y="305" text-anchor="middle" fill="#feca57" font-size="14" font-weight="bold">Ch₃</text>
  <text x="650" y="323" text-anchor="middle" fill="#ccc" font-size="11">b²+c²</text>

  <!-- GCD edges -->
  <!-- Ch1-Ch2 -->
  <line x1="410" y1="165" x2="285" y2="275" stroke="#a29bfe" stroke-width="2"/>
  <rect x="300" y="200" width="100" height="35" rx="5" fill="#1a1a2a" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="350" y="215" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">gcd₁₂</text>
  <text x="350" y="228" text-anchor="middle" fill="#ccc" font-size="9">| b²−c²</text>

  <!-- Ch1-Ch3 -->
  <line x1="490" y1="165" x2="615" y2="275" stroke="#6d6" stroke-width="2"/>
  <rect x="500" y="200" width="100" height="35" rx="5" fill="#1a2a1a" stroke="#6d6" stroke-width="1.5"/>
  <text x="550" y="215" text-anchor="middle" fill="#6d6" font-size="10" font-weight="bold">gcd₁₃</text>
  <text x="550" y="228" text-anchor="middle" fill="#ccc" font-size="9">| a²−c²</text>

  <!-- Ch2-Ch3 -->
  <line x1="300" y1="320" x2="600" y2="320" stroke="#f9ca24" stroke-width="2"/>
  <rect x="400" y="303" width="100" height="35" rx="5" fill="#2a2a1a" stroke="#f9ca24" stroke-width="1.5"/>
  <text x="450" y="318" text-anchor="middle" fill="#f9ca24" font-size="10" font-weight="bold">gcd₂₃</text>
  <text x="450" y="331" text-anchor="middle" fill="#ccc" font-size="9">| a²−b²</text>

  <!-- Central triple GCD -->
  <circle cx="450" cy="250" r="35" fill="#2a1a2a" stroke="#f0f" stroke-width="2"/>
  <text x="450" y="245" text-anchor="middle" fill="#f0f" font-size="10" font-weight="bold">gcd₁₂₃</text>
  <text x="450" y="260" text-anchor="middle" fill="#ccc" font-size="9">| 2a²,2b²,2c²</text>

  <!-- Theorem boxes at bottom -->
  <rect x="30" y="400" width="260" height="130" rx="8" fill="#1a1a2a" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="160" y="425" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">Cross-Channel GCD</text>
  <text x="50" y="448" fill="#ccc" font-size="11">If g | Ch₁ and g | Ch₂</text>
  <text x="50" y="465" fill="#ccc" font-size="11">then g | (b² − c²)</text>
  <text x="50" y="490" fill="#888" font-size="10">For prime p: p | (b−c) or p | (b+c)</text>
  <text x="50" y="510" fill="#888" font-size="10">(Euclid's lemma cascade)</text>

  <rect x="320" y="400" width="260" height="130" rx="8" fill="#1a2a1a" stroke="#6d6" stroke-width="1.5"/>
  <text x="450" y="425" text-anchor="middle" fill="#6d6" font-size="13" font-weight="bold">Triple GCD Theorem</text>
  <text x="340" y="448" fill="#ccc" font-size="11">If g | all three channels:</text>
  <text x="340" y="465" fill="#ccc" font-size="11">• g | 2a² ∧ g | 2b² ∧ g | 2c²</text>
  <text x="340" y="490" fill="#888" font-size="10">For odd prime p:</text>
  <text x="340" y="510" fill="#888" font-size="10">p | a ∧ p | b ∧ p | c → p | d</text>

  <rect x="610" y="400" width="260" height="130" rx="8" fill="#2a2a1a" stroke="#f9ca24" stroke-width="1.5"/>
  <text x="740" y="425" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">Factor Cascade</text>
  <text x="630" y="448" fill="#ccc" font-size="11">g | (b²−c²) = (b−c)(b+c)</text>
  <text x="630" y="465" fill="#ccc" font-size="11">→ p | (b−c) or p | (b+c)</text>
  <text x="630" y="490" fill="#888" font-size="10">Combined with p | d:</text>
  <text x="630" y="510" fill="#888" font-size="10">p | (d±c) gives factor of d</text>
</svg>
