<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <style>
      .title { font: bold 20px 'Helvetica Neue', Arial, sans-serif; fill: #1a1a2e; }
      .subtitle { font: italic 13px 'Helvetica Neue', Arial, sans-serif; fill: #555; }
      .node-root { fill: #e63946; stroke: #1a1a2e; stroke-width: 2.5; }
      .node-l1 { fill: #457b9d; stroke: #1a1a2e; stroke-width: 2; }
      .node-l2 { fill: #2a9d8f; stroke: #1a1a2e; stroke-width: 1.5; }
      .node-l3 { fill: #e9c46a; stroke: #1a1a2e; stroke-width: 1.5; }
      .node-text { font: bold 11px 'Courier New', monospace; fill: white; text-anchor: middle; }
      .node-text-dark { font: bold 11px 'Courier New', monospace; fill: #1a1a2e; text-anchor: middle; }
      .edge { stroke: #aaa; stroke-width: 1.5; fill: none; }
      .edge-highlight { stroke: #e63946; stroke-width: 2.5; fill: none; stroke-dasharray: 6,3; }
      .label { font: 10px 'Helvetica Neue', Arial, sans-serif; fill: #666; text-anchor: middle; }
      .quat-label { font: italic 10px 'Helvetica Neue', Arial, sans-serif; fill: #457b9d; text-anchor: middle; }
      .legend-text { font: 12px 'Helvetica Neue', Arial, sans-serif; fill: #333; }
      .dict-header { font: bold 12px 'Helvetica Neue', Arial, sans-serif; fill: #1a1a2e; }
      .dict-text { font: 11px 'Courier New', monospace; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" class="title" text-anchor="middle">The Quaternion-Descent Tree</text>
  <text x="450" y="55" class="subtitle" text-anchor="middle">Pythagorean quadruples organized by the R₁₁₁₁ descent ↔ quaternion division by σ = 1+i+j+k</text>

  <!-- Tree edges (drawn first, behind nodes) -->
  <!-- Root to L1 -->
  <line x1="300" y1="115" x2="300" y2="180" class="edge"/>

  <!-- L1 to L2 -->
  <line x1="300" y1="215" x2="120" y2="290" class="edge"/>
  <line x1="300" y1="215" x2="300" y2="290" class="edge"/>
  <line x1="300" y1="215" x2="480" y2="290" class="edge"/>
  <line x1="300" y1="215" x2="620" y2="290" class="edge"/>

  <!-- L2 to L3 (children of (0,3,4,5)) -->
  <line x1="120" y1="325" x2="60" y2="400" class="edge"/>
  <line x1="120" y1="325" x2="150" y2="400" class="edge"/>

  <!-- L2 to L3 (children of (2,3,6,7)) -->
  <line x1="300" y1="325" x2="240" y2="400" class="edge"/>
  <line x1="300" y1="325" x2="330" y2="400" class="edge"/>
  <line x1="300" y1="325" x2="390" y2="400" class="edge"/>

  <!-- L2 to L3 (children of (4,4,7,9)) -->
  <line x1="480" y1="325" x2="460" y2="400" class="edge"/>
  <line x1="480" y1="325" x2="530" y2="400" class="edge"/>

  <!-- L2 to L3 (children of (6,6,7,11)) -->
  <line x1="620" y1="325" x2="600" y2="400" class="edge"/>
  <line x1="620" y1="325" x2="670" y2="400" class="edge"/>

  <!-- Descent arrow (highlighted) -->
  <line x1="700" y1="395" x2="700" y2="220" class="edge-highlight" marker-end="url(#arrowhead)"/>
  <text x="730" y="310" class="label" text-anchor="start" fill="#e63946" font-style="italic">descent</text>
  <text x="730" y="325" class="label" text-anchor="start" fill="#e63946" font-style="italic">d' &lt; d</text>

  <!-- Root node: (0,0,1,1) -->
  <ellipse cx="300" cy="100" rx="52" ry="18" class="node-root"/>
  <text x="300" y="104" class="node-text">(0,0,1,1)</text>
  <text x="300" y="80" class="quat-label">α = 1, |α|²=1</text>

  <!-- Level 1: (1,2,2,3) -->
  <ellipse cx="300" cy="200" rx="52" ry="18" class="node-l1"/>
  <text x="300" y="204" class="node-text">(1,2,2,3)</text>
  <text x="300" y="235" class="quat-label">α = 1+i+k, |α|²=3</text>

  <!-- Level 2 nodes -->
  <ellipse cx="120" cy="310" rx="52" ry="18" class="node-l2"/>
  <text x="120" y="314" class="node-text">(0,3,4,5)</text>

  <ellipse cx="300" cy="310" rx="52" ry="18" class="node-l2"/>
  <text x="300" y="314" class="node-text">(2,3,6,7)</text>

  <ellipse cx="480" cy="310" rx="52" ry="18" class="node-l2"/>
  <text x="480" y="314" class="node-text">(4,4,7,9)</text>

  <ellipse cx="620" cy="310" rx="56" ry="18" class="node-l2"/>
  <text x="620" y="314" class="node-text">(6,6,7,11)</text>

  <!-- Level 3 nodes -->
  <ellipse cx="60" cy="415" rx="52" ry="16" class="node-l3"/>
  <text x="60" y="419" class="node-text-dark">(1,4,8,9)</text>

  <ellipse cx="150" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="150" y="419" class="node-text-dark">(4,6,12,14)</text>

  <ellipse cx="240" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="240" y="419" class="node-text-dark">(3,4,12,13)</text>

  <ellipse cx="330" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="330" y="419" class="node-text-dark">(2,6,9,11)</text>

  <ellipse cx="390" cy="455" rx="56" ry="16" class="node-l3"/>
  <text x="390" y="459" class="node-text-dark">(6,7,14,17)</text>

  <ellipse cx="460" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="460" y="419" class="node-text-dark">(4,8,19,21)</text>

  <ellipse cx="530" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="530" y="419" class="node-text-dark">(8,9,12,17)</text>

  <ellipse cx="600" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="600" y="419" class="node-text-dark">(2,10,11,15)</text>

  <ellipse cx="670" cy="415" rx="56" ry="16" class="node-l3"/>
  <text x="670" y="419" class="node-text-dark">(6,13,18,23)</text>

  <!-- Level labels -->
  <text x="18" y="104" class="label" fill="#e63946" font-weight="bold">d = 1</text>
  <text x="18" y="204" class="label" fill="#457b9d" font-weight="bold">d = 3</text>
  <text x="18" y="314" class="label" fill="#2a9d8f" font-weight="bold">d = 5–11</text>
  <text x="18" y="419" class="label" fill="#b08d2a" font-weight="bold">d = 9–23</text>

  <!-- Dictionary box -->
  <rect x="30" y="490" width="840" height="190" fill="white" stroke="#ddd" rx="6"/>
  <text x="450" y="515" class="dict-header" text-anchor="middle">Quaternion ↔ Descent Dictionary</text>
  <line x1="50" y1="525" x2="850" y2="525" stroke="#ddd"/>

  <text x="60" y="545" class="dict-text">Integer quaternion α = m+ni+pj+qk</text>
  <text x="500" y="545" class="dict-text">↔  Parametrizes quadruple (a,b,c,d)</text>

  <text x="60" y="565" class="dict-text">Squared norm |α|² = m²+n²+p²+q²</text>
  <text x="500" y="565" class="dict-text">↔  Hypotenuse d</text>

  <text x="60" y="585" class="dict-text">σ = 1+i+j+k,  |σ|² = 4</text>
  <text x="500" y="585" class="dict-text">↔  Reflection vector (1,1,1,1),  η(s,s) = 2</text>

  <text x="60" y="605" class="dict-text">Division by σ (Euclidean step)</text>
  <text x="500" y="605" class="dict-text">↔  Application of R₁₁₁₁</text>

  <text x="60" y="625" class="dict-text">|remainder|² &lt; |dividend|²</text>
  <text x="500" y="625" class="dict-text">↔  d' &lt; d (strict descent)</text>

  <text x="60" y="645" class="dict-text">Unit quaternions (|α|² = 1)</text>
  <text x="500" y="645" class="dict-text">↔  Root (0,0,1,1) with d = 1</text>

  <text x="60" y="665" class="dict-text">Euler's four-square identity</text>
  <text x="500" y="665" class="dict-text">↔  Descent preserves null cone</text>
</svg>
