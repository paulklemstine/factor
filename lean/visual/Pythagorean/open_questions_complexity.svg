<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#ff6b6b" />
      <stop offset="100%" style="stop-color:#ff8e8e" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#4ecdc4" />
      <stop offset="100%" style="stop-color:#7eddd6" />
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#ffe66d" />
      <stop offset="100%" style="stop-color:#fff09d" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">
    Question 1: Complexity Bounds — Depth-k System Growth
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#aaaacc" font-size="14">
    3^k polynomial systems at depth k, each yielding ≤ 2 candidate solutions
  </text>

  <!-- Chart area -->
  <g transform="translate(100, 90)">
    <!-- Axes -->
    <line x1="0" y1="400" x2="700" y2="400" stroke="#555588" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="400" stroke="#555588" stroke-width="2"/>

    <!-- Y-axis label -->
    <text x="-50" y="200" text-anchor="middle" fill="#aaaacc" font-size="13"
          transform="rotate(-90, -50, 200)">Number of Systems (log scale)</text>

    <!-- X-axis label -->
    <text x="350" y="440" text-anchor="middle" fill="#aaaacc" font-size="13">
      Depth k (number of inverse Berggren transforms)
    </text>

    <!-- Grid lines and bars -->
    <!-- Depth 0: 3^0 = 1 -->
    <rect x="20" y="380" width="60" height="20" fill="url(#barGrad1)" rx="3"/>
    <text x="50" y="395" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">1</text>
    <text x="50" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=0</text>

    <!-- Depth 1: 3^1 = 3 -->
    <rect x="110" y="370" width="60" height="30" fill="url(#barGrad1)" rx="3"/>
    <text x="140" y="390" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">3</text>
    <text x="140" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=1</text>

    <!-- Depth 2: 3^2 = 9 -->
    <rect x="200" y="355" width="60" height="45" fill="url(#barGrad1)" rx="3"/>
    <text x="230" y="382" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">9</text>
    <text x="230" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=2</text>

    <!-- Depth 3: 3^3 = 27 -->
    <rect x="290" y="330" width="60" height="70" fill="url(#barGrad2)" rx="3"/>
    <text x="320" y="370" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">27</text>
    <text x="320" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=3</text>

    <!-- Depth 4: 3^4 = 81 -->
    <rect x="380" y="280" width="60" height="120" fill="url(#barGrad2)" rx="3"/>
    <text x="410" y="345" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">81</text>
    <text x="410" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=4</text>

    <!-- Depth 5: 3^5 = 243 -->
    <rect x="470" y="200" width="60" height="200" fill="url(#barGrad3)" rx="3"/>
    <text x="500" y="305" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">243</text>
    <text x="500" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=5</text>

    <!-- Depth 6: 3^6 = 729 -->
    <rect x="560" y="80" width="60" height="320" fill="url(#barGrad3)" rx="3"/>
    <text x="590" y="245" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">729</text>
    <text x="590" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=6</text>

    <!-- Depth 7: 3^7 = 2187 (truncated) -->
    <rect x="650" y="10" width="60" height="390" fill="url(#barGrad3)" rx="3" opacity="0.8"/>
    <text x="680" y="210" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">2187</text>
    <text x="680" y="420" text-anchor="middle" fill="#aaaacc" font-size="11">k=7</text>

    <!-- Exponential curve overlay -->
    <polyline points="50,380 140,370 230,355 320,330 410,280 500,200 590,80 680,10"
              stroke="#ff4444" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  </g>

  <!-- Legend -->
  <g transform="translate(580, 520)">
    <rect x="0" y="0" width="15" height="15" fill="url(#barGrad1)" rx="2"/>
    <text x="20" y="12" fill="#ddddee" font-size="11">Small (k ≤ 2)</text>
    <rect x="110" y="0" width="15" height="15" fill="url(#barGrad2)" rx="2"/>
    <text x="130" y="12" fill="#ddddee" font-size="11">Medium</text>
    <rect x="210" y="0" width="15" height="15" fill="url(#barGrad3)" rx="2"/>
    <text x="230" y="12" fill="#ddddee" font-size="11">Large (k ≥ 5)</text>
  </g>

  <!-- Key formula -->
  <text x="120" y="540" fill="#ff6b6b" font-size="16" font-style="italic">
    Systems(k) = 3^k     |     Solutions(k) ≤ 2 · 3^k     |     Grover: O(3^(k/2))
  </text>

  <!-- Proven badge -->
  <rect x="20" y="555" width="180" height="25" fill="#2d5016" rx="5" opacity="0.9"/>
  <text x="110" y="573" text-anchor="middle" fill="#88ff88" font-size="12" font-weight="bold">
    ✓ Formally Verified in Lean 4
  </text>
</svg>
