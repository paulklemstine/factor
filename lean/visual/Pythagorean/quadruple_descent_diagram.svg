<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6" fill="#ff6644"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">
    Descent Chains: Every Quadruple → Root
  </text>
  <text x="450" y="55" text-anchor="middle" fill="#88aaff" font-size="12">
    R₁₁₁₁(a,b,c,d) = (d−b−c, d−a−c, d−a−b, 2d−a−b−c) · Reflection through (1,1,1,1)
  </text>

  <!-- Chain 1: (2,5,14,15) → (1,4,8,9) → (0,3,4,5) → (1,2,2,3) → (0,0,1,1) -->
  <text x="30" y="110" fill="#ff9966" font-size="11" font-weight="bold">Chain 1 (depth 4):</text>

  <rect x="30" y="120" width="120" height="28" rx="5" fill="#993333" stroke="#cc4444"/>
  <text x="90" y="139" text-anchor="middle" fill="white" font-size="12">(2,5,14,15)</text>

  <line x1="150" y1="134" x2="185" y2="134" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="167" y="128" fill="#ff6644" font-size="8">R₁₁₁₁</text>

  <rect x="190" y="120" width="115" height="28" rx="5" fill="#884422" stroke="#aa6633"/>
  <text x="247" y="139" text-anchor="middle" fill="white" font-size="12">(1,4,8,9)</text>

  <line x1="305" y1="134" x2="340" y2="134" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="345" y="120" width="115" height="28" rx="5" fill="#666622" stroke="#889933"/>
  <text x="402" y="139" text-anchor="middle" fill="white" font-size="12">(0,3,4,5)</text>

  <line x1="460" y1="134" x2="495" y2="134" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="500" y="120" width="115" height="28" rx="5" fill="#336633" stroke="#44aa44"/>
  <text x="557" y="139" text-anchor="middle" fill="white" font-size="12">(1,2,2,3)</text>

  <line x1="615" y1="134" x2="650" y2="134" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="655" y="120" width="115" height="28" rx="5" fill="#cc2222" stroke="#ff4444" stroke-width="2" filter="url(#glow2)"/>
  <text x="712" y="139" text-anchor="middle" fill="white" font-size="12" font-weight="bold">(0,0,1,1)</text>

  <text x="800" y="139" fill="#44ff44" font-size="14">✓</text>

  <!-- Chain 2: (3,4,12,13) → (2,3,6,7) → (1,2,2,3) → (0,0,1,1) -->
  <text x="30" y="190" fill="#66aaff" font-size="11" font-weight="bold">Chain 2 (depth 3):</text>

  <rect x="30" y="200" width="125" height="28" rx="5" fill="#333399" stroke="#4444cc"/>
  <text x="92" y="219" text-anchor="middle" fill="white" font-size="12">(3,4,12,13)</text>

  <line x1="155" y1="214" x2="195" y2="214" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="200" y="200" width="115" height="28" rx="5" fill="#224488" stroke="#3366aa"/>
  <text x="257" y="219" text-anchor="middle" fill="white" font-size="12">(2,3,6,7)</text>

  <line x1="315" y1="214" x2="495" y2="214" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)" stroke-dasharray="8,4"/>

  <rect x="500" y="200" width="115" height="28" rx="5" fill="#336633" stroke="#44aa44"/>
  <text x="557" y="219" text-anchor="middle" fill="white" font-size="12">(1,2,2,3)</text>

  <line x1="615" y1="214" x2="650" y2="214" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="655" y="200" width="115" height="28" rx="5" fill="#cc2222" stroke="#ff4444" stroke-width="2"/>
  <text x="712" y="219" text-anchor="middle" fill="white" font-size="12" font-weight="bold">(0,0,1,1)</text>

  <text x="800" y="219" fill="#44ff44" font-size="14">✓</text>

  <!-- Chain 3: (4,4,7,9) → (1,2,2,3) → (0,0,1,1) -->
  <text x="30" y="270" fill="#44cc88" font-size="11" font-weight="bold">Chain 3 (depth 2):</text>

  <rect x="30" y="280" width="115" height="28" rx="5" fill="#226644" stroke="#33aa66"/>
  <text x="87" y="299" text-anchor="middle" fill="white" font-size="12">(4,4,7,9)</text>

  <line x1="145" y1="294" x2="495" y2="294" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)" stroke-dasharray="8,4"/>

  <rect x="500" y="280" width="115" height="28" rx="5" fill="#336633" stroke="#44aa44"/>
  <text x="557" y="299" text-anchor="middle" fill="white" font-size="12">(1,2,2,3)</text>

  <line x1="615" y1="294" x2="650" y2="294" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="655" y="280" width="115" height="28" rx="5" fill="#cc2222" stroke="#ff4444" stroke-width="2"/>
  <text x="712" y="299" text-anchor="middle" fill="white" font-size="12" font-weight="bold">(0,0,1,1)</text>

  <text x="800" y="299" fill="#44ff44" font-size="14">✓</text>

  <!-- The Key Inequalities -->
  <rect x="30" y="350" width="840" height="110" rx="10" fill="none" stroke="#ffaa44" stroke-width="1.5"/>
  <text x="450" y="375" text-anchor="middle" fill="#ffaa44" font-size="16" font-weight="bold">Why the Descent Always Works</text>

  <text x="50" y="400" fill="#dddddd" font-size="13">
    Lemma (sum &gt; hyp): a² + b² + c² = d², b,c &gt; 0  ⟹  a + b + c &gt; d
  </text>
  <text x="50" y="420" fill="#aaaaaa" font-size="11">
    Proof: (a+b+c)² = d² + 2(ab+ac+bc) &gt; d²  since bc &gt; 0
  </text>

  <text x="50" y="445" fill="#dddddd" font-size="13">
    Lemma (sum &lt; 2·hyp): a² + b² + c² = d², a,b,c ≥ 0  ⟹  a + b + c &lt; 2d
  </text>
  <text x="50" y="462" fill="#aaaaaa" font-size="11">
    Proof: (a+b+c)² ≤ 3(a²+b²+c²) = 3d² &lt; (2d)²  by Cauchy-Schwarz
  </text>

  <!-- Conclusion -->
  <rect x="30" y="480" width="840" height="100" rx="10" fill="#112211" stroke="#44cc44" stroke-width="2"/>
  <text x="450" y="510" text-anchor="middle" fill="#44ff44" font-size="18" font-weight="bold">
    Theorem: The Quadruple "Forest" is a Single Tree
  </text>
  <text x="450" y="535" text-anchor="middle" fill="#ccddcc" font-size="13">
    Every primitive Pythagorean quadruple descends to (0,0,1,1)
  </text>
  <text x="450" y="555" text-anchor="middle" fill="#ccddcc" font-size="13">
    via the single O(3,1;ℤ) reflection R₁₁₁₁ through the all-ones vector (1,1,1,1)
  </text>
  <text x="450" y="575" text-anchor="middle" fill="#88ff88" font-size="11">
    Machine-verified in Lean 4 + Mathlib · Computational verification for d ≤ 50
  </text>
</svg>
