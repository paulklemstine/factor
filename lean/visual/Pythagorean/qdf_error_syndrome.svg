<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162040"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <text x="400" y="35" text-anchor="middle" fill="#50fa7b" font-size="20" font-weight="bold">
    QDF Quantum Error Detection &amp; Syndrome Extraction
  </text>

  <!-- Valid quadruple -->
  <rect x="50" y="60" width="700" height="60" rx="10" fill="#0d3e1b" stroke="#50fa7b" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" fill="#50fa7b" font-size="14" font-weight="bold">
    Valid Quadruple: a² + b² + c² = d²
  </text>
  <text x="400" y="108" text-anchor="middle" fill="#ffffff" font-size="13">
    Example: 2² + 3² + 6² = 7² → 4 + 9 + 36 = 49 ✓
  </text>

  <!-- Error introduction -->
  <text x="400" y="150" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">
    ⚡ Error e corrupts component a → a+e
  </text>

  <!-- Error table -->
  <rect x="80" y="170" width="640" height="260" rx="10" fill="#1a1a3e" stroke="#4a9eff" stroke-width="1"/>

  <!-- Header -->
  <text x="140" y="200" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Error e</text>
  <text x="280" y="200" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">(a+e)²+b²+c²</text>
  <text x="420" y="200" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">d²</text>
  <text x="530" y="200" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Residual</text>
  <text x="660" y="200" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">e(2a+e)</text>
  <line x1="100" y1="210" x2="700" y2="210" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>

  <!-- a=2, d=7 -->
  <!-- e=-3 -->
  <text x="140" y="235" text-anchor="middle" fill="#ff6b6b" font-size="12">e = -3</text>
  <text x="280" y="235" text-anchor="middle" fill="#ffffff" font-size="12">(-1)²+9+36 = 46</text>
  <text x="420" y="235" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="235" text-anchor="middle" fill="#ff6b6b" font-size="12">-3</text>
  <text x="660" y="235" text-anchor="middle" fill="#50fa7b" font-size="12">-3(4-3) = -3 ✓</text>

  <!-- e=-2 -->
  <text x="140" y="260" text-anchor="middle" fill="#ff6b6b" font-size="12">e = -2</text>
  <text x="280" y="260" text-anchor="middle" fill="#ffffff" font-size="12">0²+9+36 = 45</text>
  <text x="420" y="260" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="260" text-anchor="middle" fill="#ff6b6b" font-size="12">-4</text>
  <text x="660" y="260" text-anchor="middle" fill="#50fa7b" font-size="12">-2(4-2) = -4 ✓</text>

  <!-- e=-1 -->
  <text x="140" y="285" text-anchor="middle" fill="#ffb86c" font-size="12">e = -1</text>
  <text x="280" y="285" text-anchor="middle" fill="#ffffff" font-size="12">1²+9+36 = 46</text>
  <text x="420" y="285" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="285" text-anchor="middle" fill="#ffb86c" font-size="12">-3</text>
  <text x="660" y="285" text-anchor="middle" fill="#50fa7b" font-size="12">-1(4-1) = -3 ✓</text>

  <!-- e=0 (no error) -->
  <rect x="100" y="295" width="600" height="25" fill="#0d3e1b" opacity="0.3" rx="5"/>
  <text x="140" y="313" text-anchor="middle" fill="#50fa7b" font-size="12" font-weight="bold">e = 0</text>
  <text x="280" y="313" text-anchor="middle" fill="#50fa7b" font-size="12">2²+9+36 = 49</text>
  <text x="420" y="313" text-anchor="middle" fill="#50fa7b" font-size="12">49</text>
  <text x="530" y="313" text-anchor="middle" fill="#50fa7b" font-size="12" font-weight="bold">0</text>
  <text x="660" y="313" text-anchor="middle" fill="#50fa7b" font-size="12">0(4+0) = 0 ✓</text>

  <!-- e=+1 -->
  <text x="140" y="340" text-anchor="middle" fill="#ffb86c" font-size="12">e = +1</text>
  <text x="280" y="340" text-anchor="middle" fill="#ffffff" font-size="12">3²+9+36 = 54</text>
  <text x="420" y="340" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="340" text-anchor="middle" fill="#ffb86c" font-size="12">+5</text>
  <text x="660" y="340" text-anchor="middle" fill="#50fa7b" font-size="12">1(4+1) = 5 ✓</text>

  <!-- e=+2 -->
  <text x="140" y="365" text-anchor="middle" fill="#ff6b6b" font-size="12">e = +2</text>
  <text x="280" y="365" text-anchor="middle" fill="#ffffff" font-size="12">4²+9+36 = 61</text>
  <text x="420" y="365" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="365" text-anchor="middle" fill="#ff6b6b" font-size="12">+12</text>
  <text x="660" y="365" text-anchor="middle" fill="#50fa7b" font-size="12">2(4+2) = 12 ✓</text>

  <!-- e=+3 -->
  <text x="140" y="390" text-anchor="middle" fill="#ff6b6b" font-size="12">e = +3</text>
  <text x="280" y="390" text-anchor="middle" fill="#ffffff" font-size="12">5²+9+36 = 70</text>
  <text x="420" y="390" text-anchor="middle" fill="#ffffff" font-size="12">49</text>
  <text x="530" y="390" text-anchor="middle" fill="#ff6b6b" font-size="12">+21</text>
  <text x="660" y="390" text-anchor="middle" fill="#50fa7b" font-size="12">3(4+3) = 21 ✓</text>

  <!-- Summary -->
  <rect x="150" y="445" width="500" height="40" rx="10" fill="#1a1a3e" stroke="#ffd700" stroke-width="1"/>
  <text x="400" y="470" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">
    Syndrome e(2a+e): detects error magnitude AND direction — formally verified in Lean 4
  </text>
</svg>
