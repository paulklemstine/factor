<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="550" fill="url(#bgA)"/>

  <text x="450" y="35" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold">
    Asymptotic Spectral Gap: d - 2√(d-1) as d → ∞
  </text>

  <!-- Chart area -->
  <rect x="80" y="50" width="380" height="250" fill="#0a150a" stroke="#336633" rx="5"/>
  <text x="270" y="75" text-anchor="middle" fill="#88ff88" font-size="14" font-weight="bold">Absolute Spectral Gap</text>

  <!-- Axes -->
  <line x1="100" y1="280" x2="440" y2="280" stroke="#448844" stroke-width="1"/>
  <line x1="100" y1="280" x2="100" y2="70" stroke="#448844" stroke-width="1"/>
  <text x="270" y="305" text-anchor="middle" fill="#88aa88" font-size="11">Degree d</text>
  <text x="85" y="175" text-anchor="middle" fill="#88aa88" font-size="11" transform="rotate(-90,85,175)">Gap</text>

  <!-- Data points (absolute gap) -->
  <!-- d=3: 0.17, d=6: 1.53, d=8: 2.71, d=12: 5.37, d=20: 11.28, d=50: 36 -->
  <polyline points="108,277 130,268 145,259 175,238 220,198 340,130" fill="none" stroke="#44ff44" stroke-width="2"/>
  <circle cx="108" cy="277" r="4" fill="#44ff44"/>
  <circle cx="130" cy="268" r="4" fill="#44ff44"/>
  <circle cx="145" cy="259" r="4" fill="#44ff44"/>
  <circle cx="175" cy="238" r="4" fill="#44ff44"/>
  <circle cx="220" cy="198" r="4" fill="#44ff44"/>
  <circle cx="340" cy="130" r="4" fill="#44ff44"/>

  <text x="108" y="293" text-anchor="middle" fill="#66aa66" font-size="9">3</text>
  <text x="130" y="293" text-anchor="middle" fill="#66aa66" font-size="9">6</text>
  <text x="145" y="293" text-anchor="middle" fill="#66aa66" font-size="9">8</text>
  <text x="175" y="293" text-anchor="middle" fill="#66aa66" font-size="9">12</text>
  <text x="220" y="293" text-anchor="middle" fill="#66aa66" font-size="9">20</text>
  <text x="340" y="293" text-anchor="middle" fill="#66aa66" font-size="9">50</text>

  <!-- Right chart: relative gap -->
  <rect x="490" y="50" width="380" height="250" fill="#0a0a15" stroke="#333366" rx="5"/>
  <text x="680" y="75" text-anchor="middle" fill="#8888ff" font-size="14" font-weight="bold">Relative Spectral Gap (gap/d)</text>

  <line x1="510" y1="280" x2="850" y2="280" stroke="#444488" stroke-width="1"/>
  <line x1="510" y1="280" x2="510" y2="70" stroke="#444488" stroke-width="1"/>

  <!-- Asymptote at 1.0 -->
  <line x1="510" y1="90" x2="850" y2="90" stroke="#ff4444" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="855" y="93" fill="#ff6666" font-size="10">1.0</text>

  <!-- Data points (relative gap) -->
  <!-- d=3: 0.057, d=6: 0.255, d=8: 0.339, d=12: 0.447, d=20: 0.564, d=50: 0.72, d=100: 0.80 -->
  <polyline points="520,269 555,231 575,215 605,195 650,173 730,143 830,128" fill="none" stroke="#4444ff" stroke-width="2"/>
  <circle cx="520" cy="269" r="4" fill="#4444ff"/>
  <circle cx="555" cy="231" r="4" fill="#4444ff"/>
  <circle cx="575" cy="215" r="4" fill="#4444ff"/>
  <circle cx="605" cy="195" r="4" fill="#4444ff"/>
  <circle cx="650" cy="173" r="4" fill="#4444ff"/>
  <circle cx="730" cy="143" r="4" fill="#4444ff"/>
  <circle cx="830" cy="128" r="4" fill="#4444ff"/>

  <text x="520" y="293" text-anchor="middle" fill="#6666aa" font-size="9">3</text>
  <text x="555" y="293" text-anchor="middle" fill="#6666aa" font-size="9">6</text>
  <text x="575" y="293" text-anchor="middle" fill="#6666aa" font-size="9">8</text>
  <text x="605" y="293" text-anchor="middle" fill="#6666aa" font-size="9">12</text>
  <text x="650" y="293" text-anchor="middle" fill="#6666aa" font-size="9">20</text>
  <text x="730" y="293" text-anchor="middle" fill="#6666aa" font-size="9">50</text>
  <text x="830" y="293" text-anchor="middle" fill="#6666aa" font-size="9">100</text>

  <!-- Dimension table -->
  <rect x="50" y="330" width="800" height="200" rx="10" fill="#0a0a1a" stroke="#444466" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" fill="#FFD700" font-size="15" font-weight="bold">
    Dimensional Hierarchy — All Machine-Verified in Lean 4
  </text>

  <!-- Table -->
  <g font-size="12" fill="#ddddee">
    <rect x="70" y="370" width="760" height="25" fill="#1a1a3a"/>
    <text x="140" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Dimension</text>
    <text x="270" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Generators</text>
    <text x="390" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Degree d</text>
    <text x="510" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Abs Gap</text>
    <text x="630" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Rel Gap</text>
    <text x="760" y="387" text-anchor="middle" fill="#FFD700" font-weight="bold">Bound 2√(d-1)</text>

    <rect x="70" y="397" width="760" height="22" fill="#0a0a2a"/>
    <text x="140" y="413" text-anchor="middle">3D (triples)</text>
    <text x="270" y="413" text-anchor="middle">B₁,B₂,B₃</text>
    <text x="390" y="413" text-anchor="middle">6</text>
    <text x="510" y="413" text-anchor="middle" fill="#44ff44">1.528</text>
    <text x="630" y="413" text-anchor="middle">0.255</text>
    <text x="760" y="413" text-anchor="middle">2√5 ≈ 4.47</text>

    <rect x="70" y="421" width="760" height="22" fill="#0a0a3a"/>
    <text x="140" y="437" text-anchor="middle">4D (quadruples)</text>
    <text x="270" y="437" text-anchor="middle">H₁,...,H₄</text>
    <text x="390" y="437" text-anchor="middle">8</text>
    <text x="510" y="437" text-anchor="middle" fill="#44ff44">2.708</text>
    <text x="630" y="437" text-anchor="middle">0.339</text>
    <text x="760" y="437" text-anchor="middle">2√7 ≈ 5.29</text>

    <rect x="70" y="445" width="760" height="22" fill="#0a0a2a"/>
    <text x="140" y="461" text-anchor="middle">5D (quintuples)</text>
    <text x="270" y="461" text-anchor="middle">K₁,...,K₆</text>
    <text x="390" y="461" text-anchor="middle">12</text>
    <text x="510" y="461" text-anchor="middle" fill="#44ff44">5.367</text>
    <text x="630" y="461" text-anchor="middle">0.447</text>
    <text x="760" y="461" text-anchor="middle">2√11 ≈ 6.63</text>
  </g>

  <!-- Key insight -->
  <text x="450" y="500" text-anchor="middle" fill="#ffcc44" font-size="13" font-style="italic">
    Theorem (Lean 4): gap(12) > gap(8) > gap(6) > gap(3) — strictly increasing
  </text>
  <text x="450" y="520" text-anchor="middle" fill="#ffcc44" font-size="13" font-style="italic">
    Relative gap → 1 as d → ∞ (proven: 1 - 2√(d-1)/d → 1)
  </text>
</svg>
