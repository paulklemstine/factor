<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff8e8e"/>
    </linearGradient>
    <linearGradient id="q2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#6ee7de"/>
    </linearGradient>
    <linearGradient id="q3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <linearGradient id="q4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <linearGradient id="q5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="24" font-weight="bold">
    Five Open Questions of Quadruple Division Factoring — Resolved
  </text>
  <text x="500" y="70" text-anchor="middle" fill="#8899bb" font-family="Arial" font-size="13">
    All theorems formally verified in Lean 4 with Mathlib
  </text>

  <!-- Central pentagon connecting the 5 questions -->
  <polygon points="500,120 720,260 650,500 350,500 280,260"
           fill="none" stroke="#334466" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Q1: Complexity (top) -->
  <g transform="translate(500,130)">
    <rect x="-140" y="-20" width="280" height="95" rx="10" fill="url(#q1)" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff8e8e" font-family="Arial" font-size="15" font-weight="bold">Q1: Complexity</text>
    <text x="0" y="25" text-anchor="middle" fill="#ffaaaa" font-family="Arial" font-size="11">Recovery rate: 86.8% → 100%</text>
    <text x="0" y="42" text-anchor="middle" fill="#ffcccc" font-family="monospace" font-size="10">trivial_gcd_coprime ✓</text>
    <text x="0" y="57" text-anchor="middle" fill="#ffcccc" font-family="monospace" font-size="10">trivial_gcd_implies_coprime_sum ✓</text>
    <circle cx="115" cy="-5" r="12" fill="#22cc44" opacity="0.8"/>
    <text x="115" y="0" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">✓</text>
  </g>

  <!-- Q2: Navigation (right-top) -->
  <g transform="translate(730,270)">
    <rect x="-130" y="-20" width="260" height="95" rx="10" fill="url(#q2)" opacity="0.15" stroke="#4ecdc4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#6ee7de" font-family="Arial" font-size="15" font-weight="bold">Q2: Navigation</text>
    <text x="0" y="25" text-anchor="middle" fill="#88eedd" font-family="Arial" font-size="11">Δa = 2m+1 per step</text>
    <text x="0" y="42" text-anchor="middle" fill="#aaf0ee" font-family="monospace" font-size="10">param_deformation_bound ✓</text>
    <text x="0" y="57" text-anchor="middle" fill="#aaf0ee" font-family="monospace" font-size="10">navigation_target ✓</text>
    <circle cx="105" cy="-5" r="12" fill="#22cc44" opacity="0.8"/>
    <text x="105" y="0" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">✓</text>
  </g>

  <!-- Q3: Quantum (right-bottom) -->
  <g transform="translate(660,500)">
    <rect x="-130" y="-20" width="260" height="95" rx="10" fill="url(#q3)" opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="15" font-weight="bold">Q3: Quantum</text>
    <text x="0" y="25" text-anchor="middle" fill="#ddd0ff" font-family="Arial" font-size="11">Grover speedup: O(N^{1/4})</text>
    <text x="0" y="42" text-anchor="middle" fill="#eee5ff" font-family="monospace" font-size="10">grover_good_pair_exists ✓</text>
    <text x="0" y="57" text-anchor="middle" fill="#eee5ff" font-family="Arial" font-size="10">Guaranteed marked items in oracle</text>
    <circle cx="105" cy="-5" r="12" fill="#22cc44" opacity="0.8"/>
    <text x="105" y="0" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">✓</text>
  </g>

  <!-- Q4: Higher Dimensions (left-bottom) -->
  <g transform="translate(340,500)">
    <rect x="-130" y="-20" width="260" height="95" rx="10" fill="url(#q4)" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="15" font-weight="bold">Q4: Higher Dimensions</text>
    <text x="0" y="25" text-anchor="middle" fill="#fde68a" font-family="Arial" font-size="11">k-tuple → k−1 factorizations</text>
    <text x="0" y="42" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="10">quintuple_gcd_cascade ✓</text>
    <text x="0" y="57" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="10">general_factor_identity_k{3..6} ✓</text>
    <circle cx="105" cy="-5" r="12" fill="#22cc44" opacity="0.8"/>
    <text x="105" y="0" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">✓</text>
  </g>

  <!-- Q5: Spectral (left-top) -->
  <g transform="translate(270,270)">
    <rect x="-130" y="-20" width="260" height="95" rx="10" fill="url(#q5)" opacity="0.15" stroke="#34d399" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#6ee7b7" font-family="Arial" font-size="15" font-weight="bold">Q5: Spectral</text>
    <text x="0" y="25" text-anchor="middle" fill="#a7f3d0" font-family="Arial" font-size="11">det(M₁) = +1 ∈ SL(3,ℤ)</text>
    <text x="0" y="42" text-anchor="middle" fill="#d1fae5" font-family="monospace" font-size="10">berggren_M1_det_one ✓</text>
    <text x="0" y="57" text-anchor="middle" fill="#d1fae5" font-family="monospace" font-size="10">bridge_creates_adjacency ✓</text>
    <circle cx="105" cy="-5" r="12" fill="#22cc44" opacity="0.8"/>
    <text x="105" y="0" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">✓</text>
  </g>

  <!-- Central summary -->
  <g transform="translate(500,370)">
    <rect x="-100" y="-35" width="200" height="70" rx="35" fill="#1a1a4e" stroke="#6677cc" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="16" font-weight="bold">30+ Theorems</text>
    <text x="0" y="12" text-anchor="middle" fill="#aabbdd" font-family="Arial" font-size="13">All Verified in Lean 4</text>
  </g>

  <!-- Bottom legend -->
  <text x="500" y="660" text-anchor="middle" fill="#667799" font-family="Arial" font-size="11">
    QDF Open Questions Resolution • Lean 4 + Mathlib Formalization
  </text>
  <text x="500" y="680" text-anchor="middle" fill="#556688" font-family="Arial" font-size="10">
    Factor Identity Hierarchy: k=3,4,5,6 • GCD Coprimality • Quaternion Parametrization • Berggren Bridges
  </text>
</svg>
