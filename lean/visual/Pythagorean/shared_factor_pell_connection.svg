<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="pell-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="url(#pell-gold)" font-size="24" font-weight="bold" filter="url(#glow4)">
    The Pell Connection: Where Ancient Equations Meet
  </text>
  <text x="500" y="65" text-anchor="middle" fill="#b2bec3" font-size="13">
    Near-balanced quadruples (a, a, 1, d) ↔ Pell equation d² − 2a² = 1
  </text>

  <!-- Left: Pythagorean Quadruple -->
  <g transform="translate(250, 200)">
    <rect x="-200" y="-80" width="400" height="160" rx="15" fill="rgba(116,185,255,0.1)" stroke="#74b9ff" stroke-width="2"/>
    <text x="0" y="-55" text-anchor="middle" fill="#74b9ff" font-size="16" font-weight="bold">Pythagorean Quadruple</text>
    <text x="0" y="-25" text-anchor="middle" fill="#dfe6e9" font-size="18">a² + a² + 1² = d²</text>
    <text x="0" y="5" text-anchor="middle" fill="#b2bec3" font-size="13">↕ subtract 1 from both sides</text>
    <text x="0" y="35" text-anchor="middle" fill="#dfe6e9" font-size="18">2a² = d² − 1</text>
    <text x="0" y="65" text-anchor="middle" fill="#b2bec3" font-size="12">Sum of two equal squares</text>
  </g>

  <!-- Bidirectional arrow -->
  <text x="500" y="205" text-anchor="middle" fill="#f9ca24" font-size="40">⟺</text>

  <!-- Right: Pell Equation -->
  <g transform="translate(750, 200)">
    <rect x="-200" y="-80" width="400" height="160" rx="15" fill="rgba(253,203,110,0.1)" stroke="#fdcb6e" stroke-width="2"/>
    <text x="0" y="-55" text-anchor="middle" fill="#fdcb6e" font-size="16" font-weight="bold">Pell Equation</text>
    <text x="0" y="-25" text-anchor="middle" fill="#dfe6e9" font-size="18">d² − 2a² = 1</text>
    <text x="0" y="5" text-anchor="middle" fill="#b2bec3" font-size="13">Solutions grow exponentially:</text>
    <text x="0" y="35" text-anchor="middle" fill="#dfe6e9" font-size="14">(dₙ + aₙ√2) = (1+√2)ⁿ</text>
    <text x="0" y="65" text-anchor="middle" fill="#b2bec3" font-size="12">Connected to continued fractions of √2</text>
  </g>

  <!-- Solution table -->
  <g transform="translate(100, 400)">
    <rect x="0" y="-15" width="800" height="195" rx="10" fill="rgba(255,255,255,0.03)" stroke="#636e72" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="-15" width="800" height="35" rx="10" fill="rgba(249,202,36,0.1)"/>
    <text x="50" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">n</text>
    <text x="150" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">a</text>
    <text x="250" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">d</text>
    <text x="400" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">Quadruple (a,a,1,d)</text>
    <text x="580" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">Verification</text>
    <text x="730" y="8" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">Channel 1</text>

    <!-- Data rows -->
    <text x="50" y="45" text-anchor="middle" fill="#dfe6e9" font-size="12">1</text>
    <text x="150" y="45" text-anchor="middle" fill="#dfe6e9" font-size="12">2</text>
    <text x="250" y="45" text-anchor="middle" fill="#dfe6e9" font-size="12">3</text>
    <text x="400" y="45" text-anchor="middle" fill="#dfe6e9" font-size="12">(2, 2, 1, 3)</text>
    <text x="580" y="45" text-anchor="middle" fill="#55efc4" font-size="12">4+4+1 = 9 ✓</text>
    <text x="730" y="45" text-anchor="middle" fill="#b2bec3" font-size="11">(3−1)(3+1)=8=2×2²</text>

    <line x1="20" y1="55" x2="780" y2="55" stroke="#636e72" stroke-width="0.3"/>

    <text x="50" y="75" text-anchor="middle" fill="#dfe6e9" font-size="12">2</text>
    <text x="150" y="75" text-anchor="middle" fill="#dfe6e9" font-size="12">12</text>
    <text x="250" y="75" text-anchor="middle" fill="#dfe6e9" font-size="12">17</text>
    <text x="400" y="75" text-anchor="middle" fill="#dfe6e9" font-size="12">(12, 12, 1, 17)</text>
    <text x="580" y="75" text-anchor="middle" fill="#55efc4" font-size="12">144+144+1 = 289 ✓</text>
    <text x="730" y="75" text-anchor="middle" fill="#b2bec3" font-size="11">(17−1)(17+1)=288=2×12²</text>

    <line x1="20" y1="85" x2="780" y2="85" stroke="#636e72" stroke-width="0.3"/>

    <text x="50" y="105" text-anchor="middle" fill="#dfe6e9" font-size="12">3</text>
    <text x="150" y="105" text-anchor="middle" fill="#dfe6e9" font-size="12">70</text>
    <text x="250" y="105" text-anchor="middle" fill="#dfe6e9" font-size="12">99</text>
    <text x="400" y="105" text-anchor="middle" fill="#dfe6e9" font-size="12">(70, 70, 1, 99)</text>
    <text x="580" y="105" text-anchor="middle" fill="#55efc4" font-size="12">4900+4900+1 = 9801 ✓</text>
    <text x="730" y="105" text-anchor="middle" fill="#b2bec3" font-size="11">(99−1)(99+1)=9800=2×70²</text>

    <line x1="20" y1="115" x2="780" y2="115" stroke="#636e72" stroke-width="0.3"/>

    <text x="50" y="135" text-anchor="middle" fill="#dfe6e9" font-size="12">4</text>
    <text x="150" y="135" text-anchor="middle" fill="#dfe6e9" font-size="12">408</text>
    <text x="250" y="135" text-anchor="middle" fill="#dfe6e9" font-size="12">577</text>
    <text x="400" y="135" text-anchor="middle" fill="#dfe6e9" font-size="12">(408, 408, 1, 577)</text>
    <text x="580" y="135" text-anchor="middle" fill="#55efc4" font-size="12">166464+166464+1 = 332929 ✓</text>
    <text x="730" y="135" text-anchor="middle" fill="#b2bec3" font-size="11">(577−1)(577+1)=2×408²</text>

    <line x1="20" y1="145" x2="780" y2="145" stroke="#636e72" stroke-width="0.3"/>

    <text x="50" y="168" text-anchor="middle" fill="#dfe6e9" font-size="12">5</text>
    <text x="150" y="168" text-anchor="middle" fill="#dfe6e9" font-size="12">2378</text>
    <text x="250" y="168" text-anchor="middle" fill="#dfe6e9" font-size="12">3363</text>
    <text x="400" y="168" text-anchor="middle" fill="#dfe6e9" font-size="12">(2378, 2378, 1, 3363)</text>
    <text x="580" y="168" text-anchor="middle" fill="#55efc4" font-size="12">d²−2a² = 3363²−2×2378² = 1 ✓</text>
    <text x="730" y="168" text-anchor="middle" fill="#b2bec3" font-size="11">(d−1)(d+1)=2×a²</text>
  </g>

  <!-- Footer note -->
  <text x="500" y="585" text-anchor="middle" fill="#636e72" font-size="11">
    The Pell connection is formally verified: pell_connection theorem in Lean 4
  </text>
</svg>
