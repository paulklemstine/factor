<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a0d1a;stop-opacity:1" />
    </linearGradient>
    <filter id="g4">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="550" fill="url(#bg4)"/>

  <text x="450" y="35" text-anchor="middle" fill="#ff4488" font-size="22" font-weight="bold" filter="url(#g4)">
    k = 6: The Pythagorean Sextuple Tree (NEW DISCOVERY)
  </text>
  <text x="450" y="60" text-anchor="middle" fill="#cc6688" font-size="13">
    a₁² + a₂² + a₃² + a₄² + a₅² = d² · Descent via σ = (Σaᵢ − d)/2
  </text>

  <!-- Root -->
  <circle cx="450" cy="110" r="38" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#g4)"/>
  <text x="450" y="107" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">(0,0,0,0,1,1)</text>
  <text x="450" y="125" text-anchor="middle" fill="#ffdd88" font-size="10">root · d = 1</text>

  <!-- Level 1 children -->
  <line x1="380" y1="148" x2="200" y2="200" stroke="#ff4488" stroke-width="2" opacity="0.5"/>
  <line x1="450" y1="148" x2="450" y2="200" stroke="#ff4488" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="148" x2="700" y2="200" stroke="#ff4488" stroke-width="2" opacity="0.5"/>

  <circle cx="200" cy="220" r="32" fill="none" stroke="#ff6699" stroke-width="2"/>
  <text x="200" y="217" text-anchor="middle" fill="#ff6699" font-size="10">(0,0,1,2,2,3)</text>
  <text x="200" y="233" text-anchor="middle" fill="#cc4477" font-size="9">d = 3</text>

  <circle cx="450" cy="220" r="32" fill="none" stroke="#ff6699" stroke-width="2"/>
  <text x="450" y="217" text-anchor="middle" fill="#ff6699" font-size="10">(0,1,1,1,1,2)</text>
  <text x="450" y="233" text-anchor="middle" fill="#cc4477" font-size="9">d = 2</text>

  <circle cx="700" cy="220" r="32" fill="none" stroke="#ff6699" stroke-width="2"/>
  <text x="700" y="217" text-anchor="middle" fill="#ff6699" font-size="10">(0,0,0,2,1,√5)</text>
  <text x="700" y="233" text-anchor="middle" fill="#cc4477" font-size="9">...</text>

  <!-- Level 2 from (0,0,1,2,2,3) -->
  <line x1="150" y1="252" x2="100" y2="300" stroke="#ff88aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="252" x2="200" y2="300" stroke="#ff88aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="252" x2="300" y2="300" stroke="#ff88aa" stroke-width="1.5" opacity="0.4"/>

  <circle cx="100" cy="318" r="25" fill="none" stroke="#ff88aa" stroke-width="1.5"/>
  <text x="100" y="315" text-anchor="middle" fill="#ff88aa" font-size="8">(0,2,3,4,</text>
  <text x="100" y="326" text-anchor="middle" fill="#ff88aa" font-size="8">4,√45)</text>

  <circle cx="200" cy="318" r="25" fill="none" stroke="#ff88aa" stroke-width="1.5"/>
  <text x="200" y="315" text-anchor="middle" fill="#ff88aa" font-size="8">(1,1,2,3,</text>
  <text x="200" y="326" text-anchor="middle" fill="#ff88aa" font-size="8">5,√40)</text>

  <circle cx="300" cy="318" r="25" fill="none" stroke="#ff88aa" stroke-width="1.5"/>
  <text x="300" y="315" text-anchor="middle" fill="#ff88aa" font-size="8">(0,1,2,4,</text>
  <text x="300" y="326" text-anchor="middle" fill="#ff88aa" font-size="8">4,√37)</text>

  <!-- Key properties box -->
  <rect x="50" y="370" width="800" height="160" rx="12" fill="none" stroke="#ff4488" stroke-width="2" opacity="0.4"/>

  <text x="450" y="400" text-anchor="middle" fill="#ff4488" font-size="16" font-weight="bold">
    Machine-Verified Properties (Lean 4, zero sorry)
  </text>

  <text x="150" y="430" text-anchor="middle" fill="#ffaacc" font-size="13" font-weight="bold">Integrality</text>
  <text x="150" y="450" text-anchor="middle" fill="#cc8899" font-size="11">η(s,v) always even</text>
  <text x="150" y="468" text-anchor="middle" fill="#cc8899" font-size="11">⟹ 4 | 2η(s,v)</text>
  <text x="150" y="486" text-anchor="middle" fill="#cc8899" font-size="11">R(v) ∈ ℤ⁶ always</text>

  <text x="370" y="430" text-anchor="middle" fill="#ffaacc" font-size="13" font-weight="bold">Descent Identity</text>
  <text x="370" y="450" text-anchor="middle" fill="#cc8899" font-size="11">(aᵢ−σ)² sums to</text>
  <text x="370" y="468" text-anchor="middle" fill="#cc8899" font-size="11">(d−σ)² when</text>
  <text x="370" y="486" text-anchor="middle" fill="#cc8899" font-size="11">Σaᵢ² = d²</text>

  <text x="580" y="430" text-anchor="middle" fill="#ffaacc" font-size="13" font-weight="bold">Strict Descent</text>
  <text x="580" y="450" text-anchor="middle" fill="#cc8899" font-size="11">0 &lt; d−σ &lt; d</text>
  <text x="580" y="468" text-anchor="middle" fill="#cc8899" font-size="11">when ≥2 spatial</text>
  <text x="580" y="486" text-anchor="middle" fill="#cc8899" font-size="11">coords positive</text>

  <text x="760" y="430" text-anchor="middle" fill="#ffaacc" font-size="13" font-weight="bold">Root</text>
  <text x="760" y="450" text-anchor="middle" fill="#cc8899" font-size="11">d = 1 forces</text>
  <text x="760" y="468" text-anchor="middle" fill="#cc8899" font-size="11">permutation of</text>
  <text x="760" y="486" text-anchor="middle" fill="#cc8899" font-size="11">(0,0,0,0,1)</text>

  <text x="450" y="520" text-anchor="middle" fill="#ffd700" font-size="14" filter="url(#g4)">
    k = 6 rescued by parity: η(s,s) = 4 but η always even ⟹ 4 | 2η ✓ · Connected to ℍ (quaternions)
  </text>
</svg>
