<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg3)"/>
  
  <!-- Left panel: Spectral Gap -->
  <rect x="20" y="10" width="420" height="530" rx="10" fill="rgba(102,187,106,0.05)" stroke="#66BB6A" stroke-width="1"/>
  <text x="230" y="40" text-anchor="middle" fill="#66BB6A" font-size="18" font-weight="bold">Spectral Gap of X_θ</text>
  
  <!-- Spectrum diagram -->
  <line x1="80" y1="90" x2="80" y2="350" stroke="#555" stroke-width="1"/>
  <text x="60" y="85" fill="#888" font-size="10">λ</text>
  
  <!-- Eigenvalues -->
  <line x1="70" y1="340" x2="350" y2="340" stroke="#66BB6A" stroke-width="2"/>
  <text x="360" y="344" fill="#66BB6A" font-size="11">λ₀ = 0</text>
  
  <line x1="70" y1="240" x2="350" y2="240" stroke="#FFD700" stroke-width="2.5"/>
  <text x="360" y="244" fill="#FFD700" font-size="11" font-weight="bold">λ₁ = 1/4</text>
  
  <line x1="70" y1="280" x2="200" y2="280" stroke="#EF5350" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="210" y="284" fill="#EF5350" font-size="10">Selberg: 3/16</text>
  
  <!-- Gap arrow -->
  <line x1="60" y1="340" x2="60" y2="240" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="35" y="295" fill="#FFD700" font-size="10" text-anchor="middle" transform="rotate(-90, 35, 295)">GAP</text>
  
  <!-- Consequences -->
  <rect x="50" y="370" width="370" height="150" rx="5" fill="rgba(255,255,255,0.03)"/>
  <text x="235" y="395" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">Consequences</text>
  
  <text x="70" y="418" fill="#ddd" font-size="11">• Mixing rate: e^{−t·√(1/4)} = e^{−t/2}</text>
  <text x="70" y="438" fill="#ddd" font-size="11">• Descent depth: O(log N), constant = 2</text>
  <text x="70" y="458" fill="#ddd" font-size="11">• Equidistribution: error O(N^{−1/2})</text>
  <text x="70" y="478" fill="#ddd" font-size="11">• Cheeger constant: h ≤ 1</text>
  <text x="70" y="498" fill="#ddd" font-size="11">• Improvement: 4/3× over Selberg</text>
  
  <!-- Right panel: Quantum Gates -->
  <rect x="460" y="10" width="420" height="530" rx="10" fill="rgba(171,71,188,0.05)" stroke="#AB47BC" stroke-width="1"/>
  <text x="670" y="40" text-anchor="middle" fill="#AB47BC" font-size="18" font-weight="bold">Quantum Gates from Γ_θ</text>
  
  <!-- Gate matrices -->
  <g transform="translate(490, 60)">
    <text x="0" y="15" fill="#4FC3F7" font-size="13" font-weight="bold">M₁ = T²S</text>
    <rect x="100" y="-5" width="80" height="40" rx="3" fill="rgba(79,195,247,0.1)" stroke="#4FC3F7"/>
    <text x="120" y="10" fill="#ddd" font-size="12">2  −1</text>
    <text x="120" y="28" fill="#ddd" font-size="12">1   0</text>
    <text x="200" y="15" fill="#888" font-size="10">tr=2, det=1</text>
    <text x="200" y="30" fill="#888" font-size="10">Parabolic</text>
  </g>
  
  <g transform="translate(490, 115)">
    <text x="0" y="15" fill="#66BB6A" font-size="13" font-weight="bold">M₃ = T²</text>
    <rect x="100" y="-5" width="80" height="40" rx="3" fill="rgba(102,187,106,0.1)" stroke="#66BB6A"/>
    <text x="120" y="10" fill="#ddd" font-size="12">1   2</text>
    <text x="120" y="28" fill="#ddd" font-size="12">0   1</text>
    <text x="200" y="15" fill="#888" font-size="10">tr=2, det=1</text>
    <text x="200" y="30" fill="#888" font-size="10">Parabolic</text>
  </g>
  
  <g transform="translate(490, 170)">
    <text x="0" y="15" fill="#EF5350" font-size="13" font-weight="bold">S (π/2)</text>
    <rect x="100" y="-5" width="80" height="40" rx="3" fill="rgba(239,83,80,0.1)" stroke="#EF5350"/>
    <text x="120" y="10" fill="#ddd" font-size="12">0  −1</text>
    <text x="120" y="28" fill="#ddd" font-size="12">1   0</text>
    <text x="200" y="15" fill="#888" font-size="10">tr=0, det=1</text>
    <text x="200" y="30" fill="#888" font-size="10">Elliptic, ord 4</text>
  </g>
  
  <!-- Properties -->
  <rect x="480" y="230" width="380" height="130" rx="5" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="255" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">Gate Properties</text>
  
  <text x="500" y="278" fill="#66BB6A" font-size="11">✓ Exact: integer entries (no approximation)</text>
  <text x="500" y="298" fill="#66BB6A" font-size="11">✓ Unitary: det = 1 for all generators</text>
  <text x="500" y="318" fill="#66BB6A" font-size="11">✓ Discrete: ‖M−I‖² = 4 (minimum gap)</text>
  <text x="500" y="338" fill="#66BB6A" font-size="11">✓ Sparse: M₁(1,1) = 0</text>
  
  <!-- Code parameters -->
  <rect x="480" y="375" width="380" height="150" rx="5" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="400" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">Code Parameters</text>
  
  <g fill="#ddd" font-size="11">
    <text x="500" y="425">Depth n: 3ⁿ codewords</text>
    <text x="500" y="448">n=3: 27 codewords</text>
    <text x="500" y="468">n=5: 243 codewords</text>
    <text x="500" y="488">n=10: 59,049 codewords</text>
    <text x="500" y="508">Decoding: Berggren descent ← O(log N)</text>
  </g>
  
  <!-- S^4 = I diagram -->
  <g transform="translate(730, 68)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#EF5350" stroke-width="1"/>
    <text x="-8" y="-15" fill="#EF5350" font-size="8">S</text>
    <text x="12" y="-5" fill="#EF5350" font-size="8">S²</text>
    <text x="8" y="15" fill="#EF5350" font-size="8">S³</text>
    <text x="-15" y="5" fill="#EF5350" font-size="8">I</text>
    <!-- Arrow indicators -->
    <path d="M -5 -23 A 25 25 0 0 1 20 -10" fill="none" stroke="#EF5350" stroke-width="0.8"/>
    <path d="M 22 5 A 25 25 0 0 1 5 23" fill="none" stroke="#EF5350" stroke-width="0.8"/>
    <path d="M -5 23 A 25 25 0 0 1 -22 5" fill="none" stroke="#EF5350" stroke-width="0.8"/>
    <path d="M -22 -8 A 25 25 0 0 1 -8 -22" fill="none" stroke="#EF5350" stroke-width="0.8"/>
    <text x="0" y="40" text-anchor="middle" fill="#EF5350" font-size="9">S⁴ = I</text>
  </g>
</svg>
