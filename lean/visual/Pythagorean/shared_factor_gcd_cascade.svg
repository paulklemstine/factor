<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f9ca24"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#48dbfb"/>
    </marker>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="800" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#f9ca24" font-size="24" font-weight="bold" filter="url(#glow3)">
    GCD Cascade: Factor Extraction from d = 35 = 5 × 7
  </text>
  <text x="550" y="65" text-anchor="middle" fill="#b2bec3" font-size="13">
    Quadruple (6, 10, 33, 35): how each channel reveals factor information
  </text>

  <!-- Step 1: The quadruple -->
  <g transform="translate(550, 130)">
    <rect x="-200" y="-35" width="400" height="70" rx="12" fill="rgba(116,185,255,0.15)" stroke="#74b9ff" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#74b9ff" font-size="16" font-weight="bold">
      Pythagorean Quadruple: (6, 10, 33, 35)
    </text>
    <text x="0" y="15" text-anchor="middle" fill="#dfe6e9" font-size="13">
      6² + 10² + 33² = 36 + 100 + 1089 = 1225 = 35²  ✓
    </text>
  </g>

  <!-- Three channels branching down -->
  <!-- Channel 1 -->
  <line x1="350" y1="165" x2="180" y2="230" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
  <g transform="translate(180, 280)">
    <rect x="-160" y="-40" width="320" height="80" rx="10" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="0" y="-15" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Channel 1 (remove c=33)</text>
    <text x="0" y="10" text-anchor="middle" fill="#dfe6e9" font-size="13">(35−33)(35+33) = 2 × 68 = 136</text>
    <text x="0" y="30" text-anchor="middle" fill="#b2bec3" font-size="12">gcd(2, 68) = 2  → divides 2d=70</text>
  </g>

  <!-- Channel 2 -->
  <line x1="550" y1="165" x2="550" y2="230" stroke="#48dbfb" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>
  <g transform="translate(550, 280)">
    <rect x="-160" y="-40" width="320" height="80" rx="10" fill="rgba(72,219,251,0.1)" stroke="#48dbfb" stroke-width="1.5"/>
    <text x="0" y="-15" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Channel 2 (remove b=10)</text>
    <text x="0" y="10" text-anchor="middle" fill="#dfe6e9" font-size="13">(35−10)(35+10) = 25 × 45 = 1125</text>
    <text x="0" y="30" text-anchor="middle" fill="#f9ca24" font-size="13" font-weight="bold">gcd(25, 45) = 5  → 5 | 35  ★ FACTOR!</text>
  </g>

  <!-- Channel 3 -->
  <line x1="750" y1="165" x2="920" y2="230" stroke="#55efc4" stroke-width="1.5"/>
  <g transform="translate(920, 280)">
    <rect x="-160" y="-40" width="320" height="80" rx="10" fill="rgba(85,239,196,0.1)" stroke="#55efc4" stroke-width="1.5"/>
    <text x="0" y="-15" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">Channel 3 (remove a=6)</text>
    <text x="0" y="10" text-anchor="middle" fill="#dfe6e9" font-size="13">(35−6)(35+6) = 29 × 41 = 1189</text>
    <text x="0" y="30" text-anchor="middle" fill="#b2bec3" font-size="12">gcd(29, 41) = 1  → both prime</text>
  </g>

  <!-- Prime Divisor Dichotomy boxes -->
  <line x1="550" y1="320" x2="550" y2="400" stroke="#f9ca24" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(550, 450)">
    <rect x="-250" y="-40" width="500" height="80" rx="12" fill="rgba(249,202,36,0.1)" stroke="#f9ca24" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" fill="#f9ca24" font-size="15" font-weight="bold">
      Prime Divisor Dichotomy (Theorem 4)
    </text>
    <text x="0" y="8" text-anchor="middle" fill="#dfe6e9" font-size="13">
      5 | (25×45) and 5 is prime → 5 | 25 or 5 | 45
    </text>
    <text x="0" y="28" text-anchor="middle" fill="#dfe6e9" font-size="13">
      In fact: 5 | 25 AND 5 | 45 → 5 | (d−b) AND 5 | (d+b) → 5 | d
    </text>
  </g>

  <!-- Strengthened Dichotomy -->
  <line x1="550" y1="490" x2="550" y2="540" stroke="#f9ca24" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(550, 580)">
    <rect x="-250" y="-30" width="500" height="60" rx="12" fill="rgba(0,184,148,0.15)" stroke="#00b894" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#00b894" font-size="14" font-weight="bold">
      Strengthened Dichotomy (Theorem 12)
    </text>
    <text x="0" y="18" text-anchor="middle" fill="#dfe6e9" font-size="12">
      Since 5 | d=35 AND 5 | b=10: both (d−b) and (d+b) divisible by 5 ✓
    </text>
  </g>

  <!-- Cross-Channel Analysis -->
  <g transform="translate(550, 680)">
    <rect x="-350" y="-35" width="700" height="70" rx="12" fill="rgba(108,92,231,0.1)" stroke="#6c5ce7" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#6c5ce7" font-size="14" font-weight="bold">
      Cross-Channel: gcd(Ch₁, Ch₂) = gcd(136, 1125) = 1
    </text>
    <text x="0" y="15" text-anchor="middle" fill="#b2bec3" font-size="12">
      Channels are algebraically constrained (Ch₁+Ch₂+Ch₃ = 2×35² = 2450) but carry independent factor info
    </text>
  </g>

  <!-- Result -->
  <g transform="translate(550, 755)">
    <rect x="-180" y="-20" width="360" height="40" rx="20" fill="rgba(249,202,36,0.2)" stroke="#f9ca24" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" fill="#f9ca24" font-size="16" font-weight="bold" filter="url(#glow3)">
      35 = 5 × 7  — Factor extracted via Channel 2
    </text>
  </g>
</svg>
