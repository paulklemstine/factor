<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ch1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b" />
      <stop offset="100%" style="stop-color:#ee5a24" />
    </linearGradient>
    <linearGradient id="ch2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48dbfb" />
      <stop offset="100%" style="stop-color:#0abde3" />
    </linearGradient>
    <linearGradient id="ch3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd32a" />
      <stop offset="100%" style="stop-color:#ff9f1a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">The Three-Channel Factoring Framework</text>
  <text x="450" y="70" text-anchor="middle" fill="#8899bb" font-size="14">a² + b² + c² = d² → Three Independent Factoring Opportunities</text>

  <!-- Central equation -->
  <rect x="300" y="90" width="300" height="50" rx="25" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <text x="450" y="122" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">a² + b² + c² = d²</text>

  <!-- Channel 1 (Red) - Left -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="none" stroke="url(#ch1)" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="30" rx="10" fill="url(#ch1)" opacity="0.3"/>
    <text x="100" y="22" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Channel 1</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-size="16">(d−c)(d+c)</text>
    <text x="100" y="80" text-anchor="middle" fill="#cccccc" font-size="14">= a² + b²</text>
    <text x="100" y="110" text-anchor="middle" fill="#ff9999" font-size="12">Factors d²−c²</text>
  </g>

  <!-- Channel 2 (Blue) - Center -->
  <g transform="translate(370, 200)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="none" stroke="url(#ch2)" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="30" rx="10" fill="url(#ch2)" opacity="0.3"/>
    <text x="100" y="22" text-anchor="middle" fill="#48dbfb" font-size="14" font-weight="bold">Channel 2</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-size="16">(d−b)(d+b)</text>
    <text x="100" y="80" text-anchor="middle" fill="#cccccc" font-size="14">= a² + c²</text>
    <text x="100" y="110" text-anchor="middle" fill="#99ddff" font-size="12">Factors d²−b²</text>
  </g>

  <!-- Channel 3 (Yellow) - Right -->
  <g transform="translate(590, 200)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="none" stroke="url(#ch3)" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="30" rx="10" fill="url(#ch3)" opacity="0.3"/>
    <text x="100" y="22" text-anchor="middle" fill="#ffd32a" font-size="14" font-weight="bold">Channel 3</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-size="16">(d−a)(d+a)</text>
    <text x="100" y="80" text-anchor="middle" fill="#cccccc" font-size="14">= b² + c²</text>
    <text x="100" y="110" text-anchor="middle" fill="#ffee99" font-size="12">Factors d²−a²</text>
  </g>

  <!-- Connecting lines from equation to channels -->
  <line x1="380" y1="140" x2="250" y2="200" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="140" x2="470" y2="200" stroke="#48dbfb" stroke-width="1.5" opacity="0.5"/>
  <line x1="520" y1="140" x2="690" y2="200" stroke="#ffd32a" stroke-width="1.5" opacity="0.5"/>

  <!-- Consistency Identity -->
  <rect x="150" y="365" width="640" height="45" rx="10" fill="none" stroke="#aabbcc" stroke-width="1" opacity="0.5"/>
  <text x="470" y="393" text-anchor="middle" fill="#aabbcc" font-size="14">Consistency: Ch₁ + Ch₂ + Ch₃ = 2d²</text>

  <!-- Example: (2, 3, 6, 7) -->
  <g transform="translate(50, 430)">
    <text x="400" y="0" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Example: (2, 3, 6, 7) — 4 + 9 + 36 = 49</text>

    <!-- Channel 1 example -->
    <g transform="translate(50, 30)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#ff6b6b" opacity="0.1"/>
      <text x="110" y="25" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Ch1: (7−6)(7+6)</text>
      <text x="110" y="48" text-anchor="middle" fill="#ffffff" font-size="16">1 × 13 = 13</text>
      <text x="110" y="68" text-anchor="middle" fill="#cccccc" font-size="12">= 2² + 3² ✓</text>
    </g>

    <!-- Channel 2 example -->
    <g transform="translate(300, 30)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#48dbfb" opacity="0.1"/>
      <text x="110" y="25" text-anchor="middle" fill="#48dbfb" font-size="13" font-weight="bold">Ch2: (7−3)(7+3)</text>
      <text x="110" y="48" text-anchor="middle" fill="#ffffff" font-size="16">4 × 10 = 40</text>
      <text x="110" y="68" text-anchor="middle" fill="#cccccc" font-size="12">= 2² + 6² ✓</text>
    </g>

    <!-- Channel 3 example -->
    <g transform="translate(550, 30)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#ffd32a" opacity="0.1"/>
      <text x="110" y="25" text-anchor="middle" fill="#ffd32a" font-size="13" font-weight="bold">Ch3: (7−2)(7+2)</text>
      <text x="110" y="48" text-anchor="middle" fill="#ffffff" font-size="16">5 × 9 = 45</text>
      <text x="110" y="68" text-anchor="middle" fill="#cccccc" font-size="12">= 3² + 6² ✓</text>
    </g>

    <!-- Sum verification -->
    <text x="400" y="140" text-anchor="middle" fill="#88aacc" font-size="13">13 + 40 + 45 = 98 = 2 × 49 = 2d² ✓</text>
  </g>

  <!-- Footer -->
  <text x="450" y="630" text-anchor="middle" fill="#556677" font-size="11">The Shared Factor Bridge — Formally Verified in Lean 4</text>
</svg>
