<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="qcbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2e1a;stop-opacity:1" />
    </linearGradient>
    <filter id="qcglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#qcbg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#FFD700" font-size="22" font-weight="bold" filter="url(#qcglow)">
    The Quantum ↔ Classical Bridge
  </text>
  <text x="450" y="58" text-anchor="middle" fill="#aaa" font-size="12" font-style="italic">
    Commutativity restores Boolean logic and classical measurement
  </text>

  <!-- Quantum side (left) -->
  <rect x="30" y="80" width="380" height="350" rx="15" fill="#1a0a2e" stroke="#9C27B0" stroke-width="2" opacity="0.8"/>
  <text x="220" y="110" text-anchor="middle" fill="#CE93D8" font-size="18" font-weight="bold">QUANTUM WORLD</text>

  <text x="50" y="145" fill="#CE93D8" font-size="13">• Noncommutative C*-algebra A</text>
  <text x="50" y="170" fill="#CE93D8" font-size="13">• AB ≠ BA (operators don't commute)</text>
  <text x="50" y="195" fill="#CE93D8" font-size="13">• Proj(A) = orthomodular lattice</text>
  <text x="50" y="220" fill="#CE93D8" font-size="13">• Distributivity FAILS</text>
  <text x="50" y="245" fill="#CE93D8" font-size="13">• Superposition of states</text>
  <text x="50" y="270" fill="#CE93D8" font-size="13">• Heisenberg uncertainty</text>
  <text x="50" y="295" fill="#CE93D8" font-size="13">• Entanglement</text>
  <text x="50" y="320" fill="#CE93D8" font-size="13">• P² = P (measurement collapse)</text>

  <rect x="60" y="340" width="320" height="35" rx="8" fill="#2a1a3e" stroke="#9C27B0" stroke-width="1"/>
  <text x="220" y="363" text-anchor="middle" fill="#E1BEE7" font-size="12" font-weight="bold">
    ‖[P, Q]‖ > 0 → incompatible observables
  </text>

  <text x="220" y="410" text-anchor="middle" fill="#9C27B0" font-size="36" filter="url(#qcglow)">ψ⟩</text>

  <!-- Classical side (right) -->
  <rect x="490" y="80" width="380" height="350" rx="15" fill="#0a2e1a" stroke="#4CAF50" stroke-width="2" opacity="0.8"/>
  <text x="680" y="110" text-anchor="middle" fill="#A5D6A7" font-size="18" font-weight="bold">CLASSICAL WORLD</text>

  <text x="510" y="145" fill="#A5D6A7" font-size="13">• Commutative C*-algebra C(X)</text>
  <text x="510" y="170" fill="#A5D6A7" font-size="13">• fg = gf (functions commute)</text>
  <text x="510" y="195" fill="#A5D6A7" font-size="13">• Proj(C(X)) = Boolean algebra</text>
  <text x="510" y="220" fill="#A5D6A7" font-size="13">• Full distributivity</text>
  <text x="510" y="245" fill="#A5D6A7" font-size="13">• Definite states (0 or 1)</text>
  <text x="510" y="270" fill="#A5D6A7" font-size="13">• No uncertainty</text>
  <text x="510" y="295" fill="#A5D6A7" font-size="13">• No entanglement</text>
  <text x="510" y="320" fill="#A5D6A7" font-size="13">• e² = e (connected components)</text>

  <rect x="520" y="340" width="320" height="35" rx="8" fill="#1a2e1a" stroke="#4CAF50" stroke-width="1"/>
  <text x="680" y="363" text-anchor="middle" fill="#C8E6C9" font-size="12" font-weight="bold">
    [f, g] = 0 for all f, g → Boolean logic
  </text>

  <text x="680" y="410" text-anchor="middle" fill="#4CAF50" font-size="36" filter="url(#qcglow)">x ∈ X</text>

  <!-- Bridge arrow -->
  <line x1="410" y1="250" x2="490" y2="250" stroke="#FFD700" stroke-width="3"/>
  <polygon points="490,245 500,250 490,255" fill="#FFD700"/>
  <text x="450" y="230" text-anchor="middle" fill="#FFD700" font-size="11" font-weight="bold">restore</text>
  <text x="450" y="244" text-anchor="middle" fill="#FFD700" font-size="11" font-weight="bold">commutativity</text>

  <!-- Reverse arrow -->
  <line x1="490" y1="280" x2="410" y2="280" stroke="#FF9800" stroke-width="3"/>
  <polygon points="410,275 400,280 410,285" fill="#FF9800"/>
  <text x="450" y="298" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="bold">quantize</text>

  <!-- Bottom insight -->
  <rect x="100" y="445" width="700" height="40" rx="8" fill="#111133" stroke="#FFD700" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold">
    The quantum→classical transition is the transition from P² = P (projections)
  </text>
  <text x="450" y="478" text-anchor="middle" fill="#ddd" font-size="12">
    to e² = e (Boolean idempotents) — from orthomodular to distributive lattice
  </text>
</svg>
