<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#2a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <text x="400" y="35" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">
    THE BRIER SCORE: Why Honest Predictions Win
  </text>
  <text x="400" y="55" text-anchor="middle" fill="#aaa" font-size="12" font-style="italic">
    Expected Brier Score E[BS] = p(1-q)² + (1-p)q² is minimized at q = p
  </text>

  <!-- Axes -->
  <g transform="translate(100, 70)">
    <!-- Grid -->
    <g stroke="#333" stroke-width="0.5">
      <line x1="0" y1="0" x2="0" y2="350"/>
      <line x1="0" y1="350" x2="600" y2="350"/>
      <line x1="0" y1="87.5" x2="600" y2="87.5" stroke-dasharray="3,3"/>
      <line x1="0" y1="175" x2="600" y2="175" stroke-dasharray="3,3"/>
      <line x1="0" y1="262.5" x2="600" y2="262.5" stroke-dasharray="3,3"/>
    </g>

    <!-- Y-axis labels -->
    <text x="-10" y="5" text-anchor="end" fill="#888" font-size="11">1.0</text>
    <text x="-10" y="92" text-anchor="end" fill="#888" font-size="11">0.75</text>
    <text x="-10" y="180" text-anchor="end" fill="#888" font-size="11">0.50</text>
    <text x="-10" y="267" text-anchor="end" fill="#888" font-size="11">0.25</text>
    <text x="-10" y="355" text-anchor="end" fill="#888" font-size="11">0</text>
    <text x="-45" y="175" text-anchor="middle" fill="#aaa" font-size="12" transform="rotate(-90,-45,175)">E[Brier Score]</text>

    <!-- X-axis labels -->
    <text x="0" y="370" text-anchor="middle" fill="#888" font-size="11">0</text>
    <text x="150" y="370" text-anchor="middle" fill="#888" font-size="11">0.25</text>
    <text x="300" y="370" text-anchor="middle" fill="#888" font-size="11">0.50</text>
    <text x="450" y="370" text-anchor="middle" fill="#888" font-size="11">0.75</text>
    <text x="600" y="370" text-anchor="middle" fill="#888" font-size="11">1.0</text>
    <text x="300" y="390" text-anchor="middle" fill="#aaa" font-size="12">Predicted probability q</text>

    <!-- Curve for p = 0.3 (true probability) -->
    <!-- E[BS] = 0.3(1-q)² + 0.7q² = 0.3 - 0.6q + 0.3q² + 0.7q² = q² - 0.6q + 0.3 -->
    <path d="M 0,105 Q 180,315 300,276.5 Q 420,240 600,105" fill="none" stroke="#4ecdc4" stroke-width="2.5"/>
    <text x="50" y="95" fill="#4ecdc4" font-size="12">p = 0.3</text>

    <!-- Curve for p = 0.5 -->
    <!-- E[BS] = 0.5(1-q)² + 0.5q² = 0.5 - q + q² = (q-0.5)² + 0.25 -->
    <path d="M 0,175 Q 150,280 300,262.5 Q 450,280 600,175" fill="none" stroke="#feca57" stroke-width="2.5"/>
    <text x="520" y="168" fill="#feca57" font-size="12">p = 0.5</text>

    <!-- Curve for p = 0.7 -->
    <!-- E[BS] = 0.7(1-q)² + 0.3q² = q² - 1.4q + 0.7 -->
    <path d="M 0,105 Q 180,240 420,276.5 Q 540,260 600,105" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="520" y="95" fill="#ff6b6b" font-size="12">p = 0.7</text>

    <!-- Optimal points -->
    <circle cx="180" cy="276.5" r="6" fill="#4ecdc4" stroke="white" stroke-width="1.5"/>
    <circle cx="300" cy="262.5" r="6" fill="#feca57" stroke="white" stroke-width="1.5"/>
    <circle cx="420" cy="276.5" r="6" fill="#ff6b6b" stroke="white" stroke-width="1.5"/>

    <!-- Arrow to optimal -->
    <line x1="300" y1="262.5" x2="300" y2="350" stroke="#feca57" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="300" y="310" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">q* = p</text>
  </g>

  <!-- Theorem box -->
  <rect x="100" y="450" width="600" height="40" rx="5" fill="rgba(78,205,196,0.1)" stroke="#4ecdc4" stroke-width="1"/>
  <text x="400" y="475" text-anchor="middle" fill="#4ecdc4" font-size="14">
    THEOREM (brier_optimal_prediction): ∀ p ∈ [0,1], ∀ q: E[BS(p,·)] ≥ E[BS(q*,·)] where q* = p
  </text>
</svg>
