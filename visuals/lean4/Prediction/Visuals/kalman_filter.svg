<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd700"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bg4)"/>

  <text x="450" y="40" text-anchor="middle" fill="#ffd700" font-size="24" font-weight="bold">
    THE KALMAN FILTER: Optimal Linear Prediction
  </text>

  <!-- Predict Step Box -->
  <rect x="50" y="80" width="350" height="200" rx="10" fill="rgba(78,205,196,0.1)" stroke="#4ecdc4" stroke-width="2"/>
  <text x="225" y="110" text-anchor="middle" fill="#4ecdc4" font-size="18" font-weight="bold">PREDICT</text>
  <text x="225" y="115" text-anchor="middle" fill="#4ecdc4" font-size="12">────────────────────</text>

  <text x="80" y="150" fill="#ddd" font-size="14">State prediction:</text>
  <text x="80" y="175" fill="#4ecdc4" font-size="16" font-weight="bold">x̂⁻ₖ = A · x̂ₖ₋₁</text>

  <text x="80" y="210" fill="#ddd" font-size="14">Covariance prediction:</text>
  <text x="80" y="235" fill="#4ecdc4" font-size="16" font-weight="bold">P⁻ₖ = A²Pₖ₋₁ + Q</text>

  <text x="80" y="265" fill="#888" font-size="11" font-style="italic">"Project the state forward in time"</text>

  <!-- Arrow from Predict to Update -->
  <line x1="400" y1="180" x2="490" y2="180" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="445" y="170" text-anchor="middle" fill="#ffd700" font-size="12">measurement</text>
  <text x="445" y="195" text-anchor="middle" fill="#ffd700" font-size="12">zₖ arrives</text>

  <!-- Update Step Box -->
  <rect x="500" y="80" width="370" height="200" rx="10" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="685" y="110" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="bold">UPDATE</text>
  <text x="685" y="115" text-anchor="middle" fill="#ff6b6b" font-size="12">────────────────────</text>

  <text x="530" y="145" fill="#ddd" font-size="14">Kalman gain:</text>
  <text x="530" y="170" fill="#ffd700" font-size="16" font-weight="bold">K = P⁻H / (H²P⁻ + R)</text>

  <text x="530" y="200" fill="#ddd" font-size="14">State update:</text>
  <text x="530" y="225" fill="#ff6b6b" font-size="16" font-weight="bold">x̂ₖ = x̂⁻ₖ + K(zₖ - Hx̂⁻ₖ)</text>

  <text x="530" y="255" fill="#ddd" font-size="14">Covariance update:</text>
  <text x="530" y="275" fill="#ff6b6b" font-size="16" font-weight="bold">Pₖ = (1 - KH)P⁻ₖ</text>

  <!-- Feedback Arrow -->
  <path d="M 685,280 L 685,320 L 225,320 L 225,280" fill="none" stroke="#a29bfe" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>
  <text x="455" y="340" text-anchor="middle" fill="#a29bfe" font-size="12">feedback loop (next time step)</text>

  <!-- The Kalman Gain Interpretation -->
  <rect x="50" y="370" width="800" height="210" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(255,215,0,0.3)"/>

  <text x="450" y="400" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold">
    THE KALMAN GAIN: Trust vs. Verify
  </text>

  <!-- Scale diagram -->
  <g transform="translate(100, 430)">
    <!-- Scale bar -->
    <rect x="0" y="20" width="600" height="8" rx="4" fill="#333"/>

    <!-- Low R end (trust measurements) -->
    <rect x="0" y="20" width="100" height="8" rx="4" fill="#4ecdc4"/>
    <text x="0" y="15" fill="#4ecdc4" font-size="11" font-weight="bold">R → 0</text>
    <text x="0" y="50" fill="#4ecdc4" font-size="10">K → 1/H</text>
    <text x="0" y="65" fill="#4ecdc4" font-size="10">Trust measurements</text>

    <!-- High R end (trust model) -->
    <rect x="500" y="20" width="100" height="8" rx="4" fill="#ff6b6b"/>
    <text x="600" y="15" text-anchor="end" fill="#ff6b6b" font-size="11" font-weight="bold">R → ∞</text>
    <text x="600" y="50" text-anchor="end" fill="#ff6b6b" font-size="10">K → 0</text>
    <text x="600" y="65" text-anchor="end" fill="#ff6b6b" font-size="10">Trust prediction</text>

    <!-- Middle -->
    <text x="300" y="60" text-anchor="middle" fill="#feca57" font-size="11">Optimal balance</text>
  </g>

  <!-- Theorems -->
  <g transform="translate(100, 510)">
    <text x="0" y="0" fill="#ddd" font-size="12">
      ✓ kalman_gain_bounded: 0 ≤ K ≤ 1/H
    </text>
    <text x="0" y="20" fill="#ddd" font-size="12">
      ✓ kalman_unbiased: E[x̂ₖ] = xₖ (unbiased estimator)
    </text>
    <text x="350" y="0" fill="#ddd" font-size="12">
      ✓ riccati_nonneg: Pₖ ≥ 0 always
    </text>
    <text x="350" y="20" fill="#ddd" font-size="12">
      ✓ no_observation_variance_grows: H=0 ⟹ P grows
    </text>
  </g>

  <text x="450" y="555" text-anchor="middle" fill="#888" font-size="11" font-style="italic">
    All properties formally verified in KalmanFilter.lean
  </text>
</svg>
