<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Georgia, serif">
  <defs>
    <linearGradient id="tropbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a" />
      <stop offset="100%" style="stop-color:#1a2a0a" />
    </linearGradient>
    <filter id="tropglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#tropbg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FFEB3B" font-size="24" font-weight="bold" filter="url(#tropglow)">
    Tropical Self-Reference
  </text>
  <text x="400" y="65" text-anchor="middle" fill="#aaaa44" font-size="13" font-style="italic">
    When the Rosetta Stone translates itself into the tropical semiring
  </text>

  <!-- The mirror: two copies of the equation -->
  <!-- Top: Classical view -->
  <rect x="200" y="90" width="400" height="70" rx="15" fill="#1a1a0a" stroke="#FFEB3B" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" fill="#FFEB3B" font-size="18" font-weight="bold">Classical: e² = e</text>
  <text x="400" y="145" text-anchor="middle" fill="#cccc66" font-size="12">Only some elements satisfy this (idempotents)</text>

  <!-- Arrow down (tropicalization) -->
  <text x="400" y="185" text-anchor="middle" fill="#888" font-size="14">↓ tropicalize ↓</text>
  <text x="400" y="200" text-anchor="middle" fill="#666" font-size="11">+ → min, × → +</text>

  <!-- Bottom: Tropical view -->
  <rect x="200" y="215" width="400" height="70" rx="15" fill="#2a2a0a" stroke="#FFEB3B" stroke-width="3"/>
  <text x="400" y="243" text-anchor="middle" fill="#FFEB3B" font-size="18" font-weight="bold">Tropical: a ⊕ a = a</text>
  <text x="400" y="270" text-anchor="middle" fill="#cccc66" font-size="12">ALL elements satisfy this (universal!)</text>

  <!-- The mirror reflection -->
  <line x1="150" y1="310" x2="650" y2="310" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <text x="400" y="330" text-anchor="middle" fill="#FFEB3B" font-size="14">═══ THE MIRROR ═══</text>

  <!-- Tropical polynomial visualization -->
  <!-- f(x) = min(3, 1+x, 2x) = piecewise linear -->
  <g transform="translate(100, 340)">
    <text x="300" y="15" text-anchor="middle" fill="#FFEB3B" font-size="14" font-weight="bold">
      Tropical Polynomial: min(3, 1+x, 2x)
    </text>

    <!-- Axes -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="#555" stroke-width="1"/>
    <line x1="300" y1="30" x2="300" y2="210" stroke="#555" stroke-width="1"/>
    <text x="560" y="205" fill="#555" font-size="10">x</text>
    <text x="305" y="25" fill="#555" font-size="10">y</text>

    <!-- Grid lines -->
    <line x1="50" y1="100" x2="550" y2="100" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="50" y1="150" x2="550" y2="150" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="200" y1="30" x2="200" y2="210" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="400" y1="30" x2="400" y2="210" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- y = 3 (constant, dominant for x < 1) -->
    <line x1="50" y1="50" x2="350" y2="50" stroke="#ff6666" stroke-width="1.5" opacity="0.4"/>
    <text x="100" y="45" fill="#ff6666" font-size="10" opacity="0.6">y = 3</text>

    <!-- y = 1 + x (linear, dominant for 1 ≤ x ≤ 2) -->
    <line x1="50" y1="150" x2="550" y2="-100" stroke="#66ff66" stroke-width="1.5" opacity="0.4"/>
    <text x="450" y="40" fill="#66ff66" font-size="10" opacity="0.6">y = 1+x</text>

    <!-- y = 2x (steeper, dominant for x > 2) -->
    <line x1="150" y1="200" x2="450" y2="-100" stroke="#6666ff" stroke-width="1.5" opacity="0.4"/>
    <text x="430" y="60" fill="#6666ff" font-size="10" opacity="0.6">y = 2x</text>

    <!-- The tropical polynomial = minimum (thick yellow) -->
    <!-- For x < 1: min = 2x (when 2x < 1+x and 2x < 3, i.e. x < 1) ... actually let's compute:
         At x=0: min(3, 1, 0) = 0 (2x dominant)
         At x=1: min(3, 2, 2) = 2 (1+x and 2x tie)
         At x=2: min(3, 3, 4) = 3 (3 and 1+x tie)
         For x < 1: 2x < 1+x when x < 1; 2x < 3 when x < 1.5. So 2x dominates for x < 1
         For 1 ≤ x ≤ 2: 1+x ≤ 2x and 1+x ≤ 3. So 1+x dominates
         For x > 2: 3 ≤ 1+x and 3 ≤ 2x. So 3 dominates -->
    <!-- Scale: x range [-2, 4], y range [-1, 5]. x=0 at 300, scale 50px per unit. y=0 at 200, scale -50px per unit -->
    <!-- x < 1 (x pixel < 350): y = 2x. At x=-2 (px=200): y=-4 (px=400). At x=1 (px=350): y=2 (px=100) -->
    <polyline points="200,200 350,100 400,50 550,50" fill="none" stroke="#FFEB3B" stroke-width="3" filter="url(#tropglow)"/>

    <!-- Root markers (corners) -->
    <circle cx="350" cy="100" r="6" fill="#FFEB3B" filter="url(#tropglow)"/>
    <text x="360" y="90" fill="#FFEB3B" font-size="10">root x=1</text>

    <circle cx="400" cy="50" r="6" fill="#FFEB3B" filter="url(#tropglow)"/>
    <text x="410" y="45" fill="#FFEB3B" font-size="10">root x=2</text>

    <!-- Labels -->
    <text x="300" y="230" text-anchor="middle" fill="#999" font-size="11">
      Tropical roots = corners of piecewise linear function
    </text>
  </g>
</svg>
