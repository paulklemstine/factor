<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#fafafa" rx="10"/>

  <text x="400" y="35" text-anchor="middle" fill="#333" font-size="22" font-weight="bold">
    The Universal Collapse Theorem
  </text>
  <text x="400" y="60" text-anchor="middle" fill="#666" font-size="14" font-style="italic">
    For ANY nonempty S ⊆ α, there exists an idempotent f with range(f) = S
  </text>

  <!-- Spectrum visualization -->
  <g transform="translate(50, 90)">
    <!-- Identity (all points fixed) -->
    <g transform="translate(0, 0)">
      <text x="60" y="15" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Identity</text>
      <text x="60" y="30" text-anchor="middle" fill="#666" font-size="10">|S| = n</text>
      <circle cx="20" cy="60" r="6" fill="#e74c3c"/>
      <circle cx="40" cy="50" r="6" fill="#3498db"/>
      <circle cx="60" cy="70" r="6" fill="#2ecc71"/>
      <circle cx="80" cy="55" r="6" fill="#9b59b6"/>
      <circle cx="100" cy="65" r="6" fill="#e67e22"/>
    </g>

    <!-- Partial collapse -->
    <g transform="translate(160, 0)">
      <text x="60" y="15" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Partial</text>
      <text x="60" y="30" text-anchor="middle" fill="#666" font-size="10">|S| = 3</text>
      <circle cx="30" cy="55" r="8" fill="#e74c3c" stroke="#333" stroke-width="2"/>
      <circle cx="60" cy="65" r="8" fill="#3498db" stroke="#333" stroke-width="2"/>
      <circle cx="90" cy="55" r="8" fill="#2ecc71" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="75" r="4" fill="#e74c3c" opacity="0.4"/>
      <circle cx="75" cy="45" r="4" fill="#3498db" opacity="0.4"/>
      <line x1="20" y1="75" x2="28" y2="58" stroke="#999" stroke-dasharray="3"/>
      <line x1="75" y1="45" x2="62" y2="63" stroke="#999" stroke-dasharray="3"/>
    </g>

    <!-- Binary collapse -->
    <g transform="translate(320, 0)">
      <text x="60" y="15" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Binary</text>
      <text x="60" y="30" text-anchor="middle" fill="#666" font-size="10">|S| = 2</text>
      <circle cx="35" cy="60" r="10" fill="#e74c3c" stroke="#333" stroke-width="2"/>
      <circle cx="85" cy="60" r="10" fill="#3498db" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="50" r="4" fill="#e74c3c" opacity="0.4"/>
      <circle cx="50" cy="75" r="4" fill="#e74c3c" opacity="0.4"/>
      <circle cx="70" cy="45" r="4" fill="#3498db" opacity="0.4"/>
      <circle cx="100" cy="70" r="4" fill="#3498db" opacity="0.4"/>
    </g>

    <!-- Total collapse -->
    <g transform="translate(480, 0)">
      <text x="60" y="15" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Total</text>
      <text x="60" y="30" text-anchor="middle" fill="#666" font-size="10">|S| = 1</text>
      <circle cx="60" cy="60" r="12" fill="#FFD700" stroke="#333" stroke-width="2"/>
      <circle cx="30" cy="50" r="4" fill="#FFD700" opacity="0.4"/>
      <circle cx="40" cy="75" r="4" fill="#FFD700" opacity="0.4"/>
      <circle cx="80" cy="45" r="4" fill="#FFD700" opacity="0.4"/>
      <circle cx="90" cy="70" r="4" fill="#FFD700" opacity="0.4"/>
      <circle cx="55" cy="80" r="4" fill="#FFD700" opacity="0.4"/>
    </g>

    <!-- Arrow showing spectrum -->
    <line x1="0" y1="100" x2="540" y2="100" stroke="#333" stroke-width="2"/>
    <polygon points="540,95 550,100 540,105" fill="#333"/>
    <text x="270" y="120" text-anchor="middle" fill="#666" font-size="11">
      Collapse Spectrum: any cardinality from 1 to n is achievable
    </text>
  </g>

  <!-- Properties box -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="700" height="200" fill="#fff" stroke="#ddd" stroke-width="2" rx="10"/>
    <text x="350" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">
      Proven Properties (Lean 4 + Mathlib, sorry-free)
    </text>
    <line x1="20" y1="35" x2="680" y2="35" stroke="#eee"/>

    <text x="30" y="60" fill="#333" font-size="13">✅ <tspan font-weight="bold">Idempotent:</tspan> f(f(x)) = f(x) for all x</text>
    <text x="30" y="85" fill="#333" font-size="13">✅ <tspan font-weight="bold">Image = Fixed Points:</tspan> range(f) = {x | f(x) = x}</text>
    <text x="30" y="110" fill="#333" font-size="13">✅ <tspan font-weight="bold">Hierarchy Flat:</tspan> f^n = f for all n ≥ 1</text>
    <text x="30" y="135" fill="#333" font-size="13">✅ <tspan font-weight="bold">Universal:</tspan> For any nonempty S, ∃ idempotent f with range(f) = S</text>
    <text x="30" y="160" fill="#333" font-size="13">✅ <tspan font-weight="bold">Injective on Image:</tspan> f is injective when restricted to range(f)</text>
    <text x="30" y="185" fill="#333" font-size="13">✅ <tspan font-weight="bold">Spectrum:</tspan> Any intermediate cardinality 1 ≤ m ≤ n is achievable on Fin n</text>
  </g>

  <text x="400" y="475" text-anchor="middle" fill="#999" font-size="11">
    From IdempotentCollapse/Core.lean — 12 theorems, 0 sorries, 0 non-standard axioms
  </text>
</svg>
