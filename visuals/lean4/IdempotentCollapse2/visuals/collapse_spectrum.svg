<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d32f2f" />
      <stop offset="25%" style="stop-color:#f57c00" />
      <stop offset="50%" style="stop-color:#fbc02d" />
      <stop offset="75%" style="stop-color:#388e3c" />
      <stop offset="100%" style="stop-color:#1976d2" />
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="#fafafa"/>

  <text x="450" y="40" text-anchor="middle" fill="#212529" font-size="26" font-weight="bold">
    The Collapse Spectrum
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#666" font-size="14">
    Every idempotent f : α → α lives on a spectrum from total collapse to no collapse
  </text>

  <!-- Spectrum bar -->
  <rect x="80" y="100" width="740" height="30" rx="15" fill="url(#spectrum)" filter="url(#s)"/>

  <!-- Labels -->
  <text x="80" y="155" text-anchor="middle" fill="#d32f2f" font-size="13" font-weight="bold">Constant</text>
  <text x="80" y="172" text-anchor="middle" fill="#d32f2f" font-size="11">f(x) = c</text>
  <text x="80" y="189" text-anchor="middle" fill="#888" font-size="10">|Image| = 1</text>

  <text x="450" y="155" text-anchor="middle" fill="#f57c00" font-size="13" font-weight="bold">Projection</text>
  <text x="450" y="172" text-anchor="middle" fill="#f57c00" font-size="11">f(x,y) = (x,0)</text>
  <text x="450" y="189" text-anchor="middle" fill="#888" font-size="10">|Image| = dim/2</text>

  <text x="820" y="155" text-anchor="middle" fill="#1976d2" font-size="13" font-weight="bold">Identity</text>
  <text x="820" y="172" text-anchor="middle" fill="#1976d2" font-size="11">f(x) = x</text>
  <text x="820" y="189" text-anchor="middle" fill="#888" font-size="10">|Image| = |α|</text>

  <!-- Tick marks -->
  <line x1="80" y1="130" x2="80" y2="100" stroke="#d32f2f" stroke-width="2"/>
  <line x1="450" y1="130" x2="450" y2="100" stroke="#f57c00" stroke-width="2"/>
  <line x1="820" y1="130" x2="820" y2="100" stroke="#1976d2" stroke-width="2"/>

  <!-- Example diagrams below -->

  <!-- Total Collapse -->
  <g transform="translate(80, 250)">
    <rect x="-60" y="-20" width="120" height="130" rx="10" fill="#fff" stroke="#d32f2f" stroke-width="2" filter="url(#s)"/>
    <circle cx="-30" cy="15" r="5" fill="#ddd"/>
    <circle cx="0" cy="0" r="5" fill="#ddd"/>
    <circle cx="30" cy="10" r="5" fill="#ddd"/>
    <circle cx="-20" cy="40" r="5" fill="#ddd"/>
    <circle cx="20" cy="35" r="5" fill="#ddd"/>
    <circle cx="0" cy="80" r="8" fill="#d32f2f"/>
    <line x1="-30" y1="20" x2="-3" y2="73" stroke="#d32f2f" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="5" x2="0" y2="72" stroke="#d32f2f" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="15" x2="3" y2="73" stroke="#d32f2f" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="45" x2="-3" y2="73" stroke="#d32f2f" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="40" x2="3" y2="73" stroke="#d32f2f" stroke-width="1" opacity="0.5"/>
    <text x="0" y="105" text-anchor="middle" fill="#d32f2f" font-size="10">All → one point</text>
  </g>

  <!-- Partial Collapse -->
  <g transform="translate(300, 250)">
    <rect x="-60" y="-20" width="120" height="130" rx="10" fill="#fff" stroke="#f57c00" stroke-width="2" filter="url(#s)"/>
    <circle cx="-30" cy="10" r="5" fill="#ddd"/>
    <circle cx="0" cy="5" r="5" fill="#ddd"/>
    <circle cx="30" cy="15" r="5" fill="#ddd"/>
    <circle cx="-25" cy="70" r="7" fill="#f57c00"/>
    <circle cx="25" cy="70" r="7" fill="#f57c00"/>
    <line x1="-30" y1="15" x2="-25" y2="63" stroke="#f57c00" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="10" x2="-23" y2="63" stroke="#f57c00" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="20" x2="25" y2="63" stroke="#f57c00" stroke-width="1" opacity="0.5"/>
    <text x="0" y="105" text-anchor="middle" fill="#f57c00" font-size="10">Many → few</text>
  </g>

  <!-- Projection -->
  <g transform="translate(450, 250)">
    <rect x="-60" y="-20" width="120" height="130" rx="10" fill="#fff" stroke="#fbc02d" stroke-width="2" filter="url(#s)"/>
    <!-- 2D → 1D projection -->
    <circle cx="-30" cy="20" r="5" fill="#ddd"/>
    <circle cx="10" cy="10" r="5" fill="#ddd"/>
    <circle cx="30" cy="30" r="5" fill="#ddd"/>
    <line x1="-50" y1="70" x2="50" y2="70" stroke="#fbc02d" stroke-width="3"/>
    <circle cx="-30" cy="70" r="5" fill="#fbc02d"/>
    <circle cx="10" cy="70" r="5" fill="#fbc02d"/>
    <circle cx="30" cy="70" r="5" fill="#fbc02d"/>
    <line x1="-30" y1="25" x2="-30" y2="65" stroke="#fbc02d" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
    <line x1="10" y1="15" x2="10" y2="65" stroke="#fbc02d" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
    <line x1="30" y1="35" x2="30" y2="65" stroke="#fbc02d" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
    <text x="0" y="105" text-anchor="middle" fill="#f9a825" font-size="10">Dimension reduction</text>
  </g>

  <!-- Selective Collapse -->
  <g transform="translate(600, 250)">
    <rect x="-60" y="-20" width="120" height="130" rx="10" fill="#fff" stroke="#388e3c" stroke-width="2" filter="url(#s)"/>
    <circle cx="-30" cy="30" r="7" fill="#388e3c"/>
    <circle cx="0" cy="20" r="5" fill="#ddd"/>
    <circle cx="30" cy="40" r="7" fill="#388e3c"/>
    <circle cx="-15" cy="60" r="7" fill="#388e3c"/>
    <circle cx="20" cy="70" r="5" fill="#ddd"/>
    <line x1="0" y1="25" x2="-27" y2="30" stroke="#388e3c" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="65" x2="28" y2="45" stroke="#388e3c" stroke-width="1" opacity="0.5"/>
    <text x="0" y="105" text-anchor="middle" fill="#388e3c" font-size="10">Some move, most stay</text>
  </g>

  <!-- Identity (no collapse) -->
  <g transform="translate(780, 250)">
    <rect x="-60" y="-20" width="120" height="130" rx="10" fill="#fff" stroke="#1976d2" stroke-width="2" filter="url(#s)"/>
    <circle cx="-30" cy="20" r="7" fill="#1976d2"/>
    <circle cx="0" cy="40" r="7" fill="#1976d2"/>
    <circle cx="30" cy="15" r="7" fill="#1976d2"/>
    <circle cx="-20" cy="65" r="7" fill="#1976d2"/>
    <circle cx="25" cy="55" r="7" fill="#1976d2"/>
    <!-- Self loops -->
    <path d="M-30,13 C-45,5 -45,35 -30,27" fill="none" stroke="#1976d2" stroke-width="1" opacity="0.5"/>
    <path d="M0,33 C-15,25 -15,55 0,47" fill="none" stroke="#1976d2" stroke-width="1" opacity="0.5"/>
    <text x="0" y="105" text-anchor="middle" fill="#1976d2" font-size="10">All fixed: f(x) = x</text>
  </g>

  <!-- Bottom theorem -->
  <rect x="50" y="420" width="800" height="60" rx="10" fill="#263238" filter="url(#s)"/>
  <text x="450" y="448" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">
    Collapse Spectrum Theorem (Proved in Lean 4):
  </text>
  <text x="450" y="468" text-anchor="middle" fill="#b0bec5" font-size="13">
    ∀ 0 &lt; m ≤ n, ∃ f : Fin n → Fin n, Idempotent f ∧ |Image(f)| = m
  </text>
</svg>
