<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <!-- Background -->
  <rect width="1000" height="700" fill="#0a0a2e"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="white" font-size="22" font-family="sans-serif" font-weight="bold">The Pythagorean Light Hypothesis: Logical Chain</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffdd44"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6666"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Box 1: Premise -->
  <rect x="50" y="80" width="260" height="90" rx="12" fill="#1a1a4e" stroke="#4488ff" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" fill="#88bbff" font-size="12" font-family="sans-serif">PREMISE</text>
  <text x="180" y="132" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">Light propagation obeys</text>
  <text x="180" y="152" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">Pythagorean triplets</text>
  
  <!-- Pythagorean illustration -->
  <rect x="370" y="80" width="260" height="90" rx="12" fill="#1a1a4e" stroke="#44ff88" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" fill="#88ffbb" font-size="12" font-family="sans-serif">MATHEMATICAL FACT</text>
  <text x="500" y="130" text-anchor="middle" fill="white" font-size="18" font-family="serif" font-style="italic">a² + b² = c²</text>
  <text x="500" y="155" text-anchor="middle" fill="#aaa" font-size="12" font-family="sans-serif">a, b, c ∈ ℤ (integers only)</text>
  
  <!-- Box 2: Implication 1 -->
  <rect x="690" y="80" width="260" height="90" rx="12" fill="#1a1a4e" stroke="#ffaa44" stroke-width="2"/>
  <text x="820" y="105" text-anchor="middle" fill="#ffcc88" font-size="12" font-family="sans-serif">IMPLICATION 1</text>
  <text x="820" y="130" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">Displacements come in</text>
  <text x="820" y="150" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">integer multiples of λ₀</text>
  
  <!-- Arrows row 1 -->
  <line x1="310" y1="125" x2="365" y2="125" stroke="#ffdd44" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="630" y1="125" x2="685" y2="125" stroke="#ffdd44" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Box 3: Quantized Space -->
  <rect x="200" y="230" width="280" height="100" rx="12" fill="#2a1a4e" stroke="#ff44ff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="340" y="260" text-anchor="middle" fill="#ff88ff" font-size="12" font-family="sans-serif">CONCLUSION 1</text>
  <text x="340" y="285" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif" font-weight="bold">Space is QUANTIZED</text>
  <text x="340" y="310" text-anchor="middle" fill="#ccc" font-size="12" font-family="sans-serif">Positions form a discrete lattice</text>
  
  <!-- Box 4: Absolute Coordinates -->
  <rect x="540" y="230" width="280" height="100" rx="12" fill="#2a1a4e" stroke="#ff4444" stroke-width="2.5" filter="url(#glow)"/>
  <text x="680" y="260" text-anchor="middle" fill="#ff8888" font-size="12" font-family="sans-serif">CONCLUSION 2</text>
  <text x="680" y="285" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif" font-weight="bold">ABSOLUTE coordinates</text>
  <text x="680" y="310" text-anchor="middle" fill="#ccc" font-size="12" font-family="sans-serif">Lattice defines preferred frame</text>
  
  <!-- Arrows to conclusions -->
  <line x1="820" y1="175" x2="820" y2="195" stroke="#ffdd44" stroke-width="2"/>
  <line x1="820" y1="195" x2="500" y2="195" stroke="#ffdd44" stroke-width="1.5"/>
  <line x1="500" y1="195" x2="400" y2="225" stroke="#ffdd44" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="195" x2="620" y2="225" stroke="#ffdd44" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Consequences section -->
  <text x="500" y="380" text-anchor="middle" fill="#ffdd44" font-size="16" font-family="sans-serif" font-weight="bold">⚡ PHYSICAL CONSEQUENCES ⚡</text>
  
  <!-- Consequence boxes -->
  <rect x="30" y="405" width="220" height="80" rx="8" fill="#1a2a1a" stroke="#44ff44" stroke-width="1.5"/>
  <text x="140" y="430" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">Direction-dependent</text>
  <text x="140" y="450" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">speed of light</text>
  <text x="140" y="472" text-anchor="middle" fill="#668866" font-size="10" font-family="sans-serif">Testable via Michelson-Morley</text>
  
  <rect x="270" y="405" width="220" height="80" rx="8" fill="#1a2a1a" stroke="#44ff44" stroke-width="1.5"/>
  <text x="380" y="430" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">Modified dispersion</text>
  <text x="380" y="450" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">E ≠ pc at high energy</text>
  <text x="380" y="472" text-anchor="middle" fill="#668866" font-size="10" font-family="sans-serif">Testable via gamma-ray bursts</text>
  
  <rect x="510" y="405" width="220" height="80" rx="8" fill="#1a2a1a" stroke="#44ff44" stroke-width="1.5"/>
  <text x="620" y="430" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">Minimum length</text>
  <text x="620" y="450" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">ℓ_min = lattice spacing</text>
  <text x="620" y="472" text-anchor="middle" fill="#668866" font-size="10" font-family="sans-serif">Related to Planck length?</text>
  
  <rect x="750" y="405" width="220" height="80" rx="8" fill="#1a2a1a" stroke="#44ff44" stroke-width="1.5"/>
  <text x="860" y="430" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">Discrete allowed</text>
  <text x="860" y="450" text-anchor="middle" fill="#88ff88" font-size="11" font-family="sans-serif" font-weight="bold">angles of propagation</text>
  <text x="860" y="472" text-anchor="middle" fill="#668866" font-size="10" font-family="sans-serif">Dense for large scales</text>
  
  <!-- Status bar -->
  <rect x="100" y="530" width="800" height="80" rx="12" fill="#2a1a1a" stroke="#ff6666" stroke-width="1.5"/>
  <text x="500" y="555" text-anchor="middle" fill="#ff8888" font-size="13" font-family="sans-serif" font-weight="bold">⚠ CURRENT STATUS</text>
  <text x="500" y="578" text-anchor="middle" fill="#ffaaaa" font-size="12" font-family="sans-serif">Simple cubic lattice at Planck spacing: RULED OUT by Michelson-Morley (Δc/c &lt; 10⁻¹⁸)</text>
  <text x="500" y="598" text-anchor="middle" fill="#aaffaa" font-size="12" font-family="sans-serif">Random/irregular lattice or sub-Planckian spacing: Still viable — compatible with all observations</text>
  
  <!-- The 3-4-5 triangle illustration -->
  <g transform="translate(50, 540)">
    <line x1="0" y1="60" x2="36" y2="60" stroke="#4488ff" stroke-width="2"/>
    <line x1="36" y1="60" x2="36" y2="12" stroke="#4488ff" stroke-width="2"/>
    <line x1="0" y1="60" x2="36" y2="12" stroke="#ff4444" stroke-width="2.5"/>
    <text x="18" y="75" text-anchor="middle" fill="#4488ff" font-size="10" font-family="sans-serif">3</text>
    <text x="46" y="40" text-anchor="middle" fill="#4488ff" font-size="10" font-family="sans-serif">4</text>
    <text x="12" y="32" text-anchor="middle" fill="#ff4444" font-size="10" font-family="sans-serif">5</text>
  </g>
  
  <!-- Footer -->
  <text x="500" y="680" text-anchor="middle" fill="#444" font-size="10" font-family="sans-serif">Pythagorean Photonics Research Project — Conceptual Overview</text>
</svg>
