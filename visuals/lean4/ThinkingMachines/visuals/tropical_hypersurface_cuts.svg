<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Georgia, serif">
  <defs>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#0a0a1a" rx="20"/>

  <text x="600" y="45" text-anchor="middle" fill="#ecf0f1" font-size="28" font-weight="bold" filter="url(#glow3)">
    Bridge 3: Holographic ↔ Tropical
  </text>
  <text x="600" y="75" text-anchor="middle" fill="#bdc3c7" font-size="16" font-style="italic">
    Cut Complexity of Tropical Hypersurfaces Bounds Linear Regions
  </text>

  <!-- Tropical Hypersurface (left) -->
  <rect x="30" y="100" width="540" height="350" rx="15" fill="#1a2634" stroke="#2ecc71" stroke-width="2"/>
  <text x="300" y="130" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">
    Tropical Hypersurface T(f)
  </text>

  <!-- Draw a tropical curve -->
  <g transform="translate(50, 140)">
    <!-- Region colors -->
    <rect x="0" y="0" width="166" height="150" fill="#0d3320" opacity="0.5" rx="5"/>
    <rect x="166" y="0" width="167" height="150" fill="#0d1a33" opacity="0.5" rx="5"/>
    <rect x="333" y="0" width="167" height="150" fill="#1a0d33" opacity="0.5" rx="5"/>
    <rect x="0" y="150" width="250" height="140" fill="#33200d" opacity="0.5" rx="5"/>
    <rect x="250" y="150" width="250" height="140" fill="#330d0d" opacity="0.5" rx="5"/>

    <!-- Tropical curve edges -->
    <line x1="166" y1="0" x2="166" y2="150" stroke="#2ecc71" stroke-width="3"/>
    <line x1="333" y1="0" x2="333" y2="150" stroke="#2ecc71" stroke-width="3"/>
    <line x1="0" y1="150" x2="500" y2="150" stroke="#2ecc71" stroke-width="3"/>
    <line x1="166" y1="150" x2="250" y2="290" stroke="#2ecc71" stroke-width="3"/>
    <line x1="333" y1="150" x2="250" y2="290" stroke="#2ecc71" stroke-width="3"/>

    <!-- Vertices -->
    <circle cx="166" cy="150" r="6" fill="#e74c3c" filter="url(#glow3)"/>
    <circle cx="333" cy="150" r="6" fill="#e74c3c" filter="url(#glow3)"/>
    <circle cx="250" cy="290" r="6" fill="#e74c3c" filter="url(#glow3)"/>

    <!-- Region labels -->
    <text x="83" y="80" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">R₁</text>
    <text x="250" y="80" text-anchor="middle" fill="#3498db" font-size="14" font-weight="bold">R₂</text>
    <text x="416" y="80" text-anchor="middle" fill="#9b59b6" font-size="14" font-weight="bold">R₃</text>
    <text x="125" y="230" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="bold">R₄</text>
    <text x="375" y="230" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">R₅</text>

    <!-- Min-cut line -->
    <line x1="0" y1="75" x2="500" y2="75" stroke="#f39c12" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="480" y="68" fill="#f39c12" font-size="11" font-weight="bold">min-cut γ</text>

    <!-- Crossing marks -->
    <text x="166" y="65" text-anchor="middle" fill="#f39c12" font-size="18">✕</text>
    <text x="333" y="65" text-anchor="middle" fill="#f39c12" font-size="18">✕</text>
  </g>

  <!-- Right Panel: The Theorem -->
  <rect x="600" y="100" width="570" height="350" rx="15" fill="#1a1a2e" stroke="#f39c12" stroke-width="2"/>
  <text x="885" y="130" text-anchor="middle" fill="#f39c12" font-size="18" font-weight="bold">
    The Cut-Region Duality
  </text>

  <!-- Theorem box -->
  <rect x="620" y="145" width="530" height="100" rx="10" fill="#33200d" stroke="#f39c12" stroke-width="1"/>
  <text x="885" y="170" text-anchor="middle" fill="#f39c12" font-size="14" font-weight="bold">Main Theorem:</text>
  <text x="885" y="195" text-anchor="middle" fill="#fad390" font-size="13">For a ReLU network with tropical hypersurface T(f),</text>
  <text x="885" y="218" text-anchor="middle" fill="#ecf0f1" font-size="15" font-weight="bold">
    min-cut(T(f)) ≤ #Regions ≤ Montúfar bound
  </text>
  <text x="885" y="238" text-anchor="middle" fill="#fad390" font-size="12">The min-cut is the holographic entropy.</text>

  <!-- Three key relationships -->
  <rect x="620" y="260" width="170" height="85" rx="8" fill="#0d3320" stroke="#2ecc71" stroke-width="1"/>
  <text x="705" y="285" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Tropical</text>
  <text x="705" y="305" text-anchor="middle" fill="#a8e6cf" font-size="11">#cells of T(f)</text>
  <text x="705" y="325" text-anchor="middle" fill="#a8e6cf" font-size="11">= #linear regions</text>

  <rect x="800" y="260" width="170" height="85" rx="8" fill="#1a0d33" stroke="#9b59b6" stroke-width="1"/>
  <text x="885" y="285" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">Holographic</text>
  <text x="885" y="305" text-anchor="middle" fill="#d7bde2" font-size="11">min-cut = S(A)</text>
  <text x="885" y="325" text-anchor="middle" fill="#d7bde2" font-size="11">= RT entropy</text>

  <rect x="980" y="260" width="170" height="85" rx="8" fill="#0d1a33" stroke="#3498db" stroke-width="1"/>
  <text x="1065" y="285" text-anchor="middle" fill="#3498db" font-size="12" font-weight="bold">Network</text>
  <text x="1065" y="305" text-anchor="middle" fill="#a8d8ea" font-size="11">expressivity</text>
  <text x="1065" y="325" text-anchor="middle" fill="#a8d8ea" font-size="11">= model capacity</text>

  <!-- Connecting arrows -->
  <text x="753" y="303" fill="#f39c12" font-size="18">=</text>
  <text x="953" y="303" fill="#f39c12" font-size="18">≤</text>

  <!-- Scaling laws -->
  <rect x="620" y="355" width="530" height="85" rx="10" fill="#1a1a0d" stroke="#e67e22" stroke-width="1"/>
  <text x="885" y="378" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="bold">Scaling Laws</text>
  <text x="640" y="400" fill="#fad390" font-size="12">• Depth d:  min-cut grows as O(wᵈ) — exponential</text>
  <text x="640" y="420" fill="#fad390" font-size="12">• Width w:  min-cut grows as O(wⁿ) — polynomial in input dim n</text>
  <text x="640" y="435" fill="#f5b7b1" font-size="11" font-style="italic">  → Depth is exponentially more efficient than width (the depth advantage)</text>

  <!-- Bottom: Implications -->
  <rect x="30" y="470" width="1140" height="215" rx="15" fill="#0d1a33" stroke="#e74c3c" stroke-width="2"/>
  <text x="600" y="500" text-anchor="middle" fill="#e74c3c" font-size="20" font-weight="bold" filter="url(#glow3)">
    Implications for Deep Learning and Physics
  </text>

  <!-- Three columns -->
  <text x="220" y="535" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">Deep Learning</text>
  <text x="60" y="560" fill="#a8e6cf" font-size="12">• Network expressivity = tropical</text>
  <text x="60" y="580" fill="#a8e6cf" font-size="12">  hypersurface complexity</text>
  <text x="60" y="600" fill="#a8e6cf" font-size="12">• Optimal architecture = min-cost</text>
  <text x="60" y="620" fill="#a8e6cf" font-size="12">  tropical hypersurface for the task</text>
  <text x="60" y="640" fill="#a8e6cf" font-size="12">• Pruning = simplifying the</text>
  <text x="60" y="660" fill="#a8e6cf" font-size="12">  tropical hypersurface</text>

  <text x="600" y="535" text-anchor="middle" fill="#9b59b6" font-size="16" font-weight="bold">Holographic Physics</text>
  <text x="430" y="560" fill="#d7bde2" font-size="12">• Neural network = holographic bulk</text>
  <text x="430" y="580" fill="#d7bde2" font-size="12">• Decision boundary = holographic</text>
  <text x="430" y="600" fill="#d7bde2" font-size="12">  screen (boundary theory)</text>
  <text x="430" y="620" fill="#d7bde2" font-size="12">• Distillation = finding the</text>
  <text x="430" y="640" fill="#d7bde2" font-size="12">  minimal bulk description</text>
  <text x="430" y="660" fill="#d7bde2" font-size="12">• ER = EPR for neural networks?</text>

  <text x="1000" y="535" text-anchor="middle" fill="#e67e22" font-size="16" font-weight="bold">Millennium Problems</text>
  <text x="830" y="560" fill="#fad390" font-size="12">• P≠NP: tropical circuit lower</text>
  <text x="830" y="580" fill="#fad390" font-size="12">  bounds via min-cut complexity</text>
  <text x="830" y="600" fill="#fad390" font-size="12">• Yang-Mills: holographic mass gap</text>
  <text x="830" y="620" fill="#fad390" font-size="12">  = spectral gap of tropical</text>
  <text x="830" y="640" fill="#fad390" font-size="12">  Laplacian on hypersurface</text>
  <text x="830" y="660" fill="#fad390" font-size="12">• Hodge: tropical Hodge theory</text>
</svg>
