<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="oracleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="tropGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26de81"/>
      <stop offset="100%" stop-color="#20bf6b"/>
    </linearGradient>
    <linearGradient id="specGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4b7bec"/>
      <stop offset="100%" stop-color="#3867d6"/>
    </linearGradient>
    <linearGradient id="lightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed330"/>
      <stop offset="100%" stop-color="#f7b731"/>
    </linearGradient>
    <linearGradient id="quantGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a55eea"/>
      <stop offset="100%" stop-color="#8854d0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">The Five Grand Bridges</text>
  <text x="450" y="70" text-anchor="middle" fill="#8899aa" font-size="13">Cross-Domain Connections in 493 Machine-Verified Formalizations</text>

  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Oracle to all others -->
  <line x1="450" y1="180" x2="200" y2="350" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
  <line x1="450" y1="180" x2="450" y2="350" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
  <line x1="450" y1="180" x2="700" y2="350" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
  
  <!-- Tropical to Neural and Quantum -->
  <line x1="200" y1="350" x2="200" y2="530" stroke="#26de81" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="350" x2="700" y2="350" stroke="#aaaacc" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  
  <!-- Spec to Geometry -->
  <line x1="450" y1="350" x2="450" y2="530" stroke="#4b7bec" stroke-width="2" opacity="0.4"/>
  
  <!-- Quantum to Finance -->
  <line x1="700" y1="350" x2="700" y2="530" stroke="#a55eea" stroke-width="2" opacity="0.4"/>
  
  <!-- Light cone cross-connections -->
  <line x1="200" y1="530" x2="450" y2="530" stroke="#fed330" stroke-width="2" opacity="0.3"/>
  <line x1="450" y1="530" x2="700" y2="530" stroke="#fed330" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Central Oracle Node -->
  <g filter="shadow">
    <rect x="350" y="110" width="200" height="80" rx="15" fill="url(#oracleGrad)" filter="glow"/>
    <text x="450" y="142" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">ORACLE</text>
    <text x="450" y="160" text-anchor="middle" fill="#ffe0e0" font-size="11">O ∘ O = O</text>
    <text x="450" y="178" text-anchor="middle" fill="#ffe0e0" font-size="10">image(O) = Fix(O)</text>
  </g>

  <!-- Bridge 1 label -->
  <text x="310" y="260" text-anchor="middle" fill="#ff9999" font-size="10" transform="rotate(-30,310,260)">Bridge 1</text>
  <!-- Bridge 3 label -->
  <text x="450" y="270" text-anchor="middle" fill="#7799ee" font-size="10">Bridge 3</text>
  <!-- Bridge 5 label -->
  <text x="590" y="260" text-anchor="middle" fill="#cc88ff" font-size="10" transform="rotate(30,590,260)">Bridge 5</text>

  <!-- Tropical Node -->
  <g filter="shadow">
    <rect x="100" y="310" width="200" height="80" rx="15" fill="url(#tropGrad)"/>
    <text x="200" y="342" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">TROPICAL</text>
    <text x="200" y="360" text-anchor="middle" fill="#d0ffd0" font-size="10">max, + semiring</text>
    <text x="200" y="378" text-anchor="middle" fill="#d0ffd0" font-size="10">Maslov dequantization</text>
  </g>

  <!-- Spec Node -->
  <g filter="shadow">
    <rect x="350" y="310" width="200" height="80" rx="15" fill="url(#specGrad)"/>
    <text x="450" y="342" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">SPEC FUNCTOR</text>
    <text x="450" y="360" text-anchor="middle" fill="#d0d8ff" font-size="10">Space ↔ Algebra</text>
    <text x="450" y="378" text-anchor="middle" fill="#d0d8ff" font-size="10">Contravariant dictionary</text>
  </g>

  <!-- Quantum Node -->
  <g filter="shadow">
    <rect x="600" y="310" width="200" height="80" rx="15" fill="url(#quantGrad)"/>
    <text x="700" y="342" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">QUANTUM</text>
    <text x="700" y="360" text-anchor="middle" fill="#e8d0ff" font-size="10">Measurement = projection</text>
    <text x="700" y="378" text-anchor="middle" fill="#e8d0ff" font-size="10">P² = P</text>
  </g>

  <!-- Bridge 2 label -->
  <text x="200" y="430" text-anchor="middle" fill="#88ddaa" font-size="10">Bridge 2</text>
  <!-- Bridge 4 label -->
  <text x="450" y="430" text-anchor="middle" fill="#ddcc55" font-size="10">Bridge 4</text>

  <!-- Neural/ReLU Node -->
  <g filter="shadow">
    <rect x="100" y="490" width="200" height="80" rx="15" fill="#2d3436" stroke="#26de81" stroke-width="2"/>
    <text x="200" y="520" text-anchor="middle" fill="#26de81" font-size="14" font-weight="bold">ReLU / NEURAL</text>
    <text x="200" y="540" text-anchor="middle" fill="#88ccaa" font-size="10">max(x,0) = x ⊕ 0</text>
    <text x="200" y="555" text-anchor="middle" fill="#88ccaa" font-size="10">Tropical-linear</text>
  </g>

  <!-- Light Cone / Stereo Node -->
  <g filter="shadow">
    <rect x="350" y="490" width="200" height="80" rx="15" fill="url(#lightGrad)"/>
    <text x="450" y="518" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">LIGHT CONE</text>
    <text x="450" y="536" text-anchor="middle" fill="#555" font-size="10">a² + b² − c² = 0</text>
    <text x="450" y="552" text-anchor="middle" fill="#555" font-size="10">Stereo + Berggren + Photon</text>
  </g>

  <!-- Finance Node -->
  <g filter="shadow">
    <rect x="600" y="490" width="200" height="80" rx="15" fill="#2d3436" stroke="#a55eea" stroke-width="2"/>
    <text x="700" y="520" text-anchor="middle" fill="#a55eea" font-size="14" font-weight="bold">FINANCE / AMM</text>
    <text x="700" y="540" text-anchor="middle" fill="#cc99ee" font-size="10">x · y = k invariant</text>
    <text x="700" y="555" text-anchor="middle" fill="#cc99ee" font-size="10">Arbitrage = projection</text>
  </g>

  <!-- Statistics bar -->
  <rect x="50" y="620" width="800" height="55" rx="10" fill="#111133" opacity="0.7"/>
  <text x="130" y="643" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">493</text>
  <text x="130" y="660" text-anchor="middle" fill="#8899aa" font-size="9">Lean files</text>
  
  <text x="270" y="643" text-anchor="middle" fill="#26de81" font-size="12" font-weight="bold">~9,780</text>
  <text x="270" y="660" text-anchor="middle" fill="#8899aa" font-size="9">Theorems</text>
  
  <text x="410" y="643" text-anchor="middle" fill="#4b7bec" font-size="12" font-weight="bold">39+</text>
  <text x="410" y="660" text-anchor="middle" fill="#8899aa" font-size="9">Domains</text>
  
  <text x="550" y="643" text-anchor="middle" fill="#fed330" font-size="12" font-weight="bold">5</text>
  <text x="550" y="660" text-anchor="middle" fill="#8899aa" font-size="9">Grand Bridges</text>
  
  <text x="690" y="643" text-anchor="middle" fill="#a55eea" font-size="12" font-weight="bold">1</text>
  <text x="690" y="660" text-anchor="middle" fill="#8899aa" font-size="9">sorry remaining</text>
  
  <text x="810" y="643" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">0</text>
  <text x="810" y="660" text-anchor="middle" fill="#8899aa" font-size="9">contradictions</text>
</svg>
