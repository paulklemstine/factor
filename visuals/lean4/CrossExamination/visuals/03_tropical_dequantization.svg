<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">Maslov Dequantization: Classical → Tropical</text>
  <text x="400" y="55" text-anchor="middle" fill="#8899aa" font-size="11">ε · log(exp(a/ε) + exp(b/ε))  →  max(a, b)  as ε → 0⁺</text>

  <!-- Axes for the convergence plot -->
  <g transform="translate(80, 80)">
    <!-- Plot area -->
    <rect x="0" y="0" width="300" height="200" fill="#111827" rx="5"/>
    
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334455" stroke-width="1"/>
    <!-- X axis -->
    <line x1="0" y1="200" x2="300" y2="200" stroke="#334455" stroke-width="1"/>
    
    <text x="150" y="230" text-anchor="middle" fill="#8899aa" font-size="10">ε (temperature)</text>
    <text x="-15" y="100" text-anchor="middle" fill="#8899aa" font-size="10" transform="rotate(-90,-15,100)">deformed_add(ε, 3, 7)</text>
    
    <!-- max(3,7) = 7 line (target) -->
    <line x1="0" y1="60" x2="300" y2="60" stroke="#26de81" stroke-width="1.5" stroke-dasharray="5,5"/>
    <text x="310" y="64" fill="#26de81" font-size="9">max(3,7) = 7</text>
    
    <!-- max + ln2 line -->
    <line x1="0" y1="46" x2="300" y2="46" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="310" y="50" fill="#ff6b6b" font-size="9">7 + ln2 ≈ 7.69</text>
    
    <!-- Convergence curve (approximate) -->
    <!-- At ε=10: ~7.69, ε=5: ~7.69, ε=2: ~7.65, ε=1: ~7.55, ε=0.5: ~7.35, ε=0.1: ~7.02, ε=0.01: ~7.0 -->
    <polyline points="30,46 60,46 90,47 120,50 150,55 200,58 250,59.5 290,60"
             fill="none" stroke="#fed330" stroke-width="2.5"/>
    
    <!-- Data points -->
    <circle cx="30" cy="46" r="3" fill="#fed330"/>
    <circle cx="60" cy="46" r="3" fill="#fed330"/>
    <circle cx="90" cy="47" r="3" fill="#fed330"/>
    <circle cx="120" cy="50" r="3" fill="#fed330"/>
    <circle cx="150" cy="55" r="3" fill="#fed330"/>
    <circle cx="200" cy="58" r="3" fill="#fed330"/>
    <circle cx="250" cy="59.5" r="3" fill="#fed330"/>
    <circle cx="290" cy="60" r="3" fill="#fed330"/>
    
    <!-- ε labels -->
    <text x="30" y="215" text-anchor="middle" fill="#667788" font-size="8">10</text>
    <text x="90" y="215" text-anchor="middle" fill="#667788" font-size="8">5</text>
    <text x="150" y="215" text-anchor="middle" fill="#667788" font-size="8">1</text>
    <text x="200" y="215" text-anchor="middle" fill="#667788" font-size="8">0.1</text>
    <text x="250" y="215" text-anchor="middle" fill="#667788" font-size="8">0.01</text>
    <text x="290" y="215" text-anchor="middle" fill="#667788" font-size="8">→0</text>

    <text x="150" y="-10" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Convergence to max</text>
  </g>

  <!-- Right side: The dictionary -->
  <g transform="translate(460, 80)">
    <rect x="0" y="0" width="300" height="200" fill="#111827" rx="5"/>
    
    <text x="150" y="-10" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Arithmetic Dictionary</text>
    
    <text x="20" y="30" fill="#4b7bec" font-size="12" font-weight="bold">Classical</text>
    <text x="170" y="30" fill="#26de81" font-size="12" font-weight="bold">Tropical</text>
    
    <line x1="10" y1="40" x2="290" y2="40" stroke="#334455" stroke-width="1"/>
    
    <text x="20" y="65" fill="#ccddee" font-size="11">a + b</text>
    <text x="140" y="65" fill="#667788" font-size="11">→</text>
    <text x="170" y="65" fill="#ccddee" font-size="11">max(a, b)</text>
    
    <text x="20" y="90" fill="#ccddee" font-size="11">a × b</text>
    <text x="140" y="90" fill="#667788" font-size="11">→</text>
    <text x="170" y="90" fill="#ccddee" font-size="11">a + b</text>
    
    <text x="20" y="115" fill="#ccddee" font-size="11">0 (additive id)</text>
    <text x="140" y="115" fill="#667788" font-size="11">→</text>
    <text x="170" y="115" fill="#ccddee" font-size="11">−∞</text>
    
    <text x="20" y="140" fill="#ccddee" font-size="11">1 (mult. id)</text>
    <text x="140" y="140" fill="#667788" font-size="11">→</text>
    <text x="170" y="140" fill="#ccddee" font-size="11">0</text>
    
    <text x="20" y="165" fill="#ccddee" font-size="11">exp(a) + exp(b)</text>
    <text x="140" y="165" fill="#667788" font-size="11">→</text>
    <text x="170" y="165" fill="#ccddee" font-size="11">max(a, b)</text>
    
    <text x="20" y="190" fill="#ccddee" font-size="11">softmax</text>
    <text x="140" y="190" fill="#667788" font-size="11">→</text>
    <text x="170" y="190" fill="#ccddee" font-size="11">argmax</text>
  </g>

  <!-- Bottom: Neural network interpretation -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="640" height="130" fill="#111827" rx="5"/>
    
    <text x="320" y="25" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">ReLU = Tropical Addition</text>
    
    <!-- ReLU graph (left) -->
    <g transform="translate(50, 40)">
      <line x1="0" y1="70" x2="150" y2="70" stroke="#334455" stroke-width="1"/>
      <line x1="75" y1="0" x2="75" y2="100" stroke="#334455" stroke-width="1"/>
      
      <!-- ReLU curve -->
      <polyline points="0,70 75,70 150,0" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
      
      <text x="75" y="115" text-anchor="middle" fill="#ff6b6b" font-size="10">relu(x) = max(x, 0)</text>
      <text x="75" y="-5" text-anchor="middle" fill="#cccccc" font-size="10">Classical view</text>
    </g>
    
    <!-- = sign -->
    <text x="280" y="85" text-anchor="middle" fill="#fed330" font-size="24" font-weight="bold">=</text>
    
    <!-- Same graph, tropical interpretation (right) -->
    <g transform="translate(330, 40)">
      <line x1="0" y1="70" x2="150" y2="70" stroke="#334455" stroke-width="1"/>
      <line x1="75" y1="0" x2="75" y2="100" stroke="#334455" stroke-width="1"/>
      
      <!-- Same ReLU curve -->
      <polyline points="0,70 75,70 150,0" fill="none" stroke="#26de81" stroke-width="2.5"/>
      
      <text x="75" y="115" text-anchor="middle" fill="#26de81" font-size="10">x ⊕_trop 0 = max(x, 0)</text>
      <text x="75" y="-5" text-anchor="middle" fill="#cccccc" font-size="10">Tropical view</text>
    </g>
    
    <!-- Identity note -->
    <text x="560" y="70" text-anchor="start" fill="#8899aa" font-size="9">Proved in Lean:</text>
    <text x="560" y="85" text-anchor="start" fill="#fed330" font-size="9" font-weight="bold">by rfl</text>
    <text x="560" y="100" text-anchor="start" fill="#8899aa" font-size="9">(definitional</text>
    <text x="560" y="115" text-anchor="start" fill="#8899aa" font-size="9"> equality!)</text>
  </g>
</svg>
